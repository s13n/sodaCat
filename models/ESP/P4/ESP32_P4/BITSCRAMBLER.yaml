        bitOffset: 3
        bitWidth: 1
        access: read-write
      - name: TX_COND_MODE
        description: 'write this bit to specify the LOOP instruction condition mode of bitscrambler tx core, 0: use the little than operator to get the condition, 1: use not equal operator to get the condition'
        bitOffset: 4
        bitWidth: 1
        access: read-write
