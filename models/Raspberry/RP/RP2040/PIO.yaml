name: PIO
description: Programmable IO block
source: RP2040 SVD v0.1
registers:
  - name: CTRL
    addressOffset: 0
    description: Control register
    resetValue: 0
    fields:
      - name: SM_ENABLE
        description: Enable/disable each of the four state machines by writing 1/0 to each of these four bits. When disabled, a state machine will cease executing instructions, except those written directly to SMx_INSTR by the system. Multiple bits can be set/cleared at once to run/halt multiple state machines simultaneously.
        access: read-write
        bitOffset: 0
        bitWidth: 4
      - name: SM_RESTART
        description: "Write 1 to instantly clear internal SM state which may be otherwise difficult to access and will affect future execution.\n\n                            Specifically, the following are cleared: input and output shift counters; the contents of the input shift register; the delay counter; the waiting-on-IRQ state; any stalled instruction written to SMx_INSTR or run by OUT/MOV EXEC; any pin write left asserted due to OUT_STICKY.\n\n                            The program counter, the contents of the output shift register and the X/Y scratch registers are not affected."
        access: write-only
        bitOffset: 4
        bitWidth: 4
      - name: CLKDIV_RESTART
        description: "Restart a state machine's clock divider from an initial phase of 0. Clock dividers are free-running, so once started, their output (including fractional jitter) is completely determined by the integer/fractional divisor configured in SMx_CLKDIV. This means that, if multiple clock dividers with the same divisor are restarted simultaneously, by writing multiple 1 bits to this field, the execution clocks of those state machines will run in precise lockstep.\n\n                            Note that setting/clearing SM_ENABLE does not stop the clock divider from running, so once multiple state machines' clocks are synchronised, it is safe to disable/reenable a state machine, whilst keeping the clock dividers in sync.\n\n                            Note also that CLKDIV_RESTART can be written to whilst the state machine is running, and this is useful to resynchronise clock dividers after the divisors (SMx_CLKDIV) have been changed on-the-fly."
        access: write-only
        bitOffset: 8
        bitWidth: 4
  - name: FSTAT
    addressOffset: 4
    description: FIFO status register
    resetValue: 251662080
    fields:
      - name: RXFULL
        description: State machine RX FIFO is full
        access: read-only
        bitOffset: 0
        bitWidth: 4
      - name: RXEMPTY
        description: State machine RX FIFO is empty
        access: read-only
        bitOffset: 8
        bitWidth: 4
      - name: TXFULL
        description: State machine TX FIFO is full
        access: read-only
        bitOffset: 16
        bitWidth: 4
      - name: TXEMPTY
        description: State machine TX FIFO is empty
        access: read-only
        bitOffset: 24
        bitWidth: 4
  - name: FDEBUG
    addressOffset: 8
    description: FIFO debug register
    resetValue: 0
    fields:
      - name: RXSTALL
        description: State machine has stalled on full RX FIFO during a blocking PUSH, or an IN with autopush enabled. This flag is also set when a nonblocking PUSH to a full FIFO took place, in which case the state machine has dropped data. Write 1 to clear.
        access: read-write
        modifiedWriteValues: oneToClear
        bitOffset: 0
        bitWidth: 4
      - name: RXUNDER
        description: RX FIFO underflow (i.e. read-on-empty by the system) has occurred. Write 1 to clear. Note that read-on-empty does not perturb the state of the FIFO in any way, but the data returned by reading from an empty FIFO is undefined, so this flag generally only becomes set due to some kind of software error.
        access: read-write
        modifiedWriteValues: oneToClear
        bitOffset: 8
        bitWidth: 4
      - name: TXOVER
        description: TX FIFO overflow (i.e. write-on-full by the system) has occurred. Write 1 to clear. Note that write-on-full does not alter the state or contents of the FIFO in any way, but the data that the system attempted to write is dropped, so if this flag is set, your software has quite likely dropped some data on the floor.
        access: read-write
        modifiedWriteValues: oneToClear
        bitOffset: 16
        bitWidth: 4
      - name: TXSTALL
        description: State machine has stalled on empty TX FIFO during a blocking PULL, or an OUT with autopull enabled. Write 1 to clear.
        access: read-write
        modifiedWriteValues: oneToClear
        bitOffset: 24
        bitWidth: 4
  - name: FLEVEL
    addressOffset: 12
    description: FIFO levels
    resetValue: 0
    fields:
      - name: TX0
        access: read-only
        bitOffset: 0
        bitWidth: 4
      - name: RX0
        access: read-only
        bitOffset: 4
        bitWidth: 4
      - name: TX1
        access: read-only
        bitOffset: 8
        bitWidth: 4
      - name: RX1
        access: read-only
        bitOffset: 12
        bitWidth: 4
      - name: TX2
        access: read-only
        bitOffset: 16
        bitWidth: 4
      - name: RX2
        access: read-only
        bitOffset: 20
        bitWidth: 4
      - name: TX3
        access: read-only
        bitOffset: 24
        bitWidth: 4
      - name: RX3
        access: read-only
        bitOffset: 28
        bitWidth: 4
  - name: IRQ
    addressOffset: 48
    description: "State machine IRQ flags register. Write 1 to clear. There are 8 state machine IRQ flags, which can be set, cleared, and waited on by the state machines. There's no fixed association between flags and state machines -- any state machine can use any flag.\n\n                    Any of the 8 flags can be used for timing synchronisation between state machines, using IRQ and WAIT instructions. The lower four of these flags are also routed out to system-level interrupt requests, alongside FIFO status interrupts -- see e.g. IRQ0_INTE."
    resetValue: 0
    fields:
      - name: IRQ
        access: read-write
        modifiedWriteValues: oneToClear
        bitOffset: 0
        bitWidth: 8
  - name: IRQ_FORCE
    addressOffset: 52
    description: 'Writing a 1 to each of these bits will forcibly assert the corresponding IRQ. Note this is different to the INTF register: writing here affects PIO internal state. INTF just asserts the processor-facing IRQ signal for testing ISRs, and is not visible to the state machines.'
    resetValue: 0
    fields:
      - name: IRQ_FORCE
        access: write-only
        bitOffset: 0
        bitWidth: 8
  - name: INPUT_SYNC_BYPASS
    addressOffset: 56
    description: "There is a 2-flipflop synchronizer on each GPIO input, which protects PIO logic from metastabilities. This increases input delay, and for fast synchronous IO (e.g. SPI) these synchronizers may need to be bypassed. Each bit in this register corresponds to one GPIO. \n                    0 -> input is synchronized (default) \n                    1 -> synchronizer is bypassed \n                    If in doubt, leave this register as all zeroes."
    resetValue: 0
    fields:
      - name: INPUT_SYNC_BYPASS
        access: read-write
        bitOffset: 0
        bitWidth: 32
  - name: DBG_PADOUT
    addressOffset: 60
    description: Read to sample the pad output values PIO is currently driving to the GPIOs. On RP2040 there are 30 GPIOs, so the two most significant bits are hardwired to 0.
    resetValue: 0
    fields:
      - name: DBG_PADOUT
        access: read-only
        bitOffset: 0
        bitWidth: 32
  - name: DBG_PADOE
    addressOffset: 64
    description: Read to sample the pad output enables (direction) PIO is currently driving to the GPIOs. On RP2040 there are 30 GPIOs, so the two most significant bits are hardwired to 0.
    resetValue: 0
    fields:
      - name: DBG_PADOE
        access: read-only
        bitOffset: 0
        bitWidth: 32
  - name: DBG_CFGINFO
    addressOffset: 68
    description: "The PIO hardware has some free parameters that may vary between chip products. \n                    These should be provided in the chip datasheet, but are also exposed here."
    resetValue: 0
    fields:
      - name: FIFO_DEPTH
        description: "The depth of the state machine TX/RX FIFOs, measured in words. \n                            Joining fifos via SHIFTCTRL_FJOIN gives one FIFO with double \n                            this depth."
        access: read-only
        bitOffset: 0
        bitWidth: 6
      - name: SM_COUNT
        description: The number of state machines this PIO instance is equipped with.
        access: read-only
        bitOffset: 8
        bitWidth: 4
      - name: IMEM_SIZE
        description: The size of the instruction memory, measured in units of one instruction
        access: read-only
        bitOffset: 16
        bitWidth: 6
  - name: INTR
    addressOffset: 296
    description: Raw Interrupts
    resetValue: 0
    fields:
      - name: SM0_RXNEMPTY
        access: read-only
        bitOffset: 0
        bitWidth: 1
      - name: SM1_RXNEMPTY
        access: read-only
        bitOffset: 1
        bitWidth: 1
      - name: SM2_RXNEMPTY
        access: read-only
        bitOffset: 2
        bitWidth: 1
      - name: SM3_RXNEMPTY
        access: read-only
        bitOffset: 3
        bitWidth: 1
      - name: SM0_TXNFULL
        access: read-only
        bitOffset: 4
        bitWidth: 1
      - name: SM1_TXNFULL
        access: read-only
        bitOffset: 5
        bitWidth: 1
      - name: SM2_TXNFULL
        access: read-only
        bitOffset: 6
        bitWidth: 1
      - name: SM3_TXNFULL
        access: read-only
        bitOffset: 7
        bitWidth: 1
      - name: SM0
        access: read-only
        bitOffset: 8
        bitWidth: 1
      - name: SM1
        access: read-only
        bitOffset: 9
        bitWidth: 1
      - name: SM2
        access: read-only
        bitOffset: 10
        bitWidth: 1
      - name: SM3
        access: read-only
        bitOffset: 11
        bitWidth: 1
  - name: TXF[%s]
    addressOffset: 16
    description: Direct write access to the TX FIFO for this state machine
    resetValue: 0
    fields:
      - name: TXF
        access: write-only
        bitOffset: 0
        bitWidth: 32
    dim: 4
    dimIncrement: 4
  - name: RXF[%s]
    addressOffset: 32
    description: Direct read access to the RX FIFO for this state machine
    resetMask: 0
    fields:
      - name: RXF
        access: read-only
        readAction: modify
        bitOffset: 0
        bitWidth: 32
    dim: 4
    dimIncrement: 4
  - name: INSTR_MEM[%s]
    addressOffset: 72
    description: Write-only access to instruction memory
    resetValue: 0
    fields:
      - name: INSTR_MEM
        access: write-only
        bitOffset: 0
        bitWidth: 16
    dim: 32
    dimIncrement: 4
  - name: SM[%s]
    description: State machine
    dim: 4
    addressOffset: 200
    dimIncrement: 24
    registers:
      - name: CLKDIV
        addressOffset: 0
        description: "Clock divisor register for state machine 0 \n                    Frequency = clock freq / (CLKDIV_INT + CLKDIV_FRAC / 256)"
        resetValue: 65536
        fields:
          - name: FRAC
            description: Fractional part of clock divisor
            access: read-write
            bitOffset: 8
            bitWidth: 8
          - name: INT
            description: "Effective frequency is sysclk/(int + frac/256). \n                            Value of 0 is interpreted as 65536. If INT is 0, FRAC must also be 0."
            access: read-write
            bitOffset: 16
            bitWidth: 16
      - name: EXECCTRL
        addressOffset: 4
        description: Execution/behavioural settings for state machine 0
        resetValue: 126976
        fields:
          - name: STATUS_N
            description: Comparison level for the MOV x, STATUS instruction
            access: read-write
            bitOffset: 0
            bitWidth: 4
          - name: STATUS_SEL
            description: Comparison used for the MOV x, STATUS instruction.
            access: read-write
            enumeratedValues:
              - name: TXLEVEL
                value: 0
                description: All-ones if TX FIFO level < N, otherwise all-zeroes
              - name: RXLEVEL
                value: 1
                description: All-ones if RX FIFO level < N, otherwise all-zeroes
            bitOffset: 4
            bitWidth: 1
          - name: WRAP_BOTTOM
            description: After reaching wrap_top, execution is wrapped to this address.
            access: read-write
            bitOffset: 7
            bitWidth: 5
          - name: WRAP_TOP
            description: "After reaching this address, execution is wrapped to wrap_bottom. \n                            If the instruction is a jump, and the jump condition is true, the jump takes priority."
            access: read-write
            bitOffset: 12
            bitWidth: 5
          - name: OUT_STICKY
            description: Continuously assert the most recent OUT/SET to the pins
            access: read-write
            bitOffset: 17
            bitWidth: 1
          - name: INLINE_OUT_EN
            description: "If 1, use a bit of OUT data as an auxiliary write enable \n                            When used in conjunction with OUT_STICKY, writes with an enable of 0 will \n                            deassert the latest pin write. This can create useful masking/override behaviour \n                            due to the priority ordering of state machine pin writes (SM0 < SM1 < ...)"
            access: read-write
            bitOffset: 18
            bitWidth: 1
          - name: OUT_EN_SEL
            description: Which data bit to use for inline OUT enable
            access: read-write
            bitOffset: 19
            bitWidth: 5
          - name: JMP_PIN
            description: The GPIO number to use as condition for JMP PIN. Unaffected by input mapping.
            access: read-write
            bitOffset: 24
            bitWidth: 5
          - name: SIDE_PINDIR
            description: If 1, side-set data is asserted to pin directions, instead of pin values
            access: read-write
            bitOffset: 29
            bitWidth: 1
          - name: SIDE_EN
            description: If 1, the MSB of the Delay/Side-set instruction field is used as side-set enable, rather than a side-set data bit. This allows instructions to perform side-set optionally, rather than on every instruction, but the maximum possible side-set width is reduced from 5 to 4. Note that the value of PINCTRL_SIDESET_COUNT is inclusive of this enable bit.
            access: read-write
            bitOffset: 30
            bitWidth: 1
          - name: EXEC_STALLED
            description: If 1, an instruction written to SMx_INSTR is stalled, and latched by the state machine. Will clear to 0 once this instruction completes.
            access: read-only
            bitOffset: 31
            bitWidth: 1
      - name: SHIFTCTRL
        addressOffset: 8
        description: Control behaviour of the input/output shift registers for state machine 0
        resetValue: 786432
        fields:
          - name: AUTOPUSH
            description: Push automatically when the input shift register is filled, i.e. on an IN instruction which causes the input shift counter to reach or exceed PUSH_THRESH.
            access: read-write
            bitOffset: 16
            bitWidth: 1
          - name: AUTOPULL
            description: Pull automatically when the output shift register is emptied, i.e. on or following an OUT instruction which causes the output shift counter to reach or exceed PULL_THRESH.
            access: read-write
            bitOffset: 17
            bitWidth: 1
          - name: IN_SHIFTDIR
            description: 1 = shift input shift register to right (data enters from left). 0 = to left.
            access: read-write
            bitOffset: 18
            bitWidth: 1
          - name: OUT_SHIFTDIR
            description: 1 = shift out of output shift register to right. 0 = to left.
            access: read-write
            bitOffset: 19
            bitWidth: 1
          - name: PUSH_THRESH
            description: "Number of bits shifted into ISR before autopush, or conditional push (PUSH IFFULL), will take place. \n                            Write 0 for value of 32."
            access: read-write
            bitOffset: 20
            bitWidth: 5
          - name: PULL_THRESH
            description: "Number of bits shifted out of OSR before autopull, or conditional pull (PULL IFEMPTY), will take place. \n                            Write 0 for value of 32."
            access: read-write
            bitOffset: 25
            bitWidth: 5
          - name: FJOIN_TX
            description: "When 1, TX FIFO steals the RX FIFO's storage, and becomes twice as deep. \n                            RX FIFO is disabled as a result (always reads as both full and empty). \n                            FIFOs are flushed when this bit is changed."
            access: read-write
            bitOffset: 30
            bitWidth: 1
          - name: FJOIN_RX
            description: "When 1, RX FIFO steals the TX FIFO's storage, and becomes twice as deep. \n                            TX FIFO is disabled as a result (always reads as both full and empty). \n                            FIFOs are flushed when this bit is changed."
            access: read-write
            bitOffset: 31
            bitWidth: 1
      - name: ADDR
        addressOffset: 12
        description: Current instruction address of state machine 0
        resetValue: 0
        fields:
          - name: ADDR
            access: read-only
            bitOffset: 0
            bitWidth: 5
      - name: INSTR
        addressOffset: 16
        description: "Read to see the instruction currently addressed by state machine 0's program counter \n                    Write to execute an instruction immediately (including jumps) and then resume execution."
        resetMask: 0
        fields:
          - name: INSTR
            access: read-write
            bitOffset: 0
            bitWidth: 16
      - name: PINCTRL
        addressOffset: 20
        description: State machine pin control
        resetValue: 335544320
        fields:
          - name: OUT_BASE
            description: The lowest-numbered pin that will be affected by an OUT PINS, OUT PINDIRS or MOV PINS instruction. The data written to this pin will always be the least-significant bit of the OUT or MOV data.
            access: read-write
            bitOffset: 0
            bitWidth: 5
          - name: SET_BASE
            description: The lowest-numbered pin that will be affected by a SET PINS or SET PINDIRS instruction. The data written to this pin is the least-significant bit of the SET data.
            access: read-write
            bitOffset: 5
            bitWidth: 5
          - name: SIDESET_BASE
            description: The lowest-numbered pin that will be affected by a side-set operation. The MSBs of an instruction's side-set/delay field (up to 5, determined by SIDESET_COUNT) are used for side-set data, with the remaining LSBs used for delay. The least-significant bit of the side-set portion is the bit written to this pin, with more-significant bits written to higher-numbered pins.
            access: read-write
            bitOffset: 10
            bitWidth: 5
          - name: IN_BASE
            description: The pin which is mapped to the least-significant bit of a state machine's IN data bus. Higher-numbered pins are mapped to consecutively more-significant data bits, with a modulo of 32 applied to pin number.
            access: read-write
            bitOffset: 15
            bitWidth: 5
          - name: OUT_COUNT
            description: The number of pins asserted by an OUT PINS, OUT PINDIRS or MOV PINS instruction. In the range 0 to 32 inclusive.
            access: read-write
            bitOffset: 20
            bitWidth: 6
          - name: SET_COUNT
            description: The number of pins asserted by a SET. In the range 0 to 5 inclusive.
            access: read-write
            bitOffset: 26
            bitWidth: 3
          - name: SIDESET_COUNT
            description: The number of MSBs of the Delay/Side-set instruction field which are used for side-set. Inclusive of the enable bit, if present. Minimum of 0 (all delay bits, no side-set) and maximum of 5 (all side-set, no delay).
            access: read-write
            bitOffset: 29
            bitWidth: 3
  - name: IRQS[%s]
    description: IRQ control
    dim: 2
    addressOffset: 300
    dimIncrement: 12
    registers:
      - name: INTE
        addressOffset: 0
        description: Interrupt Enable for irq0
        resetValue: 0
        fields:
          - name: SM0_RXNEMPTY
            access: read-write
            bitOffset: 0
            bitWidth: 1
          - name: SM1_RXNEMPTY
            access: read-write
            bitOffset: 1
            bitWidth: 1
          - name: SM2_RXNEMPTY
            access: read-write
            bitOffset: 2
            bitWidth: 1
          - name: SM3_RXNEMPTY
            access: read-write
            bitOffset: 3
            bitWidth: 1
          - name: SM0_TXNFULL
            access: read-write
            bitOffset: 4
            bitWidth: 1
          - name: SM1_TXNFULL
            access: read-write
            bitOffset: 5
            bitWidth: 1
          - name: SM2_TXNFULL
            access: read-write
            bitOffset: 6
            bitWidth: 1
          - name: SM3_TXNFULL
            access: read-write
            bitOffset: 7
            bitWidth: 1
          - name: SM0
            access: read-write
            bitOffset: 8
            bitWidth: 1
          - name: SM1
            access: read-write
            bitOffset: 9
            bitWidth: 1
          - name: SM2
            access: read-write
            bitOffset: 10
            bitWidth: 1
          - name: SM3
            access: read-write
            bitOffset: 11
            bitWidth: 1
      - name: INTF
        addressOffset: 4
        description: Interrupt Force for irq0
        resetValue: 0
        fields:
          - name: SM0_RXNEMPTY
            access: read-write
            bitOffset: 0
            bitWidth: 1
          - name: SM1_RXNEMPTY
            access: read-write
            bitOffset: 1
            bitWidth: 1
          - name: SM2_RXNEMPTY
            access: read-write
            bitOffset: 2
            bitWidth: 1
          - name: SM3_RXNEMPTY
            access: read-write
            bitOffset: 3
            bitWidth: 1
          - name: SM0_TXNFULL
            access: read-write
            bitOffset: 4
            bitWidth: 1
          - name: SM1_TXNFULL
            access: read-write
            bitOffset: 5
            bitWidth: 1
          - name: SM2_TXNFULL
            access: read-write
            bitOffset: 6
            bitWidth: 1
          - name: SM3_TXNFULL
            access: read-write
            bitOffset: 7
            bitWidth: 1
          - name: SM0
            access: read-write
            bitOffset: 8
            bitWidth: 1
          - name: SM1
            access: read-write
            bitOffset: 9
            bitWidth: 1
          - name: SM2
            access: read-write
            bitOffset: 10
            bitWidth: 1
          - name: SM3
            access: read-write
            bitOffset: 11
            bitWidth: 1
      - name: INTS
        addressOffset: 8
        description: Interrupt status after masking & forcing for irq0
        resetValue: 0
        fields:
          - name: SM0_RXNEMPTY
            access: read-only
            bitOffset: 0
            bitWidth: 1
          - name: SM1_RXNEMPTY
            access: read-only
            bitOffset: 1
            bitWidth: 1
          - name: SM2_RXNEMPTY
            access: read-only
            bitOffset: 2
            bitWidth: 1
          - name: SM3_RXNEMPTY
            access: read-only
            bitOffset: 3
            bitWidth: 1
          - name: SM0_TXNFULL
            access: read-only
            bitOffset: 4
            bitWidth: 1
          - name: SM1_TXNFULL
            access: read-only
            bitOffset: 5
            bitWidth: 1
          - name: SM2_TXNFULL
            access: read-only
            bitOffset: 6
            bitWidth: 1
          - name: SM3_TXNFULL
            access: read-only
            bitOffset: 7
            bitWidth: 1
          - name: SM0
            access: read-only
            bitOffset: 8
            bitWidth: 1
          - name: SM1
            access: read-only
            bitOffset: 9
            bitWidth: 1
          - name: SM2
            access: read-only
            bitOffset: 10
            bitWidth: 1
          - name: SM3
            access: read-only
            bitOffset: 11
            bitWidth: 1
addressBlocks:
  - offset: 0
    size: 324
    usage: registers
interrupts:
  - name: IRQ_0
  - name: IRQ_1
