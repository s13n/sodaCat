        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: LOCK_DONE
        description: 'The bit is used to indicate whether unlock/lock operation is finished or not. 0: not finished. 1: finished.'
        bitOffset: 2
        bitWidth: 1
        access: read-only
      - name: LOCK_RGID
        description: The bit is used to set  the gid of cache lock/unlock.
