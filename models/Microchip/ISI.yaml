        description: Threshold Mask
        bitOffset: 13
        bitWidth: 2
        enumeratedValues:
          - name: BEATS_4
            description: Only 4 beats AHB burst allowed
            value: 0
          - name: BEATS_8
            description: Only 4 and 8 beats AHB burst allowed
            value: 1
          - name: BEATS_16
            description: 4, 8 and 16 beats AHB burst allowed
            value: 2
      - name: SLD
        description: Start of Line Delay
        bitOffset: 16
        bitWidth: 8
      - name: SFD
        description: Start of Frame Delay
        bitOffset: 24
        bitWidth: 8
