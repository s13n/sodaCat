# Created from ATSAMV71Q21B.svd (Rev 0)

name: AFEC
version: 11147S
description: Analog Front-End Controller
groupName: AFEC
prependToName: AFEC_
registers:
  - name: CR
    description: AFEC Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
      - name: START
        description: Start Conversion
        bitOffset: 1
        bitWidth: 1
  - name: MR
    description: AFEC Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: TRGEN
        description: Trigger Enable
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: Hardware triggers are disabled. Starting a conversion is only possible by software.
            value: 0
          - name: EN
            description: Hardware trigger selected by TRGSEL field is enabled.
            value: 1
      - name: TRGSEL
        description: Trigger Selection
        bitOffset: 1
        bitWidth: 3
        enumeratedValues:
          - name: AFEC_TRIG0
            description: AFE0_ADTRG for AFEC0 / AFE1_ADTRG for AFEC1
            value: 0
          - name: AFEC_TRIG1
            description: TIOA Output of the Timer Counter Channel 0 for AFEC0/TIOA Output of the Timer Counter Channel 3 for AFEC1
            value: 1
          - name: AFEC_TRIG2
            description: TIOA Output of the Timer Counter Channel 1 for AFEC0/TIOA Output of the Timer Counter Channel 4 for AFEC1
            value: 2
          - name: AFEC_TRIG3
            description: TIOA Output of the Timer Counter Channel 2 for AFEC0/TIOA Output of the Timer Counter Channel 5 for AFEC1
            value: 3
          - name: AFEC_TRIG4
            description: PWM0 event line 0 for AFEC0 / PWM1 event line 0 for AFEC1
            value: 4
          - name: AFEC_TRIG5
            description: PWM0 event line 1 for AFEC0 / PWM1 event line 1 for AFEC1
            value: 5
          - name: AFEC_TRIG6
            description: Analog Comparator
            value: 6
      - name: SLEEP
        description: Sleep Mode
        bitOffset: 5
        bitWidth: 1
        enumeratedValues:
          - name: NORMAL
            description: 'Normal mode: The AFE and reference voltage circuitry are kept ON between conversions.'
            value: 0
          - name: SLEEP
            description: 'Sleep mode: The AFE and reference voltage circuitry are OFF between conversions.'
            value: 1
      - name: FWUP
        description: Fast Wake-up
        bitOffset: 6
        bitWidth: 1
        enumeratedValues:
          - name: 'OFF'
            description: 'Normal Sleep mode: The sleep mode is defined by the SLEEP bit.'
            value: 0
          - name: 'ON'
            description: 'Fast wake-up Sleep mode: The voltage reference is ON between conversions and AFE is OFF.'
            value: 1
      - name: FREERUN
        description: Free Run Mode
        bitOffset: 7
        bitWidth: 1
        enumeratedValues:
          - name: 'OFF'
            description: Normal mode
            value: 0
          - name: 'ON'
            description: 'Free Run mode: Never wait for any trigger.'
            value: 1
      - name: PRESCAL
        description: Prescaler Rate Selection
        bitOffset: 8
        bitWidth: 8
      - name: STARTUP
        description: Start-up Time
        bitOffset: 16
        bitWidth: 4
        enumeratedValues:
          - name: SUT0
            description: 0 periods of AFE clock
            value: 0
          - name: SUT8
            description: 8 periods of AFE clock
            value: 1
          - name: SUT16
            description: 16 periods of AFE clock
            value: 2
          - name: SUT24
            description: 24 periods of AFE clock
            value: 3
          - name: SUT64
            description: 64 periods of AFE clock
            value: 4
          - name: SUT80
            description: 80 periods of AFE clock
            value: 5
          - name: SUT96
            description: 96 periods of AFE clock
            value: 6
          - name: SUT112
            description: 112 periods of AFE clock
            value: 7
          - name: SUT512
            description: 512 periods of AFE clock
            value: 8
          - name: SUT576
            description: 576 periods of AFE clock
            value: 9
          - name: SUT640
            description: 640 periods of AFE clock
            value: 10
          - name: SUT704
            description: 704 periods of AFE clock
            value: 11
          - name: SUT768
            description: 768 periods of AFE clock
            value: 12
          - name: SUT832
            description: 832 periods of AFE clock
            value: 13
          - name: SUT896
            description: 896 periods of AFE clock
            value: 14
          - name: SUT960
            description: 960 periods of AFE clock
            value: 15
      - name: ONE
        description: One
        bitOffset: 23
        bitWidth: 1
      - name: TRACKTIM
        description: Tracking Time
        bitOffset: 24
        bitWidth: 4
      - name: TRANSFER
        description: Transfer Period
        bitOffset: 28
        bitWidth: 2
      - name: USEQ
        description: User Sequence Enable
        bitOffset: 31
        bitWidth: 1
        enumeratedValues:
          - name: NUM_ORDER
            description: 'Normal mode: The controller converts channels in a simple numeric order.'
            value: 0
          - name: REG_ORDER
            description: 'User Sequence mode: The sequence respects what is defined in AFEC_SEQ1R and AFEC_SEQ1R.'
            value: 1
  - name: EMR
    description: AFEC Extended Mode Register
    addressOffset: 8
    size: 32
    fields:
      - name: CMPMODE
        description: Comparison Mode
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: LOW
            description: Generates an event when the converted data is lower than the low threshold of the window.
            value: 0
          - name: HIGH
            description: Generates an event when the converted data is higher than the high threshold of the window.
            value: 1
          - name: IN
            description: Generates an event when the converted data is in the comparison window.
            value: 2
          - name: OUT
            description: Generates an event when the converted data is out of the comparison window.
            value: 3
      - name: CMPSEL
        description: Comparison Selected Channel
        bitOffset: 3
        bitWidth: 5
      - name: CMPALL
        description: Compare All Channels
        bitOffset: 9
        bitWidth: 1
      - name: CMPFILTER
        description: Compare Event Filtering
        bitOffset: 12
        bitWidth: 2
      - name: RES
        description: Resolution
        bitOffset: 16
        bitWidth: 3
        enumeratedValues:
          - name: NO_AVERAGE
            description: 12-bit resolution, AFE sample rate is maximum (no averaging).
            value: 0
          - name: OSR4
            description: 13-bit resolution, AFE sample rate divided by 4 (averaging).
            value: 2
          - name: OSR16
            description: 14-bit resolution, AFE sample rate divided by 16 (averaging).
            value: 3
          - name: OSR64
            description: 15-bit resolution, AFE sample rate divided by 64 (averaging).
            value: 4
          - name: OSR256
            description: 16-bit resolution, AFE sample rate divided by 256 (averaging).
            value: 5
      - name: TAG
        description: TAG of the AFEC_LDCR
        bitOffset: 24
        bitWidth: 1
      - name: STM
        description: Single Trigger Mode
        bitOffset: 25
        bitWidth: 1
      - name: SIGNMODE
        description: Sign Mode
        bitOffset: 28
        bitWidth: 2
        enumeratedValues:
          - name: SE_UNSG_DF_SIGN
            description: 'Single-Ended channels: Unsigned conversions.Differential channels: Signed conversions.'
            value: 0
          - name: SE_SIGN_DF_UNSG
            description: 'Single-Ended channels: Signed conversions.Differential channels: Unsigned conversions.'
            value: 1
          - name: ALL_UNSIGNED
            description: 'All channels: Unsigned conversions.'
            value: 2
          - name: ALL_SIGNED
            description: 'All channels: Signed conversions.'
            value: 3
