        interrupts:
          FLEXCOMM0: FLEXCOMM
          FLEXCOMM1: FLEXCOMM
          FLEXCOMM2: FLEXCOMM
          FLEXCOMM3: FLEXCOMM
          FLEXCOMM4: FLEXCOMM
          FLEXCOMM5: FLEXCOMM
          FLEXCOMM6: FLEXCOMM
          FLEXCOMM7: FLEXCOMM
          FLEXCOMM8: FLEXCOMM
          FLEXCOMM9: FLEXCOMM
        params:
