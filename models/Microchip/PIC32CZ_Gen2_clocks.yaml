family: PIC32CZ_Gen2
version: 0.1.0
documents:
  - id: DS60001749G
    title: PIC32CZ CA80/CA9x Family Data Sheet
    revision: G
    url: https://ww1.microchip.com/downloads/aemDocuments/documents/MCU32/ProductDocuments/DataSheets/PIC32CZ-CA80-CA90-Family-Data-Sheet-DS60001749.pdf
