        bitOffset: 6
        bitWidth: 1
      - name: TXDIS
        description: Transmitter Disable
        bitOffset: 7
        bitWidth: 1
      - name: RSTSTA
        description: Reset Status Bits
        bitOffset: 8
        bitWidth: 1
      - name: FCS
        description: Force SPI Chip Select
        bitOffset: 18
        bitWidth: 1
      - name: RCS
        description: Release SPI Chip Select
        bitOffset: 19
        bitWidth: 1
