# Consolidated configuration for NXP MCX model extraction.
# SVD files are fetched from https://github.com/nxp-mcuxpresso/mcux-soc-svd
# via CMake FetchContent. File layout: <chip>/<chip>.xml

svd:
  repo: https://github.com/nxp-mcuxpresso/mcux-soc-svd
  tag: MCUX_2.16.100

shared_blocks: {}

families:
  MCXN:
    subfamilies:
      MCXN23x:
        chips: [MCXN235, MCXN236]
        ref_manual: {name: MCXN23XRM, rev: "4", date: 2024-12-01, url: "https://www.nxp.com/webapp/Download?colCode=MCXN23XRM"}
      MCXN5xx:
        chips: [MCXN546, MCXN547]
        ref_manual: {name: MCXN5XXRM, rev: "4", date: 2024-12-01, url: "https://www.nxp.com/webapp/Download?colCode=MCXN5XXRM"}
      MCXN9xx:
        chips: [MCXN946, MCXN947]
        ref_manual: {name: MCXN94XRM, rev: "4.1", date: 2024-12-01, url: "https://www.nxp.com/webapp/Download?colCode=MCXN94XRM"}
    blocks:
      # ====================================================================
      # Analog
      # ====================================================================
      ADC:
        from: MCXN947.ADC0
        instances: [ADC0, ADC1]
        interrupts:
          ADC0: ADC
          ADC1: ADC

      CMP:
        from: MCXN947.CMP0
        instances: [CMP0, CMP1, CMP2]
        interrupts:
          HSCMP0: HSCMP
          HSCMP1: HSCMP
          HSCMP2: HSCMP

      DAC:
        from: MCXN947.DAC0
        instances: [DAC0, DAC1, DAC2]
        interrupts:
          DAC0: DAC
          DAC1: DAC
          DAC2: DAC

      OPAMP:
        from: MCXN947.OPAMP0
        instances: [OPAMP0, OPAMP1, OPAMP2]

      SINC:
        from: MCXN947.SINC0
        instances: [SINC0]
        interrupts:
          SINC_FILTER: FILTER

      TSI:
        from: MCXN947.TSI0
        instances: [TSI0]
        interrupts:
          TSI_END_OF_SCAN: END_OF_SCAN
          TSI_OUT_OF_SCAN: OUT_OF_SCAN

      VREF:
        from: MCXN947.VREF0
        instances: [VREF0]

      # ====================================================================
      # Communication
      # ====================================================================
      CAN:
        from: MCXN947.CAN0
        instances: [CAN0, CAN1]
        interrupts:
          CAN0: CAN
          CAN1: CAN

      EMVSIM:
        from: MCXN947.EMVSIM0
        instances: [EMVSIM0, EMVSIM1]
        interrupts:
          EMVSIM0: EMVSIM
          EMVSIM1: EMVSIM

      ENET:
        from: MCXN947.ENET0
        instances: [ENET0]
        interrupts:
          ETHERNET: INTR
          ETHERNET_PMT: PMT
          ETHERNET_MACLP: MACLP

      FLEXIO:
        from: MCXN947.FLEXIO0
        instances: [FLEXIO0]
        interrupts:
          FLEXIO: FLEXIO

      I3C:
        from: MCXN947.I3C0
        instances: [I3C0, I3C1]
        interrupts:
          I3C0: I3C
          I3C1: I3C

      LPI2C:
        from: MCXN947.LPI2C0
        instances: [LPI2C0, LPI2C1, LPI2C2, LPI2C3, LPI2C4,
                    LPI2C5, LPI2C6, LPI2C7, LPI2C8, LPI2C9]
        interrupts:
          LP_FLEXCOMM0: LP_FLEXCOMM
          LP_FLEXCOMM1: LP_FLEXCOMM
          LP_FLEXCOMM2: LP_FLEXCOMM
          LP_FLEXCOMM3: LP_FLEXCOMM
          LP_FLEXCOMM4: LP_FLEXCOMM
          LP_FLEXCOMM5: LP_FLEXCOMM
          LP_FLEXCOMM6: LP_FLEXCOMM
          LP_FLEXCOMM7: LP_FLEXCOMM
          LP_FLEXCOMM8: LP_FLEXCOMM
          LP_FLEXCOMM9: LP_FLEXCOMM

      LP_FLEXCOMM:
        from: MCXN947.LP_FLEXCOMM0
        instances: [LP_FLEXCOMM0, LP_FLEXCOMM1, LP_FLEXCOMM2, LP_FLEXCOMM3,
                    LP_FLEXCOMM4, LP_FLEXCOMM5, LP_FLEXCOMM6, LP_FLEXCOMM7,
                    LP_FLEXCOMM8, LP_FLEXCOMM9]
        interrupts:
          LP_FLEXCOMM0: LP_FLEXCOMM
          LP_FLEXCOMM1: LP_FLEXCOMM
          LP_FLEXCOMM2: LP_FLEXCOMM
          LP_FLEXCOMM3: LP_FLEXCOMM
          LP_FLEXCOMM4: LP_FLEXCOMM
          LP_FLEXCOMM5: LP_FLEXCOMM
          LP_FLEXCOMM6: LP_FLEXCOMM
          LP_FLEXCOMM7: LP_FLEXCOMM
          LP_FLEXCOMM8: LP_FLEXCOMM
          LP_FLEXCOMM9: LP_FLEXCOMM

      LPSPI:
        from: MCXN947.LPSPI0
        instances: [LPSPI0, LPSPI1, LPSPI2, LPSPI3, LPSPI4,
                    LPSPI5, LPSPI6, LPSPI7, LPSPI8, LPSPI9]
        interrupts:
          LP_FLEXCOMM0: LP_FLEXCOMM
          LP_FLEXCOMM1: LP_FLEXCOMM
          LP_FLEXCOMM2: LP_FLEXCOMM
          LP_FLEXCOMM3: LP_FLEXCOMM
          LP_FLEXCOMM4: LP_FLEXCOMM
          LP_FLEXCOMM5: LP_FLEXCOMM
          LP_FLEXCOMM6: LP_FLEXCOMM
          LP_FLEXCOMM7: LP_FLEXCOMM
          LP_FLEXCOMM8: LP_FLEXCOMM
          LP_FLEXCOMM9: LP_FLEXCOMM

      LPUART:
        from: MCXN947.LPUART0
        instances: [LPUART0, LPUART1, LPUART2, LPUART3, LPUART4,
                    LPUART5, LPUART6, LPUART7, LPUART8, LPUART9]
        interrupts:
          LP_FLEXCOMM0: LP_FLEXCOMM
          LP_FLEXCOMM1: LP_FLEXCOMM
          LP_FLEXCOMM2: LP_FLEXCOMM
          LP_FLEXCOMM3: LP_FLEXCOMM
          LP_FLEXCOMM4: LP_FLEXCOMM
          LP_FLEXCOMM5: LP_FLEXCOMM
          LP_FLEXCOMM6: LP_FLEXCOMM
          LP_FLEXCOMM7: LP_FLEXCOMM
          LP_FLEXCOMM8: LP_FLEXCOMM
          LP_FLEXCOMM9: LP_FLEXCOMM

      PDM:
        from: MCXN947.PDM
        instances: [PDM]
        interrupts:
          PDM_EVENT: EVENT

      SAI:
        from: MCXN947.SAI0
        instances: [SAI0, SAI1]
        interrupts:
          SAI0: SAI
          SAI1: SAI

      # ====================================================================
      # USB
      # ====================================================================
      USBDCD:
        from: MCXN947.USBDCD0
        instances: [USBDCD0]
        interrupts:
          USB0_DCD: DCD

      USBFS:
        from: MCXN947.USBFS0
        instances: [USBFS0]
        interrupts:
          USB0_FS: FS

      USBHS:
        from: MCXN947.USBHS1__USBC
        instances: [USBHS1__USBC]
        interrupts:
          USB1_HS: HS

      USBHS_NC:
        from: MCXN947.USBHS1__USBNC
        instances: [USBHS1__USBNC]

      USBPHY:
        from: MCXN947.USBPHY
        instances: [USBPHY]
        interrupts:
          USB1_HS_PHY: PHY

      USDHC:
        from: MCXN947.USDHC0
        instances: [USDHC0]
        interrupts:
          USDHC0: USDHC

      # ====================================================================
      # GPIO / Port
      # ====================================================================
      GPIO:
        from: MCXN947.GPIO0
        instances: [GPIO0, GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
        interrupts:
          GPIO00: INT0
          GPIO01: INT1
          GPIO10: INT0
          GPIO11: INT1
          GPIO20: INT0
          GPIO21: INT1
          GPIO30: INT0
          GPIO31: INT1
          GPIO40: INT0
          GPIO41: INT1
          GPIO50: INT0
          GPIO51: INT1
        params:
          - {name: pins, type: int, default: 32, description: Number of pins per port}

      PORT:
        from: MCXN947.PORT0
        instances: [PORT0, PORT1, PORT2, PORT3, PORT4, PORT5]
        interrupts:
          PORT_EFT: EFT

      # ====================================================================
      # Timers / Counters
      # ====================================================================
      CTIMER:
        from: MCXN947.CTIMER0
        instances: [CTIMER0, CTIMER1, CTIMER2, CTIMER3, CTIMER4]
        interrupts:
          CTIMER0: CTIMER
          CTIMER1: CTIMER
          CTIMER2: CTIMER
          CTIMER3: CTIMER
          CTIMER4: CTIMER

      FlexPWM:
        from: MCXN947.PWM0
        instances: [PWM0, PWM1]
        interrupts:
          FLEXPWM0_FAULT: FAULT
          FLEXPWM0_RELOAD_ERROR: RELOAD_ERROR
          FLEXPWM0_SUBMODULE0: SUBMODULE0
          FLEXPWM0_SUBMODULE1: SUBMODULE1
          FLEXPWM0_SUBMODULE2: SUBMODULE2
          FLEXPWM0_SUBMODULE3: SUBMODULE3
          FLEXPWM1_FAULT: FAULT
          FLEXPWM1_RELOAD_ERROR: RELOAD_ERROR
          FLEXPWM1_SUBMODULE0: SUBMODULE0
          FLEXPWM1_SUBMODULE1: SUBMODULE1
          FLEXPWM1_SUBMODULE2: SUBMODULE2
          FLEXPWM1_SUBMODULE3: SUBMODULE3

      FREQME:
        from: MCXN947.FREQME0
        instances: [FREQME0]
        interrupts:
          Freqme: FREQME

      LPTMR:
        from: MCXN947.LPTMR0
        instances: [LPTMR0, LPTMR1]
        interrupts:
          LPTMR0: LPTMR
          LPTMR1: LPTMR

      MRT:
        from: MCXN947.MRT0
        instances: [MRT0]
        interrupts:
          MRT0: MRT

      OSTIMER:
        from: MCXN947.OSTIMER0
        instances: [OSTIMER0]
        interrupts:
          OS_EVENT: EVENT

      QDC:
        from: MCXN947.QDC0
        instances: [QDC0, QDC1]
        interrupts:
          QDC0_COMPARE: COMPARE
          QDC0_HOME: HOME
          QDC0_WDG_SAB: WDG_SAB
          QDC0_IDX: IDX
          QDC1_COMPARE: COMPARE
          QDC1_HOME: HOME
          QDC1_WDG_SAB: WDG_SAB
          QDC1_IDX: IDX

      SCT:
        from: MCXN947.SCT0
        instances: [SCT0]
        interrupts:
          SCT0: SCT

      UTICK:
        uses: UTICK
        instances: [UTICK0]
        interrupts:
          UTICK0: INTR

      # ====================================================================
      # DMA
      # ====================================================================
      eDMA:
        from: MCXN947.DMA0
        instances: [DMA0, DMA1]
        interrupts:
          EDMA_0_CH0: CH0
          EDMA_0_CH1: CH1
          EDMA_0_CH2: CH2
          EDMA_0_CH3: CH3
          EDMA_0_CH4: CH4
          EDMA_0_CH5: CH5
          EDMA_0_CH6: CH6
          EDMA_0_CH7: CH7
          EDMA_0_CH8: CH8
          EDMA_0_CH9: CH9
          EDMA_0_CH10: CH10
          EDMA_0_CH11: CH11
          EDMA_0_CH12: CH12
          EDMA_0_CH13: CH13
          EDMA_0_CH14: CH14
          EDMA_0_CH15: CH15
          EDMA_1_CH0: CH0
          EDMA_1_CH1: CH1
          EDMA_1_CH2: CH2
          EDMA_1_CH3: CH3
          EDMA_1_CH4: CH4
          EDMA_1_CH5: CH5
          EDMA_1_CH6: CH6
          EDMA_1_CH7: CH7
          EDMA_1_CH8: CH8
          EDMA_1_CH9: CH9
          EDMA_1_CH10: CH10
          EDMA_1_CH11: CH11
          EDMA_1_CH12: CH12
          EDMA_1_CH13: CH13
          EDMA_1_CH14: CH14
          EDMA_1_CH15: CH15
        params:
          - {name: channels, type: int, default: 16, description: Number of DMA channels}

      eDMA_TCD:
        from: MCXN947.EDMA_0_TCD
        instances: [EDMA_0_TCD, EDMA_1_TCD]
        params:
          - {name: channels, type: int, default: 16, description: Number of TCD channels}

      # ====================================================================
      # System / Clock / Power
      # ====================================================================
      CMC:
        from: MCXN947.CMC0
        instances: [CMC0]
        interrupts:
          CMC0: CMC

      SCG:
        from: MCXN947.SCG0
        instances: [SCG0]
        interrupts:
          SCG: SCG

      SPC:
        from: MCXN947.SPC0
        instances: [SPC0]
        interrupts:
          SPC: SPC

      SYSCON:
        from: MCXN947.SYSCON0
        instances: [SYSCON0]

      VBAT:
        from: MCXN947.VBAT0
        instances: [VBAT0]
        interrupts:
          VBAT0: VBAT

      WUU:
        from: MCXN947.WUU0
        instances: [WUU0]
        interrupts:
          WUU: WUU

      # ====================================================================
      # Memory / Cache
      # ====================================================================
      CACHE64_CTRL:
        from: MCXN947.CACHE64_CTRL0
        instances: [CACHE64_CTRL0]

      CACHE64_POLSEL:
        from: MCXN947.CACHE64_POLSEL0
        instances: [CACHE64_POLSEL0]

      FLEXSPI:
        from: MCXN947.FLEXSPI0
        instances: [FLEXSPI0]
        interrupts:
          FLEXSPI0: FLEXSPI

      FMU:
        from: MCXN947.FMU0
        instances: [FMU0]
        interrupts:
          FMU0: FMU

      NPX:
        from: MCXN947.NPX0
        instances: [NPX0]

      # ====================================================================
      # Security
      # ====================================================================
      AHBSC:
        from: MCXN947.AHBSC
        instances: [AHBSC]
        interrupts:
          SEC_HYPERVISOR_CALL: HYPERVISOR_CALL

      CDOG:
        from: MCXN947.CDOG0
        instances: [CDOG0, CDOG1]
        interrupts:
          CDOG0: CDOG
          CDOG1: CDOG

      ELS:
        from: MCXN947.ELS
        instances: [ELS]
        interrupts:
          ELS: ELS
          ELS_ERR: ERR

      GDET:
        from: MCXN947.GDET0
        instances: [GDET0, GDET1]
        interrupts:
          GDET: GDET

      ITRC:
        from: MCXN947.ITRC0
        instances: [ITRC0]
        interrupts:
          ITRC0: ITRC

      PKC:
        from: MCXN947.PKC0
        instances: [PKC0]
        interrupts:
          PKC: PKC
          PKC_ERR: ERR

      PUF:
        from: MCXN947.PUF
        instances: [PUF]
        interrupts:
          PUF: PUF

      PUF_CTRL:
        from: MCXN947.PUF_CTRL
        instances: [PUF_CTRL]

      TRDC:
        from: MCXN947.TRDC
        instances: [TRDC]
        interrupts:
          SEC_VIO: VIO

      # ====================================================================
      # Miscellaneous
      # ====================================================================
      BSP32:
        from: MCXN947.BSP32_0
        instances: [BSP32_0]
        interrupts:
          BSP32: BSP32

      CMX_PERFMON:
        from: MCXN947.CMX_PERFMON0
        instances: [CMX_PERFMON0, CMX_PERFMON1]

      CRC:
        from: MCXN947.CRC0
        instances: [CRC0]

      DM:
        from: MCXN947.DM0
        instances: [DM0]

      EIM:
        from: MCXN947.EIM0
        instances: [EIM0]

      ERM:
        from: MCXN947.ERM0
        instances: [ERM0]
        interrupts:
          ERM_SINGLE_BIT_ERROR: SINGLE_BIT_ERROR
          ERM_MULTI_BIT_ERROR: MULTI_BIT_ERROR

      EVTG:
        from: MCXN947.EVTG0
        instances: [EVTG0]

      EWM:
        from: MCXN947.EWM0
        instances: [EWM0]
        interrupts:
          EWM0: EWM

      INPUTMUX:
        from: MCXN947.INPUTMUX0
        instances: [INPUTMUX0]

      INTM:
        from: MCXN947.INTM0
        instances: [INTM0]

      MAILBOX:
        from: MCXN947.MAILBOX
        instances: [MAILBOX]
        interrupts:
          MAILBOX: MAILBOX

      OTPC:
        from: MCXN947.OTPC0
        instances: [OTPC0]

      PINT:
        uses: PINT
        instances: [PINT0]
        interrupts:
          PINT0: PINT

      PLU:
        from: MCXN947.PLU0
        instances: [PLU0]
        interrupts:
          PLU: PLU

      POWERQUAD:
        from: MCXN947.POWERQUAD
        instances: [POWERQUAD]
        interrupts:
          PQ: PQ

      RTC:
        from: MCXN947.RTC0
        instances: [RTC0]
        interrupts:
          RTC: RTC

      RTC_SUBSYSTEM:
        from: MCXN947.RTC_SUBSYSTEM0
        instances: [RTC_SUBSYSTEM0]

      SEMA42:
        from: MCXN947.SEMA42_0
        instances: [SEMA42_0]

      SMARTDMA:
        from: MCXN947.SMARTDMA0
        instances: [SMARTDMA0]
        interrupts:
          SMARTDMA: SMARTDMA

      TDET:
        from: MCXN947.TDET0
        instances: [TDET0]

      WWDT:
        from: MCXN947.WWDT0
        instances: [WWDT0, WWDT1]
        interrupts:
          WWDT0: WWDT
          WWDT1: WWDT
