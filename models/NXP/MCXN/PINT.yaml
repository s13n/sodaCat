            description: Pin interrupt
            value: 0
          - name: PATTERN_MATCH
            description: Pattern match
            value: 1
      - name: ENA_RXEV
        description: Enables the RXEV output to the CPU and/or to a GPIO output, when the specified Boolean expression evaluates to true. If this value is 0b, RXEV output to the CPU is disabled. If this value is 1b, RXEV output to the CPU is enabled.
