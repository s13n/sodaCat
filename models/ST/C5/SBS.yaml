name: SBS
description: SBS register block
groupName: SBS
source: STM32C531 SVD v1.0.0
registers:
  - name: SBS_HDPLCR
    displayName: SBS_HDPLCR
    description: SBS temporal isolation control register
    addressOffset: 16
    size: 32
    access: read-write
    resetValue: 180
    resetMask: 4294967295
    fields:
      - name: INCR_HDPL
        description: HDPL value increment
        bitOffset: 0
        bitWidth: 8
        access: read-write
        enumeratedValues:
          - name: B_0xB4
            description: No increment
            value: 180
          - name: B_0x6A
            description: Recommended value to increment HDPL level by one
            value: 106
  - name: SBS_HDPLSR
    displayName: SBS_HDPLSR
    description: SBS temporal isolation status register
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: HDPL
        description: Temporal isolation level
        bitOffset: 0
        bitWidth: 8
        access: read-only
        enumeratedValues:
          - name: B_0x51
            description: HDPL1, hide protection level to be used to execute and protect an immutable root of trust (IROT) stage.
            value: 81
          - name: B_0x8A
            description: HDPL2, hide protection level to be used to execute and protect an updatable Root of Trust (UROT) stage.
            value: 138
          - name: B_0x6F
            description: HDPL3, hide protection level to be used to execute the application.
            value: 111
  - name: SBS_NEXTTILCR
    displayName: SBS_NEXTTILCR
    description: SBS next TIL control register
    addressOffset: 24
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: NEXTTIL
        description: Next TIL control register
        bitOffset: 0
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OBK-TIL = TIL
            value: 0
          - name: B_0x1
            description: OBK-TIL = TIL + 1
            value: 1
          - name: B_0x2
            description: OBK-TIL = TIL + 2
            value: 2
          - name: B_0x3
            description: OBK-TIL = TIL + 3
            value: 3
  - name: SBS_PMCR
    displayName: SBS_PMCR
    description: SBS product mode and configuration register
    addressOffset: 256
    size: 32
    access: read-write
    resetValue: 2147483648
    resetMask: 4294967295
    fields:
      - name: PB6_FMPLUS
        description: Fast-mode Plus command on PB(6)
        bitOffset: 16
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(6) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PB(6) is enabled
            value: 1
      - name: PB7_FMPLUS
        description: Fast-mode Plus command on PB(7)
        bitOffset: 17
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(7) is disabled
            value: 0
          - name: B_0x1
            description: Fast mode plus mode on PB(7) is enabled
            value: 1
      - name: PB8_FMPLUS
        description: Fast-mode Plus command on PB(8)
        bitOffset: 18
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(8) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PB(8) is enabled
            value: 1
      - name: PB9_FMPLUS
        description: Fast-mode Plus command on PB(9)
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(9) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PB(9) is enabled
            value: 1
      - name: PA11_FMPLUS
        description: Fast-mode Plus command on PA(11)
        bitOffset: 20
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PA(11) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PA(11) is enabled
            value: 1
      - name: PA12_FMPLUS
        description: Fast-mode Plus command on PA(12)
        bitOffset: 21
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PA(12) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PA(12) is enabled
            value: 1
      - name: PB3_FMPLUS
        description: Fast-mode Plus command on PB(3)
        bitOffset: 22
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(3) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PB(3) is enabled
            value: 1
      - name: PB4_FMPLUS
        description: Fast-mode Plus command on PB(4)
        bitOffset: 23
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Fast-mode Plus mode on PB(4) is disabled
            value: 0
          - name: B_0x1
            description: Fast-mode Plus mode on PB(4) is enabled
            value: 1
      - name: ETH_SEL_PHY
        description: Ethernet PHY interface selection
        bitOffset: 24
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: GMII or MII
            value: 0
          - name: B_0x4
            description: RMII
            value: 4
          - name: B_0x8
            description: 10BT1S
            value: 8
      - name: ETHINTPOL
        description: Ethernet external PHY interrupt polarity configuration
        bitOffset: 28
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: active high
            value: 0
          - name: B_0x1
            description: active low
            value: 1
      - name: ETHPDACK
        description: Ethernet power-down acknowledge
        bitOffset: 29
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Ethernet functional / power-down sequence not yet completed
            value: 0
          - name: B_0x1
            description: Ethernet power-down sequence completed
            value: 1
      - name: ETHTXLPI
        description: Ethernet TxLPI status
        bitOffset: 30
        bitWidth: 1
        access: read-only
  - name: SBS_FPUIMR
    displayName: SBS_FPUIMR
    description: SBS FPU interrupt mask register
    addressOffset: 260
    size: 32
    access: read-write
    resetValue: 31
    resetMask: 4294967295
    fields:
      - name: FPU_IE
        description: FPU interrupt enable
        bitOffset: 0
        bitWidth: 6
        access: read-write
  - name: SBS_MESR
    displayName: SBS_MESR
    description: SBS memory erase status register
    addressOffset: 264
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4293984240
    fields:
      - name: MCLR
        description: Device memories erase status
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Memory erase ongoing if not yet cleared by software
            value: 0
          - name: B_0x1
            description: Memory erase done
            value: 1
      - name: IPMEE
        description: ICACHE erase status
        bitOffset: 16
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ICACHE erase ongoing
            value: 0
          - name: B_0x1
            description: ICACHE erase ended
            value: 1
  - name: SBS_CCCSR
    displayName: SBS_CCCSR
    description: SBS compensation cell for I/Os control and status register
    addressOffset: 272
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: EN1
        description: Enable compensation cell for VDDIO power rail
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: I/O compensation cell disabled
            value: 0
          - name: B_0x1
            description: I/O compensation cell enabled
            value: 1
      - name: CS1
        description: Code selection for VDDIO power rail (reset value set to 1)
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Code from the cell (available in the SBS_CCVR)
            value: 0
          - name: B_0x1
            description: Code from SBS_CCCR
            value: 1
      - name: RDY1
        description: VDDIO compensation cell ready flag
        bitOffset: 8
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: VDDIO compensation cell not ready
            value: 0
          - name: B_0x1
            description: VDDIO compensation cell ready (code value provided by the cell can be used)
            value: 1
  - name: SBS_CCVALR
    displayName: SBS_CCVALR
    description: SBS compensation cell for I/Os value register
    addressOffset: 276
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967040
    fields:
      - name: ANSRC1
        description: Compensation value for the NMOS transistor
        bitOffset: 0
        bitWidth: 4
        access: read-only
      - name: APSRC1
        description: Compensation value for the PMOS transistor
        bitOffset: 4
        bitWidth: 4
        access: read-only
  - name: SBS_CCSWCR
    displayName: SBS_CCSWCR
    description: SBS compensation cell for I/Os software code register
    addressOffset: 280
    size: 32
    access: read-write
    resetValue: 30840
    resetMask: 4294967295
    fields:
      - name: SW_ANSRC1
        description: NMOS compensation code for VDD power rails
        bitOffset: 0
        bitWidth: 4
        access: read-write
      - name: SW_APSRC1
        description: PMOS compensation code for the VDD power rails
        bitOffset: 4
        bitWidth: 4
        access: read-write
  - name: SBS_CFGR2
    displayName: SBS_CFGR2
    description: SBS Class B register
    addressOffset: 288
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CLL
        description: Core lockup lock
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Lockup output disconnected from timer break inputs
            value: 0
          - name: B_0x1
            description: Lockup output connected to timer break inputs
            value: 1
      - name: SEL
        description: SRAM ECC error lock
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: SRAM double ECC error flag disconnected from timer break inputs
            value: 0
          - name: B_0x1
            description: SRAM double ECC error flag connected to timer break inputs
            value: 1
      - name: PVDL
        description: PVD lock
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: PVD interrupt disconnected from timer break inputs.
            value: 0
          - name: B_0x1
            description: PVD interrupt is connected to timer break inputs.
            value: 1
      - name: ECCL
        description: ECC lock
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Double ECC error flag disconnected to timer break inputs
            value: 0
          - name: B_0x1
            description: Double ECC error flag connected to timer break inputs
            value: 1
  - name: SBS_CLCKR
    displayName: SBS_CLCKR
    description: SBS CPU lock register
    addressOffset: 324
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LOCKVTOR
        description: VTOR register lock
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: VTOR register write enabled
            value: 0
          - name: B_0x1
            description: VTOR register write disabled
            value: 1
      - name: LOCKMPU
        description: MPU register lock
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: MPU registers write enabled
            value: 0
          - name: B_0x1
            description: MPU registers write disabled
            value: 1
  - name: SBS_ECCNMIR
    displayName: SBS_ECCNMIR
    description: SBS ECC NMI mask register
    addressOffset: 332
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ECCNMI_MASK_EN
        description: NMI behavior setup when a double ECC error occurs on FLITF data part
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: NMI generated if a double ECC error in the FLITF data part
            value: 0
          - name: B_0x1
            description: NMI not generated if a double ECC error in the FLITF data part
            value: 1
addressBlocks:
  - offset: 0
    size: 1024
    usage: registers
