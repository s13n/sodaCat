    name: C%sCONFIG
    description: DMA Channel Configuration Register
    addressOffset: 272
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: E
        description: 'Channel enable. Reading this bit indicates whether a channel is currently enabled or disabled: The Channel Enable bit status can also be found by reading the EnbldChns Register. A channel can be disabled by clearing the Enable bit. This causes the current AHB transfer (if one is in progress) to complete and the channel is then disabled. Any data in the FIFO of the relevant channel is lost. Restarting the channel by setting the Channel Enable bit has unpredictable effects, the channel must be fully re-initialized. The channel is also disabled, and Channel Enable bit cleared, when the last LLI is reached, the DMA transfer is completed, or if a channel error is encountered. If a channel must be disabled without losing data in the FIFO, the Halt bit must be set so that further DMA requests are ignored. The Active bit must then be polled until it reaches 0, indicating that there is no data left in the FIFO. Finally, the Channel Enable bit can be cleared.'
        enumeratedValues:
          - name: CHANNEL_DISABLED_
            description: Channel disabled.
            value: 0
          - name: CHANNEL_ENABLED_
            description: Channel enabled.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: SRCPERIPHERAL
        description: Source peripheral. This value selects the DMA source request peripheral. This field is ignored if the source of the transfer is from memory. See Table 136 for details.
        enumeratedValues:
          - name: SOURCE_EQ_SPIFI
            description: Source = SPIFI
            value: 0
          - name: SOURCE_EQ_TIMER_0_MAT
            description: Source = Timer 0 match 0/UART0 transmit
            value: 1
          - name: SOURCE_EQ_TIMER_0_MAT
            description: Source = Timer 0 match 1/UART0 receive
            value: 2
          - name: SOURCE_EQ_TIMER_1_MAT
            description: Source = Timer 1 match 0/UART1 transmit
            value: 3
          - name: SOURCE_EQ_TIMER_1_MAT
            description: Source = Timer 1 match 1/UART 1 receive
            value: 4
          - name: SOURCE_EQ_TIMER_2_MAT
            description: Source = Timer 2 match 0/UART 2 transmit
            value: 5
          - name: SOURCE_EQ_TIMER_2_MAT
            description: Source = Timer 2 match 1/UART 2 receive
            value: 6
          - name: SOURCE_EQ_TIMER_3_MAT
            description: Source = Timer 3 match 0/UART3 transmit/SCT DMA request 0
            value: 7
          - name: SOURCE_EQ_TIMER_3_MAT
            description: Source = Timer 3 match 1/UART3 receive/SCT DMA request 1
            value: 8
          - name: SOURCE_EQ_SSP0_RECEIV
            description: Source = SSP0 receive/I2S channel 0
            value: 9
          - name: SOURCE_EQ_SSP0_TRANSM
