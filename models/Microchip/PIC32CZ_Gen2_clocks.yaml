    inputs: [xosc, gclkin3, gclkgen1, osculp32k, xosc32k, dfll48m_clk, pll0_out0, pll0_out1, pll0_out2, pll0_out3, pll1_out0, pll1_out1, pll1_out2, pll1_out3, null, null]
