name: RNG
description: RNG register block
groupName: RNG
source: STM32C531 SVD v1.0.0
registers:
  - name: RNG_CR
    displayName: RNG_CR
    description: RNG control register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 8391936
    resetMask: 4294967295
    fields:
      - name: RNGEN
        description: True random number generator enable
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: True random number generator disabled.
            value: 0
          - name: B_0x1
            description: True random number generator enabled.
            value: 1
      - name: IE
        description: Interrupt enable
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: RNG interrupt is disabled
            value: 0
          - name: B_0x1
            description: RNG interrupt is enabled.
            value: 1
      - name: CED
        description: Clock error detection
        bitOffset: 5
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Clock error detection is enabled
            value: 0
          - name: B_0x1
            description: Clock error detection is disabled
            value: 1
      - name: ARDIS
        description: Auto reset disable
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Auto-reset is enabled.
            value: 0
          - name: B_0x1
            description: Auto-reset is disabled.
            value: 1
      - name: RNG_CONFIG3
        description: RNG configuration 3
        bitOffset: 8
        bitWidth: 4
        access: read-write
      - name: NISTC
        description: NIST custom
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Hardware default values for NIST compliant RNG.
            value: 0
          - name: B_0x1
            description: Custom values for NIST compliant RNG.
            value: 1
      - name: RNG_CONFIG2
        description: RNG configuration 2
        bitOffset: 13
        bitWidth: 3
        access: read-write
      - name: CLKDIV
        description: Clock divider factor
        bitOffset: 16
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: internal RNG clock after divider is similar to incoming RNG clock.
            value: 0
          - name: B_0x1
            description: two RNG clock cycles per internal RNG clock.
            value: 1
          - name: B_0x2
            description: 2less thansup>2less than/sup> (= 4) RNG clock cycles per internal RNG clock.
            value: 2
          - name: B_0xF
            description: 2less thansup>15less than/sup> RNG clock cycles per internal clock (for example an incoming 48MHz RNG clock becomes a 1.
            value: 15
      - name: RNG_CONFIG1
        description: RNG configuration 1
        bitOffset: 20
        bitWidth: 8
        access: read-write
      - name: CONDRST
        description: Conditioning soft reset
        bitOffset: 30
        bitWidth: 1
        access: read-write
      - name: CONFIGLOCK
        description: RNG configuration lock
        bitOffset: 31
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Writes to the RNG_NSMR, RNG_NSCR, RNG_HTCR and the RNG_CR configuration bits [29:4] are allowed.
            value: 0
          - name: B_0x1
            description: Writes to the RNG_NSMR, RNG_NSCR, RNG_HTCR and the RNG_CR configuration bits [29:4] are ignored until the next RNG reset.
            value: 1
