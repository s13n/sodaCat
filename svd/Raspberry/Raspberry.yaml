# Consolidated configuration for Raspberry Pi model extraction.
# SVD files sourced from https://github.com/raspberrypi/pico-sdk (via datasheets)

svd:
  source: https://datasheets.raspberrypi.com/
  version: "0.1"

families:
  RP:
    svd:
      version: "0.1"
    subfamilies:
      RP2040:
        chips: [RP2040]
        ref_manual:
          name: RP2040 Datasheet
          url: https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf
      RP2350:
        chips: [RP2350]
        ref_manual:
          name: RP2350 Datasheet
          url: https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf

    blocks:
      # ====================================================================
      # Shared blocks — identical register sets across RP2040 and RP2350
      # ====================================================================

      ADC:
        from: RP2040.ADC
        instances: [ADC]
        interrupts:
          ADC_IRQ_FIFO: FIFO

      I2C:
        from: RP2040.I2C0
        instances: [I2C0, I2C1]
        interrupts:
          I2C0_IRQ: IRQ
          I2C1_IRQ: IRQ

      SPI:
        from: RP2040.SPI0
        instances: [SPI0, SPI1]
        interrupts:
          SPI0_IRQ: IRQ
          SPI1_IRQ: IRQ

      UART:
        from: RP2040.UART0
        instances: [UART0, UART1]
        interrupts:
          UART0_IRQ: IRQ
          UART1_IRQ: IRQ

      USB_DPRAM:
        from: RP2040.USB_DPRAM
        instances: [USB_DPRAM]
        transforms:
          - type: patchFields
            register_pattern: EP\d+_(?:IN|OUT)_BUFFER_CONTROL
            fields:
              - name: DOUBLE_BUFFER_ISO_OFFSET
                enumeratedValues:
                  - {name: OFFSET_128, value: 0}
                  - {name: OFFSET_256, value: 1}
                  - {name: OFFSET_512, value: 2}
                  - {name: OFFSET_1024, value: 3}
          - {type: createClusterArray, pattern: EP(\d+)_((?:IN|OUT)_BUFFER_CONTROL), name: EP_BUF, description: Endpoint buffer control}
          - {type: renameRegisters, pattern: ^SETUP_PACKET_LOW$, replacement: EP0_IN_CONTROL}
          - {type: renameRegisters, pattern: ^SETUP_PACKET_HIGH$, replacement: EP0_OUT_CONTROL}
          - {type: createClusterArray, pattern: EP(\d+)_((?:IN|OUT)_CONTROL), name: EP_CTRL, description: Endpoint control, template: 1}
          - type: patchRegisters
            registers:
              - name: SETUP_PACKET
                addressOffset: 0
                description: Setup packet from host (overlaps EP_CTRL[0])
                registers:
                  - name: LOW
                    addressOffset: 0
                    description: Bytes 0-3 of the SETUP packet from the host.
                    resetValue: 0
                    fields:
                      - {name: BMREQUESTTYPE, access: read-write, bitOffset: 0, bitWidth: 8}
                      - {name: BREQUEST, access: read-write, bitOffset: 8, bitWidth: 8}
                      - {name: WVALUE, access: read-write, bitOffset: 16, bitWidth: 16}
                  - name: HIGH
                    addressOffset: 4
                    description: Bytes 4-7 of the setup packet from the host.
                    resetValue: 0
                    fields:
                      - {name: WINDEX, access: read-write, bitOffset: 0, bitWidth: 16}
                      - {name: WLENGTH, access: read-write, bitOffset: 16, bitWidth: 16}

      RESETS:
        from: RP2040.RESETS
        instances: [RESETS]

      PSM:
        from: RP2040.PSM
        instances: [PSM]

      TBMAN:
        from: RP2040.TBMAN
        instances: [TBMAN]

      PADS_QSPI:
        from: RP2040.PADS_QSPI
        instances: [PADS_QSPI]
        transforms:
          - type: patchFields
            register: VOLTAGE_SELECT
            fields:
              - name: VOLTAGE_SELECT
                enumeratedValues:
                  - {name: V3_3, value: 0}
                  - {name: V1_8, value: 1}
          - type: patchFields
            register_pattern: GPIO_QSPI_.*
            fields:
              - name: DRIVE
                enumeratedValues:
                  - {name: MA_2, value: 0}
                  - {name: MA_4, value: 1}
                  - {name: MA_8, value: 2}
                  - {name: MA_12, value: 3}

      # ====================================================================
      # Variant blocks — exist in both chips but register sets differ
      # ====================================================================

      BUSCTRL:
        from: RP2040.BUSCTRL
        instances: [BUSCTRL]
        variants:
          RP2350:
            from: RP2350.BUSCTRL

      CLOCKS:
        from: RP2040.CLOCKS
        instances: [CLOCKS]
        interrupts:
          CLOCKS_IRQ: IRQ
        variants:
          RP2350:
            from: RP2350.CLOCKS

      DMA:
        from: RP2040.DMA
        instances: [DMA]
        interrupts:
          DMA_IRQ_0: IRQ_0
          DMA_IRQ_1: IRQ_1
        variants:
          RP2350:
            from: RP2350.DMA
            interrupts:
              DMA_IRQ_0: IRQ_0
              DMA_IRQ_1: IRQ_1
              DMA_IRQ_2: IRQ_2
              DMA_IRQ_3: IRQ_3

      IO_BANK0:
        from: RP2040.IO_BANK0
        instances: [IO_BANK0]
        interrupts:
          IO_IRQ_BANK0: IRQ
        transforms:
          - {type: createClusterArray, pattern: GPIO(\d+)_(STATUS|CTRL), name: GPIO, description: GPIO pin}
          - {type: createArray, pattern: INTR(\d+), name: INTR}
          - {type: createArray, pattern: PROC0_INTE(\d+), name: PROC0_INTE}
          - {type: createArray, pattern: PROC0_INTF(\d+), name: PROC0_INTF}
          - {type: createArray, pattern: PROC0_INTS(\d+), name: PROC0_INTS}
          - {type: createArray, pattern: PROC1_INTE(\d+), name: PROC1_INTE}
          - {type: createArray, pattern: PROC1_INTF(\d+), name: PROC1_INTF}
          - {type: createArray, pattern: PROC1_INTS(\d+), name: PROC1_INTS}
          - {type: createArray, pattern: DORMANT_WAKE_INTE(\d+), name: DORMANT_WAKE_INTE}
          - {type: createArray, pattern: DORMANT_WAKE_INTF(\d+), name: DORMANT_WAKE_INTF}
          - {type: createArray, pattern: DORMANT_WAKE_INTS(\d+), name: DORMANT_WAKE_INTS}
        variants:
          RP2350:
            from: RP2350.IO_BANK0
            interrupts:
              IO_IRQ_BANK0: IRQ
              IO_IRQ_BANK0_NS: IRQ_NS

      IO_QSPI:
        from: RP2040.IO_QSPI
        instances: [IO_QSPI]
        interrupts:
          IO_IRQ_QSPI: IRQ
        variants:
          RP2350:
            from: RP2350.IO_QSPI
            interrupts:
              IO_IRQ_QSPI: IRQ
              IO_IRQ_QSPI_NS: IRQ_NS

      PADS_BANK0:
        from: RP2040.PADS_BANK0
        instances: [PADS_BANK0]
        transforms:
          - type: patchFields
            register: VOLTAGE_SELECT
            fields:
              - name: VOLTAGE_SELECT
                enumeratedValues:
                  - {name: V3_3, value: 0}
                  - {name: V1_8, value: 1}
          - type: patchFields
            register_pattern: GPIO\d+|SWCLK|SWD
            fields:
              - name: DRIVE
                enumeratedValues:
                  - {name: MA_2, value: 0}
                  - {name: MA_4, value: 1}
                  - {name: MA_8, value: 2}
                  - {name: MA_12, value: 3}
        variants:
          RP2350:
            from: RP2350.PADS_BANK0

      PIO:
        from: RP2040.PIO0
        instances: [PIO0, PIO1]
        interrupts:
          PIO0_IRQ_0: IRQ_0
          PIO0_IRQ_1: IRQ_1
          PIO1_IRQ_0: IRQ_0
          PIO1_IRQ_1: IRQ_1
        transforms:
          - {type: renameFields, register: SM\d+_(ADDR|INSTR), pattern: ^SM\d+_, replacement: ''}
          - {type: renameFields, register: TXF\d+$, pattern: ^TXF\d+$, replacement: TXF}
          - {type: renameFields, register: RXF\d+$, pattern: ^RXF\d+$, replacement: RXF}
          - {type: renameFields, register: INSTR_MEM\d+, pattern: ^INSTR_MEM\d+$, replacement: INSTR_MEM}
          - {type: createArray, pattern: TXF(\d+)$, name: TXF, description: Direct write access to the TX FIFO for this state machine}
          - {type: createArray, pattern: RXF(\d+)$, name: RXF, description: Direct read access to the RX FIFO for this state machine}
          - {type: createArray, pattern: INSTR_MEM(\d+), name: INSTR_MEM, description: Write-only access to instruction memory}
          - {type: createClusterArray, pattern: SM(\d+)_(.+), name: SM, description: State machine}
          - {type: createClusterArray, pattern: IRQ(\d+)_(.*), name: IRQS, description: IRQ control}
        variants:
          RP2350:
            from: RP2350.PIO0
            instances: [PIO0, PIO1, PIO2]
            interrupts:
              PIO0_IRQ_0: IRQ_0
              PIO0_IRQ_1: IRQ_1
              PIO1_IRQ_0: IRQ_0
              PIO1_IRQ_1: IRQ_1
              PIO2_IRQ_0: IRQ_0
              PIO2_IRQ_1: IRQ_1

      PLL:
        from: RP2040.PLL_SYS
        instances: [PLL_SYS, PLL_USB]
        variants:
          RP2350:
            from: RP2350.PLL_SYS
            interrupts:
              PLL_SYS_IRQ: IRQ
              PLL_USB_IRQ: IRQ

      PWM:
        from: RP2040.PWM
        instances: [PWM]
        interrupts:
          PWM_IRQ_WRAP: WRAP
        variants:
          RP2350:
            from: RP2350.PWM
            interrupts:
              PWM_IRQ_WRAP_0: WRAP_0
              PWM_IRQ_WRAP_1: WRAP_1

      ROSC:
        from: RP2040.ROSC
        instances: [ROSC]
        variants:
          RP2350:
            from: RP2350.ROSC

      SIO:
        from: RP2040.SIO
        instances: [SIO]
        interrupts:
          SIO_IRQ_PROC0: PROC0
          SIO_IRQ_PROC1: PROC1
        variants:
          RP2350:
            from: RP2350.SIO
            instances: [SIO, SIO_NS]
            interrupts:
              SIO_IRQ_FIFO: FIFO
              SIO_IRQ_BELL: BELL
              SIO_IRQ_FIFO_NS: FIFO_NS
              SIO_IRQ_BELL_NS: BELL_NS
              SIO_IRQ_MTIMECMP: MTIMECMP

      SYSCFG:
        from: RP2040.SYSCFG
        instances: [SYSCFG]
        variants:
          RP2350:
            from: RP2350.SYSCFG

      SYSINFO:
        from: RP2040.SYSINFO
        instances: [SYSINFO]
        variants:
          RP2350:
            from: RP2350.SYSINFO

      Timer:
        from: RP2040.TIMER
        instances: [TIMER]
        interrupts:
          TIMER_IRQ_0: IRQ_0
          TIMER_IRQ_1: IRQ_1
          TIMER_IRQ_2: IRQ_2
          TIMER_IRQ_3: IRQ_3
        variants:
          RP2350:
            from: RP2350.TIMER0
            instances: [TIMER0, TIMER1]
            interrupts:
              TIMER0_IRQ_0: IRQ_0
              TIMER0_IRQ_1: IRQ_1
              TIMER0_IRQ_2: IRQ_2
              TIMER0_IRQ_3: IRQ_3
              TIMER1_IRQ_0: IRQ_0
              TIMER1_IRQ_1: IRQ_1
              TIMER1_IRQ_2: IRQ_2
              TIMER1_IRQ_3: IRQ_3

      USB:
        from: RP2040.USB
        instances: [USB]
        interrupts:
          USBCTRL_IRQ: IRQ
        variants:
          RP2350:
            from: RP2350.USB

      WATCHDOG:
        from: RP2040.WATCHDOG
        instances: [WATCHDOG]
        variants:
          RP2350:
            from: RP2350.WATCHDOG

      XIP_CTRL:
        from: RP2040.XIP_CTRL
        instances: [XIP_CTRL]
        interrupts:
          XIP_IRQ: IRQ
        variants:
          RP2350:
            from: RP2350.XIP_CTRL

      XOSC:
        from: RP2040.XOSC
        instances: [XOSC]
        variants:
          RP2350:
            from: RP2350.XOSC

      # ====================================================================
      # RP2040-only blocks
      # ====================================================================

      RTC:
        from: RP2040.RTC
        instances: [RTC]
        interrupts:
          RTC_IRQ: IRQ

      SSI:
        from: RP2040.SSI
        instances: [SSI]

      VREG_AND_CHIP_RESET:
        from: RP2040.VREG_AND_CHIP_RESET
        instances: [VREG_AND_CHIP_RESET]

      # ====================================================================
      # RP2350-only blocks
      # ====================================================================

      ACCESSCTRL:
        from: RP2350.ACCESSCTRL
        instances: [ACCESSCTRL]

      BOOTRAM:
        from: RP2350.BOOTRAM
        instances: [BOOTRAM]

      CORESIGHT_TRACE:
        from: RP2350.CORESIGHT_TRACE
        instances: [CORESIGHT_TRACE]

      GLITCH_DETECTOR:
        from: RP2350.GLITCH_DETECTOR
        instances: [GLITCH_DETECTOR]

      HSTX_CTRL:
        from: RP2350.HSTX_CTRL
        instances: [HSTX_CTRL]

      HSTX_FIFO:
        from: RP2350.HSTX_FIFO
        instances: [HSTX_FIFO]

      OTP:
        from: RP2350.OTP
        instances: [OTP]
        interrupts:
          OTP_IRQ: IRQ

      OTP_DATA:
        from: RP2350.OTP_DATA
        instances: [OTP_DATA, OTP_DATA_RAW]

      POWMAN:
        from: RP2350.POWMAN
        instances: [POWMAN]
        interrupts:
          POWMAN_IRQ_POW: POW
          POWMAN_IRQ_TIMER: TIMER

      QMI:
        from: RP2350.QMI
        instances: [QMI]

      SHA256:
        from: RP2350.SHA256
        instances: [SHA256]

      TICKS:
        from: RP2350.TICKS
        instances: [TICKS]

      TRNG:
        from: RP2350.TRNG
        instances: [TRNG]
        interrupts:
          TRNG_IRQ: IRQ

      XIP_AUX:
        from: RP2350.XIP_AUX
        instances: [XIP_AUX]
