        description: Cacheable Read Access Enable
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: Disabled. When an AHB bus cacheable read access occurs, FlexSPI does not check whether it hit the AHB transmit buffer.
            value: 0
          - name: val1
            description: Enabled. When an AHB bus cacheable read access occurs, FlexSPI first checks whether the access hit the AHB transmit buffer.
            value: 1
      - name: BUFFERABLEEN
        description: Bufferable Write Access Enable
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: Disabled. For all AHB write accesses (bufferable or nonbufferable), FlexSPI returns AHB Bus Ready after transmitting all data and finishing command.
            value: 0
          - name: val1
            description: Enabled. For AHB bufferable write access, FlexSPI returns AHB Bus Ready when the arbitrator grants the AHB command. FlexSPI does not wait for the AHB command to finish.
            value: 1
