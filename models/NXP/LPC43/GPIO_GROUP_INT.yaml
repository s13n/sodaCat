    fields:
      - name: INT
        description: Group interrupt status. This bit is cleared by writing a one to it. Writing zero has no effect.
        enumeratedValues:
          - name: NO_INTERRUPT_REQUEST
            description: No interrupt request is pending.
            value: 0
          - name: INTERRUPT_REQUEST_IS
            description: Interrupt request is active.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: COMB
        description: Combine enabled inputs for group interrupt
        enumeratedValues:
          - name: OR_FUNCTIONALITY_A_
            description: 'OR functionality: A grouped interrupt is generated when any one of the enabled inputs is active (based on its programmed polarity).'
            value: 0
          - name: AND_FUNCTIONALITY_A
            description: 'AND functionality: An interrupt is generated when all enabled bits are active (based on their programmed polarity).'
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: TRIG
        description: Group interrupt trigger
