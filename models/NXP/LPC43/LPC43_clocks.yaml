documents:
  - id: UM10503
    title: LPC43xx/LPC43Sxx ARM Cortex-M4/M0 multi-core microcontroller
    revision: "2.5"
    url: https://www.nxp.com/docs/en/user-guide/UM10503.pdf
instance: CGU

# ===========================================================================
# Stages 1 + 2 + 3: oscillators, PLLs, IDIVs, BASE_*_CLK output stages,
# CCU1/CCU2 branch fan-out.
#
# Topology overview (UM10503 §13.4, Fig 36/37):
#
#   sources --> { PLL0USB, PLL0AUDIO, PLL1, IDIVA..IDIVE } --> base clocks (CCU)
#
# Each PLL and IDIV has its own input mux (CLK_SEL field in its CTRL
# register) selecting one of: 32 kHz osc, IRC, ENET_RX_CLK, ENET_TX_CLK,
# GP_CLKIN, crystal osc, or one of the other PLLs/IDIVs (with restrictions
# documented in UM10503 Table 121).
#
# The 24 BASE_*_CLK output stages (numbered 0,1,2,3,4..19,20,25,26,27;
# stages 21-24 are reserved) live in CGU registers BASE_SAFE_CLK..
# BASE_CGU_OUT1_CLK and each have their own CLK_SEL mux.  Three source-
# list patterns are used (per UM10503 Tables 141-148):
#
#   * BASE_SAFE_CLK: only IRC (0x01).
#   * BASE_USB0_CLK: only PLL0USB (0x07).
#   * BASE_USB1_CLK / BASE_OUT_CLK / BASE_CGU_OUT0_CLK /
#     BASE_CGU_OUT1_CLK: full source list including PLL0USB.
#   * All others (PERIPH, M4, SPIFI, SPI, PHY_RX/TX, APB1/3, LCD, ADCHS,
#     SDIO, SSP0/1, UART0..3, AUDIO): full source list except PLL0USB
#     (encoding 0x07 reserved).
#
# Branch-clock fan-out is via CCU1/CCU2: each branch is a Gate whose
# control bit is the CLK_*_CFG.RUN bit (Tables 162/164).  CCU1 has
# 51 branches; CCU2 has 8.  One branch is special:
# CLK_M4_EMCDIV (Table 163) is both gated and divided, so it appears
# as a Gate (M4_EMCDIV_GATE) feeding an intermediate signal that is
# then fed through a Divider (M4_EMCDIV) configured by the same
# register's DIV field.
#
# Modeling notes:
#   * PLL0USB and PLL0AUDIO use LFSR-encoded MDEC/NDEC/PDEC values rather
#     than direct binary M/N/P, so feedback_integer/post_divider here name
#     the register fields without value_range (encoding tables are in
#     UM10503 §13.6.3.3, §13.6.3.4, §13.6.4.3, §13.6.4.4).
#   * PLL1 has both NSEL pre-divider and PSEL post-divider.  The schema's
#     Pll has no pre_divider concept, so NSEL is modeled as a separate
#     Divider (PLL1_N_DIV) sitting between the input mux and the PLL's
#     phase detector.  The actual P-divider in PLL1 is 2*PSEL_value, so
#     post_divider.values is [2,4,8,16] for PSEL encodings 0..3.
#   * Operating-mode bits that bypass the dividers (PD, BYPASS, FBSEL,
#     DIRECT, DIRECTI, DIRECTO) are not modeled here -- they're orthogonal
#     to the linear topology the schema describes.
#   * Cycle-creating feedback paths supported by the hardware are NOT
#     modeled, because the schema's DAG check rejects them:
#       - PLL outputs as inputs to other PLLs (PLL0USB <-> PLL1,
#         PLL0AUDIO <-> PLL1).  Hardware allows it but rarely useful.
#       - IDIV outputs as inputs to PLLs.  Hardware allows IDIVA-E to
#         feed PLL0USB and PLL0AUDIO; not modeled.
#     Any of these connections would form a graph cycle (e.g. via
#     PLL1->IDIVA->PLL1).  Selecting them via the corresponding CLK_SEL
#     encoding works on the silicon but is outside this model's scope.

signals:
  # External / oscillator sources
  - {name: irc_12mhz,      nominal: 12000000, description: "12 MHz internal RC oscillator (always on, default boot clock)"}
  - {name: osc_32khz,      nominal: 32768,    description: "32.768 kHz oscillator on RTCX1/RTCX2 pins (RTC and low-power timing)"}
  - {name: xtal_clk,       min: 1000000, max: 25000000, description: "Crystal oscillator on XTAL1/XTAL2 (1-25 MHz, or external clock in bypass mode)"}
  - {name: enet_rx_clk_in, max: 75000000,    description: "Ethernet PHY receive clock (external pin, RMII/MII)"}
  - {name: enet_tx_clk_in, max: 75000000,    description: "Ethernet PHY transmit clock (external pin, RMII/MII)"}
  - {name: gp_clkin_in,                       description: "General-purpose external clock input pin (GP_CLKIN)"}

  # Internal clock-source-bus nets (PLL/IDIV inputs and outputs)
  - {name: pll0usb_in,                        description: "PLL0USB_CTRL.CLK_SEL mux output"}
  - {name: pll0usb_clk,    nominal: 480000000, max: 480000000, description: "PLL0USB output (USB high-speed 480 MHz)"}
  - {name: pll0audio_in,                      description: "PLL0AUDIO_CTRL.CLK_SEL mux output"}
  - {name: pll0audio_clk,                     description: "PLL0AUDIO output (with optional fractional divider)"}
  - {name: pll1_in_pre,                       description: "PLL1_CTRL.CLK_SEL mux output (before NSEL pre-divider)"}
  - {name: pll1_in,                           description: "PLL1 phase-detector input (after NSEL pre-divider)"}
  - {name: pll1_clk,       max: 204000000,    description: "PLL1 output (main system PLL)"}
  - {name: idiva_in,                          description: "IDIVA_CTRL.CLK_SEL mux output"}
  - {name: idiva_clk,                         description: "IDIVA output (max divisor /4)"}
  - {name: idivb_in,                          description: "IDIVB_CTRL.CLK_SEL mux output"}
  - {name: idivb_clk,                         description: "IDIVB output (max divisor /16)"}
  - {name: idivc_in,                          description: "IDIVC_CTRL.CLK_SEL mux output"}
  - {name: idivc_clk,                         description: "IDIVC output (max divisor /16)"}
  - {name: idivd_in,                          description: "IDIVD_CTRL.CLK_SEL mux output"}
  - {name: idivd_clk,                         description: "IDIVD output (max divisor /16)"}
  - {name: idive_in,                          description: "IDIVE_CTRL.CLK_SEL mux output"}
  - {name: idive_clk,                         description: "IDIVE output (max divisor /256)"}

  # BASE_*_CLK output-stage signals (max frequencies from UM10503 Table 120).
  - {name: base_safe_clk,      max: 12000000,  description: "Output stage 0: WWDT (always-on safe clock; IRC only)"}
  - {name: base_usb0_clk,      max: 480000000, description: "Output stage 1: USB0 high-speed (PLL0USB only)"}
  - {name: base_periph_clk,    max: 204000000, description: "Output stage 2: Cortex-M0SUB subsystem, SPI, SGPIO"}
  - {name: base_usb1_clk,      max: 204000000, description: "Output stage 3: USB1"}
  - {name: base_m4_clk,        max: 204000000, description: "Output stage 4: ARM Cortex-M4 core, APB blocks 0 & 2"}
  - {name: base_spifi_clk,     max: 204000000, description: "Output stage 5: SPIFI"}
  - {name: base_spi_clk,       max: 204000000, description: "Output stage 6: SPI"}
  - {name: base_phy_rx_clk,    max: 75000000,  description: "Output stage 7: Ethernet PHY receive"}
  - {name: base_phy_tx_clk,    max: 75000000,  description: "Output stage 8: Ethernet PHY transmit"}
  - {name: base_apb1_clk,      max: 204000000, description: "Output stage 9: APB peripheral block 1"}
  - {name: base_apb3_clk,      max: 204000000, description: "Output stage 10: APB peripheral block 3"}
  - {name: base_lcd_clk,       max: 204000000, description: "Output stage 11: LCD"}
  - {name: base_adchs_clk,     max: 80000000,  description: "Output stage 12: ADCHS (LPC4370/LPC43S70 only)"}
  - {name: base_sdio_clk,      max: 204000000, description: "Output stage 13: SD/MMC"}
  - {name: base_ssp0_clk,      max: 204000000, description: "Output stage 14: SSP0"}
  - {name: base_ssp1_clk,      max: 204000000, description: "Output stage 15: SSP1"}
  - {name: base_uart0_clk,     max: 204000000, description: "Output stage 16: UART0"}
  - {name: base_uart1_clk,     max: 204000000, description: "Output stage 17: UART1"}
  - {name: base_uart2_clk,     max: 204000000, description: "Output stage 18: UART2"}
  - {name: base_uart3_clk,     max: 204000000, description: "Output stage 19: UART3"}
  - {name: base_out_clk,       max: 204000000, description: "Output stage 20: CLKOUT pin"}
  - {name: base_audio_clk,     max: 204000000, description: "Output stage 25: I2S audio system"}
  - {name: base_cgu_out0_clk,  max: 204000000, description: "Output stage 26: CGU_OUT0 pin"}
  - {name: base_cgu_out1_clk,  max: 204000000, description: "Output stage 27: CGU_OUT1 pin"}

  # CCU1/CCU2 branch-clock leaf signals (each gated by CLK_*_CFG.RUN; per UM10503 §14.5.3, Tables 162/164)
  - {name: clk_apb3_bus}
  - {name: clk_apb3_i2c1}
  - {name: clk_apb3_dac}
  - {name: clk_apb3_adc0}
  - {name: clk_apb3_adc1}
  - {name: clk_apb3_can0}
  - {name: clk_apb1_bus}
  - {name: clk_apb1_motoconpwm}
  - {name: clk_apb1_i2c0}
  - {name: clk_apb1_i2s}
  - {name: clk_apb1_can1}
  - {name: clk_spifi}
  - {name: clk_m4_bus}
  - {name: clk_m4_spifi}
  - {name: clk_m4_gpio}
  - {name: clk_m4_lcd}
  - {name: clk_m4_ethernet}
  - {name: clk_m4_usb0}
  - {name: clk_m4_emc}
  - {name: clk_m4_sdio}
  - {name: clk_m4_dma}
  - {name: clk_m4_m4core}
  - {name: clk_m4_sct}
  - {name: clk_m4_usb1}
  - {name: clk_m4_flasha}
  - {name: clk_m4_flashb}
  - {name: clk_m4_m0app}
  - {name: clk_m4_adchs}
  - {name: clk_m4_eeprom}
  - {name: clk_m4_wwdt}
  - {name: clk_m4_usart0}
  - {name: clk_m4_uart1}
  - {name: clk_m4_ssp0}
  - {name: clk_m4_timer0}
  - {name: clk_m4_timer1}
  - {name: clk_m4_scu}
  - {name: clk_m4_creg}
  - {name: clk_m4_ritimer}
  - {name: clk_m4_usart2}
  - {name: clk_m4_usart3}
  - {name: clk_m4_timer2}
  - {name: clk_m4_timer3}
  - {name: clk_m4_ssp1}
  - {name: clk_m4_qei}
  - {name: clk_periph_bus}
  - {name: clk_periph_core}
  - {name: clk_periph_sgpio}
  - {name: clk_usb0}
  - {name: clk_usb1}
  - {name: clk_spi}
  - {name: clk_adchs}
  - {name: clk_audio}
  - {name: clk_apb2_usart3}
  - {name: clk_apb2_usart2}
  - {name: clk_apb0_uart1}
  - {name: clk_apb0_usart0}
  - {name: clk_apb2_ssp1}
  - {name: clk_apb0_ssp0}
  - {name: clk_sdio}
  - {name: clk_m4_emcdiv_gated, description: "BASE_M4_CLK gated by CLK_M4_EMCDIV_CFG.RUN, before DIV"}
  - {name: clk_m4_emcdiv,         description: "EMC clock with optional divide-by-1/2 (CLK_M4_EMCDIV_CFG.DIV); see also CREG6.EMC_CLK_SEL bit 16"}

generators:
  - name: IRC
    output: irc_12mhz
    description: "12 MHz internal RC oscillator. No CGU power control; always running."

  - name: OSC32K
    output: osc_32khz
    description: "32.768 kHz oscillator (RTCX1/RTCX2). Power control lives in the RTC peripheral, not in CGU."

  - name: XTAL
    output: xtal_clk
    control:
      reg: XTAL_OSC_CTRL
      field: ENABLE
      values: [1, 0]   # ENABLE is active-low: 0 = enabled, 1 = power-down
    description: "Crystal oscillator (XTAL1/XTAL2). XTAL_OSC_CTRL also has BYPASS (use external clock instead of crystal) and HF (1=15-25 MHz range, 0=1-20 MHz range)."

  - name: ENET_RX_CLK
    output: enet_rx_clk_in
    control:
      state: stateENET_RX_CLK
    description: "Ethernet PHY receive clock; presence depends on board wiring and PHY configuration."

  - name: ENET_TX_CLK
    output: enet_tx_clk_in
    control:
      state: stateENET_TX_CLK
    description: "Ethernet PHY transmit clock; presence depends on board wiring and PHY configuration."

  - name: GP_CLKIN
    output: gp_clkin_in
    control:
      state: stateGP_CLKIN
    description: "General-purpose clock input pin; presence depends on pin function selection."

muxes:
  # The clock-source bus is 5 bits wide.  Encoding values that are
  # reserved for a particular CLK_SEL field appear as `null` below;
  # selecting them is undefined behavior per UM10503.  Trailing nulls
  # for codes >= 0x11 are omitted (schema convention).
  # PLL input muxes are restricted here to oscillator/external sources
  # only.  The hardware additionally allows other PLLs (PLL0USB <-> PLL1,
  # PLL0AUDIO <-> PLL1) and IDIVA-E as PLL inputs, but those create
  # cycles in the topology graph and are documented at the top of this
  # file rather than represented here.
  - name: PLL0USB_CLKSEL
    output: pll0usb_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
    control:
      reg: PLL0USB_CTRL
      field: CLK_SEL
    description: "Source for PLL0USB. Encoding values 0x09, 0x0C-0x10 are also valid in hardware (PLL1, IDIVA-E) but omitted here to avoid graph cycles; values 0x05, 0x07-0x08, 0x0A-0x0B are reserved."

  - name: PLL0AUDIO_CLKSEL
    output: pll0audio_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
    control:
      reg: PLL0AUDIO_CTRL
      field: CLK_SEL
    description: "Source for PLL0AUDIO. Encoding values 0x09, 0x0C-0x10 are also valid in hardware (PLL1, IDIVA-E) but omitted to avoid cycles."

  - name: PLL1_CLKSEL
    output: pll1_in_pre
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
    control:
      reg: PLL1_CTRL
      field: CLK_SEL
    description: "Source for PLL1.  Encoding values 0x07-0x08 (PLL0USB, PLL0AUDIO) and 0x0C-0x10 (IDIVA-E) are valid in hardware but omitted to avoid cycles."

  - name: IDIVA_CLKSEL
    output: idiva_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - pll0usb_clk     # 0x07
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
    control:
      reg: IDIVA_CTRL
      field: CLK_SEL
    description: "Source for IDIVA (4-bit divider, max /4). IDIVA can take any of the three PLLs but no other dividers."

  - name: IDIVB_CLKSEL
    output: idivb_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - null            # 0x07 reserved (PLL0USB not allowed for IDIVB)
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
    control:
      reg: IDIVB_CTRL
      field: CLK_SEL
    description: "Source for IDIVB (4-bit divider, max /16). PLL0USB is not selectable; only IDIVA among the dividers."

  - name: IDIVC_CLKSEL
    output: idivc_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - null            # 0x07 reserved (PLL0USB not allowed for IDIVC)
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
    control:
      reg: IDIVC_CTRL
      field: CLK_SEL
    description: "Source for IDIVC (4-bit divider, max /16). Same restrictions as IDIVB."

  - name: IDIVD_CLKSEL
    output: idivd_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - null            # 0x07 reserved (PLL0USB not allowed for IDIVD)
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
    control:
      reg: IDIVD_CTRL
      field: CLK_SEL
    description: "Source for IDIVD (4-bit divider, max /16). Same restrictions as IDIVB."

  - name: IDIVE_CLKSEL
    output: idive_in
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - null            # 0x07 reserved (PLL0USB not allowed for IDIVE)
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
    control:
      reg: IDIVE_CTRL
      field: CLK_SEL
    description: "Source for IDIVE (8-bit divider, max /256). Same restrictions as IDIVB."

  # ----- BASE_*_CLK output-stage muxes -----
  # Pattern A: single-source output stages.
  # Schema requires minItems=1 for inputs; using a single-entry list where
  # the encoding value is also the only valid one.

  - name: BASE_SAFE_CLKSEL
    output: base_safe_clk
    inputs:
      - null            # 0x00
      - irc_12mhz       # 0x01 (only valid encoding)
    control:
      reg: BASE_SAFE_CLK
      field: CLK_SEL
    description: "BASE_SAFE_CLK is hardwired to the IRC; CLK_SEL is read-only at 0x01.  Feeds the WWDT."

  - name: BASE_USB0_CLKSEL
    output: base_usb0_clk
    inputs:
      - null            # 0x00
      - null            # 0x01
      - null            # 0x02
      - null            # 0x03
      - null            # 0x04
      - null            # 0x05
      - null            # 0x06
      - pll0usb_clk     # 0x07 (only valid encoding)
    control:
      reg: BASE_USB0_CLK
      field: CLK_SEL
    description: "BASE_USB0_CLK is hardwired to PLL0USB.  Feeds the high-speed USB0 controller."

  # Pattern B: full source list including PLL0USB
  # (BASE_USB1_CLK, BASE_OUT_CLK, BASE_CGU_OUT0/1_CLK).

  - name: BASE_USB1_CLKSEL
    output: base_usb1_clk
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01 (default)
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - pll0usb_clk     # 0x07
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
      - idivb_clk       # 0x0D
      - idivc_clk       # 0x0E
      - idivd_clk       # 0x0F
      - idive_clk       # 0x10
    control:
      reg: BASE_USB1_CLK
      field: CLK_SEL
    description: "Source for BASE_USB1_CLK (USB1)."

  - name: BASE_OUT_CLKSEL
    output: base_out_clk
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01 (default)
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - pll0usb_clk     # 0x07
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
      - idivb_clk       # 0x0D
      - idivc_clk       # 0x0E
      - idivd_clk       # 0x0F
      - idive_clk       # 0x10
    control:
      reg: BASE_OUT_CLK
      field: CLK_SEL
    description: "Source for the CLKOUT pin.  Any clock generator output may be monitored."

  - name: BASE_CGU_OUT0_CLKSEL
    output: base_cgu_out0_clk
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01 (default)
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - pll0usb_clk     # 0x07
      - pll0audio_clk   # 0x08
      - pll1_clk        # 0x09
      - null            # 0x0A reserved
      - null            # 0x0B reserved
      - idiva_clk       # 0x0C
      - idivb_clk       # 0x0D
      - idivc_clk       # 0x0E
      - idivd_clk       # 0x0F
      - idive_clk       # 0x10
    control:
      reg: BASE_CGU_OUT0_CLK
      field: CLK_SEL
    description: "Source for the CGU_OUT0 pin."

  - name: BASE_CGU_OUT1_CLKSEL
    output: base_cgu_out1_clk
    inputs:
      - osc_32khz       # 0x00
      - irc_12mhz       # 0x01 (default)
      - enet_rx_clk_in  # 0x02
      - enet_tx_clk_in  # 0x03
      - gp_clkin_in     # 0x04
      - null            # 0x05 reserved
      - xtal_clk        # 0x06
      - pll0usb_clk     # 0x07
      - pll0audio_clk   # 0x08
