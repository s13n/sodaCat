name: COMP
description: COMP register block
groupName: COMP
source: STM32C531 SVD v1.0.0
registers:
  - name: COMP_SR
    displayName: COMP_SR
    description: Comparator status register
    addressOffset: 0
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: C1VAL
        description: COMP1 channel output status bit
        bitOffset: 0
        bitWidth: 1
        access: read-only
      - name: C2VAL
        description: COMP2 channel output status bit
        bitOffset: 1
        bitWidth: 1
        access: read-only
      - name: C1IF
        description: COMP1 channel interrupt flag
        bitOffset: 16
        bitWidth: 1
        access: read-only
      - name: C2IF
        description: COMP2 channel interrupt flag
        bitOffset: 17
        bitWidth: 1
        access: read-only
  - name: COMP_ICFR
    displayName: COMP_ICFR
    description: Comparator interrupt clear flag register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CC1IF
        description: Clear COMP1 channel interrupt flag
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: CC2IF
        description: Clear COMP2 channel interrupt flag
        bitOffset: 17
        bitWidth: 1
        access: read-write
  - name: COMP_CFGR1
    displayName: COMP_CFGR1
    description: Comparator configuration register 1
    addressOffset: 12
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: EN
        description: COMP channel enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Disable
            value: 0
          - name: B_0x1
            description: Enable
            value: 1
      - name: BRGEN
        description: Scaler bridge enable
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Scaler resistor bridge disabled
            value: 0
          - name: B_0x1
            description: Scaler resistor bridge enabled
            value: 1
      - name: SCALEN
        description: Voltage scaler enable
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Vless thansub>REFINTless than/sub> scaler disabled
            value: 0
          - name: B_0x1
            description: Vless thansub>REFINTless than/sub> scaler enabled
            value: 1
      - name: POLARITY
        description: COMP channel polarity selection
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: COMP channel output is not inverted
            value: 0
          - name: B_0x1
            description: COMP channel output is inverted
            value: 1
      - name: WINMODE
        description: COMP1 non-inverting input selector for window mode
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Signal selected with INPSEL[1:0]
            value: 0
          - name: B_0x1
            description: 'COMP2_INP signal of COMP2 (required for window mode, see Figure152: Window comparators functional block diagram'
            value: 1
      - name: ITEN
        description: COMP channel interrupt enable
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Interrupt generation disabled for COMP channel
            value: 0
          - name: B_0x1
            description: Interrupt generation enabled for COMP channel
            value: 1
      - name: HYST
        description: COMP channel hysteresis selection
        bitOffset: 8
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No hysteresis
            value: 0
          - name: B_0x1
            description: Low hysteresis
            value: 1
          - name: B_0x2
            description: Medium hysteresis
            value: 2
          - name: B_0x3
            description: High hysteresis
            value: 3
      - name: PWRMODE
        description: Power mode of the COMP1 channel
        bitOffset: 12
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: High speed/high power
            value: 0
          - name: B_0x1
            description: Medium speed/medium power
            value: 1
      - name: WINOUT
        description: COMP1 output selector
        bitOffset: 14
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: COMP1_VALUE
            value: 0
          - name: B_0x1
            description: 'COMP1_VALUE XOR COMP2_VALUE (required for window mode, see Figure152: Window comparators functional block diagram'
            value: 1
      - name: INMSEL
        description: COMP1 channel inverting input selection
        bitOffset: 16
        bitWidth: 4
        access: read-write
      - name: INPSEL
        description: COMP1 non-inverting input selection
        bitOffset: 20
        bitWidth: 3
        access: read-write
      - name: BLANKING
        description: COMP1 channel blanking source selection
        bitOffset: 24
        bitWidth: 4
        access: read-write
      - name: LOCK
        description: Lock
        bitOffset: 31
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: COMP_CFGR1[31:0] register is read/write
            value: 0
          - name: B_0x1
            description: COMP_CFGR1[31:0] is read-only
            value: 1
