  - name: RST_N
    description: Hardware Reset
    addressOffset: 120
    access: read-write
    resetValue: 0
    resetMask: 0
    fields:
      - name: CARD_RESET
        description: Hardware reset.  1 - Active mode 0 - Reset  Toggles state on SD_RST pin. This bit causes the card to enter pre-idle state, which requires it to be re-initialized.
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 1
        bitWidth: 31
  - name: BMOD
    description: Bus Mode Register
    addressOffset: 128
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SWR
        description: Software Reset. When set, the DMA Controller resets all its internal registers. SWR is read/write. It is automatically cleared after 1 clock cycle.
        bitOffset: 0
        bitWidth: 1
      - name: FB
        description: Fixed Burst. Controls whether the AHB Master interface performs fixed burst transfers or not. When set, the AHB will use only SINGLE, INCR4, INCR8 or INCR16 during start of normal burst transfers. When reset, the AHB will use SINGLE and INCR burst transfer operations. FB is read/write.
        bitOffset: 1
        bitWidth: 1
      - name: DSL
        description: Descriptor Skip Length. Specifies the number of HWord/Word/Dword to skip between two unchained descriptors. This is applicable only for dual buffer structure. DSL is read/write.
        bitOffset: 2
        bitWidth: 5
      - name: DE
        description: SD/MMC DMA Enable. When set, the SD/MMC DMA is enabled. DE is read/write.
        bitOffset: 7
        bitWidth: 1
      - name: PBL
        description: Programmable Burst Length. These bits indicate the maximum number of beats to be performed in one SD/MMC DMA transaction. The SD/MMC DMA will always attempt to burst as specified in PBL each time it starts a Burst transfer on the host bus. The permissible values are 1, 4, 8, 16, 32, 64, 128 and 256. This value is the mirror of MSIZE of FIFOTH register. In order to change this value, write the required value to FIFOTH register. This is an encode value as follows.Transfer unit is 32 bit. PBL is a read-only value.
        enumeratedValues:
          - name: 1_TRANSFER
            description: 1 transfer
            value: 0
          - name: 4_TRANSFERS
            description: 4 transfers
            value: 1
          - name: 8_TRANSFERS
            description: 8 transfers
            value: 2
          - name: 16_TRANSFERS
            description: 16 transfers
            value: 3
          - name: 32_TRANSFERS
            description: 32 transfers
            value: 4
          - name: 64_TRANSFERS
            description: 64 transfers
            value: 5
          - name: 128_TRANSFERS
            description: 128 transfers
            value: 6
          - name: 256_TRANSFERS
            description: 256 transfers
            value: 7
        bitOffset: 8
        bitWidth: 3
      - name: RESERVED
        description: Reserved
        bitOffset: 11
        bitWidth: 21
  - name: PLDMND
    description: Poll Demand Register
    addressOffset: 132
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PD
        description: Poll Demand. If the OWN bit of a descriptor is not set, the FSM goes to the Suspend state. The host needs to write any value into this register for the SD/MMC DMA state machine to resume normal descriptor fetch operation. This is a write only register. PD bit is write-only.
        bitOffset: 0
        bitWidth: 32
  - name: DBADDR
    description: Descriptor List Base Address Register
    addressOffset: 136
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SDL
        description: Start of Descriptor List. Contains the base address of the First Descriptor. The LSB bits [1:0] are ignored and taken as all-zero by the SD/MMC DMA internally. Hence these LSB bits are read-only.
        bitOffset: 0
        bitWidth: 32
  - name: IDSTS
    description: Internal DMAC Status Register
    addressOffset: 140
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TI
        description: Transmit Interrupt. Indicates that data transmission is finished for a descriptor. Writing a 1 clears this bit.
        bitOffset: 0
        bitWidth: 1
      - name: RI
        description: Receive Interrupt. Indicates the completion of data reception for a descriptor. Writing a 1 clears this bit.
        bitOffset: 1
        bitWidth: 1
      - name: FBE
        description: Fatal Bus Error Interrupt. Indicates that a Bus Error occurred (IDSTS[12:10]). When this bit is set, the DMA disables all its bus accesses. Writing a 1 clears this bit.
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 3
        bitWidth: 1
      - name: DU
        description: Descriptor Unavailable Interrupt. This bit is set when the descriptor is unavailable due to OWN bit = 0 (DES0[31] =0). Writing a 1 clears this bit.
        bitOffset: 4
        bitWidth: 1
      - name: CES
        description: 'Card Error Summary. Indicates the status of the transaction to/from the card; also present in RINTSTS. Indicates the logical OR of the following bits:  EBE - End Bit Error  RTO - Response Time-out/Boot Ack Time-out  RCRC - Response CRC  SBE - Start Bit Error  DRTO - Data Read Time-out/BDS time-out  DCRC - Data CRC for Receive  RE - Response Error  Writing a 1 clears this bit.'
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 6
        bitWidth: 2
      - name: NIS
        description: 'Normal Interrupt Summary. Logical OR of the following: IDSTS[0] - Transmit Interrupt IDSTS[1] - Receive Interrupt Only unmasked bits affect this bit. This is a sticky bit and must be cleared each time a corresponding bit that causes NIS to be set is cleared. Writing a 1 clears this bit.'
        bitOffset: 8
        bitWidth: 1
      - name: AIS
        description: 'Abnormal Interrupt Summary. Logical OR of the following: IDSTS[2] - Fatal Bus Interrupt IDSTS[4] - DU bit Interrupt IDSTS[5] - Card Error Summary Interrupt Only unmasked bits affect this bit. This is a sticky bit and must be cleared each time a corresponding bit that causes AIS to be set is cleared. Writing a 1 clears this bit.'
        bitOffset: 9
        bitWidth: 1
      - name: EB
        description: 'Error Bits. Indicates the type of error that caused a Bus Error. Valid only with Fatal Bus Error bit (IDSTS[2]) set. This field does not generate an interrupt.  001 - Host Abort received during transmission  010 - Host Abort received during reception  Others: Reserved EB is read-only.'
        bitOffset: 10
        bitWidth: 3
      - name: FSM
        description: DMAC state machine present state.  0 - DMA_IDLE  1 - DMA_SUSPEND  2 - DESC_RD  3 - DESC_CHK  4 - DMA_RD_REQ_WAIT  5 - DMA_WR_REQ_WAIT  6 - DMA_RD  7 - DMA_WR  8 - DESC_CLOSE  This bit is read-only.
        bitOffset: 13
        bitWidth: 4
      - name: RESERVED
        description: Reserved
        bitOffset: 17
        bitWidth: 15
  - name: IDINTEN
    description: Internal DMAC Interrupt Enable Register
    addressOffset: 144
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TI
        description: Transmit Interrupt Enable. When set with Normal Interrupt Summary Enable, Transmit Interrupt is enabled. When reset, Transmit Interrupt is disabled.
        bitOffset: 0
        bitWidth: 1
      - name: RI
        description: Receive Interrupt Enable. When set with Normal Interrupt Summary Enable, Receive Interrupt is enabled. When reset, Receive Interrupt is disabled.
        bitOffset: 1
        bitWidth: 1
      - name: FBE
        description: Fatal Bus Error Enable. When set with Abnormal Interrupt Summary Enable, the Fatal Bus Error Interrupt is enabled. When reset, Fatal Bus Error Enable Interrupt is disabled.
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 3
        bitWidth: 1
      - name: DU
        description: Descriptor Unavailable Interrupt. When set along with Abnormal Interrupt Summary Enable, the DU interrupt is enabled.
        bitOffset: 4
        bitWidth: 1
      - name: CES
        description: Card Error summary Interrupt Enable. When set, it enables the Card Interrupt summary.
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 6
        bitWidth: 2
      - name: NIS
        description: 'Normal Interrupt Summary Enable. When set, a normal interrupt is enabled. When reset, a normal interrupt is disabled. This bit enables the following bits: IDINTEN[0] - Transmit Interrupt IDINTEN[1] - Receive Interrupt'
        bitOffset: 8
        bitWidth: 1
      - name: AIS
        description: 'Abnormal Interrupt Summary Enable. When set, an abnormal interrupt is enabled. This bit enables the following bits: IDINTEN[2] - Fatal Bus Error Interrupt IDINTEN[4] - DU Interrupt IDINTEN[5] - Card Error Summary Interrupt'
        bitOffset: 9
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 10
        bitWidth: 22
  - name: DSCADDR
    description: Current Host Descriptor Address Register
    addressOffset: 148
    access: read-only
    resetValue: 0
    resetMask: 4294967295
