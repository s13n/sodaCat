        interrupts:
          ICM: INT

      ISI:
        uses: ISI
        instances: [ISI]
        interrupts:
          ISI: INT

      MCAN:
        uses: MCAN
        instances: [MCAN0, MCAN1]
        interrupts:
          MCAN0_INT0: INT0
          MCAN0_INT1: INT1
          MCAN1_INT0: INT0
