# Consolidated configuration for Microchip ATSAM model extraction.
# CMSIS Device Family Pack archives are stored in-tree (downloaded from
# packs.download.microchip.com as `.atpack`, renamed to `.zip`).

svd:
  source: https://packs.download.microchip.com/

# ============================================================================
# Cross-family shared blocks
#
# 1. ARM Cortex-M core peripherals — hand-maintained at models/ARM/.  No `from:`
#    (no SVD extraction); referenced via `uses:` from family blocks.
#
# 2. SAM-Gen1 IP — register-byte-identical across the four SAM families
#    (SAME70, SAMS70, SAMV70, SAMV71) and the PIC32CZ-CA70/MC70 generation,
#    which Microchip built on the same silicon design.  These blocks are
#    extracted from SAMV71 (the most complete SAM-Gen1 SVD) and reused via
#    `uses:` in the other Gen1 families.  A new `models/Microchip/<Block>.yaml`
#    is produced per shared block.
# ============================================================================
shared_blocks:
  # --------------------------------------------------------------------------
  # ARM Cortex-M core (hand-maintained)
  # --------------------------------------------------------------------------
  NVIC:
    designer: ARM
    description: Nested Vectored Interrupt Controller
    params:
      - {name: priobits, type: int, description: 'Number of priority bits'}
      - {name: interrupts, type: int, description: 'Number of NVIC interrupt vectors'}

  SCB:
    designer: ARM
    description: System Control Block

  FPU:
    designer: ARM
    description: Floating Point Unit

  # --------------------------------------------------------------------------
  # SAM-Gen1 peripherals (canonical source: ATSAMV71Q21B)
  # --------------------------------------------------------------------------
  ACC:
    from: ATSAMV71Q21B.ACC
    description: Analog comparator controller

  AES:
    from: ATSAMV71Q21B.AES
    description: Advanced Encryption Standard hardware accelerator

  AFEC:
    from: ATSAMV71Q21B.AFEC0
    description: Analog front-end controller (12-bit ADC)

  CHIPID:
    from: ATSAMV71Q21B.CHIPID
    description: Chip identification

  DACC:
    from: ATSAMV71Q21B.DACC
    description: Digital-to-analog converter controller

  EFC:
    from: ATSAMV71Q21B.EFC
    description: Embedded flash controller

  GMAC:
    from: ATSAMV71Q21B.GMAC
    description: Gigabit Ethernet MAC

  GPBR:
    from: ATSAMV71Q21B.GPBR
    description: General-purpose backup registers

  HSMCI:
    from: ATSAMV71Q21B.HSMCI
    description: High-speed multimedia card interface

  I2SC:
    from: ATSAMV71Q21B.I2SC0
    description: Inter-IC sound controller

  ICM:
    from: ATSAMV71Q21B.ICM
    description: Integrity check monitor

  ISI:
    from: ATSAMV71Q21B.ISI
    description: Image sensor interface

  MATRIX:
    # Bus matrix: SAM-Q21 register layout, also matches CA70 (5125-144) and
    # MC70 (2051-100).  SAME70/SAMS70/SAMV70 each have a distinct register
    # variant — those families declare MATRIX at family level with their
    # own `from:` instead of `uses:` here.
    from: ATSAMV71Q21B.MATRIX
    description: Bus matrix

  MCAN:
    from: ATSAMV71Q21B.MCAN0
    description: Bosch M_CAN controller (CAN-FD)

  MLB:
    from: ATSAMV71Q21B.MLB
    description: Media Local Bus controller

  PIO:
    from: ATSAMV71Q21B.PIOA
    description: Parallel input/output controller

  PMC:
    # Power management controller: SAM-Q21 register layout, also matches
    # CA70 and MC70.  SAME70/SAMS70/SAMV70 each have a distinct PMC variant
    # — those families declare PMC at family level instead of `uses:` here.
    from: ATSAMV71Q21B.PMC
    description: Power management controller

  PWM:
    from: ATSAMV71Q21B.PWM0
    description: Pulse-width modulation controller

  QSPI:
    from: ATSAMV71Q21B.QSPI
    description: Quad serial peripheral interface

  RSTC:
    from: ATSAMV71Q21B.RSTC
    description: Reset controller

  RSWDT:
    from: ATSAMV71Q21B.RSWDT
    description: Reinforced safety watchdog timer

  RTC:
    from: ATSAMV71Q21B.RTC
    description: Real-time clock

  RTT:
    from: ATSAMV71Q21B.RTT
    description: Real-time timer

  SMC:
    from: ATSAMV71Q21B.SMC
    description: Static memory controller

  SPI:
    from: ATSAMV71Q21B.SPI0
    description: Serial peripheral interface

  SSC:
    from: ATSAMV71Q21B.SSC
    description: Synchronous serial controller

  SUPC:
    from: ATSAMV71Q21B.SUPC
    description: Supply controller

  TC:
    from: ATSAMV71Q21B.TC0
    description: Timer/counter (3 channels per instance)

  TRNG:
    from: ATSAMV71Q21B.TRNG
    description: True random number generator

  TWIHS:
    from: ATSAMV71Q21B.TWIHS0
    description: Two-wire high-speed interface (I²C)

  UART:
    from: ATSAMV71Q21B.UART0
    description: Universal asynchronous receiver/transmitter

  USART:
    from: ATSAMV71Q21B.USART0
    description: Universal synchronous/asynchronous receiver/transmitter

  USBHS:
    from: ATSAMV71Q21B.USBHS
    description: USB high-speed device/host controller

  UTMI:
    from: ATSAMV71Q21B.UTMI
    description: USB transceiver macrocell interface

  WDT:
    from: ATSAMV71Q21B.WDT
    description: Watchdog timer

  XDMAC:
    from: ATSAMV71Q21B.XDMAC
    description: Extensible DMA controller

