name: SysTick
description: System Timer
source: ATSAMV71Q21B.svd (Cortex-M7); ARMv6/v7/v8-M Architecture Reference Manual
registers:
  - name: CSR
    description: Control and Status Register
    addressOffset: 0
    size: 32
    resetValue: 0x00000004
    fields:
      - name: ENABLE
        description: Enables the counter
        bitOffset: 0
        bitWidth: 1
      - name: TICKINT
        description: Enables SysTick exception request
        bitOffset: 1
        bitWidth: 1
      - name: CLKSOURCE
        description: "Clock source selection: 0 = external reference clock, 1 = processor clock"
        bitOffset: 2
        bitWidth: 1
      - name: COUNTFLAG
        description: Returns 1 if timer counted to 0 since last time this was read
        bitOffset: 16
        bitWidth: 1
        access: read-only
  - name: RVR
    description: Reload Value Register
    addressOffset: 4
    size: 32
    resetValue: 0
    fields:
      - name: RELOAD
        description: Value to load into CVR when the counter reaches 0
        bitOffset: 0
        bitWidth: 24
  - name: CVR
    description: Current Value Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: CURRENT
        description: Reads return the current value of the SysTick counter. A write of any value clears the field to 0, and also clears COUNTFLAG.
        bitOffset: 0
        bitWidth: 24
  - name: CALIB
    description: Calibration Value Register
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: TENMS
        description: Reload value for 10ms (100Hz) timing, zero if not provided
        bitOffset: 0
        bitWidth: 24
      - name: SKEW
        description: "Set if TENMS is inexact (not exactly 10ms)"
        bitOffset: 30
        bitWidth: 1
      - name: NOREF
        description: Set if no external reference clock is provided
        bitOffset: 31
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 16
    usage: registers
