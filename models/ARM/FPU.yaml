name: FPU
description: Floating-Point Unit
source: ATSAMV71Q21B.svd (Cortex-M7), RP2350.svd (Cortex-M33); ARM Architecture Reference Manual
interrupts:
  - name: INT
    description: Combined FP exception (FPSCR cumulative IDC/IOC/DZC/OFC/UFC); some integrators include IXC, others route IXC separately
  - name: IXC
    description: Floating-point Inexact cumulative exception (FPSCR.IXC); typically broken out separately so it can be masked independently of the harder exceptions
registers:
  - name: FPCCR
    description: Floating-Point Context Control Register
    addressOffset: 4
    size: 32
    resetValue: 0xC0000000
    fields:
      - name: LSPACT
        description: Lazy state preservation is active
        bitOffset: 0
        bitWidth: 1
      - name: USER
        description: Privilege level was User when FP stack frame was allocated
        bitOffset: 1
        bitWidth: 1
      - name: S
        description: Security status when FP stack frame was allocated (v8-M with TrustZone only)
        bitOffset: 2
        bitWidth: 1
      - name: THREAD
        description: Mode was Thread when FP stack frame was allocated
        bitOffset: 3
        bitWidth: 1
      - name: HFRDY
        description: HardFault handler priority permits setting FPCA
        bitOffset: 4
        bitWidth: 1
      - name: MMRDY
        description: MemManage handler priority permits setting FPCA
        bitOffset: 5
        bitWidth: 1
      - name: BFRDY
        description: BusFault handler priority permits setting FPCA
        bitOffset: 6
        bitWidth: 1
      - name: SFRDY
        description: SecureFault handler priority permits setting FPCA (v8-M with TrustZone only)
        bitOffset: 7
        bitWidth: 1
      - name: MONRDY
        description: DebugMonitor handler priority permits setting FPCA
        bitOffset: 8
        bitWidth: 1
      - name: SPLIMVIOL
        description: Stack pointer limit violation on lazy FP state preservation (v8-M only)
        bitOffset: 9
        bitWidth: 1
      - name: UFRDY
        description: UsageFault handler priority permits setting FPCA (v8-M only)
        bitOffset: 10
        bitWidth: 1
      - name: TS
        description: Treat FP registers as Secure (v8-M with TrustZone only)
        bitOffset: 26
        bitWidth: 1
      - name: CLRONRETS
        description: Controls NS access to CLRONRET (v8-M with TrustZone only)
        bitOffset: 27
        bitWidth: 1
      - name: CLRONRET
        description: Clear FP registers on exception return (v8-M only)
        bitOffset: 28
        bitWidth: 1
      - name: LSPENS
        description: Controls NS access to LSPEN (v8-M with TrustZone only)
        bitOffset: 29
        bitWidth: 1
      - name: LSPEN
        description: Enable automatic lazy state preservation
        bitOffset: 30
        bitWidth: 1
      - name: ASPEN
        description: Enable CONTROL.FPCA on FP instruction execution
        bitOffset: 31
        bitWidth: 1
  - name: FPCAR
    description: Floating-Point Context Address Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: ADDRESS
        description: Address of the unpopulated FP register space on the exception stack frame
        bitOffset: 3
        bitWidth: 29
  - name: FPDSCR
    description: Floating-Point Default Status Control Register
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: RMODE
        description: Default rounding mode for FPSCR.RMode
        bitOffset: 22
        bitWidth: 2
      - name: FZ
        description: Default flush-to-zero mode for FPSCR.FZ
        bitOffset: 24
        bitWidth: 1
      - name: DN
        description: Default NaN mode for FPSCR.DN
        bitOffset: 25
        bitWidth: 1
      - name: AHP
        description: Default Alternative Half-Precision mode for FPSCR.AHP
        bitOffset: 26
        bitWidth: 1
  - name: MVFR0
    description: Media and VFP Feature Register 0
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: A_SIMD_REGISTERS
        description: "FP register bank size: 0=none, 1=16x64-bit, 2=32x64-bit"
        bitOffset: 0
        bitWidth: 4
      - name: SINGLEPRECISION
        description: "Single-precision support: 0=none, 1=VFPv2, 2=VFPv3"
        bitOffset: 4
        bitWidth: 4
      - name: DOUBLEPRECISION
        description: "Double-precision support: 0=none, 2=VFPv2"
        bitOffset: 8
        bitWidth: 4
      - name: FP_EXCEP_TRAPPING
        description: FP exception trapping support
        bitOffset: 12
        bitWidth: 4
      - name: DIVIDE
        description: "FP divide support: 0=none, 1=supported"
        bitOffset: 16
        bitWidth: 4
      - name: SQUARE_ROOT
        description: "FP square root support: 0=none, 1=supported"
        bitOffset: 20
        bitWidth: 4
      - name: SHORT_VECTORS
        description: "FP short vector support: 0=none, 1=supported"
        bitOffset: 24
        bitWidth: 4
      - name: FP_ROUNDING_MODES
        description: "Rounding modes: 0=none, 1=all supported"
        bitOffset: 28
        bitWidth: 4
  - name: MVFR1
    description: Media and VFP Feature Register 1
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: FTZ_MODE
        description: Flush-to-zero support
        bitOffset: 0
        bitWidth: 4
      - name: D_NAN_MODE
        description: Default NaN mode support
        bitOffset: 4
        bitWidth: 4
      - name: FP_HPFP
        description: Half-precision FP support
        bitOffset: 24
        bitWidth: 4
      - name: FP_FUSED_MAC
        description: Fused multiply-accumulate support
        bitOffset: 28
        bitWidth: 4
  - name: MVFR2
    description: Media and VFP Feature Register 2
    addressOffset: 24
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: VFP_MISC
        description: FP miscellaneous features
        bitOffset: 4
        bitWidth: 4
addressBlocks:
  - offset: 0
    size: 28
    usage: registers
params:
  - name: has_trustzone
    type: bool
    default: false
    description: "TrustZone security fields in FPCCR (S, SFRDY, TS, CLRONRETS, LSPENS)"
