  - PIC32CZ-CA90
instance: GCLK

# ===========================================================================
# Notes
# ===========================================================================
# The Gen2 PIC32CZ-CA80/CA90 clock architecture is the SAMD-derived split
# controller layout:
#
#   OSCCTRL       (ch.18) — XOSC + DFLL48M + PLL0 + PLL1 + FRACDIV0/1
#   OSC32KCTRL    (ch.19) — XOSC32K + OSCULP32K + RTC/HSM clock select
#   GCLK          (ch.20) — 16 generic-clock generators + 64 peripheral
#                            channels (PCHCTRL fan-out)
#   MCLK          (ch.21) — CPU/AHB/APB main-clock prescaler + per-module
#                            mask bits (CLKMSK)
#
# `instance` is set to GCLK because the bulk of the per-peripheral mux/
# divider/gate registers (GENCTRL / PCHCTRL) live there.  Cross-block
# register references use the `instance` field on RegisterField (e.g.
# OSCCTRL.PLL0CTRL.REFSEL, MCLK.CLKMSK0.MASK).
#
# Many features are documented but not yet represented in detail:
#   - PLL FRACDIV0/FRACDIV1 (PLL1 only) for high-resolution clock
#     generation; treated as plain dividers off PLL1 output 0/2.
#   - DFLL48M closed-loop multiplication (FCLKDFLL48M = MUL × ref) — the
#     graph treats the DFLL output as a fixed 48 MHz source; the closed-
#     loop multiplier from DFLLMUL.MUL is mentioned in the description
#     but does not connect to the GCLK_OSCCTRL_DFLL48 reference channel.
#   - Some PCHCTRL channels feed multiple peripherals (the SERCOM_SLOW
#     channels at indices 18/19/20).  Modeled as one signal per channel;
#     individual SERCOM blocks read the same shared signal.
# ===========================================================================

signals:
