name: MPC
description: ARM TrustZone Memory Protection Controller
source: IOTKit_CM33.svd; ARM CoreLink SSE-200 TRM
qemu: full (tz-mpc; IOMMU-based block protection, LUT, interrupts)
ipPedigree:
  designer: ARM
  ipName: MPC
registers:
  - name: CTRL
    description: MPC Control Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: SEC_RESP
        description: "Security violation response: 0=RAZ/WI, 1=bus error"
        bitOffset: 4
        bitWidth: 1
      - name: AUTOINCREMENT
        description: Auto-increment BLK_IDX after each BLK_LUT access
        bitOffset: 8
        bitWidth: 1
      - name: SEC_LOCK_DOWN
        description: Lock security settings
        bitOffset: 31
        bitWidth: 1
  - name: BLK_MAX
    description: Maximum Block Index
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: BLK_CFG
    description: Block Configuration (block size encoding)
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: BLK_IDX
    description: Block Index (selects which LUT word is accessed)
    addressOffset: 24
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: BLK_LUT
    description: Block Lookup Table (1 bit per block, 0=Secure, 1=Non-secure)
    addressOffset: 28
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: INT_STAT
    description: Interrupt Status Register
    addressOffset: 32
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: INT_CLEAR
    description: Interrupt Clear Register
    addressOffset: 36
    size: 32
    access: write-only
    resetValue: 0
    fields: []
  - name: INT_EN
    description: Interrupt Enable Register
    addressOffset: 40
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: INT_INFO1
    description: Interrupt Info 1 (faulting address)
    addressOffset: 44
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: INT_INFO2
    description: Interrupt Info 2 (additional fault information)
    addressOffset: 48
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: INT_SET
    description: Interrupt Set Register (for testing)
    addressOffset: 52
    size: 32
    access: write-only
    resetValue: 0
    fields: []
addressBlocks:
  - offset: 0
    size: 56
    usage: registers
