        description: Asynchronous Tx Packet Done Enable
        bitOffset: 20
        bitWidth: 1
      - name: ATX_PE
        description: Asynchronous Tx Protocol Error Enable
        bitOffset: 21
        bitWidth: 1
      - name: ATX_BREAK
        description: Asynchronous Tx Break Enable
        bitOffset: 22
        bitWidth: 1
