    fields:
      - name: VD
        description: VBUS_Discharge Setting this bit to 1 causes VBUS to discharge through a resistor.
        bitOffset: 0
        bitWidth: 1
      - name: VC
        description: VBUS_Charge Setting this bit to 1 causes the VBUS line to be charged. This is used for VBUS pulsing during SRP.
        bitOffset: 1
