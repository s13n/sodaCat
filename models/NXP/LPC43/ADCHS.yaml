      - name: THCMP_BRANGE3
        description: Input channel 3 result below  range
        bitOffset: 15
        bitWidth: 1
      - name: THCMP_ARANGE3
        description: Input channel 3 result above range
        bitOffset: 16
        bitWidth: 1
      - name: THCMP_DCROSS3
        description: Input channel 3 result  downward threshold crossing detected
