    output: pll3_r_ck
    control:
      reg: PLLCFGR
      field: DIVR3EN

  # --- RTC gate ---
  - name: RTCEN
    description: RTC clock enable
    input: rtc_pre
    output: rtc_ck
    control:
      reg: BDCR
      field: RTCEN

  # =========================================================================
  # Peripheral clock gates — AHB3 (D1 domain)
