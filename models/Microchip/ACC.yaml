name: ACC
version: 6490J
description: Analog comparator controller
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: SELMINUS
        description: Selection for Minus Comparator Input
        bitOffset: 0
        bitWidth: 3
        enumeratedValues:
          - name: TS
            description: Select TS
            value: 0
          - name: VREFP
            description: Select VREFP
            value: 1
          - name: DAC0
            description: Select DAC0
            value: 2
          - name: DAC1
            description: Select DAC1
            value: 3
          - name: AFE0_AD0
            description: Select AFE0_AD0
            value: 4
          - name: AFE0_AD1
            description: Select AFE0_AD1
            value: 5
          - name: AFE0_AD2
            description: Select AFE0_AD2
            value: 6
          - name: AFE0_AD3
            description: Select AFE0_AD3
            value: 7
      - name: SELPLUS
        description: Selection For Plus Comparator Input
        bitOffset: 4
        bitWidth: 3
        enumeratedValues:
          - name: AFE0_AD0
            description: Select AFE0_AD0
            value: 0
          - name: AFE0_AD1
            description: Select AFE0_AD1
            value: 1
          - name: AFE0_AD2
            description: Select AFE0_AD2
            value: 2
          - name: AFE0_AD3
            description: Select AFE0_AD3
            value: 3
          - name: AFE0_AD4
            description: Select AFE0_AD4
            value: 4
          - name: AFE0_AD5
            description: Select AFE0_AD5
            value: 5
          - name: AFE1_AD0
            description: Select AFE1_AD0
            value: 6
          - name: AFE1_AD1
            description: Select AFE1_AD1
            value: 7
      - name: ACEN
        description: Analog Comparator Enable
        bitOffset: 8
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: Analog comparator disabled.
            value: 0
          - name: EN
            description: Analog comparator enabled.
            value: 1
      - name: EDGETYP
        description: Edge Type
        bitOffset: 9
        bitWidth: 2
        enumeratedValues:
          - name: RISING
            description: Only rising edge of comparator output
            value: 0
          - name: FALLING
            description: Falling edge of comparator output
            value: 1
          - name: ANY
            description: Any edge of comparator output
            value: 2
      - name: INV
        description: Invert Comparator Output
        bitOffset: 12
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: Analog comparator output is directly processed.
            value: 0
          - name: EN
            description: Analog comparator output is inverted prior to being processed.
            value: 1
      - name: SELFS
        description: Selection Of Fault Source
        bitOffset: 13
        bitWidth: 1
        enumeratedValues:
          - name: CE
            description: The CE flag is used to drive the FAULT output.
            value: 0
          - name: OUTPUT
            description: The output of the analog comparator flag is used to drive the FAULT output.
            value: 1
      - name: FE
        description: Fault Enable
        bitOffset: 14
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: The FAULT output is tied to 0.
            value: 0
          - name: EN
            description: The FAULT output is driven by the signal defined by SELFS.
            value: 1
