# ARM vendor configuration for sodaCat-explorer.
# ARM models are hand-maintained (no SVD extraction).

families:
  MPS2:
    subfamilies:
      MPS2:
        chips:
          - AN385
          - AN386
          - AN500
          - AN505
          - AN511
          - AN521
    blocks:
      CMSDK_DualTimer:
        instances: [DUALTIMER]
      CMSDK_GPIO:
        instances: [GPIO0, GPIO1, GPIO2, GPIO3]
      CMSDK_Timer:
        instances: [TIMER0, TIMER1]
      CMSDK_UART:
        instances: [UART0, UART1, UART2, UART3, UART4]
      CMSDK_Watchdog:
        instances: [WATCHDOG]
      CoreDebug:
        instances: [CoreDebug]
      DWT:
        instances: [DWT]
      FPGA_IO:
        instances: [FPGA_IO]
      I2S:
        instances: [I2S]
      ITM:
        instances: [ITM]
      MPC:
        instances: [MPC_SSRAM1, MPC_SSRAM2, MPC_SSRAM3]
      NSPC:
        instances: [NSPC]
      PL022:
        instances: [SPI]
      PL081:
        instances: [DMA]
      SBCon:
        instances: [SBCon]
      SCC:
        instances: [SCC]
      SCnSCB:
        instances: [SCnSCB]
      SPC:
        instances: [SPC]
      TPI:
        instances: [TPI]
