name: CMSDK_DualTimer
description: ARM CMSDK APB Dual Timer (SP804-compatible)
source: IOTKit_CM33.svd; ARM DDI0271 (SP804 TRM)
qemu: full (cmsdk-apb-dualtimer)
ipPedigree:
  designer: ARM
  ipName: CMSDK APB Dual Timer
  trm: DDI0271
interrupts:
  - INTR
registers:
  - name: TIMER1LOAD
    description: Timer 1 Load Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
  - name: TIMER1VALUE
    description: Timer 1 Current Value Register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0xFFFFFFFF
  - name: TIMER1CONTROL
    description: Timer 1 Control Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0x00000020
    fields:
      - name: OneShotCount
        description: "Counting mode: 0=wrapping, 1=one-shot"
        bitOffset: 0
        bitWidth: 1
      - name: TimerSize
        description: "Counter size: 0=16-bit, 1=32-bit"
        bitOffset: 1
        bitWidth: 1
      - name: TimerPre
        description: "Prescale divisor: 00=1, 01=16, 10=256, 11=reserved"
        bitOffset: 2
        bitWidth: 2
      - name: InterruptEnable
        description: Enable interrupt
        bitOffset: 5
        bitWidth: 1
      - name: TimerMode
        description: "Timer mode: 0=free-running, 1=periodic"
        bitOffset: 6
        bitWidth: 1
      - name: TimerEnable
        description: Enable timer
        bitOffset: 7
        bitWidth: 1
  - name: TIMER1INTCLR
    description: Timer 1 Interrupt Clear Register
    addressOffset: 12
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: INT
        description: Write any value to clear interrupt
        bitOffset: 0
        bitWidth: 1
  - name: TIMER1RIS
    description: Timer 1 Raw Interrupt Status Register
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: RIS
        description: Raw interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: TIMER1MIS
    description: Timer 1 Masked Interrupt Status Register
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: MIS
        description: Masked interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: TIMER1BGLOAD
    description: Timer 1 Background Load Register
    addressOffset: 24
    size: 32
    access: read-write
    resetValue: 0
  - name: TIMER2LOAD
    description: Timer 2 Load Register
    addressOffset: 32
    size: 32
    access: read-write
    resetValue: 0
  - name: TIMER2VALUE
    description: Timer 2 Current Value Register
    addressOffset: 36
    size: 32
    access: read-only
    resetValue: 0xFFFFFFFF
  - name: TIMER2CONTROL
    description: Timer 2 Control Register
    addressOffset: 40
    size: 32
    access: read-write
    resetValue: 0x00000020
    fields:
      - name: OneShotCount
        description: "Counting mode: 0=wrapping, 1=one-shot"
        bitOffset: 0
        bitWidth: 1
      - name: TimerSize
        description: "Counter size: 0=16-bit, 1=32-bit"
        bitOffset: 1
        bitWidth: 1
      - name: TimerPre
        description: "Prescale divisor: 00=1, 01=16, 10=256, 11=reserved"
        bitOffset: 2
        bitWidth: 2
      - name: InterruptEnable
        description: Enable interrupt
        bitOffset: 5
        bitWidth: 1
      - name: TimerMode
        description: "Timer mode: 0=free-running, 1=periodic"
        bitOffset: 6
        bitWidth: 1
      - name: TimerEnable
        description: Enable timer
        bitOffset: 7
        bitWidth: 1
  - name: TIMER2INTCLR
    description: Timer 2 Interrupt Clear Register
    addressOffset: 44
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: INT
        description: Write any value to clear interrupt
        bitOffset: 0
        bitWidth: 1
  - name: TIMER2RIS
    description: Timer 2 Raw Interrupt Status Register
    addressOffset: 48
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: RIS
        description: Raw interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: TIMER2MIS
    description: Timer 2 Masked Interrupt Status Register
    addressOffset: 52
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: MIS
        description: Masked interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: TIMER2BGLOAD
    description: Timer 2 Background Load Register
    addressOffset: 56
    size: 32
    access: read-write
    resetValue: 0
addressBlocks:
  - offset: 0
    size: 60
    usage: registers
