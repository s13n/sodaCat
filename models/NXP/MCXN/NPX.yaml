            description: 'Lock disabled: VMAPCTX2 remains read-write'
            value: 0
          - name: LOCK_ENABLED
            description: 'Lock enabled: cannot write to VMAPCTX2 (becomes read-only)'
            value: 1
      - name: CTX3LK
        description: Lock Enable for Context 3
        bitOffset: 14
        bitWidth: 1
        access: read-write
