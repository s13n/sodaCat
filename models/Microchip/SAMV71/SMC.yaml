name: SMC
version: 6498J
description: Static Memory Controller
source: ATSAMV71Q21B SVD Rev 0
registers:
  - dim: 4
    dimIncrement: 16
    name: CS_NUMBER[%s]
    description: Setup Register
    addressOffset: 0
    registers:
      - name: SETUP
        description: SMC Setup Register
        addressOffset: 0
        size: 32
        fields:
          - name: NWE_SETUP
            description: NWE Setup Length
            bitOffset: 0
            bitWidth: 6
          - name: NCS_WR_SETUP
            description: NCS Setup Length in WRITE Access
            bitOffset: 8
            bitWidth: 6
          - name: NRD_SETUP
            description: NRD Setup Length
            bitOffset: 16
            bitWidth: 6
          - name: NCS_RD_SETUP
            description: NCS Setup Length in READ Access
            bitOffset: 24
            bitWidth: 6
      - name: PULSE
        description: SMC Pulse Register
        addressOffset: 4
        size: 32
        fields:
          - name: NWE_PULSE
            description: NWE Pulse Length
            bitOffset: 0
            bitWidth: 7
          - name: NCS_WR_PULSE
            description: NCS Pulse Length in WRITE Access
            bitOffset: 8
            bitWidth: 7
          - name: NRD_PULSE
            description: NRD Pulse Length
            bitOffset: 16
            bitWidth: 7
          - name: NCS_RD_PULSE
            description: NCS Pulse Length in READ Access
            bitOffset: 24
            bitWidth: 7
      - name: CYCLE
        description: SMC Cycle Register
        addressOffset: 8
        size: 32
        fields:
          - name: NWE_CYCLE
            description: Total Write Cycle Length
            bitOffset: 0
            bitWidth: 9
          - name: NRD_CYCLE
            description: Total Read Cycle Length
            bitOffset: 16
            bitWidth: 9
      - name: MODE
        description: SMC Mode Register
        addressOffset: 12
        size: 32
        fields:
          - name: READ_MODE
            description: Read Mode
            bitOffset: 0
            bitWidth: 1
          - name: WRITE_MODE
            description: Write Mode
            bitOffset: 1
            bitWidth: 1
          - name: EXNW_MODE
            description: NWAIT Mode
            bitOffset: 4
            bitWidth: 2
            enumeratedValues:
              - name: DISABLED
                description: Disabled-The NWAIT input signal is ignored on the corresponding chip select.
                value: 0
              - name: FROZEN
                description: Frozen Mode-If asserted, the NWAIT signal freezes the current read or write cycle. After deassertion, the read/write cycle is resumed from the point where it was stopped.
                value: 2
              - name: READY
                description: Ready Mode-The NWAIT signal indicates the availability of the external device at the end of the pulse of the controlling read or write signal, to complete the access. If high, the access normally completes. If low, the access is extended until NWAIT returns high.
                value: 3
          - name: BAT
            description: Byte Access Type
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: BYTE_SELECT
                description: Byte select access type:- Write operation is controlled using NCS, NWE, NBS0, NBS1.- Read operation is controlled using NCS, NRD, NBS0, NBS1.
                value: 0
              - name: BYTE_WRITE
                description: Byte write access type:- Write operation is controlled using NCS, NWR0, NWR1.- Read operation is controlled using NCS and NRD.
                value: 1
          - name: DBW
            description: Data Bus Width
            bitOffset: 12
            bitWidth: 1
            enumeratedValues:
              - name: _8_BIT
                description: 8-bit Data Bus
                value: 0
              - name: _16_BIT
                description: 16-bit Data Bus
                value: 1
          - name: TDF_CYCLES
            description: Data Float Time
            bitOffset: 16
            bitWidth: 4
          - name: TDF_MODE
            description: TDF Optimization
            bitOffset: 20
            bitWidth: 1
          - name: PMEN
            description: Page Mode Enabled
            bitOffset: 24
            bitWidth: 1
          - name: PS
            description: Page Size
            bitOffset: 28
            bitWidth: 2
            enumeratedValues:
              - name: _4_BYTE
                description: 4-byte page
                value: 0
              - name: _8_BYTE
                description: 8-byte page
                value: 1
              - name: _16_BYTE
                description: 16-byte page
                value: 2
              - name: _32_BYTE
                description: 32-byte page
                value: 3
  - name: OCMS
    description: Off-Chip Memory Scrambling Register
    addressOffset: 128
    size: 32
    fields:
      - name: SMSE
        description: Static Memory Controller Scrambling Enable
        bitOffset: 0
        bitWidth: 1
      - name: CS0SE
        description: Chip Select (x = 0 to 3) Scrambling Enable
        bitOffset: 8
        bitWidth: 1
      - name: CS1SE
        description: Chip Select (x = 0 to 3) Scrambling Enable
        bitOffset: 9
        bitWidth: 1
      - name: CS2SE
        description: Chip Select (x = 0 to 3) Scrambling Enable
        bitOffset: 10
        bitWidth: 1
      - name: CS3SE
        description: Chip Select (x = 0 to 3) Scrambling Enable
        bitOffset: 11
        bitWidth: 1
  - name: KEY1
    description: Off-Chip Memory Scrambling KEY1 Register
    addressOffset: 132
    size: 32
    access: write-only
    fields:
      - name: KEY1
        description: Off-Chip Memory Scrambling (OCMS) Key Part 1
        bitOffset: 0
        bitWidth: 32
  - name: KEY2
    description: Off-Chip Memory Scrambling KEY2 Register
    addressOffset: 136
    size: 32
    access: write-only
    fields:
      - name: KEY2
        description: Off-Chip Memory Scrambling (OCMS) Key Part 2
        bitOffset: 0
        bitWidth: 32
  - name: WPMR
    description: Write Protection Mode Register
    addressOffset: 228
    size: 32
    fields:
      - name: WPEN
        description: Write Protect Enable
        bitOffset: 0
        bitWidth: 1
      - name: WPKEY
        description: Write Protection Key
        bitOffset: 8
        bitWidth: 24
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation of the WPEN bit. Always reads as 0.
            value: 5459267
  - name: WPSR
    description: Write Protection Status Register
    addressOffset: 232
    size: 32
    access: read-only
    fields:
      - name: WPVS
        description: Write Protection Violation Status
        bitOffset: 0
        bitWidth: 1
      - name: WPVSRC
        description: Write Protection Violation Source
        bitOffset: 8
        bitWidth: 16
addressBlocks:
  - offset: 0
    size: 236
    usage: registers
