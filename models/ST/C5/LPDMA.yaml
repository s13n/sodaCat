            description: 'write: suspend channel, read: channel suspended.'
            value: 1
      - name: TCIE
        description: transfer complete interrupt enable
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: HTIE
