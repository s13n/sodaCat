name: SSC
version: 6078Q
description: Synchronous Serial Controller
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: RXEN
        description: Receive Enable
        bitOffset: 0
        bitWidth: 1
      - name: RXDIS
        description: Receive Disable
        bitOffset: 1
        bitWidth: 1
      - name: TXEN
        description: Transmit Enable
        bitOffset: 8
        bitWidth: 1
      - name: TXDIS
        description: Transmit Disable
        bitOffset: 9
        bitWidth: 1
      - name: SWRST
        description: Software Reset
        bitOffset: 15
        bitWidth: 1
  - name: CMR
    description: Clock Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: DIV
        description: Clock Divider
        bitOffset: 0
        bitWidth: 12
  - name: RCMR
    description: Receive Clock Mode Register
    addressOffset: 16
    size: 32
    fields:
      - name: CKS
        description: Receive Clock Selection
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: MCK
            description: Divided Clock
            value: 0
          - name: TK
            description: TK Clock signal
            value: 1
          - name: RK
            description: RK pin
            value: 2
      - name: CKO
        description: Receive Clock Output Mode Selection
        bitOffset: 2
        bitWidth: 3
        enumeratedValues:
          - name: NONE
            description: None, RK pin is an input
            value: 0
          - name: CONTINUOUS
            description: Continuous Receive Clock, RK pin is an output
            value: 1
          - name: TRANSFER
            description: Receive Clock only during data transfers, RK pin is an output
            value: 2
      - name: CKI
        description: Receive Clock Inversion
        bitOffset: 5
        bitWidth: 1
      - name: CKG
        description: Receive Clock Gating Selection
        bitOffset: 6
        bitWidth: 2
        enumeratedValues:
          - name: CONTINUOUS
            description: None
            value: 0
          - name: EN_RF_LOW
            description: Receive Clock enabled only if RF Low
            value: 1
          - name: EN_RF_HIGH
            description: Receive Clock enabled only if RF High
            value: 2
      - name: START
        description: Receive Start Selection
        bitOffset: 8
        bitWidth: 4
        enumeratedValues:
          - name: CONTINUOUS
            description: Continuous, as soon as the receiver is enabled, and immediately after the end of transfer of the previous data.
            value: 0
          - name: TRANSMIT
            description: Transmit start
            value: 1
          - name: RF_LOW
            description: Detection of a low level on RF signal
            value: 2
          - name: RF_HIGH
            description: Detection of a high level on RF signal
            value: 3
          - name: RF_FALLING
            description: Detection of a falling edge on RF signal
            value: 4
          - name: RF_RISING
            description: Detection of a rising edge on RF signal
            value: 5
          - name: RF_LEVEL
            description: Detection of any level change on RF signal
            value: 6
          - name: RF_EDGE
            description: Detection of any edge on RF signal
            value: 7
          - name: CMP_0
            description: Compare 0
            value: 8
      - name: STOP
        description: Receive Stop Selection
        bitOffset: 12
        bitWidth: 1
      - name: STTDLY
        description: Receive Start Delay
        bitOffset: 16
        bitWidth: 8
      - name: PERIOD
        description: Receive Period Divider Selection
        bitOffset: 24
        bitWidth: 8
  - name: RFMR
    description: Receive Frame Mode Register
    addressOffset: 20
    size: 32
    fields:
      - name: DATLEN
        description: Data Length
        bitOffset: 0
        bitWidth: 5
      - name: LOOP
        description: Loop Mode
        bitOffset: 5
        bitWidth: 1
      - name: MSBF
        description: Most Significant Bit First
        bitOffset: 7
        bitWidth: 1
      - name: DATNB
        description: Data Number per Frame
        bitOffset: 8
        bitWidth: 4
      - name: FSLEN
        description: Receive Frame Sync Length
        bitOffset: 16
        bitWidth: 4
      - name: FSOS
        description: Receive Frame Sync Output Selection
        bitOffset: 20
        bitWidth: 3
        enumeratedValues:
          - name: NONE
            description: None, RF pin is an input
            value: 0
          - name: NEGATIVE
            description: Negative Pulse, RF pin is an output
            value: 1
          - name: POSITIVE
            description: Positive Pulse, RF pin is an output
            value: 2
          - name: LOW
            description: Driven Low during data transfer, RF pin is an output
            value: 3
          - name: HIGH
            description: Driven High during data transfer, RF pin is an output
            value: 4
          - name: TOGGLING
            description: Toggling at each start of data transfer, RF pin is an output
            value: 5
      - name: FSEDGE
        description: Frame Sync Edge Detection
        bitOffset: 24
        bitWidth: 1
        enumeratedValues:
          - name: POSITIVE
            description: Positive Edge Detection
            value: 0
          - name: NEGATIVE
            description: Negative Edge Detection
            value: 1
      - name: FSLEN_EXT
        description: FSLEN Field Extension
        bitOffset: 28
        bitWidth: 4
  - name: TCMR
    description: Transmit Clock Mode Register
    addressOffset: 24
    size: 32
    fields:
      - name: CKS
        description: Transmit Clock Selection
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: MCK
            description: Divided Clock
            value: 0
          - name: RK
            description: RK Clock signal
            value: 1
          - name: TK
            description: TK pin
            value: 2
      - name: CKO
        description: Transmit Clock Output Mode Selection
        bitOffset: 2
        bitWidth: 3
        enumeratedValues:
          - name: NONE
            description: None, TK pin is an input
            value: 0
          - name: CONTINUOUS
            description: Continuous Transmit Clock, TK pin is an output
            value: 1
          - name: TRANSFER
            description: Transmit Clock only during data transfers, TK pin is an output
            value: 2
      - name: CKI
        description: Transmit Clock Inversion
        bitOffset: 5
        bitWidth: 1
      - name: CKG
        description: Transmit Clock Gating Selection
        bitOffset: 6
        bitWidth: 2
        enumeratedValues:
          - name: CONTINUOUS
            description: None
            value: 0
          - name: EN_TF_LOW
            description: Transmit Clock enabled only if TF Low
            value: 1
          - name: EN_TF_HIGH
            description: Transmit Clock enabled only if TF High
            value: 2
      - name: START
        description: Transmit Start Selection
        bitOffset: 8
        bitWidth: 4
        enumeratedValues:
          - name: CONTINUOUS
            description: Continuous, as soon as a word is written in the SSC_THR (if Transmit is enabled), and immediately after the end of transfer of the previous data
            value: 0
          - name: RECEIVE
            description: Receive start
            value: 1
          - name: TF_LOW
            description: Detection of a low level on TF signal
            value: 2
          - name: TF_HIGH
            description: Detection of a high level on TF signal
            value: 3
          - name: TF_FALLING
            description: Detection of a falling edge on TF signal
            value: 4
          - name: TF_RISING
            description: Detection of a rising edge on TF signal
            value: 5
          - name: TF_LEVEL
            description: Detection of any level change on TF signal
            value: 6
          - name: TF_EDGE
            description: Detection of any edge on TF signal
            value: 7
      - name: STTDLY
        description: Transmit Start Delay
        bitOffset: 16
        bitWidth: 8
      - name: PERIOD
        description: Transmit Period Divider Selection
        bitOffset: 24
        bitWidth: 8
  - name: TFMR
    description: Transmit Frame Mode Register
    addressOffset: 28
    size: 32
    fields:
      - name: DATLEN
        description: Data Length
        bitOffset: 0
        bitWidth: 5
      - name: DATDEF
        description: Data Default Value
        bitOffset: 5
        bitWidth: 1
      - name: MSBF
        description: Most Significant Bit First
        bitOffset: 7
        bitWidth: 1
      - name: DATNB
        description: Data Number per Frame
        bitOffset: 8
        bitWidth: 4
      - name: FSLEN
        description: Transmit Frame Sync Length
        bitOffset: 16
        bitWidth: 4
      - name: FSOS
        description: Transmit Frame Sync Output Selection
        bitOffset: 20
        bitWidth: 3
        enumeratedValues:
          - name: NONE
            description: None, TF pin is an input
            value: 0
          - name: NEGATIVE
            description: Negative Pulse, TF pin is an output
            value: 1
          - name: POSITIVE
            description: Positive Pulse, TF pin is an output
            value: 2
          - name: LOW
            description: Driven Low during data transfer
            value: 3
          - name: HIGH
            description: Driven High during data transfer
            value: 4
          - name: TOGGLING
            description: Toggling at each start of data transfer
            value: 5
      - name: FSDEN
        description: Frame Sync Data Enable
        bitOffset: 23
        bitWidth: 1
      - name: FSEDGE
        description: Frame Sync Edge Detection
        bitOffset: 24
        bitWidth: 1
        enumeratedValues:
          - name: POSITIVE
            description: Positive Edge Detection
            value: 0
          - name: NEGATIVE
            description: Negative Edge Detection
            value: 1
      - name: FSLEN_EXT
        description: FSLEN Field Extension
        bitOffset: 28
        bitWidth: 4
  - name: RHR
    description: Receive Holding Register
    addressOffset: 32
    size: 32
    access: read-only
    fields:
      - name: RDAT
        description: Receive Data
        bitOffset: 0
        bitWidth: 32
  - name: THR
    description: Transmit Holding Register
    addressOffset: 36
    size: 32
    access: write-only
    fields:
      - name: TDAT
        description: Transmit Data
        bitOffset: 0
        bitWidth: 32
  - name: RSHR
    description: Receive Sync. Holding Register
    addressOffset: 48
    size: 32
    access: read-only
    fields:
      - name: RSDAT
        description: Receive Synchronization Data
        bitOffset: 0
        bitWidth: 16
  - name: TSHR
    description: Transmit Sync. Holding Register
    addressOffset: 52
    size: 32
    fields:
      - name: TSDAT
        description: Transmit Synchronization Data
        bitOffset: 0
        bitWidth: 16
  - name: RC0R
    description: Receive Compare 0 Register
    addressOffset: 56
    size: 32
    fields:
      - name: CP0
        description: Receive Compare Data 0
        bitOffset: 0
        bitWidth: 16
  - name: RC1R
    description: Receive Compare 1 Register
    addressOffset: 60
    size: 32
    fields:
      - name: CP1
        description: Receive Compare Data 1
        bitOffset: 0
        bitWidth: 16
  - name: SR
    description: Status Register
    addressOffset: 64
    size: 32
    access: read-only
    fields:
      - name: TXRDY
        description: Transmit Ready
        bitOffset: 0
        bitWidth: 1
      - name: TXEMPTY
        description: Transmit Empty
        bitOffset: 1
        bitWidth: 1
      - name: RXRDY
        description: Receive Ready
        bitOffset: 4
        bitWidth: 1
      - name: OVRUN
        description: Receive Overrun
        bitOffset: 5
        bitWidth: 1
      - name: CP0
        description: Compare 0
        bitOffset: 8
        bitWidth: 1
      - name: CP1
        description: Compare 1
        bitOffset: 9
        bitWidth: 1
      - name: TXSYN
        description: Transmit Sync
        bitOffset: 10
        bitWidth: 1
      - name: RXSYN
        description: Receive Sync
        bitOffset: 11
        bitWidth: 1
      - name: TXEN
        description: Transmit Enable
        bitOffset: 16
        bitWidth: 1
      - name: RXEN
        description: Receive Enable
        bitOffset: 17
        bitWidth: 1
  - name: IER
    description: Interrupt Enable Register
    addressOffset: 68
    size: 32
    access: write-only
    fields:
      - name: TXRDY
        description: Transmit Ready Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: TXEMPTY
        description: Transmit Empty Interrupt Enable
        bitOffset: 1
        bitWidth: 1
      - name: RXRDY
        description: Receive Ready Interrupt Enable
        bitOffset: 4
        bitWidth: 1
      - name: OVRUN
        description: Receive Overrun Interrupt Enable
        bitOffset: 5
        bitWidth: 1
      - name: CP0
        description: Compare 0 Interrupt Enable
        bitOffset: 8
        bitWidth: 1
      - name: CP1
        description: Compare 1 Interrupt Enable
        bitOffset: 9
        bitWidth: 1
      - name: TXSYN
        description: Tx Sync Interrupt Enable
        bitOffset: 10
        bitWidth: 1
      - name: RXSYN
        description: Rx Sync Interrupt Enable
        bitOffset: 11
        bitWidth: 1
  - name: IDR
    description: Interrupt Disable Register
    addressOffset: 72
    size: 32
    access: write-only
    fields:
      - name: TXRDY
        description: Transmit Ready Interrupt Disable
        bitOffset: 0
        bitWidth: 1
      - name: TXEMPTY
        description: Transmit Empty Interrupt Disable
        bitOffset: 1
        bitWidth: 1
      - name: RXRDY
        description: Receive Ready Interrupt Disable
        bitOffset: 4
        bitWidth: 1
      - name: OVRUN
        description: Receive Overrun Interrupt Disable
        bitOffset: 5
        bitWidth: 1
      - name: CP0
        description: Compare 0 Interrupt Disable
        bitOffset: 8
        bitWidth: 1
      - name: CP1
        description: Compare 1 Interrupt Disable
        bitOffset: 9
        bitWidth: 1
      - name: TXSYN
        description: Tx Sync Interrupt Enable
        bitOffset: 10
        bitWidth: 1
      - name: RXSYN
        description: Rx Sync Interrupt Enable
        bitOffset: 11
        bitWidth: 1
  - name: IMR
    description: Interrupt Mask Register
    addressOffset: 76
    size: 32
    access: read-only
    fields:
      - name: TXRDY
        description: Transmit Ready Interrupt Mask
        bitOffset: 0
        bitWidth: 1
      - name: TXEMPTY
        description: Transmit Empty Interrupt Mask
        bitOffset: 1
        bitWidth: 1
      - name: RXRDY
        description: Receive Ready Interrupt Mask
        bitOffset: 4
        bitWidth: 1
      - name: OVRUN
        description: Receive Overrun Interrupt Mask
        bitOffset: 5
        bitWidth: 1
      - name: CP0
        description: Compare 0 Interrupt Mask
        bitOffset: 8
        bitWidth: 1
      - name: CP1
        description: Compare 1 Interrupt Mask
        bitOffset: 9
        bitWidth: 1
      - name: TXSYN
        description: Tx Sync Interrupt Mask
        bitOffset: 10
        bitWidth: 1
      - name: RXSYN
        description: Rx Sync Interrupt Mask
        bitOffset: 11
        bitWidth: 1
  - name: WPMR
    description: Write Protection Mode Register
    addressOffset: 228
    size: 32
    fields:
      - name: WPEN
        description: Write Protection Enable
        bitOffset: 0
        bitWidth: 1
      - name: WPKEY
        description: Write Protection Key
        bitOffset: 8
        bitWidth: 24
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation of the WPEN bit.Always reads as 0.
            value: 5460803
  - name: WPSR
    description: Write Protection Status Register
    addressOffset: 232
    size: 32
    access: read-only
    fields:
      - name: WPVS
        description: Write Protection Violation Status
        bitOffset: 0
        bitWidth: 1
      - name: WPVSRC
        description: Write Protect Violation Source
        bitOffset: 8
        bitWidth: 16
addressBlocks:
  - offset: 0
    size: 236
    usage: registers
interrupts:
  - name: INT
    description: Synchronous Serial Controller
