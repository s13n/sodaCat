name: I2S
description: MPS2+ I2S Audio Interface
source: IOTKit_CM33.svd
qemu: stub (unimplemented-device)
interrupts:
  - name: INTR
registers:
  - name: CONTROL
    description: Control Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: TXEN
        description: TX enable
        bitOffset: 0
        bitWidth: 1
      - name: TXIRQEN
        description: TX interrupt enable
        bitOffset: 1
        bitWidth: 1
      - name: RXEN
        description: RX enable
        bitOffset: 2
        bitWidth: 1
      - name: RXIRQEN
        description: RX interrupt enable
        bitOffset: 3
        bitWidth: 1
      - name: TXWLVL
        description: TX FIFO water level for interrupt
        bitOffset: 8
        bitWidth: 3
      - name: RXWLVL
        description: RX FIFO water level for interrupt
        bitOffset: 12
        bitWidth: 3
      - name: CODECRST
        description: CODEC reset (active low)
        bitOffset: 17
        bitWidth: 1
  - name: STATUS
    description: Status Register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: TXIRQ
        description: TX interrupt pending
        bitOffset: 0
        bitWidth: 1
      - name: RXIRQ
        description: RX interrupt pending
        bitOffset: 1
        bitWidth: 1
      - name: TXERR
        description: TX error (underrun)
        bitOffset: 2
        bitWidth: 1
      - name: RXERR
        description: RX error (overrun)
        bitOffset: 3
        bitWidth: 1
  - name: ERROR
    description: Error Status/Clear Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: TXERR
        description: TX underrun error (write 1 to clear)
        bitOffset: 0
        bitWidth: 1
      - name: RXERR
        description: RX overrun error (write 1 to clear)
        bitOffset: 1
        bitWidth: 1
  - name: DIVIDE
    description: Clock Divide Ratio Register
    addressOffset: 12
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DIVIDE
        description: Clock divider (I2S_CLK = MCLK / (2 * (DIVIDE + 1)))
        bitOffset: 0
        bitWidth: 10
  - name: TXBUF
    description: Transmit Data Buffer
    addressOffset: 16
    size: 32
    access: write-only
    resetValue: 0
  - name: RXBUF
    description: Receive Data Buffer
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
addressBlocks:
  - offset: 0
    size: 24
    usage: registers
