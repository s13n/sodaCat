            description: Frequency counters started
            value: 1
        bitOffset: 23
        bitWidth: 1
      - name: CLK_SEL
        description: Clock-source selection for the clock to be measured. All other values are reserved.
        enumeratedValues:
          - name: K_HZ
            description: 32 kHz oscillator (default)
            value: 0
          - name: IRC
            description: IRC
            value: 1
          - name: ENET_RX
            description: ENET_RX_CLK
            value: 2
          - name: ENET_TX
            description: ENET_TX_CLK
            value: 3
          - name: GP_CLKIN
            description: GP_CLKIN
            value: 4
