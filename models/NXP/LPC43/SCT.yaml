name: SCT
description: State Configurable Timer (SCT) with dither engine
groupName: SCT
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CONFIG
    description: Configuration register
    addressOffset: 0
    access: read-write
    resetValue: 32256
    resetMask: 4294967295
    fields:
      - name: UNIFY
        description: SCT operation
        enumeratedValues:
          - name: 16_BIT
            description: 16-bit.The SCT operates as two 16-bit counters named L and H.
            value: 0
          - name: 32_BIT
            description: 32-bit. The SCT operates as a unified 32-bit counter.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: CLKMODE
        description: SCT clock mode
        enumeratedValues:
          - name: BUS_CLOCK
            description: Bus clock. The bus clock clocks the SCT and prescalers.
            value: 0
          - name: PRESCALED_BUS_CLOCK
            description: Prescaled bus clock. The SCT clock is the bus clock, but the prescalers are  enabled to count only when sampling of the input selected by  the CKSEL field finds the selected edge. The minimum pulse  width on the clock input is 1 bus clock period. This mode is the high-performance  sampled-clock mode.
            value: 1
          - name: SCT_INPUT
            description: SCT Input. The input selected by  CKSEL clocks the SCT and prescalers. The input is synchronized to the bus clock and possibly inverted.  The minimum pulse width on the clock input is 1 bus clock  period. This mode is the low-power sampled-clock mode.
            value: 2
          - name: RESERVED
            description: Reserved.
            value: 3
        bitOffset: 1
        bitWidth: 2
      - name: CKSEL
        description: SCT clock select
        enumeratedValues:
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 0.
            value: 0
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 0.
            value: 1
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 1.
            value: 2
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 1.
            value: 3
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 2.
            value: 4
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 2.
            value: 5
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 3.
            value: 6
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 3.
            value: 7
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 4.
            value: 8
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 4.
            value: 9
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 5.
            value: 10
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 5.
            value: 11
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 6.
            value: 12
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 6.
            value: 13
          - name: RISING_EDGES_ON_INPU
            description: Rising edges on input 7.
            value: 14
          - name: FALLING_EDGES_ON_INP
            description: Falling edges on input 7.
            value: 15
        bitOffset: 3
        bitWidth: 4
      - name: NORELAOD_L
        description: A 1 in this bit prevents the lower match and fractional match registers from being  reloaded from their respective reload registers. Software can  write to set or clear this bit at any time. This bit applies to both the  higher and lower registers when the UNIFY bit is set.
        bitOffset: 7
        bitWidth: 1
      - name: NORELOAD_H
        description: A 1 in this bit prevents the higher match and fractional match registers from being  reloaded from their respective reload registers. Software can  write to set or clear this bit at any time. This bit is not used when  the UNIFY bit is set.
        bitOffset: 8
        bitWidth: 1
      - name: INSYNC
        description: Synchronization for input n (bit 9 = input 0, bit 10 = input 1,..., bit 16 = input 7). A 1 in one of these bits subjects the corresponding input to  synchronization to the SCT clock, before it is used to create an  event. If an input is synchronous to the SCT clock, keep its bit 0 for  faster response. When the CKMODE field is 1x, the bit in this field, corresponding  to the input selected by the CKSEL field, is not used.
        bitOffset: 9
        bitWidth: 8
      - name: AUTOLIMIT_L
        description: A one in this bit causes a match on match register 0 to be treated  as a de-facto LIMIT condition without the need to define an  associated event. As with any LIMIT event, this automatic limit causes the  counter to be cleared to zero in uni-directional mode or to change  the direction of count in bi-directional mode. Software can write to set or clear this bit at any time. This bit  applies to both the higher and lower registers when the UNIFY bit  is set.
        bitOffset: 17
        bitWidth: 1
      - name: AUTOLIMIT_H
        description: A one in this bit will cause a match on match register 0 to be treated  as a de-facto LIMIT condition without the need to define an  associated event. As with any LIMIT event, this automatic limit causes the  counter to be cleared to zero in uni-directional mode or to change  the direction of count in bi-directional mode. Software can write to set or clear this bit at any time. This bit is  not used when the UNIFY bit is set.
        bitOffset: 18
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 19
        bitWidth: 13
  - name: CTRL
    description: Control register
    addressOffset: 4
    access: read-write
    resetValue: 262148
    resetMask: 4294967295
    fields:
      - name: DOWN_L
        description: This bit is 1 when the L or unified counter is counting down. Hardware sets this bit   when the counter limit is reached and BIDIR is 1. Hardware clears this bit when the counter reaches 0 or when the counter is counting down and a limit condition occurs.
        bitOffset: 0
        bitWidth: 1
      - name: STOP_L
        description: When this bit is 1 and HALT is 0, the L or unified counter does not run but I/O  events related to the counter can occur. If such an event matches  the mask in the Start register, this bit is cleared and counting  resumes.
        bitOffset: 1
        bitWidth: 1
      - name: HALT_L
        description: When this bit is 1, the L or unified counter does not run and no events can occur.  A reset sets this bit. When the HALT_L bit is one, the STOP_L bit is cleared. If you want to remove the halt condition and keep the SCT in the stop condition (not running), then you can change the halt and stop condition with one single write to this register. Once set, only software can clear this bit to restore counter operation.
        bitOffset: 2
        bitWidth: 1
      - name: CLRCTR_L
        description: Writing a 1 to this bit clears the L or unified counter. This bit always reads as 0.
        bitOffset: 3
        bitWidth: 1
      - name: BIDIR_L
        description: L or unified counter direction select
        enumeratedValues:
          - name: UP
            description: Up. The counter counts up to its limit condition, then is cleared to zero.
            value: 0
          - name: UPDOWN
            description: Up-down. The counter counts up to its limit, then counts down to a limit condition or to 0.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: PRE_L
        description: Specifies the factor by which the SCT clock is prescaled to produce the  L or unified counter clock. The counter clock is clocked at the rate of the SCT  clock divided by PRE_L+1. Clear the counter (by writing a 1  to the CLRCTR bit) whenever changing the PRE value.
        bitOffset: 5
        bitWidth: 8
      - name: RESERVED
        description: Reserved
        bitOffset: 13
        bitWidth: 3
      - name: DOWN_H
        description: This bit is 1 when the H counter is counting down. Hardware sets this bit   when the counter limit is reached and BIDIR is 1. Hardware clears this bit when the counter reaches 0 or when the counter is counting down and a limit condition occurs.
        bitOffset: 16
        bitWidth: 1
      - name: STOP_H
        description: When this bit is 1 and HALT is 0, the H counter does not run but I/O  events related to the counter can occur. If such an event matches  the mask in the Start register, this bit is cleared and counting  resumes.
        bitOffset: 17
        bitWidth: 1
      - name: HALT_H
        description: When this bit is 1, the H counter does not run and no events can occur.  A reset sets this bit. When the HALT_H bit is one, the STOP_H bit is cleared. If you want to remove the halt condition and keep the SCT in the stop condition (not running), then you can change the halt and stop condition with one single write to this register. Once set, this bit can only be cleared by software to restore counter operation.
        bitOffset: 18
        bitWidth: 1
      - name: CLRCTR_H
        description: Writing a 1 to this bit clears the H counter. This bit always reads as 0.
        bitOffset: 19
        bitWidth: 1
      - name: BIDIR_H
        description: Direction select
        enumeratedValues:
          - name: UP
            description: Up. The H counter counts up to its limit condition, then is cleared to zero.
            value: 0
          - name: UPDOWN
            description: Up-down. The H counter counts up to its limit, then counts down to a limit condition or to 0.
            value: 1
        bitOffset: 20
        bitWidth: 1
      - name: PRE_H
        description: Specifies the factor by which the SCT clock is prescaled to produce the  H counter clock. The counter clock is clocked at the rate of the SCT  clock divided by PRELH+1. Clear the counter (by writing a 1  to the CLRCTR bit) whenever changing the PRE value.
        bitOffset: 21
        bitWidth: 8
      - name: RESERVED
        description: Reserved
        bitOffset: 29
        bitWidth: 3
  - name: LIMIT
    description: Limit register
    addressOffset: 8
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LIMMSK_L
        description: If bit n is one, event n is used as a counter limit event for the L or unified counter (event 0 = bit 0, event 1 = bit 1, event 15 = bit 15).
        bitOffset: 0
        bitWidth: 16
      - name: LIMMSK_H
        description: If bit n is one, event n is used as a counter limit event for the H counter (event 0 = bit 16, event 1 = bit 17, event 15 = bit 31).
        bitOffset: 16
        bitWidth: 16
  - name: HALT
    description: Halt condition register
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HALTMSK_L
        description: If bit n is one, event n sets the HALT_L bit in the CTRL register (event 0 = bit 0, event 1 = bit 1, event 15 = bit 15).
        bitOffset: 0
        bitWidth: 16
      - name: HALTMSK_H
        description: If bit n is one, event n sets the HALT_H bit in the CTRL register (event 0 = bit 16, event 1 = bit 17, event 15 = bit 31).
        bitOffset: 16
        bitWidth: 16
  - name: STOP
    description: Stop condition register
