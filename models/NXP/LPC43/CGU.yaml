        bitWidth: 5
  - name: XTAL_OSC_CTRL
    description: Crystal oscillator control register
    addressOffset: 24
    access: read-write
    resetValue: 5
    resetMask: 4294967295
    fields:
      - name: ENABLE
        description: 'Oscillator-pad enable. Do not change the BYPASS and ENABLE bits in one write-action: this will result in unstable device operation!'
        enumeratedValues:
          - name: ENABLE
            description: Enable
            value: 0
          - name: POWER_DOWN
            description: Power-down (default)
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: BYPASS
        description: 'Configure crystal operation or external-clock input pin XTAL1. Do not change the BYPASS and ENABLE bits in one write-action: this will result in unstable device operation!'
        enumeratedValues:
          - name: CRYSTAL
            description: Crystal. Operation with crystal connected (default).
            value: 0
          - name: BYPASS_MODE
            description: Bypass mode. Use this mode when an external clock source is used instead of a crystal.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: HF
        description: Select frequency range
        enumeratedValues:
          - name: LOW
            description: Low. Oscillator low-frequency mode (crystal or external clock source 1 to 20 MHz). Between 15 MHz and 20 MHz, the state of the HF bit is don't care.
            value: 0
          - name: HIGH
            description: High. Oscillator high-frequency mode; crystal or external clock source 15 to 25 MHz. Between 15 MHz and 20 MHz, the state of the HF bit is don't care.
