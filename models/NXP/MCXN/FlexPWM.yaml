    description: Control 2 Register
    addressOffset: 4
    size: 16
    access: read-write
    resetValue: 0
    resetMask: 65535
    fields:
      - name: CLK_SEL
        description: Clock Source Select
        bitOffset: 0
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: IPBUS
            description: The IPBus clock is used as the clock for the local prescaler and counter.
            value: 0
          - name: EXT_CLK
            description: EXT_CLK is used as the clock for the local prescaler and counter.
            value: 1
          - name: AUX_CLK
            description: Submodule 0's clock (AUX_CLK) is used as the source clock for the local prescaler and counter. This setting should not be used in submodule 0 as it forces the clock to logic 0.
            value: 2
      - name: RELOAD_SEL
        description: Reload Source Select
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: LOCAL
            description: The local RELOAD signal is used to reload registers.
            value: 0
          - name: MASTER
            description: The master RELOAD signal (from submodule 0) is used to reload registers. This setting should not be used in submodule 0 as it forces the RELOAD signal to logic 0.
            value: 1
      - name: FORCE_SEL
        description: Force Select
        bitOffset: 3
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: LOCAL
            description: The local force signal, CTRL2[FORCE], from this submodule is used to force updates.
            value: 0
          - name: MASTER
            description: The master force signal from submodule 0 is used to force updates. This setting should not be used in submodule 0 as it holds the FORCE OUTPUT signal to logic 0.
            value: 1
          - name: LOCAL_RELOAD
            description: The local reload signal from this submodule is used to force updates without regard to the state of LDOK.
            value: 2
          - name: MASTER_RELOAD
            description: The master reload signal from submodule0 is used to force updates if LDOK is set. This setting should not be used in submodule0 as it holds the FORCE OUTPUT signal to logic 0.
            value: 3
          - name: LOCAL_SYNC
            description: The local sync signal from this submodule is used to force updates.
            value: 4
          - name: MASTER_SYNC
            description: The master sync signal from submodule0 is used to force updates. This setting should not be used in submodule0 as it holds the FORCE OUTPUT signal to logic 0.
            value: 5
          - name: EXT_FORCE
            description: The external force signal, EXT_FORCE, from outside the PWM module causes updates.
            value: 6
          - name: EXT_SYNC
            description: The external sync signal, EXT_SYNC, from outside the PWM module causes updates.
            value: 7
      - name: FORCE
        description: Force Initialization
        bitOffset: 6
        bitWidth: 1
        access: read-write
      - name: FRCEN
        description: Force Enable
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: Initialization from a FORCE_OUT is disabled.
            value: 0
          - name: ENABLED
            description: Initialization from a FORCE_OUT is enabled.
            value: 1
      - name: INIT_SEL
        description: Initialization Control Select
        bitOffset: 8
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: PWM_X
            description: Local sync (PWM_X) causes initialization.
            value: 0
          - name: MASTER_RELOAD
            description: Master reload from submodule 0 causes initialization. This setting should not be used in submodule 0 as it forces the INIT signal to logic 0. The submodule counter will only re-initialize when a master reload occurs.
            value: 1
          - name: MASTER_SYNC
            description: Master sync from submodule 0 causes initialization. This setting should not be used in submodule 0 as it forces the INIT signal to logic 0.
            value: 2
          - name: EXT_SYNC
            description: EXT_SYNC causes initialization.
            value: 3
      - name: PWMX_INIT
        description: PWM_X Initial Value
        bitOffset: 10
        bitWidth: 1
        access: read-write
      - name: PWM45_INIT
        description: PWM45 Initial Value
        bitOffset: 11
