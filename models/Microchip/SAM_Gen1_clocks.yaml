  # PIDs 69 / 70 live in an extended PCER register pair on the SAME70/V71
  # silicon — gated via PMC_PCR (PID + CMD = 1 + EN = 1) rather than via
  # PCERx bits.  We model the gate logically; the actual access path is a
  # banked PMC_PCR write per peripheral.
  - { name: I2SC0_CLK, input: mck, output: periph_clk_i2sc0, control: { reg: PCR, field: EN } }
  - { name: I2SC1_CLK, input: mck, output: periph_clk_i2sc1, control: { reg: PCR, field: EN } }

  # GCK enable bits (PMC_PCR.GCLKEN with PID = 69 / 70).
  - name: GCK_I2SC0_EN
    input: gck_i2sc0_div
    output: gck_i2sc0
    description: "I2SC0 generic-clock enable (PMC_PCR.GCLKEN with PID = 69, CMD = 1)."
    control: { reg: PCR, field: GCLKEN }
  - name: GCK_I2SC1_EN
    input: gck_i2sc1_div
    output: gck_i2sc1
    description: "I2SC1 generic-clock enable (PMC_PCR.GCLKEN with PID = 70, CMD = 1)."
    control: { reg: PCR, field: GCLKEN }
