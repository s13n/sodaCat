name: DACC
version: 11246E
description: Digital-to-analog converter controller
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: MAXS0
        description: Max Speed Mode for Channel 0
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: TRIG_EVENT
            description: External trigger mode or Free-running mode enabled. (See TRGENx.DACC_TRIGR.)
            value: 0
          - name: MAXIMUM
            description: Max speed mode enabled.
            value: 1
      - name: MAXS1
        description: Max Speed Mode for Channel 1
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: TRIG_EVENT
            description: External trigger mode or Free-running mode enabled. (See TRGENx.DACC_TRIGR.)
            value: 0
          - name: MAXIMUM
            description: Max speed mode enabled.
            value: 1
      - name: WORD
        description: Word Transfer Mode
        bitOffset: 4
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: One data to convert is written to the FIFO per access to DACC.
            value: 0
          - name: ENABLED
            description: Two data to convert are written to the FIFO per access to DACC (reduces the number of requests to DMA and the number of system bus accesses).
            value: 1
      - name: ZERO
        description: Must always be written to 0.
        bitOffset: 5
        bitWidth: 1
      - name: DIFF
        description: Differential Mode
        bitOffset: 23
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: DAC0 and DAC1 are single-ended outputs.
            value: 0
          - name: ENABLED
            description: DACP and DACN are differential outputs. The differential level is configured by the channel 0 value.
            value: 1
      - name: PRESCALER
        description: Peripheral Clock to DAC Clock Ratio
        bitOffset: 24
        bitWidth: 4
  - name: TRIGR
    description: Trigger Register
    addressOffset: 8
    size: 32
    fields:
      - name: TRGEN0
        description: Trigger Enable of Channel 0
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: External trigger mode disabled. DACC is in Free-running mode or Max speed mode.
            value: 0
          - name: EN
            description: External trigger mode enabled.
            value: 1
      - name: TRGEN1
        description: Trigger Enable of Channel 1
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: External trigger mode disabled. DACC is in Free-running mode or Max speed mode.
            value: 0
          - name: EN
            description: External trigger mode enabled.
            value: 1
      - name: TRGSEL0
        description: Trigger Selection of Channel 0
        bitOffset: 4
        bitWidth: 3
        enumeratedValues:
          - name: TRGSEL0
            description: DAC External Trigger Input (DATRG)
            value: 0
          - name: TRGSEL1
            description: TC0 Channel 0 Output (TIOA0)
            value: 1
          - name: TRGSEL2
            description: TC0 Channel 1 Output (TIOA1)
            value: 2
          - name: TRGSEL3
            description: TC0 Channel 2 Output (TIOA2)
            value: 3
          - name: TRGSEL4
            description: PWM0 Event Line 0
            value: 4
          - name: TRGSEL5
            description: PWM0 Event Line 1
            value: 5
          - name: TRGSEL6
            description: PWM1 Event Line 0
            value: 6
          - name: TRGSEL7
            description: PWM1 Event Line 1
            value: 7
      - name: TRGSEL1
        description: Trigger Selection of Channel 1
        bitOffset: 8
        bitWidth: 3
        enumeratedValues:
          - name: TRGSEL0
            description: DAC External Trigger Input (DATRG)
            value: 0
          - name: TRGSEL1
            description: TC0 Channel 0 Output (TIOA0)
            value: 1
          - name: TRGSEL2
            description: TC0 Channel 1 Output (TIOA1)
            value: 2
          - name: TRGSEL3
            description: TC0 Channel 2 Output (TIOA2)
            value: 3
          - name: TRGSEL4
            description: PWM0 Event Line 0
            value: 4
          - name: TRGSEL5
            description: PWM0 Event Line 1
            value: 5
          - name: TRGSEL6
            description: PWM1 Event Line 0
            value: 6
          - name: TRGSEL7
            description: PWM1 Event Line 1
            value: 7
      - name: OSR0
        description: Over Sampling Ratio of Channel 0
        bitOffset: 16
        bitWidth: 3
        enumeratedValues:
          - name: OSR_1
            description: OSR = 1
            value: 0
          - name: OSR_2
            description: OSR = 2
            value: 1
          - name: OSR_4
            description: OSR = 4
            value: 2
          - name: OSR_8
            description: OSR = 8
            value: 3
          - name: OSR_16
            description: OSR = 16
            value: 4
          - name: OSR_32
            description: OSR = 32
            value: 5
      - name: OSR1
        description: Over Sampling Ratio of Channel 1
        bitOffset: 20
        bitWidth: 3
        enumeratedValues:
          - name: OSR_1
            description: OSR = 1
            value: 0
          - name: OSR_2
            description: OSR = 2
            value: 1
          - name: OSR_4
            description: OSR = 4
            value: 2
          - name: OSR_8
            description: OSR = 8
            value: 3
          - name: OSR_16
            description: OSR = 16
            value: 4
          - name: OSR_32
            description: OSR = 32
            value: 5
  - name: CHER
    description: Channel Enable Register
    addressOffset: 16
    size: 32
    access: write-only
    fields:
      - name: CH0
        description: Channel 0 Enable
        bitOffset: 0
        bitWidth: 1
      - name: CH1
        description: Channel 1 Enable
        bitOffset: 1
        bitWidth: 1
  - name: CHDR
    description: Channel Disable Register
    addressOffset: 20
    size: 32
    access: write-only
    fields:
      - name: CH0
        description: Channel 0 Disable
        bitOffset: 0
        bitWidth: 1
      - name: CH1
        description: Channel 1 Disable
        bitOffset: 1
        bitWidth: 1
  - name: CHSR
    description: Channel Status Register
    addressOffset: 24
    size: 32
    access: read-only
    fields:
      - name: CH0
        description: Channel 0 Status
        bitOffset: 0
        bitWidth: 1
      - name: CH1
        description: Channel 1 Status
        bitOffset: 1
        bitWidth: 1
      - name: DACRDY0
        description: DAC Ready Flag
        bitOffset: 8
        bitWidth: 1
      - name: DACRDY1
        description: DAC Ready Flag
        bitOffset: 9
        bitWidth: 1
  - dim: 2
    dimIncrement: 4
    name: CDR[%s]
    description: Conversion Data Register 0
    addressOffset: 28
    size: 32
    access: write-only
    fields:
      - name: DATA0
        description: Data to Convert for channel 0
        bitOffset: 0
        bitWidth: 16
      - name: DATA1
        description: Data to Convert for channel 1
        bitOffset: 16
        bitWidth: 16
  - name: IER
    description: Interrupt Enable Register
    addressOffset: 36
    size: 32
    access: write-only
    fields:
      - name: TXRDY0
        description: Transmit Ready Interrupt Enable of channel 0
        bitOffset: 0
        bitWidth: 1
      - name: TXRDY1
        description: Transmit Ready Interrupt Enable of channel 1
        bitOffset: 1
        bitWidth: 1
      - name: EOC0
        description: End of Conversion Interrupt Enable of channel 0
        bitOffset: 4
        bitWidth: 1
      - name: EOC1
        description: End of Conversion Interrupt Enable of channel 1
        bitOffset: 5
        bitWidth: 1
  - name: IDR
    description: Interrupt Disable Register
    addressOffset: 40
    size: 32
    access: write-only
    fields:
      - name: TXRDY0
        description: Transmit Ready Interrupt Disable of channel 0
        bitOffset: 0
        bitWidth: 1
      - name: TXRDY1
        description: Transmit Ready Interrupt Disable of channel 1
        bitOffset: 1
        bitWidth: 1
      - name: EOC0
        description: End of Conversion Interrupt Disable of channel 0
        bitOffset: 4
        bitWidth: 1
      - name: EOC1
        description: End of Conversion Interrupt Disable of channel 1
        bitOffset: 5
        bitWidth: 1
  - name: IMR
    description: Interrupt Mask Register
    addressOffset: 44
    size: 32
    access: read-only
    fields:
      - name: TXRDY0
        description: Transmit Ready Interrupt Mask of channel 0
        bitOffset: 0
        bitWidth: 1
      - name: TXRDY1
        description: Transmit Ready Interrupt Mask of channel 1
        bitOffset: 1
        bitWidth: 1
      - name: EOC0
        description: End of Conversion Interrupt Mask of channel 0
        bitOffset: 4
        bitWidth: 1
      - name: EOC1
        description: End of Conversion Interrupt Mask of channel 1
        bitOffset: 5
        bitWidth: 1
  - name: ISR
    description: Interrupt Status Register
    addressOffset: 48
    size: 32
    access: read-only
    fields:
      - name: TXRDY0
        description: Transmit Ready Interrupt Flag of channel 0
        bitOffset: 0
        bitWidth: 1
      - name: TXRDY1
        description: Transmit Ready Interrupt Flag of channel 1
        bitOffset: 1
        bitWidth: 1
      - name: EOC0
        description: End of Conversion Interrupt Flag of channel 0
        bitOffset: 4
        bitWidth: 1
      - name: EOC1
        description: End of Conversion Interrupt Flag of channel 1
        bitOffset: 5
        bitWidth: 1
  - name: ACR
    description: Analog Current Register
    addressOffset: 148
    size: 32
    fields:
      - name: IBCTLCH0
        description: Analog Output Current Control
        bitOffset: 0
        bitWidth: 2
      - name: IBCTLCH1
        description: Analog Output Current Control
        bitOffset: 2
        bitWidth: 2
  - name: WPMR
    description: Write Protection Mode Register
    addressOffset: 228
    size: 32
    fields:
      - name: WPEN
        description: Write Protection Enable
        bitOffset: 0
        bitWidth: 1
      - name: WPKEY
        description: Write Protect Key
        bitOffset: 8
        bitWidth: 24
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation of bit WPEN.Always reads as 0.
            value: 4473155
  - name: WPSR
    description: Write Protection Status Register
    addressOffset: 232
    size: 32
    access: read-only
    fields:
      - name: WPVS
        description: Write Protection Violation Status
        bitOffset: 0
        bitWidth: 1
      - name: WPVSRC
        description: Write Protection Violation Source
        bitOffset: 8
        bitWidth: 8
addressBlocks:
  - offset: 0
    size: 236
    usage: registers
interrupts:
  - name: INT
    description: Digital To Analog Converter
