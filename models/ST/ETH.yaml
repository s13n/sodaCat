name: ETH
description: Ethernet MAC (Synopsys DWC EQOS)
groupName: ETH
source: STM32H5E5 SVD v1.0
params:
  - name: has_mdio_intr
    type: bool
    default: false
    description: MDIO completion interrupt (MDIOIS/MDIOIE in MACISR/MACIER)
registers:
  - name: MACCR
    displayName: MACCR
    description: Operating mode configuration register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 32768
    resetMask: 4294967295
    fields:
      - name: RE
        description: Receiver Enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: TE
        description: Transmitter Enable
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: PRELEN
        description: Preamble Length for Transmit packets
        bitOffset: 2
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 7 bytes of preamble
            value: 0
          - name: B_0x1
            description: 5 bytes of preamble
            value: 1
          - name: B_0x2
            description: 3 bytes of preamble
            value: 2
      - name: DC
        description: Deferral Check
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: BL
        description: Back-Off Limit
        bitOffset: 5
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: k= min (n, 10)
            value: 0
          - name: B_0x1
            description: k = min (n, 8)
            value: 1
          - name: B_0x2
            description: k = min (n, 4)
            value: 2
          - name: B_0x3
            description: k = min (n, 1)
            value: 3
      - name: DR
        description: Disable Retry
        bitOffset: 8
        bitWidth: 1
        access: read-write
      - name: DCRS
        description: Disable Carrier Sense During Transmission
        bitOffset: 9
        bitWidth: 1
        access: read-write
      - name: DO
        description: Disable Receive Own
        bitOffset: 10
        bitWidth: 1
        access: read-write
      - name: ECRSFD
        description: Enable Carrier Sense Before Transmission in Full-duplex mode
        bitOffset: 11
        bitWidth: 1
        access: read-write
      - name: LM
        description: Loopback Mode
        bitOffset: 12
        bitWidth: 1
        access: read-write
      - name: DM
        description: Duplex Mode
        bitOffset: 13
        bitWidth: 1
        access: read-write
      - name: FES
        description: MAC Speed
        bitOffset: 14
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 10 Mbps
            value: 0
          - name: B_0x1
            description: 100 Mbps
            value: 1
      - name: JE
        description: Jumbo Packet Enable
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: JD
        description: Jabber Disable
        bitOffset: 17
        bitWidth: 1
        access: read-write
      - name: WD
        description: Watchdog Disable
        bitOffset: 19
        bitWidth: 1
        access: read-write
      - name: ACS
        description: Automatic Pad or CRC Stripping
        bitOffset: 20
        bitWidth: 1
        access: read-write
      - name: CST
        description: CRC stripping for Type packets
        bitOffset: 21
        bitWidth: 1
        access: read-write
      - name: S2KP
        description: IEEE 802.
        bitOffset: 22
        bitWidth: 1
        access: read-write
      - name: GPSLCE
        description: Giant Packet Size Limit Control Enable
        bitOffset: 23
        bitWidth: 1
        access: read-write
      - name: IPG
        description: Inter-Packet Gap
        bitOffset: 24
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 96 bit times
            value: 0
          - name: B_0x1
            description: 88 bit times
            value: 1
          - name: B_0x2
            description: 80 bit times
            value: 2
          - name: B_0x7
            description: 40 bit times
            value: 7
      - name: IPC
        description: Checksum Offload
        bitOffset: 27
        bitWidth: 1
        access: read-write
      - name: SARC
        description: Source Address Insertion or Replacement Control
        bitOffset: 28
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x2
            description: the MAC inserts the content of the MAC Address 0 registers (MAC Address 0 high register (ETH_MACA0HR) and MAC Address x low register (ETH_MACAxLR)) in the SA field of all transmitted packets.
            value: 2
          - name: B_0x3
            description: the MAC replaces the content of the MAC Address 0 registers (MAC Address 0 high register (ETH_MACA0HR) and MAC Address x low register (ETH_MACAxLR)) in the SA field of all transmitted packets.
            value: 3
          - name: B_0x6
            description: the MAC inserts the content of the MAC Address 1 registers (MAC Address x high register (ETH_MACAxHR) and MAC Address x low register (ETH_MACAxLR)) in the SA field of all transmitted packets
            value: 6
          - name: B_0x7
            description: the MAC replaces the content of the MAC Address 1 registers (MAC Address x high register (ETH_MACAxHR) and MAC Address x low register (ETH_MACAxLR)) in the SA field of all transmitted packets.
            value: 7
      - name: ARPEN
        description: ARP Offload Enable
        bitOffset: 31
        bitWidth: 1
        access: read-write
  - name: MACECR
    displayName: MACECR
    description: Extended operating mode configuration register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GPSL
        description: Giant Packet Size Limit
        bitOffset: 0
        bitWidth: 14
        access: read-write
      - name: DCRCC
        description: Disable CRC Checking for Received Packets
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: SPEN
        description: Slow Protocol Detection Enable
        bitOffset: 17
        bitWidth: 1
        access: read-write
      - name: USP
        description: Unicast Slow Protocol Packet Detect
        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: EIPGEN
        description: Extended Inter-Packet Gap Enable
        bitOffset: 24
        bitWidth: 1
        access: read-write
      - name: EIPG
        description: Extended Inter-Packet Gap
        bitOffset: 25
        bitWidth: 5
        access: read-write
      - name: APDIM
        description: ARP Packet Drop if IP Address Mismatch
        bitOffset: 30
        bitWidth: 1
        access: read-write
  - name: MACPFR
    displayName: MACPFR
    description: Packet filtering control register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PR
        description: Promiscuous Mode
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: HUC
        description: Hash Unicast
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: HMC
        description: Hash Multicast
        bitOffset: 2
        bitWidth: 1
        access: read-write
      - name: DAIF
        description: DA Inverse Filtering
        bitOffset: 3
        bitWidth: 1
        access: read-write
      - name: PM
        description: Pass All Multicast
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: DBF
        description: Disable Broadcast Packets
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: PCF
        description: Pass Control Packets
        bitOffset: 6
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: The MAC filters all control packets from reaching the application.
            value: 0
          - name: B_0x1
            description: The MAC forwards all control packets except Pause packets to the application even if they fail the Address filter.
            value: 1
          - name: B_0x2
            description: The MAC forwards all control packets to the application even if they fail the Address filter.
            value: 2
          - name: B_0x3
            description: The MAC forwards the control packets that pass the Address filter.
            value: 3
      - name: SAIF
        description: SA Inverse Filtering
        bitOffset: 8
        bitWidth: 1
        access: read-write
      - name: SAF
        description: Source Address Filter Enable
        bitOffset: 9
        bitWidth: 1
        access: read-write
      - name: HPF
        description: Hash or Perfect Filter
        bitOffset: 10
        bitWidth: 1
        access: read-write
      - name: VTFE
        description: VLAN Tag Filter Enable
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: IPFE
        description: Layer 3 and Layer 4 Filter Enable
        bitOffset: 20
        bitWidth: 1
        access: read-write
      - name: DNTU
        description: Drop Non-TCP/UDP over IP Packets
        bitOffset: 21
        bitWidth: 1
        access: read-write
      - name: RA
        description: Receive All
        bitOffset: 31
        bitWidth: 1
        access: read-write
  - name: MACWJBTR
    displayName: MACWJBTR
    description: Watchdog and jabber timeout register
    addressOffset: 12
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: WTO
        description: Watchdog Timeout
        bitOffset: 0
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 2 Kbytes
            value: 0
          - name: B_0x1
            description: 3 Kbytes
            value: 1
          - name: B_0x2
            description: 4 Kbytes
            value: 2
          - name: B_0x3
            description: 5 Kbytes
            value: 3
          - name: B_0xC
            description: 14 Kbytes
            value: 12
          - name: B_0xD
            description: 15 Kbytes
            value: 13
          - name: B_0xE
            description: 16383 Bytes
            value: 14
      - name: PWE
        description: Programmable Watchdog Enable
        bitOffset: 8
        bitWidth: 1
        access: read-write
      - name: JTO
        description: Jabber Timeout
        bitOffset: 16
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 2 Kbytes
            value: 0
          - name: B_0x1
            description: 3 Kbytes
            value: 1
          - name: B_0x2
            description: 4 Kbytes
            value: 2
          - name: B_0x3
            description: 5 Kbytes
            value: 3
          - name: B_0xC
            description: 14 Kbytes
            value: 12
          - name: B_0xD
            description: 15 Kbytes
            value: 13
          - name: B_0xE
            description: 16383 Bytes
            value: 14
      - name: PJE
        description: Programmable Jabber Enable
        bitOffset: 24
        bitWidth: 1
        access: read-write
  - name: MACHT0R
    displayName: MACHT0R
    description: Hash Table 0 register
    addressOffset: 16
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HT31T0
        description: MAC Hash Table First 32 Bits
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: MACHT1R
    displayName: MACHT1R
    description: Hash Table 1 register
    addressOffset: 20
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HT63T32
        description: MAC Hash Table Second 32 Bits
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: MACVTR
    displayName: MACVTR
    description: VLAN tag register
    addressOffset: 80
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VL
        description: VLAN Tag Identifier for Receive Packets
        bitOffset: 0
        bitWidth: 16
        access: read-write
      - name: ETV
        description: Enable 12-Bit VLAN Tag Comparison
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: VTIM
        description: VLAN Tag Inverse Match Enable
        bitOffset: 17
        bitWidth: 1
        access: read-write
      - name: ESVL
        description: Enable S-VLAN
        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: ERSVLM
        description: Enable Receive S-VLAN Match
        bitOffset: 19
        bitWidth: 1
        access: read-write
      - name: DOVLTC
        description: Disable VLAN Type Check
        bitOffset: 20
        bitWidth: 1
        access: read-write
      - name: EVLS
        description: Enable VLAN Tag Stripping on Receive
        bitOffset: 21
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Do not strip
            value: 0
          - name: B_0x1
            description: Strip if VLAN filter passes
            value: 1
          - name: B_0x2
            description: Strip if VLAN filter fails
            value: 2
          - name: B_0x3
            description: Always strip
            value: 3
      - name: EVLRXS
        description: Enable VLAN Tag in Rx status
        bitOffset: 24
        bitWidth: 1
        access: read-write
      - name: VTHM
        description: VLAN Tag Hash Table Match Enable
        bitOffset: 25
        bitWidth: 1
        access: read-write
      - name: EDVLP
        description: Enable Double VLAN Processing
        bitOffset: 26
        bitWidth: 1
        access: read-write
      - name: ERIVLT
        description: Enable Inner VLAN Tag
        bitOffset: 27
        bitWidth: 1
        access: read-write
      - name: EIVLS
        description: Enable Inner VLAN Tag Stripping on Receive
        bitOffset: 28
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Do not strip
            value: 0
          - name: B_0x1
            description: Strip if VLAN filter passes
            value: 1
          - name: B_0x2
            description: Strip if VLAN filter fails
            value: 2
          - name: B_0x3
            description: Always strip
            value: 3
      - name: EIVLRXS
        description: Enable Inner VLAN Tag in Rx Status
        bitOffset: 31
        bitWidth: 1
        access: read-write
  - name: MACVHTR
    displayName: MACVHTR
    description: VLAN Hash table register
    addressOffset: 88
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VLHT
        description: VLAN Hash Table
        bitOffset: 0
        bitWidth: 16
        access: read-write
  - name: MACVIR
    displayName: MACVIR
    description: VLAN inclusion register
    addressOffset: 96
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VLT
        description: VLAN Tag for Transmit Packets
        bitOffset: 0
        bitWidth: 16
        access: read-write
      - name: VLC
        description: VLAN Tag Control in Transmit Packets
        bitOffset: 16
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No VLAN tag deletion, insertion, or replacement
            value: 0
          - name: B_0x1
            description: VLAN tag deletion.
            value: 1
          - name: B_0x2
            description: VLAN tag insertion.
            value: 2
          - name: B_0x3
            description: VLAN tag replacement.
            value: 3
      - name: VLP
        description: VLAN Priority Control
        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: CSVL
        description: C-VLAN or S-VLAN
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: C-LAN
            value: 0
          - name: B_0x1
            description: S-LAN
            value: 1
      - name: VLTI
        description: VLAN Tag Input
        bitOffset: 20
        bitWidth: 1
        access: read-write
  - name: MACIVIR
    displayName: MACIVIR
    description: Inner VLAN inclusion register
    addressOffset: 100
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VLT
        description: VLAN Tag for Transmit Packets
        bitOffset: 0
        bitWidth: 16
        access: read-write
      - name: VLC
        description: VLAN Tag Control in Transmit Packets
        bitOffset: 16
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No VLAN tag deletion, insertion, or replacement
            value: 0
          - name: B_0x1
            description: VLAN tag deletion
            value: 1
          - name: B_0x2
            description: VLAN tag insertion
            value: 2
          - name: B_0x3
            description: VLAN tag replacement
            value: 3
      - name: VLP
        description: VLAN Priority Control
        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: CSVL
        description: C-VLAN or S-VLAN
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: C-LAN
            value: 0
          - name: B_0x1
            description: S-LAN
            value: 1
      - name: VLTI
        description: VLAN Tag Input
        bitOffset: 20
        bitWidth: 1
        access: read-write
  - name: MACQTXFCR
    displayName: MACQTXFCR
    description: Tx Queue flow control register
    addressOffset: 112
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: FCB_BPA
        description: Flow Control Busy or Backpressure Activate
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: TFE
        description: Transmit Flow Control Enable
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: PLT
        description: Pause Low Threshold
        bitOffset: 4
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Pause Time minus 4 Slot Times (PT -4 slot times)
            value: 0
          - name: B_0x1
            description: Pause Time minus 28 Slot Times (PT -28 slot times)
            value: 1
          - name: B_0x2
            description: Pause Time minus 36 Slot Times (PT -36 slot times)
            value: 2
          - name: B_0x3
            description: Pause Time minus 144 Slot Times (PT -144 slot times)
            value: 3
          - name: B_0x4
            description: Pause Time minus 256 Slot Times (PT -256 slot times)
            value: 4
          - name: B_0x5
            description: Pause Time minus 512 Slot Times (PT -512 slot times)
            value: 5
      - name: DZPQ
        description: Disable Zero-Quanta Pause
        bitOffset: 7
        bitWidth: 1
        access: read-write
      - name: PT
        description: Pause Time
        bitOffset: 16
        bitWidth: 16
        access: read-write
  - name: MACRXFCR
    displayName: MACRXFCR
    description: Rx flow control register
    addressOffset: 144
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RFE
        description: Receive Flow Control Enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: UP
        description: Unicast Pause Packet Detect
        bitOffset: 1
        bitWidth: 1
        access: read-write
  - name: MACISR
    displayName: MACISR
    description: Interrupt status register
    addressOffset: 176
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PHYIS
        description: PHY Interrupt
        bitOffset: 3
        bitWidth: 1
        access: read-only
      - name: PMTIS
        description: PMT Interrupt Status
        bitOffset: 4
        bitWidth: 1
        access: read-only
      - name: LPIIS
        description: LPI Interrupt Status
        bitOffset: 5
        bitWidth: 1
        access: read-only
      - name: MMCIS
        description: MMC Interrupt Status
        bitOffset: 8
        bitWidth: 1
        access: read-only
      - name: MMCRXIS
        description: MMC Receive Interrupt Status
        bitOffset: 9
        bitWidth: 1
        access: read-only
      - name: MMCTXIS
        description: MMC Transmit Interrupt Status
        bitOffset: 10
        bitWidth: 1
        access: read-only
      - name: TSIS
        description: Timestamp Interrupt Status
        bitOffset: 12
        bitWidth: 1
        access: read-write
      - name: TXSTSIS
        description: Transmit Status Interrupt
        bitOffset: 13
        bitWidth: 1
        access: read-write
      - name: RXSTSIS
        description: Receive Status Interrupt
        bitOffset: 14
        bitWidth: 1
        access: read-write
      - name: FPEIS
        description: Frame Preemption Interrupt Status
        bitOffset: 17
        bitWidth: 1
        access: read-only
      - name: MDIOIS
        description: MDIO Interrupt Status
        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: MFTIS
        description: MMC FPE Transmit Interrupt Status
        bitOffset: 19
        bitWidth: 1
        access: read-only
      - name: MFRIS
        description: MMC FPE Receive Interrupt Status
        bitOffset: 20
        bitWidth: 1
        access: read-only
  - name: MACIER
    displayName: MACIER
    description: Interrupt enable register
    addressOffset: 180
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PHYIE
        description: PHY Interrupt Enable
        bitOffset: 3
        bitWidth: 1
        access: read-write
      - name: PMTIE
        description: PMT Interrupt Enable
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: LPIIE
        description: LPI Interrupt Enable
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: TSIE
        description: Timestamp Interrupt Enable
        bitOffset: 12
        bitWidth: 1
        access: read-write
      - name: TXSTSIE
        description: Transmit Status Interrupt Enable
        bitOffset: 13
        bitWidth: 1
        access: read-write
      - name: RXSTSIE
        description: Receive Status Interrupt Enable
        bitOffset: 14
        bitWidth: 1
        access: read-write
      - name: FPEIE
        description: Frame Preemption Interrupt Enable
        bitOffset: 17
        bitWidth: 1
        access: read-write
      - name: MDIOIE
        description: MDIO Interrupt Enable
        bitOffset: 18
        bitWidth: 1
        access: read-write
  - name: MACRXTXSR
    displayName: MACRXTXSR
    description: Rx Tx status register
