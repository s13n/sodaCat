# Created from ATSAMV71Q21B.svd (Rev 0)

name: RSWDT
version: 11110G
description: Reinforced Safety Watchdog Timer
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: WDRSTT
        description: Watchdog Restart
        bitOffset: 0
        bitWidth: 1
      - name: KEY
        description: Password
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 196
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: WDV
        description: Watchdog Counter Value
        bitOffset: 0
        bitWidth: 12
      - name: WDFIEN
        description: Watchdog Fault Interrupt Enable
        bitOffset: 12
        bitWidth: 1
      - name: WDRSTEN
        description: Watchdog Reset Enable
        bitOffset: 13
        bitWidth: 1
      - name: WDDIS
        description: Watchdog Disable
        bitOffset: 15
        bitWidth: 1
      - name: ALLONES
        description: Must Always Be Written with 0xFFF
        bitOffset: 16
        bitWidth: 12
      - name: WDDBGHLT
        description: Watchdog Debug Halt
        bitOffset: 28
        bitWidth: 1
      - name: WDIDLEHLT
        description: Watchdog Idle Halt
        bitOffset: 29
        bitWidth: 1
  - name: SR
    description: Status Register
    addressOffset: 8
    size: 32
    access: read-only
    fields:
      - name: WDUNF
        description: Watchdog Underflow
        bitOffset: 0
        bitWidth: 1
interrupts:
  - name: INT
    description: Reinforced Secure Watchdog Timer
addressBlocks:
  - offset: 0
    size: 12
    usage: registers
