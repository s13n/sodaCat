    description: Pin Interrupt Mode
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 255
    fields:
      - name: PMODE
        description: Interrupt mode
        bitOffset: 0
        bitWidth: 8
        access: read-write
        enumeratedValues:
          - name: ISEL_0
            description: In bit n configures the interrupt to be edge-sensitive
            value: 0
          - name: ISEL_1
            description: In bit n configures the interrupt to be level-sensitive
            value: 1
  - name: IENR
    description: Pin Interrupt Level or Rising-Edge Interrupt Enable
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 255
    fields:
      - name: ENRL
        description: Enables Interrupt
        bitOffset: 0
        bitWidth: 8
        access: read-write
        enumeratedValues:
          - name: ENRL_0
            description: In bit n disables the corresponding interrupt
            value: 0
          - name: ENRL_1
            description: In bit n enables the corresponding interrupt
            value: 1
  - name: SIENR
    description: Pin Interrupt Level or Rising-Edge Interrupt Set
    addressOffset: 8
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 0
    modifiedWriteValues: oneToSet
    fields:
      - name: SETENRL
        description: Configures IENR
        bitOffset: 0
        bitWidth: 8
        access: write-only
        modifiedWriteValues: oneToSet
        enumeratedValues:
          - name: SETENRL_0
            description: No operation for interrupt n
            value: 0
          - name: SETENRL_1
            description: Enable rising edge or level interrupt for interrupt n
            value: 1
  - name: CIENR
    description: Pin Interrupt Level (Rising-Edge Interrupt) Clear
