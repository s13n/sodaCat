  - { name: xosc, min: 4000000, max: 48000000,
      description: "External Multipurpose Crystal Oscillator output (4..48 MHz crystal or external clock on XIN)" }
  - { name: xosc_usbhs,
      description: "XOSC after the USBHSDIV prescaler, supplied as USBHS PLL reference" }
  - { name: dfll48m_clk, nominal: 48000000,
      description: "DFLL48M output — 48 MHz calibrated; 8 MHz in DFLLCTRLA.LOWFREQ mode.  In closed loop the output is DFLLMUL.MUL × GCLK_OSCCTRL_DFLL48; in open loop it free-runs at the calibrated frequency." }
  - { name: xosc32k, nominal: 32768,
      description: "32.768 kHz external crystal (XIN32/XOUT32) or external clock in bypass mode" }
  - { name: xosc1k, nominal: 1024,
      description: "32.768 kHz crystal divided down to 1.024 kHz (RTC/HSM clock option)" }
  - { name: osculp32k, nominal: 32768,
      description: "Internal Ultra-Low-Power 32 kHz RC oscillator (always-on; the only clock source available in Backup mode)" }
  - { name: osculp1k, nominal: 1024,
