name: MATRIX
version: 11282L
description: Bus matrix
source: ATSAMV71Q21B SVD Rev 0
registers:
  - dim: 13
    dimIncrement: 4
    name: MCFG[%s]
    description: Master Configuration Register 0
    addressOffset: 0
    size: 32
    fields:
      - name: ULBT
        description: Undefined Length Burst Type
        bitOffset: 0
        bitWidth: 3
        enumeratedValues:
          - name: UNLTD_LENGTH
            description: Unlimited Length Burst-No predicted end of burst is generated, therefore INCR bursts coming from this master can only be broken if the Slave Slot Cycle Limit is reached. If the Slot Cycle Limit is not reached, the burst is normally completed by the master, at the latest, on the next AHB 1-Kbyte address boundary, allowing up to 256-beat word bursts or 128-beat double-word bursts.This value should not be used in the very particular case of a master capable of performing back-to-back undefined length bursts on a single slave, since this could indefinitely freeze the slave arbitration and thus prevent another master from accessing this slave.
            value: 0
          - name: SINGLE_ACCESS
            description: Single Access-The undefined length burst is treated as a succession of single accesses, allowing re-arbitration at each beat of the INCR burst or bursts sequence.
            value: 1
          - name: _4BEAT_BURST
            description: 4-beat Burst-The undefined length burst or bursts sequence is split into 4-beat bursts or less, allowing re-arbitration every 4 beats.
            value: 2
          - name: _8BEAT_BURST
            description: 8-beat Burst-The undefined length burst or bursts sequence is split into 8-beat bursts or less, allowing re-arbitration every 8 beats.
            value: 3
          - name: _16BEAT_BURST
            description: 16-beat Burst-The undefined length burst or bursts sequence is split into 16-beat bursts or less, allowing re-arbitration every 16 beats.
            value: 4
          - name: _32BEAT_BURST
            description: 32-beat Burst -The undefined length burst or bursts sequence is split into 32-beat bursts or less, allowing re-arbitration every 32 beats.
            value: 5
          - name: _64BEAT_BURST
            description: 64-beat Burst-The undefined length burst or bursts sequence is split into 64-beat bursts or less, allowing re-arbitration every 64 beats.
            value: 6
          - name: _128BEAT_BURST
            description: 128-beat Burst-The undefined length burst or bursts sequence is split into 128-beat bursts or less, allowing re-arbitration every 128 beats.
            value: 7
  - dim: 9
    dimIncrement: 4
    name: SCFG[%s]
    description: Slave Configuration Register 0
    addressOffset: 64
    size: 32
    fields:
      - name: SLOT_CYCLE
        description: Maximum Bus Grant Duration for Masters
        bitOffset: 0
        bitWidth: 9
      - name: DEFMSTR_TYPE
        description: Default Master Type
        bitOffset: 16
        bitWidth: 2
        enumeratedValues:
          - name: NONE
            description: No Default Master-At the end of the current slave access, if no other master request is pending, the slave is disconnected from all masters.This results in a one clock cycle latency for the first access of a burst transfer or for a single access.
            value: 0
          - name: LAST
            description: Last Default Master-At the end of the current slave access, if no other master request is pending, the slave stays connected to the last master having accessed it.This results in not having one clock cycle latency when the last master tries to access the slave again.
            value: 1
          - name: FIXED
            description: Fixed Default Master-At the end of the current slave access, if no other master request is pending, the slave connects to the fixed master the number that has been written in the FIXED_DEFMSTR field.This results in not having one clock cycle latency when the fixed master tries to access the slave again.
            value: 2
      - name: FIXED_DEFMSTR
        description: Fixed Default Master
        bitOffset: 18
        bitWidth: 4
