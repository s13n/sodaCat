        bitOffset: 25
        bitWidth: 1
        access: read-only
      - name: KM_HUK_GEN_STATE_LOW
        description: Set this bit to control validation of HUK generate mode. Odd of 1 is invalid, even of 1 is valid.
        bitOffset: 26
        bitWidth: 6
        access: read-only
  - name: RD_REPEAT_DATA1
    description: BLOCK0 data register 2.
    addressOffset: 52
    size: 32
