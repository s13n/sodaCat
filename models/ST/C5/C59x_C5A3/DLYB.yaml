name: DLYB
description: DLYB register block
groupName: DLYB
source: STM32C591 SVD v1.0.0
registers:
  - name: DLYB_CR
    displayName: DLYB_CR
    description: DLYB control register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DEN
        description: Delay block enable bit
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: DLYB disabled.
            value: 0
          - name: B_0x1
            description: DLYB enabled.
            value: 1
      - name: SEN
        description: Sampler length enable bit
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Sampler length and register access to UNIT[6:0] and SEL[3:0] disabled, output clock enabled.
            value: 0
          - name: B_0x1
            description: Sampler length and register access to UNIT[6:0] and SEL[3:0] enabled, output clock disabled.
            value: 1
  - name: DLYB_CFGR
    displayName: DLYB_CFGR
    description: DLYB configuration register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SEL
        description: Phase for the output clock.
        bitOffset: 0
        bitWidth: 4
        access: read-write
      - name: UNIT
        description: Delay of a unit delay cell.
        bitOffset: 8
        bitWidth: 7
        access: read-write
      - name: LNG
        description: Delay line length value
        bitOffset: 16
        bitWidth: 12
        access: read-only
      - name: LNGF
        description: Length valid flag
        bitOffset: 31
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Length value in LNG is not valid.
            value: 0
          - name: B_0x1
            description: Length value in LNG is valid.
            value: 1
addressBlocks:
  - offset: 0
    size: 1024
    usage: registers
