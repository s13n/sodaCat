        bitOffset: 16
        bitWidth: 5
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 21
        bitWidth: 3
      - name: DOW
        description: Day of week value in the range of 0 to 6
        bitOffset: 24
        bitWidth: 3
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 27
        bitWidth: 5
  - name: CTIME1
    description: Consolidated Time Register 1
    addressOffset: 24
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DOM
        description: Day of month value in the range of 1 to 28, 29, 30, or 31 (depending on the month and whether it is a leap year).
        bitOffset: 0
        bitWidth: 5
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 5
        bitWidth: 3
      - name: MONTH
        description: Month value in the range of 1 to 12.
        bitOffset: 8
        bitWidth: 4
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 4
      - name: YEAR
        description: Year value in the range of 0 to 4095.
        bitOffset: 16
        bitWidth: 12
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 28
        bitWidth: 4
  - name: CTIME2
    description: Consolidated Time Register 2
    addressOffset: 28
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DOY
        description: Day of year value in the range of 1 to 365 (366 for leap years).
        bitOffset: 0
        bitWidth: 12
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 20
  - name: SEC
    description: Seconds Register
    addressOffset: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
