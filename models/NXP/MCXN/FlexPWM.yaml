  - name: FCTRL0
    description: Fault Control Register
    addressOffset: 396
    size: 16
    access: read-write
    resetValue: 0
    resetMask: 65535
    fields:
      - name: FIE
        description: Fault Interrupt Enables
        bitOffset: 0
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: FAULTx CPU interrupt requests disabled.
            value: 0
          - name: ENABLED
            description: FAULTx CPU interrupt requests enabled.
            value: 1
      - name: FSAFE
        description: Fault Safety Mode
        bitOffset: 4
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: NORMAL
            description: Normal mode. PWM outputs disabled by this fault are not enabled until FSTS[FFLAGx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL] without regard to the state of FSTS[FFPINx]. If neither FHALF nor FFULL is set, then the fault condition cannot be cleared. The PWM outputs disabled by this fault input will not be re-enabled until the actual FAULTx input signal de-asserts since the fault input will combinationally disable the PWM outputs (as programmed in DISMAPn).
            value: 0
          - name: SAFE
            description: Safe mode. PWM outputs disabled by this fault are not enabled until FSTS[FFLAGx] is clear and FSTS[FFPINx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL]. If neither FHLAF nor FFULL is set, then the fault condition cannot be cleared.
            value: 1
      - name: FAUTO
        description: Automatic Fault Clearing
        bitOffset: 8
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: MANUAL
            description: Manual fault clearing. PWM outputs disabled by this fault are not enabled until FSTS[FFLAGx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL]. If neither FFULL nor FHALF is set, then the fault condition cannot be cleared. This is further controlled by FCTRL[FSAFE].
            value: 0
          - name: AUTOMATIC
            description: Automatic fault clearing. PWM outputs disabled by this fault are enabled when FSTS[FFPINx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL] without regard to the state of FSTS[FFLAGx]. If neither FFULL nor FHALF is set, then the fault condition cannot be cleared.
            value: 1
      - name: FLVL
        description: Fault Level
        bitOffset: 12
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: LOGIC_0
            description: A logic 0 on the fault input indicates a fault condition.
            value: 0
          - name: LOGIC_1
            description: A logic 1 on the fault input indicates a fault condition.
            value: 1
