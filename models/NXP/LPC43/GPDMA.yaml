    description: DMA Channel  Control Register
    addressOffset: 268
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TRANSFERSIZE
        description: Transfer size in byte. A write to this field sets the size of the transfer when the DMA Controller is the flow controller. The transfer size value must be set before the channel is enabled. Transfer size is updated as data transfers are completed. A read from this field indicates the number of transfers completed on the destination bus. Reading the register when the channel is active does not give useful information because by the time that the software has processed the value read, the channel might have progressed. It is intended to be used only when a channel is enabled and then disabled. The transfer size value is not used if the DMA Controller is not the flow controller.
        bitOffset: 0
        bitWidth: 12
      - name: SBSIZE
        description: Source burst size. Indicates the number of transfers that make up a source burst. This value must be set to the burst size of the source peripheral, or if the source is memory, to the memory boundary size (see Figure 3). The burst size is the amount of data that is transferred when the BREQ signal goes active in the source peripheral.
        enumeratedValues:
          - name: SOURCE_BURST_1
            description: Source burst size = 1
            value: 0
          - name: SOURCE_BURST_4
            description: Source burst size = 4
            value: 1
          - name: SOURCE_BURST_8
            description: Source burst size = 8
            value: 2
          - name: SOURCE_BURST_16
            description: Source burst size = 16
            value: 3
          - name: SOURCE_BURST_32
            description: Source burst size = 32
            value: 4
          - name: SOURCE_BURST_64
            description: Source burst size = 64
            value: 5
          - name: SOURCE_BURST_128
            description: Source burst size = 128
            value: 6
          - name: SOURCE_BURST_256
            description: Source burst size = 256
            value: 7
        bitOffset: 12
        bitWidth: 3
      - name: DBSIZE
        description: Destination burst size. Indicates the number of transfers that make up a destination burst transfer request. This value must be set to the burst size of the destination peripheral or, if the destination is memory, to the memory boundary size. The burst size is the amount of data that is transferred when the BREQ signal goes active in the destination peripheral.
        enumeratedValues:
          - name: DESTINATION_BURST_1
            description: Destination burst size = 1
            value: 0
