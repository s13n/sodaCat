  - name: LPDMA_C0CR
    displayName: LPDMA_C0CR
    description: LPDMA channel 0 control register
    addressOffset: 100
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: EN
        description: enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'write: ignored, read: channel disabled'
            value: 0
          - name: B_0x1
            description: 'write: enable channel, read: channel enabled'
            value: 1
      - name: RESET
        description: reset
        bitOffset: 1
        bitWidth: 1
        access: write-only
        enumeratedValues:
          - name: B_0x0
            description: no channel reset
            value: 0
          - name: B_0x1
            description: channel reset
            value: 1
      - name: SUSP
        description: suspend
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'write: resume channel, read: channel not suspended'
            value: 0
          - name: B_0x1
            description: 'write: suspend channel, read: channel suspended.'
            value: 1
      - name: TCIE
        description: transfer complete interrupt enable
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: HTIE
        description: half transfer complete interrupt enable
        bitOffset: 9
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: DTEIE
        description: data transfer error interrupt enable
        bitOffset: 10
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: ULEIE
        description: update link transfer error interrupt enable
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: USEIE
        description: user setting error interrupt enable
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: SUSPIE
        description: completed suspension interrupt enable
        bitOffset: 13
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: TOIE
        description: trigger overrun interrupt enable
        bitOffset: 14
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: interrupt disabled
            value: 0
          - name: B_0x1
            description: interrupt enabled
            value: 1
      - name: LSM
        description: Link step mode
        bitOffset: 16
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: channel executed for the full linked-list and completed at the end of the last LLI (LPDMA_CxLLR=0). The 16 low-significant bits of the link address are null (LA[15:0]=0) and all the update bits are null (UT1=UB1=UT2=USA=UDA=ULL=0). Then LPDMA_CxBR1.BNDT[15:0]=0.
            value: 0
          - name: B_0x1
            description: channel executed once for the current LLI
            value: 1
      - name: PRIO
        description: priority level of the channel x LPDMA transfer versus others
        bitOffset: 22
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: low priority, low weight
            value: 0
          - name: B_0x1
            description: low priority, mid weight
            value: 1
          - name: B_0x2
            description: low priority, high weight
            value: 2
          - name: B_0x3
            description: high priority
            value: 3
  - name: LPDMA_C0TR1
    displayName: LPDMA_C0TR1
    description: LPDMA channel 0 transfer register 1
    addressOffset: 144
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SDW_LOG2
        description: binary logarithm of the source data width of a single in bytes
        bitOffset: 0
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: byte
            value: 0
          - name: B_0x1
            description: half-word (2 bytes)
            value: 1
          - name: B_0x2
            description: word (4 bytes)
            value: 2
          - name: B_0x3
            description: user setting error reported and no transfer issued
            value: 3
      - name: SINC
        description: source incrementing single
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: fixed single
            value: 0
          - name: B_0x1
            description: contiguously incremented single
            value: 1
      - name: PAM
        description: padding/alignment mode
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0_PAM_1
            description: source data is transferred as right aligned, padded with 0s up to the destination data width
            value: 0
          - name: B_0x1_PAM_1
            description: source data is transferred as right aligned, sign extended up to the destination data width
            value: 1
      - name: DDW_LOG2
        description: binary logarithm of the destination data width of a single in bytes
        bitOffset: 16
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: byte
            value: 0
          - name: B_0x1
            description: half-word (2 bytes)
            value: 1
          - name: B_0x2
            description: word (4 bytes)
            value: 2
          - name: B_0x3
            description: user setting error reported and no transfer issued
            value: 3
      - name: DINC
        description: destination incrementing single
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: fixed single
            value: 0
          - name: B_0x1
            description: contiguously incremented single
            value: 1
  - name: LPDMA_C0TR2
    displayName: LPDMA_C0TR2
    description: LPDMA channel 0 transfer register 2
    addressOffset: 148
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: REQSEL
        description: DMA hardware request selection
        bitOffset: 0
        bitWidth: 7
        access: read-write
      - name: SWREQ
        description: software request
        bitOffset: 9
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no software request. The selected hardware request REQSEL[6:0] is taken into account.
            value: 0
          - name: B_0x1
            description: software request for a memory-to-memory transfer. The default selected hardware request as per REQSEL[6:0] is ignored.
            value: 1
      - name: BREQ
        description: block hardware request
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol at a single level.
            value: 0
          - name: B_0x1
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol at a block level (seeSection27.3.5).
            value: 1
      - name: PFREQ
        description: Hardware request in peripheral flow control mode
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol in LPDMA control mode. The LPDMA is programmed with LPDMA_CxCBR1.BNDT[15:0] and this is internally used by the hardware for the block transfer completion.
            value: 0
          - name: B_0x1
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol in peripheral control mode. The LPDMA block transfer can be early completed by the peripheral itself (see Section27.3.6 for more details).
            value: 1
      - name: TRIGM
        description: trigger mode
        bitOffset: 14
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'at block level: the first single read of each block transfer is conditioned by one hit trigger.'
            value: 0
          - name: B_0x1
            description: same as 00
            value: 1
          - name: B_0x2
            description: 'at link level: a LLI link transfer is conditioned by one hit trigger. The LLI data transfer (if any) is not conditioned.'
            value: 2
          - name: B_0x3
            description: 'at programmed single level: each programmed single read is conditioned by one hit trigger.'
            value: 3
      - name: TRIGSEL
        description: trigger event input selection
        bitOffset: 16
        bitWidth: 5
        access: read-write
      - name: TRIGPOL
        description: trigger event polarity
        bitOffset: 24
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no trigger (masked trigger event)
            value: 0
          - name: B_0x1
            description: trigger on the rising edge
            value: 1
          - name: B_0x2
            description: trigger on the falling edge
            value: 2
          - name: B_0x3
            description: same as 00
            value: 3
      - name: TCEM
        description: transfer complete event mode
        bitOffset: 30
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'at block level (when LPDMA_CxBR1.BNDT[15:0]=0): the complete (and the half) transfer event is generated at the (respectively half of the) end of a block.'
            value: 0
          - name: B_0x1
            description: same as 00
            value: 1
          - name: B_0x2
            description: 'at LLI level: the complete transfer event is generated at the end of the LLI transfer, including the update of the LLI if any. The half transfer event is generated at the half of the LLI data transfer (the LLI data transfer being a block transfer), if any data transfer.'
