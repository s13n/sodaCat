        bitOffset: 8
        bitWidth: 8
        access: read-only
      - name: IWDG_STOP
        description: IWDG Stop mode freeze option status bit
        bitOffset: 20
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Independent watchdog frozen in system Stop mode
            value: 0
          - name: B_0x1
            description: Independent watchdog keep running in system Stop mode.
            value: 1
      - name: IWDG_STDBY
        description: IWDG Standby mode freeze option status bit
        bitOffset: 21
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Independent watchdog frozen in Standby mode
