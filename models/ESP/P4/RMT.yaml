        description: The read and write  data register for CHANNEL%s by apb fifo access.
        addressOffset: 0
        size: 32
        fields:
          - name: CHDATA
            description: Read and write data for channel %s via APB FIFO.
            bitOffset: 0
            bitWidth: 32
            access: read-only
  - dim: 4
    dimIncrement: 4
