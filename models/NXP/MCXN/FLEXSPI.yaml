        description: Clear Learn Phase Selection
        bitOffset: 14
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: No impact
            value: 0
          - name: val1
            description: Reset sample clock phase selection to 0
            value: 1
      - name: SAMEDEVICEEN
        description: Same Device Enable
        bitOffset: 15
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: individual_parallel
            description: In Individual mode, FLSHA1CRx and FLSHA2CRx, FLSHB1CRx and FLSHB2CRx settings are applied to Flash A1, A2, B1, B2 separately. In Parallel mode, FLSHA1CRx register setting is applied to Flash A1 and B1, FLSHA2CRx register setting is applied to Flash A2 and B2. FLSHB1CRx and FLSHB2CRx register settings are ignored.
            value: 0
          - name: ENABLE
            description: FLSHA1CR0, FLSHA1CR1, and FLSHA1CR2 register settings are applied to Flash A1, A2, B1, B2. FLSHA2CRx, FLSHB1CRx, and FLSHB2CRx settings are ignored.
            value: 1
      - name: SCKBDIFFOPT
        description: SCLK Port B Differential Output
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val1
            description: Use B_SCLK pad as port B SCLK clock output. Port B flash memory access is available.
            value: 0
          - name: val0
            description: Use B_SCLK pad as port A SCLK inverted clock output (Differential clock to A_SCLK). Port B flash memory access is not available.
            value: 1
      - name: RXCLKSRC_B
        description: Port B Receiver Clock Source
        bitOffset: 21
        bitWidth: 2
        access: read-write
        enumeratedValues:
