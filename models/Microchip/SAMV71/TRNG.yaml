# Created from ATSAMV71Q21B.svd (Rev 0)

name: TRNG
version: 6334G
description: True Random Number Generator
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: ENABLE
        description: Enables the TRNG to Provide Random Values
        bitOffset: 0
        bitWidth: 1
      - name: KEY
        description: Security Key
        bitOffset: 8
        bitWidth: 24
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 5393991
  - name: IER
    description: Interrupt Enable Register
    addressOffset: 16
    size: 32
    access: write-only
    fields:
      - name: DATRDY
        description: Data Ready Interrupt Enable
        bitOffset: 0
        bitWidth: 1
  - name: IDR
    description: Interrupt Disable Register
    addressOffset: 20
    size: 32
    access: write-only
    fields:
      - name: DATRDY
        description: Data Ready Interrupt Disable
        bitOffset: 0
        bitWidth: 1
  - name: IMR
    description: Interrupt Mask Register
    addressOffset: 24
    size: 32
    access: read-only
    fields:
      - name: DATRDY
        description: Data Ready Interrupt Mask
        bitOffset: 0
        bitWidth: 1
  - name: ISR
    description: Interrupt Status Register
    addressOffset: 28
    size: 32
    access: read-only
    fields:
      - name: DATRDY
        description: Data Ready
        bitOffset: 0
        bitWidth: 1
  - name: ODATA
    description: Output Data Register
    addressOffset: 80
    size: 32
    access: read-only
    fields:
      - name: ODATA
        description: Output Data
        bitOffset: 0
        bitWidth: 32
interrupts:
  - name: INT
    description: True Random Generator
addressBlocks:
  - offset: 0
    size: 84
    usage: registers
