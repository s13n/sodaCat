        bitOffset: 15
        bitWidth: 1
        access: read-write
      - name: TX_24_FILL_EN
        description: '1: Sent 32 bits in 24 channel bits mode. 0: Sent 24 bits in 24 channel bits mode'
        bitOffset: 16
        bitWidth: 1
        access: read-write
      - name: TX_WS_IDLE_POL
