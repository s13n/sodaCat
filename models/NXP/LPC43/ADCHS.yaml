name: ADCHS
description: 12-bit Analog-to-Digital Converter  High-Speed (ADCHS)
groupName: ADCHS
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: FLUSH
    description: Flushes FIFO
    addressOffset: 0
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: FIFO_FLUSH
        description: 1= fifo is cleared
        bitOffset: 0
        bitWidth: 1
  - name: DMA_REQ
    description: Set or clear DMA write request
    addressOffset: 4
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: DMA_REQ_WR
        description: 1 = Dma_req_wr is set (initially used to fill second table),  0 = Dma_req_wr is cleared
        bitOffset: 0
        bitWidth: 1
  - name: FIFO_STS
    description: Indicates FIFO fill level status
    addressOffset: 8
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LEVEL
        description: 0 = FIFO is empty  1...15 = FIFO is partially full  16 = FIFO is full
        bitOffset: 0
        bitWidth: 5
  - name: FIFO_CFG
    description: Configures FIFO fill level that triggers interrupt and packing 1 or 2 samples per word.
    addressOffset: 12
    access: read-write
    resetValue: 16
    resetMask: 4294967295
    fields:
      - name: PACKED_READ
        description: 0 = one sample is packed in one 32-bit read cycle  1 = two samples are packed in one 32-bit read cycle
        bitOffset: 0
        bitWidth: 1
      - name: LEVEL
        description: When the FIFO contains more or equal than FIFO_LEVEL samples interrupt flag FIFO_FULL interrupt will be set and DMA_Read_Req will be raised.
        bitOffset: 1
        bitWidth: 5
  - name: TRIGGER
    description: Enable software trigger to start descriptor processing
    addressOffset: 16
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SW_TRIGGER
        description: Auto cleared
        bitOffset: 0
        bitWidth: 1
  - name: DSCR_STS
    description: Indicates active descriptor table and descriptor entry
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ACT_TABLE
        description: 0 = table 0 is active  1 = table 1 is active.
        bitOffset: 0
        bitWidth: 1
      - name: ACT_DESCRIPTOR
        description: ID of the descriptor that is active.
        bitOffset: 1
        bitWidth: 3
  - name: POWER_DOWN
    description: Set or clear power down mode
    addressOffset: 24
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: PD_CTRL
        description: 0 = disable power down mode. Register holds value until set by writing 1 to this bit or by descriptor processor when descriptor field POWER_DOWN is set.   1 = enable power down mode. Register holds value until cleared by writing 0 to this bit or by descriptor processor when waking up RECOVERY_TIME before a conversion.
        bitOffset: 0
        bitWidth: 1
  - name: CONFIG
    description: Configures external trigger mode, store channel ID in FIFO and walk-up recovery time from power down.
    addressOffset: 28
    access: read-write
    resetValue: 9216
    resetMask: 4294967295
    fields:
      - name: TRIGGER__MASK
        description: 00 = triggers off  01 = software trigger only  10 = external trigger only  11 = both triggers allowed
        bitOffset: 0
        bitWidth: 2
      - name: TRIGGER_MODE
        description: 00 = rising external trigger  01 = falling external trigger  10 = low external trigger  11 = high external trigger
        bitOffset: 2
        bitWidth: 2
      - name: TRIGGER_SYNC
        description: 0  = do not synchronize external  trigger input  1 = synchronize external  trigger input
        bitOffset: 4
        bitWidth: 1
      - name: CHANNEL_ID_EN
        description: 0 = do not add channel ID to FIFO output data  1 = add channel ID to FIFO output data
        bitOffset: 5
        bitWidth: 1
      - name: RECOVERY_TIME
        description: ADC recovery time from power down
        bitOffset: 6
        bitWidth: 8
  - name: THR_A
    description: Configures window comparator A levels.
    addressOffset: 32
    access: read-write
    resetValue: 268369920
    resetMask: 4294967295
    fields:
      - name: THR_LOW_A
        description: 'Low Compare Threshold Register A:   Contains the lower  threshold  level for automatic threshold comparison for any channels linked to threshold pair A.'
        bitOffset: 0
        bitWidth: 12
      - name: THR_HIGH_A
        description: 'High Compare Threshold Register A:   Contains the upper threshold  level for automatic threshold comparison for any channels linked to threshold pair A.'
        bitOffset: 16
        bitWidth: 12
  - name: THR_B
    description: Configures window comparator B levels.
    addressOffset: 36
    access: read-write
    resetValue: 268369920
    resetMask: 4294967295
    fields:
      - name: THR_LOW_B
        description: 'Low Compare Threshold Register B:   Contains the lower  threshold  level for automatic threshold comparison for any channels linked to threshold pair A.'
        bitOffset: 0
        bitWidth: 12
      - name: THR_HIGH_B
        description: 'High Compare Threshold Register B:   Contains the upper threshold  level for automatic threshold comparison for any channels linked to threshold pair A.'
        bitOffset: 16
        bitWidth: 12
  - dim: 6
    dimIncrement: 4
    name: LAST_SAMPLE[%s]
    description: Contains last converted sample of input M [M=0..5) and result of window comparator.
    addressOffset: 40
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DONE
        description: This bit is set to 1 when an A/D conversion on this channel completes.  This bit is cleared whenever this register is read.
        bitOffset: 0
        bitWidth: 1
      - name: OVERRUN
        description: This bit will be set to a 1 if a new conversion on this channel completes and overwrites the previous contents of the RESULT field before it has been read - i.e. while the DONE bit is set.  This bit is cleared, along with the DONE bit, whenever this register is read.  This bit (in any of the registers) will cause an overrun interrupt request to be asserted if the overrun interrupt is enabled.
        bitOffset: 1
        bitWidth: 1
      - name: THCMP_RANGE
        description: 'Threshold Range Comparison result  00: In Range  01: Below Range  10: Above Range  11: Reserved'
        bitOffset: 2
        bitWidth: 2
      - name: THCMP_CROSS
        description: 'Threshold Crossing Comparison result  00: No Threshold Crossing detected  01: Downward Threshold Crossing detected  10: Upward Threshold Crossing detected  11: Reserved'
        bitOffset: 4
        bitWidth: 2
      - name: SAMPLE
        description: 12-Bit value of last converted sample for this channel
        bitOffset: 6
        bitWidth: 12
  - name: ADC_SPEED
    description: ADC speed control
    addressOffset: 260
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DGEC0
        description: Speed0
        bitOffset: 0
        bitWidth: 4
      - name: DGEC1
        description: Speed1
        bitOffset: 4
        bitWidth: 4
      - name: DGEC2
        description: Speed2
        bitOffset: 8
        bitWidth: 4
      - name: DGEC3
        description: Speed3
        bitOffset: 12
        bitWidth: 4
      - name: DGEC4
        description: Speed4
        bitOffset: 16
        bitWidth: 4
      - name: DGEC5
        description: Speed5
        bitOffset: 20
        bitWidth: 4
  - name: POWER_CONTROL
    description: Configures ADC power vs. speed, DC-in biasing, output format and power gating.
    addressOffset: 264
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CRS
        description: current setting for power versus speed programming
        bitOffset: 0
        bitWidth: 4
      - name: DCINNEG
        description: AC-DC coupling selection  0 = No dc bias  1 = DC bias on vin_neg side
        bitOffset: 4
        bitWidth: 6
      - name: DCINPOS
        description: AC-DC coupling selection  0 = No dc bias  1 = DC bias on vin_pos side
        bitOffset: 10
        bitWidth: 6
      - name: TWOS
        description: Output data format selection  0 = offset binary  1 = two's complement
        bitOffset: 16
        bitWidth: 1
      - name: POWER_SWITCH
        description: 0 = ADC is powered down 1 = ADC is active
        bitOffset: 17
        bitWidth: 1
      - name: BGAP_SWITCH
        description: 0 = ADC band gap reference is powered down  1 = ADC band gap reference is active
        bitOffset: 18
        bitWidth: 1
  - dim: 16
    dimIncrement: 4
    name: FIFO_OUTPUT[%s]
    description: FIFO output mapped to 16 consecutive address locations. An output contains the value and input channel ID of one or two converted samples
    addressOffset: 512
    access: read-only
    resetValue: 32768
    resetMask: 4294967295
    fields:
      - name: SAMPLE
        description: Value of first converted sample
        bitOffset: 0
        bitWidth: 12
      - name: CHAN_ID
        description: 'Channel number of first converted sample:  000: channel _0 or CHANNEL_ID_EN =0  001: channel _1  010: channel _2  011: channel _3  100: channel _4  101: channel _5  110: reserved  111: recovery_ error'
        bitOffset: 12
        bitWidth: 3
      - name: EMPTY
        description: '0: FIFO not empty  1: FIFO empty'
        bitOffset: 15
        bitWidth: 1
      - name: SAMPLE2
        description: Value of second converted sample.  This field is only valid if PACKED_READ is set else it is 0x0
        bitOffset: 16
        bitWidth: 12
      - name: CHAN_ID2
        description: Channel number of second converted sample   This field is only valid if CHANNEL_ID_EN and PACKED_READ are set else it is 0x0
        bitOffset: 28
        bitWidth: 3
      - name: EMPTY2
        description: '0: FIFO not empty  1: FIFO empty and PACKED_READ is set'
        bitOffset: 31
        bitWidth: 1
  - dim: 8
    dimIncrement: 4
    name: DESCRIPTOR0_[%s]
    description: Table 0 descriptor n, n= 0 to 7
    addressOffset: 768
    access: read-write
    resetValue: 37088
    resetMask: 4294967295
    fields:
      - name: CHANNEL_NR
        description: '0: convert input  0  1: convert input  1  2: convert input  2  3: convert input  3  4: convert input  4  5: convert input  5  6,7: reserved'
        bitOffset: 0
        bitWidth: 3
      - name: HALT
        description: '0: After this descriptor continue with the next descriptor.  1: halt after this descriptor is processed. Restart at a new trigger.'
        bitOffset: 3
        bitWidth: 1
      - name: INTERRUPT
        description: '1: Raise interrupt when ADC result is available'
        bitOffset: 4
        bitWidth: 1
      - name: POWER_DOWN
        description: '1: Power down after this conversion.'
        bitOffset: 5
        bitWidth: 1
      - name: BRANCH
        description: '00: Continue with next descriptor (wraps around after top).  01: Branch to the first descriptor in this table.  10: Swap tables and branch to the first descriptor of the new table.  11: reserved (do not store sample). Continue with next descriptor (wraps around after top).'
        bitOffset: 6
        bitWidth: 2
      - name: MATCH_VALUE
        description: Evaluate this descriptor when descriptor timer value is equal to match value.
        bitOffset: 8
        bitWidth: 14
      - name: THRESHOLD_SEL
        description: 'Indicates which threshold comparison level register set is to be used:  00: no comparison,  01: THR_A.   10: THR_B.  11: Reserved'
        bitOffset: 22
        bitWidth: 2
      - name: RESET_TIMER
        description: '1: reset descriptor timer.'
        bitOffset: 24
        bitWidth: 1
      - name: UPDATE_TABLE
        description: '1: Update table with all 8 descriptors of this table. Descriptors of this table that are written without this bit set are not updated until any descriptor of this table is written with this bit set.  This field is write only. A read returns 0x0.'
        bitOffset: 31
        bitWidth: 1
  - dim: 8
    dimIncrement: 4
    name: DESCRIPTOR1_[%s]
    description: Table 1 descriptors n, n=0 to 7
    addressOffset: 800
    access: read-write
    resetValue: 37088
    resetMask: 4294967295
    fields:
      - name: CHANNEL_NR
        description: '0: convert input 0  1: convert input 1  2: convert input 2  3: convert input 3  4: convert input 4  5: convert input 5  6,7: reserved'
        bitOffset: 0
        bitWidth: 3
      - name: HALT
        description: '0: After this descriptor continue with the next descriptor.  1: halt after this descriptor is processed. Restart at a new trigger.'
        bitOffset: 3
        bitWidth: 1
      - name: INTERRUPT
        description: '1: Raise interrupt when ADC result is available'
        bitOffset: 4
        bitWidth: 1
      - name: POWER_DOWN
        description: '1: Power down after this conversion.'
        bitOffset: 5
        bitWidth: 1
      - name: BRANCH
        description: '00: Continue with next descriptor (wraps around after top).  01: Branch to the first descriptor in this table.  10: Swap tables and branch to the first descriptor of the new table.  11: reserved (do not store sample).  Continue with next descriptor (wraps around after top).'
        bitOffset: 6
        bitWidth: 2
      - name: MATCH_VALUE
        description: Evaluate this descriptor when descriptor timer value is equal to match value.
        bitOffset: 8
        bitWidth: 14
      - name: THRESHOLD_SEL
        description: 'Indicates which threshold comparison level register set is to be used:  00: no comparison,  01: THR_A.   10: THR_B.  11: Reserved'
        bitOffset: 22
        bitWidth: 2
      - name: RESET_TIMER
        description: '1: reset descriptor timer.'
        bitOffset: 24
        bitWidth: 1
      - name: UPDATE_TABLE
        description: '1: Update table with all 8 descriptors of this table. Descriptors of this table that are written without this bit set are not updated until any descriptor of this table is written with this bit set.  This field is write only. A read returns 0x0.'
        bitOffset: 31
        bitWidth: 1
  - name: CLR_EN0
    description: Interrupt 0 clear mask
    addressOffset: 3840
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CEN0
        description: Interrupt clear enable
        bitOffset: 0
        bitWidth: 7
  - name: SET_EN0
    description: Interrupt 0 set mask
    addressOffset: 3844
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SEN0
        description: Interrupt set enable
        bitOffset: 0
        bitWidth: 7
  - name: MASK0
    description: Interrupt 0 mask
    addressOffset: 3848
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: M0
        description: Interrupt enable
        bitOffset: 0
        bitWidth: 7
  - name: STATUS0
    description: Interrupt 0 status. Interrupt 0 contains FIFO fill level, descriptor status and ADC range under/overflow
    addressOffset: 3852
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: FIFO_FULL
        description: '0: number of samples in FIFO less than or equal to FIFO_LEVEL  1: number of samples in FIFO is more than FIFO_LEVEL'
        bitOffset: 0
        bitWidth: 1
      - name: FIFO_EMPTY
        description: '0: FIFO is not empty   1: FIFO is empty'
        bitOffset: 1
        bitWidth: 1
      - name: FIFO_OVERFLOW
        description: FIFO was full; conversion sample is not stored  and lost
        bitOffset: 2
        bitWidth: 1
      - name: DSCR_DONE
        description: The descriptor INTERRUPT field was enabled and its sample is converted.
        bitOffset: 3
        bitWidth: 1
      - name: DSCR_ERROR
        description: The ADC was not fully woken up when a sample was converted and the conversion results is unreliable
        bitOffset: 4
        bitWidth: 1
      - name: ADC_OVF
        description: Converted sample value was over range of the 12 bit output code.
        bitOffset: 5
        bitWidth: 1
      - name: ADC_UNF
        description: Converted sample value was under range of the 12 bit output code.
        bitOffset: 6
        bitWidth: 1
  - name: CLR_STAT0
    description: Interrupt 0 clear status
    addressOffset: 3856
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CSTAT0
        description: Interrupt clear status
        bitOffset: 0
        bitWidth: 7
  - name: SET_STAT0
    description: Interrupt 0 set status
    addressOffset: 3860
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SSTAT0
        description: Interrupt set status
        bitOffset: 0
        bitWidth: 7
  - name: CLR_EN1
    description: Interrupt 1 mask clear enable.
    addressOffset: 3872
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CEN1
        description: Interrupt clear enable
        bitOffset: 0
        bitWidth: 30
  - name: SET_EN1
    description: Interrupt 1 mask set enable
    addressOffset: 3876
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SEN1
        description: Interrupt set enable
        bitOffset: 0
        bitWidth: 30
  - name: MASK1
    description: Interrupt 1 mask
    addressOffset: 3880
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: M1
        description: Interrupt enable
        bitOffset: 0
        bitWidth: 30
  - name: STATUS1
    description: Interrupt 1 status. Interrupt 1 contains window comparator results and register last LAST_SAMPLE[M] overrun.
    addressOffset: 3884
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: THCMP_BRANGE0
        description: Input channel 0 result below  range
        bitOffset: 0
        bitWidth: 1
      - name: THCMP_ARANGE0
        description: Input channel 0 result above range
        bitOffset: 1
        bitWidth: 1
      - name: THCMP_DCROSS0
        description: Input channel 0 result  downward threshold crossing detected
        bitOffset: 2
