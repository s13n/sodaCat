name: RSTC
version: 11009N
description: Reset Controller
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: PROCRST
        description: Processor Reset
        bitOffset: 0
        bitWidth: 1
      - name: EXTRST
        description: External Reset
        bitOffset: 3
        bitWidth: 1
      - name: KEY
        description: System Reset Key
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 165
  - name: SR
    description: Status Register
    addressOffset: 4
    size: 32
    access: read-only
    fields:
      - name: URSTS
        description: User Reset Status
        bitOffset: 0
        bitWidth: 1
      - name: RSTTYP
        description: Reset Type
        bitOffset: 8
        bitWidth: 3
        enumeratedValues:
          - name: GENERAL_RST
            description: First power-up reset
            value: 0
          - name: BACKUP_RST
            description: Return from Backup Mode
            value: 1
          - name: WDT_RST
            description: Watchdog fault occurred
            value: 2
          - name: SOFT_RST
            description: Processor reset required by the software
            value: 3
          - name: USER_RST
            description: NRST pin detected low
            value: 4
      - name: NRSTL
        description: NRST Pin Level
        bitOffset: 16
        bitWidth: 1
      - name: SRCMP
        description: Software Reset Command in Progress
        bitOffset: 17
        bitWidth: 1
  - name: MR
    description: Mode Register
    addressOffset: 8
    size: 32
    fields:
      - name: URSTEN
        description: User Reset Enable
        bitOffset: 0
        bitWidth: 1
      - name: URSTIEN
        description: User Reset Interrupt Enable
        bitOffset: 4
        bitWidth: 1
      - name: ERSTL
        description: External Reset Length
        bitOffset: 8
        bitWidth: 4
      - name: KEY
        description: Write Access Password
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.Always reads as 0.
            value: 165
addressBlocks:
  - offset: 0
    size: 12
    usage: registers
interrupts:
  - name: INT
    description: Reset Controller
