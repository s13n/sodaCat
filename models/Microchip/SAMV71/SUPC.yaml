# Created from ATSAMV71Q21B.svd (Rev 0)

name: SUPC
version: 6452ZE
description: Supply Controller
registers:
  - name: CR
    description: Supply Controller Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: VROFF
        description: Voltage Regulator Off
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: NO_EFFECT
            description: No effect.
            value: 0
          - name: STOP_VREG
            description: If KEY is correct, VROFF asserts the vddcore_nreset and stops the voltage regulator.
            value: 1
      - name: XTALSEL
        description: Crystal Oscillator Select
        bitOffset: 3
        bitWidth: 1
        enumeratedValues:
          - name: NO_EFFECT
            description: No effect.
            value: 0
          - name: CRYSTAL_SEL
            description: If KEY is correct, XTALSEL switches the slow clock on the crystal oscillator output.
            value: 1
      - name: KEY
        description: Password
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 165
  - name: SMMR
    description: Supply Controller Supply Monitor Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: SMTH
        description: Supply Monitor Threshold
        bitOffset: 0
        bitWidth: 4
      - name: SMSMPL
        description: Supply Monitor Sampling Period
        bitOffset: 8
        bitWidth: 3
        enumeratedValues:
          - name: SMD
            description: Supply Monitor disabled
            value: 0
          - name: CSM
            description: Continuous Supply Monitor
            value: 1
          - name: _32SLCK
            description: Supply Monitor enabled one SLCK period every 32 SLCK periods
            value: 2
          - name: _256SLCK
            description: Supply Monitor enabled one SLCK period every 256 SLCK periods
            value: 3
          - name: _2048SLCK
            description: Supply Monitor enabled one SLCK period every 2,048 SLCK periods
            value: 4
      - name: SMRSTEN
        description: Supply Monitor Reset Enable
        bitOffset: 12
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The core reset signal vddcore_nreset is not affected when a supply monitor detection occurs.
            value: 0
          - name: ENABLE
            description: The core reset signal, vddcore_nreset is asserted when a supply monitor detection occurs.
            value: 1
      - name: SMIEN
        description: Supply Monitor Interrupt Enable
        bitOffset: 13
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The SUPC interrupt signal is not affected when a supply monitor detection occurs.
            value: 0
          - name: ENABLE
            description: The SUPC interrupt signal is asserted when a supply monitor detection occurs.
            value: 1
  - name: MR
    description: Supply Controller Mode Register
    addressOffset: 8
    size: 32
    fields:
      - name: BODRSTEN
        description: Brownout Detector Reset Enable
        bitOffset: 12
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The core reset signal vddcore_nreset is not affected when a brownout detection occurs.
            value: 0
          - name: ENABLE
            description: The core reset signal, vddcore_nreset is asserted when a brownout detection occurs.
            value: 1
      - name: BODDIS
        description: Brownout Detector Disable
        bitOffset: 13
        bitWidth: 1
        enumeratedValues:
          - name: ENABLE
            description: The core brownout detector is enabled.
            value: 0
          - name: DISABLE
            description: The core brownout detector is disabled.
            value: 1
      - name: ONREG
        description: Voltage Regulator Enable
        bitOffset: 14
        bitWidth: 1
        enumeratedValues:
          - name: ONREG_UNUSED
            description: Internal voltage regulator is not used (external power supply is used).
            value: 0
          - name: ONREG_USED
            description: Internal voltage regulator is used.
            value: 1
      - name: BKUPRETON
        description: SRAM On In Backup Mode
        bitOffset: 17
        bitWidth: 1
      - name: OSCBYPASS
        description: Oscillator Bypass
        bitOffset: 20
        bitWidth: 1
        enumeratedValues:
          - name: NO_EFFECT
            description: No effect. Clock selection depends on the value of XTALSEL (SUPC_CR).
            value: 0
          - name: BYPASS
            description: The 32 kHz crystal oscillator is bypassed if XTALSEL (SUPC_CR) is set. OSCBYPASS must be set prior to setting XTALSEL.
            value: 1
      - name: KEY
        description: Password Key
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 165
  - name: WUMR
    description: Supply Controller Wake-up Mode Register
    addressOffset: 12
    size: 32
    fields:
      - name: SMEN
        description: Supply Monitor Wake-up Enable
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The supply monitor detection has no wake-up effect.
            value: 0
          - name: ENABLE
            description: The supply monitor detection forces the wake-up of the core power supply.
            value: 1
      - name: RTTEN
        description: Real-time Timer Wake-up Enable
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The RTT alarm signal has no wake-up effect.
            value: 0
          - name: ENABLE
            description: The RTT alarm signal forces the wake-up of the core power supply.
            value: 1
      - name: RTCEN
        description: Real-time Clock Wake-up Enable
        bitOffset: 3
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The RTC alarm signal has no wake-up effect.
            value: 0
          - name: ENABLE
            description: The RTC alarm signal forces the wake-up of the core power supply.
            value: 1
      - name: LPDBCEN0
        description: Low-power Debouncer Enable WKUP0
        bitOffset: 5
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The WKUP0 input pin is not connected to the low-power debouncer.
            value: 0
          - name: ENABLE
            description: The WKUP0 input pin is connected to the low-power debouncer and forces a system wake-up.
            value: 1
      - name: LPDBCEN1
        description: Low-power Debouncer Enable WKUP1
        bitOffset: 6
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: The WKUP1 input pin is not connected to the low-power debouncer.
            value: 0
          - name: ENABLE
            description: The WKUP1 input pin is connected to the low-power debouncer and forces a system wake-up.
            value: 1
      - name: LPDBCCLR
        description: Low-power Debouncer Clear
        bitOffset: 7
        bitWidth: 1
        enumeratedValues:
          - name: NOT_ENABLE
            description: A low-power debounce event does not create an immediate clear on the first half of GPBR registers.
            value: 0
          - name: ENABLE
            description: A low-power debounce event on WKUP0 or WKUP1 generates an immediate clear on the first half of GPBR registers.
            value: 1
      - name: WKUPDBC
        description: Wake-up Inputs Debouncer Period
        bitOffset: 12
        bitWidth: 3
        enumeratedValues:
          - name: IMMEDIATE
            description: Immediate, no debouncing, detected active at least on one Slow Clock edge.
            value: 0
          - name: _3_SLCK
            description: WKUPx shall be in its active state for at least 3 SLCK periods
            value: 1
          - name: _32_SLCK
            description: WKUPx shall be in its active state for at least 32 SLCK periods
            value: 2
          - name: _512_SLCK
            description: WKUPx shall be in its active state for at least 512 SLCK periods
            value: 3
          - name: _4096_SLCK
            description: WKUPx shall be in its active state for at least 4,096 SLCK periods
            value: 4
          - name: _32768_SLCK
            description: WKUPx shall be in its active state for at least 32,768 SLCK periods
            value: 5
      - name: LPDBC
        description: Low-power Debouncer Period
        bitOffset: 16
        bitWidth: 3
        enumeratedValues:
          - name: DISABLE
            description: Disable the low-power debouncers.
            value: 0
          - name: _2_RTCOUT
            description: WKUP0/1 in active state for at least 2 RTCOUTx clock periods
            value: 1
          - name: _3_RTCOUT
            description: WKUP0/1 in active state for at least 3 RTCOUTx clock periods
            value: 2
          - name: _4_RTCOUT
            description: WKUP0/1 in active state for at least 4 RTCOUTx clock periods
            value: 3
          - name: _5_RTCOUT
            description: WKUP0/1 in active state for at least 5 RTCOUTx clock periods
            value: 4
          - name: _6_RTCOUT
            description: WKUP0/1 in active state for at least 6 RTCOUTx clock periods
            value: 5
          - name: _7_RTCOUT
            description: WKUP0/1 in active state for at least 7 RTCOUTx clock periods
            value: 6
          - name: _8_RTCOUT
            description: WKUP0/1 in active state for at least 8 RTCOUTx clock periods
            value: 7
  - name: WUIR
    description: Supply Controller Wake-up Inputs Register
    addressOffset: 16
    size: 32
    fields:
