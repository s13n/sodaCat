            description: Suspended AHB read prefetch resumes when AHB is IDLE.
            value: 0
          - name: val1
            description: Suspended AHB read prefetch does not resume once aborted,
            value: 1
      - name: READSZALIGN
        description: AHB Read Size Alignment
        bitOffset: 10
        bitWidth: 1
        access: read-write
        enumeratedValues:
