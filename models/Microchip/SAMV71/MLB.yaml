    description: MediaLB Channel Status 0 Register
    addressOffset: 12
    size: 32
    fields:
      - name: MCS
        description: MediaLB Channel Status [31:0] (cleared by writing a 0)
        bitOffset: 0
        bitWidth: 32
  - name: MS1
    description: MediaLB Channel Status1 Register
    addressOffset: 20
    size: 32
    fields:
      - name: MCS
        description: MediaLB Channel Status [63:32] (cleared by writing a 0)
        bitOffset: 0
        bitWidth: 32
