            value: 1
      - name: BREQ
        description: block hardware request
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol at a single level.
            value: 0
          - name: B_0x1
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol at a block level (seeSection27.3.5).
            value: 1
      - name: PFREQ
        description: Hardware request in peripheral flow control mode
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol in LPDMA control mode. The LPDMA is programmed with LPDMA_CxCBR1.BNDT[15:0] and this is internally used by the hardware for the block transfer completion.
            value: 0
          - name: B_0x1
            description: the selected hardware request is driven by a peripheral with a hardware request/acknowledge protocol in peripheral control mode. The LPDMA block transfer can be early completed by the peripheral itself (see Section27.3.6 for more details).
            value: 1
      - name: TRIGM
        description: trigger mode
        bitOffset: 14
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'at block level: the first single read of each block transfer is conditioned by one hit trigger.'
            value: 0
          - name: B_0x1
            description: same as 00
            value: 1
          - name: B_0x2
            description: 'at link level: a LLI link transfer is conditioned by one hit trigger. The LLI data transfer (if any) is not conditioned.'
            value: 2
          - name: B_0x3
            description: 'at programmed single level: each programmed single read is conditioned by one hit trigger.'
            value: 3
      - name: TRIGSEL
        description: trigger event input selection
        bitOffset: 16
        bitWidth: 5
        access: read-write
      - name: TRIGPOL
        description: trigger event polarity
        bitOffset: 24
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no trigger (masked trigger event)
            value: 0
          - name: B_0x1
            description: trigger on the rising edge
            value: 1
          - name: B_0x2
            description: trigger on the falling edge
            value: 2
          - name: B_0x3
            description: same as 00
            value: 3
      - name: TCEM
        description: transfer complete event mode
        bitOffset: 30
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 'at block level (when LPDMA_CxBR1.BNDT[15:0]=0): the complete (and the half) transfer event is generated at the (respectively half of the) end of a block.'
            value: 0
          - name: B_0x1
            description: same as 00
            value: 1
          - name: B_0x2
            description: 'at LLI level: the complete transfer event is generated at the end of the LLI transfer, including the update of the LLI if any. The half transfer event is generated at the half of the LLI data transfer (the LLI data transfer being a block transfer), if any data transfer.'
            value: 2
          - name: B_0x3
            description: 'at channel level: the complete transfer event is generated at the end of the last LLI transfer. The half transfer event is generated at the half of the data transfer of the last LLI. The last LLI updates the link address LPDMA_CxLLR.LA[15:2] to zero and clears all the LPDMA_CxLLR update bits (UT1, UT2, UB1, USA, UDA and ULL). If the channel transfer is continuous/infinite, no event is generated.'
            value: 3
