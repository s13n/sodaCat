        bitOffset: 0
        bitWidth: 12
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 20
  - name: ERSTATUS
    description: Event Monitor/Recorder Status register. Contains status flags for event channels and other Event Monitor/Recorder conditions.
    addressOffset: 128
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: EV0
        description: Channel0 event flag (WAKEUP0 pin). Set at the end of any second if there has been an event during the preceding second. This bit is cleared by writing a 1 to it. Writing 0 has no effect.
        enumeratedValues:
          - name: NO_CHANGE
            description: No event change on channel 0.
            value: 0
          - name: EVENT
            description: At least one event has occurred on channel 0.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: EV1
        description: Channel1 Event flag (WAKEUP1 pin). Set at the end of any second if there has been an event during the preceding second. This bit is cleared by writing a 1 to it. Writing 0 has no effect.
        enumeratedValues:
          - name: NO_CHANGE
            description: No event change on channel 1.
            value: 0
          - name: EVENT
            description: At least one event has occurred on channel 1.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: EV2
        description: Channel2 Event flag (WAKEUP2 pin). Set at the end of any second if there has been an event during the preceding second. This bit is cleared by writing a 1 to it. Writing 0 has no effect.
        enumeratedValues:
          - name: NO_CHANGE
            description: No event change on channel 2.
            value: 0
          - name: EVENT
            description: At least one event has occurred on channel 2.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: GP_CLEARED
        description: General purpose register asynchronous clear flag. This bit is cleared by writing a 1 to it. Writing 0 has no effect.
        enumeratedValues:
          - name: NO_CHANGE
            description: General purpose registers have not been asynchronous cleared.
            value: 0
          - name: EVENT
            description: General purpose registers have been asynchronous cleared.
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 4
        bitWidth: 27
      - name: WAKEUP
        description: Interrupt/wake-up request flag (Read-only). This bit is cleared by writing a 1 to it. Writing 0 has no effect.
        enumeratedValues:
          - name: NOINTERRUPTWAKEUP
            description: No interrupt/wake-up request is pending
            value: 0
          - name: INTERRUPTWAKEUP
            description: An interrupt/wake-up request is pending.
            value: 1
        bitOffset: 31
        bitWidth: 1
  - name: ERCONTRO
    description: Event Monitor/Recorder Control register. Contains bits that control actions for the event channels as well as for Event Monitor/Recorder setup.
    addressOffset: 132
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: INTWAKE_EN0
        description: Interrupt and wake-up enable for channel 0.
        enumeratedValues:
          - name: DISABLED
            description: No interrupt or wake-up will be generated by event channel 0.
            value: 0
          - name: ENABLED
            description: An event in channel 0 will trigger an (RTC) interrupt and a wake-up request.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: GPCLEAR_EN0
        description: Enables automatically clearing the RTC general purpose registers when an event occurs on channel 0.
        enumeratedValues:
          - name: DISABLED
            description: Channel 0 has no influence on the general purpose registers.
            value: 0
          - name: ENABLED
            description: An event in channel 0 will clear the general purpose registers asynchronously.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: POL0
        description: Selects the polarity of an event on input pin WAKEUP0.
        enumeratedValues:
          - name: NEGATIVE
            description: A channel 0 event is defined as a negative edge on WAKEUP0.
            value: 0
          - name: POSITIVE
            description: A channel 0 event is defined as a positive edge on WAKEUP0.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: EV0_INPUT_EN
        description: Event enable control for channel 0. Event Inputs should remain DISABLED when not being used for event detection, particularly if the associated pin is being used for some other function.
        enumeratedValues:
          - name: DISABLED
            description: Event 0 input is disabled and forced high internally.
            value: 0
          - name: ENABLED
            description: Event 0 input is enabled.
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 4
        bitWidth: 6
      - name: INTWAKE_EN1
        description: Interrupt and wake-up enable for channel 1.
        enumeratedValues:
          - name: DISABLED
            description: No interrupt or wake-up will be generated by event channel 1.
            value: 0
          - name: ENABLED
            description: An event in channel 1 will trigger an (RTC) interrupt and a wake-up request.
            value: 1
        bitOffset: 10
        bitWidth: 1
      - name: GPCLEAR_EN1
        description: Enables automatically clearing the RTC general purpose registers when an event occurs on channel 1.
        enumeratedValues:
          - name: DISABLED
            description: Channel 1 has no influence on the general purpose registers.
            value: 0
          - name: ENABLED
            description: A n event in channel 1 will clear the general purpose registers asynchronously.
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: POL1
        description: Selects the polarity of an event on input pin WAKEUP1.
        enumeratedValues:
          - name: NEGATIVE
            description: A channel 1 event is defined as a negative edge on WAKEUP1.
            value: 0
          - name: POSITIVE
            description: A channel 1 event is defined as a positive edge on WAKEUP1.
            value: 1
        bitOffset: 12
        bitWidth: 1
      - name: EV1_INPUT_EN
        description: Event enable control for channel 1. Event Inputs should remain DISABLED when not being used for event detection, particularly if the associated pin is being used for some other function.
        enumeratedValues:
          - name: DISABLED
            description: Event 1 input is disabled and forced high internally.
            value: 0
          - name: ENABLED
            description: Event 1 input is enabled.
            value: 1
        bitOffset: 13
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 14
        bitWidth: 6
      - name: INTWAKE_EN2
        description: Interrupt and wake-up enable for channel 2.
        enumeratedValues:
          - name: DISABLED
            description: No interrupt or wake-up will be generated by event channel 2.
            value: 0
          - name: ENABLED
            description: An event in channel 2 will trigger an (RTC) interrupt and a wake-up request.
            value: 1
        bitOffset: 20
        bitWidth: 1
      - name: GPCLEAR_EN2
        description: Enables automatically clearing the RTC general purpose registers when an event occurs on channel 2.
        enumeratedValues:
          - name: DISABLED
            description: Channel 2 has no influence on the general purpose registers.
            value: 0
          - name: ENABLED
            description: An event in channel 2 will clear the general purpose registers asynchronously.
            value: 1
        bitOffset: 21
        bitWidth: 1
      - name: POL2
        description: Selects the polarity of an event on input pin WAKEUP2.
        enumeratedValues:
          - name: NEGATIVE
            description: A channel 2 event is defined as a negative edge on WAKEUP2.
            value: 0
          - name: POSITIVE
            description: A channel 2 event is defined as a positive edge on WAKEUP2.
            value: 1
        bitOffset: 22
        bitWidth: 1
      - name: EV2_INPUT_EN
        description: Event enable control for channel 2. Event Inputs should remain DISABLED when not being used for event detection, particularly if the associated pin is being used for some other function.
        enumeratedValues:
          - name: DISABLED
            description: Event 2 input is disabled and forced high internally.
            value: 0
          - name: ENABLED
            description: Event 2 input is enabled.
            value: 1
        bitOffset: 23
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 24
        bitWidth: 6
      - name: ERMODE
        description: Controls enabling the Event Monitor/Recorder and selecting its operating frequency. Event Monitor/Recorder registers can always be written to regardless of the state of these bits. Events occurring during the 1-sec interval immediately following enabling of the clocks may not be recognized.
        enumeratedValues:
          - name: DISABLE_EVENT_MONITO
            description: Disable Event Monitor/Recorder clocks. Operation of the Event Monitor/Recorder is disabled except for asynchronous clearing of GP registers if selected.
            value: 0
          - name: 16_HZ_SAMPLE_CLOCK
            description: 16 Hz sample clock. Enable Event Monitor/Recorder and select a 16 Hz sample clock for event input edge detection and glitch suppression. Pulses (in either direction) shorter than 62.5 ms to 125 ms will be filtered out.
            value: 1
          - name: 64_HZ_SAMPLE_CLOCK
            description: 64 Hz sample clock. Enable Event Monitor/Recorder and select a 64 Hz sample clock for event input edge detection and glitch suppression. Pulses (in either direction) shorter than 15.6 ms to 31.2 ms will be filtered out.
            value: 2
          - name: 1_KHZ_SAMPLE_CLOCK
            description: 1 kHz sample clock. Enable Event Monitor/Recorder and select a 1 kHz sample clock for event input edge detection and glitch suppression. Pulses (in either direction) shorter than 1 ms to 2 ms will be filtered out.
            value: 3
        bitOffset: 30
        bitWidth: 2
  - name: ERCOUNTERS
    description: Event Monitor/Recorder Counters register. Allows reading the counters associated with the event channels.
    addressOffset: 136
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: COUNTER0
        description: Value of the counter for Event 0. If the counter reaches full count (the value 7), it remains there if additional events occur. This counter is cleared when the corresponding EVx bit in the ERSTATUS register is cleared by software.
