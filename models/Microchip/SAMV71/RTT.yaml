name: RTT
version: 6081M
description: Real-time Timer
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: MR
    description: Mode Register
    addressOffset: 0
    size: 32
    fields:
      - name: RTPRES
        description: Real-time Timer Prescaler Value
        bitOffset: 0
        bitWidth: 16
      - name: ALMIEN
        description: Alarm Interrupt Enable
        bitOffset: 16
        bitWidth: 1
      - name: RTTINCIEN
        description: Real-time Timer Increment Interrupt Enable
        bitOffset: 17
        bitWidth: 1
      - name: RTTRST
        description: Real-time Timer Restart
        bitOffset: 18
        bitWidth: 1
      - name: RTTDIS
        description: Real-time Timer Disable
        bitOffset: 20
        bitWidth: 1
      - name: RTC1HZ
        description: Real-Time Clock 1Hz Clock Selection
        bitOffset: 24
        bitWidth: 1
  - name: AR
    description: Alarm Register
    addressOffset: 4
    size: 32
    fields:
      - name: ALMV
        description: Alarm Value
        bitOffset: 0
        bitWidth: 32
  - name: VR
    description: Value Register
    addressOffset: 8
    size: 32
    access: read-only
    fields:
      - name: CRTV
        description: Current Real-time Value
        bitOffset: 0
        bitWidth: 32
  - name: SR
    description: Status Register
    addressOffset: 12
    size: 32
    access: read-only
    fields:
      - name: ALMS
        description: Real-time Alarm Status (cleared on read)
        bitOffset: 0
        bitWidth: 1
      - name: RTTINC
        description: Prescaler Roll-over Status (cleared on read)
        bitOffset: 1
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 16
    usage: registers
interrupts:
  - name: INT
    description: Real Time Timer
