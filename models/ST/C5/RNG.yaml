            value: 0
          - name: B_0x1
            description: The RNG clock before the internal divider is detected too slow (fRNGCLKless than fHCLK/32)
            value: 1
      - name: SEIS
        description: Seed error interrupt status
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No faulty sequence detected
            value: 0
          - name: B_0x1
            description: At least one faulty sequence is detected.
            value: 1
