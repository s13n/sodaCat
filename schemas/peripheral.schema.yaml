$schema: http://json-schema.org/draft-07/schema#
title: Peripheral Model
type: object
required:
- name
- registers
properties:
  name:
    type: string
  description:
    type: string
  groupName:
    type: string
  registers:
    type: array
    items:
      $ref: '#/definitions/registerOrCluster'
  params:
    type: array
    items:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [int, bool, string]
        default: {}
        max:
          type: integer
        description:
          type: string
  interrupts:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
  addressBlocks:
    type: array
    items:
      type: object
      properties:
        offset:
          type: integer
        size:
          type: integer
        usage:
          type: string
        headerStructName:
          type: string
definitions:
  dimValue:
    oneOf:
    - type: integer
    - type: array
      items:
        type: integer
  # Comma-separated list of identifier-safe tokens. Used when the array
  # indices are not a contiguous 0..N-1 range; each token is substituted
  # into the %s placeholder in the register name to produce one member.
  # Range form (e.g. "0-N") is intentionally rejected: normalize it to
  # a plain `dim` value with a bracketed `name: xxx[%s]` instead.
  dimIndexValue:
    type: string
    pattern: ^[A-Za-z0-9_]+(,[A-Za-z0-9_]+)*$
  # Register/cluster `name` must contain at least one %s placeholder
  # when used inside an array/cluster. Further structural constraints
  # (bracketed vs bare, matching dim arity, identifier-safe substitution)
  # are enforced by tools/validate_peripherals.py.
  arrayName:
    type: string
    pattern: '%s'
  register:
    type: object
    required:
    - name
    - addressOffset
    not:
      # Presence of `registers` makes an entry a cluster, not a register.
      required: [registers]
    properties:
      name:
        type: string
      description:
        type: string
      addressOffset:
        oneOf:
        - type: integer
        - type: string
          pattern: ^0x[0-9a-fA-F]+$
      size:
        type: integer
      access:
        type: string
      resetValue:
        type: integer
      resetMask:
        type: integer
      dim:
        $ref: '#/definitions/dimValue'
      dimIncrement:
        $ref: '#/definitions/dimValue'
      dimIndex:
        $ref: '#/definitions/dimIndexValue'
      fields:
        type: array
        items:
          type: object
          required:
          - name
          - bitOffset
          - bitWidth
          properties:
            name:
              type: string
            description:
              type: string
            bitOffset:
              type: integer
            bitWidth:
              type: integer
            access:
              type: string
            enumeratedValues:
              type: array
              items:
                type: object
                required:
                - name
                - value
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  value:
                    type: integer
  cluster:
    type: object
    required:
    - name
    - addressOffset
    - registers
    properties:
      name:
        type: string
      description:
        type: string
      addressOffset:
        oneOf:
        - type: integer
        - type: string
          pattern: ^0x[0-9a-fA-F]+$
      dim:
        $ref: '#/definitions/dimValue'
      dimIncrement:
        $ref: '#/definitions/dimValue'
      dimIndex:
        $ref: '#/definitions/dimIndexValue'
      registers:
        type: array
        items:
          $ref: '#/definitions/registerOrCluster'
  registerOrCluster:
    oneOf:
    - $ref: '#/definitions/register'
    - $ref: '#/definitions/cluster'
