name: CHIPID
version: 6417ZK
description: Chip identification
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CIDR
    description: Chip ID Register
    addressOffset: 0
    size: 32
    access: read-only
    fields:
      - name: VERSION
        description: Version of the Device
        bitOffset: 0
        bitWidth: 5
      - name: EPROC
        description: Embedded Processor
        bitOffset: 5
        bitWidth: 3
        enumeratedValues:
          - name: SAMx7
            description: Cortex-M7
            value: 0
          - name: ARM946ES
            description: ARM946ES
            value: 1
          - name: ARM7TDMI
            description: ARM7TDMI
            value: 2
          - name: CM3
            description: Cortex-M3
            value: 3
          - name: ARM920T
            description: ARM920T
            value: 4
          - name: ARM926EJS
            description: ARM926EJS
            value: 5
          - name: CA5
            description: Cortex-A5
            value: 6
          - name: CM4
            description: Cortex-M4
            value: 7
      - name: NVPSIZ
        description: Nonvolatile Program Memory Size
        bitOffset: 8
        bitWidth: 4
        enumeratedValues:
          - name: NONE
            description: None
            value: 0
          - name: _8K
            description: 8 Kbytes
            value: 1
          - name: _16K
            description: 16 Kbytes
            value: 2
          - name: _32K
            description: 32 Kbytes
            value: 3
          - name: _64K
            description: 64 Kbytes
            value: 5
          - name: _128K
            description: 128 Kbytes
            value: 7
          - name: _160K
            description: 160 Kbytes
            value: 8
          - name: _256K
            description: 256 Kbytes
            value: 9
          - name: _512K
            description: 512 Kbytes
            value: 10
          - name: _1024K
            description: 1024 Kbytes
            value: 12
          - name: _2048K
            description: 2048 Kbytes
            value: 14
      - name: NVPSIZ2
        description: Second Nonvolatile Program Memory Size
        bitOffset: 12
        bitWidth: 4
        enumeratedValues:
          - name: NONE
            description: None
            value: 0
          - name: _8K
            description: 8 Kbytes
            value: 1
          - name: _16K
            description: 16 Kbytes
            value: 2
          - name: _32K
            description: 32 Kbytes
            value: 3
          - name: _64K
            description: 64 Kbytes
            value: 5
          - name: _128K
            description: 128 Kbytes
            value: 7
          - name: _256K
            description: 256 Kbytes
            value: 9
          - name: _512K
            description: 512 Kbytes
            value: 10
          - name: _1024K
            description: 1024 Kbytes
            value: 12
          - name: _2048K
            description: 2048 Kbytes
            value: 14
      - name: SRAMSIZ
        description: Internal SRAM Size
        bitOffset: 16
        bitWidth: 4
        enumeratedValues:
          - name: _48K
            description: 48 Kbytes
            value: 0
          - name: _192K
            description: 192 Kbytes
            value: 1
          - name: _384K
            description: 384 Kbytes
            value: 2
          - name: _6K
            description: 6 Kbytes
            value: 3
          - name: _24K
            description: 24 Kbytes
            value: 4
          - name: _4K
            description: 4 Kbytes
            value: 5
          - name: _80K
            description: 80 Kbytes
            value: 6
          - name: _160K
            description: 160 Kbytes
            value: 7
          - name: _8K
            description: 8 Kbytes
            value: 8
          - name: _16K
            description: 16 Kbytes
            value: 9
          - name: _32K
            description: 32 Kbytes
            value: 10
          - name: _64K
            description: 64 Kbytes
            value: 11
          - name: _128K
            description: 128 Kbytes
            value: 12
          - name: _256K
            description: 256 Kbytes
            value: 13
          - name: _96K
            description: 96 Kbytes
            value: 14
          - name: _512K
            description: 512 Kbytes
            value: 15
      - name: ARCH
        description: Architecture Identifier
        bitOffset: 20
        bitWidth: 8
        enumeratedValues:
          - name: SAME70
            description: SAM E70
            value: 16
          - name: SAMS70
            description: SAM S70
            value: 17
          - name: SAMV71
            description: SAM V71
            value: 18
          - name: SAMV70
            description: SAM V70
            value: 19
      - name: NVPTYP
        description: Nonvolatile Program Memory Type
        bitOffset: 28
        bitWidth: 3
        enumeratedValues:
          - name: ROM
            description: ROM
            value: 0
          - name: ROMLESS
            description: ROMless or on-chip Flash
            value: 1
          - name: FLASH
            description: Embedded Flash Memory
            value: 2
          - name: ROM_FLASH
            description: ROM and Embedded Flash Memory- NVPSIZ is ROM size- NVPSIZ2 is Flash size
            value: 3
          - name: SRAM
            description: SRAM emulating ROM
            value: 4
      - name: EXT
        description: Extension Flag
        bitOffset: 31
        bitWidth: 1
  - name: EXID
    description: Chip ID Extension Register
    addressOffset: 4
    size: 32
    access: read-only
    fields:
      - name: EXID
        description: Chip ID Extension
        bitOffset: 0
        bitWidth: 32
addressBlocks:
  - offset: 0
    size: 8
    usage: registers
