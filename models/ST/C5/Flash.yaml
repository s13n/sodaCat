        bitOffset: 0
        bitWidth: 4
        access: read-write
      - name: HDP2_EXT
        description: HDP area extension in 8Kbytes pages in bank2. Extension is added after the HDP2_END page (included).
        bitOffset: 16
        bitWidth: 4
        access: read-write
  - name: FLASH_OPTSR_CUR
