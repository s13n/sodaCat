        bitOffset: 0
        bitWidth: 9
      - name: FCNT
        description: 14-bit selected clock-counter value
        bitOffset: 9
        bitWidth: 14
      - name: MEAS
        description: Measure frequency
        enumeratedValues:
          - name: DISABLED
            description: RCNT and FCNT disabled
            value: 0
