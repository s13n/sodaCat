name: PMC
description: Power Management Controller (PMC)
groupName: PMC
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: PD0_SLEEP0_HW_ENA
    description: Hardware sleep event enable register
    addressOffset: 0
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: ENA_EVENT0
        description: "Writing a 1 enables the Cortex-M4 core to put the part\n\t\t\t\t\t\t\t\tinto any of the Power-down modes Deep-sleep,\n\t\t\t\t\t\t\t\tPower-down, or Deep power-down depending on the\n\t\t\t\t\t\t\t\tvalue in the PD0_SLEEP0_MODE register."
        bitOffset: 0
        bitWidth: 1
      - name: ENA_EVENT1
        description: "Writing a 1 enables the Cortex-M0 core and the\n\t\t\t\t\t\t\t\tCortex-M0 subsystem core to put the part into any of\n\t\t\t\t\t\t\t\tthe Power-down modes Deep-sleep, Power-down, or\n\t\t\t\t\t\t\t\tDeep power-down depending on the value in the\n\t\t\t\t\t\t\t\tPD0_SLEEP0_MODE register."
        bitOffset: 1
        bitWidth: 1
  - name: PD0_SLEEP0_MODE
    description: Sleep power mode register
    addressOffset: 28
    access: read-write
    resetValue: 4194175
    resetMask: 4294967295
    fields:
      - name: PWR_STATE
        description: "Selects between Deep-sleep, Power-down, and Deep power-down modes.\n\t\t\t\t\t\t\t\tOnly one of the following three values can be programmed in this register:\n\t\t\t\t\t\t\t\t0x0030 00AA = Deep-sleep mode\n\t\t\t\t\t\t\t\t0x0030 FCBA = Power-down mode\n\t\t\t\t\t\t\t\t0x0030 3CBA = Power-down mode with M0SUB SRAM maintained\n\t\t\t\t\t\t\t\t0x0030 FF7F = Deep power-down mode"
        bitOffset: 0
        bitWidth: 32
