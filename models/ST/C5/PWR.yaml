  - name: PWR_IORETR
    displayName: PWR_IORETR
    description: PWR I/O retention register
    addressOffset: 80
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: IORETEN
        description: IO retention enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: I/O retention mode is disabled.
            value: 0
          - name: B_0x1
            description: I/O retention mode is enabling for all I/Os except the I/O support the standby functionality and PA13, PA14, PA15, and PB4.
            value: 1
      - name: JTAGIORETEN
        description: IO retention enable for JTAG I/Os
        bitOffset: 16
        bitWidth: 1
