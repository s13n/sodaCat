name: SHA
description: (Secure Hash Algorithm) Accelerator
groupName: SHA
source: ESP32-P4 SVD v2
registers:
  - name: MODE
    description: Initial configuration register.
    addressOffset: 0
    size: 32
    fields:
      - name: MODE
        description: Sha mode.
        bitOffset: 0
        bitWidth: 3
        access: read-write
  - name: T_STRING
    description: 512/t configuration register 0.
    addressOffset: 4
    size: 32
    fields:
      - name: T_STRING
        description: Sha t_string (used if and only if mode == SHA_512/t).
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: T_LENGTH
    description: 512/t configuration register 1.
    addressOffset: 8
    size: 32
    fields:
      - name: T_LENGTH
        description: Sha t_length (used if and only if mode == SHA_512/t).
        bitOffset: 0
        bitWidth: 6
        access: read-write
  - name: DMA_BLOCK_NUM
    description: DMA configuration register 0.
    addressOffset: 12
    size: 32
    fields:
      - name: DMA_BLOCK_NUM
        description: Dma-sha block number.
        bitOffset: 0
        bitWidth: 6
        access: read-write
  - name: START
    description: Typical SHA configuration register 0.
    addressOffset: 16
    size: 32
    fields:
      - name: START
        description: Reserved.
        bitOffset: 1
        bitWidth: 31
        access: read-only
  - name: CONTINUE
    description: Typical SHA configuration register 1.
    addressOffset: 20
    size: 32
    fields:
      - name: CONTINUE
        description: Reserved.
        bitOffset: 1
        bitWidth: 31
        access: read-only
  - name: BUSY
    description: Busy register.
    addressOffset: 24
    size: 32
    fields:
      - name: STATE
        description: "Sha busy state. 1'b0: idle. 1'b1: busy."
        bitOffset: 0
        bitWidth: 1
        access: read-only
  - name: DMA_START
    description: DMA configuration register 1.
    addressOffset: 28
    size: 32
    fields:
      - name: DMA_START
        description: Start dma-sha.
        bitOffset: 0
        bitWidth: 1
        access: write-only
  - name: DMA_CONTINUE
    description: DMA configuration register 2.
    addressOffset: 32
    size: 32
    fields:
      - name: DMA_CONTINUE
        description: Continue dma-sha.
        bitOffset: 0
        bitWidth: 1
        access: write-only
  - name: CLEAR_IRQ
    description: Interrupt clear register.
    addressOffset: 36
    size: 32
    fields:
      - name: CLEAR_INTERRUPT
        description: Clear sha interrupt.
        bitOffset: 0
        bitWidth: 1
        access: write-only
  - name: IRQ_ENA
    description: Interrupt enable register.
    addressOffset: 40
    size: 32
    fields:
      - name: INTERRUPT_ENA
        description: "Sha interrupt enable register. 1'b0: disable(default). 1'b1: enable."
        bitOffset: 0
        bitWidth: 1
        access: read-write
  - name: DATE
    description: Date register.
    addressOffset: 44
    size: 32
    resetValue: 538972713
    fields:
      - name: DATE
        description: Sha date information/ sha version information.
        bitOffset: 0
        bitWidth: 30
        access: read-write
  - dim: 16
    dimIncrement: 4
    name: H_MEM[%s]
    description: Sha H memory which contains intermediate hash or finial hash.
    addressOffset: 64
    size: 32
    fields:
  - dim: 16
    dimIncrement: 4
    name: M_MEM[%s]
    description: Sha M memory which contains message.
    addressOffset: 128
    size: 32
    fields:
addressBlocks:
  - offset: 0
    size: 176
    usage: registers
interrupts:
  - name: INTR
