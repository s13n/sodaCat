name: SQI
version: 040444a0
description: Serial quad interface
groupName: SQI
prependToName: SQI_
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: CTRLA
    description: Control A register
    addressOffset: 0
    size: 32
    resetValue: 0
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: LOW
            description: No reset in progress
            value: 0
          - name: HIGH
            description: Reseting the registers and EIP
            value: 1
      - name: RUNSTDBY
        description: Run in Standby
        bitOffset: 6
        bitWidth: 1
        enumeratedValues:
          - name: LOW
            description: Module is disabled in Standby Sleep mode
            value: 0
          - name: HIGH
            description: Module continues to run in Standby Sleep mode
            value: 1
  - name: INTENCLR
    description: Interrupt Enable Clear Register
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: SQI
        description: SQI Interrupt Enable Clear
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: LOW
            description: Interrupt Enabled
            value: 0
          - name: HIGH
            description: Interrupt Disabled
            value: 1
  - name: INTENSET
    description: Interrupt Enable Set Register
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: SQI
        description: SQI Interrupt Enable Set
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: LOW
            description: Interrupt disabled
            value: 0
          - name: HIGH
            description: Interrupt enabled
            value: 1
  - name: INTFLAG
    description: Interrupt Status and Clear Register
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: SQI
        description: Read value reflects the state of the interrupt flag. Do not use the interrupt flag and associated mask registers if the EIP already provides similar controls for its interrupts. This feature is design for interrupts created in the SIB or EIP which do not have mask or flag bits. Write to 1 to clear the flag.
        bitOffset: 0
        bitWidth: 1
  - name: SYNCBUSY
    description: Syncbusy Register
    addressOffset: 32
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SWRST
        description: Software Reset Synchronization Busy
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: LOW
            description: SWRST synchronization is not busy
            value: 0
          - name: HIGH
            description: SWRST synchronization is busy
            value: 1
  - name: XCON1
    description: SPI XIP Control1 register
    addressOffset: 256
    size: 32
    resetValue: 539757568
    fields:
      - name: TYPECMD
        description: SPI TYPE Command  - Single lane mode, - Dual lane mode, - Quad lane mode, - Reserved for Future use, Based on this field, the boot controller will send the command in 1/2/4 lane.
        bitOffset: 0
        bitWidth: 2
      - name: TYPEADDR
        description: SPI TYPE Address 00 - Single lane mode ,01 - Dual lane mode ,10 - Quad lane mode ,11 - Reserved for Future use  Based on this field, the boot controller will send  the Address in 1/2/4 lane.
        bitOffset: 2
        bitWidth: 2
      - name: TYPEMODE
        description: 'SPI TYPE Mode: 00 - Single lane mode, 01 - Dual lane mode, 10 - Quad lane mode, 11 - Reserved for Future use. Based on this field, the boot controller will send the Mode in 1/2/4 lane.'
        bitOffset: 4
        bitWidth: 2
      - name: TYPEDUMMY
        description: 'SPI TYPE DUMMY: 00 - Single lane mode ,01 - Dual lane mode,10 - Quad lane mode ,11 - Reserved for Future use. Based on this field, the boot controller will send the Dummy in 1/2/4 lane.'
        bitOffset: 6
        bitWidth: 2
      - name: TYPEDATA
        description: 'SPI TYPE DATA: 00 - Single lane mode  ,01 - Dual lane mode  ,10 - Quad lane mode  ,11 - Reserved for Future use  Based on this field, the boot controller will receive the data in 1/2/4 lane.'
        bitOffset: 8
        bitWidth: 2
      - name: READOPCODE
        description: 8bit opcode value for Read operation
        bitOffset: 10
        bitWidth: 8
      - name: ADDRBYTES
        description: 000  - Zero Address Bytes ,001  - 1 Address Byte ,010  - 2 Address Bytes ,011  - 3 Address Bytes ,100  - 4 Address Bytes ,101  - 111- Reserved for Future Use
        bitOffset: 18
        bitWidth: 3
      - name: DUMMYBYTES
        description: 000  - Zero Dummy bytes ,001  - Transmit one dummy byte (8?h ff) ,010  - Transmit two dummy bytes (16?h ffff) ,011  - Transmit three dummy bytes (24?h ffffff) ,111  - Transmit Seven dummy bytes
        bitOffset: 21
        bitWidth: 3
      - name: DDRCMD
        description: XIP SPI TYPE CMD DDR  0 - SDR mode, 1 - DDR mode. Based on this field, the boot controller will send  the command in SDR/DDR mode.
        bitOffset: 24
        bitWidth: 1
      - name: DDRADDR
        description: XIP SPI TYPE ADDR DDR  0 - SDR mode, 1 - DDR mode. Based on this field, the boot controller will send  the address bytes in SDR/DDR mode.
        bitOffset: 25
        bitWidth: 1
      - name: DDRMODE
        description: XIP SPI TYPE MODE DDR  0 - SDR mode, 1 - DDR mode. Based on this field, the boot controller will send the mode bytes in SDR/DDR mode.
        bitOffset: 26
        bitWidth: 1
      - name: DDRDUMMY
        description: XIP SPI TYPE DUMMY DDR. 0 - SDR mode, 1 - DDR mode. Based on this field, the boot controller will send the dummy bytes in SDR/DDR mode.
        bitOffset: 27
        bitWidth: 1
      - name: DDRDATA
        description: XIP SPI TYPE DATA DDR  0 - SDR mode, 1 - DDR mode. Based on this field, the boot controller will send  the data in SDR/DDR mode.
        bitOffset: 28
        bitWidth: 1
      - name: SDRCMD
        description: "SPI TYPE CMD SDR2DDR: This bit is used by the controller only when  XIP_SPI_TYPE_CMD_DDR is 1?b1 i.e., when command sent in DDR mode. 0 - The command (XIP_SPI_READ_OPCODE) will take 4 clock cycles. Data will go in both the edges. Used when Flash expecting the cmd in ddr mode. Here the command will go as 1byte only. 1- The command (XIP_SPI_READ_OPCODE) will take 8 clock cycles. Data will go in both the edges. Used when Flash expecting the cmd in sdr mode, but user wants to send in ddr mode. Here the command will go as 2bytes. The value (single byte) programmed in XIP_SPI_READ_OPCODE is replicated into 2bytes by the controller and sent on spi bus. Example for CMD SDR2DDR bit 1: Say opcode = 'h ac (1010 1100) Replicated pattern 11 00 11 00 11 11 00 00 ('h ccf0). So 1st 4 clock cycles hcc; next 4 clock cycles hf0 goes on spi bus."
        bitOffset: 29
        bitWidth: 1
  - name: XCON2
    description: SPI XIP Control2 register
    addressOffset: 260
    size: 32
    resetValue: 160
    fields:
      - name: MODECODE
        description: 8bit value for Mode byte
        bitOffset: 0
        bitWidth: 8
      - name: MODEBYTES
        description: Mode Bytes 00 - 0 Mode Bytes , 01 - 1 Mode Byte , 10 - 2 Mode Bytes , 11 - 3 Mode Bytes
        bitOffset: 8
        bitWidth: 2
      - name: DEVSEL
        description: 'XIP SPI Device Select: This field is used to select a particular SPI device 000 - Select Device0 , 001 - Select Device1 , 010 - Select Device2 , 011 - Select Device3 , 100 - Select Device4 , 101 - Select Device5 , 110 - Select Device6 , 111 - Select Device7'
        bitOffset: 10
        bitWidth: 3
  - name: CFG
    description: SPI Configuration Register
    addressOffset: 264
    size: 32
    resetValue: 16809473
    fields:
      - name: MODE
        description: Mode Select The default value of this field is 0. After power on reset, the controller enters boot mode. 000 - Boot mode. The CSR registers are loaded with boot strap values. 001 - PIO mode. The controller is controlled by the CPU in PIO mode. 010 - DMA mode.  011 - XIP mode. When this mode is entered the controller behaves as if executing in Place (XIP) but uses the register data to control timing. 100 - 111 - Reserved
        bitOffset: 0
        bitWidth: 3
      - name: CPHA
        description: Clock phase (selects the transfer format) 0 = SPICLK starts toggling at the middle of 1st data bit. 1 = SPICLK starts toggling at the start of 1st data bit.
        bitOffset: 3
        bitWidth: 1
      - name: CPOL
        description: Clock polarity 0 = active-high SPICLK (SPICLK low is the idle state) 1 = active-low SPICLK (SPICLK high is the idle state)
        bitOffset: 4
        bitWidth: 1
      - name: LSBF
        description: Data format on SPI interface  0 = MSBit sent/received first. 1 = LSBit sent/received first.  This setting is supeceded by LSBF control bit in Buffer Descriptor during DMA operations.
        bitOffset: 5
        bitWidth: 1
      - name: WP
        description: 'Write Protect: In single or Dual lane mode, this bit is used to drive the spiout2 signal. Whenever this bit is high, the controller drives 0 on spiout2 line and sets spimoe2 high (active only during transfer).'
        bitOffset: 9
        bitWidth: 1
      - name: HOLD
        description: 'Hold: In Single or Dual lane mode, this bit is used to drive the spiout3 signal. Whenever this bit is high, the controller drives 0 on spiout3 line and sets spimoe3 high (active only during transfer).'
        bitOffset: 10
        bitWidth: 1
      - name: BURSTEN
        description: This field is used to configure the AHB Master Burst capability. 1 - AHB INCR is enabled 0 - AHB INCR is disabled
        bitOffset: 11
        bitWidth: 1
      - name: AHB_BURST_INCR4_EN
        description: This field is used to configure the AHB Master Burst capability. 1 - AHB INCR4 is enabled. 0 - AHB INCR4 is disabled
        bitOffset: 12
        bitWidth: 1
      - name: AHB_BURST_INCR8_EN
        description: This field is used to configure the AHB Master Burst capability. 1 - AHB INCR8 is enabled. 0 - AHB INCR8 is disabled
        bitOffset: 13
        bitWidth: 1
      - name: AHB_BURST_INCR16_EN
        description: This field is used to configure the AHB Master Burst capability.  1 - AHB INCR16 is enabled.  0 - AHB INCR16 is disabled
        bitOffset: 14
        bitWidth: 1
      - name: TXBUFRST
        description: 'Transmit FIFO Reset A reset pulse is generated when writing 1 to this bit. This bit is Auto clear and SPI Controller will clear this bit. Transmit FIFO pointers will get reset by this reset pulse. Note: Transmit FIFO reset can be done only after a transaction is complete on spi bus; however if we want to reset FIFO during  transaction, we need to go for soft reset only.Note: For Michigan Ax versions, treat as Reserved, keep 0.'
        bitOffset: 17
        bitWidth: 1
      - name: RXBUFRST
        description: 'Receive FIFO Reset A reset pulse is generated when writing 1 to this bit. This bit is Auto clear and SPI Controller will clear this bit. Receive fifo pointers will get reset by this reset pulse. Note: Receive FIFO reset can be done only after a transaction is complete on spi bus; however if we want to reset FIFO during transaction, we need to go for soft reset only. Note: For Michigan Ax versions, treat as Reserved, keep 0.'
        bitOffset: 18
        bitWidth: 1
      - name: CONBUFRST
        description: 'Control FIFO Reset A reset pulse is generated when writing 1 to this bit. This bit is Auto clear and SPI Controller will clear this bit. Control fifo pointers will get reset by this reset pulse. Note: Control FIFO reset can be done only after a transaction is complete on spi bus; however if we want to reset FIFO during transaction, we need to go for soft reset only. Note: For Michigan Ax versions, treat as Reserved, keep 0.'
        bitOffset: 19
        bitWidth: 1
      - name: DATAEN
        description: Max Data Lanes 11 - Reserved, 10 - 4, 01 - 2, 00 - 1 SPI_OUT_PIN_EN[3:0] output pins are controlled by writing to these bits.
        bitOffset: 20
        bitWidth: 2
      - name: SQIEN
        description: 1 - Enabled, 0 - Disabled SPI_ON output pin is controlled by writing to  this bit.
        bitOffset: 23
        bitWidth: 1
      - name: CSEN
        description: 1 - Chip Select is used 0 - Chip Select is not used SPI_CS[7] for  CS7, SPI_CS[6] for  CS6, SPI_CS[5] for  CS5, SPI_CS[4] for  CS4, SPI_CS[3] for  CS3, SPI_CS[2] for  CS2, SPI_CS[1] for  CS1, SPI_CS[0] for  CS0. SPI_CS_PIN_EN[7:0/3:0] output pins are  controlled by writing to these bits.
        bitOffset: 24
        bitWidth: 8
  - name: CON
    description: SPI Control register
    addressOffset: 268
    size: 32
    resetValue: 0
    fields:
      - name: TXRXCOUNT
        description: 'This bit specifies the total number of bytes to transmit or receive (based on CMD_INIT field). ,16?d 0 - Reserved,16?d 1 - 1byte to transmit/receive ,16?d 2 - 2bytes to transmit/receive NOTE: Count must be programmed to non-zero value prior to initiating transaction'
        bitOffset: 0
        bitWidth: 16
      - name: CMDINIT
        description: 'This signal indicates the command initiation mode. If it is Transmit, Commands are initiated based on writes to transmit register or the contents of TX FIFO. If the CMD_INIT is Receive, commands are initiated based on reads to Read register or RX FIFO availability. 00 = Reserved.  01 = Initiate Transmit.  10 = Initiate Receive. 11 = Reserved.  Note: If Boot mode is enabled, the default value  is 2?b10  This is NOT active status field, see SPI Status2 Reg (0x30)'
        bitOffset: 16
        bitWidth: 2
      - name: LANEMODE
        description: SPI Lane mode 00 - Single lane mode ,01 - Dual lane mode ,10 - Quad lane mode ,11 - Reserved for Future use
        bitOffset: 18
        bitWidth: 2
      - name: DEVSEL
        description: 'SPI Device Select: This field along with bit25 is used to select a particular SPI device. Note: For Michigan Ax versions, extension by bit25 is NOT used (only 4 devices are selectable, by bits 21:20 here).'
        bitOffset: 20
        bitWidth: 2
      - name: DASSERT
        description: Chip Select Assert 0 - CS is not de-asserted after transmission/reception of specified number of bytes in the control register 1 - CS is de-asserted after transmission/reception of specified number of bytes in the control register
        bitOffset: 22
        bitWidth: 1
      - name: DDRMODE
        description: 'SDR_DDR: 0 - SDR mode, 1 - DDR mode. Note: For Michigan Ax versions this bit is Reserved and should be kept 0.'
        bitOffset: 23
        bitWidth: 1
      - name: SCHECK
        description: 'Status Check This bit is mainly used for Programming or Erase operations. 0 - do not check status, 1 - check status. If this bit is set to 1, the hardware will issue the status command automatically after the current operation and wait for busy bit to clear. The hardware will issue the next command only after this Status check phase. Note: For Michigan Ax versions, this bit is Reserved and should be kept 0.'
        bitOffset: 24
        bitWidth: 1
      - name: DEV_SEL_2
        description: 'SPI Device Select[2]: This field along with SPI DEVICE SELECT [1:0] (bits 21:20) together is used to select a particular SPI device. Bit25 Bit21 Bit20  0 0 0 - SPI Device 0 ,0 0 1 - SPI Device 1 ,0 1 0 - SPI Device 2  ,0 1 1 - SPI Device 3, 1 0 0 - SPI Device 4 ,1 0 1 - SPI Device 5 ,1 1 0 - SPI Device 6 ,1 1 1 - SPI Device 7 Note: For Michigan Ax versions, this bit is Reserved and should be kept 0.'
        bitOffset: 25
        bitWidth: 1
  - name: CLKCON
    description: SPI Clock Control register
    addressOffset: 272
    size: 32
    resetValue: 1
    fields:
      - name: EN
        description: This bit is set to 0 when the SPI Driver is not using the SPI Controller. The SPI  Controller should stop its internal clock to go very low power state. Still, registers  will be able to be read and written. Clock starts to oscillate when this bit is set to 1. When clock oscillation is stable, the SPI Controller will set Internal Clock Stable in this register to 1. 1 - Enable 0 - Disable
        bitOffset: 0
        bitWidth: 1
      - name: STABLE
        description: After Reset, this bit is set to 1 when SPI Clock  is  stable  after  writing  Internal Clock  Enable  in  this  register  to  1. The Clock  Stable  indication  will  continue unless   the   Clock   Divisor   Value   is changed, in which case it will wait until Clock is stable again. Stability is reached when the Clock Divisor period has been reached. The SPI Host Driver should wait until this bit is set to 1 (and the Enable is 1) before programming the SPI Control register. 1 - Stable 0 - Not stable
        bitOffset: 1
        bitWidth: 1
      - name: CLKDIV
        description: 'SPI Clock Frequency Select 400h - base clock divided by 2048 ,200h - base clock divided by 1024  ,100h - base clock divided by 512 ,080h - base clock divided by 256 ,040h - base clock divided by 128 ,020h - base clock divided by 64 ,010h - base clock divided by 32 ,008h - base clock divided by 16 ,004h - base clock divided by 8 ,002h - base clock divided by 4 ,001h - base clock divided by 2 ,000h - base clock Setting 000h specifies the highest frequency of the SPI Clock. NOTE:  When  DDR  mode  is  active,  the output SPI_CLK is further divided by two (so that internal clocking remains rise edge active internally)  Max output SPI_CLK for DDR is 66Mhz.'
        bitOffset: 8
        bitWidth: 11
  - name: CMDTHR
    description: SPI command threshold register
    addressOffset: 276
    size: 32
    resetValue: 257
    fields:
      - name: RXCMDTHR
        description: In RX initiation mode, SPI attempts to perform receive fetch operations until RX_CMD_THRES bytes of space remain in the receive buffer. If space for RX_CMD_THRES bytes is not present in the FIFO, then SPI would not initiate any transfer. RX_CMD_THRES should only be programmed when RX is not active, during IDLE or TX. Please note that if S/W performs any reads, thereby reducing the FIFO count, then HW would initiate RX transfer to get back FIFO count equal to RX_CMD_THRES. If S/W would not like any more words latched into FIFO, then command initiation mode needs to be changed to IDLE before any FIFO reads by S/W. In case of Boot/XIP mode, the SPI Controller uses the AHB Burst size, instead of RX CMD Threshold value.
        bitOffset: 0
        bitWidth: 8
      - name: TXCMDTHR
        description: 'In TX Initiation Mode, SPI Performs a transmit Operation when TX_CMD_THRES bytes are present in the TX FIFO. This should usually be set to 1 for normal flash commands, and is desired to be set to a higher value for page programming. NOTE: Value of 8?d0 should be treated as Reserved (illegal) for this field. May produce unexpected activity on SPI bus. Furthermore, values should generally be limited to EVEN values (excepting a value  of 1), and MUST be so limited in DMA mode.'
        bitOffset: 8
        bitWidth: 8
  - name: INTTHR
    description: SPI Interrupt Threshold register
    addressOffset: 280
    size: 32
    resetValue: 0
    fields:
      - name: RXINTTHR
        description: Receive Interrupt is set when Receive FIFO CNT is larger than or equal to RX_INT_THRES Value.
        bitOffset: 0
        bitWidth: 8
      - name: TXINTTHR
        description: Transmit Interrupt is set when Transmit FIFO has equal or more space than TX_INT_THRES bytes.
        bitOffset: 8
        bitWidth: 8
  - name: INTEN
    description: SPI Interrupt Enable Register
    addressOffset: 284
    size: 32
    resetValue: 173
    fields:
      - name: TXEMPTYIE
        description: TX FIFO Empty Interrupt Enable.
        bitOffset: 0
        bitWidth: 1
      - name: TXFULLIE
        description: TX FIFO Full Interrupt Enable.
        bitOffset: 1
        bitWidth: 1
      - name: TXTHRIE
        description: Enable Interrupt to be generated when the TX FIFO has space equal to or more than TX_INT_THRES words.
        bitOffset: 2
        bitWidth: 1
      - name: RXEMPTYIE
        description: RX FIFO Empty Interrupt Enable.
        bitOffset: 3
        bitWidth: 1
      - name: RXFULLIE
        description: RX FIFO Full Interrupt Enable.
        bitOffset: 4
        bitWidth: 1
      - name: RXTHRIE
        description: Enable Interrupt to be generated when the RX FIFO has data more than or equal to RX_INT_THRES words. In case of Boot/XIP mode, the power on reset value of RX buffer threshold is zero. So this bit will be set to 1, immediately after power  on reset, till a read request on the AHB Bus.
        bitOffset: 5
        bitWidth: 1
      - name: CONFULLIE
        description: Control Buffer Full Interrupt Enable
        bitOffset: 6
        bitWidth: 1
      - name: CONEMPTYIE
        description: Control Buffer Empty Interrupt Enable
        bitOffset: 7
        bitWidth: 1
      - name: CONTHRIE
        description: Control Buffer Threshold Interrupt Enable
        bitOffset: 8
        bitWidth: 1
      - name: BDDONEIE
        description: Current Buffer Descriptor Interrupt Enable
        bitOffset: 9
        bitWidth: 1
      - name: PKTCOMPIE
        description: Packet completion Interrupt
        bitOffset: 10
        bitWidth: 1
      - name: DMAEIE
        description: Master Error Interrupt Enable
        bitOffset: 11
        bitWidth: 1
  - name: INTSTAT
    description: SPI Interrupt Status Register
    addressOffset: 288
    size: 32
    resetValue: 173
    fields:
      - name: TXEMPTYIF
        description: TX FIFO Empty Interrupt.
        bitOffset: 0
        bitWidth: 1
      - name: TXFULLIF
        description: TX FIFO Full Interrupt.
        bitOffset: 1
        bitWidth: 1
      - name: TXTHRIF
        description: Interrupt to be generated when the TX FIFO has space equal to or more than  TX_INT_THRES words.
        bitOffset: 2
        bitWidth: 1
      - name: RXEMPTYIF
        description: RX FIFO Empty Interrupt.
        bitOffset: 3
        bitWidth: 1
      - name: RXFULLIF
        description: RX FIFO Full Interrupt.
        bitOffset: 4
        bitWidth: 1
      - name: RXTHRIF
        description: Interrupt to be generated when the RX FIFO has data more than or equal to  RX_INT_THRES words. In case of Boot/XIP mode, the power on reset value of RX buffer threshold is zero. So this bit will be set to 1, immediately after power on reset, till a read request on the AHB Bus.
        bitOffset: 5
        bitWidth: 1
      - name: CONFULLIF
        description: Control Buffer Full Interrupt
        bitOffset: 6
        bitWidth: 1
      - name: CONEMPTYIF
        description: Control Buffer Empty Interrupt
        bitOffset: 7
        bitWidth: 1
      - name: CONTHRIF
        description: Control Buffer Threshold Interrupt
        bitOffset: 8
        bitWidth: 1
      - name: BDDONEIF
        description: BDP sets this bit to '1' after current buffer descriptor is processed
        bitOffset: 9
        bitWidth: 1
      - name: PKTCOMPIF
        description: Packet completion Interrupt
        bitOffset: 10
        bitWidth: 1
      - name: DMAEIF
        description: Master Error Interrupt
        bitOffset: 11
        bitWidth: 1
  - name: TXDATA
    description: SPI Transmit Data Register
    addressOffset: 292
    size: 32
    resetValue: 0
    fields:
      - name: TXDATA
        description: Data is loaded into this register before being transmitted. Just prior to the beginning of a data transfer, the data in TX_DATA is loaded into the shift register. This register is  used as a window to write data into Transmit buffer.
        bitOffset: 0
        bitWidth: 32
  - name: RXDATA
    description: SPI Receive Data Register
    addressOffset: 296
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: RXDATA
        description: At the end of a data transfer, the data in the shift register is loaded into RX_DATA register. This register is used as a window to read data from Receive buffer.
        bitOffset: 0
        bitWidth: 32
  - name: STAT1
    description: SPI Status1 Register
    addressOffset: 300
    size: 32
    access: read-only
    resetValue: 16777216
    fields:
      - name: RXBUFCNT
        description: Number of Words of Read Data in the FIFO.
        bitOffset: 0
        bitWidth: 16
      - name: TXBUFFREE
        description: Number of Words of Space available in the TX FIFO. Max value equals value of MEM_SIZE_BYTES parameter. Default value is Max
        bitOffset: 16
        bitWidth: 16
  - name: STAT2
    description: SPI status 2 register
    addressOffset: 304
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: TXOV
        description: This bit would get set when TX FIFO OVERFLOW happens. S/W needs to monitor TX_FIFO_FREE when filling TX_FIFO to make sure TX FIFO doesn?t over flow or in case OVERFLOW bit gets set, then TX_FIFO_RST (bit 17 of SPI Configuration register) should be set which would then clear TX FIFO pointers and hence this bit would get cleared. Generally software should avoid getting into this condition.
        bitOffset: 0
        bitWidth: 1
      - name: RXUN
        description: This bit would get set when RX FIFO UNDERFLOW happens.  S/W needs to monitor RX_FIFO_CNT when emptying RX_FIFO to make sure RX FIFO doesn?t under flow or in case UNDERFLOW bit gets set, then RX_FIFO_RST (bit 18 of SPI Configuration register) must be set which would then clear RX FIFO pointers and hence this bit would get cleared. Generally software should avoid getting into this condition.
        bitOffset: 1
        bitWidth: 1
      - name: SQID0
        description: 'SPI Data bus:  This status is used to check the SPI DATA line level for Debugging. Bit3 - SPI_IO0 ,Bit4 - SPI_IO1 ,Bit5 - SPI_IO2 ,Bit6 - SPI_IO3'
        bitOffset: 3
        bitWidth: 1
      - name: SQID1
        description: 'SPI Data bus:  This status is used to check the SPI DATA line level for Debugging. Bit3 - SPI_IO0 ,Bit4 - SPI_IO1 ,Bit5 - SPI_IO2 ,Bit6 - SPI_IO3'
        bitOffset: 4
        bitWidth: 1
      - name: SQID2
        description: 'SPI Data bus:  This status is used to check the SPI DATA line level for Debugging. Bit3 - SPI_IO0 ,Bit4 - SPI_IO1 ,Bit5 - SPI_IO2 ,Bit6 - SPI_IO3'
        bitOffset: 5
        bitWidth: 1
      - name: SQID3
        description: 'SPI Data bus:  This status is used to check the SPI DATA line level for Debugging. Bit3 - SPI_IO0 ,Bit4 - SPI_IO1 ,Bit5 - SPI_IO2 ,Bit6 - SPI_IO3'
        bitOffset: 6
        bitWidth: 1
      - name: CONAVAIL
        description: 'Indicates the number of entries in Control Buffer remaining. NOTE: This field not present in Michigan Ax versions. Treat as Reserved.'
        bitOffset: 7
        bitWidth: 3
      - name: CMDSTAT
        description: Reflect the (internal state machine) CMD_INIT value. Indicates whether the controller is in Transmit/Receive/IDLE state. 2?b00 - IDLE ,2?b01 - Transmit ,2?b10 - Receive ,2?b11 - Reserved
        bitOffset: 16
        bitWidth: 2
  - name: BDCON
    description: BD_CTRL Register
    addressOffset: 308
    size: 32
    resetValue: 0
    fields:
      - name: DMAEN
        description: DMA Enable Bit 1 - Enabled, 0 - Disabled
        bitOffset: 0
        bitWidth: 1
      - name: POLLEN
        description: Setting this bit would cause Buffer Descriptor processor (BDP) to poll for descriptor valid till descriptor valid bit is set or till poll counter expires based on value programmed in BD_POLL_CTRL register.
        bitOffset: 1
        bitWidth: 1
      - name: START
        description: Setting this bit to '1' would start BDP (Buffer Descriptor Processor) to fetch a  descriptor and hence this bit should be enabled only after all the DMA descriptor programming is done. Hardware clears this bit automatically after one clock cycle.
        bitOffset: 2
        bitWidth: 1
  - name: BDCURADD
    description: BD_CURR_ADDR Register
    addressOffset: 312
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: BDCURRADDR
        description: This register field contains the current descriptor address being processed by Buffer Descriptor Processor (BDP)
        bitOffset: 0
        bitWidth: 32
  - name: BDBASEADD
    description: BD_BASE_ADDR register
    addressOffset: 320
    size: 32
    resetValue: 0
    fields:
      - name: BDADDR
        description: This register field contains the base address of the DMA. This register must be updated only when the DMA is IDLE.
        bitOffset: 0
        bitWidth: 32
  - name: BDSTAT
    description: BD_STATUS Register
    addressOffset: 324
    size: 32
    access: read-only
    fields:
      - name: BDCON
        description: This register field contains the current Descriptor control information. Bits [31:16] of BD_CTRL field of current descriptor are indicated in this register field.
        bitOffset: 0
        bitWidth: 16
      - name: DMAACTV
        description: A value of '1' would indicate that Buffer Descriptor Processor (BDP) is not Idle. Value of '0' would indicate that BDP is in IDLE state
        bitOffset: 16
        bitWidth: 1
      - name: DMASTART
        description: This register field would indicate whether DMA has started or not, if bit it set '1', then it indicates DMA start has happened. Value of '0' would indicate that DMA hasn't started.
        bitOffset: 17
        bitWidth: 1
      - name: BDSTATE
        description: 'This register field contains current BDP state :  0  IDLE, 1  Descriptor fetch Request Pending, 2  BD loading, 3  Data phase , 4  Descriptor Done, 5  Fetched BD is disabled, 6  Wait for Control Buffer Available, 7  Wait for AHB Error Acknowledgement'
        bitOffset: 18
        bitWidth: 4
  - name: BDPOLLCON
    description: BD_POLL_CTRL Register
    addressOffset: 328
    size: 32
    fields:
      - name: POLLCON
        description: Number of cycles that BDP block would wait before re-fetching the Descriptor control word if the previous descriptor fetched was disabled
        bitOffset: 0
        bitWidth: 16
  - name: BDTXDSTAT
    description: BD_TX_DMA_STATUS Register
    addressOffset: 332
    size: 32
    fields:
      - name: TXCURBUFLEN
        description: This register field gives the length of the current buffer transmit length
        bitOffset: 0
        bitWidth: 16
      - name: TXBUFCNT
        description: This register field gives the information about the internal transmit FIFO space.
        bitOffset: 16
        bitWidth: 8
  - name: BDRXDSTAT
    description: BD_RX_DMA_STATUS Register
    addressOffset: 336
    size: 32
    access: read-only
    fields:
      - name: RXCURBUFLEN
        description: This register field gives the length of the current buffer receive length
        bitOffset: 0
        bitWidth: 16
      - name: RXBUFCNT
        description: This register field gives the information about the internal receive FIFO space.
        bitOffset: 16
        bitWidth: 1
  - name: THR
    description: SPI Control threshold register
    addressOffset: 340
    size: 32
    resetValue: 0
    fields:
      - name: THRES
        description: SPI Control Threshold Value. SPI Control Threshold Interrupt is asserted, whenever larger than SPI Control Threshold amount of space available in SPI Control Buffer.
        bitOffset: 0
        bitWidth: 3
  - name: INTSIGEN
    description: SPI Interrupt Signal Enable Register
    addressOffset: 344
    size: 32
    resetValue: 2221
    fields:
      - name: TXEMPTYISE
        description: TX FIFO Empty Interrupt Signal Enable.
        bitOffset: 0
        bitWidth: 1
      - name: TXFULLISE
        description: TX FIFO Full Interrupt Signal Enable.
        bitOffset: 1
        bitWidth: 1
      - name: TXTHRISE
        description: Signal Enable Interrupt to be generated when the TX FIFO has space equal to or more than TX_INT_THRES words.
        bitOffset: 2
        bitWidth: 1
      - name: RXEMPTYISE
        description: RX FIFO Empty Interrupt Signal Enable.
        bitOffset: 3
        bitWidth: 1
      - name: RXFULLISE
        description: RX FIFO Full Interrupt Signal Enable.
        bitOffset: 4
        bitWidth: 1
      - name: RXTHRISE
        description: Signal Enable Interrupt to be generated when the RX FIFO has data more than or equal to RX_INT_THRES words.  In case of Boot/XIP mode, the power on reset value of RX buffer threshold is zero. So this bit will be set to 1, immediately after power on reset, till a read request on the AHB Bus.
        bitOffset: 5
        bitWidth: 1
      - name: CONFULLISE
        description: Control Buffer Full Interrupt Signal Enable
        bitOffset: 6
        bitWidth: 1
      - name: CONEMPTYISE
        description: Control Buffer Empty Interrupt Signal Enable
        bitOffset: 7
        bitWidth: 1
      - name: CONTHRISE
        description: Control Buffer Threshold Interrupt Signal Enable
        bitOffset: 8
        bitWidth: 1
      - name: BDDONEISE
        description: Current Buffer Descriptor Interrupt Signal Enable
        bitOffset: 9
        bitWidth: 1
      - name: PKTCOMPISE
        description: Packet completion Interrupt Signal Enable
        bitOffset: 10
        bitWidth: 1
      - name: DMAEISE
        description: Master Error Interrupt Signal Enable
        bitOffset: 11
        bitWidth: 1
  - name: TAPCON
    description: Tap Control Register
    addressOffset: 348
    size: 32
    resetValue: 1114145
    fields:
      - name: CLKOUTDLY
        description: Used to add delay on spi clock output.16 taps available.
        bitOffset: 0
        bitWidth: 4
      - name: DATAOUTDLY
        description: Used to add delay on spi data outputs (1/2/4lanes). 16 taps available.
        bitOffset: 4
        bitWidth: 4
      - name: SDRCLKINDLY
        description: Used only in SDR mode. This field is used to add tap delay cells on the spi clock input. Based on the mode of operation (SDR Vs DDR), the controller dynamically picks the appropriate delay values  (CLK_IN_DLY_CNT Vs CLK_IN_ALT_DLY_CNT).
        bitOffset: 8
        bitWidth: 6
      - name: DDRDATINDLY
        description: Used only in DDR mode. This field is used to add tap delay cells on the data input. Based on the mode of operation (SDR Vs DDR), the controller dynamically picks the appropriate delay values (DATA_IN_ALT_DLY_CNT Vs DATA_IN_DLY_CNT).
        bitOffset: 16
        bitWidth: 4
      - name: SDRDATINDLY
        description: Used only in SDR mode. This field is used to add tap delay cells on the Data input. Based on the mode of operation (SDR Vs DDR), the controller dynamically picks the appropriate delay values (DATA_IN_ALT_DLY_CNT Vs DATA_IN_DLY_CNT).
        bitOffset: 20
        bitWidth: 4
      - name: DDRCLKINDLY
        description: Used only in DDR mode. This field is used to add tap delay cells on the spi clock input. Based on the mode of operation (SDR Vs DDR), the controller dynamically picks the appropriate delay values (CLK_IN_DLY_CNT Vs CLK_IN_ALT_DLY_CNT).
        bitOffset: 24
        bitWidth: 6
  - name: MEMSTAT
    description: SPI Status Control Register
    addressOffset: 352
    size: 32
    resetValue: 65541
    fields:
      - name: STATCMD
        description: 'Status Data: The first byte to be sent must be in LSB. For example if the user wants to send 0F first and 0C second, then we should program 16?h0C0F.'
        bitOffset: 0
        bitWidth: 16
      - name: STATBYTES
        description: 'No. of bytes to send: 00 - Reserved ,01 - 1 byte ,10 - 2 bytes ,11 - Reserved'
        bitOffset: 16
        bitWidth: 2
      - name: TYPESTAT
        description: 'Status Lane: Indicates the number of lanes (single/dual/quad) in which the Status command/ Read Status Register value is transmitted to /received from flash. 2?b00 - single lane, 2?b01 - dual lane, 2?b10 - quad lane'
        bitOffset: 18
        bitWidth: 2
      - name: STATPOS
        description: Indicates whether the BUSY bit position in Status Register of flash is 0 or 7. 1?b0 - 0th bit position (bit 0 is valid for busy status), 1?b1 - 7th bit position (bit7 is valid for busy status) The Controller continuously reads the Status register value from flash until this bit which indicates the flash busy status goes low.
        bitOffset: 20
        bitWidth: 1
  - name: XCON3
    description: SPI XIP Control 3 Register
    addressOffset: 356
    size: 32
    resetValue: 0
    fields:
      - name: INIT1CMD1
        description: 8bit SPI Init1 Code1 value.
        bitOffset: 0
        bitWidth: 8
      - name: INIT1CMD2
        description: 8bit SPI Init1 Code2 value.
        bitOffset: 8
        bitWidth: 8
      - name: INIT1CMD3
        description: 8bit SPI Init1 Code3 value.
        bitOffset: 16
        bitWidth: 8
      - name: INIT1TYPE
        description: 'SPI TYPE  INIT1: 00 - Single lane mode , 01 - Dual lane mode , 10 - Quad lane mode , 11 - Reserved for Future use. Based on this field, the boot controller will send the INIT1 Code in 1/2/4 lane.'
        bitOffset: 24
        bitWidth: 2
      - name: INIT1COUNT
        description: 2bit SPI INIT1 Count. Indicates whether 1, 2 or 3 bytes of INIT1 Code value are being sent.
        bitOffset: 26
        bitWidth: 2
      - name: INIT1SCHECK
        description: 'SPI Init1 Status Check: 0 - do not check status, 1 - check status. If this bit is set to 1, the hardware will issue the status command automatically after the current operation and wait for busy bit to clear. The hardware will issue the next command only after this Status check phase. Note: The Status Command will be formed according to the settings in the SPI Status Control Reg (@0x60)'
        bitOffset: 28
        bitWidth: 1
  - name: XCON4
    description: SPI XIP Control4 Register
    addressOffset: 360
    size: 32
    resetValue: 0
    fields:
      - name: INIT2CMD1
        description: 8bit SPI Init2 Code1 value.
        bitOffset: 0
        bitWidth: 8
      - name: INIT2CMD2
        description: 8bit SPI Init2 Code2 value
        bitOffset: 8
        bitWidth: 8
      - name: INIT2CMD3
        description: 8bit SPI Init2 Code3 value
        bitOffset: 16
        bitWidth: 8
      - name: INIT2TYPE
        description: 'SPI TYPE INIT2:  00 - Single lane mode. 01 - Dual lane mode. 10 - Quad lane mode. 11 - Reserved for Future use. Based on this field, the boot controller will send the INIT2 Code in 1/2/4 lane.'
        bitOffset: 24
        bitWidth: 2
      - name: INIT2COUNT
        description: 2bit SPI INIT2 Count. Indicates whether 1, 2 or 3 bytes of INIT2 Code value are being sent.
        bitOffset: 26
        bitWidth: 2
      - name: INIT2SCHECK
        description: 'SPI Init2 Status Check: 0 - do not check status 1 - check status If this bit is set to 1, the hardware will issue the status command automatically after thecurrent operation and wait for busy bit to clear. The hardware will issue the next command only after this Status check phase. Note: The Status Command will be formed according to the settings in the SPI Status  Control Reg (@0x60)'
        bitOffset: 28
        bitWidth: 1
