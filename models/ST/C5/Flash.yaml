          - name: B_0x1
            description: Independent watchdog keep running in Standby mode.
            value: 1
      - name: BOOT_SEL
        description: Boot 0 source selection
        bitOffset: 22
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: BOOT0 signal is defined by the BOOT0 option bit
            value: 0
          - name: B_0x1
            description: BOOT0 signal is defined by BOOT0 pin value (legacy mode)
            value: 1
      - name: BOOT0
        description: Boot 0 option bit
        bitOffset: 23
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: BOOT0 = 0
            value: 0
          - name: B_0x1
            description: BOOT0 = 1
            value: 1
      - name: EDATA_EN
        description: Flash data area enable
        bitOffset: 29
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No flash data area (EDATA pages are 128 bits writable)
            value: 0
          - name: B_0x1
            description: Flash data area is enabled (EDATA pages are 16/32 bits writable)
            value: 1
      - name: SINGLE_BANK
        description: Dual bank selection option status bit
        bitOffset: 30
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: 128 Kbytes of user flash split with 64 Kbytes in Bank 1 and 64 Kbytes in Bank 2.
            value: 0
          - name: B_0x1
            description: 128 Kbytes of user flash located in one bank.
            value: 1
      - name: SWAP_BANK
        description: Bank swapping option status bit
        bitOffset: 31
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Bank1 and bank2 not swapped
            value: 0
          - name: B_0x1
            description: Bank1 and bank2 swapped
            value: 1
