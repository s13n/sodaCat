name: CLOCKS
source: RP2350 SVD v0.1
registers:
  - name: CLK_%s
    dimIndex: GPOUT0,GPOUT1,GPOUT2,GPOUT3,REF,SYS,PERI,HSTX,USB,ADC
    dim: 10
    addressOffset: 0
    dimIncrement: 12
    registers:
      - name: CTRL
        addressOffset: 0
        description: Clock control, can be changed on-the-fly (except for auxsrc)
        resetValue: 0
        fields:
          - name: AUXSRC
            description: Selects the auxiliary clock source, will glitch when switching
            access: read-write
            enumeratedValues:
              - name: clksrc_pll_sys
                value: 0
              - name: clksrc_gpin0
                value: 1
              - name: clksrc_gpin1
                value: 2
              - name: clksrc_pll_usb
                value: 3
              - name: clksrc_pll_usb_primary_ref_opcg
                value: 4
              - name: rosc_clksrc
                value: 5
              - name: xosc_clksrc
                value: 6
              - name: lposc_clksrc
                value: 7
              - name: clk_sys
                value: 8
              - name: clk_usb
                value: 9
              - name: clk_adc
                value: 10
              - name: clk_ref
                value: 11
              - name: clk_peri
                value: 12
              - name: clk_hstx
                value: 13
              - name: otp_clk2fc
                value: 14
            bitOffset: 5
            bitWidth: 4
          - name: KILL
            description: Asynchronously kills the clock generator, enable must be set low before deasserting kill
            access: read-write
            bitOffset: 10
            bitWidth: 1
          - name: ENABLE
            description: Starts and stops the clock generator cleanly
            access: read-write
            bitOffset: 11
            bitWidth: 1
          - name: DC50
            description: Enables duty cycle correction for odd divisors, can be changed on-the-fly
            access: read-write
            bitOffset: 12
            bitWidth: 1
          - name: PHASE
            description: "This delays the enable signal by up to 3 cycles of the input clock \n                            This must be set before the clock is enabled to have any effect"
            access: read-write
            bitOffset: 16
            bitWidth: 2
          - name: NUDGE
            description: "An edge on this signal shifts the phase of the output by 1 cycle of the input clock \n                            This can be done at any time"
            access: read-write
            bitOffset: 20
            bitWidth: 1
          - name: ENABLED
            description: clock generator is enabled
            access: read-only
            bitOffset: 28
            bitWidth: 1
      - name: DIV
        addressOffset: 4
        resetValue: 65536
        fields:
          - name: FRAC
            description: Fractional component of the divisor, can be changed on-the-fly
            access: read-write
            bitOffset: 0
            bitWidth: 16
          - name: INT
            description: Integer part of clock divisor, 0 -> max+1, can be changed on-the-fly
            access: read-write
            bitOffset: 16
            bitWidth: 16
      - name: SELECTED
        addressOffset: 8
        description: Indicates which src is currently selected (one-hot)
        resetValue: 1
        fields:
          - name: SELECTED
            description: This slice does not have a glitchless mux (only the AUX_SRC field is present, not SRC) so this register is hardwired to 0x1.
            access: read-only
            bitOffset: 0
            bitWidth: 1
  - name: DFTCLK_XOSC_CTRL
    addressOffset: 120
    resetValue: 0
    fields:
      - name: SRC
        access: read-write
        enumeratedValues:
          - name: 'NULL'
            value: 0
          - name: clksrc_pll_usb_primary
            value: 1
          - name: clksrc_gpin0
            value: 2
        bitOffset: 0
        bitWidth: 2
  - name: DFTCLK_ROSC_CTRL
    addressOffset: 124
    resetValue: 0
    fields:
