name: RTC
description: Register block to control RTC
source: RP2040 SVD v0.1
registers:
  - name: CLKDIV_M1
    addressOffset: 0
    description: Divider minus 1 for the 1 second counter. Safe to change the value when RTC is not enabled.
    resetValue: 0
    fields:
      - name: CLKDIV_M1
        access: read-write
        bitOffset: 0
        bitWidth: 16
  - name: SETUP_0
    addressOffset: 4
    description: Setup register 0
    resetValue: 0
    fields:
      - name: DAY
        description: Day of the month (1..31)
        access: read-write
        bitOffset: 0
        bitWidth: 5
      - name: MONTH
        description: Month (1..12)
        access: read-write
        bitOffset: 8
        bitWidth: 4
      - name: YEAR
        description: Year
        access: read-write
        bitOffset: 12
        bitWidth: 12
  - name: SETUP_1
    addressOffset: 8
    description: Setup register 1
    resetValue: 0
    fields:
      - name: SEC
        description: Seconds
        access: read-write
        bitOffset: 0
        bitWidth: 6
      - name: MIN
        description: Minutes
        access: read-write
        bitOffset: 8
        bitWidth: 6
      - name: HOUR
        description: Hours
        access: read-write
        bitOffset: 16
        bitWidth: 5
      - name: DOTW
        description: 'Day of the week: 1-Monday...0-Sunday ISO 8601 mod 7'
        access: read-write
        bitOffset: 24
        bitWidth: 3
  - name: CTRL
    addressOffset: 12
    description: Control and status
    resetValue: 0
    fields:
      - name: RTC_ENABLE
        description: Enable RTC
        access: read-write
        bitOffset: 0
        bitWidth: 1
      - name: RTC_ACTIVE
        description: RTC enabled (running)
        access: read-only
        bitOffset: 1
        bitWidth: 1
      - name: LOAD
        description: Load RTC
        access: write-only
        bitOffset: 4
        bitWidth: 1
      - name: FORCE_NOTLEAPYEAR
        description: "If set, leapyear is forced off. \n                            Useful for years divisible by 100 but not by 400"
        access: read-write
        bitOffset: 8
        bitWidth: 1
  - name: IRQ_SETUP_0
    addressOffset: 16
    description: Interrupt setup register 0
    resetValue: 0
    fields:
      - name: DAY
        description: Day of the month (1..31)
        access: read-write
        bitOffset: 0
        bitWidth: 5
      - name: MONTH
        description: Month (1..12)
        access: read-write
        bitOffset: 8
        bitWidth: 4
      - name: YEAR
        description: Year
        access: read-write
        bitOffset: 12
        bitWidth: 12
      - name: DAY_ENA
        description: Enable day matching
        access: read-write
        bitOffset: 24
        bitWidth: 1
      - name: MONTH_ENA
        description: Enable month matching
        access: read-write
        bitOffset: 25
        bitWidth: 1
      - name: YEAR_ENA
        description: Enable year matching
        access: read-write
        bitOffset: 26
        bitWidth: 1
      - name: MATCH_ENA
        description: Global match enable. Don't change any other value while this one is enabled
        access: read-write
        bitOffset: 28
        bitWidth: 1
      - name: MATCH_ACTIVE
        access: read-only
        bitOffset: 29
        bitWidth: 1
  - name: IRQ_SETUP_1
    addressOffset: 20
    description: Interrupt setup register 1
    resetValue: 0
    fields:
      - name: SEC
        description: Seconds
        access: read-write
        bitOffset: 0
        bitWidth: 6
      - name: MIN
        description: Minutes
        access: read-write
        bitOffset: 8
        bitWidth: 6
      - name: HOUR
        description: Hours
        access: read-write
        bitOffset: 16
        bitWidth: 5
      - name: DOTW
        description: Day of the week
        access: read-write
        bitOffset: 24
        bitWidth: 3
      - name: SEC_ENA
        description: Enable second matching
        access: read-write
        bitOffset: 28
        bitWidth: 1
      - name: MIN_ENA
        description: Enable minute matching
        access: read-write
        bitOffset: 29
        bitWidth: 1
      - name: HOUR_ENA
        description: Enable hour matching
        access: read-write
        bitOffset: 30
        bitWidth: 1
      - name: DOTW_ENA
        description: Enable day of the week matching
        access: read-write
        bitOffset: 31
        bitWidth: 1
  - name: '1'
    addressOffset: 24
    description: Register 1.
    resetValue: 0
    fields:
      - name: DAY
        description: Day of the month (1..31)
        access: read-only
        bitOffset: 0
        bitWidth: 5
      - name: MONTH
        description: Month (1..12)
        access: read-only
        bitOffset: 8
        bitWidth: 4
      - name: YEAR
        description: Year
        access: read-only
        bitOffset: 12
        bitWidth: 12
  - name: '0'
    addressOffset: 28
    description: "Register 0 \n                    Read this before RTC 1!"
    resetValue: 0
    fields:
      - name: SEC
        description: Seconds
        access: read-only
        readAction: modify
        bitOffset: 0
        bitWidth: 6
      - name: MIN
        description: Minutes
        access: read-only
        readAction: modify
        bitOffset: 8
        bitWidth: 6
      - name: HOUR
        description: Hours
        access: read-only
        readAction: modify
        bitOffset: 16
        bitWidth: 5
      - name: DOTW
        description: Day of the week
        access: read-only
        readAction: modify
        bitOffset: 24
        bitWidth: 3
  - name: INTR
    addressOffset: 32
    description: Raw Interrupts
    resetValue: 0
    fields:
      - name: RTC
        access: read-only
        bitOffset: 0
        bitWidth: 1
  - name: INTE
    addressOffset: 36
    description: Interrupt Enable
    resetValue: 0
    fields:
      - name: RTC
        access: read-write
        bitOffset: 0
        bitWidth: 1
  - name: INTF
    addressOffset: 40
    description: Interrupt Force
    resetValue: 0
    fields:
      - name: RTC
        access: read-write
        bitOffset: 0
        bitWidth: 1
  - name: INTS
    addressOffset: 44
    description: Interrupt status after masking & forcing
    resetValue: 0
    fields:
      - name: RTC
        access: read-only
        bitOffset: 0
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 48
    usage: registers
interrupts:
  - name: IRQ
