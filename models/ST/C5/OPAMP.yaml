name: OPAMP
description: OPAMP register block
groupName: OPAMP
source: STM32C531 SVD v1.0.0
registers:
  - name: OPAMP_CSR
    displayName: OPAMP_CSR
    description: OPAMP control/status register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: OPAEN
        description: Operational amplifier enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Disable
            value: 0
          - name: B_0x1
            description: Enable
            value: 1
      - name: FORCE_VP
        description: Force internal reference on noninverting input
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Do not force (normal operation)
            value: 0
          - name: B_0x1
            description: Force
            value: 1
      - name: VP_SEL
        description: Noninverting input primary selection
        bitOffset: 2
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OPAMP_VINP0 pin
            value: 0
          - name: B_0x1
            description: OPAMP_VINP1 pin
            value: 1
          - name: B_0x2
            description: OPAMP_VINP2 pin
            value: 2
          - name: B_0x3
            description: OPAMP_VINP3 pin or DAC output channel
            value: 3
      - name: USERTRIM
        description: User trimming enable
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Disable (trimming by user not possible)
            value: 0
          - name: B_0x1
            description: Enable (trimming by user possible)
            value: 1
      - name: VM_SEL
        description: Inverting input primary selection
        bitOffset: 5
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OPAMP_VINM0 pin
            value: 0
          - name: B_0x1
            description: OPAMP_VINM1 pin
            value: 1
          - name: B_0x2
            description: Internal resistor divider middle point
            value: 2
          - name: B_0x3
            description: Operational amplifier output
            value: 3
      - name: OPAHSM
        description: Operational amplifier high-speed mode
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Normal speed
            value: 0
          - name: B_0x1
            description: High speed
            value: 1
      - name: OPAINTOEN
        description: Operational amplifier internal output enable
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OPAMP_VOUT pin
            value: 0
          - name: B_0x1
            description: ADC/COMP channel
            value: 1
      - name: CALON
        description: Calibration mode enable
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Calibration mode disabled
            value: 0
          - name: B_0x1
            description: Calibration mode enabled
            value: 1
      - name: CALSEL
        description: Calibration selection
        bitOffset: 12
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: '0.'
            value: 0
          - name: B_0x1
            description: '0.'
            value: 1
          - name: B_0x2
            description: '0.'
            value: 2
          - name: B_0x3
            description: '0.'
            value: 3
      - name: PGA_GAIN
        description: Operational amplifier programmable gain and PGA flavor primary control
        bitOffset: 14
        bitWidth: 5
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: gain 2
            value: 0
          - name: B_0x1
            description: gain 4
            value: 1
          - name: B_0x2
            description: gain 8
            value: 2
          - name: B_0x3
            description: gain 16
            value: 3
          - name: B_0x8
            description: gain -1 / gain 2 with bias on OPAMP_VINM0
            value: 8
          - name: B_0x9
            description: gain -3 / gain 4 with bias on OPAMP_VINM0
            value: 9
          - name: B_0xA
            description: gain -7 / gain 8 with bias on OPAMP_VINM0
            value: 10
          - name: B_0xB
            description: gain -15 / gain 16 with bias on OPAMP_VINM0
            value: 11
          - name: B_0x10
            description: gain 2 with filtering on OPAMP_VINM0
            value: 16
          - name: B_0x11
            description: gain 4 with filtering on OPAMP_VINM0
            value: 17
          - name: B_0x12
            description: gain 8 with filtering on OPAMP_VINM0
            value: 18
          - name: B_0x13
            description: gain 16 with filtering on OPAMP_VINM0
            value: 19
          - name: B_0x18
            description: gain -1 / gain 2 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 24
          - name: B_0x19
            description: gain -3 / gain 4 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 25
          - name: B_0x1A
            description: gain -7 / gain 8 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 26
          - name: B_0x1B
            description: gain -15 / gain 16 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 27
      - name: TRIMOFFSETP
        description: Trim for PMOS differential pairs
        bitOffset: 19
        bitWidth: 5
        access: read-write
      - name: TRIMOFFSETN
        description: Trim for NMOS differential pairs
        bitOffset: 24
        bitWidth: 5
        access: read-write
      - name: TSTREF
        description: OPAMP calibration reference voltage output control
        bitOffset: 29
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Does not output calibration reference voltage
            value: 0
          - name: B_0x1
            description: Outputs calibration reference voltage
            value: 1
      - name: CALOUT
        description: Operational amplifier calibration output
        bitOffset: 30
        bitWidth: 1
        access: read-only
      - name: LOCK
        description: OPAMP_CSR register lock
        bitOffset: 31
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OPAMP_CSR is read-write
            value: 0
          - name: B_0x1
            description: OPAMP_CSR is read-only
            value: 1
  - name: OPAMP_TCMR
    displayName: OPAMP_TCMR
    description: OPAMP timer-controlled mode register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VMS_SEL
        description: OPAMP inverting input secondary selection
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Internal resistor divider middle point (operation as PGA)
            value: 0
          - name: B_0x1
            description: Operational amplifier output (operation as follower)
            value: 1
      - name: VPS_SEL
        description: OPAMP noninverting input secondary selection.
        bitOffset: 1
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: OPAMP_VINP0
            value: 0
          - name: B_0x1
            description: OPAMP_VINP1
            value: 1
          - name: B_0x2
            description: OPAMP_VINP2
            value: 2
          - name: B_0x3
            description: OPAMP_VINP3 pin or DAC output channel
            value: 3
      - name: TIMCM_SEL
        description: Timer toggle signal selection for operational amplifier input control
        bitOffset: 3
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: None (input configuration permanently controlled through VP_SEL[1:0] and VM_SEL)
            value: 0
          - name: B_0x1
            description: opamp_tc1
            value: 1
          - name: B_0x2
            description: opamp_tc2
            value: 2
          - name: B_0x3
            description: opamp_tc3
            value: 3
          - name: B_0x4
            description: opamp_tc4
            value: 4
          - name: B_0x5
            description: opamp_tc5
            value: 5
          - name: B_0x6
            description: opamp_tc6
            value: 6
          - name: B_0x7
            description: opamp_tc7
            value: 7
      - name: PGAS_GAIN
        description: Operational amplifier programmable gain and PGA flavor secondary control
        bitOffset: 8
        bitWidth: 5
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: gain 2
            value: 0
          - name: B_0x1
            description: gain 4
            value: 1
          - name: B_0x2
            description: gain 8
            value: 2
          - name: B_0x3
            description: gain 16
            value: 3
          - name: B_0x8
            description: gain -1 / gain 2 with bias on OPAMP_VINM0
            value: 8
          - name: B_0x9
            description: gain -3 / gain 4 with bias on OPAMP_VINM0
            value: 9
          - name: B_0xA
            description: gain -7 / gain 8 with bias on OPAMP_VINM0
            value: 10
          - name: B_0xB
            description: gain -15 / gain 16 with bias on OPAMP_VINM0
            value: 11
          - name: B_0x10
            description: gain 2 with filtering on OPAMP_VINM0
            value: 16
          - name: B_0x11
            description: gain 4 with filtering on OPAMP_VINM0
            value: 17
          - name: B_0x12
            description: gain 8 with filtering on OPAMP_VINM0
            value: 18
          - name: B_0x13
            description: gain 16 with filtering on OPAMP_VINM0
            value: 19
          - name: B_0x18
            description: gain -1 / gain 2 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 24
          - name: B_0x19
            description: gain -3 / gain 4 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 25
          - name: B_0x1A
            description: gain -7 / gain 8 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 26
          - name: B_0x1B
            description: gain -15 / gain of 16 with bias on OPAMP_VINM0 and filtering on OPAMP_VINM1
            value: 27
      - name: TIMPGA_SEL
        description: Timer toggle signal selection for programmable gain control
        bitOffset: 13
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: None (gain permanently controlled through PGA_GAIN[4:0] and VM_SEL[1:0])
            value: 0
          - name: B_0x1
            description: opamp_tp1
            value: 1
          - name: B_0x2
            description: opamp_tp2
            value: 2
          - name: B_0x3
            description: opamp_tp3
            value: 3
          - name: B_0x4
            description: opamp_tp4
            value: 4
          - name: B_0x5
            description: opamp_tp5
            value: 5
          - name: B_0x6
            description: opamp_tp6
            value: 6
          - name: B_0x7
            description: opamp_tp7
            value: 7
      - name: LOCK
        description: OPAMP_TCMR register lock
        bitOffset: 31
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Read-write
            value: 0
          - name: B_0x1
            description: Read-only (OPAMP_TCMR locked)
            value: 1
addressBlocks:
  - offset: 0
    size: 1024
    usage: registers
