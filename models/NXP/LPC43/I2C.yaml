name: I2C
description: I2C-bus interface
groupName: I2C
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CONSET
    description: Control Set Register. When a one is written to a bit of this register, the corresponding bit in the I2C control register is set. Writing a zero has no effect on the corresponding bit in the I2C control register.
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. User software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 0
        bitWidth: 2
      - name: AA
        description: Assert acknowledge flag.
        bitOffset: 2
        bitWidth: 1
      - name: SI
        description: I2C interrupt flag.
        bitOffset: 3
        bitWidth: 1
      - name: STO
        description: STOP flag.
        bitOffset: 4
        bitWidth: 1
      - name: STA
        description: START flag.
        bitOffset: 5
        bitWidth: 1
      - name: I2EN
        description: I2C interface enable.
        bitOffset: 6
        bitWidth: 1
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 7
        bitWidth: 25
  - name: STAT
    description: Status Register. During I2C operation, this register provides detailed status codes that allow software to determine the next action needed.
    addressOffset: 4
    access: read-only
    resetValue: 248
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: These bits are unused and are always 0.
        bitOffset: 0
        bitWidth: 3
      - name: Status
        description: These bits give the actual status information about the I 2C interface.
        bitOffset: 3
        bitWidth: 5
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - name: DAT
    description: Data Register. During master or slave transmit mode, data to be transmitted is written to this register. During master or slave receive mode, data that has been received may be read from this register.
    addressOffset: 8
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: Data
        description: This register holds data values that have been received or are to be transmitted.
        bitOffset: 0
        bitWidth: 8
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - name: ADR0
    description: Slave Address Register 0. Contains the 7-bit slave address for operation of the I2C interface in slave mode, and is not used in master mode. The least significant bit determines whether a slave responds to the General Call address.
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GC
        description: General Call enable bit.
        bitOffset: 0
        bitWidth: 1
      - name: Address
        description: The I2C device address for slave mode.
        bitOffset: 1
        bitWidth: 7
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - name: SCLH
    description: SCH Duty Cycle Register High Half Word. Determines the high time of the I2C clock.
    addressOffset: 16
    access: read-write
    resetValue: 4
    resetMask: 4294967295
    fields:
      - name: SCLH
        description: Count for SCL HIGH time period selection.
        bitOffset: 0
        bitWidth: 16
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 16
        bitWidth: 16
  - name: SCLL
    description: SCL Duty Cycle Register Low Half Word. Determines the low time of the I2C clock. SCLL and SCLH together determine the clock frequency generated by an I2C master and certain times used in slave mode.
    addressOffset: 20
    access: read-write
    resetValue: 4
    resetMask: 4294967295
    fields:
      - name: SCLL
        description: Count for SCL low time period selection.
        bitOffset: 0
        bitWidth: 16
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 16
        bitWidth: 16
  - name: CONCLR
    description: Control Clear Register. When a one is written to a bit of this register, the corresponding bit in the I2C control register is cleared. Writing a zero has no effect on the corresponding bit in the I2C control register.
    addressOffset: 24
    access: write-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: RESERVED
        description: Reserved. User software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 0
        bitWidth: 2
      - name: AAC
        description: Assert acknowledge Clear bit.
        bitOffset: 2
        bitWidth: 1
      - name: SIC
        description: I2C interrupt Clear bit.
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved. User software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 4
        bitWidth: 1
      - name: STAC
        description: START flag Clear bit.
        bitOffset: 5
        bitWidth: 1
      - name: I2ENC
        description: I2C interface Disable bit.
        bitOffset: 6
        bitWidth: 1
      - name: RESERVED
        description: Reserved. User software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 7
        bitWidth: 1
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - name: MMCTRL
    description: Monitor mode control register.
    addressOffset: 28
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MM_ENA
        description: Monitor mode enable.
        enumeratedValues:
          - name: MONITOR_MODE_DISABLE
            description: Monitor mode disabled.
            value: 0
          - name: THE_I_2C_MODULE_WILL
            description: The I 2C module will enter monitor mode. In this mode the SDA output will be forced high. This will prevent the I2C module from outputting data of any kind (including ACK) onto the I2C data bus. Depending on the state of the ENA_SCL bit, the output may be also forced high, preventing the module from having control over the I2C clock line.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: ENA_SCL
        description: SCL output enable.
        enumeratedValues:
          - name: WHEN_THIS_BIT_IS_CLE
            description: When this bit is cleared to 0, the SCL output will be forced high when the module is in monitor mode. As described above, this will prevent the module from having any control over the I2C clock line.
            value: 0
          - name: WHEN_THIS_BIT_IS_SET
            description: When this bit is set, the I2C module may exercise the same control over the clock line that it would in normal operation. This means that, acting as a slave peripheral, the I2C module can stretch the clock line (hold it low) until it has had time to respond to an I2C interrupt.[1]
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: MATCH_ALL
        description: Select interrupt register match.
        enumeratedValues:
          - name: WHEN_THIS_BIT_IS_CLE
            description: When this bit is cleared, an interrupt will only be generated when a match occurs to one of the (up-to) four address registers described above.   That is, the module will respond as a normal slave as far as address-recognition is concerned.
            value: 0
          - name: WHEN_THIS_BIT_IS_SET
            description: When this bit is set to 1 and the I2C is in monitor mode, an interrupt will be generated on ANY address received. This will enable the part to monitor all traffic on the bus.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. The value read from reserved bits is not defined.
        bitOffset: 3
        bitWidth: 29
  - dim: 3
    dimIncrement: 4
    dimIndex: 1,2,3
    name: ADR%s
    description: Slave Address Register. Contains the 7-bit slave address for operation of the I2C interface in slave mode, and is not used in master mode. The least significant bit determines whether a slave responds to the General Call address.
    addressOffset: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GC
        description: General Call enable bit.
        bitOffset: 0
        bitWidth: 1
      - name: Address
        description: The I2C device address for slave mode.
        bitOffset: 1
        bitWidth: 7
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - name: DATA_BUFFER
    description: Data buffer register. The contents of the 8 MSBs of the DAT shift register will be transferred to the DATA_BUFFER automatically after every nine bits (8 bits of data plus ACK or NACK) has been received on the bus.
    addressOffset: 44
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: Data
        description: This register holds contents of the 8 MSBs of the DAT shift register.
        bitOffset: 0
        bitWidth: 8
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
  - dim: 4
    dimIncrement: 4
    name: MASK[%s]
    description: Slave address mask register
    addressOffset: 48
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. User software should not write ones to reserved bits. This bit reads always back as 0.
        bitOffset: 0
        bitWidth: 1
      - name: MASK
        description: Mask bits.
        bitOffset: 1
        bitWidth: 7
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 8
        bitWidth: 24
addressBlocks:
  - offset: 0
    size: 4095
    usage: registers
interrupts:
  - name: I2C
