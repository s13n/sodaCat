name: FPGA_IO
description: MPS2+ FPGA System Control I/O
source: IOTKit_CM33.svd
qemu: partial (mps2-fpgaio; LEDs, counters work; buttons/MISC not modeled)
registers:
  - name: LED
    description: LED Control Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: LED0
        description: LED 0
        bitOffset: 0
        bitWidth: 1
      - name: LED1
        description: LED 1
        bitOffset: 1
        bitWidth: 1
  - name: BUTTON
    description: Button Status Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: BUTTON0
        description: Button 0 state
        bitOffset: 0
        bitWidth: 1
      - name: BUTTON1
        description: Button 1 state
        bitOffset: 1
        bitWidth: 1
  - name: CLK1HZ
    description: 1 Hz Up-counter
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
  - name: CLK100HZ
    description: 100 Hz Up-counter
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
  - name: COUNTER
    description: Cycle Up-counter (active when FPGA loads)
    addressOffset: 24
    size: 32
    access: read-write
    resetValue: 0
  - name: PRESCALER
    description: Reload value for prescaler counter
    addressOffset: 28
    size: 32
    access: read-write
    resetValue: 0
  - name: PSCNTR
    description: Prescaler Counter (read current value)
    addressOffset: 32
    size: 32
    access: read-write
    resetValue: 0
  - name: MISC
    description: Miscellaneous Control Register
    addressOffset: 76
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: CLCD_CS
        description: CLCD chip select
        bitOffset: 0
        bitWidth: 1
      - name: SPI_nSS
        description: SPI slave select (active low)
        bitOffset: 1
        bitWidth: 1
      - name: CLCD_RESET
        description: CLCD reset
        bitOffset: 3
        bitWidth: 1
      - name: CLCD_RS
        description: CLCD register select
        bitOffset: 4
        bitWidth: 1
      - name: CLCD_RD
        description: CLCD read enable
        bitOffset: 5
        bitWidth: 1
      - name: CLCD_BL_CTRL
        description: CLCD backlight control
        bitOffset: 6
        bitWidth: 1
      - name: ADC_SPI_nCS
        description: ADC SPI chip select (active low)
        bitOffset: 7
        bitWidth: 1
      - name: SHIELD0_SPI_nCS
        description: Shield 0 SPI chip select (active low)
        bitOffset: 8
        bitWidth: 1
      - name: SHIELD1_SPI_nCS
        description: Shield 1 SPI chip select (active low)
        bitOffset: 9
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 80
    usage: registers
