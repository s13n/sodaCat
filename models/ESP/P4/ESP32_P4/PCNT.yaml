      - name: CNT_STEP_U0
        description: Configures the step value for unit 0.
        bitOffset: 0
        bitWidth: 16
        access: read-write
      - name: CNT_STEP_LIM_U0
        description: Configures the step limit value for unit 0.
        bitOffset: 16
        bitWidth: 16
