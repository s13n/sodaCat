  - name: START
    description: Start condition register
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: STARTMSK_L
        description: If bit n is one, event n clears the STOP_L bit in the CTRL register (event 0 = bit 0, event 1 = bit 1, event 15 = bit 15).
        bitOffset: 0
        bitWidth: 16
      - name: STARTMSK_H
        description: If bit n is one, event n clears the STOP_H bit in the CTRL register (event 0 = bit 16, event 1 = bit 17, event 15 = bit 31).
        bitOffset: 16
        bitWidth: 16
  - name: DITHER
    description: Dither condition register
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 0
    fields:
      - name: DITHMSK_L
        description: If bit n is one, the event n causes the dither engine to advance to the next element in the dither pattern at the start of the next counter cycle of the 16-bit low counter or the unified counter (event 0 = bit 0, event 1 = bit 1, event 15 = bit 15). If all bits are set to 0, the dither pattern automatically advances at the start of every new counter cycle.
        bitOffset: 0
        bitWidth: 16
      - name: DITHMSK_H
        description: If bit n is one, the event n causes the dither engine to advance to the next element in the dither pattern at the start of the next counter cycle of the 16-bit high counter (event 0 = bit 0, event 1 = bit 1, event 15 = bit 15). If all bits are set to 0, the dither pattern automatically advances at the start of every new counter cycle.
        bitOffset: 16
        bitWidth: 16
  - name: COUNT
    description: Counter register
    addressOffset: 64
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CTR_L
        description: When UNIFY = 0, read or write the 16-bit L counter value. When UNIFY = 1, read or write the lower 16 bits of the 32-bit unified counter.
        bitOffset: 0
        bitWidth: 16
      - name: CTR_H
        description: When UNIFY = 0, read or write the 16-bit H counter value. When UNIFY = 1, read or write the upper 16 bits of the 32-bit unified counter.
        bitOffset: 16
        bitWidth: 16
  - name: STATE
    description: State register
    addressOffset: 68
