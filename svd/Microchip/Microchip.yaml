      PIO:
        uses: PIO
        instances: [PIOA, PIOB, PIOC, PIOD, PIOE]
        interrupts:
          PIOA: INT
          PIOB: INT
          PIOC: INT
          PIOD: INT
          PIOE: INT

      PWM:
        uses: PWM
        instances: [PWM0, PWM1]
        interrupts:
          PWM0: INT
          PWM1: INT

      QSPI:
        uses: QSPI
        instances: [QSPI]
        interrupts:
          QSPI: INT

      RSTC:
        uses: RSTC
        instances: [RSTC]
        interrupts:
          RSTC: INT

      RSWDT:
        uses: RSWDT
        instances: [RSWDT]
        interrupts:
          RSWDT: INT

      RTC:
        uses: RTC
        instances: [RTC]
        interrupts:
          RTC: INT

      RTT:
        uses: RTT
        instances: [RTT]
        interrupts:
          RTT: INT

      SMC:
        uses: SMC
        instances: [SMC]

      SPI:
        uses: SPI
        instances: [SPI0, SPI1]
        interrupts:
          SPI0: INT
          SPI1: INT

      SSC:
        uses: SSC
        instances: [SSC]
        interrupts:
          SSC: INT

      SUPC:
        uses: SUPC
        instances: [SUPC]
        interrupts:
          SUPC: INT

      TRNG:
        uses: TRNG
        instances: [TRNG]
        interrupts:
          TRNG: INT

      TWIHS:
        uses: TWIHS
        instances: [TWIHS0, TWIHS1, TWIHS2]
        interrupts:
          TWIHS0: INT
          TWIHS1: INT
          TWIHS2: INT

      UART:
        uses: UART
        instances: [UART0, UART1, UART2, UART3, UART4]
        interrupts:
          UART0: INT
          UART1: INT
          UART2: INT
          UART3: INT
          UART4: INT

      USART:
        uses: USART
        instances: [USART0, USART1, USART2]
        interrupts:
          USART0: INT
          USART1: INT
          USART2: INT

      USBHS:
        uses: USBHS
        instances: [USBHS]
        interrupts:
          USBHS: INT

      UTMI:
        uses: UTMI
        instances: [UTMI]

      WDT:
        uses: WDT
        instances: [WDT]
        interrupts:
          WDT: INT

      XDMAC:
        uses: XDMAC
        instances: [XDMAC]
        interrupts:
          XDMAC: INT

      TC:
        uses: TC
        instances: [TC0, TC1, TC2, TC3]
        # Each TC instance carries three timer-channel interrupts; canonicalise
        # them to INT0/INT1/INT2 within each instance (TC0–TC11 → modulo 3).
        interrupts:
          TC0: INT0
          TC1: INT1
          TC2: INT2
          TC3: INT0
          TC4: INT1
          TC5: INT2
          TC6: INT0
          TC7: INT1
          TC8: INT2
          TC9: INT0
          TC10: INT1
          TC11: INT2

      # ====================================================================
      # SAME70-specific peripherals (MATRIX/PMC differ per SAM family)
      # ====================================================================
      MATRIX:
        from: ATSAME70Q21B.MATRIX
        instances: [MATRIX]

      PMC:
        from: ATSAME70Q21B.PMC
        instances: [PMC]
        interrupts:
          PMC: INT

      # ====================================================================
      # ARM Cortex-M core peripherals (hand-maintained, cross-vendor)
      # ====================================================================
      NVIC:
        uses: NVIC
        instances: [NVIC]

      SCB:
        uses: SCB
        instances: [SCB]
        interrupts:
          CCW: CCW
          CCF: CCF

      FPU:
        uses: FPU
        instances: [FPU]
        interrupts:
          FPU: INT
          IXC: IXC

    chip_params:
      _all:
        _all:
          NVIC:
            priobits: 3
            interrupts: 74
          # Cortex-M7 has fault handlers (MMFAR/BFAR/CFSR) and L1 I/D caches.
          SCB:
            has_faults: true
            has_cache: true
