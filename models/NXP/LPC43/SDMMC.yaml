  - name: STATUS
    description: Status Register
    addressOffset: 72
    access: read-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: FIFO_RX_WATERMARK
        description: FIFO reached Receive watermark level; not qualified with data transfer.
        bitOffset: 0
        bitWidth: 1
      - name: FIFO_TX_WATERMARK
        description: FIFO reached Transmit watermark level; not qualified with data transfer.
        bitOffset: 1
        bitWidth: 1
      - name: FIFO_EMPTY
        description: FIFO is empty status
        bitOffset: 2
        bitWidth: 1
      - name: FIFO_FULL
        description: FIFO is full status
        bitOffset: 3
        bitWidth: 1
      - name: CMDFSMSTATES
        description: 'Command FSM states:  0 - Idle  1 - Send init sequence  2 - Tx cmd start bit  3 - Tx cmd tx bit  4 - Tx cmd index + arg  5 - Tx cmd crc7  6 - Tx cmd end bit  7 - Rx resp start bit  8 - Rx resp IRQ response  9 - Rx resp tx bit  10 - Rx resp cmd idx  11 - Rx resp data  12 - Rx resp crc7  13 - Rx resp end bit  14 - Cmd path wait NCC  15 - Wait; CMD-to-response turnaround  NOTE: The command FSM state is represented using 19 bits. The STATUS Register(7:4) has 4 bits to represent the command FSM states. Using these 4 bits, only 16 states can be represented. Thus three states cannot be represented in the STATUS(7:4) register. The three states that are not represented in the STATUS Register(7:4) are:  - Bit 16 - Wait for CCS - Bit 17 - Send CCSD  - Bit 18 - Boot Mode  Due to this, while command FSM is in   Wait for CCS state or   Send CCSD or   Boot Mode, the Status register indicates status as 0 for the bit field 7:4.'
        bitOffset: 4
        bitWidth: 4
      - name: DATA_3_STATUS
        description: Raw selected card_data[3]; checks whether card is present  0 - card not present  1 - card present
        bitOffset: 8
        bitWidth: 1
      - name: DATA_BUSY
        description: Inverted version of raw selected card_data[0]  0 - card data not busy  1 - card data busy
        bitOffset: 9
        bitWidth: 1
      - name: DATA_STATE_MC_BUSY
        description: Data transmit or receive state-machine is busy
        bitOffset: 10
        bitWidth: 1
      - name: RESPONSE_INDEX
        description: Index of previous response, including any auto-stop sent by core.
        bitOffset: 11
        bitWidth: 6
      - name: FIFO_COUNT
        description: FIFO count - Number of filled locations in FIFO
        bitOffset: 17
        bitWidth: 13
      - name: DMA_ACK
        description: DMA acknowledge signal state
        bitOffset: 30
        bitWidth: 1
      - name: DMA_REQ
        description: DMA request signal state
        bitOffset: 31
        bitWidth: 1
  - name: FIFOTH
    description: FIFO Threshold Watermark Register
    addressOffset: 76
    access: read-write
    resetValue: 260046848
    resetMask: 4294967295
    fields:
      - name: TX_WMARK
        description: 'FIFO threshold watermark level when transmitting data to card. When FIFO data count is less than or equal to this number, DMA/FIFO request is raised. If Interrupt is enabled, then interrupt occurs. During end of packet, request or interrupt is generated, regardless of threshold programming. In non-DMA mode, when transmit FIFO threshold (TXDR) interrupt is enabled, then interrupt is generated instead of DMA request. During end of packet, on last interrupt, host is responsible for filling FIFO with only required remaining bytes (not before FIFO is full or after CIU completes data transfers, because FIFO may not be empty). In DMA mode, at end of packet, if last transfer is less than burst size, DMA controller does single cycles until required bytes are transferred. 12 bits - 1 bit less than FIFO-count of status register, which is 13 bits. Limitation: TX_WMark >= 1; Recommended value: TX_WMARK = 16; (means less than or equal to FIFO_DEPTH/2).'
        bitOffset: 0
        bitWidth: 12
      - name: RESERVED
        description: Reserved.
        bitOffset: 12
        bitWidth: 4
      - name: RX_WMARK
        description: 'FIFO threshold watermark level when receiving data to card. When FIFO data count reaches greater than this number, DMA/FIFO request is raised. During end of packet, request is generated regardless of threshold programming in order to complete any remaining data. In non-DMA mode, when receiver FIFO threshold (RXDR) interrupt is enabled, then interrupt is generated instead of DMA request. During end of packet, interrupt is not generated if threshold programming is larger than any remaining data. It is responsibility of host to read remaining bytes on seeing Data Transfer Done interrupt. In DMA mode, at end of packet, even if remaining bytes are less than threshold, DMA request does single transfers to flush out any remaining bytes before Data Transfer Done interrupt is set. 12 bits - 1 bit less than FIFO-count of status register, which is 13 bits. Limitation: RX_WMark less than FIFO_DEPTH-2 Recommended: RX_WMARK = 15; (means greater than (FIFO_DEPTH/2) - 1)  NOTE: In DMA mode during CCS time-out, the DMA does not generate the request at the end of packet, even if remaining bytes are less than threshold. In this case, there will be some data left in the FIFO. It is the responsibility of the application to reset the FIFO after the CCS time-out.'
        bitOffset: 16
        bitWidth: 12
      - name: DMA_MTS
        description: 'Burst size of multiple transaction; should be programmed same as DW-DMA controller multiple-transaction-size SRC/DEST_MSIZE.The units for transfers is the H_DATA_WIDTH parameter. A single transfer (dw_dma_single assertion in case of Non DW DMA interface) would be signalled based on this value. Value should be sub-multiple of (RX_WMark + 1) and (32 - TX_WMark). For example, if FIFO_DEPTH = 16, FDATA_WIDTH = H_DATA_WIDTH  Allowed combinations for MSize and TX_WMark are:  MSize = 1, TX_WMARK = 1-15  MSize = 4, TX_WMark = 8  MSize = 4, TX_WMark = 4  MSize = 4, TX_WMark = 12  MSize = 8, TX_WMark = 8  MSize = 8, TX_WMark = 4.  Allowed combinations for MSize and RX_WMark are:  MSize = 1, RX_WMARK = 0-14  MSize = 4, RX_WMark = 3  MSize = 4, RX_WMark = 7  MSize = 4, RX_WMark = 11  MSize = 8, RX_WMark = 7  MSize = 8, RX_WMark = 11  Recommended: MSize = 8, TX_WMark = 8, RX_WMark = 7'
        enumeratedValues:
          - name: 1_TRANSFER
            description: 1 transfer
            value: 0
          - name: 4_TRANSFERS
            description: 4 transfers
            value: 1
          - name: 8_TRANSFERS
            description: 8 transfers
            value: 2
          - name: 16_TRANSFERS
            description: 16 transfers
            value: 3
          - name: 32_TRANSFERS
            description: 32 transfers
            value: 4
          - name: 64_TRANSFERS
            description: 64 transfers
            value: 5
          - name: 128_TRANSFERS
            description: 128 transfers
            value: 6
          - name: 256_TRANSFERS
            description: 256 transfers
            value: 7
        bitOffset: 28
        bitWidth: 3
      - name: RESERVED
        description: Reserved
        bitOffset: 31
        bitWidth: 1
  - name: CDETECT
    description: Card Detect Register
    addressOffset: 80
