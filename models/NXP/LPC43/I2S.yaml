name: I2S
description: Interface
groupName: I2S
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: DAO
    description: Digital Audio Output Register. Contains control bits for the I2S transmit channel.
    addressOffset: 0
    access: read-write
    resetValue: 34785
    resetMask: 4294967295
    fields:
      - name: WORDWIDTH
        description: 'Selects the number of bytes in data as follows:'
        enumeratedValues:
          - name: BIT_DATA_0
            description: 8-bit data
            value: 0
          - name: BIT_DATA_1
            description: 16-bit data
            value: 1
          - name: BIT_DATA_3
            description: 32-bit data
            value: 3
        bitOffset: 0
        bitWidth: 2
      - name: MONO
        description: When 1, data is of monaural format. When 0, the data is in stereo format.
        bitOffset: 2
        bitWidth: 1
      - name: STOP
        description: When 1, disables accesses on FIFOs, places the transmit channel in mute mode.
        bitOffset: 3
        bitWidth: 1
      - name: RESET
        description: When 1, asynchronously resets the transmit channel and FIFO.
        bitOffset: 4
        bitWidth: 1
      - name: WS_SEL
        description: When 0, the interface is in master mode. When 1, the interface is in slave mode. See Section 34.7.2 for a summary of useful combinations for this bit with TXMODE.
        bitOffset: 5
        bitWidth: 1
      - name: WS_HALFPERIOD
        description: Word select half period minus 1, i.e. WS 64clk period -> ws_halfperiod = 31.
        bitOffset: 6
        bitWidth: 9
      - name: MUTE
        description: When 1, the transmit channel sends only zeroes.
        bitOffset: 15
        bitWidth: 1
  - name: DAI
    description: Digital Audio Input Register. Contains control bits for the I2S receive channel.
    addressOffset: 4
    access: read-write
    resetValue: 2017
    resetMask: 4294967295
    fields:
      - name: WORDWIDTH
        description: 'Selects the number of bytes in data as follows:'
        enumeratedValues:
          - name: BIT_DATA_0
            description: 8-bit data
            value: 0
          - name: BIT_DATA_1
            description: 16-bit data
            value: 1
          - name: BIT_DATA_3
            description: 32-bit data
            value: 3
        bitOffset: 0
        bitWidth: 2
      - name: MONO
        description: When 1, data is of monaural format. When 0, the data is in stereo format.
        bitOffset: 2
        bitWidth: 1
      - name: STOP
        description: When 1, disables accesses on FIFOs, places the transmit channel in mute mode.
        bitOffset: 3
        bitWidth: 1
      - name: RESET
        description: When 1, asynchronously reset the transmit channel and FIFO.
        bitOffset: 4
        bitWidth: 1
      - name: WS_SEL
        description: When 0, the interface is in master mode. When 1, the interface is in slave mode. See Section 34.7.2 for a summary of useful combinations for this bit with RXMODE.
        bitOffset: 5
        bitWidth: 1
      - name: WS_HALFPERIOD
        description: Word select half period minus 1, i.e. WS 64clk period -> ws_halfperiod = 31.
        bitOffset: 6
        bitWidth: 9
  - name: TXFIFO
    description: Transmit FIFO. Access register for the 8 x 32-bit transmitter FIFO.
    addressOffset: 8
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: I2STXFIFO
        description: 8 x 32-bit transmit FIFO.
        bitOffset: 0
        bitWidth: 32
  - name: RXFIFO
    description: Receive FIFO. Access register for the 8 x 32-bit receiver FIFO.
    addressOffset: 12
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    readAction: modify
    fields:
      - name: I2SRXFIFO
        description: 8 x 32-bit transmit FIFO.
        bitOffset: 0
        bitWidth: 32
  - name: STATE
    description: Status Feedback Register. Contains status information about the I2S interface.
    addressOffset: 16
    access: read-only
    resetValue: 7
    resetMask: 4294967295
    fields:
      - name: IRQ
        description: This bit reflects the presence of Receive Interrupt or Transmit Interrupt. This is determined by comparing the current FIFO levels to the rx_depth_irq and tx_depth_irq fields in the IRQ register.
        bitOffset: 0
        bitWidth: 1
      - name: DMAREQ1
        description: This bit reflects the presence of Receive or Transmit DMA Request 1. This is determined by comparing the current FIFO levels to the rx_depth_dma1 and tx_depth_dma1 fields in the DMA1 register.
        bitOffset: 1
        bitWidth: 1
      - name: DMAREQ2
        description: This bit reflects the presence of Receive or Transmit DMA Request 2. This is determined by comparing the current FIFO levels to the rx_depth_dma2 and tx_depth_dma2 fields in the DMA2 register.
        bitOffset: 2
        bitWidth: 1
      - name: RX_LEVEL
        description: Reflects the current level of the Receive FIFO.
        bitOffset: 8
        bitWidth: 4
      - name: TX_LEVEL
        description: Reflects the current level of the Transmit FIFO.
        bitOffset: 16
        bitWidth: 4
  - name: DMA1
    description: DMA Configuration Register 1. Contains control information for DMA request 1.
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RX_DMA1_ENABLE
        description: When 1, enables DMA1 for I2S receive.
        bitOffset: 0
        bitWidth: 1
      - name: TX_DMA1_ENABLE
        description: When 1, enables DMA1 for I2S transmit.
        bitOffset: 1
        bitWidth: 1
      - name: RX_DEPTH_DMA1
        description: Set the FIFO level that triggers a receive DMA request on DMA1.
        bitOffset: 8
        bitWidth: 4
      - name: TX_DEPTH_DMA1
        description: Set the FIFO level that triggers a transmit DMA request on DMA1.
        bitOffset: 16
        bitWidth: 4
  - name: DMA2
    description: DMA Configuration Register 2. Contains control information for DMA request 2.
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RX_DMA2_ENABLE
        description: When 1, enables DMA1 for I2S receive.
        bitOffset: 0
        bitWidth: 1
      - name: TX_DMA2_ENABLE
        description: When 1, enables DMA1 for I2S transmit.
        bitOffset: 1
        bitWidth: 1
      - name: RX_DEPTH_DMA2
        description: Set the FIFO level that triggers a receive DMA request on DMA2.
        bitOffset: 8
        bitWidth: 4
      - name: TX_DEPTH_DMA2
        description: Set the FIFO level that triggers a transmit DMA request on DMA2.
        bitOffset: 16
        bitWidth: 4
  - name: IRQ
    description: Interrupt Request Control Register. Contains bits that control how the I2S interrupt request is generated.
    addressOffset: 28
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RX_IRQ_ENABLE
        description: When 1, enables I2S receive interrupt.
        bitOffset: 0
        bitWidth: 1
      - name: TX_IRQ_ENABLE
        description: When 1, enables I2S transmit interrupt.
        bitOffset: 1
        bitWidth: 1
      - name: RX_DEPTH_IRQ
        description: Set the FIFO level on which to create an irq request.
        bitOffset: 8
        bitWidth: 4
      - name: TX_DEPTH_IRQ
        description: Set the FIFO level on which to create an irq request.
        bitOffset: 16
        bitWidth: 4
  - name: TXRATE
    description: Transmit MCLK divider. This register determines the I2S TX MCLK rate by specifying the value to divide PCLK by in order to produce MCLK.
    addressOffset: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: Y_DIVIDER
        description: I2S transmit MCLK rate denominator. This value is used to divide PCLK to produce the transmit MCLK. Eight bits of fractional divide supports a wide range of possibilities. A value of 0 stops the clock.
        bitOffset: 0
        bitWidth: 8
      - name: X_DIVIDER
        description: 'I2S transmit MCLK rate numerator. This value is used to multiply PCLK by to produce the transmit MCLK. A value of 0 stops the clock. Eight bits of fractional divide supports a wide range of possibilities. Note: the resulting ratio X/Y is divided by 2.'
        bitOffset: 8
        bitWidth: 8
  - name: RXRATE
    description: Receive MCLK divider. This register determines the I2S RX MCLK rate by specifying the value to divide PCLK by in order to produce MCLK.
    addressOffset: 36
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: Y_DIVIDER
        description: I2S receive MCLK rate denominator. This value is used to divide PCLK to produce the receive MCLK. Eight bits of fractional divide supports a wide range of possibilities. A value of 0 stops the clock.
        bitOffset: 0
        bitWidth: 8
      - name: X_DIVIDER
        description: 'I2S receive MCLK rate numerator. This value is used to multiply PCLK by to produce the receive MCLK. A value of 0 stops the clock. Eight bits of fractional divide supports a wide range of possibilities. Note: the resulting ratio X/Y is divided by 2.'
        bitOffset: 8
        bitWidth: 8
  - name: TXBITRATE
    description: Transmit bit rate divider. This register determines the I2S transmit bit rate by specifying the value to divide TX_MCLK by in order to produce the transmit bit clock.
    addressOffset: 40
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TX_BITRATE
        description: I2S transmit bit rate. This value plus one is used to divide TX_MCLK to produce the transmit bit clock.
        bitOffset: 0
        bitWidth: 6
  - name: RXBITRATE
    description: Receive bit rate divider. This register determines the I2S receive bit rate by specifying the value to divide RX_MCLK by in order to produce the receive bit clock.
    addressOffset: 44
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RX_BITRATE
        description: I2S receive bit rate. This value plus one is used to divide RX_MCLK to produce the receive bit clock.
        bitOffset: 0
        bitWidth: 6
  - name: TXMODE
    description: Transmit mode control.
    addressOffset: 48
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TXCLKSEL
        description: Clock source selection for the transmit bit clock divider.
        enumeratedValues:
          - name: SELECT_TX
            description: Select the TX fractional rate divider clock output as the source
            value: 0
          - name: SELECT_RX
            description: Select the RX_MCLK signal as the TX_MCLK clock source
            value: 2
        bitOffset: 0
        bitWidth: 2
      - name: TX4PIN
        description: Transmit 4-pin mode selection. When 1, enables 4-pin mode.
        bitOffset: 2
        bitWidth: 1
      - name: TXMCENA
        description: Enable for the TX_MCLK output. When 0, output of TX_MCLK is not enabled. When 1, output of TX_MCLK is enabled.
        bitOffset: 3
        bitWidth: 1
  - name: RXMODE
    description: Receive mode control.
    addressOffset: 52
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RXCLKSEL
        description: Clock source selection for the receive bit clock divider.
        enumeratedValues:
          - name: SELECT_RX
            description: Select the RX fractional rate divider clock output as the source
            value: 0
          - name: SELECT_TX
            description: Select the TX_MCLK signal as the RX_MCLK clock source
            value: 2
        bitOffset: 0
        bitWidth: 2
      - name: RX4PIN
        description: Receive 4-pin mode selection. When 1, enables 4-pin mode.
        bitOffset: 2
        bitWidth: 1
      - name: RXMCENA
        description: Enable for the RX_MCLK output. When 0, output of RX_MCLK is not enabled. When 1, output of RX_MCLK is enabled.
        bitOffset: 3
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 4095
    usage: registers
interrupts:
  - name: I2S
