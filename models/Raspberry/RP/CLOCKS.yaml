name: CLOCKS
source: RP2040 SVD v0.1
registers:
  - name: CLK_%s
    dimIndex: GPOUT0,GPOUT1,GPOUT2,GPOUT3,REF,SYS,PERI,USB,ADC,RTC
    dim: 10
    addressOffset: 0
    dimIncrement: 12
    registers:
      - name: CTRL
        addressOffset: 0
        description: Clock control, can be changed on-the-fly (except for auxsrc)
        resetValue: 0
        fields:
          - name: AUXSRC
            description: Selects the auxiliary clock source, will glitch when switching
            access: read-write
            enumeratedValues:
              - name: clksrc_pll_sys
                value: 0
              - name: clksrc_gpin0
                value: 1
              - name: clksrc_gpin1
                value: 2
              - name: clksrc_pll_usb
                value: 3
              - name: rosc_clksrc
                value: 4
              - name: xosc_clksrc
                value: 5
              - name: clk_sys
                value: 6
              - name: clk_usb
                value: 7
              - name: clk_adc
                value: 8
              - name: clk_rtc
                value: 9
              - name: clk_ref
                value: 10
            bitOffset: 5
            bitWidth: 4
          - name: KILL
            description: Asynchronously kills the clock generator
            access: read-write
            bitOffset: 10
            bitWidth: 1
          - name: ENABLE
            description: Starts and stops the clock generator cleanly
            access: read-write
            bitOffset: 11
            bitWidth: 1
          - name: DC50
            description: Enables duty cycle correction for odd divisors
            access: read-write
            bitOffset: 12
            bitWidth: 1
          - name: PHASE
            description: "This delays the enable signal by up to 3 cycles of the input clock \n                            This must be set before the clock is enabled to have any effect"
            access: read-write
            bitOffset: 16
            bitWidth: 2
          - name: NUDGE
            description: "An edge on this signal shifts the phase of the output by 1 cycle of the input clock \n                            This can be done at any time"
            access: read-write
            bitOffset: 20
            bitWidth: 1
      - name: DIV
        addressOffset: 4
        description: Clock divisor, can be changed on-the-fly
        resetValue: 256
        fields:
          - name: FRAC
            description: Fractional component of the divisor
            access: read-write
            bitOffset: 0
            bitWidth: 8
          - name: INT
            description: Integer component of the divisor, 0 -> divide by 2^16
            access: read-write
            bitOffset: 8
            bitWidth: 24
      - name: SELECTED
        addressOffset: 8
        description: Indicates which SRC is currently selected by the glitchless mux (one-hot).
        resetValue: 1
        fields:
          - name: SELECTED
            description: This slice does not have a glitchless mux (only the AUX_SRC field is present, not SRC) so this register is hardwired to 0x1.
            access: read-only
            bitOffset: 0
            bitWidth: 32
  - name: CLK_SYS_RESUS_CTRL
    addressOffset: 120
    resetValue: 255
    fields:
      - name: TIMEOUT
        description: "This is expressed as a number of clk_ref cycles \n                            and must be >= 2x clk_ref_freq/min_clk_tst_freq"
        access: read-write
        bitOffset: 0
        bitWidth: 8
      - name: ENABLE
        description: Enable resus
        access: read-write
        bitOffset: 8
        bitWidth: 1
      - name: FRCE
        description: Force a resus, for test purposes only
        access: read-write
        bitOffset: 12
        bitWidth: 1
      - name: CLEAR
        description: For clearing the resus after the fault that triggered it has been corrected
        access: read-write
        bitOffset: 16
        bitWidth: 1
  - name: CLK_SYS_RESUS_STATUS
    addressOffset: 124
    resetValue: 0
    fields:
      - name: RESUSSED
        description: Clock has been resuscitated, correct the error then send ctrl_clear=1
        access: read-only
        bitOffset: 0
        bitWidth: 1
  - name: FC0_REF_KHZ
    addressOffset: 128
    description: Reference clock frequency in kHz
    resetValue: 0
    fields:
      - name: FC0_REF_KHZ
        access: read-write
        bitOffset: 0
        bitWidth: 20
  - name: FC0_MIN_KHZ
    addressOffset: 132
    description: Minimum pass frequency in kHz. This is optional. Set to 0 if you are not using the pass/fail flags
    resetValue: 0
    fields:
      - name: FC0_MIN_KHZ
        access: read-write
        bitOffset: 0
        bitWidth: 25
  - name: FC0_MAX_KHZ
    addressOffset: 136
    description: Maximum pass frequency in kHz. This is optional. Set to 0x1ffffff if you are not using the pass/fail flags
    resetValue: 33554431
    fields:
      - name: FC0_MAX_KHZ
        access: read-write
        bitOffset: 0
        bitWidth: 25
  - name: FC0_DELAY
    addressOffset: 140
    description: "Delays the start of frequency counting to allow the mux to settle \n                    Delay is measured in multiples of the reference clock period"
    resetValue: 1
    fields:
      - name: FC0_DELAY
        access: read-write
        bitOffset: 0
        bitWidth: 3
  - name: FC0_INTERVAL
    addressOffset: 144
    description: "The test interval is 0.98us * 2**interval, but let's call it 1us * 2**interval \n                    The default gives a test interval of 250us"
    resetValue: 8
    fields:
      - name: FC0_INTERVAL
        access: read-write
        bitOffset: 0
        bitWidth: 4
  - name: FC0_SRC
    addressOffset: 148
    description: "Clock sent to frequency counter, set to 0 when not required \n                    Writing to this register initiates the frequency count"
    resetValue: 0
    fields:
      - name: FC0_SRC
        access: read-write
        enumeratedValues:
          - name: 'NULL'
            value: 0
          - name: pll_sys_clksrc_primary
            value: 1
          - name: pll_usb_clksrc_primary
            value: 2
          - name: rosc_clksrc
            value: 3
          - name: rosc_clksrc_ph
            value: 4
          - name: xosc_clksrc
            value: 5
          - name: clksrc_gpin0
            value: 6
          - name: clksrc_gpin1
            value: 7
          - name: clk_ref
            value: 8
          - name: clk_sys
            value: 9
          - name: clk_peri
            value: 10
          - name: clk_usb
            value: 11
          - name: clk_adc
            value: 12
          - name: clk_rtc
            value: 13
        bitOffset: 0
        bitWidth: 8
  - name: FC0_STATUS
    addressOffset: 152
    description: Frequency counter status
    resetValue: 0
    fields:
      - name: PASS
        description: Test passed
        access: read-only
        bitOffset: 0
        bitWidth: 1
      - name: DONE
        description: Test complete
        access: read-only
        bitOffset: 4
        bitWidth: 1
      - name: RUNNING
        description: Test running
        access: read-only
        bitOffset: 8
        bitWidth: 1
      - name: WAITING
        description: Waiting for test clock to start
        access: read-only
        bitOffset: 12
        bitWidth: 1
      - name: FAIL
        description: Test failed
        access: read-only
        bitOffset: 16
        bitWidth: 1
      - name: SLOW
        description: Test clock slower than expected, only valid when status_done=1
        access: read-only
        bitOffset: 20
        bitWidth: 1
      - name: FAST
        description: Test clock faster than expected, only valid when status_done=1
        access: read-only
        bitOffset: 24
        bitWidth: 1
      - name: DIED
        description: Test clock stopped during test
        access: read-only
        bitOffset: 28
        bitWidth: 1
  - name: FC0_RESULT
    addressOffset: 156
    description: Result of frequency measurement, only valid when status_done=1
    resetValue: 0
    fields:
      - name: FRAC
        access: read-only
        bitOffset: 0
        bitWidth: 5
      - name: KHZ
        access: read-only
        bitOffset: 5
        bitWidth: 25
