name: CMSDK_UART
description: ARM CMSDK APB UART
source: IOTKit_CM33.svd; ARM CMSDK Technical Reference Manual
qemu: full (cmsdk-apb-uart; single-char buffer, no flow control)
ipPedigree:
  designer: ARM
  ipName: CMSDK APB UART
interrupts:
  - RX
  - TX
  - COMBINED
registers:
  - name: DATA
    description: Data Register (TX on write, RX on read)
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DATA
        description: Data value (bits [7:0])
        bitOffset: 0
        bitWidth: 8
  - name: STATE
    description: Status Register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: TXBF
        description: TX buffer full
        bitOffset: 0
        bitWidth: 1
      - name: RXBF
        description: RX buffer full
        bitOffset: 1
        bitWidth: 1
      - name: TXOV
        description: TX buffer overrun
        bitOffset: 2
        bitWidth: 1
      - name: RXOV
        description: RX buffer overrun
        bitOffset: 3
        bitWidth: 1
  - name: CTRL
    description: Control Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: TXEN
        description: TX enable
        bitOffset: 0
        bitWidth: 1
      - name: RXEN
        description: RX enable
        bitOffset: 1
        bitWidth: 1
      - name: TXINT
        description: TX interrupt enable
        bitOffset: 2
        bitWidth: 1
      - name: RXINT
        description: RX interrupt enable
        bitOffset: 3
        bitWidth: 1
      - name: TXOVINT
        description: TX overrun interrupt enable
        bitOffset: 4
        bitWidth: 1
      - name: RXOVINT
        description: RX overrun interrupt enable
        bitOffset: 5
        bitWidth: 1
      - name: HSTX
        description: High-speed test mode for TX only
        bitOffset: 6
        bitWidth: 1
  - name: INTSTATUS
    description: Interrupt Status Register
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: TXINT
        description: TX interrupt status
        bitOffset: 0
        bitWidth: 1
      - name: RXINT
        description: RX interrupt status
        bitOffset: 1
        bitWidth: 1
      - name: TXOV
        description: TX overrun interrupt status
        bitOffset: 2
        bitWidth: 1
      - name: RXOV
        description: RX overrun interrupt status
        bitOffset: 3
        bitWidth: 1
  - name: INTCLEAR
    description: Interrupt Clear Register
    addressOffset: 12
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: TXINT
        description: Write 1 to clear TX interrupt
        bitOffset: 0
        bitWidth: 1
      - name: RXINT
        description: Write 1 to clear RX interrupt
        bitOffset: 1
        bitWidth: 1
      - name: TXOV
        description: Write 1 to clear TX overrun interrupt
        bitOffset: 2
        bitWidth: 1
      - name: RXOV
        description: Write 1 to clear RX overrun interrupt
        bitOffset: 3
        bitWidth: 1
  - name: BAUDDIV
    description: Baud Rate Divider Register
    addressOffset: 16
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: BAUDDIV
        description: "Baud rate divider: BAUDRATE = PCLK / BAUDDIV"
        bitOffset: 0
        bitWidth: 20
addressBlocks:
  - offset: 0
    size: 20
    usage: registers
