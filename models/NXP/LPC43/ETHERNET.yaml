name: ETHERNET
description: Ethernet
groupName: ETHERNET
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: MAC_CONFIG
    description: MAC configuration register
    addressOffset: 0
    access: read-write
    resetValue: 32768
    resetMask: 4294967295
    fields:
      - name: RE
        description: Receiver enable When this bit is set, the receiver state machine of the MAC is enabled for receiving frames from the MII. When this bit is reset, the MAC receive state machine is disabled after the completion of the reception of the current frame, and will not receive any further frames from the MII.
        bitOffset: 2
        bitWidth: 1
      - name: TE
        description: Transmitter Enable  When this bit is set, the transmit state machine of the MAC is enabled for transmission on the MII. When this bit is reset, the MAC transmit state machine is disabled after the completion of the transmission of the current frame, and will not transmit any further frames.
        bitOffset: 3
        bitWidth: 1
      - name: DF
        description: Deferral Check  When this bit is set, the deferral check function is enabled in the MAC. The MAC will issue a Frame Abort status, along with the excessive deferral error bit set in the transmit frame status when the transmit state machine is deferred for more than 24,288 bit times in 10/100-Mbps mode. If the Core is configured for 1000 Mbps operation, or if the Jumbo frame mode is enabled in 10/100-Mbps mode, the threshold for deferral is 155,680 bits times. Deferral begins when the transmitter is ready to transmit, but is prevented because of an active CRS (carrier sense) signal on the MII. Defer time is not cumulative. If the transmitter defers for 10,000 bit times, then transmits, collides, backs off, and then has to defer again after completion of back-off, the deferral timer resets to 0 and restarts.  When this bit is reset, the deferral check function is disabled and the MAC defers until the CRS signal goes inactive. This bit is applicable only in Half-Duplex mode and is reserved (RO) in Full-Duplex-only configuration.
        bitOffset: 4
        bitWidth: 1
      - name: BL
        description: 'Back-Off Limit  The Back-Off limit determines the random integer number (r) of slot time delays (4,096 bit times for 1000 Mbps and 512 bit times for 10/100 Mbps) the MAC waits before rescheduling a transmission attempt during retries after a collision. This bit is applicable only to Half-Duplex mode and is reserved (RO) in Full-Duplex-only configuration.  00: k = min (n, 10)  01: k = min (n, 8)  10: k = min (n, 4)  11: k = min (n, 1) where n = retransmission attempt. The random integer r takes the value in the range 0 <= r  <= 2k.'
        bitOffset: 5
        bitWidth: 2
      - name: ACS
        description: Automatic Pad/CRC Stripping  When this bit is set, the MAC strips the Pad/FCS field on incoming frames only if the length's field value is less than or equal to 1,500 bytes. All received frames with length field greater than or equal to 1,501 bytes are passed to the application without stripping the Pad/FCS field.  When this bit is reset, the MAC will pass all incoming frames to the Host unmodified.
        bitOffset: 7
        bitWidth: 1
      - name: DR
        description: Disable Retry  When this bit is set, the MAC will attempt only 1 transmission. When a collision occurs on the MII, the MAC will ignore the current frame transmission and report a Frame Abort with excessive collision error in the transmit frame status. When this bit is reset, the MAC will attempt retries based on the settings of BL. This bit is applicable only to Half-Duplex mode and is reserved (RO with default value) in Full- Duplex-only configuration.
        bitOffset: 9
        bitWidth: 1
      - name: DM
        description: Duplex Mode  When this bit is set, the MAC operates in a Full-Duplex mode where it can transmit and receive simultaneously.
        bitOffset: 11
        bitWidth: 1
      - name: LM
        description: Loopback Mode  When this bit is set, the MAC operates in loopback mode at MII. The MII Receive clock input is required for the loopback to work properly, as the Transmit clock is not looped-back internally.
        bitOffset: 12
        bitWidth: 1
      - name: DO
        description: Disable Receive Own  When this bit is set, the MAC disables the reception of frames in Half-Duplex mode. When this bit is reset, the MAC receives all packets that are given by the PHY while transmitting.  This bit is not applicable if the MAC is operating in Full-Duplex mode.
        bitOffset: 13
        bitWidth: 1
      - name: FES
        description: 'Speed Indicates the speed in Fast Ethernet (MII) mode:  0 = 10 Mbps 1 = 100 Mbps'
        bitOffset: 14
        bitWidth: 1
      - name: PS
        description: Port select   1 = MII (100 Mbp) - this is the only allowed value.
        bitOffset: 15
        bitWidth: 1
      - name: DCRS
        description: Disable carrier sense during transmission When set high, this bit makes the MAC transmitter ignore the MII CRS signal during frame transmission in Half-Duplex mode. This request results in no errors generated due to Loss of Carrier or No Carrier during such transmission. When this bit is low, the MAC transmitter generates such errors due to Carrier Sense and will even abort the transmissions.
        bitOffset: 16
        bitWidth: 1
      - name: IFG
        description: Inter-frame gap These bits control the minimum IFG between frames during transmission.  000 = 96 bit times 001 = 88 bit times 010 = 80 bit times ... 000 = 40 bit times Note that in Half-Duplex mode, the minimum IFG can be configured for 64 bit times (IFG = 100) only. Lower values are not considered
        bitOffset: 17
        bitWidth: 3
      - name: JE
        description: Jumbo Frame Enable  When this bit is set, MAC allows Jumbo frames of 9,018 bytes (9,022 bytes for VLAN tagged frames) without reporting a giant frame error in the receive frame status.
        bitOffset: 20
        bitWidth: 1
      - name: JD
        description: Jabber Disable  When this bit is set, the MAC disables the jabber timer on the transmitter, and can transfer frames of up to 16,384 bytes.  When this bit is reset, the MAC cuts off the transmitter if the application sends out more than 2,048 bytes of data (10,240 if JE is set high) during transmission.
        bitOffset: 22
        bitWidth: 1
      - name: WD
        description: Watchdog Disable  When this bit is set, the MAC disables the watchdog timer on the receiver, and can receive frames of up to 16,384 bytes.  When this bit is reset, the MAC allows no more than 2,048 bytes (10,240 if JE is set high) of the frame being received and cuts off any bytes received after that.
        bitOffset: 23
        bitWidth: 1
  - name: MAC_FRAME_FILTER
    description: MAC frame filter
    addressOffset: 4
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PR
        description: Promiscuous Mode  When this bit is set, the Address Filter module passes all incoming frames regardless of its destination or source address. The SA/DA Filter Fails status bits of the Receive Status Word will always be cleared when PR is set.
        bitOffset: 0
        bitWidth: 1
      - name: HUC
        description: Hash Unicast When set, MAC performs destination address filtering of unicast frames according to the hash table. When reset, the MAC performs a perfect destination address filtering for unicast frames, that is, it compares the DA field with the values programmed in DA registers.
        bitOffset: 1
        bitWidth: 1
      - name: HMC
        description: Hash Multicast When set, MAC performs destination address filtering of received multicast frames according to the hash table. When reset, the MAC performs a perfect destination address filtering for multicast frames, that is, it compares the DA field with the values programmed in DA registers.
        bitOffset: 2
        bitWidth: 1
      - name: DAIF
        description: DA Inverse Filtering  When this bit is set, the Address Check block operates in inverse filtering mode for the DA address comparison for both unicast and multicast frames.  When reset, normal filtering of frames is performed.
        bitOffset: 3
        bitWidth: 1
      - name: PM
        description: Pass All Multicast  When set, this bit indicates that all received frames with a multicast destination address (first bit in the destination address field is '1') are passed.  When reset, filtering of multicast frame depends on HMC bit.
        bitOffset: 4
        bitWidth: 1
      - name: DBF
        description: Disable Broadcast Frames  When this bit is set, the AFM module filters all incoming broadcast frames.  When this bit is reset, the AFM module passes all received broadcast frames.
        bitOffset: 5
        bitWidth: 1
      - name: PCF
        description: Pass Control Frames  These bits control the forwarding of all control frames (including unicast and multicast PAUSE frames). Note that the processing of PAUSE control frames depends only on RFE of the Flow Control Register.  00 = MAC filters all control frames from reaching the application.  01 = MAC forwards all control frames except PAUSE control frames to application even if they fail the Address filter.  10 = MAC forwards all control frames to application even if they fail the Address Filter.  11 = MAC forwards control frames that pass the Address Filter.
        bitOffset: 6
        bitWidth: 2
      - name: HPF
        description: Hash or perfect filter When set, this bit configures the address filter to pass a frame if it matches either the perfect filtering or the hash filtering as set by HMC or HUC bits. When low and if the HUC/HMC bit is set, the frame is passed only if it matches the Hash filter.
        bitOffset: 10
        bitWidth: 1
      - name: RA
        description: Receive all When this bit is set, the MAC Receiver module passes to the Application all frames received irrespective of whether they pass the address filter. The result of the SA/DA filtering is updated (pass or fail) in the corresponding bits in the Receive Status Word. When this bit is reset, the Receiver module passes to the Application only those frames that pass the SA/DA address filter.
        bitOffset: 31
        bitWidth: 1
  - name: MAC_HASHTABLE_HIGH
    description: Hash table high register
    addressOffset: 8
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HTH
        description: Hash table high This field contains the upper 32 bits of Hash table.
        bitOffset: 0
        bitWidth: 32
  - name: MAC_HASHTABLE_LOW
    description: Hash table low register
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HTL
        description: Hash table low This field contains the upper 32 bits of Hash table.
        bitOffset: 0
        bitWidth: 32
  - name: MAC_MII_ADDR
    description: MII address register
    addressOffset: 16
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GB
        description: MII busy This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  This bit should read a logic 0 before writing to this register and the MAC_MII_DATA register. This bit must also be set to 0 during a Write to this register. During a PHY register access, this bit will be set to 1 by the Application to indicate that a Read or Write access is in progress. The MAC_MII_DATA register should be kept valid until this bit is cleared by the MAC during a PHY Write operation. The MAC_MII_DATA register is invalid until this bit is cleared by the MAC during a PHY Read operation. This register should not be written to until this bit is cleared.
        bitOffset: 0
        bitWidth: 1
      - name: W
        description: MII write When set, this bit tells the PHY that this will be a Write operation using the MII Data register. If this bit is not set, this will be a Read operation, placing the data in the MII Data register.
        bitOffset: 1
        bitWidth: 1
      - name: CR
        description: CSR clock range The CSR Clock Range selection determines the frequency of the MDC clock. The suggested range of CLK_M4_ETHERNET frequency applicable for each value below (when Bit[5] = 0) ensures that the MDC clock is approximately between the frequency range 1.0 MHz - 2.5 MHz.  When bit 5 is set, you can achieve MDC clock of frequency higher than the IEEE 802.3 specified frequency limit of 2.5 MHz and program a clock divider of lower value. For example, when CLK_M4_ETHERNET is of frequency 100 MHz and you program these bits as 1010, then the resultant MDC clock will be of 12.5 MHz which is outside the limit of IEEE 802.3 specified range. Program the values given below only if the interfacing chips supports faster MDC clocks.  See Table 554 for bit values.
        bitOffset: 2
        bitWidth: 4
      - name: GR
        description: MII register These bits select the desired MII register in the selected PHY device.
        bitOffset: 6
        bitWidth: 5
      - name: PA
        description: Physical layer address This field tells which of the 32 possible PHY devices are being accessed.
        bitOffset: 11
        bitWidth: 5
  - name: MAC_MII_DATA
    description: MII data register
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GD
        description: MII data This contains the 16-bit data value read from the PHY after a Management Read operation or the 16-bit data value to be written to the PHY before a Management Write operation.
        bitOffset: 0
        bitWidth: 16
  - name: MAC_FLOW_CTRL
    description: Flow control register
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: FCB
        description: Flow Control Busy/Backpressure Activate  This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  This bit initiates a Pause Control frame in Full-Duplex mode. In Full-Duplex mode, this bit should be read as 0 before writing to the Flow Control register. To initiate a Pause control frame, the Application must set this bit to 1. During a transfer of the Control Frame, this bit will continue to be set to signify that a frame transmission is in progress. After the completion of Pause control frame transmission, the MAC will reset this bit to 0. The Flow Control register should not be written to until this bit is cleared. In Half-Duplex mode, when this bit is set (and TFE is set), then backpressure is asserted by the MAC Core. During backpressure, when the MAC receives a new frame, the transmitter starts sending a JAM pattern resulting in a collision. This control register bit is logically ORed with the flow controller input signal for the backpressure function. When the MAC is configured to Full- Duplex mode, the BPA is automatically disabled.
        bitOffset: 0
        bitWidth: 1
      - name: TFE
        description: Transmit Flow Control Enable  In Full-Duplex mode, when this bit is set, the MAC enables the flow control operation to transmit Pause frames. When this bit is reset, the flow control operation in the MAC is disabled, and the MAC will not transmit any Pause frames. In Half-Duplex mode, when this bit is set, the MAC enables the back-pressure operation. When this bit is reset, the backpressure feature is disabled.
        bitOffset: 1
        bitWidth: 1
      - name: RFE
        description: Receive Flow Control Enable  When this bit is set, the MAC will decode the received Pause frame and disable its transmitter for a specified (Pause Time) time. When this bit is reset, the decode function of the Pause frame is disabled.
        bitOffset: 2
        bitWidth: 1
      - name: UP
        description: Unicast Pause Frame Detect  When this bit is set, the MAC will detect the Pause frames with the station's unicast address specified in MAC Address0 High Register and MAC Address0 Low Register, in addition to the detecting Pause frames with the unique multicast address. When this bit is reset, the MAC will detect only a Pause frame with the unique multicast address specified in the 802.3x standard.
        bitOffset: 3
        bitWidth: 1
      - name: PLT
        description: Pause Low Threshold  This field configures the threshold of the PAUSE timer at which the input flow control is checked for automatic retransmission of PAUSE Frame. The threshold values should be always less than the Pause Time configured in Bits[31:16]. For example, if PT = 0x100 (256 slot-times), and PLT = 01, then a second PAUSE frame is automatically transmitted if the flow control signal is asserted at 228 (256 - 28) slot-times after the first PAUSE frame is transmitted.
        bitOffset: 4
        bitWidth: 2
      - name: DZPQ
        description: Disable Zero-Quanta Pause  When set, this bit disables the automatic generation of Zero-Quanta Pause Control frames on the deassertion of the flow-control signal from the FIFO layer. When this bit is reset, normal operation with automatic Zero-Quanta Pause Control frame generation is enabled.
        bitOffset: 7
        bitWidth: 1
      - name: PT
        description: Pause time This field holds the value to be used in the Pause Time field in the transmit control frame. If the Pause Time bits is configured to be double-synchronized to the MII clock domain, then consecutive writes to this register should be performed only after at least 4 clock cycles in the destination clock domain.
        bitOffset: 16
        bitWidth: 16
  - name: MAC_VLAN_TAG
    description: VLAN tag register
    addressOffset: 28
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: VL
        description: VLAN Tag Identifier for Receive Frames  This contains the 802.1Q VLAN tag to identify VLAN frames, and is compared to the fifteenth and sixteenth bytes of the frames being received for VLAN frames. Bits[15:13] are the User Priority, Bit[12] is the Canonical Format Indicator (CFI) and bits[11:0] are the VLAN tag's VLAN Identifier (VID) field. When the ETV bit is set, only the VID (Bits[11:0]) is used for comparison.  If VL (VL[11:0] if ETV is set) is all zeros, the MAC does not check the fifteenth and sixteenth bytes for VLAN tag comparison, and declares all frames with a Type field value of 0x8100 to be VLAN frames.
        bitOffset: 0
        bitWidth: 16
      - name: ETV
        description: Enable 12-Bit VLAN Tag Comparison  When this bit is set, a 12-bit VLAN identifier, rather than the complete 16-bit VLAN tag, is used for comparison and filtering. Bits[11:0] of the VLAN tag are compared with the corresponding field in the received VLAN-tagged frame.  When this bit is reset, all 16 bits of the received VLAN frame's fifteenth and sixteenth bytes are used for comparison.
        bitOffset: 16
        bitWidth: 1
  - name: MAC_DEBUG
    description: Debug register
    addressOffset: 36
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RXIDLESTAT
        description: When high, it indicates that the MAC MII receive protocol engine is actively receiving data and not in IDLE state.
        bitOffset: 0
        bitWidth: 1
      - name: FIFOSTAT0
        description: When high, it indicates the active state of the small FIFO Read and Write controllers respectively of the MAC receive Frame Controller module.
        bitOffset: 1
        bitWidth: 2
      - name: RXFIFOSTAT1
        description: When high, it indicates that the MTL RxFIFO Write Controller is active and transferring a received frame to the FIFO.
        bitOffset: 4
        bitWidth: 1
      - name: RXFIFOSTAT
        description: 'State of the RxFIFO read Controller:  00 = idle state 01 = reading frame data 10 = reading frame status (or Time stamp) 11 = flushing the frame data and status'
        bitOffset: 5
        bitWidth: 2
      - name: RXFIFOLVL
        description: Status of the RxFIFO Fill-level  00 = RxFIFO Empty  01 = RxFIFO fill-level below flow-control de-activate threshold  10 = RxFIFO fill-level above flow-control activate threshold  11 = RxFIFO Full
        bitOffset: 8
        bitWidth: 2
      - name: TXIDLESTAT
        description: When high, it indicates that the MAC MII transmit protocol engine is actively transmitting data and not in IDLE state.
        bitOffset: 16
        bitWidth: 1
      - name: TXSTAT
        description: 'State of the MAC Transmit Frame Controller module:  00 = idle 01 = Waiting for Status of previous frame or IFG/backoff period to be over  10 = Generating and transmitting a PAUSE control frame (in full duplex mode)  11 = Transferring input frame for transmission'
        bitOffset: 17
        bitWidth: 2
      - name: PAUSE
        description: When high, it indicates that the MAC transmitter is in PAUSE condition (in full-duplex only) and hence will not schedule any frame for transmission.
        bitOffset: 19
        bitWidth: 1
      - name: TXFIFOSTAT
        description: State of the TxFIFO read Controller  00 = idle state 01 = READ state (transferring data to MAC transmitter)  10 = Waiting for TxStatus from MAC transmitter  11 = Writing the received TxStatus or flushing the TxFIFO
        bitOffset: 20
        bitWidth: 2
      - name: TXFIFOSTAT1
        description: When high, it indicates that the TxFIFO Write Controller is active and transferring data to the TxFIFO.
        bitOffset: 22
        bitWidth: 1
      - name: TXFIFOLVL
        description: When high, it indicates that the TxFIFO is not empty and has some data left for transmission.
        bitOffset: 24
        bitWidth: 1
      - name: TXFIFOFULL
        description: When high, it indicates that the TxStatus FIFO is full and hence the controller will not be accepting any more frames for transmission.
        bitOffset: 25
        bitWidth: 1
  - name: MAC_RWAKE_FRFLT
    description: Remote wake-up frame filter
    addressOffset: 40
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ADDR
        description: WKUPFMFILTER address
        bitOffset: 0
        bitWidth: 32
  - name: MAC_PMT_CTRL_STAT
    description: PMT control and status
    addressOffset: 44
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PD
        description: Power-down This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  When set, all received frames will be dropped. This bit is cleared automatically when a magic packet or Wake-Up frame is received, and Power-Down mode is disabled. Frames received after this bit is cleared are forwarded to the application.This bit must only be set when either the Magic Packet Enable or Wake- Up Frame Enable bit is set high.
        bitOffset: 0
        bitWidth: 1
      - name: MPE
        description: Magic packet enable When set, enables generation of a power management event due to Magic Packet reception.
        bitOffset: 1
        bitWidth: 1
      - name: WFE
        description: Wake-up frame enable When set, enables generation of a power management event due to wake-up frame reception.
        bitOffset: 2
        bitWidth: 1
      - name: MPR
        description: Magic Packet Received This register field can be read by the application (Read), can be set to 1 by the Ethernet core on a certain internal event (Self Set), and is automatically cleared to 0 on a register read. A register write of 0 has no effect on this field.  When set, this bit indicates the power management event was generated by the reception of a Magic Packet. This bit is cleared by a Read into this register.
        bitOffset: 5
        bitWidth: 1
      - name: WFR
        description: Wake-up Frame Received This register field can be read by the application (Read), can be set to 1 by the Ethernet core on a certain internal event (Self Set), and is automatically cleared to 0 on a register read. A register write of 0 has no effect on this field.   When set, this bit indicates the power management event was generated due to reception of a wake-up frame. This bit is cleared by a Read into this register.
        bitOffset: 6
        bitWidth: 1
      - name: GU
        description: Global Unicast When set, enables any unicast packet filtered by the MAC (DAF) address recognition to be a wake-up frame.
        bitOffset: 9
        bitWidth: 1
      - name: WFFRPR
        description: Wake-up Frame Filter Register Pointer Reset This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  When set, resets the Remote Wake-up Frame Filter register pointer to 000. It is automatically cleared after 1 clock cycle.
        bitOffset: 31
        bitWidth: 1
  - name: MAC_INTR
    description: Interrupt status register
    addressOffset: 56
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PMT
        description: PMT Interrupt Status  This bit is set whenever a Magic packet or Wake-on-LAN frame is received in Power- Down mode (See bits 5 and 6 in Table 560). This bit is cleared when both bits[6:5] are cleared because of a read operation to the PMT Control and Status register.
        bitOffset: 3
        bitWidth: 1
      - name: TS
        description: 'Timestamp interrupt status When Advanced Timestamp feature is enabled, this bit is set when any of the following conditions is true:  - The system time value equals or exceeds the value specified in the Target Time High and Low registers  - There is an overflow in the seconds register  This bit is cleared on reading the byte 0 of the Timestamp Status register (Table 576).  Otherwise, when default Time stamping is enabled, this bit when set indicates that the system time value equals or exceeds the value specified in the Target Time registers. In this mode, this bit is cleared after the completion of the read of this Interrupt Status Register[9]. In all other modes, this bit is reserved.'
        bitOffset: 9
        bitWidth: 1
  - name: MAC_INTR_MASK
    description: Interrupt mask register
    addressOffset: 60
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PMTIM
        description: PMT Interrupt Mask  This bit when set, will disable the assertion of the interrupt signal due to the setting of PMT Interrupt Status bit in Table 561.
        bitOffset: 3
        bitWidth: 1
      - name: TSIM
        description: Timestamp interrupt mask When set, this bit disables the assertion of the interrupt signal because of the setting of Timestamp Interrupt Status bit in Table 561
        bitOffset: 9
        bitWidth: 1
  - name: MAC_ADDR0_HIGH
    description: MAC address 0 high register
    addressOffset: 64
    access: read-write
    resetValue: 2147549183
    resetMask: 4294967295
    fields:
      - name: A47_32
        description: MAC Address0 [47:32]  This field contains the upper 16 bits (47:32) of the 6-byte first MAC address. This is used by the MAC for filtering for received frames and for inserting the MAC address in the Transmit Flow Control (PAUSE) Frames.
        bitOffset: 0
        bitWidth: 16
      - name: MO
        description: Always 1
        bitOffset: 31
        bitWidth: 1
  - name: MAC_ADDR0_LOW
    description: MAC address 0 low register
    addressOffset: 68
    access: read-write
    resetValue: 4294967295
    resetMask: 4294967295
    fields:
      - name: A31_0
        description: MAC Address0 [31:0]  This field contains the lower 32 bits of the 6-byte first MAC address. This is used by the MAC for filtering for received frames and for inserting the MAC address in the Transmit Flow Control (PAUSE) Frames.
        bitOffset: 0
        bitWidth: 32
  - name: MAC_TIMESTP_CTRL
    description: Time stamp control register
    addressOffset: 1792
    access: read-write
    resetValue: 8192
    resetMask: 4294967295
    fields:
      - name: TSENA
        description: Time stamp Enable  When this bit, is set the timestamping is enabled for transmit and receive frames. When disabled timestamp is not added for transmit and receive frames and the TimeStamp Generator is also suspended. User has to always initialize the TimeStamp (system time) after enabling this mode.
        bitOffset: 0
        bitWidth: 1
      - name: TSCFUPDT
        description: Time stamp Fine or Coarse Update  When set, indicates that the system times update to be done using fine update method. When reset it indicates the system time stamp update to be done using Coarse method. This bit is reserved if the fine correction option is not enabled.
        bitOffset: 1
        bitWidth: 1
      - name: TSINIT
        description: Time stamp Initialize This register field can be read and written by the application (Read and Write), and is cleared to 0 by the Ethernet core (Self Clear).  When set, the system time is initialized (over-written) with the value specified in the Time stamp High Update and Time stamp Low Update registers. This register bit should be read zero before updating it. This bit is reset once the initialize is complete.
        bitOffset: 2
        bitWidth: 1
      - name: TSUPDT
        description: Time stamp Update  This register field can be read and written by the application (Read and Write), and is cleared to 0 by the Ethernet core (Self Clear).  When set, the system time is updated (added/subtracted) with the value specified in the Time stamp High Update and Time stamp Low Update registers. This register bit should be read zero before updating it. This bit is reset once the update is completed in hardware.
        bitOffset: 3
        bitWidth: 1
      - name: TSTRIG
        description: Time stamp Interrupt Trigger Enable  This register field can be read and written by the application (Read and Write), and is cleared to 0 by the Ethernet core (Self Clear).  When set, the Time stamp interrupt is generated when the System Time becomes greater than the value written in Target Time register. This bit is reset after the generation of Time stamp Trigger Interrupt.
        bitOffset: 4
        bitWidth: 1
      - name: TSADDREG
        description: Addend Reg Update  When set, the contents of the Time stamp Addend register is updated in the PTP block for fine correction. This is cleared when the update is completed. This register bit should be zero before setting it. This is a reserved bit when only coarse correction option is selected.
        bitOffset: 5
        bitWidth: 1
      - name: TSENALL
        description: Enable Time stamp for All Frames  When set, the Time stamp snapshot is enabled for all frames received by the core.
        bitOffset: 8
        bitWidth: 1
      - name: TSCTRLSSR
        description: Time stamp Digital or Binary rollover control  When set, the Time stamp Low register rolls over after 0x3B9A_C9FF value (i.e., 1 nanosecond accuracy) and increments the Time stamp (High) seconds. When reset, the rollover value of sub-second register is 0x7FFF_FFFF. The sub-second increment has to be programmed correctly depending on the PTP reference clock frequency and this bit value.
        bitOffset: 9
        bitWidth: 1
      - name: TSVER2ENA
        description: Enable PTP packet snooping for version 2 format  When set, the PTP packets are snooped using the 1588 version 2 format else snooped using the version 1 format.
        bitOffset: 10
        bitWidth: 1
      - name: TSIPENA
        description: Enable Time stamp Snapshot for PTP over Ethernet frames  When set, the Time stamp snapshot is taken for frames which have PTP messages in Ethernet frames (PTP over Ethernet) also. By default snapshots are taken for UDP-IP-Ethernet PTP packets.
        bitOffset: 11
        bitWidth: 1
      - name: TSIPV6ENA
        description: Enable Time stamp Snapshot for IPv6 frames  When set, the Time stamp snapshot is taken for IPv6 frames.
        bitOffset: 12
        bitWidth: 1
      - name: TSIPV4ENA
        description: Enable Time stamp Snapshot for IPv4 frames  When set, the Time stamp snapshot is taken for IPv4 frames.
        bitOffset: 13
        bitWidth: 1
      - name: TSEVNTENA
        description: Enable Time stamp Snapshot for Event Messages  When set, the Time stamp snapshot is taken for event messages only. When reset snapshot is taken for all other messages except Announce, Management and Signaling.
        bitOffset: 14
        bitWidth: 1
      - name: TSMSTRENA
        description: Enable Snapshot for Messages Relevant to Master  When set, the snapshot is taken for messages relevant to master node only else snapshot is taken for messages relevant to slave node. This is valid only for ordinary clock and boundary clock node.
        bitOffset: 15
        bitWidth: 1
      - name: TSCLKTYPE
        description: 'Select the type of clock node  The following are the options to select the type of clock node:  00 = ordinary clock 01 = boundary clock 10 = end-to-end transparent clock 11 = peer-to-peer transparent clock'
        bitOffset: 16
        bitWidth: 2
      - name: TSENMACADDR
        description: Enable MAC address for PTP frame filtering  When set, uses the DA MAC address (that matches any MAC Address register except the default MAC address 0) to filter the PTP frames when PTP is sent directly over Ethernet.
        bitOffset: 18
        bitWidth: 1
  - name: SUBSECOND_INCR
    description: Sub-second increment register
    addressOffset: 1796
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SSINC
        description: Sub-second increment value. The value programmed in this register is accumulated with the contents of the sub-second register. For example, to achieve an accuracy of 20 ns, the value to be programmed is 20. (Program 0x14 with a 50 MHz reference clock if 1 ns accuracy is selected.)
        bitOffset: 0
        bitWidth: 8
  - name: SECONDS
    description: System time seconds register
    addressOffset: 1800
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSS
        description: Time stamp second The value in this field indicates the current value in seconds of the System Time maintained by the core.
        bitOffset: 0
        bitWidth: 32
  - name: NANOSECONDS
    description: System time nanoseconds register
    addressOffset: 1804
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSSS
        description: Time stamp sub seconds The value in this field has the sub second representation of time, with an accuracy of 0.46 nano-second. (When TSCTRLSSR in the MAC_TIMESTAMP_CTRL register is set, each bit represents 1 ns and the maximum value will be 0x3B9A_C9FF, after which it rolls-over to zero).
        bitOffset: 0
        bitWidth: 31
      - name: PSNT
        description: Positive or negative time This bit indicates positive or negative time value. If the bit is reset, it indicates that the time representation is positive, and if it is set, it indicates negative time value. (This bit represents the 32nd bit of the nanoseconds value when the Advance Time stamp feature is enabled).
        bitOffset: 31
        bitWidth: 1
  - name: SECONDSUPDATE
    description: System time seconds update register
    addressOffset: 1808
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSS
        description: Time stamp second The value in this field indicates the time, in seconds, to be initialized or added to the system time.
        bitOffset: 0
        bitWidth: 32
  - name: NANOSECONDSUPDATE
    description: System time nanoseconds update register
    addressOffset: 1812
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSSS
        description: Time stamp sub seconds The value in this field has the sub second representation of time, with an accuracy of 0.46 nano-second. (When TSCTRLSSR is set in the Time stamp control register, each bit represents 1 ns and the programmed value should not exceed 0x3B9A_C9FF.)
        bitOffset: 0
        bitWidth: 31
      - name: ADDSUB
        description: Add or subtract time When this bit is set, the time value is subtracted with the contents of the update register. When this bit is reset, the time value is added with the contents of the update register.
        bitOffset: 31
        bitWidth: 1
  - name: ADDEND
    description: Time stamp addend register
    addressOffset: 1816
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSAR
        description: Time stamp addend This register indicates the 32-bit time value to be added to the Accumulator register to achieve time synchronization.
        bitOffset: 0
        bitWidth: 32
  - name: TARGETSECONDS
    description: Target time seconds register
    addressOffset: 1820
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSTR
        description: Target time seconds register This register stores the time in seconds. When the Time stamp value matches or exceeds both Target Time stamp registers, the MAC, if enabled, generates an interrupt.
        bitOffset: 0
        bitWidth: 32
  - name: TARGETNANOSECONDS
    description: Target time nanoseconds register
    addressOffset: 1824
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSTR
        description: Target Time stamp low  This register stores the time in (signed) nanoseconds. When the value of the Time stamp matches the Target Time stamp registers (both), the MAC will generate an interrupt if enabled. (This value should not exceed 0x3B9A_C9FF when TSCTRLSSR is set in the Time stamp control register.)
        bitOffset: 0
        bitWidth: 31
  - name: HIGHWORD
    description: System time higher word seconds register
    addressOffset: 1828
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSHWR
        description: Time stamp higher word Contains the most significant 16-bits of the Time stamp seconds value. The register is directly written to initialize the value. This register is incremented when there is an overflow from the 32-bits of the System Time - Seconds register.
        bitOffset: 0
        bitWidth: 16
  - name: TIMESTAMPSTAT
    description: Time stamp status register
    addressOffset: 1832
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TSSOVF
        description: Time stamp seconds overflow When set, indicates that the seconds value of the Time stamp (when supporting version 2 format) has overflowed beyond 0xFFFF_FFFF.
        bitOffset: 0
        bitWidth: 1
      - name: TSTARGT
        description: Time stamp target reached When set, indicates the value of system time is greater or equal to the value specified in the Target Time High and Low registers
        bitOffset: 1
        bitWidth: 1
  - name: DMA_BUS_MODE
    description: Bus Mode Register
    addressOffset: 4096
    access: read-write
    resetValue: 131328
    resetMask: 4294967295
    fields:
      - name: SWR
        description: Software reset This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the Ethernet core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  When this bit is set, the MAC DMA Controller resets all MAC Subsystem internal registers and logic. It is cleared automatically after the reset operation has completed in all of the core clock domains. Read a 0 value in this bit before re-programming any register of the core.  The reset operation is completed only when all the resets in all the active clock domains are de-asserted. Hence it is essential that all the PHY inputs clocks (applicable for the selected PHY interface) are present for software reset completion.
        bitOffset: 0
        bitWidth: 1
      - name: DA
        description: DMA arbitration scheme 0 = Round-robin with Rx:Tx priority given in bits [15:14]  1 = Rx has priority over Tx
        bitOffset: 1
        bitWidth: 1
      - name: DSL
        description: Descriptor skip length This bit specifies the number of Word to skip between two unchained descriptors. The address skipping starts from the end of current descriptor to the start of next descriptor. When DSL value equals zero, then the descriptor table is taken as contiguous by the DMA, in Ring mode.
        bitOffset: 2
        bitWidth: 5
      - name: ATDS
        description: Alternate descriptor size When set, the alternate descriptor (see Section 26.7.6.3) size is increased to 32 bytes (8 DWORDS). This is required when the Advanced Time-Stamp feature or Full IPC Offload Engine is enabled in the receiver.  When reset, the descriptor size reverts back to 4 DWORDs (16 bytes).
        bitOffset: 7
        bitWidth: 1
      - name: PBL
        description: Programmable burst length These bits indicate the maximum number of beats to be transferred in one DMA transaction. This will be the maximum value that is used in a single block Read/Write. The DMA will always attempt to burst as specified in PBL each time it starts a Burst transfer on the host bus. PBL can be programmed with permissible values of 1, 2, 4, 8, 16, and 32. Any other value will result in undefined behavior. When USP is set high, this PBL value is applicable for TxDMA transactions only.  The PBL values have the following limitations.  The maximum number of beats (PBL) possible is limited by the size of the Tx FIFO and Rx FIFO in the MTL layer and the data bus width on the DMA. The FIFO has a constraint that the maximum beat supported is half the depth of the FIFO, except when specified (as given below). For different data bus widths and FIFO sizes, the valid PBL range (including x8 mode) is provided in the following table. If the PBL is common for both transmit and receive DMA, the minimum Rx FIFO and Tx FIFO depths must be considered. Do not program out-of-range PBL values, because the system may not behave properly.
        bitOffset: 8
        bitWidth: 6
      - name: PR
        description: Rx-to-Tx priority ratio RxDMA requests given priority over TxDMA requests in the following ratio. This is valid only when the DA bit is reset.  00 = 1-to-1 01 = 2-to-1 10 = 3-to-1 11 = 4-to-1
        bitOffset: 14
        bitWidth: 2
      - name: FB
        description: Fixed burst This bit controls whether the AHB Master interface performs fixed burst transfers or not. When set, the AHB will use only SINGLE, INCR4, INCR8 or INCR16 during start of normal burst transfers. When reset, the AHB will use SINGLE and INCR burst transfer operations.
        bitOffset: 16
        bitWidth: 1
      - name: RPBL
        description: RxDMA PBL These bits indicate the maximum number of beats to be transferred in one RxDMA transaction. This will be the maximum value that is used in a single block Read/Write. The RxDMA will always attempt to burst as specified in RPBL each time it starts a Burst transfer on the host bus. RPBL can be programmed with permissible values of 1, 2, 4, 8, 16, and 32. Any other value will result in undefined behavior. These bits are valid and applicable only when USP is set high.
        bitOffset: 17
        bitWidth: 6
      - name: USP
        description: Use separate PBL When set high, it configures the RxDMA to use the value configured in bits [22:17] as PBL while the PBL value in bits [13:8] is applicable to TxDMA operations only. When reset to low, the PBL value in bits [13:8] is applicable for both DMA engines.
        bitOffset: 23
        bitWidth: 1
      - name: PBL8X
        description: 8 x PBL mode When set high, this bit multiplies the PBL value programmed (bits [22:17] and bits [13:8]) eight times. Thus the DMA will transfer data in to a maximum of 8, 16, 32, 64, 128, and 256 beats depending on the PBL value.  This bit function is not backward compatible. Before version 3.50a, this bit was 4xPBL.
        bitOffset: 24
        bitWidth: 1
      - name: AAL
        description: Address-aligned beats When this bit is set high and the FB bit equals 1, the AHB interface generates all bursts aligned to the start address LS bits. If the FB bit equals 0, the first burst (accessing the data buffer's start address) is not aligned, but subsequent bursts are aligned to the address.
        bitOffset: 25
        bitWidth: 1
      - name: MB
        description: Mixed burst When this bit is set high and FB bit is low, the AHB master interface will start all bursts of length more than 16 with INCR (undefined burst) whereas it will revert to fixed burst transfers (INCRx and SINGLE) for burst-length of 16 and below.
        bitOffset: 26
        bitWidth: 1
      - name: TXPR
        description: When set, this bit indicates that the transmit DMA has higher priority than the receive DMA during arbitration for the system-side bus.
        bitOffset: 27
        bitWidth: 1
  - name: DMA_TRANS_POLL_DEMAND
    description: Transmit poll demand register
    addressOffset: 4100
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TPD
        description: Transmit poll demand This register field can be read by the application, and when a write operation is performed with any data value, an event is triggered.  When these bits are written with any value, the DMA reads the current descriptor pointed to by the Current Host Transmit Descriptor register (Section 26.6.37). If that descriptor is not available (owned by Host), transmission returns to the Suspend state and bit 2 in the DMA_STAT Register is asserted. If the descriptor is available, transmission resumes.
        bitOffset: 0
        bitWidth: 32
  - name: DMA_REC_POLL_DEMAND
    description: Receive poll demand register
    addressOffset: 4104
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RPD
        description: Receive poll demand This register field can be read by the application, and when a write operation is performed with any data value, an event is triggered.  When these bits are written with any value, the DMA reads the current descriptor pointed to by the Current Host Receive Descriptor register (Section 26.6.38). If that descriptor is not available (owned by Host), reception returns to the Suspended state and bit 7 in the DMA_STAT Register is not asserted. If the descriptor is available, the Receive DMA returns to active state.
        bitOffset: 0
        bitWidth: 32
  - name: DMA_REC_DES_ADDR
    description: Receive descriptor list address register
    addressOffset: 4108
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SRL
        description: Start of receive list This field contains the base address of the First Descriptor in the Receive Descriptor list. The LSB bit 1 will be ignored and taken as all-zero by the DMA internally. Hence these LSB bits are Read Only.
        bitOffset: 0
        bitWidth: 32
  - name: DMA_TRANS_DES_ADDR
    description: Transmit descriptor list address register
    addressOffset: 4112
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SRL
        description: Start of transmit list This field contains the base address of the First Descriptor in the Transmit Descriptor list. The LSB bit 1 will be ignored and taken as all-zero by the DMA internally. Hence these LSB bits are Read Only.
        bitOffset: 0
        bitWidth: 32
  - name: DMA_STAT
    description: Status register
    addressOffset: 4116
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TI
        description: Transmit interrupt This bit indicates that frame transmission is finished and TDES1[31] is set in the First Descriptor.
        bitOffset: 0
        bitWidth: 1
      - name: TPS
        description: Transmit process stopped This bit is set when the transmission is stopped.
        bitOffset: 1
        bitWidth: 1
      - name: TU
        description: Transmit buffer unavailable  This bit indicates that the Next Descriptor in the Transmit List is owned by the host and cannot be acquired by the DMA. Transmission is suspended. Bits[22:20] explain the Transmit Process state transitions. To resume processing transmit descriptors, the host should change the ownership of the bit of the descriptor and then issue a Transmit Poll Demand command.
        bitOffset: 2
        bitWidth: 1
      - name: TJT
        description: Transmit jabber timeout  This bit indicates that the Transmit Jabber Timer expired, meaning that the transmitter had been excessively active. The transmission process is aborted and placed in the Stopped state. This causes the Transmit Jabber Timeout TDES0[14] flag to assert.
        bitOffset: 3
        bitWidth: 1
      - name: OVF
        description: Receive overflow This bit indicates that the Receive Buffer had an Overflow during frame reception. If the partial frame is transferred to application, the overflow status is set in RDES0[11].
        bitOffset: 4
        bitWidth: 1
      - name: UNF
        description: Transmit underflow This bit indicates that the Transmit Buffer had an Underflow during frame transmission. Transmission is suspended and an Underflow Error TDES0[1] is set.
        bitOffset: 5
        bitWidth: 1
      - name: RI
        description: Receive interrupt  This bit indicates the completion of frame reception. Specific frame status information has been posted in the descriptor. Reception remains in the Running state.
        bitOffset: 6
        bitWidth: 1
      - name: RU
        description: Receive buffer unavailable  This bit indicates that the Next Descriptor in the Receive List is owned by the host and cannot be acquired by the DMA. Receive Process is suspended. To resume processing Receive descriptors, the host should change the ownership of the descriptor and issue a Receive Poll Demand command. If no Receive Poll Demand is issued, Receive Process resumes when the next recognized incoming frame is received. This bit is set only when the previous Receive Descriptor was owned by the DMA.
        bitOffset: 7
        bitWidth: 1
      - name: RPS
        description: Received process stopped This bit is asserted when the Receive Process enters the Stopped state.
        bitOffset: 8
        bitWidth: 1
      - name: RWT
        description: Receive watchdog timeout  This bit is asserted when a frame with a length greater than 2,048 bytes is received (10,240 when Jumbo Frame mode is enabled).
        bitOffset: 9
        bitWidth: 1
      - name: ETI
        description: Early transmit interrupt  This bit indicates that the frame to be transmitted was fully transferred to the MTL Transmit FIFO.
        bitOffset: 10
        bitWidth: 1
      - name: FBI
        description: Fatal bus error interrupt This bit indicates that a bus error occurred, as detailed in bits [25:23]. When this bit is set, the corresponding DMA engine disables all its bus accesses.
        bitOffset: 13
        bitWidth: 1
      - name: ERI
        description: Early receive interrupt  This bit indicates that the DMA had filled the first data buffer of the packet. Receive Interrupt bit 6 in this register automatically clears this bit.
        bitOffset: 14
        bitWidth: 1
      - name: AIE
        description: 'Abnormal interrupt summary  Abnormal Interrupt Summary bit value is the logical OR of the following when the corresponding interrupt bits are enabled in the DMA_INT_EN register:  DMA_STAT register, bit 1: Transmit process stopped DMA_STAT register, bit 3: Transmit jabber timeout DMA_STAT register, bit 4: Receive overflow DMA_STAT register, bit 5: Transmit underflow DMA_STAT register, bit 7: Receiver buffer unavailable DMA_STAT register, bit 8: Receive process stopped DMA_STAT register, bit 9: Receive watchdog timeout DMA_STAT register, bit 10: Early transmit interrupt DMA_STAT register, bit 13: Fatal bus error Only unmasked bits affect the Abnormal Interrupt Summary bit.  This is a sticky bit and must be cleared each time a corresponding bit that causes AIS to be set is cleared.'
        bitOffset: 15
        bitWidth: 1
      - name: NIS
        description: 'Normal interrupt summary Normal Interrupt Summary bit value is the logical OR of the following when the corresponding interrupt bits are enabled in the DMA_INT_EN register:  DMA_STAT register, bit 0: Transmit interrupt DMA_STAT register, bit 2: Transmit buffer unavailable DMA_STAT register, bit 6: Receive interrupt DMA_STAT register, bit 14: Early receive interrupt Only unmasked bits affect the Normal Interrupt Summary bit.  This is a sticky bit and must be cleared (by writing a 1 to this bit) each time a corresponding bit that causes NIS to be set is cleared.'
        bitOffset: 16
        bitWidth: 1
      - name: RS
        description: 'Receive Process State These bits indicate the receive DMA state machine state. This field does not generate an interrupt. 000 = Stopped: Reset or Stop Receive Command issued.  001 = Running: Fetching Receive Transfer Descriptor.  010 = Reserved. 011 = Running: Waiting for receive packet.  100 = Suspended: Receive Descriptor Unavailable.  101 = Running: Closing Receive Descriptor.  110 = TIME_STAMP write state.  111 = Running: Transferring the receive packet data from receive buffer to host memory.'
        bitOffset: 17
        bitWidth: 3
      - name: TS
        description: Transmit Process State These bits indicate the transmit DMA state machine state. This field does not generate an interrupt. 000 = Stopped; Reset or Stop Transmit Command issued.  001 = Running; Fetching Transmit Transfer Descriptor.  010 = Running; Waiting for status.  011 = Running; Reading Data from host memory buffer and queuing it to transmit buffer (Tx FIFO).  100 = TIME_STAMP write state.  101 = Reserved. 110 = Suspended; Transmit Descriptor Unavailable or Transmit Buffer Underflow.  111 = Running; Closing Transmit Descriptor.
        bitOffset: 20
        bitWidth: 3
      - name: EB1
        description: Error bit 1 This bit indicates the type of error that caused a Bus Error (e.g., error response on the AHB interface). This bits is valid only when bit 13 in this register is set. This field does not generate an interrupt.  1 = Error during data transfer by TxDMA. 0 = Error during data transfer by RxDMA.
        bitOffset: 23
        bitWidth: 1
      - name: EB2
        description: Error bit 2 This bit indicates the type of error that caused a Bus Error (e.g., error response on the AHB interface). This bits is valid only when bit 13 in this register is set. This field does not generate an interrupt.  1 = Error during read transfer. 0 = Error during write transfer.
        bitOffset: 24
        bitWidth: 1
      - name: EB3
        description: Error bit 3 This bit indicates the type of error that caused a Bus Error (e.g., error response on the AHB interface). This bits is valid only when bit 13 in this register is set. This field does not generate an interrupt.  1 = Error during descriptor access. 0 = Error during data buffer access.
        bitOffset: 25
        bitWidth: 1
  - name: DMA_OP_MODE
    description: Operation mode register
    addressOffset: 4120
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SR
        description: Start/stop receive When this bit is set, the Receive process is placed in the Running state. The DMA attempts to acquire the descriptor from the Receive list and processes incoming frames. Descriptor acquisition is attempted from the current position in the list, which is the address set by the DMA_REC_DES_ADDR register or the position retained when the Receive process was previously stopped. If no descriptor is owned by the DMA, reception is suspended and Receive Buffer Unavailable bit (bit 7 in DMA_STAT register) is set. The Start Receive command is effective only when reception has stopped. If the command was issued before setting the DMA_REC_DES_ADDR, DMA behavior is unpredictable.
        bitOffset: 1
        bitWidth: 1
      - name: OSF
        description: Operate on second frame When this bit is set, this bit instructs the DMA to process a second frame of Transmit data even before status for first frame is obtained.
        bitOffset: 2
        bitWidth: 1
      - name: RTC
        description: Receive threshold control These two bits control the threshold level of the MTL Receive FIFO. Transfer (request) to DMA starts when the frame size within the MTL Receive FIFO is larger than the threshold. In addition, full frames with a length less than the threshold are transferred automatically. These bits are valid only when the RSF bit is zero, and are ignored when the RSF bit is set to 1.  00 = 64 01 = 32 10 = 96 11 = 128
        bitOffset: 3
        bitWidth: 2
      - name: FUF
        description: Forward undersized good frames When set, the Rx FIFO will forward Undersized frames (frames with no Error and length less than 64 bytes) including pad-bytes and CRC).  When reset, the Rx FIFO will drop all frames of less than 64 bytes, unless it is already transferred due to lower value of Receive Threshold (e.g., RTC = 01).
        bitOffset: 6
        bitWidth: 1
      - name: FEF
        description: Forward error frames When this bit is reset, the Rx FIFO drops frames with error status (CRC error, collision error, , watchdog timeout, overflow). However, if the frame's start byte (write) pointer is already transferred to the read controller side (in Threshold mode), then the frames are not dropped. When FEF is set, all frames except runt error frames are forwarded to the DMA. But when RxFIFO overflows when a partial frame is written, then such frames are dropped even when FEF is set.
        bitOffset: 7
        bitWidth: 1
      - name: ST
        description: Start/Stop Transmission Command  When this bit is set, transmission is placed in the Running state, and the DMA checks the Transmit List at the current position for a frame to be transmitted. Descriptor acquisition is attempted either from the current position in the list, which is the Transmit List Base Address set by the DMA_TRANS_DES_ADDR register or from the position retained when transmission was stopped previously. If the current descriptor is not owned by the DMA, transmission enters the Suspended state and Transmit Buffer Unavailable (DMA_STAT register, bit 2) is set. The Start Transmission command is effective only when transmission is stopped. If the command is issued before setting the DMA_TRANS_DES_ADDR register, then the DMA behavior is unpredictable.  When this bit is reset, the transmission process is placed in the Stopped state after completing the transmission of the current frame. The Next Descriptor position in the Transmit List is saved, and becomes the current position when transmission is restarted. The stop transmission command is effective only the transmission of the current frame is complete or when the transmission is in the Suspended state.
        bitOffset: 13
        bitWidth: 1
      - name: TTC
        description: Transmit threshold control These three bits control the threshold level of the MTL Transmit FIFO. Transmission starts when the frame size within the MTL Transmit FIFO is larger than the threshold. In addition, full frames with a length less than the threshold are also transmitted. These bits are used only when the TSF bit (Bit 21) is reset. 000 = 64 001 = 128 010 = 192 011 = 256 100 = 40 101 = 32 110 = 24 111 = 16
        bitOffset: 14
        bitWidth: 3
      - name: FTF
        description: Flush transmit FIFO This register field can be read by the application (Read), can be set to 1 by the application with a register write of 1 (Write Set), and is cleared to 0 by the Ethernet core (Self Clear). The application cannot clear this type of field, and a register write of 0 to this bit has no effect on this field.  When this bit is set, the transmit FIFO controller logic is reset to its default values and thus all data in the Tx FIFO is lost/flushed. This bit is cleared internally when the flushing operation is completed fully. The Operation Mode register should not be written to until this bit is cleared. The data which is already accepted by the MAC transmitter will not be flushed. It will be scheduled for transmission and will result in underflow and runt frame transmission.  The flush operation completes only after emptying the TxFIFO of its contents and all the pending Transmit Status of the transmitted frames are accepted by the host. In order to complete this flush operation, the PHY transmit clock is required to be active.
        bitOffset: 20
        bitWidth: 1
      - name: DFF
        description: Disable flushing of received frames When this bit is set, the RxDMA does not flush any frames due to the unavailability of receive descriptors/buffers as it does normally when this bit is reset. (See).
        bitOffset: 24
        bitWidth: 1
  - name: DMA_INT_EN
    description: Interrupt enable register
    addressOffset: 4124
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TIE
        description: Transmit interrupt enable When this bit is set with Normal Interrupt Summary Enable (bit 16 in this register), Transmit Interrupt is enabled. When this bit is reset, Transmit Interrupt is disabled.
        bitOffset: 0
        bitWidth: 1
      - name: TSE
        description: Transmit stopped enable When this bit is set with Abnormal Interrupt Summary Enable (bit 15 in this register), Transmission Stopped Interrupt is enabled. When this bit is reset, Transmission Stopped Interrupt is disabled.
        bitOffset: 1
        bitWidth: 1
      - name: TUE
        description: Transmit buffer unavailable enable When this bit is set with Normal Interrupt Summary Enable (bit 16 in this register), Transmit Buffer Unavailable Interrupt is enabled. When this bit is reset, Transmit Buffer Unavailable Interrupt is disabled.
        bitOffset: 2
        bitWidth: 1
      - name: TJE
        description: Transmit jabber timeout enable When this bit is set with Abnormal Interrupt Summary Enable (bit 15 in this register), Transmit Jabber Timeout Interrupt is enabled. When this bit is reset, Transmit Jabber Timeout Interrupt is disabled.
        bitOffset: 3
