            value: 0
          - name: B_0x1
            description: The RNG clock is too slow (fRNGCLKless than fHCLK/32).
            value: 1
      - name: SECS
        description: Seed error current status
        bitOffset: 2
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No faulty sequence has currently been detected.
            value: 0
          - name: B_0x1
            description: 'At least one of the following faulty sequence has been detected:'
            value: 1
      - name: BUSY
        description: Busy
        bitOffset: 4
        bitWidth: 1
        access: read-only
        enumeratedValues:
