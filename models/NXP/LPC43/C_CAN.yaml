name: C_CAN
description: C_CAN
groupName: C_CAN1
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CNTL
    description: CAN control
    addressOffset: 0
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: INIT
        description: Initialization
        enumeratedValues:
          - name: INITIALIZATION_STARTED
            description: Initialization is started. On reset, software needs to initialize the CAN controller.
            value: 1
          - name: NORMAL_OPERATION
            description: Normal operation.
            value: 0
        bitOffset: 0
        bitWidth: 1
      - name: IE
        description: Module interrupt enable
        enumeratedValues:
          - name: ENABLE
            description: Enable CAN interrupts. The interrupt line is set to LOW and remains LOW until all pending interrupts are cleared.
            value: 1
          - name: DISABLE
            description: Disable CAN interrupts. The interrupt line is always HIGH.
            value: 0
        bitOffset: 1
        bitWidth: 1
      - name: SIE
        description: Status change interrupt enable
        enumeratedValues:
          - name: ENABLE
            description: Enable status change interrupts. A status change interrupt will be generated when a message transfer is successfully completed or a CAN bus error is detected.
            value: 1
          - name: DISABLE
            description: Disable status change interrupts. No status change interrupt will be generated.
            value: 0
        bitOffset: 2
        bitWidth: 1
      - name: EIE
        description: Error interrupt enable
        enumeratedValues:
          - name: ENABLE
            description: Enable error interrupt. A change in the bits BOFF or EWARN in the CANSTAT registers will generate an interrupt.
            value: 1
          - name: DISABLE
            description: Disable error interrupt. No error status interrupt will be generated.
            value: 0
        bitOffset: 3
        bitWidth: 1
      - name: DAR
        description: Disable automatic retransmission
        enumeratedValues:
          - name: DISABLED
            description: Automatic retransmission disabled.
            value: 1
          - name: ENABLED
            description: Automatic retransmission of disturbed messages enabled.
            value: 0
        bitOffset: 5
        bitWidth: 1
      - name: CCE
        description: Configuration change enable
        enumeratedValues:
          - name: CPU_WRITE
            description: The CPU has write access to the CANBT register while the INIT bit is one.
            value: 1
          - name: CPU_NO
            description: The CPU has no write access to the bit timing register.
            value: 0
        bitOffset: 6
        bitWidth: 1
      - name: TEST
        description: Test mode enable
        enumeratedValues:
          - name: TEST_MODE
            description: Test mode.
            value: 1
          - name: NORMAL_OPERATION
            description: Normal operation.
            value: 0
        bitOffset: 7
        bitWidth: 1
  - name: STAT
    description: Status register
    addressOffset: 4
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LEC
        description: Last error code Type of the last error to occur on the CAN bus.The LEC field holds a code which indicates the type of the last error to occur on the CAN bus. This field will be cleared to 0 when a message has been transferred (reception or transmission) without error. The unused code 111 may be written by the CPU to check for updates.
        enumeratedValues:
          - name: NO_ERROR
            description: No error.
            value: 0
          - name: STUFF_ERROR
            description: 'Stuff error: More than 5 equal bits in a sequence have occurred in a part of a received message where this is not allowed.'
            value: 1
          - name: FORM_ERROR
            description: 'Form error: A fixed format part of a received frame has the wrong format.'
            value: 2
          - name: ACK_ERROR
            description: 'AckError: The message this CAN core transmitted was not acknowledged.'
            value: 3
          - name: BIT1_ERROR
            description: 'Bit1Error: During the transmission of a message (with the exception of the arbitration field), the device wanted to send a HIGH/recessive level (bit of logical value 1), but the monitored bus value was LOW/dominant.'
            value: 4
          - name: BIT0_ERROR
            description: 'Bit0Error: During the transmission of a message (or acknowledge bit, or active error flag, or overload flag), the device wanted to send a LOW/dominant level (data or identifier bit logical value 0), but the monitored Bus value was HIGH/recessive. During busoff recovery this status is set each time a sequence of 11 HIGH/recessive bits has been monitored. This enables the CPU to monitor the proceeding of the busoff recovery sequence (indicating the bus is not stuck at LOW/dominant or continuously disturbed).'
            value: 5
          - name: CRC_ERROR
            description: 'CRCError: The CRC checksum was incorrect in the message received.'
            value: 6
          - name: UNUSED_NO
            description: 'Unused: No CAN bus event was detected (written by the CPU).'
            value: 7
        bitOffset: 0
        bitWidth: 3
      - name: TXOK
        description: Transmitted a message successfully This bit is reset by the CPU. It is never reset by the CAN controller.
        enumeratedValues:
          - name: MSGTRANSFER
            description: Since this bit was last reset by the CPU, a message has been successfully transmitted (error free and acknowledged by at least one other node).
            value: 1
          - name: NOMSGTRANSFER
            description: Since this bit was reset by the CPU, no message has been successfully transmitted.
            value: 0
        bitOffset: 3
        bitWidth: 1
      - name: RXOK
        description: Received a message successfully This bit is reset by the CPU. It is never reset by the CAN controller.
        enumeratedValues:
          - name: MSGTRANSFER
            description: Since this bit was last set to zero by the CPU, a message has been successfully received independent of the result of acceptance filtering.
            value: 1
          - name: NOMSGTRANSFER
            description: Since this bit was last reset by the CPU, no message has been successfully transmitted.
            value: 0
        bitOffset: 4
        bitWidth: 1
      - name: EPASS
        description: Error passive
        enumeratedValues:
          - name: PASSIVE
            description: The CAN controller is in the error passive state as defined in the  CAN 2.0 specification.
            value: 1
          - name: ACTIVE
            description: The CAN controller is in the error active state.
            value: 0
        bitOffset: 5
        bitWidth: 1
      - name: EWARN
        description: Warning status
        enumeratedValues:
          - name: LEAST_ERROR
            description: At least one of the error counters in the EML has reached the error warning limit of 96.
            value: 1
          - name: BOTH_ERROR
            description: Both error counters are below the error warning limit of 96.
            value: 0
        bitOffset: 6
        bitWidth: 1
      - name: BOFF
        description: Busoff status
        enumeratedValues:
          - name: BUSOFF
            description: The CAN controller is in busoff state.
            value: 1
          - name: NOBUSOFF
            description: The CAN module is not in busoff.
            value: 0
        bitOffset: 7
        bitWidth: 1
  - name: EC
    description: Error counter
    addressOffset: 8
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TEC_7_0
        description: Transmit error counter Current value of the transmit error counter (maximum value 127)
        bitOffset: 0
        bitWidth: 8
      - name: REC_6_0
        description: Receive error counter Current value of the receive error counter (maximum value 255).
        bitOffset: 8
        bitWidth: 7
      - name: RP
        description: Receive error passive
        enumeratedValues:
          - name: PASSIVE
            description: The receive counter has reached the error passive level as defined in the  CAN2.0 specification.
            value: 1
          - name: BELOWPASSIVE
            description: The receive counter is below the error passive level.
            value: 0
        bitOffset: 15
        bitWidth: 1
  - name: BT
    description: Bit timing register
    addressOffset: 12
    access: read-write
    resetValue: 8961
    resetMask: 4294967295
    fields:
      - name: BRP
        description: Baud rate prescaler The value by which the oscillator frequency is divided for generating the bit time quanta. The bit time is built up from a multiple of this quanta. Valid values for the Baud Rate Prescaler are 0 to 63[1].  Valid programmed values are 0x01 - 0x3F[1].
        bitOffset: 0
        bitWidth: 6
      - name: SJW
        description: (Re)synchronization jump width Valid programmed values are 0 to 3[1].
        bitOffset: 6
        bitWidth: 2
      - name: TSEG1
        description: Time segment after the sample point Valid values are 0 to 7[1].
        bitOffset: 8
        bitWidth: 4
      - name: TSEG2
        description: Time segment before the sample point Valid values are 1 to 15[1].
        bitOffset: 12
        bitWidth: 3
  - name: INT
    description: Interrupt register
    addressOffset: 16
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: INTID15_0
        description: 0x0000= No interrupt is pending 0x0001 to 0x0020 = Number of message object which caused the interrupt. 0x0021 to 0x7FFF = Unused 0x8000 = Status interrupt 0x8001 to 0xFFFF = Unused
        bitOffset: 0
        bitWidth: 16
  - name: TEST
    description: Test register
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 0
    fields:
      - name: BASIC
        description: Basic mode
        enumeratedValues:
          - name: IF1_TX_if2_rx
            description: IF1 registers used as TX buffer, IF2 registers used as RX buffer.
            value: 1
          - name: DISABLED
            description: Basic mode disabled.
            value: 0
        bitOffset: 2
        bitWidth: 1
      - name: SILENT
        description: Silent mode
        enumeratedValues:
          - name: SILENT
            description: The module is in silent mode.
            value: 1
          - name: NORMAL_OPERATION
            description: Normal operation.
            value: 0
        bitOffset: 3
        bitWidth: 1
      - name: LBACK
        description: Loop back mode
        enumeratedValues:
          - name: ENABLED
            description: Loop back mode is enabled.
            value: 1
          - name: DISABLED
            description: Loop back mode is disabled.
            value: 0
        bitOffset: 4
        bitWidth: 1
      - name: TX1_0
        description: Control of TD pins
        enumeratedValues:
          - name: LEVEL_TD_PIN_CONTROLLED
            description: Level at the TD pin is controlled by the CAN controller. This is the value at reset.
            value: 0
          - name: SAMPLE_POINT_CAN_MONITORED
            description: The sample point can be monitored at the TD pin.
            value: 1
          - name: TD_PIN_DRIVEN_LOW
            description: TD pin is driven LOW/dominant.
            value: 2
          - name: TD_PIN_DRIVEN_HIGH
            description: TD pin is driven HIGH/recessive.
            value: 3
        bitOffset: 5
        bitWidth: 2
      - name: RX
        description: Monitors the actual value of the RD Pin
        enumeratedValues:
          - name: CAN_BUS_RECESSIVE
            description: The CAN bus is recessive (RD = 1).
            value: 1
          - name: CAN_BUS_DOMINANT
            description: The CAN bus is dominant (RD = 0).
            value: 0
        bitOffset: 7
        bitWidth: 1
  - name: BRPE
    description: Baud rate prescaler extension register
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BRPE
        description: Baud rate prescaler extension By programming BRPE the Baud Rate Prescaler can be extended to values up to 1023. Hardware interprets the value as the value of BRPE (MSBs) and BRP (LSBs) plus one. Allowed values are 0x00 to 0x0F
        bitOffset: 0
        bitWidth: 4
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_CMDREQ
    description: Message interface  command request
    addressOffset: 32
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: MESSNUM
        description: Message number 0x01 to 0x20 = Valid message numbers The message object in the message RAM is selected for data transfer. 0x00 = Not a valid message number. This value is interpreted as 0x20.[1] 0x21 to 0x3F = Not a valid message number. This value is interpreted as 0x01 - 0x1F.[1]
        bitOffset: 0
        bitWidth: 6
      - name: BUSY
        description: BUSY flag. Set to one by hardware when writing to this Command request register. Set to zero by hardware when read/write action to this Command request register has finished.
        bitOffset: 15
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_CMDMSK_W
    description: Message interface command mask (write direction)
    addressOffset: 36
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DATA_B
        description: Access data bytes 4-7
        enumeratedValues:
          - name: TRANSFER_DATA
            description: Transfer data bytes 4-7 to message object.
            value: 1
          - name: UNCHANGED
            description: data bytes 4-7 unchanged.
            value: 0
        bitOffset: 0
        bitWidth: 1
      - name: DATA_A
        description: Access data bytes 0-3
        enumeratedValues:
          - name: TRANSFER_DATA
            description: Transfer data bytes 0-3 to message object.
            value: 1
          - name: UNCHANGED
            description: data bytes 0-3 unchanged.
            value: 0
        bitOffset: 1
        bitWidth: 1
      - name: TXRQST
        description: Access transmission request bit
        enumeratedValues:
          - name: REQUEST_TRANSMISSION
            description: Request a transmission. Set the TXRQST bit IF1/2_MCTRL.
            value: 1
          - name: NO_TRANSMISSION
            description: No transmission request. TXRQSRT bit unchanged in IF1/2_MCTRL. If a transmission is requested by programming this bit, the TXRQST bit in the CANIFn_MCTRL register is ignored.
            value: 0
        bitOffset: 2
        bitWidth: 1
      - name: CLRINTPND
        description: This bit is ignored in the write direction.
        bitOffset: 3
        bitWidth: 1
      - name: CTRL
        description: Access control bits
        enumeratedValues:
          - name: TRANSFER_CONTROL
            description: Transfer control bits to message object
            value: 1
          - name: UNCHANGED
            description: Control bits unchanged.
            value: 0
        bitOffset: 4
        bitWidth: 1
      - name: ARB
        description: Access arbitration bits
        enumeratedValues:
          - name: TRANSFER_IDENTIFIER
            description: Transfer Identifier, DIR, XTD, and MSGVAL bits to message object.
            value: 1
          - name: UNCHANGED
            description: Arbitration bits unchanged.
            value: 0
        bitOffset: 5
        bitWidth: 1
      - name: MASK
        description: Access mask bits
        enumeratedValues:
          - name: TRANSFER_IDENTIFIER
            description: Transfer Identifier MASK + MDIR + MXTD to message object.
            value: 1
          - name: UNCHANGED
            description: Mask bits unchanged.
            value: 0
        bitOffset: 6
        bitWidth: 1
      - name: WR_RD
        description: Write transfer Transfer data from the selected message buffer registers to the message object addressed by the command request register CANIFn_CMDREQ.
        bitOffset: 7
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_CMDMSK_R
    description: Message interface  command mask (read direction)
    alternateRegister: IF%s_CMDMSK_W
    addressOffset: 36
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DATA_B
        description: Access data bytes 4-7
        enumeratedValues:
          - name: TRANSFER_DATA
            description: Transfer data bytes 4-7 to IFx message buffer register.
            value: 1
          - name: UNCHANGED
            description: data bytes 4-7 unchanged.
            value: 0
        bitOffset: 0
        bitWidth: 1
      - name: DATA_A
        description: Access data bytes 0-3
        enumeratedValues:
          - name: TRANSFER_DATA
            description: Transfer data bytes 0-3 to IFx message buffer.
            value: 1
          - name: UNCHANGED
            description: data bytes 0-3 unchanged.
            value: 0
        bitOffset: 1
        bitWidth: 1
      - name: NEWDAT
        description: Access new data bit
        enumeratedValues:
          - name: CLEAR
            description: Clear NEWDAT bit in the message object.
            value: 1
          - name: UNCHANGED
            description: NEWDAT bit remains unchanged. A read access to a message object can be combined with the reset of the control bits INTPND and NEWDAT in IF1/2_MCTRL. The values of these bits transferred to the IFx Message Control Register always reflect the status before resetting these bits.
            value: 0
        bitOffset: 2
        bitWidth: 1
      - name: CLRINTPND
        description: Clear interrupt pending bit.
        enumeratedValues:
          - name: CLEAR
            description: Clear INTPND bit in the message object.
            value: 1
          - name: UNCHANGED
            description: INTPND bit remains unchanged.
            value: 0
        bitOffset: 3
        bitWidth: 1
      - name: CTRL
        description: Access control bits
        enumeratedValues:
          - name: TRANSFER_CONTROL
            description: Transfer control bits to IFx message buffer.
            value: 1
          - name: UNCHANGED
            description: Control bits unchanged.
            value: 0
        bitOffset: 4
        bitWidth: 1
      - name: ARB
        description: Access arbitration bits
        enumeratedValues:
          - name: TRANSFER_IDENTIFIER
            description: Transfer Identifier, DIR, XTD, and MSGVAL bits to IFx message buffer register.
            value: 1
          - name: UNCHANGED
            description: Arbitration bits unchanged.
            value: 0
        bitOffset: 5
        bitWidth: 1
      - name: MASK
        description: Access mask bits
        enumeratedValues:
          - name: TRANSFER_IDENTIFIER
            description: Transfer Identifier MASK + MDIR + MXTD to IFx message buffer register.
            value: 1
          - name: UNCHANGED
            description: Mask bits unchanged.
            value: 0
        bitOffset: 6
        bitWidth: 1
      - name: WR_RD
        description: Read transfer Transfer data from the message object addressed by the command request register to the selected message buffer registers CANIFn_CMDREQ.
        bitOffset: 7
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_MSK1
    description: Message interface  mask 1
    addressOffset: 40
    access: read-write
    resetValue: 65535
    resetMask: 4294967295
    fields:
      - name: MSK15_0
        description: Identifier mask 0 = The corresponding bit in the identifier of the message can not inhibit the match in the acceptance filtering. 1 = The corresponding identifier bit is used for acceptance filtering.
        bitOffset: 0
        bitWidth: 16
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_MSK2
    description: Message interface 1 mask 2
    addressOffset: 44
    access: read-write
    resetValue: 65535
    resetMask: 4294967295
    fields:
      - name: MSK28_16
        description: Identifier mask 0 = The corresponding bit in the identifier of the message can not inhibit the match in the acceptance filtering. 1 = The corresponding identifier bit is used for acceptance filtering.
        bitOffset: 0
        bitWidth: 13
      - name: MDIR
        description: Mask message direction
        enumeratedValues:
          - name: MESSAGE_DIRECTION_BIT_DIR_USED
            description: The message direction bit (DIR) is used for acceptance filtering.
            value: 1
          - name: MESSAGE_DIRECTION_BIT_DIR_NO
            description: The message direction bit (DIR) has no effect on acceptance filtering.
            value: 0
        bitOffset: 14
        bitWidth: 1
      - name: MXTD
        description: Mask extend identifier
        enumeratedValues:
          - name: EXTENDED_IDENTIFIER_BIT_IDE_USED
            description: The extended identifier bit (IDE) is used for acceptance filtering.
            value: 1
          - name: EXTENDED_IDENTIFIER_BIT_IDE_NO
            description: The extended identifier bit (IDE) has no effect on acceptance filtering.
            value: 0
        bitOffset: 15
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_ARB1
    description: Message interface 1 arbitration 1
    addressOffset: 48
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ID15_0
        description: Message identifier  29-bit identifier (extended frame) 11-bit identifier (standard frame)
        bitOffset: 0
        bitWidth: 16
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_ARB2
    description: Message interface 1 arbitration 2
    addressOffset: 52
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ID28_16
        description: Message identifier  29-bit identifier (extended frame) 11-bit identifier (standard frame)
        bitOffset: 0
        bitWidth: 13
      - name: DIR
        description: Message direction
        enumeratedValues:
          - name: DIRECTION_EQ_TRANSMIT
            description: Direction = transmit. On TXRQST, the respective Message Object is transmitted as a Data Frame. On reception of a Remote Frame with matching identifier, the TXRQST bit of this Message Object is set (if RMTEN = one).
            value: 1
          - name: DIRECTION_RECEIVE
            description: Direction = receive. On TXRQST, a Remote Frame with the identifier of this Message Object is transmitted. On reception of a Data Frame with matching identifier, that message is stored in this Message Object.
            value: 0
        bitOffset: 13
        bitWidth: 1
      - name: XTD
        description: Extend identifier
        enumeratedValues:
          - name: BIT_EXTENDED
            description: The 29-bit extended identifier will be used for this message object.
            value: 1
          - name: BIT_STANDARD
            description: The 11-bit standard identifier will be used for this message object.
            value: 0
        bitOffset: 14
        bitWidth: 1
      - name: MSGVAL
        description: Message valid The CPU must reset the MSGVAL bit of all unused Messages Objects during the initialization before it resets bit INIT in the CAN Control Register. This bit must also be reset before the identifier ID28:0, the control bits XTD, DIR, or the Data Length Code DLC3:0 are modified, or if the Messages Object is no longer required.
        enumeratedValues:
          - name: MESSAGE_OBJECT_CONFIGURED
            description: The message object is configured and should be considered by the message handler.
            value: 1
          - name: MESSAGE_OBJECT_IGNORED
            description: The message object is ignored by the message handler.
            value: 0
        bitOffset: 15
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_MCTRL
    description: Message interface 1 message control
    addressOffset: 56
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DLC3_0
        description: Data length code The Data Length Code of a Message Object must be defined the same as in all the corresponding objects with the same identifier at other nodes. When the Message Handler stores a data frame, it will write the DLC to the value given by the received message. 0000 to 1000 = Data frame has 0 - 8 data bytes. 1001 to 1111 = Data frame has 8 data bytes.
        bitOffset: 0
        bitWidth: 4
      - name: EOB
        description: End of buffer
        enumeratedValues:
          - name: SINGLE_MESSAGE
            description: Single message object or last message object of a FIFO buffer.
            value: 1
          - name: MESSAGE_OBJECT
            description: Message object belongs to a FIFO buffer and is not the last message object of that FIFO buffer.
            value: 0
        bitOffset: 7
        bitWidth: 1
      - name: TXRQST
        description: Transmit request
        enumeratedValues:
          - name: REQUEST
            description: The transmission of this message object is requested and is not yet done
            value: 1
          - name: WAIT
            description: This message object is not waiting for transmission.
            value: 0
        bitOffset: 8
        bitWidth: 1
      - name: RMTEN
        description: Remote enable
        enumeratedValues:
          - name: TXRQSTSET
            description: At the reception of a remote frame, TXRQST is set.
            value: 1
          - name: UNCHANGED
            description: At the reception of a remote frame, TXRQST is left unchanged.
            value: 0
        bitOffset: 9
        bitWidth: 1
      - name: RXIE
        description: Receive interrupt enable
        enumeratedValues:
          - name: INTPNDSET
            description: INTPND will be set after successful reception of a frame.
            value: 1
          - name: UNCHANGED
            description: INTPND will be left unchanged after successful reception of a frame.
            value: 0
        bitOffset: 10
        bitWidth: 1
      - name: TXIE
        description: Transmit interrupt enable
        enumeratedValues:
          - name: INTPNDSET
            description: INTPND will be set after a successful reception of a frame.
            value: 1
          - name: UNCHANGED
            description: The INTPND bit will be left unchanged after a successful reception of a frame.
            value: 0
        bitOffset: 11
        bitWidth: 1
      - name: UMASK
        description: Use acceptance mask If UMASK is set to 1, the message object's mask bits have to be programmed during initialization of the message object before MAGVAL is set to 1.
        enumeratedValues:
          - name: USE_MASK
            description: Use mask (MSK[28:0], MXTD, and MDIR) for acceptance filtering.
            value: 1
          - name: MASK_IGNORED
            description: Mask ignored.
            value: 0
        bitOffset: 12
        bitWidth: 1
      - name: INTPND
        description: Interrupt pending
        enumeratedValues:
          - name: INTSOURCE
            description: This message object is the source of an interrupt. The Interrupt Identifier in the Interrupt Register will point to this message object if there is no other interrupt source with higher priority.
            value: 1
          - name: NOINTSOURCE
            description: This message object is not the source of an interrupt.
            value: 0
        bitOffset: 13
        bitWidth: 1
      - name: MSGLST
        description: Message lost (only valid for message objects in the direction receive).
        enumeratedValues:
          - name: MESSAGE_HANDLER
            description: The Message Handler stored a new message into this object when NEWDAT was still set, the CPU has lost a message.
            value: 1
          - name: NO_MESSAGE
            description: No message lost since this bit was reset last by the CPU.
            value: 0
        bitOffset: 14
        bitWidth: 1
      - name: NEWDAT
        description: New data
        enumeratedValues:
          - name: MESSAGE_HANDLER
            description: The message handler or the CPU has written new data into the data portion of this message object.
            value: 1
          - name: NO_NEW
            description: No new data has been written into the data portion of this message object by the message handler since this flag was cleared last by the CPU.
            value: 0
        bitOffset: 15
        bitWidth: 1
  - dim: 2
    dimIncrement: 96
    dimIndex: 1,2
    name: IF%s_DA1
    description: Message interface  data A1
    addressOffset: 60
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DATA0
