      - name: SPDCONF
        description: Mode Configuration
        bitOffset: 10
        bitWidth: 2
        enumeratedValues:
          - name: NORMAL
            description: The peripheral starts in Full-speed mode and performs a high-speed reset to switch to High-speed mode if the host is high-speed-capable.
            value: 0
          - name: LOW_POWER
            description: For a better consumption, if high speed is not needed.
            value: 1
          - name: HIGH_SPEED
            description: Forced high speed.
            value: 2
          - name: FORCED_FS
            description: The peripheral remains in Full-speed mode whatever the host speed capability.
            value: 3
      - name: LS
        description: Low-Speed Mode Force
        bitOffset: 12
        bitWidth: 1
