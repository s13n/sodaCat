# Created from ATSAMV71Q21B.svd (Rev 0)

name: MLB
version: 11287E
description: MediaLB
registers:
  - name: MLBC0
    description: MediaLB Control 0 Register
    addressOffset: 0
    size: 32
    fields:
      - name: MLBEN
        description: MediaLB Enable
        bitOffset: 0
        bitWidth: 1
      - name: MLBCLK
        description: MLBCLK (MediaLB clock) Speed Select
        bitOffset: 2
        bitWidth: 3
        enumeratedValues:
          - name: _256_FS
            description: 256xFs (for MLBPEN = 0)
            value: 0
          - name: _512_FS
            description: 512xFs (for MLBPEN = 0)
            value: 1
          - name: _1024_FS
            description: 1024xFs (for MLBPEN = 0)
            value: 2
      - name: ZERO
        description: Must be Written to 0
        bitOffset: 5
        bitWidth: 1
      - name: MLBLK
        description: MediaLB Lock Status (read-only)
        bitOffset: 7
        bitWidth: 1
      - name: ASYRETRY
        description: Asynchronous Tx Packet Retry
        bitOffset: 12
        bitWidth: 1
      - name: CTLRETRY
        description: Control Tx Packet Retry
        bitOffset: 14
        bitWidth: 1
      - name: FCNT
        description: The number of frames per sub-buffer for synchronous channels
        bitOffset: 15
        bitWidth: 3
        enumeratedValues:
          - name: _1_FRAME
            description: 1 frame per sub-buffer (Operation is the same as Standard mode.)
            value: 0
          - name: _2_FRAMES
            description: 2 frames per sub-buffer
            value: 1
          - name: _4_FRAMES
            description: 4 frames per sub-buffer
            value: 2
          - name: _8_FRAMES
            description: 8 frames per sub-buffer
            value: 3
          - name: _16_FRAMES
            description: 16 frames per sub-buffer
            value: 4
          - name: _32_FRAMES
            description: 32 frames per sub-buffer
            value: 5
          - name: _64_FRAMES
            description: 64 frames per sub-buffer
            value: 6
