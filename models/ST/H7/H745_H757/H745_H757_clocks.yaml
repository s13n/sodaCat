version: 1.0.0
family: STM32H7
devices:
  - STM32H745
  - STM32H747
  - STM32H755
  - STM32H757
documents:
  - id: RM0399
    title: STM32H745/755 and STM32H747/757 advanced Arm®-based 32-bit MCUs
    revision: '4'
    url: https://www.st.com/resource/en/reference_manual/rm0399-stm32h745755-and-stm32h747757-advanced-armbased-32bit-mcus-stmicroelectronics.pdf
instance: RCC

# ===========================================================================
# Signals
# ===========================================================================
signals:
  # --- Oscillators ---
  - name: hsi_osc
    description: High-speed internal RC oscillator raw output (before HSIDIV)
    nominal: 64000000
  - name: hsi_ck
    description: HSI clock after HSIDIV prescaler
    max: 64000000
  - name: hsi_ker_ck
    description: HSI kernel clock (same frequency as hsi_ck, gated by HSIKERON for Stop mode)
    max: 64000000
  - name: hse_ck
    description: High-speed external oscillator or clock input
    min: 4000000
    max: 48000000
  - name: csi_ck
    description: Low-power internal RC oscillator
    nominal: 4000000
  - name: csi_ker_ck
    description: CSI kernel clock (same frequency as csi_ck, gated by CSIKERON for Stop mode)
    nominal: 4000000
  - name: csi_ker_div122
    description: CSI kernel clock divided by 122 (for HDMI-CEC)
    nominal: 32786
  - name: lsi_ck
    description: Low-speed internal RC oscillator
    nominal: 32000
  - name: lse_ck
    description: Low-speed external crystal oscillator
    nominal: 32768
  - name: hsi48_ck
    description: 48 MHz internal RC oscillator (trimmable via CRS)
    nominal: 48000000

  # --- External inputs ---
  - name: I2S_CKIN
    description: External I2S clock input pin

  # --- PLL reference clocks ---
  - name: pll_src
    description: Common PLL source clock (before per-PLL prescalers)
  - name: ref1_ck
    description: PLL1 reference clock (after DIVM1 prescaler)
    min: 1000000
    max: 16000000
  - name: ref2_ck
    description: PLL2 reference clock (after DIVM2 prescaler)
    min: 1000000
    max: 16000000
  - name: ref3_ck
    description: PLL3 reference clock (after DIVM3 prescaler)
    min: 1000000
    max: 16000000

  # --- PLL VCO outputs ---
  - name: vco1_ck
    description: PLL1 VCO output
  - name: vco2_ck
    description: PLL2 VCO output
  - name: vco3_ck
    description: PLL3 VCO output

  # --- PLL post-divider outputs ---
  - name: pll1_p_raw
    description: PLL1 P divider output (system clock candidate) (before enable gate)
    max: 480000000
  - name: pll1_p_ck
    description: PLL1 P divider output (system clock candidate) (gated)
    max: 480000000
  - name: pll1_q_raw
    description: PLL1 Q divider output (before enable gate)
    max: 480000000
  - name: pll1_q_ck
    description: PLL1 Q divider output (gated)
    max: 480000000
  - name: pll1_r_raw
    description: PLL1 R divider output (before enable gate)
    max: 480000000
  - name: pll1_r_ck
    description: PLL1 R divider output (gated)
    max: 480000000
  - name: pll2_p_raw
    description: PLL2 P divider output (before enable gate)
    max: 480000000
  - name: pll2_p_ck
    description: PLL2 P divider output (gated)
    max: 480000000
  - name: pll2_q_raw
    description: PLL2 Q divider output (before enable gate)
    max: 480000000
  - name: pll2_q_ck
    description: PLL2 Q divider output (gated)
    max: 480000000
  - name: pll2_r_raw
    description: PLL2 R divider output (before enable gate)
    max: 480000000
  - name: pll2_r_ck
    description: PLL2 R divider output (gated)
    max: 480000000
  - name: pll3_p_raw
    description: PLL3 P divider output (before enable gate)
    max: 480000000
  - name: pll3_p_ck
    description: PLL3 P divider output (gated)
    max: 480000000
  - name: pll3_q_raw
    description: PLL3 Q divider output (before enable gate)
    max: 480000000
  - name: pll3_q_ck
    description: PLL3 Q divider output (gated)
    max: 480000000
  - name: pll3_r_raw
    description: PLL3 R divider output (before enable gate)
    max: 480000000
  - name: pll3_r_ck
    description: PLL3 R divider output (gated)
    max: 480000000

  # --- DSI PLL ---
  - name: dsi_ref_ck
    description: DSI PLL reference clock (HSE divided by IDF)
    min: 8000000
    max: 50000000
  - name: dsi_pll_ck
    description: DSI PLL output (internal VCO / 2, before ODF)
    min: 500000000
    max: 1000000000
  - name: dsi_phy_ck
    description: DSI D-PHY bit clock output (after ODF)
    min: 62500000
    max: 1000000000

  # --- System / domain clocks ---
  - name: sys_ck
    description: System clock
    max: 480000000
  - name: sys_d1cpre_ck
    description: D1 domain CPU prescaler output (CPU1 clock, rcc_c1_ck)
    max: 480000000
  - name: rcc_c2_ck
    description: CPU2 (Cortex-M4) clock, equal to rcc_hclk
    max: 240000000
  - name: rcc_hclk
    description: AHB / AXI bus clock (all domains, also rcc_hclk1/2/3/4 and rcc_aclk)
    max: 240000000
  - name: rcc_pclk1
    description: APB1 peripheral bus clock (D2 domain)
    max: 120000000
  - name: rcc_pclk2
    description: APB2 peripheral bus clock (D2 domain)
    max: 120000000
  - name: rcc_pclk3
    description: APB3 peripheral bus clock (D1 domain)
    max: 120000000
  - name: rcc_pclk4
    description: APB4 peripheral bus clock (D3 domain)
    max: 120000000

  # --- Timer clocks ---
  - name: rcc_timx_ker_ck
    description: Timer kernel clock for APB1 timers (TIM2-7, TIM12-14)
    max: 480000000
  - name: rcc_timy_ker_ck
    description: Timer kernel clock for APB2 timers (TIM1, TIM8, TIM15-17)
    max: 480000000
  - name: hrtim_ker_ck
    description: HRTIM kernel clock
    max: 480000000

  # --- Kernel clocks ---
  - name: per_ck
    description: Direct kernel clock for peripherals (hsi/csi/hse selectable)
  - name: sdmmc_ker_ck
    description: SDMMC1/2 kernel clock
  - name: quadspi_ker_ck
    description: QUADSPI kernel clock
  - name: fmc_ker_ck
    description: FMC kernel clock
  - name: fdcan_ker_ck
    description: FDCAN kernel clock
  - name: spi123_ker_ck
    description: SPI/I2S 1,2,3 kernel clock
  - name: spi45_ker_ck
    description: SPI 4,5 kernel clock
  - name: spi6_ker_ck
    description: SPI6 kernel clock
  - name: sai1_ker_ck
    description: SAI1 and DFSDM1 audio kernel clock
  - name: sai23_ker_ck
    description: SAI2/3 kernel clock
  - name: sai4a_ker_ck
    description: SAI4 sub-block A kernel clock
  - name: sai4b_ker_ck
    description: SAI4 sub-block B kernel clock
  - name: usart16_ker_ck
    description: USART1/6 kernel clock
  - name: usart234578_ker_ck
    description: USART2/3, UART4/5/7/8 kernel clock
  - name: lpuart1_ker_ck
    description: LPUART1 kernel clock
  - name: i2c123_ker_ck
    description: I2C1/2/3 kernel clock
  - name: i2c4_ker_ck
    description: I2C4 kernel clock
  - name: lptim1_ker_ck
    description: LPTIM1 kernel clock
  - name: lptim2_ker_ck
    description: LPTIM2 kernel clock
  - name: lptim345_ker_ck
    description: LPTIM3/4/5 kernel clock
  - name: usb_ker_ck
    description: USB1/2 OTG kernel clock
  - name: adc_ker_ck
    description: ADC1/2/3 kernel clock
  - name: rng_ker_ck
    description: RNG kernel clock
  - name: spdif_ker_ck
    description: SPDIFRX kernel clock
  - name: cec_ker_ck
    description: HDMI-CEC kernel clock
  - name: swpmi_ker_ck
    description: SWPMI kernel clock
  - name: dfsdm1_ker_ck
    description: DFSDM1 processing clock
  - name: dsi_ker_ck
    description: DSI byte lane clock

  # --- RTC ---
  - name: hse_rtc_ck
    description: HSE divided for RTC
  - name: rtc_pre
    description: RTC/AWU clock source (before enable gate)
  - name: rtc_ck
    description: RTC/AWU clock source (gated)

  # --- MCO outputs ---
  - name: mco1
    description: Microcontroller clock output 1
  - name: mco2
    description: Microcontroller clock output 2

