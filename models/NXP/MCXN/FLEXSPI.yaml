            description: Dummy read strobe that FlexSPI generates, looped back internally.
            value: 0
          - name: val1
            description: Dummy read strobe that FlexSPI generates, looped back from DQS pad.
            value: 1
          - name: val2
            description: SCLK output clock and looped back from SCLK pad
            value: 2
          - name: val3
            description: Flash-memory-provided read strobe and input from DQS pad
            value: 3
      - name: RX_CLK_SRC_DIFF
        description: Sample Clock Source Different
        bitOffset: 23
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: value0
            description: Use MCR0[RXCLKSRC] for Port A and Port B. MCR2[RXCLKSRC_B] is ignored and MCR0[RXCLKSRC] selects the Sample Clock source for Flash Reading of both ports A and B.
            value: 0
          - name: value1
            description: Use MCR0[RXCLKSRC] for Port A, and MCR2[RXCLKSRC_B] for Port B. MCR0[RXCLKSRC] selects the Sample Clock source for Flash Reading of port A (A_SCLK) and MCR2[RXCLKSRC_B] selects the Sample Clock source for Flash Reading of port B (B_SCLK).
            value: 1
