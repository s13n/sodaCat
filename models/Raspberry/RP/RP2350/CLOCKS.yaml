name: CLOCKS
source: RP2350 SVD v0.1
registers:
  - name: CLK_%s
    addressOffset: 0
    dim: 10
    dimIndex: "GPOUT0,GPOUT1,GPOUT2,GPOUT3,REF,SYS,PERI,HSTX,USB,ADC"
    dimIncrement: 12
    description: "Clock generator (CTRL/DIV/SELECTED, stride 12). Field availability\
      \ varies by instance: SRC present on REF [1:0] and SYS [0] only. AUXSRC is\
      \ 4-bit on GPOUT0-3, 3-bit on SYS/PERI/HSTX/USB/ADC, 2-bit on REF.\
      \ DC50 present on GPOUT0-3 only. KILL/ENABLE absent on REF and SYS.\
      \ PHASE/NUDGE present on GPOUT0-3, HSTX, USB, ADC; absent on REF, SYS, PERI.\
      \ ENABLED (read-only status) absent on REF and SYS.\
      \ DIV.FRAC present on GPOUT0-3 and SYS; absent on others.\
      \ DIV.INT always at [31:16]; effective width: 8-bit REF, 2-bit PERI/HSTX,\
      \ 4-bit USB/ADC, 16-bit GPOUT0-3/SYS.\
      \ GPOUT AUXSRC=5 is rosc_clksrc (undivided) for GPOUT0/1, rosc_clksrc_ph for GPOUT2/3."
    registers:
      - name: CTRL
        addressOffset: 0
        description: Clock control, can be changed on-the-fly (except for auxsrc)
        resetValue: 0
        fields:
          - name: SRC
            description: "Glitchless source mux. REF: [1:0] rosc_clksrc_ph/clksrc_clk_ref_aux/xosc_clksrc/lposc_clksrc.\
              \ SYS: [0] clk_ref/clksrc_clk_sys_aux. Reserved on all others."
            access: read-write
            bitOffset: 0
            bitWidth: 2
          - name: AUXSRC
            description: "Auxiliary source mux (glitchy when switching). Encoding is\
              \ per-instance; see datasheet."
            access: read-write
            bitOffset: 5
            bitWidth: 4
          - name: KILL
            description: Asynchronously kills the clock generator. Reserved on REF and SYS.
            access: read-write
            bitOffset: 10
            bitWidth: 1
          - name: ENABLE
            description: Starts and stops the clock generator cleanly. Reserved on REF and SYS.
            access: read-write
            bitOffset: 11
            bitWidth: 1
          - name: DC50
            description: Enables duty cycle correction for odd divisors. Present on GPOUT0-3 only.
            access: read-write
            bitOffset: 12
            bitWidth: 1
          - name: PHASE
            description: "Delays the enable signal by up to 3 cycles of the input clock.\
              \ Present on GPOUT0-3, HSTX, USB, ADC; absent on REF, SYS, PERI."
            access: read-write
            bitOffset: 16
            bitWidth: 2
          - name: NUDGE
            description: "An edge shifts the phase of the output by 1 cycle of the input clock.\
              \ Present on GPOUT0-3, HSTX, USB, ADC; absent on REF, SYS, PERI."
            access: read-write
            bitOffset: 20
            bitWidth: 1
          - name: ENABLED
            description: Clock generator is enabled (read-only status). Absent on REF and SYS.
            access: read-only
            bitOffset: 28
            bitWidth: 1
      - name: DIV
        addressOffset: 4
        description: "Clock divisor. FRAC present on GPOUT0-3 and SYS only.\
          \ INT always at [31:16]; effective width: 8-bit REF, 2-bit PERI/HSTX,\
          \ 4-bit USB/ADC, 16-bit GPOUT0-3/SYS."
        resetValue: 65536
        fields:
          - name: FRAC
            description: Fractional component of the divisor. Present on GPOUT0-3 and SYS; reserved on others.
            access: read-write
            bitOffset: 0
            bitWidth: 16
          - name: INT
            description: Integer part of clock divisor, 0 -> max+1, can be changed on-the-fly.
            access: read-write
            bitOffset: 16
            bitWidth: 16
      - name: SELECTED
        addressOffset: 8
        description: Indicates which src is currently selected (one-hot).
        resetValue: 1
        fields:
          - name: SELECTED
            description: "One-hot encoding of the currently active source. REF: 4-bit\
              \ (glitchless mux). SYS: 2-bit (glitchless mux). All others: hardwired 0x1."
            access: read-only
            bitOffset: 0
            bitWidth: 32
  - name: DFTCLK_XOSC_CTRL
    addressOffset: 120
    resetValue: 0
    fields:
      - name: SRC
        access: read-write
        enumeratedValues:
          - name: 'NULL'
            value: 0
          - name: clksrc_pll_usb_primary
            value: 1
          - name: clksrc_gpin0
            value: 2
        bitOffset: 0
        bitWidth: 2
  - name: DFTCLK_ROSC_CTRL
