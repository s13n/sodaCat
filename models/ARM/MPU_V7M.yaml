name: MPU_V7M
description: Memory Protection Unit (ARMv6-M / ARMv7-M)
source: ATSAMV71Q21B.svd (Cortex-M7), STM32L0x1.svd (Cortex-M0+); ARM Architecture Reference Manual
registers:
  - name: TYPE
    description: MPU Type Register
    addressOffset: 0
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SEPARATE
        description: "Indicates unified (0) or separate (1) instruction/data regions. Always 0 on M-profile."
        bitOffset: 0
        bitWidth: 1
      - name: DREGION
        description: Number of supported data regions
        bitOffset: 8
        bitWidth: 8
      - name: IREGION
        description: Number of supported instruction regions (always 0 on M-profile, unified)
        bitOffset: 16
        bitWidth: 8
  - name: CTRL
    description: MPU Control Register
    addressOffset: 4
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Enables the MPU
        bitOffset: 0
        bitWidth: 1
      - name: HFNMIENA
        description: Enable MPU during HardFault, NMI, and FAULTMASK handlers
        bitOffset: 1
        bitWidth: 1
      - name: PRIVDEFENA
        description: Enable default memory map as background region for privileged access
        bitOffset: 2
        bitWidth: 1
  - name: RNR
    description: Region Number Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        description: Selects the region referenced by RBAR and RASR
        bitOffset: 0
        bitWidth: 8
  - name: RBAR
    description: Region Base Address Register
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        description: Region number (overrides RNR when VALID=1)
        bitOffset: 0
        bitWidth: 4
      - name: VALID
        description: "If 1, REGION field overrides RNR for this access"
        bitOffset: 4
        bitWidth: 1
      - name: ADDR
        description: Region base address (aligned to region size)
        bitOffset: 5
        bitWidth: 27
  - name: RASR
    description: Region Attribute and Size Register
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Region enable
        bitOffset: 0
        bitWidth: 1
      - name: SIZE
        description: "Region size: actual size = 2^(SIZE+1) bytes. Minimum 5 (32 bytes)."
        bitOffset: 1
        bitWidth: 5
      - name: SRD
        description: Subregion disable bits (each bit disables 1/8th of the region)
        bitOffset: 8
        bitWidth: 8
      - name: B
        description: Bufferable attribute
        bitOffset: 16
        bitWidth: 1
      - name: C
        description: Cacheable attribute
        bitOffset: 17
        bitWidth: 1
      - name: S
        description: Shareable attribute
        bitOffset: 18
        bitWidth: 1
      - name: TEX
        description: Type extension field
        bitOffset: 19
        bitWidth: 3
      - name: AP
        description: "Access permission: 0=no access, 1=priv RW, 2=priv RW + user RO, 3=full, 5=priv RO, 6=priv+user RO"
        bitOffset: 24
        bitWidth: 3
      - name: XN
        description: Execute-never (instruction fetch disable)
        bitOffset: 28
        bitWidth: 1
  - name: RBAR_A1
    description: Region Base Address Register (alias 1, programs RNR+1)
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        bitOffset: 0
        bitWidth: 4
      - name: VALID
        bitOffset: 4
        bitWidth: 1
      - name: ADDR
        bitOffset: 5
        bitWidth: 27
  - name: RASR_A1
    description: Region Attribute and Size Register (alias 1)
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        bitOffset: 0
        bitWidth: 1
      - name: SIZE
        bitOffset: 1
        bitWidth: 5
      - name: SRD
        bitOffset: 8
        bitWidth: 8
      - name: B
        bitOffset: 16
        bitWidth: 1
      - name: C
        bitOffset: 17
        bitWidth: 1
      - name: S
        bitOffset: 18
        bitWidth: 1
      - name: TEX
        bitOffset: 19
        bitWidth: 3
      - name: AP
        bitOffset: 24
        bitWidth: 3
      - name: XN
        bitOffset: 28
        bitWidth: 1
  - name: RBAR_A2
    description: Region Base Address Register (alias 2, programs RNR+2)
    addressOffset: 28
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        bitOffset: 0
        bitWidth: 4
      - name: VALID
        bitOffset: 4
        bitWidth: 1
      - name: ADDR
        bitOffset: 5
        bitWidth: 27
  - name: RASR_A2
    description: Region Attribute and Size Register (alias 2)
    addressOffset: 32
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        bitOffset: 0
        bitWidth: 1
      - name: SIZE
        bitOffset: 1
        bitWidth: 5
      - name: SRD
        bitOffset: 8
        bitWidth: 8
      - name: B
        bitOffset: 16
        bitWidth: 1
      - name: C
        bitOffset: 17
        bitWidth: 1
      - name: S
        bitOffset: 18
        bitWidth: 1
      - name: TEX
        bitOffset: 19
        bitWidth: 3
      - name: AP
        bitOffset: 24
        bitWidth: 3
      - name: XN
        bitOffset: 28
        bitWidth: 1
  - name: RBAR_A3
    description: Region Base Address Register (alias 3, programs RNR+3)
    addressOffset: 36
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        bitOffset: 0
        bitWidth: 4
      - name: VALID
        bitOffset: 4
        bitWidth: 1
      - name: ADDR
        bitOffset: 5
        bitWidth: 27
  - name: RASR_A3
    description: Region Attribute and Size Register (alias 3)
    addressOffset: 40
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        bitOffset: 0
        bitWidth: 1
      - name: SIZE
        bitOffset: 1
        bitWidth: 5
      - name: SRD
        bitOffset: 8
        bitWidth: 8
      - name: B
        bitOffset: 16
        bitWidth: 1
      - name: C
        bitOffset: 17
        bitWidth: 1
      - name: S
        bitOffset: 18
        bitWidth: 1
      - name: TEX
        bitOffset: 19
        bitWidth: 3
      - name: AP
        bitOffset: 24
        bitWidth: 3
      - name: XN
        bitOffset: 28
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 44
    usage: registers
