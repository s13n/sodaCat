# ===========================================================================
# PLLs
# ===========================================================================
plls:
  - name: PLL0
    input: pll0_ref
    output: pll0_vco
    description: "PLL0 — VCO output 800 MHz..1.6 GHz.  FBDIV range 21..1023 (no offset).  Outputs 0..3 are produced by separate POSTDIVn dividers, each with its own OUTENn gate."
    feedback_integer:
      reg: PLL0FBDIV
      field: FBDIV
      instance: OSCCTRL
      value_range: { min: 21, max: 1023 }
    vco_limits: { min: 800000000, max: 1600000000 }

  - name: PLL1
    input: pll1_ref
    output: pll1_vco
    description: "PLL1 — same parameters as PLL0.  PLL1 outputs 0 and 2 also feed the FRACDIV0/FRACDIV1 fractional dividers."
    feedback_integer:
      reg: PLL1FBDIV
      field: FBDIV
      instance: OSCCTRL
      value_range: { min: 21, max: 1023 }
    vco_limits: { min: 800000000, max: 1600000000 }


# ===========================================================================
# Dividers
# ===========================================================================
dividers:
  # XOSC USBHS prescaler.
  - name: XOSC_USBHSDIV
    input: xosc
    output: xosc_usbhs
    description: "XOSC pre-divider supplying the USBHS PLL reference."
    factor:
      instance: OSCCTRL
      reg: XOSCCTRLA
      field: USBHSDIV

  # XOSC32K → 1.024 kHz fixed divide-by-32.
  - name: XOSC32K_TO_1K
    input: xosc32k
    output: xosc1k
    description: "32.768 kHz / 32 = 1.024 kHz."
    value: 32

  - name: OSCULP32K_TO_1K
    input: osculp32k
    output: osculp1k
    description: "32.768 kHz / 32 = 1.024 kHz (internal ULP)."
    value: 32

  # PLL reference dividers.  REFDIV: 1..63.
  - name: PLL0_REFDIV
    input: pll0_ref_pre
    output: pll0_ref
    factor:
      instance: OSCCTRL
      reg: PLL0REFDIV
      field: REFDIV
      value_range: { min: 1, max: 63 }
  - name: PLL1_REFDIV
    input: pll1_ref_pre
    output: pll1_ref
    factor:
      instance: OSCCTRL
      reg: PLL1REFDIV
      field: REFDIV
      value_range: { min: 1, max: 63 }

  # Per-output PLL post-dividers (4 per PLL).
  - { name: PLL0_POSTDIV0, input: pll0_vco, output: pll0_out0_div, factor: { instance: OSCCTRL, reg: PLL0POSTDIVA, field: POSTDIV0, value_range: { min: 1, max: 63 } } }
  - { name: PLL0_POSTDIV1, input: pll0_vco, output: pll0_out1_div, factor: { instance: OSCCTRL, reg: PLL0POSTDIVA, field: POSTDIV1, value_range: { min: 1, max: 63 } } }
  - { name: PLL0_POSTDIV2, input: pll0_vco, output: pll0_out2_div, factor: { instance: OSCCTRL, reg: PLL0POSTDIVA, field: POSTDIV2, value_range: { min: 1, max: 63 } } }
  - { name: PLL0_POSTDIV3, input: pll0_vco, output: pll0_out3_div, factor: { instance: OSCCTRL, reg: PLL0POSTDIVA, field: POSTDIV3, value_range: { min: 1, max: 63 } } }
  - { name: PLL1_POSTDIV0, input: pll1_vco, output: pll1_out0_div, factor: { instance: OSCCTRL, reg: PLL1POSTDIVA, field: POSTDIV0, value_range: { min: 1, max: 63 } } }
  - { name: PLL1_POSTDIV1, input: pll1_vco, output: pll1_out1_div, factor: { instance: OSCCTRL, reg: PLL1POSTDIVA, field: POSTDIV1, value_range: { min: 1, max: 63 } } }
  - { name: PLL1_POSTDIV2, input: pll1_vco, output: pll1_out2_div, factor: { instance: OSCCTRL, reg: PLL1POSTDIVA, field: POSTDIV2, value_range: { min: 1, max: 63 } } }
  - { name: PLL1_POSTDIV3, input: pll1_vco, output: pll1_out3_div, factor: { instance: OSCCTRL, reg: PLL1POSTDIVA, field: POSTDIV3, value_range: { min: 1, max: 63 } } }

  # Fractional dividers (FRACDIV0 fed by PLL1 output 0; FRACDIV1 fed by
  # PLL1 output 2).  Effective factor is INTDIV + REMDIV/512.
  - name: FRACDIV0
    input: pll1_out0
    output: fracdiv0_out
    description: "Fractional Divider 0 (PLL1 output 0): factor = INTDIV + REMDIV/512.  Documented integer range up to 32767."
    factor: { instance: OSCCTRL, reg: FRACDIV0, field: INTDIV }
    denominator: { instance: OSCCTRL, reg: FRACDIV0, field: REMDIV }
  - name: FRACDIV1
    input: pll1_out2
    output: fracdiv1_out
    description: "Fractional Divider 1 (PLL1 output 2): factor = INTDIV + REMDIV/512."
    factor: { instance: OSCCTRL, reg: FRACDIV1, field: INTDIV }
    denominator: { instance: OSCCTRL, reg: FRACDIV1, field: REMDIV }

  # GENCTRL[i].DIV — 16 generator dividers.  DIVSEL=0 → factor = DIV
  # (linear), DIVSEL=1 → factor = 2^(DIV+1) (power of 2).  The schema's
  # single `factor` field can't capture the DIVSEL split; modeled here as
  # the linear case (DIVSEL=0) which is the common configuration.
  - { name: GCLKGEN0_DIV,  input: gclkgen0_pre,  output: gclkgen0_div,  factor: { reg: 'GENCTRL[0]',  field: DIV } }
  - { name: GCLKGEN1_DIV,  input: gclkgen1_pre,  output: gclkgen1_div,  factor: { reg: 'GENCTRL[1]',  field: DIV } }
  - { name: GCLKGEN2_DIV,  input: gclkgen2_pre,  output: gclkgen2_div,  factor: { reg: 'GENCTRL[2]',  field: DIV } }
  - { name: GCLKGEN3_DIV,  input: gclkgen3_pre,  output: gclkgen3_div,  factor: { reg: 'GENCTRL[3]',  field: DIV } }
  - { name: GCLKGEN4_DIV,  input: gclkgen4_pre,  output: gclkgen4_div,  factor: { reg: 'GENCTRL[4]',  field: DIV } }
  - { name: GCLKGEN5_DIV,  input: gclkgen5_pre,  output: gclkgen5_div,  factor: { reg: 'GENCTRL[5]',  field: DIV } }
  - { name: GCLKGEN6_DIV,  input: gclkgen6_pre,  output: gclkgen6_div,  factor: { reg: 'GENCTRL[6]',  field: DIV } }
  - { name: GCLKGEN7_DIV,  input: gclkgen7_pre,  output: gclkgen7_div,  factor: { reg: 'GENCTRL[7]',  field: DIV } }
  - { name: GCLKGEN8_DIV,  input: gclkgen8_pre,  output: gclkgen8_div,  factor: { reg: 'GENCTRL[8]',  field: DIV } }
  - { name: GCLKGEN9_DIV,  input: gclkgen9_pre,  output: gclkgen9_div,  factor: { reg: 'GENCTRL[9]',  field: DIV } }
  - { name: GCLKGEN10_DIV, input: gclkgen10_pre, output: gclkgen10_div, factor: { reg: 'GENCTRL[10]', field: DIV } }
  - { name: GCLKGEN11_DIV, input: gclkgen11_pre, output: gclkgen11_div, factor: { reg: 'GENCTRL[11]', field: DIV } }
  - { name: GCLKGEN12_DIV, input: gclkgen12_pre, output: gclkgen12_div, factor: { reg: 'GENCTRL[12]', field: DIV } }
  - { name: GCLKGEN13_DIV, input: gclkgen13_pre, output: gclkgen13_div, factor: { reg: 'GENCTRL[13]', field: DIV } }
  - { name: GCLKGEN14_DIV, input: gclkgen14_pre, output: gclkgen14_div, factor: { reg: 'GENCTRL[14]', field: DIV } }
  - { name: GCLKGEN15_DIV, input: gclkgen15_pre, output: gclkgen15_div, factor: { reg: 'GENCTRL[15]', field: DIV } }

  # MCLK CPU and BUP dividers.
  - name: CPUDIV
    input: clk_main
    output: clk_cpu
    description: "CPU clock domain divider (8-bit prescaler, 1..128 in powers of 2)."
    factor:
      instance: MCLK
      reg: 'CLKDIV[0]'
      field: DIV
  - name: BUPDIV
    input: clk_main
    output: clk_bup
    description: "Backup clock domain divider (same encoding as CPUDIV)."
    factor:
      instance: MCLK
      reg: 'CLKDIV[1]'
      field: DIV


