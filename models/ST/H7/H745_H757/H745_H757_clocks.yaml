# ===========================================================================
# PLLs
# ===========================================================================
plls:
  - name: PLL1
    description: Main system PLL (fractional-N)
    input: ref1_ck
    output: vco1_ck
    feedback_integer:
      reg: PLL1DIVR
      field: DIVN1
      value_range:
        min: 3
        max: 511
        offset: 1
    feedback_fraction:
      reg: PLL1FRACR
      field: FRACN1
      value_range:
        min: 0
        max: 8191
    vco_limits:
      min: 150000000
      max: 960000000
    notes: 'Wide VCO (VCOH): 192-960 MHz; Medium VCO (VCOL): 150-420 MHz. Selected by PLL1VCOSEL in RCC_PLLCFGR.'

  - name: PLL2
    description: Auxiliary PLL 2 (fractional-N)
    input: ref2_ck
    output: vco2_ck
    feedback_integer:
      reg: PLL2DIVR
      field: DIVN2
      value_range:
        min: 3
        max: 511
        offset: 1
    feedback_fraction:
      reg: PLL2FRACR
      field: FRACN2
      value_range:
        min: 0
        max: 8191
    vco_limits:
      min: 150000000
      max: 960000000

  - name: PLL3
    description: Auxiliary PLL 3 (fractional-N)
    input: ref3_ck
    output: vco3_ck
    feedback_integer:
      reg: PLL3DIVR
      field: DIVN3
      value_range:
        min: 3
        max: 511
        offset: 1
    feedback_fraction:
      reg: PLL3FRACR
      field: FRACN3
      value_range:
        min: 0
        max: 8191
    vco_limits:
      min: 150000000
      max: 960000000

  - name: DSI_PLL
    description: DSI D-PHY PLL (integer-N, in DSI peripheral block)
    input: dsi_ref_ck
    output: dsi_pll_ck
    feedback_integer:
      instance: DSIHOST
      reg: WRPCR
      field: NDIV
      value_range:
        min: 10
        max: 125
    vco_limits:
      min: 500000000
      max: 1000000000
    notes: >-
      Internal VCO runs at 1-2 GHz. A fixed /2 divider inside the feedback loop
      means the PLL locks at VCO/2 = ref * NDIV. The vco_limits here reflect the
      VCO/2 node (500 MHz - 1 GHz). The ODF output divider is modeled separately.

# ===========================================================================
# Dividers
# ===========================================================================
dividers:
  # --- HSI divider ---
  - name: HSIDIV
    description: HSI oscillator prescaler
    input: hsi_osc
    output: hsi_ck
    factor:
      reg: CR
      field: HSIDIV
      values: [1, 2, 4, 8]

  # --- CEC fixed divider ---
  - name: CSI_CEC_DIV
    description: Fixed /122 divider for HDMI-CEC from CSI kernel clock
    input: csi_ker_ck
    output: csi_ker_div122
    value: 122

  # --- PLL input prescalers ---
  - name: DIVM1
    description: PLL1 prescaler (division factor for PLL1 reference clock)
    input: pll_src
    output: ref1_ck
    factor:
      reg: PLLCKSELR
      field: DIVM1
      value_range:
        min: 0
        max: 63
    notes: Value 0 disables the prescaler (no clock). Values 1-63 divide by that amount.

  - name: DIVM2
    description: PLL2 prescaler (division factor for PLL2 reference clock)
    input: pll_src
    output: ref2_ck
    factor:
      reg: PLLCKSELR
      field: DIVM2
      value_range:
        min: 0
        max: 63

  - name: DIVM3
    description: PLL3 prescaler (division factor for PLL3 reference clock)
    input: pll_src
    output: ref3_ck
    factor:
      reg: PLLCKSELR
      field: DIVM3
      value_range:
        min: 0
        max: 63

  # --- PLL output dividers ---
  - name: DIVP1
    description: PLL1 P output divider
    input: vco1_ck
    output: pll1_p_raw
    factor:
      reg: PLL1DIVR
      field: DIVP1
      value_range:
        min: 0
        max: 127
        offset: 1
    notes: Odd division factors not allowed for PLL1 P output

  - name: DIVQ1
    description: PLL1 Q output divider
    input: vco1_ck
    output: pll1_q_raw
    factor:
      reg: PLL1DIVR
      field: DIVQ1
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVR1
    description: PLL1 R output divider
    input: vco1_ck
    output: pll1_r_raw
    factor:
      reg: PLL1DIVR
      field: DIVR1
      value_range:
        min: 1
        max: 127
        offset: 1
    notes: Field value 0 is not allowed

  - name: DIVP2
    description: PLL2 P output divider
    input: vco2_ck
    output: pll2_p_raw
    factor:
      reg: PLL2DIVR
      field: DIVP2
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVQ2
    description: PLL2 Q output divider
    input: vco2_ck
    output: pll2_q_raw
    factor:
      reg: PLL2DIVR
      field: DIVQ2
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVR2
    description: PLL2 R output divider
    input: vco2_ck
    output: pll2_r_raw
    factor:
      reg: PLL2DIVR
      field: DIVR2
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVP3
    description: PLL3 P output divider
    input: vco3_ck
    output: pll3_p_raw
    factor:
      reg: PLL3DIVR
      field: DIVP3
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVQ3
    description: PLL3 Q output divider
    input: vco3_ck
    output: pll3_q_raw
    factor:
      reg: PLL3DIVR
      field: DIVQ3
      value_range:
        min: 0
        max: 127
        offset: 1

  - name: DIVR3
    description: PLL3 R output divider
    input: vco3_ck
    output: pll3_r_raw
    factor:
      reg: PLL3DIVR
      field: DIVR3
      value_range:
        min: 0
        max: 127
        offset: 1

  # --- DSI PLL dividers ---
  - name: DSI_IDF
    description: DSI PLL input division factor
    input: hse_ck
    output: dsi_ref_ck
    factor:
      instance: DSIHOST
      reg: WRPCR
      field: IDF
      values: [1, 1, 2, 3, 4, 5, 6, 7]
    notes: Both 0 and 1 encode divide-by-1

  - name: DSI_ODF
    description: DSI PLL output division factor
    input: dsi_pll_ck
    output: dsi_phy_ck
    factor:
      instance: DSIHOST
      reg: WRPCR
      field: ODF
      values: [1, 2, 4, 8]

  # --- Domain prescalers ---
  - name: D1CPRE
    description: D1 domain CPU clock prescaler (sys_ck to CPU1)
    input: sys_ck
    output: sys_d1cpre_ck
    factor:
      reg: D1CFGR
      field: D1CPRE
      values: [1, 1, 1, 1, 1, 1, 1, 1, 2, 4, 8, 16, 64, 128, 256, 512]

  - name: HPRE
    description: AHB prescaler (sys_d1cpre_ck to AHB/AXI buses)
    input: sys_d1cpre_ck
    output: rcc_hclk
    factor:
      reg: D1CFGR
      field: HPRE
      values: [1, 1, 1, 1, 1, 1, 1, 1, 2, 4, 8, 16, 64, 128, 256, 512]

  - name: D1PPRE
    description: D1 domain APB3 prescaler
    input: rcc_hclk
    output: rcc_pclk3
    factor:
      reg: D1CFGR
      field: D1PPRE
      values: [1, 1, 1, 1, 2, 4, 8, 16]

  - name: D2PPRE1
    description: D2 domain APB1 prescaler
    input: rcc_hclk
    output: rcc_pclk1
    factor:
      reg: D2CFGR
      field: D2PPRE1
      values: [1, 1, 1, 1, 2, 4, 8, 16]

  - name: D2PPRE2
    description: D2 domain APB2 prescaler
    input: rcc_hclk
    output: rcc_pclk2
    factor:
      reg: D2CFGR
      field: D2PPRE2
      values: [1, 1, 1, 1, 2, 4, 8, 16]

  - name: D3PPRE
    description: D3 domain APB4 prescaler
    input: rcc_hclk
    output: rcc_pclk4
    factor:
      reg: D3CFGR
      field: D3PPRE
      values: [1, 1, 1, 1, 2, 4, 8, 16]

  # --- Timer clock prescalers ---
  - name: TIMX_PRESCALER
    description: APB1 timer clock prescaler from HCLK
    input: rcc_hclk
    output: rcc_timx_ker_ck
    notes: >-
      The timer clock divisor from rcc_hclk depends on BOTH the D2PPRE1 APB
      prescaler and the TIMPRE bit (RCC_CFGR bit 15). With TIMPRE=0: divisor =
      max(1, D2PPRE1_ratio / 2). With TIMPRE=1: divisor = max(1, D2PPRE1_ratio / 4).
      The result is always >= rcc_pclk1 and <= rcc_hclk. This conditional logic
      cannot be expressed with a single register field.

  - name: TIMY_PRESCALER
    description: APB2 timer clock prescaler from HCLK
    input: rcc_hclk
    output: rcc_timy_ker_ck
    notes: >-
      Same logic as TIMX_PRESCALER but using D2PPRE2 instead of D2PPRE1.
      With TIMPRE=0: divisor = max(1, D2PPRE2_ratio / 2). With TIMPRE=1:
      divisor = max(1, D2PPRE2_ratio / 4).

  # --- HSE division for RTC ---
  - name: RTCPRE
    description: HSE division factor for RTC clock
    input: hse_ck
    output: hse_rtc_ck
    factor:
      reg: CFGR
      field: RTCPRE
      value_range:
        min: 0
        max: 63
    notes: Values 0 and 1 produce no clock. Values 2-63 divide HSE by that amount.

# ===========================================================================
# Gates
# ===========================================================================
gates:
  # --- HSI/CSI kernel clock gates ---
  - name: HSIKERON
    description: HSI kernel clock enable for Stop mode
    input: hsi_ck
    output: hsi_ker_ck
    control:
      reg: CR
      field: HSIKERON

  - name: CSIKERON
    description: CSI kernel clock enable for Stop mode
    input: csi_ck
    output: csi_ker_ck
    control:
      reg: CR
      field: CSIKERON

  # --- CPU2 clock (always-on, rcc_hclk with different name) ---
  - name: C2_CLK
    description: CPU2 (Cortex-M4) clock, always equal to rcc_hclk
    input: rcc_hclk
    output: rcc_c2_ck

  # --- PLL output enable gates ---
  - name: DIVP1EN
    description: PLL1 P output enable
    input: pll1_p_raw
    output: pll1_p_ck
    control:
      reg: PLLCFGR
