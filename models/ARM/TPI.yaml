name: TPI
description: Trace Port Interface Unit (CMSIS TPI_Type)
source: ARM CoreSight TPIU Technical Reference Manual; ARMv7-M DDI 0403; ARMv8-M DDI 0553
qemu: stub (registers read as 0; no trace output)
registers:
  - name: SSPSR
    description: Supported Parallel Port Sizes Register
    addressOffset: 0
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SWIDTH
        description: "Bit N=1 indicates (N+1)-bit port width supported; bit 0 always set (1-bit SWO)"
        bitOffset: 0
        bitWidth: 32
  - name: CSPSR
    description: Current Parallel Port Size Register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 1
    fields:
      - name: CWIDTH
        description: "One-hot: bit N=1 selects (N+1)-bit port width"
        bitOffset: 0
        bitWidth: 32
  - name: ACPR
    description: Asynchronous Clock Prescaler Register
    addressOffset: 0x10
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: PRESCALER
        description: "Divisor for SWO baud rate: SWO freq = trace clock / (PRESCALER + 1)"
        bitOffset: 0
        bitWidth: 13
  - name: SPPR
    description: Selected Pin Protocol Register
    addressOffset: 0xF0
    size: 32
    access: read-write
    resetValue: 1
    fields:
      - name: TXMODE
        description: "Pin protocol: 0=parallel trace port, 1=SWO Manchester, 2=SWO NRZ/UART"
        bitOffset: 0
        bitWidth: 2
  - name: FFSR
    description: Formatter and Flush Status Register
    addressOffset: 0x300
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: FlInProg
        description: Flush in progress
        bitOffset: 0
        bitWidth: 1
      - name: FtStopped
        description: Formatter stopped
        bitOffset: 1
        bitWidth: 1
      - name: TCPresent
        description: Trigger counter present
        bitOffset: 2
        bitWidth: 1
      - name: FtNonStop
        description: Formatter cannot be stopped
        bitOffset: 3
        bitWidth: 1
  - name: FFCR
    description: Formatter and Flush Control Register
    addressOffset: 0x304
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: EnFCont
        description: Enable continuous formatting (embeds source IDs in trace stream)
        bitOffset: 1
        bitWidth: 1
      - name: TrigIn
        description: Trigger event observed (indicates a trigger on the trigger input)
        bitOffset: 8
        bitWidth: 1
  - name: PSCR
    description: Periodic Synchronization Control Register
    addressOffset: 0x308
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: PSCount
        description: "Periodic sync counter: sync packet every 2^PSCount bytes (0 disables)"
        bitOffset: 0
        bitWidth: 5
  # ---- Integration test registers (manufacturing/debug test only) ----
  - name: TRIGGER
    description: Trigger Register
    addressOffset: 0xEE8
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: TRIGGER
        description: Trigger input value
        bitOffset: 0
        bitWidth: 1
  - name: ITFTTD0
    description: Integration Test FIFO Test Data 0 Register
    addressOffset: 0xEEC
    size: 32
    access: read-only
    resetValue: 0
  - name: ITATBCTR2
    description: Integration Test ATB Control Register 2
    addressOffset: 0xEF0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: ATREADY
        description: ATB ready status
        bitOffset: 0
        bitWidth: 1
  - name: ITATBCTR0
    description: Integration Test ATB Control Register 0
    addressOffset: 0xEF8
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: ATVALID
        description: ATB valid status
        bitOffset: 0
        bitWidth: 1
  - name: ITFTTD1
    description: Integration Test FIFO Test Data 1 Register
    addressOffset: 0xEFC
    size: 32
    access: read-only
    resetValue: 0
  - name: ITCTRL
    description: Integration Mode Control Register
    addressOffset: 0xF00
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: Mode
        description: "0=normal operation, 1=integration test mode"
        bitOffset: 0
        bitWidth: 1
  # ---- CoreSight management registers ----
  - name: CLAIMSET
    description: Claim Tag Set Register
    addressOffset: 0xFA0
    size: 32
    access: read-write
    resetValue: 0x0F
    fields:
      - name: CLAIMSET
        description: "Read: current claim tags. Write: set claim tag bits."
        bitOffset: 0
        bitWidth: 4
  - name: CLAIMCLR
    description: Claim Tag Clear Register
    addressOffset: 0xFA4
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: CLAIMCLR
        description: "Read: current claim tags. Write: clear claim tag bits."
        bitOffset: 0
        bitWidth: 4
  - name: DEVID
    description: Device Configuration Register
    addressOffset: 0xFC8
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: AsynClkIn
        description: Asynchronous clocking supported
        bitOffset: 0
        bitWidth: 1
      - name: MinBufSz
        description: Minimum trace buffer size (implementation defined)
        bitOffset: 3
        bitWidth: 3
      - name: FIFOSZ
        description: FIFO size in words
        bitOffset: 6
        bitWidth: 3
      - name: PTINVALID
        description: "1=parallel trace port not supported (SWO only)"
        bitOffset: 9
        bitWidth: 1
      - name: MANCVALID
        description: "1=SWO Manchester encoding supported"
        bitOffset: 10
        bitWidth: 1
      - name: NRZVALID
        description: "1=SWO NRZ encoding supported"
        bitOffset: 11
        bitWidth: 1
  - name: DEVTYPE
    description: Device Type Identifier Register
    addressOffset: 0xFCC
    size: 32
    access: read-only
    resetValue: 0x11
    fields:
      - name: Major
        description: "Major type (1=trace sink)"
        bitOffset: 0
        bitWidth: 4
      - name: Sub
        description: "Sub type (1=TPIU connected to trace port)"
        bitOffset: 4
        bitWidth: 4
addressBlocks:
  - offset: 0
    size: 0xFD0
    usage: registers
