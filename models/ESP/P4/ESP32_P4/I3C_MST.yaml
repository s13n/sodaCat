        description: This bit is used to force scl_pullup_en
        bitOffset: 11
        bitWidth: 1
        access: read-write
      - name: REG_SCL_OE_FORCE_EN
        description: This bit is used to force scl_oe
        bitOffset: 12
        bitWidth: 1
        access: read-write
      - name: REG_SDA_PP_RD_PULLUP_EN
        description: NA
        bitOffset: 13
        bitWidth: 1
