          FLEXCOMM3: FLEXCOMM
          FLEXCOMM4: FLEXCOMM
          FLEXCOMM5: FLEXCOMM
          FLEXCOMM6: FLEXCOMM
          FLEXCOMM7: FLEXCOMM
          FLEXCOMM8: FLEXCOMM
          FLEXCOMM9: FLEXCOMM
          FLEXCOMM10: FLEXCOMM
