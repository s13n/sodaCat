name: SCnSCB
description: System Control Space registers not in SCB (CMSIS SCnSCB_Type)
source: ARM Architecture Reference Manual (ARMv7-M DDI 0403, ARMv8-M DDI 0553)
qemu: partial (ACTLR reads as 0; ICTR reflects configured interrupt count)
registers:
  - name: ICTR
    description: Interrupt Controller Type Register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: INTLINESNUM
        description: "Number of interrupt lines in groups of 32: 0=1-32, 1=33-64, ..., 15=481-496"
        bitOffset: 0
        bitWidth: 4
  - name: ACTLR
    description: Auxiliary Control Register (implementation-defined, fields vary by core)
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: ACTLR_CM3
    description: Auxiliary Control Register (Cortex-M3)
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DISMCYCINT
        description: Disables interruption of multi-cycle instructions
        bitOffset: 0
        bitWidth: 1
      - name: DISDEFWBUF
        description: Disables write buffer use during default memory map accesses
        bitOffset: 1
        bitWidth: 1
      - name: DISFOLD
        description: Disables IT folding
        bitOffset: 2
        bitWidth: 1
  - name: ACTLR_CM4
    description: Auxiliary Control Register (Cortex-M4)
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DISMCYCINT
        description: Disables interruption of multi-cycle instructions
        bitOffset: 0
        bitWidth: 1
      - name: DISDEFWBUF
        description: Disables write buffer use during default memory map accesses
        bitOffset: 1
        bitWidth: 1
      - name: DISFOLD
        description: Disables IT folding
        bitOffset: 2
        bitWidth: 1
      - name: DISOOFP
        description: Disables FP out-of-order execution
        bitOffset: 9
        bitWidth: 1
  - name: ACTLR_CM7
    description: Auxiliary Control Register (Cortex-M7)
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DISFOLD
        description: Disables dual-issue
        bitOffset: 2
        bitWidth: 1
      - name: FPEXCODIS
        description: Disables FPU exception output
        bitOffset: 10
        bitWidth: 1
      - name: DISRAMODE
        description: Disables dynamic read allocate mode for L1 data cache
        bitOffset: 11
        bitWidth: 1
      - name: DISITMATBFLUSH
        description: Disables ITM and DWT ATB flush
        bitOffset: 12
        bitWidth: 1
      - name: DISBTACREAD
        description: Disables BTAC read
        bitOffset: 13
        bitWidth: 1
      - name: DISBTACALLOC
        description: Disables BTAC allocate
        bitOffset: 14
        bitWidth: 1
      - name: DISCRITAXIRUR
        description: Disables critical AXI Read-Under-Read
        bitOffset: 15
        bitWidth: 1
  - name: ACTLR_CM33
    description: Auxiliary Control Register (Cortex-M33)
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DISMCYCINT
        description: Disables interruption of multi-cycle instructions
        bitOffset: 0
        bitWidth: 1
      - name: DISDEFWBUF
        description: Disables write buffer use during default memory map accesses
        bitOffset: 1
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 12
    usage: registers
