        description: Sample Clock Source for Flash Reading
        bitOffset: 4
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: val0
            description: Dummy Read strobe that FlexSPI generates, looped back internally
            value: 0
          - name: val1
            description: Dummy Read strobe that FlexSPI generates, looped back from DQS pad
            value: 1
          - name: val2
            description: SCLK output clock and looped back from SCLK pad
            value: 2
          - name: val3
            description: Flash-memory-provided read strobe and input from DQS pad
            value: 3
      - name: ARDFEN
        description: AHB Read Access to IP Receive FIFO Enable
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: AHB read access disabled. IP bus reads IP receive FIFO. AHB Bus read access to IP receive FIFO memory space produces bus error.
            value: 0
          - name: val1
            description: AHB read access enabled. AHB bus reads IP receive FIFO. IP Bus read access to IP receive FIFO memory space returns data zero and causes no bus error.
            value: 1
      - name: ATDFEN
        description: AHB Write Access to IP Transmit FIFO Enable
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: AHB write access disabled. IP bus writes to IP transmit FIFO. AHB bus write access to IP transmit FIFO memory space produces bus error.
            value: 0
          - name: val1
            description: AHB write access enabled. AHB bus writes to IP transmit FIFO. IP Bus write access to IP transmit FIFO memory space is ignored and causes no bus error.
            value: 1
      - name: SERCLKDIV
        description: Serial Root Clock Divider
        bitOffset: 8
