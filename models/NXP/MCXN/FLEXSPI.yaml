            description: AHB read burst start address alignment is limited when flash memory is accessed in parallel mode or flash is word-addressable.
            value: 0
          - name: val1
            description: AHB read burst start address alignment is not limited. FlexSPI fetches more data than the AHB burst requires for address alignment.
            value: 1
      - name: RESUMEDISABLE
