name: Flash
description: FLASH register block
groupName: FLASH
source: STM32C531 SVD v1.0.0
registers:
  - name: FLASH_ACR
    displayName: FLASH_ACR
    description: Each register is assigned a offset address and a reset value. In case of registers representing option byte value, the reset value is determined by the OBL process. In case of success the reset value is loaded from OB. In case of OBL failure, a highly restrictive default value is set.FLASH access control register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 39
    resetMask: 4293984255
    fields:
      - name: LATENCY
        description: Read latency
        bitOffset: 0
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: zero wait state used to read a word from non-volatile memory
            value: 0
          - name: B_0x1
            description: one wait state used to read a word from non-volatile memory
            value: 1
          - name: B_0x2
            description: two wait states used to read a word from non-volatile memory
            value: 2
          - name: B_0x7
            description: seven wait states used to read a word from non-volatile memory
            value: 7
          - name: B_0xF
            description: 15 wait states used to read from non-volatile memory
            value: 15
      - name: WRHIGHFREQ
        description: FLASH signal delay
        bitOffset: 4
        bitWidth: 2
        access: read-write
      - name: PRFTEN
        description: Prefetch enable
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: prefetch disabled
            value: 0
          - name: B_0x1
            description: prefetch enabled when latency is at least one wait-state
            value: 1
      - name: EMPTY
        description: Main Flash memory area empty (not reset by system reset)
        bitOffset: 16
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Boot address in Main Flash memory area programmed
            value: 0
          - name: B_0x1
            description: Boot address in Main Flash memory area empty
            value: 1
  - name: FLASH_KEYR
    displayName: FLASH_KEYR
    description: FLASH key register
    addressOffset: 4
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: KEY
        description: Non-volatile memoryconfiguration access unlock key
        bitOffset: 0
        bitWidth: 32
        access: write-only
  - name: FLASH_OPTKEYR
    displayName: FLASH_OPTKEYR
    description: FLASH option key register
    addressOffset: 12
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: OPTKEY
        description: FLASH option-byte control access unlock key
        bitOffset: 0
        bitWidth: 32
        access: write-only
  - name: FLASH_OPSR
    displayName: FLASH_OPSR
    description: FLASH operation status register
    addressOffset: 24
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: ADDR_OP
        description: Interrupted operation address
        bitOffset: 0
        bitWidth: 16
        access: read-only
      - name: DATA_OP
        description: Flash data area operation interrupted
        bitOffset: 21
        bitWidth: 1
        access: read-only
      - name: BK_OP
        description: Interrupted operation bank
        bitOffset: 22
        bitWidth: 1
        access: read-only
      - name: OTP_OP
        description: OTP operation interrupted
        bitOffset: 24
        bitWidth: 1
        access: read-only
      - name: CODE_OP
        description: Flash memory operation code
        bitOffset: 29
        bitWidth: 3
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No FLASH operation ongoing during previous reset
            value: 0
          - name: B_0x1
            description: Single write operation interrupted
            value: 1
          - name: B_0x3
            description: Page erase operation interrupted
            value: 3
          - name: B_0x4
            description: Bank erase operation interrupted
            value: 4
          - name: B_0x5
            description: Mass erase operation interrupted
            value: 5
          - name: B_0x6
            description: Option change operation interrupted
            value: 6
  - name: FLASH_OPTCR
    displayName: FLASH_OPTCR
    description: FLASH option control register
    addressOffset: 28
    size: 32
    access: read-write
    resetValue: 1
    resetMask: 268435455
    fields:
      - name: OPTLOCK
        description: FLASH_OPTCR lock option configuration bit
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: FLASH_OPTCR register unlocked
            value: 0
          - name: B_0x1
            description: FLASH_OPTCR register locked.
            value: 1
      - name: OPTSTRT
        description: Option-byte start change option configuration bit
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: SWAP_BANK
        description: Bank swapping option configuration bit
        bitOffset: 31
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Bank1 and bank2 not swapped
            value: 0
          - name: B_0x1
            description: Bank1 and bank2 swapped
            value: 1
  - name: FLASH_SR
    displayName: FLASH_SR
    description: FLASH status register
    addressOffset: 32
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967280
    fields:
      - name: BSY
        description: busy flag
        bitOffset: 0
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no programming, erase or option byte change operation being executed
            value: 0
          - name: B_0x1
            description: programming, erase or option byte change operation being executed
            value: 1
      - name: WBNE
        description: write buffer not empty flag
        bitOffset: 1
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: write buffer empty or full
            value: 0
          - name: B_0x1
            description: write buffer waiting data to complete
            value: 1
      - name: DBNE
        description: data buffer not empty flag
        bitOffset: 3
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: data buffer not used
            value: 0
          - name: B_0x1
            description: data buffer used, wait
            value: 1
      - name: OEMLOCK
        description: OEM lock
        bitOffset: 8
        bitWidth: 1
        access: read-only
      - name: BSLOCK
        description: BS lock
        bitOffset: 9
        bitWidth: 1
        access: read-only
      - name: EOP
        description: end of operation flag
        bitOffset: 16
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no operation completed
            value: 0
          - name: B_0x1
            description: a operation completed
            value: 1
      - name: WRPERR
        description: write protection error flag
        bitOffset: 17
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no write protection error occurred
            value: 0
          - name: B_0x1
            description: a write protection error occurred
            value: 1
      - name: PGSERR
        description: programming sequence error flag
        bitOffset: 18
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no sequence error occurred
            value: 0
          - name: B_0x1
            description: a sequence error occurred
            value: 1
      - name: STRBERR
        description: strobe error flag
        bitOffset: 19
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no strobe error occurred
            value: 0
          - name: B_0x1
            description: a strobe error occurred
            value: 1
      - name: INCERR
        description: Inconsistency error flag
        bitOffset: 20
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no inconsistency error occurs
            value: 0
          - name: B_0x1
            description: a inconsistency error occurs
            value: 1
      - name: OPTCHANGEERR
        description: Option-byte change error flag
        bitOffset: 23
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: no option-byte change errors occurred
            value: 0
          - name: B_0x1
            description: one or more errors occurred during an option-byte change operation.
            value: 1
  - name: FLASH_CR
    displayName: FLASH_CR
    description: FLASH control register
    addressOffset: 40
    size: 32
    access: read-write
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: LOCK
        description: configuration lock bit
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: FLASH_CR register unlocked
            value: 0
          - name: B_0x1
            description: FLASH_CR register locked
            value: 1
      - name: PG
        description: programming control bit
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: programming disabled
            value: 0
          - name: B_0x1
            description: programming enabled
            value: 1
      - name: PER
        description: page erase request
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: page erase not requested
            value: 0
          - name: B_0x1
            description: page erase requested
            value: 1
      - name: BER
        description: Bank erase request
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: bank erase not requested
            value: 0
          - name: B_0x1
            description: bank erase requested
            value: 1
      - name: FW
        description: write forcing control bit
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: STRT
        description: erase start control bit
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: PNB
        description: page erase selection number
        bitOffset: 6
        bitWidth: 7
        access: read-write
        enumeratedValues:
          - name: B_0x00
            description: Page 0 selected
            value: 0
          - name: B_0x01
            description: Page 1 selected
            value: 1
      - name: MER
        description: Mass erase request
        bitOffset: 15
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: mass erase not requested
            value: 0
          - name: B_0x1
            description: mass erase requested
            value: 1
      - name: EOPIE
        description: end of operation interrupt control bit
        bitOffset: 16
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt generated at the end of operation.
            value: 0
          - name: B_0x1
            description: interrupt enabled when at the end of operation
            value: 1
      - name: WRPERRIE
        description: write protection error interrupt enable bit
        bitOffset: 17
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt generated when a protection error occurs
            value: 0
          - name: B_0x1
            description: interrupt generated when a protection error occurs
            value: 1
      - name: PGSERRIE
        description: programming sequence error interrupt enable bit
        bitOffset: 18
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt generated when a sequence error occurs
            value: 0
          - name: B_0x1
            description: interrupt generated when sequence error occurs
            value: 1
      - name: STRBERRIE
        description: strobe error interrupt enable bit
        bitOffset: 19
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt generated when a strobe error occurs
            value: 0
          - name: B_0x1
            description: interrupt generated when strobe error occurs.
            value: 1
      - name: INCERRIE
        description: inconsistency error interrupt enable bit
        bitOffset: 20
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt generated when a inconsistency error occurs
            value: 0
          - name: B_0x1
            description: interrupt generated when a inconsistency error occurs.
            value: 1
      - name: OPTCHANGEERRIE
        description: Option-byte change error interrupt enable bit
        bitOffset: 23
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: no interrupt is generated when an error occurs during an option-byte change
            value: 0
          - name: B_0x1
            description: an interrupt is generated when and error occurs during an option-byte change.
            value: 1
      - name: EDATASEL
        description: EDATA erase selector bit
        bitOffset: 29
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Main flash page erase.
            value: 0
          - name: B_0x1
            description: Flash data area EDATA page erase.
            value: 1
      - name: BKSEL
        description: Bank selector bit
        bitOffset: 31
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Bank1 is selected for bank erase (BER)/page erase (PER)/interrupt enable.
            value: 0
          - name: B_0x1
            description: Bank2 is selected for BER/PER.
            value: 1
  - name: FLASH_CCR
    displayName: FLASH_CCR
    description: FLASH clear control register
    addressOffset: 48
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CLR_EOP
        description: EOP flag clear bit
        bitOffset: 16
        bitWidth: 1
        access: write-only
      - name: CLR_WRPERR
        description: WRPERR flag clear bit
        bitOffset: 17
        bitWidth: 1
        access: write-only
      - name: CLR_PGSERR
        description: PGSERR flag clear bit
        bitOffset: 18
        bitWidth: 1
        access: write-only
      - name: CLR_STRBERR
        description: STRBERR flag clear bit
        bitOffset: 19
        bitWidth: 1
        access: write-only
      - name: CLR_INCERR
        description: INCERR flag clear bit
        bitOffset: 20
        bitWidth: 1
        access: write-only
      - name: CLR_OPTCHANGEERR
        description: Clear the flag corresponding flag in FLASH_SR by writing this bit.
        bitOffset: 23
        bitWidth: 1
        access: write-only
  - name: FLASH_PRIVCFGR
    displayName: FLASH_PRIVCFGR
    description: FLASH privilege configuration register
    addressOffset: 60
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PRIV
        description: privilege attribute
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Access to registers is always granted.
            value: 0
          - name: B_0x1
            description: Access to registers is denied in case of unprivileged access.
            value: 1
  - name: FLASH_HDPEXTR
