name: EEPROM
description: EEPROM
groupName: EEPROM
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CMD
    description: Command register
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CMD
        description: Command. Read data shows the last command executed on the EEPROM. 110 = erase/program page All other values are reserved.
        bitOffset: 0
        bitWidth: 3
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 3
        bitWidth: 29
  - name: RWSTATE
    description: Read wait state register
    addressOffset: 8
    access: read-write
    resetValue: 2309
    resetMask: 4294967295
    fields:
      - name: RPHASE2
        description: Wait states 2 (minus 1 encoded). The number of system clock periods to meet the read operations TRPHASE2 duration.
        bitOffset: 0
        bitWidth: 8
      - name: RPHASE1
        description: Wait states 1 (minus 1 encoded). The number of system clock periods to meet a duration equal to TRPHASE1.
        bitOffset: 8
        bitWidth: 8
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 16
        bitWidth: 16
  - name: AUTOPROG
    description: Auto programming register
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: AUTOPROG
        description: 'Auto programming mode: 00 = auto programming off 01 = erase/program cycle is triggered after 1 word is written 10 = erase/program cycle is triggered after a write to AHB address ending with  ......1111100 (last word of a page)'
        bitOffset: 0
        bitWidth: 2
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 2
        bitWidth: 30
  - name: WSTATE
    description: Wait state register
    addressOffset: 16
    access: read-write
    resetValue: 132610
    resetMask: 4294967295
    fields:
      - name: PHASE3
        description: Wait states for phase 3 (minus 1 encoded). The number of system clock periods to meet a duration equal to TPHASE3.
        bitOffset: 0
        bitWidth: 8
      - name: PHASE2
        description: Wait states for phase 2 (minus 1 encoded). The number of system clock periods to meet a duration equal to TPHASE2.
        bitOffset: 8
        bitWidth: 8
      - name: PHASE1
        description: Wait states for phase 1 (minus 1 encoded). The number of system clock periods to meet a duration equal to TPHASE1.
        bitOffset: 16
        bitWidth: 8
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 24
        bitWidth: 7
      - name: LCK_PARWEP
        description: Lock timing parameters for write, erase and program operation  0 = WSTATE and CLKDIV registers have R/W access  1 = WSTATE and CLKDIV registers have R only access
        bitOffset: 31
        bitWidth: 1
  - name: CLKDIV
    description: Clock divider register
    addressOffset: 20
    access: read-write
    resetValue: 99
    resetMask: 4294967295
    fields:
      - name: CLKDIV
        description: Division factor (minus 1 encoded).
        bitOffset: 0
        bitWidth: 16
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 16
        bitWidth: 16
  - name: PWRDWN
    description: Power-down register
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PWRDWN
        description: Power down mode bit. 0 = not in power down mode. 1 = power down mode.
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 1
        bitWidth: 31
  - name: INTENCLR
    description: Interrupt enable clear
    addressOffset: 4056
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 0
        bitWidth: 2
      - name: PROG_CLR_EN
        description: Clear program operation finished interrupt enable bit for EEPROM. 0 = leave corresponding bit unchanged. 1 = clear corresponding bit.
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 3
        bitWidth: 29
  - name: INTENSET
    description: Interrupt enable set
    addressOffset: 4060
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 0
        bitWidth: 2
      - name: PROG_SET_EN
        description: Set program operation finished interrupt enable bit for EEPROM device 1. 0 = leave corresponding bit unchanged. 1 = set corresponding bit.
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 3
        bitWidth: 29
  - name: INTSTAT
    description: Interrupt status
    addressOffset: 4064
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 0
        bitWidth: 2
      - name: END_OF_PROG
        description: 'EEPROM program operation finished interrupt status bit. Bit is: - set when this operation has finished OR when one is written to the corresponding bit of the INTSTATSET register. - cleared when one is written to the corresponding bit of the INTSTATCLR register.'
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 3
        bitWidth: 29
  - name: INTEN
    description: Interrupt enable
    addressOffset: 4068
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 0
        bitWidth: 2
      - name: EE_PROG_DONE
        description: 'EEPROM program operation finished interrupt enable bit. Bit is: - set when one is written in the corresponding bit of the INTENSET register. - cleared when one is written to the corresponding bit of the INTENCLR register.'
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. The value read from a reserved bit is not defined.
        bitOffset: 3
        bitWidth: 29
  - name: INTSTATCLR
    description: Interrupt status clear
    addressOffset: 4072
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 0
        bitWidth: 2
      - name: PROG_CLR_ST
        description: Clear program operation finished interrupt status bit for EEPROM device. 0 = leave corresponding bit unchanged. 1 = clear corresponding bit.
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Read value is undefined, only zero should be written.
        bitOffset: 3
        bitWidth: 29
addressBlocks:
  - offset: 0
    size: 4095
    usage: registers
interrupts:
  - name: FLASH
