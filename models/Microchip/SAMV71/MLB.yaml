        bitWidth: 1
      - name: CRX_BREAK
        description: Control Rx Break Enable
        bitOffset: 26
        bitWidth: 1
      - name: CTX_DONE
        description: Control Tx Packet Done Enable
        bitOffset: 27
        bitWidth: 1
      - name: CTX_PE
        description: Control Tx Protocol Error Enable
        bitOffset: 28
        bitWidth: 1
      - name: CTX_BREAK
        description: Control Tx Break Enable
        bitOffset: 29
        bitWidth: 1
