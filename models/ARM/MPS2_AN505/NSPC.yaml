name: NSPC
description: IoT Kit Non-secure Privilege Controller
source: IOTKit_CM33.svd; ARM CoreLink SSE-200 TRM
qemu: none (not separately modeled)
registers:
  - name: AHBNSPPPC
    description: AHB Non-secure Privilege PPC Access Control
    addressOffset: 144
    size: 32
    access: read-write
    resetValue: 0
    dim: 4
    dimIncrement: 4
  - name: AHBNSPPPCEXP
    description: AHB Non-secure Privilege Expansion PPC Access Control
    addressOffset: 160
    size: 32
    access: read-write
    resetValue: 0
    dim: 4
    dimIncrement: 4
  - name: APBNSPPPC
    description: APB Non-secure Privilege PPC Access Control
    addressOffset: 176
    size: 32
    access: read-write
    resetValue: 0
    dim: 4
    dimIncrement: 4
  - name: APBNSPPPCEXP
    description: APB Non-secure Privilege Expansion PPC Access Control
    addressOffset: 192
    size: 32
    access: read-write
    resetValue: 0
    dim: 4
    dimIncrement: 4
addressBlocks:
  - offset: 144
    size: 64
    usage: registers
