name: CMSDK_Timer
description: ARM CMSDK APB Timer
source: IOTKit_CM33.svd; ARM CMSDK Technical Reference Manual
qemu: full (cmsdk-apb-timer; EXTIN input not modeled)
ipPedigree:
  designer: ARM
  ipName: CMSDK APB Timer
interrupts:
  - INTR
registers:
  - name: CTRL
    description: Control Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: ENABLE
        description: Enable the timer
        bitOffset: 0
        bitWidth: 1
      - name: EXTIN
        description: "Select external input as enable: 0=internal, 1=external"
        bitOffset: 1
        bitWidth: 1
      - name: EXTCLK
        description: "Select external clock: 0=PCLK, 1=external clock"
        bitOffset: 2
        bitWidth: 1
      - name: INTEN
        description: Enable timer interrupt
        bitOffset: 3
        bitWidth: 1
  - name: VALUE
    description: Current Value Register (down-counter)
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
  - name: RELOAD
    description: Reload Value Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
  - name: INTSTATUS
    description: Interrupt Status Register
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: INT
        description: Interrupt status (1 = counter reached 0)
        bitOffset: 0
        bitWidth: 1
  - name: INTCLEAR
    description: Interrupt Clear Register
    addressOffset: 12
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: INT
        description: Write 1 to clear interrupt
        bitOffset: 0
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 16
    usage: registers
