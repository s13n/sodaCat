name: PWR
description: PWR register block
groupName: PWR
source: STM32C531 SVD v1.0.0
registers:
  - name: PWR_PMCR
    displayName: PWR_PMCR
    description: PWR power mode control register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LPMS
        description: low-power mode selection
        bitOffset: 0
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Stop 0 mode when entering DeepSleep.
            value: 0
          - name: B_0x1
            description: Stop 1mode when entering DeepSleep..
            value: 1
          - name: B_0x2
            description: Standby mode when entering DeepSleep
            value: 2
      - name: CSSF
        description: Clear Standby and Stop flags (always read as 0)
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No effect
            value: 0
          - name: B_0x1
            description: STOPF and SBF flags cleared
            value: 1
      - name: FLPS
        description: Flash memory low-power mode in Stop mode
        bitOffset: 9
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Flash memory remains in normal mode when the system enters Stop mode (quickrestart time).
            value: 0
          - name: B_0x1
            description: Flash memory enters low-power mode when the system enters Stop mode(low-power consumption).
            value: 1
      - name: SRAM2_1_SO
        description: AHB SRAM2 block 1 shut-off in Stop mode
        bitOffset: 24
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: AHB RAM2 block 1 content is kept in Stop mode.
            value: 0
          - name: B_0x1
            description: AHB RAM2 block 1 content is lost in Stop mode.
            value: 1
      - name: SRAM2_2_SO
        description: AHB SRAM2 block 2 shut-off in Stop mode
        bitOffset: 25
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: AHB RAM2 block 2 content is kept in Stop mode.
            value: 0
          - name: B_0x1
            description: AHB RAM2 block 2 content is lost in Stop mode.
            value: 1
      - name: SRAM1SO
        description: AHB SRAM1 block 1shut-off in Stop mode
        bitOffset: 26
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: AHB RAM1 content is kept in Stop mode.
            value: 0
          - name: B_0x1
            description: AHB RAM1 content is lost in Stop mode.
            value: 1
  - name: PWR_PMSR
    displayName: PWR_PMSR
    description: PWR status register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: STOPF
        description: Stop flag
        bitOffset: 5
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: System has not been in Stop mode.
            value: 0
          - name: B_0x1
            description: System has been in Stop mode.
            value: 1
      - name: SBF
        description: System standby flag
        bitOffset: 6
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: System has not been in Standby mode.
            value: 0
          - name: B_0x1
            description: System has been in Standby mode.
            value: 1
  - name: PWR_RTCCR
    displayName: PWR_RTCCR
    description: PWR RTC domain control register
    addressOffset: 36
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DRTCP
        description: Disable RTC domain write protection
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Write access to backup domain disabled
            value: 0
          - name: B_0x1
            description: Write access to backup domain enabled
            value: 1
  - name: PWR_VMCR
    displayName: PWR_VMCR
    description: PWR voltage monitor control register
    addressOffset: 52
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PVDE
        description: PVD enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: PVD disabled
            value: 0
          - name: B_0x1
            description: PVD enabled
            value: 1
  - name: PWR_VMSR
    displayName: PWR_VMSR
    description: PWR voltage monitor status register
    addressOffset: 60
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4279238655
    fields:
      - name: PVDO
        description: programmable voltage detect output
        bitOffset: 22
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: Vless thansub>DDless than/sub> is equal or higher than the PVD threshold.
            value: 0
          - name: B_0x1
            description: Vless thansub>DDless than/sub> is lower than the PVD threshold.
            value: 1
  - name: PWR_WUSCR
    displayName: PWR_WUSCR
    description: PWR wake-up status clear register
    addressOffset: 64
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CWUF1
        description: clear wake-up pin flag for WUFx (x=5 to 1)
        bitOffset: 0
        bitWidth: 1
        access: write-only
        enumeratedValues:
          - name: B_0x0
            description: No effect
            value: 0
          - name: B_0x1
            description: Writing 1 clears the WUFx wake-up pin flag (bit is cleared to 0 by hardware).
            value: 1
      - name: CWUF2
        description: clear wake-up pin flag for WUFx (x=5 to 1)
        bitOffset: 1
        bitWidth: 1
        access: write-only
        enumeratedValues:
          - name: B_0x0
            description: No effect
            value: 0
          - name: B_0x1
            description: Writing 1 clears the WUFx wake-up pin flag (bit is cleared to 0 by hardware).
            value: 1
      - name: CWUF4
        description: clear wake-up pin flag for WUFx (x=5 to 1)
        bitOffset: 3
        bitWidth: 1
        access: write-only
        enumeratedValues:
          - name: B_0x0
            description: No effect
            value: 0
          - name: B_0x1
            description: Writing 1 clears the WUFx wake-up pin flag (bit is cleared to 0 by hardware).
            value: 1
      - name: CWUF5
        description: clear wake-up pin flag for WUFx (x=5 to 1)
        bitOffset: 4
        bitWidth: 1
        access: write-only
        enumeratedValues:
          - name: B_0x0
            description: No effect
            value: 0
          - name: B_0x1
            description: Writing 1 clears the WUFx wake-up pin flag (bit is cleared to 0 by hardware).
            value: 1
  - name: PWR_WUSR
    displayName: PWR_WUSR
    description: PWR wake-up status register
    addressOffset: 68
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: WUF1
        description: wake-up pin WUFx flag
        bitOffset: 0
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No wake-up event occurred.
            value: 0
          - name: B_0x1
            description: Wake-up event received from WUFx pin.
            value: 1
      - name: WUF2
        description: wake-up pin WUFx flag
        bitOffset: 1
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No wake-up event occurred.
            value: 0
          - name: B_0x1
            description: Wake-up event received from WUFx pin.
            value: 1
      - name: WUF4
        description: wake-up pin WUFx flag
        bitOffset: 3
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No wake-up event occurred.
            value: 0
          - name: B_0x1
            description: Wake-up event received from WUFx pin.
            value: 1
      - name: WUF5
        description: wake-up pin WUFx flag
        bitOffset: 4
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: No wake-up event occurred.
            value: 0
          - name: B_0x1
            description: Wake-up event received from WUFx pin.
            value: 1
  - name: PWR_WUCR
    displayName: PWR_WUCR
    description: PWR wake-up configuration register
    addressOffset: 72
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: WUPEN1
        description: Enable wake-up pin WKUPx (x=5to1)
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: An event on WUPx pin does not wake-up the system from Standby mode.
            value: 0
          - name: B_0x1
            description: A rising or falling edge on WUPx pin wakes up the system from Standby mode.
            value: 1
      - name: WUPEN2
        description: Enable wake-up pin WKUPx (x=5to1)
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: An event on WUPx pin does not wake-up the system from Standby mode.
            value: 0
          - name: B_0x1
            description: A rising or falling edge on WUPx pin wakes up the system from Standby mode.
            value: 1
      - name: WUPEN4
        description: Enable wake-up pin WKUPx (x=5to1)
        bitOffset: 3
