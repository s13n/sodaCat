name: SCC
description: MPS2+ System Configuration Controller (board configuration)
source: IOTKit_CM33.svd
qemu: partial (CFG registers, LEDs, DLL; no MCC or CPU_WAIT)
registers:
  - name: CFG_REG0
    description: Configuration Register 0
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: REMAP
        description: Memory remap
        bitOffset: 0
        bitWidth: 1
  - name: CFG_REG1
    description: Configuration Register 1 (LED control)
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: MCC_LED0
        description: MCC LED 0
        bitOffset: 0
        bitWidth: 1
      - name: MCC_LED1
        description: MCC LED 1
        bitOffset: 1
        bitWidth: 1
      - name: MCC_LED2
        description: MCC LED 2
        bitOffset: 2
        bitWidth: 1
      - name: MCC_LED3
        description: MCC LED 3
        bitOffset: 3
        bitWidth: 1
      - name: MCC_LED4
        description: MCC LED 4
        bitOffset: 4
        bitWidth: 1
      - name: MCC_LED5
        description: MCC LED 5
        bitOffset: 5
        bitWidth: 1
      - name: MCC_LED6
        description: MCC LED 6
        bitOffset: 6
        bitWidth: 1
      - name: MCC_LED7
        description: MCC LED 7
        bitOffset: 7
        bitWidth: 1
  - name: CFG_REG2
    description: Configuration Register 2
    addressOffset: 8
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: CFG_REG3
    description: Configuration Register 3 (switch state)
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: MCC_SWITCH0
        description: MCC switch 0
        bitOffset: 0
        bitWidth: 1
      - name: MCC_SWITCH1
        description: MCC switch 1
        bitOffset: 1
        bitWidth: 1
      - name: MCC_SWITCH2
        description: MCC switch 2
        bitOffset: 2
        bitWidth: 1
      - name: MCC_SWITCH3
        description: MCC switch 3
        bitOffset: 3
        bitWidth: 1
      - name: MCC_SWITCH4
        description: MCC switch 4
        bitOffset: 4
        bitWidth: 1
      - name: MCC_SWITCH5
        description: MCC switch 5
        bitOffset: 5
        bitWidth: 1
      - name: MCC_SWITCH6
        description: MCC switch 6
        bitOffset: 6
        bitWidth: 1
      - name: MCC_SWITCH7
        description: MCC switch 7
        bitOffset: 7
        bitWidth: 1
  - name: CFG_REG4
    description: Configuration Register 4 (board revision)
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: BRDREV
        description: Board revision
        bitOffset: 0
        bitWidth: 4
  - name: CFG_REG5
    description: Configuration Register 5
    addressOffset: 20
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DEBUG
        description: Debug mode enable
        bitOffset: 5
        bitWidth: 1
  - name: CFG_REG6
    description: Configuration Register 6
    addressOffset: 24
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: CFG_REG7
    description: Configuration Register 7
    addressOffset: 28
    size: 32
    access: read-only
    resetValue: 0
    fields: []
  - name: SYS_CFGDATA_RTN
    description: System Configuration Data Return
    addressOffset: 160
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: SYS_CFGDATA_OUT
    description: System Configuration Data Out
    addressOffset: 164
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: SYS_CFGCTRL
    description: System Configuration Control
    addressOffset: 168
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: DEVICE
        description: Device selector
        bitOffset: 0
        bitWidth: 12
      - name: RFUNCVAL
        description: Function value
        bitOffset: 20
        bitWidth: 6
      - name: RW_ACCESS
        description: "Read/write: 0=read, 1=write"
        bitOffset: 30
        bitWidth: 1
      - name: START
        description: Start configuration transfer
        bitOffset: 31
        bitWidth: 1
  - name: SYS_CFGSTAT
    description: System Configuration Status
    addressOffset: 172
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: COMPLETE
        description: Configuration transfer complete
        bitOffset: 0
        bitWidth: 1
      - name: ERROR
        description: Configuration transfer error
        bitOffset: 1
        bitWidth: 1
  - name: DLL
    description: DLL Lock Register
    addressOffset: 256
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: LOCKED
        description: DLL locked status
        bitOffset: 0
        bitWidth: 1
      - name: LOCK_UNLOCK
        description: Lock/unlock control
        bitOffset: 16
        bitWidth: 8
      - name: LOCKED_MASKED
        description: Locked status masked
        bitOffset: 24
        bitWidth: 8
  - name: AID
    description: Application ID Register
    addressOffset: 4088
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: NUM_CFG_REG
        description: Number of configuration registers
        bitOffset: 0
        bitWidth: 8
      - name: MPS2_REV
        description: MPS2 revision
        bitOffset: 20
        bitWidth: 4
      - name: FPGA_BUILD
        description: FPGA build number
        bitOffset: 24
        bitWidth: 8
  - name: ID
    description: Board/FPGA ID Register
    addressOffset: 4092
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: APP_REV
        description: Application note revision
        bitOffset: 0
        bitWidth: 4
      - name: PRI_NUM
        description: Primary number (Application Note number)
        bitOffset: 4
        bitWidth: 8
      - name: IP_ARCH
        description: IP architecture version
        bitOffset: 16
        bitWidth: 4
      - name: APP_NOTE_VAR
        description: Application Note variant
        bitOffset: 20
        bitWidth: 4
      - name: IMPLEMENTER_ID
        description: Implementer ID (0x41 = ARM)
        bitOffset: 24
        bitWidth: 8
addressBlocks:
  - offset: 0
    size: 4096
    usage: registers
