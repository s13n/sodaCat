        description: YCrCb Format Swap Mode
        bitOffset: 28
        bitWidth: 2
        enumeratedValues:
          - name: DEFAULT
            description: Byte 0 Cb(i)Byte 1 Y(i)Byte 2 Cr(i)Byte 3 Y(i+1)
            value: 0
          - name: MODE1
            description: Byte 0 Cr(i)Byte 1 Y(i)Byte 2 Cb(i)Byte 3 Y(i+1)
            value: 1
          - name: MODE2
            description: Byte 0 Y(i)Byte 1 Cb(i)Byte 2 Y(i+1)Byte 3 Cr(i)
            value: 2
          - name: MODE3
            description: Byte 0 Y(i)Byte 1 Cr(i)Byte 2 Y(i+1)Byte 3 Cb(i)
            value: 3
      - name: RGB_CFG
        description: RGB Pixel Mapping Configuration
        bitOffset: 30
        bitWidth: 2
        enumeratedValues:
          - name: DEFAULT
            description: Byte 0 R/G(MSB)Byte 1 G(LSB)/BByte 2 R/G(MSB)Byte 3 G(LSB)/B
            value: 0
          - name: MODE1
            description: Byte 0 B/G(MSB)Byte 1 G(LSB)/RByte 2 B/G(MSB)Byte 3 G(LSB)/R
            value: 1
          - name: MODE2
            description: Byte 0 G(LSB)/RByte 1 B/G(MSB)Byte 2 G(LSB)/RByte 3 B/G(MSB)
            value: 2
          - name: MODE3
            description: Byte 0 G(LSB)/BByte 1 R/G(MSB)Byte 2 G(LSB)/BByte 3 R/G(MSB)
            value: 3
