      - name: RF1N
        description: Receive FIFO 1 New Message
        bitOffset: 4
        bitWidth: 1
      - name: RF1W
        description: Receive FIFO 1 Watermark Reached
        bitOffset: 5
        bitWidth: 1
      - name: RF1F
        description: Receive FIFO 1 Full
        bitOffset: 6
        bitWidth: 1
      - name: RF1L
        description: Receive FIFO 1 Message Lost
        bitOffset: 7
        bitWidth: 1
      - name: HPM
        description: High Priority Message
        bitOffset: 8
        bitWidth: 1
      - name: TC
        description: Transmission Completed
        bitOffset: 9
        bitWidth: 1
      - name: TCF
        description: Transmission Cancellation Finished
        bitOffset: 10
        bitWidth: 1
      - name: TFE
        description: Tx FIFO Empty
        bitOffset: 11
        bitWidth: 1
      - name: TEFN
        description: Tx Event FIFO New Entry
        bitOffset: 12
        bitWidth: 1
      - name: TEFW
        description: Tx Event FIFO Watermark Reached
        bitOffset: 13
        bitWidth: 1
      - name: TEFF
        description: Tx Event FIFO Full
        bitOffset: 14
        bitWidth: 1
      - name: TEFL
        description: Tx Event FIFO Element Lost
        bitOffset: 15
        bitWidth: 1
      - name: TSW
        description: Timestamp Wraparound
        bitOffset: 16
        bitWidth: 1
      - name: MRAF
        description: Message RAM Access Failure
        bitOffset: 17
        bitWidth: 1
      - name: TOO
        description: Timeout Occurred
        bitOffset: 18
        bitWidth: 1
      - name: DRX
        description: Message stored to Dedicated Receive Buffer
        bitOffset: 19
        bitWidth: 1
      - name: ELO
        description: Error Logging Overflow
        bitOffset: 22
        bitWidth: 1
      - name: EP
        description: Error Passive
        bitOffset: 23
        bitWidth: 1
      - name: EW
        description: Warning Status
        bitOffset: 24
        bitWidth: 1
      - name: BO
        description: Bus_Off Status
        bitOffset: 25
        bitWidth: 1
      - name: WDI
        description: Watchdog Interrupt
        bitOffset: 26
        bitWidth: 1
      - name: PEA
        description: Protocol Error in Arbitration Phase
        bitOffset: 27
        bitWidth: 1
      - name: PED
        description: Protocol Error in Data Phase
        bitOffset: 28
        bitWidth: 1
      - name: ARA
        description: Access to Reserved Address
        bitOffset: 29
        bitWidth: 1
  - name: IE
    description: Interrupt Enable Register
    addressOffset: 84
