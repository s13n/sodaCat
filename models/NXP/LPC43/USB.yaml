name: USB
description: Host/Device/OTG controller
groupName: USB0
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CAPLENGTH
    description: Capability register length
    addressOffset: 256
    access: read-only
    resetValue: 16777280
    resetMask: 4294967295
    fields:
      - name: CAPLENGTH
        description: Indicates offset to add to the register base address at the beginning of the Operational Register
        bitOffset: 0
        bitWidth: 8
      - name: HCIVERSION
        description: BCD encoding of the EHCI revision number supported by this host controller.
        bitOffset: 8
        bitWidth: 16
      - name: RESERVED
        description: These bits are reserved and should be set to zero.
        bitOffset: 24
        bitWidth: 8
  - name: HCSPARAMS
    description: Host controller structural parameters
    addressOffset: 260
    access: read-only
    resetValue: 65553
    resetMask: 4294967295
    fields:
      - name: N_PORTS
        description: Number of downstream ports. This field specifies the number of physical downstream ports implemented on this host controller.
        bitOffset: 0
        bitWidth: 4
      - name: PPC
        description: Port Power Control. This field indicates whether the host controller implementation includes port power control.
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: These bits are reserved and should be set to zero.
        bitOffset: 5
        bitWidth: 3
      - name: N_PCC
        description: Number of Ports per Companion Controller. This field indicates the number of ports supported per internal Companion Controller.
        bitOffset: 8
        bitWidth: 4
      - name: N_CC
        description: Number of Companion Controller. This field indicates the number of companion controllers associated with this USB2.0 host controller.
        bitOffset: 12
        bitWidth: 4
      - name: PI
        description: Port indicators. This bit indicates whether the ports support port indicator control.
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: These bits are reserved and should be set to zero.
        bitOffset: 17
        bitWidth: 3
      - name: N_PTT
        description: Number of Ports per Transaction Translator. This field indicates the number of ports assigned to each transaction translator within the USB2.0 host controller.
        bitOffset: 20
        bitWidth: 4
      - name: N_TT
        description: Number of Transaction Translators. This field indicates the number of embedded transaction translators associated with the USB2.0 host controller.
        bitOffset: 24
        bitWidth: 4
      - name: RESERVED
        description: These bits are reserved and should be set to zero.
        bitOffset: 28
        bitWidth: 4
  - name: HCCPARAMS
    description: Host controller capability parameters
    addressOffset: 264
    access: read-only
    resetValue: 6
    resetMask: 4294967295
    fields:
      - name: ADC
        description: 64-bit Addressing Capability. If zero, no 64-bit addressing capability is supported.
        bitOffset: 0
        bitWidth: 1
      - name: PFL
        description: Programmable Frame List Flag. If set to one, then the system software can specify and use a smaller frame list and configure the host controller via the USBCMD register Frame List Size field. The frame list must always be aligned on a 4K-boundary. This requirement ensures that the frame list is always physically contiguous.
        bitOffset: 1
        bitWidth: 1
      - name: ASP
        description: Asynchronous Schedule Park Capability. If this bit is set to a one, then the host controller supports the park feature for high-speed queue heads in the Asynchronous Schedule.The feature can be disabled or enabled and set to a specific level by using the Asynchronous Schedule Park Mode Enable and Asynchronous Schedule Park Mode Count fields in the USBCMD register.
        bitOffset: 2
        bitWidth: 1
      - name: IST
        description: Isochronous Scheduling Threshold. This field indicates, relative to the current position of the executing host controller, where software can reliably update the isochronous schedule.
        bitOffset: 4
        bitWidth: 4
      - name: EECP
        description: EHCI Extended Capabilities Pointer. This optional field indicates the existence of a capabilities list.
        bitOffset: 8
        bitWidth: 8
      - name: RESERVED
        description: These bits are reserved and should be set to zero.
        bitOffset: 16
        bitWidth: 16
  - name: DCIVERSION
    description: Device interface version number
    addressOffset: 288
    access: read-only
    resetValue: 1
    resetMask: 4294967295
    fields:
      - name: DCIVERSION
        description: The device controller interface conforms to the two-byte BCD encoding of the interface version number contained in this register.
        bitOffset: 0
        bitWidth: 16
  - name: USBCMD_D
    description: Command (device mode)
    addressOffset: 320
    access: read-write
    resetValue: 524288
    resetMask: 4294967295
    fields:
      - name: RS
        description: Run/Stop
        enumeratedValues:
          - name: DETACH
            description: Writing a 0 to this bit will cause a detach event.
            value: 0
          - name: ATTACH
            description: Writing a one to this bit will cause the device controller to enable a pull-up on USB_DP and initiate an attach event. This control bit is not directly connected to the pull-up enable, as the pull-up will become disabled upon transitioning into high-speed mode. Software should use this bit to prevent an attach event before the device controller has been properly initialized.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: RST
        description: Controller reset. Software uses this bit to reset the controller. This bit is set to zero by the Host/Device Controller when the reset process is complete. Software cannot terminate the reset process early by writing a zero to this register.
        enumeratedValues:
          - name: RESETCOMPLETE
            description: Set to 0 by hardware when the reset process is complete.
            value: 0
          - name: RESET
            description: When software writes a one to this bit, the Device Controller resets its internal pipelines, timers, counters, state machines etc. to their initial values. Writing a one to this bit when the device is in the attached state is not recommended, since the effect on an attached host is undefined. In order to ensure that the device is not in an attached state before initiating a device controller reset, all primed endpoints should be flushed and the USBCMD Run/Stop bit should be set to 0.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 2
        bitWidth: 2
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode. Writing a one to this bit when the device mode is selected, will have undefined results.
        bitOffset: 6
        bitWidth: 1
      - name: RESERVED
        description: Reserved. These bits should be set to 0.
        bitOffset: 7
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 8
        bitWidth: 2
      - name: RESERVED
        description: Reserved.These bits should be set to 0.
        bitOffset: 10
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 11
        bitWidth: 1
      - name: RESERVED
        description: Reserved.These bits should be set to 0.
        bitOffset: 12
        bitWidth: 1
      - name: SUTW
        description: Setup trip wire  During handling a setup packet, this bit is used as a semaphore to ensure that the setup data payload of 8 bytes is extracted from a QH by the DCD without being corrupted. If the setup lockout mode is off (see USBMODE register) then there exists a hazard when new setup data arrives while the DCD is copying the setup data payload from the QH for a previous setup packet. This bit is set and cleared by software and will be cleared by hardware when a hazard exists. (See Section 18.10).
        bitOffset: 13
        bitWidth: 1
      - name: ATDTW
        description: Add dTD trip wire This bit is used as a semaphore to ensure the to proper addition of a new dTD to an active (primed) endpoint's linked list. This bit is set and cleared by software during the process of adding a new dTD. See also Section 18.10. This bit shall also be cleared by hardware when its state machine is hazard region for which adding a dTD to a primed endpoint may go unrecognized.
        bitOffset: 14
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 15
        bitWidth: 1
      - name: ITC
        description: Interrupt threshold control. The system software uses this field to set the maximum rate at which the host/device controller will issue interrupts. ITC contains the maximum interrupt interval measured in micro-frames. Valid values are shown below. All other values are reserved. 0x0 = Immediate (no threshold) 0x1 = 1 micro frame. 0x2 = 2 micro frames. 0x8 = 8 micro frames. 0x10 = 16 micro frames. 0x20 = 32 micro frames. 0x40 = 64 micro frames.
        bitOffset: 16
        bitWidth: 8
      - name: RESERVED
        description: Reserved
        bitOffset: 24
        bitWidth: 8
  - name: USBCMD_H
    description: Command (host mode)
    alternateRegister: USBCMD_D
    addressOffset: 320
    access: read-write
    resetValue: 524288
    resetMask: 4294967295
    fields:
      - name: RS
        description: Run/Stop
        enumeratedValues:
          - name: HALT
            description: When this bit is set to 0, the Host Controller completes the current transaction on the USB and then halts. The HC Halted bit in the status register indicates when the Host Controller has finished the transaction and has entered the stopped state. Software should not write a one to this field unless the host controller is in the Halted state (i.e. HCHalted in the USBSTS register is a one).
            value: 0
          - name: PROCEED
            description: When set to a 1, the Host Controller proceeds with the execution of the schedule. The Host Controller continues execution as long as this bit is set to a one.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: RST
        description: Controller reset.  Software uses this bit to reset the controller. This bit is set to zero by the Host/Device Controller when the reset process is complete. Software cannot terminate the reset process early by writing a zero to this register.
        enumeratedValues:
          - name: RESETCOMPLETE
            description: This bit is set to zero by hardware when the reset process is complete.
            value: 0
          - name: RESET
            description: When software writes a one to this bit, the Host Controller resets its internal pipelines, timers, counters, state machines etc. to their initial value. Any transaction currently in progress on USB is immediately terminated. A USB reset is not driven on downstream ports. Software should not set this bit to a one when the HCHalted bit in the USBSTS register is a zero. Attempting to reset an actively running host controller will result in undefined behavior.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: FS0
        description: Bit 0 of the Frame List Size bits. See Table 220. This field specifies the size of the frame list that controls which bits in the Frame Index Register should be used for the Frame List Current index. Note that this field is made up from USBCMD bits 15, 3, and 2.
        bitOffset: 2
        bitWidth: 1
      - name: FS1
        description: Bit 1 of the Frame List Size bits. See Table 220.
        bitOffset: 3
        bitWidth: 1
      - name: PSE
        description: This bit controls whether the host controller skips processing the periodic schedule.
        enumeratedValues:
          - name: DO_NOT_PROCESS_THE_P
            description: Do not process the periodic schedule.
            value: 0
          - name: USE_THE_PERIODICLIST
            description: Use the PERIODICLISTBASE register to access the periodic schedule.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: ASE
        description: This bit controls whether the host controller skips processing the asynchronous schedule.
        enumeratedValues:
          - name: DO_NOT_PROCESS_THE_A
            description: Do not process the asynchronous schedule.
            value: 0
          - name: USE_THE_ASYNCLISTADD
            description: Use the ASYNCLISTADDR to access the asynchronous schedule.
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: IAA
        description: This bit is used as a doorbell by software to tell the host controller to issue an interrupt the next time it advances asynchronous schedule.
        enumeratedValues:
          - name: THE_HOST_CONTROLLER_
            description: The host controller sets this bit to zero after it has set the Interrupt on Sync Advance status bit in the USBSTS register to one.
            value: 0
          - name: SOFTWARE_MUST_WRITE_
            description: Software must write a 1 to this bit to ring the doorbell. When the host controller has evicted all appropriate cached schedule states, it sets the Interrupt on Async Advance status bit in the USBSTS register. If the Interrupt on Sync Advance Enable bit in the USBINTR register is one, then the host controller will assert an interrupt at the next interrupt threshold. Software should not write a one to this bit when the asynchronous schedule is inactive. Doing so will yield undefined results.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 7
        bitWidth: 1
      - name: ASP1_0
        description: Asynchronous schedule park mode Contains a count of the number of successive transactions the host controller is allowed to execute from a high-speed queue head on the Asynchronous schedule before continuing traversal of the Asynchronous schedule. Valid values are 0x1 to 0x3.  Software must not write 00 to this bit when Park Mode Enable is one as this will result in undefined behavior.
        bitOffset: 8
        bitWidth: 2
      - name: RESERVED
        description: Reserved.
        bitOffset: 10
        bitWidth: 1
      - name: ASPE
        description: Asynchronous Schedule Park Mode Enable
        enumeratedValues:
          - name: PARK_MODE_IS_DISABLE
            description: Park mode is disabled.
            value: 0
          - name: PARK_MODE_IS_ENABLED
            description: Park mode is enabled.
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 12
        bitWidth: 1
      - name: RESERVED
        description: Not used in Host mode.
        bitOffset: 13
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 14
        bitWidth: 1
      - name: FS2
        description: Bit 2 of the Frame List Size bits. See Table 220.
        bitOffset: 15
        bitWidth: 1
      - name: ITC
        description: Interrupt threshold control. The system software uses this field to set the maximum rate at which the host/device controller will issue interrupts. ITC contains the maximum interrupt interval measured in micro-frames. Valid values are shown below. All other values are reserved. 0x0 = Immediate (no threshold) 0x1 = 1 micro frame. 0x2 = 2 micro frames. 0x8 = 8 micro frames. 0x10 = 16 micro frames. 0x20 = 32 micro frames. 0x40 = 64 micro frames.
        bitOffset: 16
        bitWidth: 8
      - name: RESERVED
        description: Reserved
        bitOffset: 24
        bitWidth: 8
  - name: USBSTS_D
    description: Status (device mode)
    addressOffset: 324
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: UI
        description: USB interrupt
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: This bit is set by the Host/Device Controller when the cause of an interrupt is a completion of a USB transaction where the Transfer Descriptor (TD) has an interrupt on complete (IOC) bit set. This bit is also set by the Host/Device Controller when a short packet is detected. A short packet is when the actual number of bytes received was less than the expected number of bytes.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: UEI
        description: USB error interrupt
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: When completion of a USB transaction results in an error condition, this bit is set by the Host/Device Controller. This bit is set along with the USBINT bit, if the TD on which the error interrupt occurred also had its interrupt on complete (IOC) bit set. The device controller detects resume signaling only (see  Section 18.10.11.6).
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: PCI
        description: Port change detect.
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: The Device Controller sets this bit to a one when the port controller enters the full or high-speed operational state. When the port controller exits the full or high-speed operation states due to Reset or Suspend events, the notification mechanisms are the USB Reset Received bit (URI) and the DCSuspend bits (SLI) respectively.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 4
        bitWidth: 1
      - name: AAI
        description: Not used in Device mode.
        bitOffset: 5
        bitWidth: 1
      - name: URI
        description: USB reset received
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: When the device controller detects a USB Reset and enters the default state, this bit will be set to a one.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: SRI
        description: SOF received
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: When the device controller detects a Start Of (micro) Frame, this bit will be set to a one. When a SOF is extremely late, the device controller will automatically set this bit to indicate that an SOF was expected. Therefore, this bit will be set roughly every 1 ms in device FS mode and every 125  ms in HS mode and will be synchronized to the actual SOF that is received. Since the device controller is initialized to FS before connect, this bit will be set at an interval of 1ms during the prelude to connect and chirp.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: SLI
        description: DCSuspend
        enumeratedValues:
          - name: ST
            description: The device controller clears the bit upon exiting from a suspend state. This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: When a device controller enters a suspend state from an active state, this bit will be set to a one.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Software should only write 0 to reserved bits.
        bitOffset: 9
        bitWidth: 3
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 12
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 13
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 14
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 15
        bitWidth: 1
      - name: NAKI
        description: NAK interrupt bit
        enumeratedValues:
          - name: ST
            description: This bit is automatically cleared by hardware when the all the enabled TX/RX Endpoint NAK bits are cleared.
            value: 0
          - name: CLEAR
            description: It is set by hardware when for a particular endpoint both the TX/RX Endpoint NAK bit and the corresponding TX/RX Endpoint NAK Enable bit are set.
            value: 1
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Software should only write 0 to reserved bits.
        bitOffset: 17
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 18
        bitWidth: 1
      - name: RESERVED
        description: Not used in Device mode.
        bitOffset: 19
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Software should only write 0 to reserved bits.
        bitOffset: 20
        bitWidth: 12
  - name: USBSTS_H
    description: Status (host mode)
    alternateRegister: USBSTS_D
    addressOffset: 324
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: UI
        description: USB interrupt (USBINT)
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: This bit is set by the Host/Device Controller when the cause of an interrupt is a completion of a USB transaction where the Transfer Descriptor (TD) has an interrupt on complete (IOC) bit set. This bit is also set by the Host/Device Controller when a short packet is detected. A short packet is when the actual number of bytes received was less than the expected number of bytes.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: UEI
        description: USB error interrupt (USBERRINT)
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: When completion of a USB transaction results in an error condition, this bit is set by the Host/Device Controller. This bit is set along with the USBINT bit, if the TD on which the error interrupt occurred also had its interrupt on complete (IOC) bit set.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: PCI
        description: Port change detect.
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: The Host Controller sets this bit to a one when on any port a Connect Status occurs, a Port Enable/Disable Change occurs, or the Force Port Resume bit is set as the result of a J-K transition on the suspended port.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: FRI
        description: Frame list roll-over
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: The Host Controller sets this bit to a one when the Frame List Index rolls over from its maximum value to zero. The exact value at which the rollover occurs depends on the frame list size. For example, if the frame list size (as programmed in the Frame List Size field of the USBCMD register) is 1024, the Frame Index Register rolls over every time FRINDEX bit 13 toggles. Similarly, if the size is 512, the Host Controller sets this bit to a one every time FRINDEX bit 12 toggles (see Section 18.6.6).
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 4
        bitWidth: 1
      - name: AAI
        description: Interrupt on async advance
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: System software can force the host controller to issue an interrupt the next time the host controller advances the asynchronous schedule by writing a one to the Interrupt on Async Advance Doorbell bit in the USBCMD register. This status bit indicates the assertion of that interrupt source.
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: Not used by the Host controller.
        bitOffset: 6
        bitWidth: 1
      - name: SRI
        description: SOF received
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: In host mode, this bit will be set every 125 ms and can be used by host controller driver as a time base.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: RESERVED
        description: Not used by the Host controller.
        bitOffset: 8
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 9
        bitWidth: 3
      - name: HCH
        description: HCHalted
        enumeratedValues:
          - name: RS
            description: The RS bit in USBCMD is set to zero. Set by the host controller.
            value: 0
          - name: HALT
            description: The Host Controller sets this bit to one after it has stopped executing because of the Run/Stop bit being set to 0, either by software or by the Host Controller hardware (e.g. because of an internal error).
            value: 1
        bitOffset: 12
        bitWidth: 1
      - name: RCL
        description: Reclamation
        enumeratedValues:
          - name: NO_EMPTY_ASYNCHRONOU
            description: No empty asynchronous schedule detected.
            value: 0
          - name: EMPTY_ASYNCHRONOU
            description: An empty asynchronous schedule is detected. Set by the host controller.
            value: 1
        bitOffset: 13
        bitWidth: 1
      - name: PS
        description: Periodic schedule status This bit reports the current real status of the Periodic Schedule. The Host Controller is not required to immediately disable or enable the Periodic Schedule when software transitions the Periodic Schedule Enable bit in the USBCMD register. When this bit and the Periodic Schedule Enable bit are the same value, the Periodic Schedule is either enabled (if both are 1) or disabled (if both are 0).
        enumeratedValues:
          - name: DISABLED
            description: The periodic schedule status is disabled.
            value: 0
          - name: DISABLED
            description: The periodic schedule status is enabled.
            value: 1
        bitOffset: 14
        bitWidth: 1
      - name: AS
        description: Asynchronous schedule status This bit reports the current real status of the Asynchronous Schedule. The Host Controller is not required to immediately disable or enable the Asynchronous Schedule when software transitions the Asynchronous Schedule Enable bit in the USBCMD register. When this bit and the Asynchronous Schedule Enable bit are the same value, the Asynchronous Schedule is either enabled (if both are 1) or disabled (if both are 0).
        enumeratedValues:
          - name: DISABLED
            description: Asynchronous schedule status is disabled.
            value: 0
          - name: DISABLED
            description: Asynchronous schedule status is enabled.
            value: 1
        bitOffset: 15
        bitWidth: 1
      - name: RESERVED
        description: Not used on Host mode.
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 17
        bitWidth: 1
      - name: UAI
        description: USB host asynchronous interrupt (USBHSTASYNCINT)
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: This bit is set by the Host Controller when the cause of an interrupt is a completion of a USB transaction where the Transfer Descriptor (TD) has an interrupt on complete (IOC) bit set and the TD was from the asynchronous schedule. This bit is also set by the Host when a short packet is detected and the packet is on the asynchronous schedule. A short packet is when the actual number of bytes received was less than the expected number of bytes.
            value: 1
        bitOffset: 18
        bitWidth: 1
      - name: UPI
        description: USB host periodic interrupt (USBHSTPERINT)
        enumeratedValues:
          - name: ST
            description: This bit is cleared by software writing a one to it.
            value: 0
          - name: CLEAR
            description: This bit is set by the Host Controller when the cause of an interrupt is a completion of a USB transaction where the Transfer Descriptor (TD) has an interrupt on complete (IOC) bit set and the TD was from the periodic schedule. This bit is also set by the Host Controller when a short packet is detected and the packet is on the periodic schedule. A short packet is when the actual number of bytes received was less than the expected number of bytes.
            value: 1
        bitOffset: 19
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 20
        bitWidth: 12
  - name: USBINTR_D
    description: Interrupt enable (device mode)
    addressOffset: 328
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: UE
        description: USB interrupt enable When this bit is one, and the USBINT bit in the USBSTS register is one, the host/device controller will issue an interrupt at the next interrupt threshold. The interrupt is acknowledged by software clearing the USBINT bit in USBSTS.
        bitOffset: 0
        bitWidth: 1
      - name: UEE
        description: USB error interrupt enable When this bit is a one, and the USBERRINT bit in the USBSTS register is a one, the host/device controller will issue an interrupt at the next interrupt threshold. The interrupt is acknowledged by software clearing the USBERRINT bit in the USBSTS register.
        bitOffset: 1
        bitWidth: 1
