name: LAN9118
description: SMSC/Microchip LAN9118 10/100 Ethernet MAC+PHY (board-level peripheral)
source: SMSC/Microchip LAN9118 datasheet (rev SMSC LAN9118 1.6)
ipPedigree:
  designer: Microchip   # SMSC, acquired by Microchip in 2012
  ipName: LAN9118
interrupts:
  - name: INTR
    description: Combined interrupt output (active low, configurable polarity via IRQ_CFG)
registers:
  - name: ID_REV
    description: Chip ID and Revision Register
    addressOffset: 0x50
    size: 32
    access: read-only
    resetValue: 0x01180001
    fields:
      - name: REVISION
        description: Chip revision (silicon stepping)
        bitOffset: 0
        bitWidth: 16
      - name: ID
        description: Chip identifier (0x0118 for LAN9118)
        bitOffset: 16
        bitWidth: 16
addressBlocks:
  - offset: 0
    size: 0x100
    usage: registers
