name: SDMMC
description: SD/MMC
groupName: SDMMC
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CTRL
    description: Control Register
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CONTROLLER_RESET
        description: 'Controller reset. To reset controller, software should set bit to 1. This bit is auto-cleared after two AHB and two cclk_in clock cycles. This resets:  - BIU/CIU interface - CIU and state machines  - abort_read_data, send_irq_response, and read_wait bits of Control register  - start_cmd bit of Command register  Does not affect any registers or DMA interface, or FIFO. or host interrupts.'
        enumeratedValues:
          - name: NO_CHANGE
            description: No change.
            value: 0
          - name: RESET
            description: Reset. Reset SD/MMC controller
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: FIFO_RESET
        description: Fifo reset. To reset FIFO, software should set bit to 1. This bit is auto-cleared after completion of reset operation. auto-cleared after two AHB clocks.
        enumeratedValues:
          - name: NO_CHANGE
            description: No change.
            value: 0
          - name: RESET
            description: Reset. Reset to data FIFO To reset FIFO pointers
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: DMA_RESET
        description: Dma reset. To reset DMA interface, software should set bit to 1. This bit is auto-cleared after two AHB clocks.
        enumeratedValues:
          - name: NO_CHANGE
            description: No change.
            value: 0
          - name: RESET
            description: Reset. Reset internal DMA interface control logic
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 3
        bitWidth: 1
      - name: INT_ENABLE
        description: Global interrupt enable/disable bit. The int port is 1 only when this bit is 1 and one or more unmasked interrupts are set.
        enumeratedValues:
          - name: DISABLE_INTERRUPTS
            description: Disable interrupts
            value: 0
          - name: ENABLE_INTERRUPTS
            description: Enable interrupts
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Always write this bit as 0.
        bitOffset: 5
        bitWidth: 1
      - name: READ_WAIT
        description: Read/wait. For sending read-wait to SDIO cards.
        enumeratedValues:
          - name: CLEAR_READ_WAIT
            description: Clear read wait
            value: 0
          - name: ASSERT_READ_WAIT
            description: Assert read wait
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: SEND_IRQ_RESPONSE
        description: Send irq response. This bit automatically clears once response is sent. To wait for MMC card interrupts, the host issues CMD40, and the SD/MMC controller waits for an interrupt response from the MMC card. In the meantime, if the host wants the SD/MMC interface to exit waiting for interrupt state, it can set this bit, at which time the SD/MMC interface command state-machine sends a CMD40 response on the bus and returns to idle state.
        enumeratedValues:
          - name: NO_CHANGE
            description: No change
            value: 0
          - name: SEND_AUTO_IRQ_RESPON
            description: Send auto IRQ response
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: ABORT_READ_DATA
        description: Abort read data. Used in SDIO card suspend sequence.
        enumeratedValues:
          - name: NO_CHANGE
            description: No change
            value: 0
          - name: ABORT
            description: Abort. After suspend command is issued during read-transfer, software polls card to find when suspend happened. Once suspend occurs, software sets bit to reset data state-machine, which is waiting for next block of data. This bit automatically clears once data state machine resets to idle. Used in SDIO card suspend sequence.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: SEND_CCSD
        description: 'Send ccsd. When set, the SD/MMC controller sends CCSD to the CE-ATA device. Software sets this bit only if current command is expecting CCS (that is, RW_BLK) and interrupts are enabled in CE-ATA device. Once the CCSD pattern is sent to device, the SD/MMC interface automatically clears send_ccsd bit. It also sets Command Done (CD) bit in RINTSTS register and generates interrupt to host if Command Done interrupt is not masked.  NOTE: Once send_ccsd bit is set, it takes two card clock cycles to drive the CCSD on the CMD line. Due to this, during the boundary conditions it may happen that CCSD is sent to the CE-ATA device, even if the device signalled CCS.'
        enumeratedValues:
          - name: CLEAR_BIT
            description: Clear bit if the SD/MMC controller does not reset the bit.
            value: 0
          - name: SEND_COMMAND_COMPLET
            description: Send Command Completion Signal Disable (CCSD) to CE-ATA device
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: SEND_AUTO_STOP
        description: 'Send auto stop ccsd. NOTE: Always set send_auto_stop_ccsd and send_ccsd bits together; send_auto_stop_ccsd should not be set independent of send_ccsd. When set, the SD/MMC interface automatically sends internallygenerated STOP command (CMD12) to CE-ATA device. After sending internally-generated STOP command, Auto Command Done (ACD) bit in RINTSTS is set and generates interrupt to host if Auto Command Done interrupt is not masked. After sending the CCSD, the SD/MMC interface automatically clears send_auto_stop_ccsd bit.'
        enumeratedValues:
          - name: CLEAR_THIS_BIT_IF_TH
            description: Clear this bit if the SD/MMC controller does not reset the bit.
            value: 0
          - name: SEND_INTERNALLY_GENE
            description: Send internally generated STOP after sending CCSD to CE-ATA device.
            value: 1
        bitOffset: 10
        bitWidth: 1
      - name: CEATA_DEVICE_INTERRUPT_STATUS
        description: CEATA device interrupt status. Software should appropriately write to this bit after power-on reset or any other reset to CE-ATA device. After reset, usually CE-ATA device interrupt is disabled (nIEN = 1). If the host enables CE-ATA device interrupt, then software should set this bit.
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Interrupts not enabled in CE-ATA device (nIEN = 1 in ATA control register)
            value: 0
          - name: ENABLED
            description: Enabled. Interrupts are enabled in CE-ATA device (nIEN = 0 in ATA control register)
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 12
        bitWidth: 4
      - name: CARD_VOLTAGE_A0
        description: Controls the state of the SD_VOLT0 pin. SD/MMC card voltage control is not implemented.
        bitOffset: 16
        bitWidth: 1
      - name: CARD_VOLTAGE_A1
        description: Controls the state of the SD_VOLT1 pin. SD/MMC card voltage control is not implemented.
        bitOffset: 17
        bitWidth: 1
      - name: CARD_VOLTAGE_A2
        description: Controls the state of the SD_VOLT2 pin. SD/MMC card voltage control is not implemented.
        bitOffset: 18
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 19
        bitWidth: 5
      - name: RESERVED
        description: Reserved. Always write this bit as 0.
        bitOffset: 24
        bitWidth: 1
      - name: USE_INTERNAL_DMAC
        description: SD/MMC DMA use.
        enumeratedValues:
          - name: HOST
            description: Host. The host performs data transfers through the slave interface
            value: 0
          - name: DMA
            description: DMA. Internal DMA used for data transfer
            value: 1
        bitOffset: 25
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 26
        bitWidth: 6
  - name: PWREN
    description: Power Enable Register
    addressOffset: 4
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: POWER_ENABLE
        description: 'Power on/off switch for card; once power is turned on, software should wait for regulator/switch ramp-up time before trying to initialize card.  0 - power off  1 - power on  Optional feature: port can be used as general-purpose output on the SD_POW pin.'
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 1
        bitWidth: 31
  - name: CLKDIV
    description: Clock Divider Register
    addressOffset: 8
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CLK_DIVIDER0
        description: Clock divider-0 value. Clock division is 2*n. For example, value of 0 means divide by 2*0 = 0 (no division, bypass), value of 1 means divide by 2*1 = 2, value of   ff means divide by 2*255 = 510, and so on.
        bitOffset: 0
        bitWidth: 8
      - name: CLK_DIVIDER1
        description: Clock divider-1 value. Clock division is 2*n. For example, value of 0 means divide by 2*0 = 0 (no division, bypass), value of 1 means divide by 2*1 = 2, value of   ff means divide by 2*255 = 510, and so on. In MMC-Ver3.3-only mode, bits not implemented because only one clock divider is supported.
        bitOffset: 8
        bitWidth: 8
      - name: CLK_DIVIDER2
        description: Clock divider-2 value. Clock division is 2*n. For example, value of 0 means divide by 2*0 = 0 (no division, bypass), value of 1 means divide by 2*1 = 2, value of   ff means divide by 2*255 = 510, and so on. In MMC-Ver3.3-only mode, bits not implemented because only one clock divider is supported.
        bitOffset: 16
        bitWidth: 8
      - name: CLK_DIVIDER3
        description: Clock divider-3 value. Clock division is 2*n. For example, value of 0 means divide by 2*0 = 0 (no division, bypass), a value of 1 means divide by 2*1 = 2, a value of   ff means divide by 2*255 = 510, and so on.  In MMC-Ver3.3-only mode, bits not implemented because only one clock divider is supported. divide by 2*0 = 0 (no division, bypass), value of 1 means divide by 2*1 = 2, value of   ff means divide by 2*255 = 510, and so on. In MMC-Ver3.3-only mode, bits not implemented because only one clock divider is supported.
        bitOffset: 24
        bitWidth: 8
  - name: CLKSRC
    description: SD Clock Source Register
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CLK_SOURCE
        description: Clock divider source for SD card.  00 - Clock divider 0  01 - Clock divider 1  10 - Clock divider 2  11 - Clock divider 3 In MMC-Ver3.3-only controller, only one clock divider supported. The cclk_out is always from clock divider 0, and this register is not implemented.
        bitOffset: 0
        bitWidth: 2
      - name: RESERVED
        description: Reserved
        bitOffset: 1
        bitWidth: 31
  - name: CLKENA
    description: Clock Enable Register
    addressOffset: 16
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CCLK_ENABLE
        description: Clock-enable control for SD card clock. One MMC card clock supported.  0 - Clock disabled  1 - Clock enabled
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 1
        bitWidth: 15
      - name: CCLK_LOW_POWER
        description: Low-power control for SD card clock. One MMC card clock supported.  0 - Non-low-power mode  1 - Low-power mode;  stop clock when card in IDLE (should be normally set to only MMC and SD memory cards; for SDIO cards, if interrupts must be detected, clock should not be stopped).
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 17
        bitWidth: 15
  - name: TMOUT
    description: Time-out Register
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 0
    fields:
      - name: RESPONSE_TIMEOUT
        description: Response time-out value. Value is in number of card output clocks - cclk_out.
        bitOffset: 0
        bitWidth: 8
      - name: DATA_TIMEOUT
        description: Value for card Data Read time-out; same value also used for Data Starvation by Host time-out. Value is in number of card output clocks - cclk_out of selected card. Starvation by Host time-out. Value is in number of card output clocks - cclk_out of selected card.
        bitOffset: 8
        bitWidth: 24
  - name: CTYPE
    description: Card Type Register
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CARD_WIDTH0
        description: 'Indicates if card is 1-bit or 4-bit:  0 - 1-bit mode  1 - 4-bit mode  1 and 4-bit modes only work when 8-bit mode in CARD_WIDTH1 is not enabled (bit 16 in this register is set to 0).'
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 1
        bitWidth: 15
      - name: CARD_WIDTH1
        description: 'Indicates if card is 8-bit:  0 - Non 8-bit mode  1 - 8-bit mode.'
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 17
        bitWidth: 15
  - name: BLKSIZ
    description: Block Size Register
    addressOffset: 28
    access: read-write
    resetValue: 512
    resetMask: 4294967295
    fields:
      - name: BLOCK_SIZE
        description: Block size
        bitOffset: 0
        bitWidth: 16
      - name: RESERVED
        description: Reserved
        bitOffset: 16
        bitWidth: 16
  - name: BYTCNT
    description: Byte Count Register
    addressOffset: 32
    access: read-write
    resetValue: 512
    resetMask: 4294967295
    fields:
      - name: BYTE_COUNT
        description: Number of bytes to be transferred; should be integer multiple of Block Size for block transfers. For undefined number of byte transfers, byte count should be set to 0. When byte count is set to 0, it is responsibility of host to explicitly send stop/abort command to terminate data transfer.
        bitOffset: 0
        bitWidth: 32
  - name: INTMASK
    description: Interrupt Mask Register
    addressOffset: 36
    access: read-write
    resetValue: 0
    resetMask: 0
    fields:
      - name: CDET
        description: Card detect. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 0
        bitWidth: 1
      - name: RE
        description: Response error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 1
        bitWidth: 1
      - name: CDONE
        description: Command done. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 2
        bitWidth: 1
      - name: DTO
        description: Data transfer over. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 3
        bitWidth: 1
      - name: TXDR
        description: Transmit FIFO data request. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 4
        bitWidth: 1
      - name: RXDR
        description: Receive FIFO data request. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 5
        bitWidth: 1
      - name: RCRC
        description: Response CRC error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 6
        bitWidth: 1
      - name: DCRC
        description: Data CRC error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 7
        bitWidth: 1
      - name: RTO
        description: Response time-out. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 8
        bitWidth: 1
      - name: DRTO
        description: Data read time-out. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 9
        bitWidth: 1
      - name: HTO
        description: Data starvation-by-host time-out (HTO) /Volt_switch_int. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 10
        bitWidth: 1
      - name: FRUN
        description: FIFO underrun/overrun error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 11
        bitWidth: 1
      - name: HLE
        description: Hardware locked write error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 12
        bitWidth: 1
      - name: SBE
        description: Start-bit error. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 13
        bitWidth: 1
      - name: ACD
        description: Auto command done. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 14
        bitWidth: 1
      - name: EBE
        description: End-bit error (read)/Write no CRC. Bits used to mask unwanted interrupts. Value of 0 masks interrupt; value of 1 enables interrupt.
        bitOffset: 15
        bitWidth: 1
      - name: SDIO_INT_MASK
        description: Mask SDIO interrupt. When masked, SDIO interrupt detection for card is disabled. A 0 masks an interrupt, and 1 enables an interrupt. In MMC-Ver3.3-only mode, this bit is always 0.
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 17
        bitWidth: 15
  - name: CMDARG
    description: Command Argument Register
    addressOffset: 40
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CMD_ARG
        description: Value indicates command argument to be passed to card.
        bitOffset: 0
        bitWidth: 32
  - name: CMD
    description: Command Register
    addressOffset: 44
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CMD_INDEX
        description: Command index
        bitOffset: 0
        bitWidth: 6
      - name: RESPONSE_EXPECT
        description: Response expect
        enumeratedValues:
          - name: NONE
            description: None. No response expected from card
            value: 0
          - name: EXPECTED
            description: Expected. Response expected from card
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: RESPONSE_LENGTH
        description: Response length
        enumeratedValues:
          - name: SHORT
            description: Short. Short response expected from card
            value: 0
          - name: LONG
            description: Long. Long response expected from card
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: CHECK_RESPONSE_CRC
        description: Check response crc. Some of command responses do not return valid CRC bits. Software should disable CRC checks for those commands in order to disable CRC checking by controller.
        enumeratedValues:
          - name: DO_NOT_CHECK_RESPONS
            description: Do not check response CRC
            value: 0
          - name: CHECK_RESPONSE_CRC
            description: Check response CRC
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: DATA_EXPECTED
        description: Data expected
        enumeratedValues:
          - name: NONE
            description: None. No data transfer expected (read/write)
            value: 0
          - name: DATA
            description: Data. Data transfer expected (read/write)
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: READ_WRITE
        description: read/write. Don't care if no data expected from card.
        enumeratedValues:
          - name: READ_FROM_CARD
            description: Read from card
            value: 0
          - name: WRITE_TO_CARD
            description: Write to card
            value: 1
        bitOffset: 10
        bitWidth: 1
      - name: TRANSFER_MODE
        description: Transfer mode. Don't care if no data expected.
        enumeratedValues:
          - name: BLOCK_DATA_TRANSFER
            description: Block data transfer command
            value: 0
          - name: STREAM_DATA_TRANSFER
            description: Stream data transfer command
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: SEND_AUTO_STOP
        description: "Send auto stop. When set, the SD/MMC interface sends stop command to SD_MMC_CEATA cards at end of data transfer. Refer to Table 339 to determine:  - when send_auto_stop bit should be set, since some data transfers do not need explicit stop commands  - open-ended transfers that software should explicitly send to stop command  Additionally, when   resume is sent to resume - suspended memory access of SD-Combo card - bit should be set correctly if suspended data transfer needs send_auto_stop. Don't care if no data expected from card."
        enumeratedValues:
          - name: NO_STOP_COMMAND_SENT
            description: No stop command sent at end of data transfer
            value: 0
          - name: SEND_STOP_COMMAND_AT
            description: Send stop command at end of data transfer
            value: 1
        bitOffset: 12
        bitWidth: 1
      - name: WAIT_PRVDATA_COMPLETE
        description: Wait prvdata complete. The wait_prvdata_complete = 0 option typically used to query status of card during data transfer or to stop current data transfer; card_number should be same as in previous command.
        enumeratedValues:
          - name: SEND
            description: Send. Send command at once, even if previous data transfer has not completed.
            value: 0
          - name: WAIT
            description: Wait. Wait for previous data transfer completion before sending command.
            value: 1
        bitOffset: 13
        bitWidth: 1
      - name: STOP_ABORT_CMD
        description: Stop abort command. When open-ended or predefined data transfer is in progress, and host issues stop or abort command to stop data transfer, bit should be set so that command/data state-machines of CIU can return correctly to idle state. This is also applicable for Boot mode transfers. To Abort boot mode, this bit should be set along with CMD[26] = disable_boot.
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Neither stop nor abort command to stop current data transfer in progress. If abort is sent to function-number currently selected or not in data-transfer mode, then bit should be set to 0.
            value: 0
          - name: ENABLED
            description: Enabled. Stop or abort command intended to stop current data transfer in progress.
            value: 1
        bitOffset: 14
        bitWidth: 1
      - name: SEND_INITIALIZATION
        description: Send initialization. After power on, 80 clocks must be sent to card for initialization before sending any commands to card. Bit should be set while sending first command to card so that controller will initialize clocks before sending command to card. This bit should not be set for either of the boot modes (alternate or mandatory).
        enumeratedValues:
          - name: 'NO'
            description: No. Do not send initialization sequence (80 clocks of 1) before sending this command.
            value: 0
          - name: SEND
            description: Send. Send initialization sequence before sending this command.
            value: 1
        bitOffset: 15
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Always write as 0.
        bitOffset: 16
        bitWidth: 5
      - name: UPDATE_CLOCK_REGISTERS_ONLY
        description: 'Update clock registers only. Following register values transferred into card clock domain: CLKDIV, CLRSRC, CLKENA. Changes card clocks (change frequency, truncate off or on, and set low-frequency mode); provided in order to change clock frequency or stop clock without having to send command to cards. During normal command sequence, when update_clock_registers_only = 0, following control registers are transferred from BIU to CIU: CMD, CMDARG, TMOUT, CTYPE, BLKSIZ, BYTCNT. CIU uses new register values for new command sequence to card(s). When bit is set, there are no Command Done interrupts because no command is sent to SD_MMC_CEATA cards.'
        enumeratedValues:
          - name: NORMAL
            description: Normal. Normal command sequence
            value: 0
          - name: 'NO'
            description: No. Do not send commands, just update clock register value into card clock domain
            value: 1
        bitOffset: 21
        bitWidth: 1
      - name: READ_CEATA_DEVICE
        description: Read ceata device. Software should set this bit to indicate that CE-ATA device is being accessed for read transfer. This bit is used to disable read data time-out indication while performing CE-ATA read transfers. Maximum value of I/O transmission delay can be no less than 10 seconds.The SD/MMC interface should not indicate read data time-out while waiting for data from CE-ATA device.
        enumeratedValues:
          - name: NO_READ
            description: No read. Host is not performing read access (RW_REG or RW_BLK) towards CE-ATA device.
            value: 0
          - name: READ
            description: Read. Host is performing read access (RW_REG or RW_BLK) towards CE-ATA device.
            value: 1
        bitOffset: 22
        bitWidth: 1
      - name: CCS_EXPECTED
        description: CCS expected. If the command expects Command Completion Signal (CCS) from the CE-ATA device, the software should set this control bit. The SD/MMC controller sets the Data Transfer Over (DTO) bit in the RINTSTS register and generates an interrupt to the host if the Data Transfer Over interrupt is not masked.
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Interrupts are not enabled in CE-ATA device (nIEN = 1 in ATA control register), or command does not expect CCS from device.
            value: 0
          - name: ENABLED
            description: Enabled. Interrupts are enabled in CE-ATA device (nIEN = 0), and RW_BLK command expects command completion signal from CE-ATA device.
            value: 1
        bitOffset: 23
        bitWidth: 1
      - name: ENABLE_BOOT
        description: Enable Boot - this bit should be set only for mandatory boot mode. When Software sets this bit along with start_cmd, CIU starts the boot sequence for the corresponding card by asserting the CMD line low. Do NOT set disable_boot and enable_boot together.
        bitOffset: 24
        bitWidth: 1
      - name: EXPECT_BOOT_ACK
        description: Expect Boot Acknowledge. When Software sets this bit along with enable_boot, CIU expects a boot acknowledge start pattern of 0-1-0 from the selected card.
        bitOffset: 25
        bitWidth: 1
      - name: DISABLE_BOOT
        description: Disable Boot. When software sets this bit along with start_cmd, CIU terminates the boot operation. Do NOT set disable_boot and enable_boot together.
        bitOffset: 26
        bitWidth: 1
      - name: BOOT_MODE
        description: Boot Mode
        enumeratedValues:
          - name: MANDATORY_BOOT_OPERA
            description: Mandatory Boot operation
            value: 0
          - name: ALTERNATE_BOOT_OPERA
            description: Alternate Boot operation
            value: 1
        bitOffset: 27
        bitWidth: 1
      - name: VOLT_SWITCH
        description: Voltage switch bit
        enumeratedValues:
          - name: DISABLED
            description: Disabled. No voltage switching
            value: 0
          - name: ENABLED
            description: Enabled. Voltage switching enabled; must be set for CMD11 only
            value: 1
        bitOffset: 28
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 29
        bitWidth: 2
      - name: START_CMD
        description: Start command. Once command is taken by CIU, this bit is cleared. When bit is set, host should not attempt to write to any command registers. If write is attempted, hardware lock error is set in raw interrupt register. Once command is sent and response is received from SD_MMC_CEATA cards, Command Done bit is set in the raw interrupt register.
        bitOffset: 31
        bitWidth: 1
  - name: RESP0
    description: Response Register 0
    addressOffset: 48
    access: read-only
    resetValue: 0
