  - name: US_MR_USART_MODE
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: USART_MODE
        description: USART Mode of Operation
        bitOffset: 0
        bitWidth: 4
        enumeratedValues:
          - name: NORMAL
            description: Normal mode
            value: 0
          - name: RS485
            description: RS485
            value: 1
          - name: HW_HANDSHAKING
            description: Hardware handshaking
            value: 2
          - name: MODEM
            description: Modem
            value: 3
          - name: IS07816_T_0
            description: 'IS07816 Protocol: T = 0'
            value: 4
          - name: IS07816_T_1
            description: 'IS07816 Protocol: T = 1'
            value: 6
          - name: IRDA
            description: IrDA
            value: 8
          - name: LON
            description: LON
            value: 9
          - name: LIN_MASTER
            description: LIN Master mode
            value: 10
          - name: LIN_SLAVE
            description: LIN Slave mode
            value: 11
          - name: SPI_MASTER
            description: SPI Master mode (CLKO must be written to 1 and USCLKS = 0, 1 or 2)
            value: 14
          - name: SPI_SLAVE
            description: SPI Slave mode
            value: 15
      - name: USCLKS
        description: Clock Selection
        bitOffset: 4
        bitWidth: 2
        enumeratedValues:
          - name: MCK
            description: Peripheral clock is selected
            value: 0
          - name: DIV
            description: Peripheral clock divided (DIV = 8) is selected
            value: 1
          - name: PCK
            description: PMC programmable clock (PCK) is selected. If the SCK pin is driven (CLKO = 1), the CD field must be greater than 1.
            value: 2
          - name: SCK
            description: Serial clock (SCK) is selected
            value: 3
      - name: CHRL
        description: Character Length
        bitOffset: 6
        bitWidth: 2
        enumeratedValues:
          - name: _5_BIT
            description: Character length is 5 bits
            value: 0
          - name: _6_BIT
            description: Character length is 6 bits
            value: 1
          - name: _7_BIT
            description: Character length is 7 bits
            value: 2
          - name: _8_BIT
            description: Character length is 8 bits
            value: 3
      - name: SYNC
        description: Synchronous Mode Select
        bitOffset: 8
        bitWidth: 1
      - name: PAR
        description: Parity Type
        bitOffset: 9
        bitWidth: 3
        enumeratedValues:
          - name: EVEN
            description: Even parity
            value: 0
          - name: ODD
            description: Odd parity
            value: 1
          - name: SPACE
            description: Parity forced to 0 (Space)
            value: 2
          - name: MARK
            description: Parity forced to 1 (Mark)
            value: 3
          - name: 'NO'
            description: No parity
            value: 4
          - name: MULTIDROP
            description: Multidrop mode
            value: 6
      - name: NBSTOP
        description: Number of Stop Bits
        bitOffset: 12
        bitWidth: 2
        enumeratedValues:
          - name: _1_BIT
            description: 1 stop bit
            value: 0
          - name: _1_5_BIT
            description: 1.5 stop bit (SYNC = 0) or reserved (SYNC = 1)
            value: 1
          - name: _2_BIT
            description: 2 stop bits
            value: 2
      - name: CHMODE
        description: Channel Mode
        bitOffset: 14
        bitWidth: 2
        enumeratedValues:
          - name: NORMAL
            description: Normal mode
            value: 0
          - name: AUTOMATIC
            description: Automatic Echo. Receiver input is connected to the TXD pin.
            value: 1
          - name: LOCAL_LOOPBACK
            description: Local Loopback. Transmitter output is connected to the Receiver Input.
            value: 2
          - name: REMOTE_LOOPBACK
            description: Remote Loopback. RXD pin is internally connected to the TXD pin.
            value: 3
      - name: MSBF
        description: Bit Order
        bitOffset: 16
        bitWidth: 1
      - name: MODE9
        description: 9-bit Character Length
        bitOffset: 17
        bitWidth: 1
      - name: CLKO
        description: Clock Output Select
        bitOffset: 18
        bitWidth: 1
      - name: OVER
        description: Oversampling Mode
        bitOffset: 19
        bitWidth: 1
      - name: INACK
        description: Inhibit Non Acknowledge
        bitOffset: 20
        bitWidth: 1
      - name: DSNACK
        description: Disable Successive NACK
        bitOffset: 21
        bitWidth: 1
      - name: VAR_SYNC
        description: Variable Synchronization of Command/Data Sync Start Frame Delimiter
        bitOffset: 22
        bitWidth: 1
      - name: INVDATA
        description: Inverted Data
        bitOffset: 23
        bitWidth: 1
      - name: MAX_ITERATION
        description: Maximum Number of Automatic Iteration
        bitOffset: 24
        bitWidth: 3
      - name: FILTER
        description: Receive Line Filter
        bitOffset: 28
        bitWidth: 1
      - name: MAN
        description: Manchester Encoder/Decoder Enable
        bitOffset: 29
        bitWidth: 1
      - name: MODSYNC
        description: Manchester Synchronization Mode
        bitOffset: 30
        bitWidth: 1
      - name: ONEBIT
        description: Start Frame Delimiter Selector
        bitOffset: 31
        bitWidth: 1
