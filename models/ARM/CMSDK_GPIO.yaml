name: CMSDK_GPIO
description: ARM CMSDK AHB GPIO
source: IOTKit_CM33.svd; ARM CMSDK Technical Reference Manual
qemu: stub (unimplemented-device; reads return 0)
ipPedigree:
  designer: ARM
  ipName: CMSDK AHB GPIO
parameters:
  - name: pins
    type: int
    default: 16
    description: Number of GPIO pins (16 for GPIO0-2, 4 for GPIO3)
interrupts:
  - COMBINED
registers:
  - name: DATA
    description: Data Register (pin input state)
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
  - name: DATAOUT
    description: Data Output Register
    addressOffset: 4
    size: 32
    access: read-write
    resetValue: 0
  - name: OUTENSET
    description: Output Enable Set Register (write 1 to set output enable)
    addressOffset: 16
    size: 32
    access: read-write
    resetValue: 0
  - name: OUTENCLR
    description: Output Enable Clear Register (write 1 to clear output enable)
    addressOffset: 20
    size: 32
    access: read-write
    resetValue: 0
  - name: ALTFUNCSET
    description: Alternate Function Set Register
    addressOffset: 24
    size: 32
    access: read-write
    resetValue: 0
  - name: ALTFUNCCLR
    description: Alternate Function Clear Register
    addressOffset: 28
    size: 32
    access: read-write
    resetValue: 0
  - name: INTENSET
    description: Interrupt Enable Set Register
    addressOffset: 32
    size: 32
    access: read-write
    resetValue: 0
  - name: INTENCLR
    description: Interrupt Enable Clear Register
    addressOffset: 36
    size: 32
    access: read-write
    resetValue: 0
  - name: INTTYPESET
    description: "Interrupt Type Set Register (1=edge, 0=level)"
    addressOffset: 40
    size: 32
    access: read-write
    resetValue: 0
  - name: INTTYPECLR
    description: "Interrupt Type Clear Register"
    addressOffset: 44
    size: 32
    access: read-write
    resetValue: 0
  - name: INTPOLSET
    description: "Interrupt Polarity Set Register (1=high/rising, 0=low/falling)"
    addressOffset: 48
    size: 32
    access: read-write
    resetValue: 0
  - name: INTPOLCLR
    description: Interrupt Polarity Clear Register
    addressOffset: 52
    size: 32
    access: read-write
    resetValue: 0
  - name: INTSTATUS
    description: Interrupt Status Register
    addressOffset: 56
    size: 32
    access: read-only
    resetValue: 0
  - name: INTCLEAR
    description: Interrupt Clear Register (write 1 to clear)
    addressOffset: 56
    size: 32
    access: write-only
    resetValue: 0
addressBlocks:
  - offset: 0
    size: 8
    usage: registers
  - offset: 16
    size: 44
    usage: registers
