name: PM
version: 039261a0
description: Power manager
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: CTRLA
    description: Control A
    addressOffset: 0
    size: 8
    resetValue: 0
    fields:
      - name: IORET
        description: I/O Retention
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: NOIORET
            description: When  the  device  exits  the  HIBERNATE or BACKUP  mode,  the  I/O  line  configuration are released.
            value: 0
          - name: IORET
            description: When  the  device  exits  the  HIBERNATE or BACKUP  mode,  the  I/O  line  configuration are stretched.
            value: 1
  - name: SLEEPCFG
    description: Sleep Configuration
    addressOffset: 1
    size: 8
    resetValue: 2
    fields:
      - name: SLEEPMODE
        description: Sleep Mode
        bitOffset: 0
        bitWidth: 3
        enumeratedValues:
          - name: IDLE
            description: CPU, AHB and APB clocks are OFF
            value: 2
          - name: STANDBY
            description: All Clocks are OFF
            value: 4
          - name: HIBERNATE
            description: Backup domain is ON as well as some PDRAMs
            value: 5
          - name: BACKUP
            description: Only Backup domain is powered ON
            value: 6
          - name: 'OFF'
            description: All power domains are powered OFF
            value: 7
  - name: INTENCLR
    description: Interrupt Enable Clear
    addressOffset: 4
    size: 8
    resetValue: 0
    fields:
      - name: SLEEPRDY
        description: Backup Sleep Mode Entry Ready Enable
        bitOffset: 0
        bitWidth: 1
  - name: INTENSET
    description: Interrupt Enable Set
    addressOffset: 5
    size: 8
    resetValue: 0
    fields:
      - name: SLEEPRDY
        description: Backup Sleep Mode Entry Ready Enable
        bitOffset: 0
        bitWidth: 1
  - name: INTFLAG
    description: Interrupt Flag Status and Clear
    addressOffset: 6
    size: 8
    resetValue: 0
    fields:
      - name: SLEEPRDY
        description: Backup Sleep Mode Entry Ready
        bitOffset: 0
        bitWidth: 1
  - name: STDBYCFG
    description: Standby Configuration
    addressOffset: 8
    size: 8
    resetValue: 4
    fields:
      - name: RAMCFG
        description: Ram Configuration
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: RET
            description: All the RAMs are retained
            value: 0
          - name: 'OFF'
            description: Only the first 32K bytes are retained
            value: 1
      - name: LPRAM
        description: Low Power RAM Enable
        bitOffset: 2
        bitWidth: 1
  - name: HIBCFG
    description: Hibernate Configuration
    addressOffset: 9
    size: 8
    resetValue: 4
    fields:
      - name: RAMCFG
        description: Ram Configuration
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: RET
            description: All the RAMs are retained
            value: 0
          - name: 'OFF'
            description: Only the first 32K bytes are retained
            value: 1
      - name: LPRAM
        description: Low Power RAM Enable
        bitOffset: 2
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 10
    usage: registers
interrupts:
  - name: INT
    description: Power Manager
