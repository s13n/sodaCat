    description: MediaLB Control 1 Register
    addressOffset: 60
    size: 32
    fields:
      - name: LOCK
        description: MediaLB Lock Error Status (cleared by writing a 0)
        bitOffset: 6
        bitWidth: 1
      - name: CLKM
        description: MediaLB Clock Missing Status (cleared by writing a 0)
