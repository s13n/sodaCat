registers:
  - name: MCR0
    description: Module Control 0
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 4294934530
    resetMask: 4294967295
    fields:
      - name: SWRESET
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: No impact
            value: 0
          - name: val1
            description: Software reset
            value: 1
      - name: MDIS
        description: Module Disable
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: val0
            description: No impact
            value: 0
          - name: val1
            description: Module disable
            value: 1
