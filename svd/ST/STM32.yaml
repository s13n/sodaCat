  F7:
    svd:
      zip: stm32f7-svd.zip
      version: '1.0'
      date: '2023-03-22'
    subfamilies:
      F72x_F73x:
        ref_manual: {name: RM0431, url: https://www.st.com/resource/en/reference_manual/rm0431-stm32f72xxx-and-stm32f73xxx-advanced-armbased-32bit-mcus-stmicroelectronics.pdf, rev: '4', date: 2025-02}
        chips:
          - STM32F722
          - STM32F723
