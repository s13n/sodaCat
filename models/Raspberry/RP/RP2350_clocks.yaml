  # ==========================================================================
  # Per-peripheral wake-mode gates (CLOCKS.WAKE_EN0 / WAKE_EN1)
  #
  # Each bit gates the clock delivered to one peripheral instance.  WAKE_EN0/1
  # carry the wake-mode mask, SLEEP_EN0/1 carry the sleep-mode mask with the
  # same field names, and ENABLED0/1 reflect the currently effective state.
  # The EnableControl schema points at one register/field, so WAKE_EN is named
  # here as the default-active mask; a driver wanting the SLEEP_EN view reads
  # the same field name from SLEEP_EN0/1.  Both WAKE_EN0/1 reset to all-ones,
  # so every peripheral starts with its clock enabled in wake mode.
  #
  # Three bits — CLK_ADC, CLK_HSTX, CLK_USB — are named without the redundant
  # peripheral suffix that RP2040 used (CLK_ADC_ADC, CLK_USB_USBCTRL).  Their
  # output signals carry the clk_<bus>_<peripheral> shape (clk_adc_adc, ...)
  # to stay distinct from the upstream bus signals of the same name.
  # ==========================================================================

