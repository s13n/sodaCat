          GPIO: {ports: 6}
          SmartDMA: {max_channel: 31}
          I2C0: {rx_req: 10, tx_req: 11}
          SPI0: {rx_req: 6, tx_req: 7}
          SPI1: {rx_req: 8, tx_req: 9, ssel_num: 2}
          USART0: {rx_req: 0, tx_req: 1}
          USART1: {rx_req: 2, tx_req: 3}
          USART2: {rx_req: 4, tx_req: 5}
          USART3: {rx_req: 6, tx_req: 7}
          USART4: {rx_req: 8, tx_req: 9}
          USART5: {rx_req: 10, tx_req: 11}
          USART6: {rx_req: 12, tx_req: 13}
          USART7: {rx_req: 14, tx_req: 15}
          USART8: {rx_req: 20, tx_req: 21}
          USART9: {rx_req: 22, tx_req: 23}

  LPC43:
    svd_chip: LPC43xx_43Sxx
    clocktree: NXP/LPC43/LPC43_clocks
    subfamilies:
      LPC43xx:
        # Includes both non-secure (LPC43xx) and secure (LPC43Sxx) parts.
        # The "S" variants only add AES/OTP features over the base parts;
        # all peripherals modelled here are identical between the two.
        chips: [LPC4310, LPC4320, LPC4330, LPC4350, LPC4370,
                LPC43S10, LPC43S20, LPC43S30, LPC43S37, LPC43S50, LPC43S57, LPC43S67]
    blocks:
      ADC:
        from: LPC43xx_43Sxx.ADC0
        instances: [ADC0, ADC1]
        interrupts:
          ADC0: ADC
          ADC1: ADC
      ADCHS:
        from: LPC43xx_43Sxx.ADCHS
        instances: [ADCHS]
        interrupts:
          ADCHS: INTR
        # The SVD describes the two descriptor tables as separate 1D
        # arrays DESCRIPTOR0_[%s] and DESCRIPTOR1_[%s] (each dim=8) at
        # back-to-back addresses 0x300 / 0x320.  Field layout, widths,
        # and increments are identical, so fuse them into one 2D array
        # DESCRIPTOR[2][8] for a more honest representation.
        transforms:
          - {type: create2DArray, pattern: '^DESCRIPTOR(\d+)_\[%s\]$', name: DESCRIPTOR, description: 'Table m descriptor n, m=0..1, n=0..7'}
      ATIMER:
        from: LPC43xx_43Sxx.ATIMER
        instances: [ATIMER]
        interrupts:
          ATIMER: INTR
      C_CAN:
        from: LPC43xx_43Sxx.C_CAN1
        instances: [C_CAN0, C_CAN1]
        interrupts:
          C_CAN0: INTR
          C_CAN1: INTR
      CCU1:
        from: LPC43xx_43Sxx.CCU1
        instances: [CCU1]
      CCU2:
        from: LPC43xx_43Sxx.CCU2
        instances: [CCU2]
      CGU:
        from: LPC43xx_43Sxx.CGU
        instances: [CGU]
        # SVD omits BASE_ADCHS_CLK (LPC4370/LPC43S70 only) at offset 0x8C,
        # between BASE_LCD_CLK and BASE_SDIO_CLK.  UM10503 Table 144 (Output
        # stage 12).  Field layout and clock-source list are identical to
        # BASE_LCD_CLK.
        transforms:
          - {type: cloneRegister, source: BASE_LCD_CLK, name: BASE_ADCHS_CLK, addressOffset: 140, description: "Output stage 12 control register for base clock BASE_ADCHS_CLK (LPC4370/LPC43S70 only)"}
      CREG:
        from: LPC43xx_43Sxx.CREG
        instances: [CREG]
      DAC:
        from: LPC43xx_43Sxx.DAC
        instances: [DAC]
        interrupts:
          DAC: INTR
      EEPROM:
        from: LPC43xx_43Sxx.EEPROM
        instances: [EEPROM]
        interrupts:
          FLASH: FLASH
      EMC:
        from: LPC43xx_43Sxx.EMC
        instances: [EMC]
      ETHERNET:
        from: LPC43xx_43Sxx.ETHERNET
        instances: [ETHERNET]
        interrupts:
          ETHERNET: INTR
      EVENTROUTER:
        from: LPC43xx_43Sxx.EVENTROUTER
        instances: [EVENTROUTER]
        interrupts:
          EVENTROUTER: INTR
      GIMA:
        from: LPC43xx_43Sxx.GIMA
        instances: [GIMA]
      GPIO_GROUP_INT:
        from: LPC43xx_43Sxx.GPIO_GROUP_INT0
        instances: [GPIO_GROUP_INT0, GPIO_GROUP_INT1]
        interrupts:
          GINT0: GINT
          GINT1: GINT
      GPIO_PIN_INT:
        from: LPC43xx_43Sxx.GPIO_PIN_INT
        instances: [GPIO_PIN_INT]
        interrupts:
          PIN_INT0: INT0
          PIN_INT1: INT1
          PIN_INT2: INT2
          PIN_INT3: INT3
          PIN_INT4: INT4
          PIN_INT5: INT5
          PIN_INT6: INT6
          PIN_INT7: INT7
      GPIO_PORT:
        from: LPC43xx_43Sxx.GPIO_PORT
        instances: [GPIO_PORT]
      GPDMA:
        uses: PL08x
        instances: [GPDMA]
        interrupts:
          DMA: DMA
      I2C:
        from: LPC43xx_43Sxx.I2C0
        instances: [I2C0, I2C1]
        interrupts:
          I2C0: I2C
          I2C1: I2C
      I2S:
        from: LPC43xx_43Sxx.I2S0
        instances: [I2S0, I2S1]
        interrupts:
          I2S0: I2S
          I2S1: I2S
      LCD:
        uses: LCD
        instances: [LCD]
        interrupts:
          LCD: INTR
      MCPWM:
        from: LPC43xx_43Sxx.MCPWM
        instances: [MCPWM]
        interrupts:
          MCPWM: INTR
      PMC:
        from: LPC43xx_43Sxx.PMC
        instances: [PMC]
      QEI:
        from: LPC43xx_43Sxx.QEI
        instances: [QEI]
        interrupts:
          QEI: INTR
      REGFILE:
        from: LPC43xx_43Sxx.REGFILE
        instances: [REGFILE]
      RGU:
        from: LPC43xx_43Sxx.RGU
        instances: [RGU]
      RITIMER:
        from: LPC43xx_43Sxx.RITIMER
        instances: [RITIMER]
        interrupts:
          RITIMER: INTR
      RTC:
        from: LPC43xx_43Sxx.RTC
        instances: [RTC]
        interrupts:
          RTC: INTR
      SCT:
        uses: SCT
        instances: [SCT]
        interrupts:
          SCT: INTR
      SCU:
        from: LPC43xx_43Sxx.SCU
        instances: [SCU]
        # The LPC43 SVD splits each SFSPx port into multiple register
        # definitions to encode per-pin field variation (high-drive pins
        # have EHD at [8:9] instead of EHS at [5]; high-speed pins have
        # their own field set).  The variants don't conflict at the bit
        # level, so we fuse each port back into one array — the
        # superset's EHS and EHD live at distinct bit positions and
        # programmers ignore the irrelevant one for any given pin.
        transforms:
          - {type: mergeArrays, pattern: '^SFSP1(_\[%s\]|_%s|_\d+)$', name: 'SFSP1_[%s]', description: 'Pin configuration register for pins P1'}
          - {type: mergeArrays, pattern: '^SFSP2(_\[%s\]|_%s|_\d+)$', name: 'SFSP2_[%s]', description: 'Pin configuration register for pins P2'}
          - {type: mergeArrays, pattern: '^SFSP3(_\[%s\]|_%s|_\d+)$', name: 'SFSP3_[%s]', description: 'Pin configuration register for pins P3'}
          - {type: mergeArrays, pattern: '^SFSP8(_\[%s\]|_%s|_\d+)$', name: 'SFSP8_[%s]', description: 'Pin configuration register for pins P8'}
          - {type: mergeArrays, pattern: '^SFSPA(_\[%s\]|_%s|_\d+)$', name: 'SFSPA_[%s]', description: 'Pin configuration register for pins PA'}
      SDMMC:
        from: LPC43xx_43Sxx.SDMMC
        instances: [SDMMC]
        interrupts:
          SDIO: INTR
      SGPIO:
        from: LPC43xx_43Sxx.SGPIO
        instances: [SGPIO]
        interrupts:
          SGPIO_IINT: INTR
      SPI:
        from: LPC43xx_43Sxx.SPI
        instances: [SPI]
        interrupts:
          SPI_INT: INTR
      SPIFI:
        uses: SPIFI
        instances: [SPIFI]
        interrupts:
          SPIFI: INTR
      SSP:
        from: LPC43xx_43Sxx.SSP0
        instances: [SSP0, SSP1]
        interrupts:
          SSP0: SSP
          SSP1: SSP
      TIMER:
        from: LPC43xx_43Sxx.TIMER0
        instances: [TIMER0, TIMER1, TIMER2, TIMER3]
        interrupts:
          TIMER0: TIMER
          TIMER1: TIMER
          TIMER2: TIMER
          TIMER3: TIMER
      USART:
        # Unified UART/USART block.  UART1 has modem control (MCR/MSR) but
        # lacks the IrDA/smart-card/sync/oversampling/half-duplex extras the
        # other three instances have; the model declares the union and
        # per-instance params advertise which features are present.  Source
        # is USART0 (the larger feature set); UART1-only registers and
        # fields are added by transforms below.
        from: LPC43xx_43Sxx.USART0
        instances: [UART1, USART0, USART2, USART3]
        description: Universal (a)synchronous receiver/transmitter (UART/USART)
        interrupts:
          UART1: INTR
          USART0: INTR
          USART2: INTR
          USART3: INTR
        params:
          - {name: has_modem, type: bool, default: false, description: 'Modem control: MCR/MSR registers and CTSIE/MSIE bits in IER, SEL bit in RS485CTRL (UART1 only)'}
          - {name: has_irda, type: bool, default: true, description: 'IrDA encoder/decoder (ICR register)'}
          - {name: has_smartcard, type: bool, default: true, description: 'ISO7816-3 smart card mode (SCICTRL register)'}
          - {name: has_synchronous, type: bool, default: true, description: 'Synchronous mode (SYNCCTRL register)'}
          - {name: has_oversampling, type: bool, default: true, description: 'Configurable oversampling (OSR register)'}
          - {name: has_halfduplex, type: bool, default: true, description: 'Half-duplex direction control (HDEN register)'}
        transforms:
          # Align IER auto-baud bit names with UART1's shorter form (bits identical).
          - {type: renameFields, register: IER, pattern: ABEOINTEN, replacement: ABEOIE}
          - {type: renameFields, register: IER, pattern: ABTOINTEN, replacement: ABTOIE}
          # UART1-only IER bits: declared here so UART1 instances can reach them.
          - type: patchFields
            register: IER
            fields:
              - {name: MSIE, description: 'Modem Status Interrupt Enable (UART1 only); status in MSR[3:0].', bitOffset: 3, bitWidth: 1}
              - {name: CTSIE, description: 'CTS Interrupt Enable (UART1 only). With auto-CTS, gates modem-status interrupt on CTS transitions.', bitOffset: 7, bitWidth: 1}
          # UART1-only RS485CTRL bit: selects RTS vs DTR for direction control.
          - type: patchFields
            register: RS485CTRL
            fields:
              - {name: SEL, description: 'Direction-control pin select (UART1 only): 0=RTS, 1=DTR', bitOffset: 3, bitWidth: 1}
          # UART1-only modem-control / modem-status registers.
          - type: patchRegisters
            registers:
              - name: MCR
                displayName: MCR
                description: 'Modem Control Register (UART1 only). Flow-control handshaking and loopback mode.'
                addressOffset: 16
                size: 32
                access: read-write
                resetValue: 0
                resetMask: 4294967295
                fields:
                  - {name: DTRCTRL, description: 'DTR Control. Source for modem output DTR; reads as 0 in loopback mode.', bitOffset: 0, bitWidth: 1}
                  - {name: RTSCTRL, description: 'RTS Control. Source for modem output RTS; reads as 0 in loopback mode.', bitOffset: 1, bitWidth: 1}
                  - {name: LMS,     description: 'Loopback Mode Select.', bitOffset: 4, bitWidth: 1}
                  - {name: RTSEN,   description: 'Auto-RTS flow control enable.', bitOffset: 6, bitWidth: 1}
                  - {name: CTSEN,   description: 'Auto-CTS flow control enable.', bitOffset: 7, bitWidth: 1}
              - name: MSR
                displayName: MSR
                description: 'Modem Status Register (UART1 only). Handshake-signal status flags.'
                addressOffset: 24
                size: 32
                access: read-only
                resetValue: 0
                resetMask: 4294967295
                fields:
                  - {name: DCTS, description: 'Delta CTS. Set on CTS state change; cleared on read.', bitOffset: 0, bitWidth: 1}
                  - {name: DDSR, description: 'Delta DSR. Set on DSR state change; cleared on read.', bitOffset: 1, bitWidth: 1}
                  - {name: TERI, description: 'Trailing Edge RI. Set on RI low-to-high transition; cleared on read.', bitOffset: 2, bitWidth: 1}
                  - {name: DDCD, description: 'Delta DCD. Set on DCD state change; cleared on read.', bitOffset: 3, bitWidth: 1}
                  - {name: CTS,  description: 'Clear To Send (complement of CTS pin; mirrors MCR[1] in loopback).', bitOffset: 4, bitWidth: 1}
                  - {name: DSR,  description: 'Data Set Ready (complement of DSR pin; mirrors MCR[0] in loopback).', bitOffset: 5, bitWidth: 1}
                  - {name: RI,   description: 'Ring Indicator (complement of RI pin; mirrors MCR[2] in loopback).', bitOffset: 6, bitWidth: 1}
                  - {name: DCD,  description: 'Data Carrier Detect (complement of DCD pin; mirrors MCR[3] in loopback).', bitOffset: 7, bitWidth: 1}
      USB:
        from: LPC43xx_43Sxx.USB0
        instances: [USB0, USB1]
        interrupts:
          USB0: USB
          USB1: USB
      WWDT:
        uses: WWDT
        instances: [WWDT]
    chip_params:
      _all:
        _all:
          SCT: {match_channels: 8, events: 8, outputs: 7, has_fractional_match: true}
          SPIFI: {base: 20, logsize: 26, data_base: 128, data_logsize: 26}
          # UART1 has modem control (MCR/MSR) but lacks the IrDA/smart-card/
          # sync/oversampling/half-duplex registers that USART0/2/3 have.
          UART1: {has_modem: true, has_irda: false, has_smartcard: false, has_synchronous: false, has_oversampling: false, has_halfduplex: false}
