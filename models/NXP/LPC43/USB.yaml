  - name: PORTSC1_D
    description: Port 1 status/control (device mode)
    addressOffset: 388
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CCS
        description: Current connect status
        enumeratedValues:
          - name: DEVICE_NOT_ATTACHED_
            description: Device not attached A zero indicates that the device did not attach successfully or was forcibly disconnected by the software writing a zero to the Run bit in the USBCMD register. It does not state the device being disconnected or suspended.
            value: 0
          - name: DEVICE_ATTACHED__A_
            description: Device attached.  A one indicates that the device successfully attached and is operating in either high-speed mode or full-speed mode as indicated by the High Speed Port bit in this register.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode
        bitOffset: 1
        bitWidth: 1
      - name: PE
        description: Port enable. This bit is always 1. The device port is always enabled.
        bitOffset: 2
        bitWidth: 1
      - name: PEC
        description: Port enable/disable change This bit is always 0. The device port is always enabled.
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 4
        bitWidth: 2
      - name: FPR
        description: Force port resume After the device has been in Suspend State for 5 ms or more, software must set this bit to one to drive resume signaling before clearing. The Device Controller will set this bit to one if a J-to-K transition is detected while the port is in the Suspend state. The bit will be cleared when the device returns to normal operation. When this bit transitions to a one because a J-to-K transition detected, the Port Change Detect bit in the USBSTS register is set to one as well.
        enumeratedValues:
          - name: NO_RESUME
            description: No resume (K-state) detected/driven on port.
            value: 0
          - name: RESUME_DETECTED
            description: Resume detected/driven on port.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: SUSP
        description: Suspend In device mode, this is a read-only status bit .
        enumeratedValues:
          - name: PORT_NOT_IN_SUSPEND_
            description: Port not in suspend state
            value: 0
          - name: PORT_IN_SUSPEND_STAT
            description: Port in suspend state
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: PR
        description: Port reset In device mode, this is a read-only status bit. A device reset from the USB bus is also indicated in the USBSTS register.
        enumeratedValues:
          - name: PORT_IS_NOT_IN_THE_R
            description: Port is not in the reset state.
            value: 0
          - name: PORT_IS_IN_THE_RESET
            description: Port is in the reset state.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: HSP
        description: High-speed status This bit is redundant with bits 27:26 (PSPD) in this register. It is implemented for compatibility reasons.
        enumeratedValues:
          - name: NOT_HIGHSSPEED
            description: Host/device connected to the port is not in High-speed mode.
            value: 0
          - name: HIGHSPEED
            description: Host/device connected to the port is in High-speed mode.
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 10
        bitWidth: 2
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 12
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 13
        bitWidth: 1
      - name: PIC1_0
        description: Port indicator control Writing to this field effects the value of the USB0_IND[1:0] pins.
        enumeratedValues:
          - name: 'OFF'
            description: Port indicators are off.
            value: 0
          - name: AMBER
            description: amber
            value: 1
          - name: GREEN
            description: green
            value: 2
          - name: UNDEFINED
            description: undefined
            value: 3
        bitOffset: 14
        bitWidth: 2
      - name: PTC3_0
        description: Port test control Any value other than 0000 indicates that the port is operating in test mode. The FORCE_ENABLE_FS and FORCE ENABLE_LS are extensions to the test mode support specified in the EHCI specification. Writing the PTC field to any of the FORCE_ENABLE_HS/FS/LS values will force the port into the connected and enabled state at the selected speed. Writing the PTC field back to TEST_MODE_DISABLE will allow the port state machines to progress normally from that point. Values 0111 to 1111 are not valid.
        enumeratedValues:
          - name: TEST_MODE_DISABLE
            description: TEST_MODE_DISABLE
            value: 0
          - name: J_STATE
            description: J_STATE
            value: 1
          - name: K_STATE
            description: K_STATE
            value: 2
          - name: SE0_NAK
            description: SE0 (host)/NAK (device)
            value: 3
          - name: PACKET
            description: Packet
            value: 4
          - name: FORCE_ENABLE_HS
            description: FORCE_ENABLE_HS
            value: 5
          - name: FORCE_ENABLE_FS
            description: FORCE_ENABLE_FS
            value: 6
        bitOffset: 16
        bitWidth: 4
      - name: RESERVED
        description: Not used in device mode. This bit is always 0 in device mode.
        bitOffset: 20
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode. This bit is always 0 in device mode.
        bitOffset: 21
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode. This bit is always 0 in device mode.
        bitOffset: 22
        bitWidth: 1
      - name: PHCD
        description: PHY low power suspend - clock disable (PLPSCD) In device mode, The PHY can be put into Low Power Suspend - Clock Disable when the device is not running (USBCMD Run/Stop = 0) or the host has signaled suspend (PORTSC SUSPEND = 1). Low power suspend will be cleared automatically when the host has signaled resume. Before forcing a resume from the device, the device controller driver must clear this bit.
        enumeratedValues:
          - name: ENABLE
            description: Writing a 0 enables the PHY clock. Reading a 0 indicates the status of the PHY clock (enabled).
            value: 0
          - name: DISABLE
            description: Writing a 1 disables the PHY clock. Reading a 1 indicates the status of the PHY clock (disabled).
            value: 1
        bitOffset: 23
        bitWidth: 1
      - name: PFSC
        description: Port force full speed connect
        enumeratedValues:
          - name: ANYSPEED
            description: Port connects at any speed.
            value: 0
          - name: FULLSPEED
            description: Writing this bit to a 1 will force the port to only connect at full speed. It disables the chirp sequence that allows the port to identify itself as High-speed. This is useful for testing FS configurations with a HS host, hub or device.
            value: 1
        bitOffset: 24
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 25
        bitWidth: 1
      - name: PSPD
        description: Port speed This register field indicates the speed at which the port is operating.
        enumeratedValues:
          - name: FULL_SPEED
            description: Full-speed
            value: 0
          - name: INVALID_IN_DEVICE_MO
            description: invalid in device mode
            value: 1
          - name: HIGH_SPEED
            description: High-speed
            value: 2
        bitOffset: 26
        bitWidth: 2
      - name: RESERVED
        description: Reserved
        bitOffset: 28
        bitWidth: 4
  - name: PORTSC1_H
    description: Port 1 status/control (host mode)
    alternateRegister: PORTSC1_D
    addressOffset: 388
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CCS
        description: Current connect status This value reflects the current state of the port and may not correspond directly to the event that caused the CSC bit to be set. This bit is 0 if PP (Port Power bit) is 0. Software clears this bit by writing a 1 to it.
        enumeratedValues:
          - name: NO_DEVICE_IS_PRESENT
            description: No device is present.
            value: 0
          - name: DEVICE_IS_PRESENT_ON
            description: Device is present on the port.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: CSC
        description: Connect status change Indicates a change has occurred in the port's Current Connect Status. The host/device controller sets this bit for all changes to the port device connect status, even if system software has not cleared an existing connect status change. For example, the insertion status changes twice before system software has cleared the changed condition, hub hardware will be setting an already-set bit (i.e., the bit will remain set). Software clears this bit by writing a one to it. This bit is 0 if PP (Port Power bit) is 0
        enumeratedValues:
          - name: NO_CHANGE_IN_CURRENT
            description: No change in current status.
            value: 0
          - name: CHANGE_IN_CURRENT_ST
            description: Change in current status.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: PE
        description: Port enable. Ports can only be enabled by the host controller as a part of the reset and enable. Software cannot enable a port by writing a one to this field. Ports can be disabled by either a fault condition (disconnect event or other fault condition) or by the host software. Note that the bit status does not change until the port state actually changes. There may be a delay in disabling or enabling a port due to other host controller and bus events. When the port is disabled. downstream propagation of data is blocked except for reset. This bit is 0 if PP (Port Power bit) is 0.
        enumeratedValues:
          - name: PORT_DISABLED_
            description: Port disabled.
            value: 0
          - name: PORT_ENABLED_
            description: Port enabled.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: PEC
        description: Port disable/enable change For the root hub, this bit gets set to a one only when a port is disabled due to disconnect on the port or due to the appropriate conditions existing at the EOF2 point (See Chapter 11 of the USB Specification). Software clears this by writing a one to it. This bit is 0 if PP (Port Power bit) is 0,
        enumeratedValues:
          - name: NO_CHANGE_
            description: No change.
            value: 0
          - name: CHANGED
            description: Port enabled/disabled status has changed.
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: OCA
        description: Over-current active This bit will automatically transition from 1 to 0 when the over-current condition is removed.
        enumeratedValues:
          - name: THE_PORT_DOES_NOT_HA
            description: The port does not have an over-current condition.
            value: 0
          - name: THE_PORT_HAS_CURRENT
            description: The port has currently an over-current condition.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: OCC
        description: Over-current change This bit gets set to one when there is a change to Over-current Active. Software clears this bit by writing a one to this bit position.
        bitOffset: 5
        bitWidth: 1
      - name: FPR
        description: Force port resume Software sets this bit to one to drive resume signaling. The Host Controller sets this bit to one if a J-to-K transition is detected while the port is in the Suspend state. When this bit transitions to a one because a J-to-K transition is detected, the Port Change Detect bit in the USBSTS register is also set to one. This bit will automatically change to zero after the resume sequence is complete. This behavior is different from EHCI where the host controller driver is required to set this bit to a zero after the resume duration is timed in the driver. Note that when the Host controller owns the port, the resume sequence follows the defined sequence documented in the USB Specification Revision 2.0. The resume signaling (Full-speed K) is driven on the port as long as this bit remains a one. This bit will remain a one until the port has switched to the high-speed idle. Writing a zero has no affect because the port controller will time the resume operation clear the bit the port control state switches to HS or FS idle. This bit is 0 if PP (Port Power bit) is 0.
        enumeratedValues:
          - name: NO_RESUME
            description: No resume (K-state) detected/driven on port.
            value: 0
          - name: RESUME_DETECTED
            description: Resume detected/driven on port.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: SUSP
        description: Suspend Together with the PE (Port enabled bit), this bit describes the port states, see Table 240. The host controller will unconditionally set this bit to zero when software sets the Force Port Resume bit to zero. The host controller ignores a write of zero to this bit. If host software sets this bit to a one when the port is not enabled (i.e. Port enabled bit is a zero) the results are undefined. This bit is 0 if PP (Port Power bit) is 0.
        enumeratedValues:
          - name: PORT_NOT_IN_SUSPEND_
            description: Port not in suspend state
            value: 0
          - name: PORT_IN_SUSPEND_STAT
            description: Port in suspend state When in suspend state, downstream propagation of data is blocked on this port, except for port reset. The blocking occurs at the end of the current transaction if a transaction was in progress when this bit was written to 1. In the suspend state, the port is sensitive to resume detection. Note that the bit status does not change until the port is suspended and that there may be a delay in suspending a port if there is a transaction currently in progress on the USB.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: PR
        description: Port reset When software writes a one to this bit the bus-reset sequence as defined in the USB Specification Revision 2.0 is started. This bit will automatically change to zero after the reset sequence is complete. This behavior is different from EHCI where the host controller driver is required to set this bit to a zero after the reset duration is timed in the driver. This bit is 0 if PP (Port Power bit) is 0.
        enumeratedValues:
          - name: PORT_IS_NOT_IN_THE_R
            description: Port is not in the reset state.
            value: 0
          - name: PORT_IS_IN_THE_RESET
            description: Port is in the reset state.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: HSP
        description: High-speed status
        enumeratedValues:
          - name: NO_HISPEED
            description: Host/device connected to the port is not in High-speed mode.
            value: 0
          - name: HISPEED
            description: Host/device connected to the port is in High-speed mode.
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: LS
        description: Line status These bits reflect the current logical levels of the USB_DP and USB_DM signal lines. USB_DP corresponds to bit 11 and USB_DM to bit 10. In host mode, the use of linestate by the host controller driver is not necessary for this controller (unlike EHCI) because the controller hardware manages the connection of LS and FS.
        enumeratedValues:
          - name: SE0
            description: SE0 (USB_DP and USB_DM LOW)
            value: 0
          - name: J_STATE
            description: J-state (USB_DP HIGH and USB_DM LOW)
            value: 1
          - name: K_STATE
            description: K-state (USB_DP LOW and USB_DM HIGH)
            value: 2
          - name: UNDEFINED
            description: Undefined
            value: 3
        bitOffset: 10
        bitWidth: 2
      - name: PP
        description: Port power control Host/OTG controller requires port power control switches. This bit represents the current setting of the switch (0=off, 1=on). When power is not available on a port (i.e. PP equals a 0), the port is non-functional and will not report attaches, detaches, etc. When an over-current condition is detected on a powered port and PPC is a one, the PP bit in each affected port may be transitioned by the host controller driver from a one to a zero (removing power from the port).
        enumeratedValues:
          - name: PORT_POWER_OFF_
            description: Port power off.
            value: 0
          - name: PORT_POWER_ON_
            description: Port power on.
            value: 1
        bitOffset: 12
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 13
        bitWidth: 1
      - name: PIC1_0
        description: Port indicator control Writing to this field effects the value of the pins USB0_IND1 and USB0_IND0.
        enumeratedValues:
          - name: PORT_INDICATORS_ARE_
            description: Port indicators are off.
            value: 0
          - name: AMBER
            description: Amber
            value: 1
          - name: GREEN
            description: Green
            value: 2
          - name: UNDEFINED
            description: Undefined
            value: 3
        bitOffset: 14
        bitWidth: 2
      - name: PTC3_0
        description: Port test control Any value other than 0000 indicates that the port is operating in test mode.  The FORCE_ENABLE_FS and FORCE ENABLE_LS are extensions to the test mode support specified in the EHCI specification. Writing the PTC field to any of the FORCE_ENABLE_{HS/FS/LS} values will force the port into the connected and enabled state at the selected speed. Writing the PTC field back to TEST_MODE_DISABLE will allow the port state machines to progress normally from that point. Values 0x8 to 0xF are reserved.
        enumeratedValues:
          - name: TEST_MODE_DISABLE
            description: TEST_MODE_DISABLE
            value: 0
          - name: J_STATE
            description: J_STATE
            value: 1
          - name: K_STATE
            description: K_STATE
            value: 2
          - name: SE0_NAK
            description: SE0 (host)/NAK (device)
            value: 3
          - name: PACKET
            description: Packet
            value: 4
          - name: FORCE_ENABLE_HS
            description: FORCE_ENABLE_HS
            value: 5
          - name: FORCE_ENABLE_FS
            description: FORCE_ENABLE_FS
            value: 6
          - name: FORCE_ENABLE_LS
            description: FORCE_ENABLE_LS
            value: 7
        bitOffset: 16
        bitWidth: 4
      - name: WKCN
        description: Wake on connect enable (WKCNNT_E) This bit is 0 if PP (Port Power bit) is 0
        enumeratedValues:
          - name: DISABLES_THE_PORT_TO
            description: Disables the port to wake up on device connects.
            value: 0
          - name: WRITING_THIS_BIT_TO_
            description: Writing this bit to a one enables the port to be sensitive to device connects as wake-up events.
            value: 1
        bitOffset: 20
        bitWidth: 1
      - name: WKDC
        description: Wake on disconnect enable (WKDSCNNT_E) This bit is 0 if PP (Port Power bit) is 0.
        enumeratedValues:
          - name: DISABLES_THE_PORT_TO
            description: Disables the port to wake up on device disconnects.
            value: 0
          - name: WRITING_THIS_BIT_TO_
            description: Writing this bit to a one enables the port to be sensitive to device disconnects as wake-up events.
            value: 1
        bitOffset: 21
        bitWidth: 1
      - name: WKOC
        description: Wake on over-current enable (WKOC_E)
        enumeratedValues:
          - name: DISABLES_THE_PORT_TO
            description: Disables the port to wake up on over-current events.
            value: 0
          - name: WRITING_A_ONE_TO_THI
            description: Writing a one to this bit enabled the port to be sensitive to over-current conditions as wake-up events.
            value: 1
        bitOffset: 22
        bitWidth: 1
      - name: PHCD
        description: PHY low power suspend - clock disable (PLPSCD) In host mode, the PHY can be put into Low Power Suspend - Clock Disable when the downstream device has been put into suspend mode or when no downstream device is connected. Low power suspend is completely under the control of software.
        enumeratedValues:
          - name: WRITING_A_0_ENABLES_
            description: Writing a 0 enables the PHY clock. Reading a 0 indicates the status of the PHY clock (enabled).
            value: 0
          - name: WRITING_A_1_DISABLES
            description: Writing a 1 disables the PHY clock. Reading a 1 indicates the status of the PHY clock (disabled).
            value: 1
        bitOffset: 23
        bitWidth: 1
      - name: PFSC
        description: Port force full speed connect
        enumeratedValues:
          - name: PORT_CONNECTS_AT_ANY
            description: Port connects at any speed.
            value: 0
          - name: WRITING_THIS_BIT_TO_
            description: Writing this bit to a 1 will force the port to only connect at Full Speed. It disables the chirp sequence that allows the port to identify itself as High Speed. This is useful for testing FS configurations with a HS host, hub or device.
            value: 1
        bitOffset: 24
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 25
        bitWidth: 1
      - name: PSPD
        description: Port speed This register field indicates the speed at which the port is operating. For HS mode operation in the host controller and HS/FS operation in the device controller the port routing steers data to the Protocol engine. For FS and LS mode operation in the host controller, the port routing steers data to the Protocol Engine w/ Embedded Transaction Translator.
        enumeratedValues:
          - name: FULL_SPEED
            description: Full-speed
            value: 0
          - name: LOW_SPEED
            description: Low-speed
            value: 1
          - name: HIGH_SPEED
            description: High-speed
            value: 2
        bitOffset: 26
        bitWidth: 2
  - name: OTGSC
    description: OTG status and control
    addressOffset: 420
    access: read-write
