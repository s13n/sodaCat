name: WWDT
description: Windowed Watchdog timer (WWDT)
groupName: WWDT
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: MOD
    description: Watchdog mode register. This register contains the basic mode and status of the Watchdog Timer.
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: WDEN
        description: Watchdog enable bit. This bit is Set Only.
        enumeratedValues:
          - name: WWDTSTOPPED
            description: The watchdog timer is stopped.
            value: 0
          - name: WWDTRUN
            description: The watchdog timer is running.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: WDRESET
        description: Watchdog reset enable bit. This bit is Set Only.
        enumeratedValues:
          - name: WWDTINT
            description: A watchdog time-out will not cause a chip reset.
            value: 0
          - name: WWDTRESET
            description: A watchdog time-out will cause a chip reset.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: WDTOF
        description: Watchdog time-out flag. Set when the watchdog timer times out, by a feed error, or by events associated with WDPROTECT, cleared by software. Causes a chip reset if WDRESET = 1. This flag is cleared by software writing a 0 to this bit.
        bitOffset: 2
        bitWidth: 1
      - name: WDINT
        description: Watchdog interrupt flag. Set when the timer reaches the value in the WARNINT register. Cleared by software by writing a 1 to this bit.
        bitOffset: 3
        bitWidth: 1
      - name: WDPROTECT
        description: Watchdog update mode. This bit is Set Only.
        enumeratedValues:
          - name: NO_LOCK
            description: The watchdog time-out value (WDTC) can be changed at any time.
            value: 0
          - name: LOCK
            description: The watchdog time-out value (WDTC) can be changed only after the counter is below the value of WDWARNINT and WDWINDOW.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 5
        bitWidth: 3
  - name: TC
    description: Watchdog timer constant register. This register determines the time-out value.
    addressOffset: 4
    access: read-write
    resetValue: 255
    resetMask: 4294967295
    fields:
      - name: WDTC
        description: Watchdog time-out value.
        bitOffset: 0
        bitWidth: 24
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 24
        bitWidth: 8
  - name: FEED
    description: Watchdog feed sequence register. Writing 0xAA followed by 0x55 to this register reloads the Watchdog timer with the value contained in WDTC.
    addressOffset: 8
    access: write-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: Feed
        description: Feed value should be 0xAA followed by 0x55.
        bitOffset: 0
        bitWidth: 8
  - name: TV
    description: Watchdog timer value register. This register reads out the current value of the Watchdog timer.
    addressOffset: 12
    access: read-only
    resetValue: 255
    resetMask: 4294967295
    fields:
      - name: Count
        description: Counter timer value.
        bitOffset: 0
        bitWidth: 24
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 24
        bitWidth: 8
  - name: WARNINT
    description: Watchdog warning interrupt register. This register contains the Watchdog warning interrupt compare value.
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: WDWARNINT
        description: Watchdog warning interrupt compare value.
        bitOffset: 0
        bitWidth: 10
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 10
        bitWidth: 22
  - name: WINDOW
    description: Watchdog timer window register. This register contains the Watchdog window value.
    addressOffset: 24
    access: read-write
    resetValue: 16777215
    resetMask: 4294967295
    fields:
      - name: WDWINDOW
        description: Watchdog window value.
        bitOffset: 0
        bitWidth: 24
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 24
        bitWidth: 8
addressBlocks:
  - offset: 0
    size: 768
    usage: registers
interrupts:
  - name: INTR
