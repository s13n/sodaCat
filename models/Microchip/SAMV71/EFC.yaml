# Created from ATSAMV71Q21B.svd (Rev 0)

name: EFC
version: 6450Y
description: Embedded Flash Controller
registers:
  - name: EEFC_FMR
    description: EEFC Flash Mode Register
    addressOffset: 0
    size: 32
    fields:
      - name: FRDY
        description: Flash Ready Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: FWS
        description: Flash Wait State
        bitOffset: 8
        bitWidth: 4
      - name: SCOD
        description: Sequential Code Optimization Disable
        bitOffset: 16
        bitWidth: 1
      - name: CLOE
        description: Code Loop Optimization Enable
        bitOffset: 26
        bitWidth: 1
  - name: EEFC_FCR
    description: EEFC Flash Command Register
    addressOffset: 4
    size: 32
    access: write-only
    fields:
      - name: FCMD
        description: Flash Command
        bitOffset: 0
        bitWidth: 8
        enumeratedValues:
          - name: GETD
            description: Get Flash descriptor
            value: 0
          - name: WP
            description: Write page
            value: 1
          - name: WPL
            description: Write page and lock
            value: 2
          - name: EWP
            description: Erase page and write page
            value: 3
          - name: EWPL
            description: Erase page and write page then lock
            value: 4
          - name: EA
            description: Erase all
            value: 5
          - name: EPA
            description: Erase pages
            value: 7
          - name: SLB
            description: Set lock bit
            value: 8
          - name: CLB
            description: Clear lock bit
            value: 9
          - name: GLB
            description: Get lock bit
            value: 10
          - name: SGPB
            description: Set GPNVM bit
            value: 11
          - name: CGPB
            description: Clear GPNVM bit
            value: 12
          - name: GGPB
            description: Get GPNVM bit
            value: 13
          - name: STUI
            description: Start read unique identifier
            value: 14
          - name: SPUI
            description: Stop read unique identifier
            value: 15
          - name: GCALB
            description: Get CALIB bit
            value: 16
          - name: ES
            description: Erase sector
            value: 17
          - name: WUS
            description: Write user signature
            value: 18
          - name: EUS
            description: Erase user signature
            value: 19
          - name: STUS
            description: Start read user signature
            value: 20
          - name: SPUS
            description: Stop read user signature
            value: 21
      - name: FARG
        description: Flash Command Argument
        bitOffset: 8
        bitWidth: 16
      - name: FKEY
        description: Flash Writing Protection Key
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: The 0x5A value enables the command defined by the bits of the register. If the field is written with a different value, the write is not performed and no action is started.
            value: 90
  - name: EEFC_FSR
    description: EEFC Flash Status Register
    addressOffset: 8
    size: 32
    access: read-only
    fields:
      - name: FRDY
        description: Flash Ready Status (cleared when Flash is busy)
        bitOffset: 0
        bitWidth: 1
      - name: FCMDE
        description: Flash Command Error Status (cleared on read or by writing EEFC_FCR)
        bitOffset: 1
        bitWidth: 1
      - name: FLOCKE
        description: Flash Lock Error Status (cleared on read)
        bitOffset: 2
        bitWidth: 1
      - name: FLERR
        description: Flash Error Status (cleared when a programming operation starts)
        bitOffset: 3
        bitWidth: 1
      - name: UECCELSB
        description: Unique ECC Error on LSB Part of the Memory Flash Data Bus (cleared on read)
        bitOffset: 16
        bitWidth: 1
      - name: MECCELSB
        description: Multiple ECC Error on LSB Part of the Memory Flash Data Bus (cleared on read)
        bitOffset: 17
        bitWidth: 1
      - name: UECCEMSB
        description: Unique ECC Error on MSB Part of the Memory Flash Data Bus (cleared on read)
        bitOffset: 18
        bitWidth: 1
      - name: MECCEMSB
        description: Multiple ECC Error on MSB Part of the Memory Flash Data Bus (cleared on read)
        bitOffset: 19
        bitWidth: 1
  - name: EEFC_FRR
    description: EEFC Flash Result Register
    addressOffset: 12
    size: 32
    access: read-only
    fields:
      - name: FVALUE
        description: Flash Result Value
        bitOffset: 0
        bitWidth: 32
  - name: EEFC_WPMR
    description: Write Protection Mode Register
    addressOffset: 228
    size: 32
    fields:
      - name: WPEN
        description: Write Protection Enable
        bitOffset: 0
        bitWidth: 1
      - name: WPKEY
        description: Write Protection Key
        bitOffset: 8
        bitWidth: 24
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.Always reads as 0.
            value: 4539971
interrupts:
  - name: INT
    description: Enhanced Embedded Flash Controller
addressBlocks:
  - offset: 0
    size: 232
    usage: registers
