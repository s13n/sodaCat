        bitWidth: 1
      - name: OT
        description: OTG termination This bit must be set to 1 when the OTG controller is in device mode. This controls the pull-down on USB_DM.
        bitOffset: 3
        bitWidth: 1
      - name: DP
        description: Data pulsing Setting this bit to 1 causes the pull-up on USB_DP to be asserted for data pulsing during SRP.
        bitOffset: 4
        bitWidth: 1
      - name: IDPU
        description: ID pull-up. This bit provides control over the pull-up resistor.
        enumeratedValues:
          - name: PULL_UP_OFF_THE_ID_
            description: Pull-up off. The ID bit will not be sampled.
            value: 0
          - name: PULL_UP_ON_
            description: Pull-up on.
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: HADP
        description: Hardware assist data pulse Write a 1 to start data pulse sequence.
        bitOffset: 6
        bitWidth: 1
      - name: HABA
        description: Hardware assist B-disconnect to A-connect
        enumeratedValues:
          - name: DISABLED_
            description: Disabled.
            value: 0
          - name: ENABLE_AUTOMATIC_B_D
            description: Enable automatic B-disconnect to A-connect sequence.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: ID
        description: USB ID
        enumeratedValues:
          - name: A_DEVICE
            description: A-device
            value: 0
          - name: B_DEVICE
            description: B-device
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: AVV
        description: A-VBUS valid Reading 1 indicates that VBUS is above the A-VBUS valid threshold.
        bitOffset: 9
        bitWidth: 1
      - name: ASV
        description: A-session valid Reading 1 indicates that VBUS is above the A-session valid threshold.
        bitOffset: 10
        bitWidth: 1
      - name: BSV
        description: B-session valid Reading 1 indicates that VBUS is above the B-session valid threshold.
        bitOffset: 11
        bitWidth: 1
      - name: BSE
        description: B-session end Reading 1 indicates that VBUS is below the B-session end threshold.
        bitOffset: 12
        bitWidth: 1
      - name: MS1T
        description: 1 millisecond timer toggle This bit toggles once per millisecond.
        bitOffset: 13
        bitWidth: 1
      - name: DPS
        description: Data bus pulsing status Reading a 1 indicates that data bus pulsing is detected on the port.
        bitOffset: 14
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 15
        bitWidth: 1
      - name: IDIS
        description: USB ID interrupt status This bit is set when a change on the ID input has been detected. Software must write a 1 to this bit to clear it.
        bitOffset: 16
        bitWidth: 1
      - name: AVVIS
        description: A-VBUS valid interrupt status This bit is set then VBUS has either risen above or fallen below the A-VBUS valid threshold (4.4 V on an A-device). Software must write a 1 to this bit to clear it.
        bitOffset: 17
        bitWidth: 1
      - name: ASVIS
        description: A-Session valid interrupt status This bit is set then VBUS has either risen above or fallen below the A-session valid threshold (0.8 V).  Software must write a 1 to this bit to clear it.
        bitOffset: 18
        bitWidth: 1
      - name: BSVIS
        description: B-Session valid interrupt status This bit is set then VBUS has either risen above or fallen below the B-session valid threshold (0.8 V). Software must write a 1 to this bit to clear it.
        bitOffset: 19
        bitWidth: 1
      - name: BSEIS
        description: B-Session end interrupt status This bit is set then VBUS has fallen below the B-session end threshold.  Software must write a 1 to this bit to clear it.
        bitOffset: 20
        bitWidth: 1
      - name: ms1S
        description: 1 millisecond timer interrupt status This bit is set once every millisecond. Software must write a 1 to this bit to clear it.
        bitOffset: 21
        bitWidth: 1
      - name: DPIS
        description: Data pulse interrupt status This bit is set when data bus pulsing occurs on DP or DM. Data bus pulsing is only detected when the CM bit in USBMODE = Host (11) and the PortPower bit in PORTSC = Off (0). Software must write a 1 to this bit to clear it.
        bitOffset: 22
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 23
        bitWidth: 1
      - name: IDIE
        description: USB ID interrupt enable Setting this bit enables the interrupt. Writing a 0 disables the interrupt.
        bitOffset: 24
        bitWidth: 1
      - name: AVVIE
        description: A-VBUS valid interrupt enable Setting this bit enables the A-VBUS valid interrupt. Writing a 0 disables the interrupt.
        bitOffset: 25
        bitWidth: 1
      - name: ASVIE
        description: A-session valid interrupt enable Setting this bit enables the A-session valid interrupt. Writing a 0 disables the interrupt
        bitOffset: 26
        bitWidth: 1
      - name: BSVIE
        description: B-session valid interrupt enable Setting this bit enables the B-session valid interrupt. Writing a 0 disables the interrupt.
        bitOffset: 27
        bitWidth: 1
      - name: BSEIE
        description: B-session end interrupt enable Setting this bit enables the B-session end interrupt. Writing a 0 disables the interrupt.
        bitOffset: 28
        bitWidth: 1
      - name: MS1E
        description: 1 millisecond timer interrupt enable Setting this bit enables the 1 millisecond timer interrupt. Writing a 0 disables the interrupt.
        bitOffset: 29
        bitWidth: 1
      - name: DPIE
        description: Data pulse interrupt enable Setting this bit enables the data pulse interrupt. Writing a 0 disables the interrupt
        bitOffset: 30
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 31
        bitWidth: 1
  - name: USBMODE_D
    description: Device mode (device mode)
    addressOffset: 424
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CM1_0
        description: Controller mode The controller defaults to an idle state and needs to be initialized to the desired operating mode after reset. This register can only be written once after reset. If it is necessary to switch modes, software must reset the controller by writing to the RESET bit in the USBCMD register before reprogramming this register.
        enumeratedValues:
          - name: IDLE
            description: Idle
            value: 0
          - name: RESERVED
            description: Reserved
            value: 1
          - name: DEVICE_CONTROLLER
            description: Device controller
            value: 2
          - name: HOST_CONTROLLER
            description: Host controller
            value: 3
        bitOffset: 0
        bitWidth: 2
      - name: ES
        description: Endian select This bit can change the byte ordering of the transfer buffers to match the host microprocessor bus architecture. The bit fields in the microprocessor interface and the DMA data structures (including the setup buffer within the device QH) are unaffected by the value of this bit, because they are based upon 32-bit words.
        enumeratedValues:
          - name: LITTLE_ENDIAN_FIRST
            description: 'Little endian: first byte referenced in least significant byte of 32-bit word.'
            value: 0
          - name: BIG_ENDIAN_FIRST_BY
            description: 'Big endian: first byte referenced in most significant byte of 32-bit word.'
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: SLOM
        description: Setup Lockout mode In device mode, this bit controls behavior of the setup lock mechanism. See Section 18.10.8.
        enumeratedValues:
          - name: SETUP_LOCKOUTS_ON
            description: Setup Lockouts on
            value: 0
          - name: SETUP_LOCKOUTS_OFF
            description: Setup Lockouts Off (DCD requires the use of Setup Buffer Tripwire in USBCMD)
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: SDIS
        description: Stream disable mode  The use of this feature substantially limits the overall USB performance that can be achieved.
        enumeratedValues:
          - name: NOT_DISABLED
            description: Not disabled
            value: 0
          - name: DISABLED_SETTING_TH
            description: 'Disabled. Setting this bit to one disables double priming on both RX and TX for low bandwidth systems. This mode ensures that when the RX and TX buffers are sufficient to contain an entire packet that the standard double buffering scheme is disabled to prevent overruns/underruns in bandwidth limited systems. Note: In High Speed Mode, all packets received will be responded to with a NYET handshake when stream disable is active.'
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: Not used in device mode.
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 6
        bitWidth: 26
  - name: USBMODE_H
    description: Mode (host mode)
    alternateRegister: USBMODE_D
    addressOffset: 424
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CM
        description: Controller mode The controller defaults to an idle state and needs to be initialized to the desired operating mode after reset. This register can only be written once after reset. If it is necessary to switch modes, software must reset the controller by writing to the RESET bit in the USBCMD register before reprogramming this register.
        enumeratedValues:
          - name: IDLE
            description: Idle
            value: 0
          - name: RESERVED
            description: Reserved
            value: 1
          - name: DEVICE_CONTROLLER
            description: Device controller
            value: 2
          - name: HOST_CONTROLLER
            description: Host controller
            value: 3
        bitOffset: 0
        bitWidth: 2
      - name: ES
        description: Endian select This bit can change the byte ordering of the transfer buffers. The bit fields in the microprocessor interface and the DMA data structures (including the setup buffer within the device QH) are unaffected by the value of this bit, because they are based upon 32-bit words.
        enumeratedValues:
          - name: LITTLE_ENDIAN_FIRST
            description: 'Little endian: first byte referenced in least significant byte of 32-bit word.'
            value: 0
          - name: BIG_ENDIAN_FIRST_BY
            description: 'Big endian: first byte referenced in most significant byte of 32-bit word.'
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: RESERVED
        description: Not used in host mode
        bitOffset: 3
        bitWidth: 1
      - name: SDIS
        description: Stream disable mode  The use of this feature substantially limits the overall USB performance that can be achieved.
        enumeratedValues:
          - name: NOT_DISABLED
            description: Not disabled
            value: 0
          - name: DISABLED_SETTING_TO
            description: 'Disabled. Setting to a 1 ensures that overruns/underruns of the latency FIFO are eliminated for low bandwidth systems where the RX and TX buffers are sufficient to contain the entire packet. Enabling stream disable also has the effect of ensuring the the TX latency is filled to capacity before the packet is launched onto the USB. Note: Time duration to pre-fill the FIFO becomes significant when stream disable is active. See TXFILLTUNING to characterize the adjustments needed for the scheduler when using this feature.'
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: VBPS
        description: VBUS power select
        enumeratedValues:
          - name: LOW
            description: vbus_pwr_select is set LOW.
            value: 0
          - name: HIGH
            description: vbus_pwr_select is set HIGH
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 6
        bitWidth: 26
  - name: ENDPTSETUPSTAT
    description: Endpoint setup status
    addressOffset: 428
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: ENDPTSETUPSTAT0
        description: Setup endpoint status for logical endpoints 0 to 5. For every setup transaction that is received, a corresponding bit in this register is set to one. Software must clear or acknowledge the setup transfer by writing a one to a respective bit after it has read the setup data from Queue head. The response to a setup packet as in the order of operations and total response time is crucial to limit bus time outs while the setup lockout mechanism is engaged.
        bitOffset: 0
        bitWidth: 1
      - name: ENDPTSETUPSTAT1
        description: Setup endpoint status for logical endpoints 0 to 5. For every setup transaction that is received, a corresponding bit in this register is set to one. Software must clear or acknowledge the setup transfer by writing a one to a respective bit after it has read the setup data from Queue head. The response to a setup packet as in the order of operations and total response time is crucial to limit bus time outs while the setup lockout mechanism is engaged.
        bitOffset: 1
