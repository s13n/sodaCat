name: USART
version: 6089ZW
description: Universal synchronous/asynchronous receiver/transmitter
groupName: USART
prependToName: USART_
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: US_CR_USART_MODE
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: RSTRX
        description: Reset Receiver
        bitOffset: 2
        bitWidth: 1
      - name: RSTTX
        description: Reset Transmitter
        bitOffset: 3
        bitWidth: 1
      - name: RXEN
        description: Receiver Enable
        bitOffset: 4
        bitWidth: 1
      - name: RXDIS
        description: Receiver Disable
        bitOffset: 5
        bitWidth: 1
      - name: TXEN
        description: Transmitter Enable
        bitOffset: 6
        bitWidth: 1
      - name: TXDIS
        description: Transmitter Disable
        bitOffset: 7
        bitWidth: 1
      - name: RSTSTA
        description: Reset Status Bits
        bitOffset: 8
        bitWidth: 1
      - name: STTBRK
        description: Start Break
        bitOffset: 9
        bitWidth: 1
      - name: STPBRK
        description: Stop Break
        bitOffset: 10
        bitWidth: 1
      - name: STTTO
        description: Clear TIMEOUT Flag and Start Timeout After Next Character Received
        bitOffset: 11
        bitWidth: 1
      - name: SENDA
        description: Send Address
        bitOffset: 12
        bitWidth: 1
      - name: RSTIT
        description: Reset Iterations
        bitOffset: 13
        bitWidth: 1
      - name: RSTNACK
        description: Reset Non Acknowledge
        bitOffset: 14
        bitWidth: 1
      - name: RETTO
        description: Start Timeout Immediately
        bitOffset: 15
        bitWidth: 1
      - name: DTREN
        description: Data Terminal Ready Enable
        bitOffset: 16
        bitWidth: 1
      - name: DTRDIS
        description: Data Terminal Ready Disable
        bitOffset: 17
        bitWidth: 1
      - name: RTSEN
        description: Request to Send Enable
        bitOffset: 18
        bitWidth: 1
      - name: RTSDIS
        description: Request to Send Disable
        bitOffset: 19
        bitWidth: 1
  - name: US_CR_SPI_MODE
    description: Control Register
    alternateRegister: US_CR_USART_MODE
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: RSTRX
        description: Reset Receiver
        bitOffset: 2
