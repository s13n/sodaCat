name: NPX
description: NPX
groupName: NPX
source: MCXN947/MCXN947_cm33_core0.xml v1.0 (MCUX_2.16.100)
registers:
  - name: NPXCR
    description: Control Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GEE
        description: Global Encryption Enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: ENCRYPTION_DISABLED
            description: Global encryption disabled. NPX on-the-fly encryption is disabled. Subsequent reads return 0.
            value: 0
          - name: ENCRYPTION_ENABLED
            description: Global encryption enabled. NPX on-the-fly encryption is enabled if the flash access hits in a valid memory context. Subsequent reads return 1.
            value: 1
      - name: GDE
        description: Global Decryption Enable
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DECRYPTION_DISABLED
            description: Global decryption disabled. NPX on-the-fly decryption is globally disabled. Subsequent reads return 0.
            value: 0
          - name: DECRYPTION_ENABLED
            description: Global decryption enabled. NPX on-the-fly decryption is globally enabled. Subsequent reads return 1.
            value: 1
      - name: GLK
        description: Global Lock Enable
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: LOCK_DISABLED
            description: Lock disabled. Subsequent reads return 0.
            value: 0
          - name: LOCK_ENABLED
            description: 'Lock enabled: cannot write to VMAPCTXn, NPXCR, or CACMSK. Subsequent reads return 1.'
            value: 1
      - name: MLK
        description: Mask Lock Enable
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: LOCK_DISABLED
            description: Lock disabled. Subsequent reads return 0.
            value: 0
          - name: LOCK_ENABLED
            description: 'Lock enabled: cannot write to mask. Subsequent reads return 1.'
            value: 1
      - name: CTX0LK
        description: Lock Enable for Context 0
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: LOCK_DISABLED
            description: 'Lock disabled: VMAPCTX0 remains read-write'
            value: 0
          - name: LOCK_ENABLED
            description: 'Lock enabled: cannot write to VMAPCTX0 (becomes read-only)'
            value: 1
      - name: CTX1LK
        description: Lock Enable for Context 1
        bitOffset: 10
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: LOCK_DISABLED
            description: 'Lock disabled: VMAPCTX1 remains read-write'
            value: 0
          - name: LOCK_ENABLED
            description: 'Lock enabled: cannot write to VMAPCTX1 (becomes read-only)'
            value: 1
      - name: CTX2LK
        description: Lock Enable for Context 2
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
