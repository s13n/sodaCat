name: VREFBUF
description: Voltage reference buffer
groupName: VREFBUF
source: STM32N645 SVD v1.0
params:
  - name: vrs_wide
    type: bool
    default: true
    description: 'VRS field layout: true = 3-bit at [6:4] (4 scales), false = 1-bit at [2] (2 scales)'
registers:
  - name: CSR
    displayName: CSR
    description: Control and status register
    addressOffset: 0
    size: 32
    resetValue: 2
    resetMask: 4294967295
    fields:
      - name: ENVR
        description: Voltage reference buffer mode enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Internal voltage reference mode disable (external voltage reference mode).
            value: 0
          - name: B_0x1
            description: Internal voltage reference mode (reference buffer enable or hold mode) enable.
            value: 1
      - name: HIZ
        description: High impedance mode
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: V less than sub>REF+ less than /sub> pin is internally connected to the voltage reference buffer output.
            value: 0
          - name: B_0x1
            description: V less than sub>REF+ less than /sub> pin is high impedance.
            value: 1
      - name: VRR
        description: Voltage reference buffer ready
        bitOffset: 3
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: the voltage reference buffer output is not ready.
            value: 0
          - name: B_0x1
            description: the voltage reference buffer output reached the requested level.
            value: 1
      - name: VRS
        description: Voltage reference scale
        bitOffset: 4
        bitWidth: 3
        access: read-write
  - name: CSR_V1
    displayName: CSR_V1
    description: Control and status register
    addressOffset: 0
    size: 32
    resetValue: 2
    resetMask: 4294967295
    fields:
      - name: ENVR
        description: Voltage reference buffer mode enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Internal voltage reference mode disable (external voltage reference mode).
            value: 0
          - name: B_0x1
            description: Internal voltage reference mode (reference buffer enable or hold mode) enable.
            value: 1
      - name: HIZ
        description: High impedance mode
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: V less than sub>REF+ less than /sub> pin is internally connected to the voltage reference buffer output.
            value: 0
          - name: B_0x1
            description: V less than sub>REF+ less than /sub> pin is high impedance.
            value: 1
      - name: VRR
        description: Voltage reference buffer ready
        bitOffset: 3
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: B_0x0
            description: the voltage reference buffer output is not ready.
            value: 0
          - name: B_0x1
            description: the voltage reference buffer output reached the requested level.
            value: 1
      - name: VRS
        description: Voltage reference scale
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - {name: B_0x0, description: Voltage reference set to VREF_OUT1 (around 2.048 V)., value: 0}
          - {name: B_0x1, description: Voltage reference set to VREF_OUT2 (around 2.5 V)., value: 1}
  - name: CCR
    displayName: CCR
    description: Calibration control register
    addressOffset: 4
    size: 32
    resetValue: 0
    resetMask: 4294967040
    fields:
      - name: TRIM
        description: Trimming code
        bitOffset: 0
        bitWidth: 6
        access: read-write
addressBlocks:
  - offset: 0
    size: 8
    usage: registers
