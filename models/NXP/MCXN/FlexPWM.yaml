        bitOffset: 12
        bitWidth: 1
        access: read-write
      - name: INDEP
        description: Independent or Complementary Pair Operation
        bitOffset: 13
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: COMPLEMENTARY
            description: PWM_A and PWM_B form a complementary PWM pair.
            value: 0
          - name: INDEPENDENT
            description: PWM_A and PWM_B outputs are independent PWMs.
            value: 1
      - name: DBGEN
        description: Debug Enable
        bitOffset: 15
        bitWidth: 1
        access: read-write
  - name: SM0CTRL
    description: Control Register
