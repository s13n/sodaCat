      - name: EXDEF
        description: Excessive Deferral
        bitOffset: 3
        bitWidth: 1
        access: read-write
      - name: LCOL
        description: Late Collision
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: EXCOL
        description: Excessive Collisions
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: RWT
        description: Receive Watchdog Timeout
        bitOffset: 8
        bitWidth: 1
        access: read-write
  - name: MACPCSR
    displayName: MACPCSR
    description: PMT control status register
    addressOffset: 192
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PWRDWN
        description: Power Down
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: MGKPKTEN
        description: Magic Packet Enable
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: RWKPKTEN
        description: Remote wake-up Packet Enable
        bitOffset: 2
        bitWidth: 1
        access: read-write
      - name: MGKPRCVD
        description: Magic Packet Received
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: RWKPRCVD
        description: Remote wake-up Packet Received
        bitOffset: 6
        bitWidth: 1
        access: read-only
      - name: GLBLUCAST
        description: Global Unicast
        bitOffset: 9
        bitWidth: 1
        access: read-write
      - name: RWKPFE
        description: Remote wake-up Packet Forwarding Enable
        bitOffset: 10
        bitWidth: 1
        access: read-write
      - name: RWKPTR
        description: Remote wake-up FIFO Pointer
        bitOffset: 24
        bitWidth: 5
        access: read-only
      - name: RWKFILTRST
        description: Remote Wake-up Packet Filter Register Pointer Reset
        bitOffset: 31
        bitWidth: 1
        access: read-write
  - name: MACRWKPFR
    displayName: MACRWKPFR
    description: Remote wake-up packet filter register
    addressOffset: 196
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
