name: DRMTCM
version: 037701a0
description: Data RAM TCM controller
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: CTRLA
    description: CONTROL ENABLE REGISTER A
    addressOffset: 0
    size: 32
    resetValue: 2
    fields:
      - name: SWRST
        description: DRMTCM Software Reset
        bitOffset: 0
        bitWidth: 1
      - name: ENABLE
        description: DRMTCM ECC Enable (ON) bit (default ECC is always enabled)
        bitOffset: 1
        bitWidth: 1
  - name: CTRLB
    description: CONTROL ENABLE REGISTER B
    addressOffset: 4
    size: 32
    resetValue: 460551
    fields:
      - name: IERRCNT
        description: ITCM ERROR MAXIMUM COUNT (default 0x7)
        bitOffset: 0
        bitWidth: 8
      - name: D0ERRCNT
        description: D0TCM ERROR MAXIMUM COUNT (default 0x7)
        bitOffset: 8
        bitWidth: 8
      - name: D1ERRCNT
        description: D1TCM ERROR MAXIMUM COUNT (default 0x7)
        bitOffset: 16
        bitWidth: 8
      - name: IWAITSTEN
        description: ITCM ONE WAIT STATE ENABLE BIT
        bitOffset: 24
        bitWidth: 1
      - name: DWAITSTEN
        description: D1TCM and D0TCM ONE WAIT STATE ENABLE BIT
        bitOffset: 25
        bitWidth: 1
      - name: IERCNTDIS
        description: ITCM ERROR COUNTER DISABLE BIT
        bitOffset: 28
        bitWidth: 1
      - name: D0ERCNTDIS
        description: D0TCM ERROR COUNTER DISABLE BIT
        bitOffset: 29
        bitWidth: 1
      - name: D1ERCNTDIS
        description: D1TCM ERROR COUNTER DISABLE BIT
        bitOffset: 30
        bitWidth: 1
  - name: SYNCBUSY
    description: SYNC BUSY REGISTER
    addressOffset: 8
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SWRST
        description: Software reset busy bit   --- Synchronizing Busy bit for SWRST
        bitOffset: 0
        bitWidth: 1
      - name: FLTEN
        description: Fault Injection Enabled busy bit   --- Synchronizing Busy bit for FLTEN register (when hard-ware set this bit, no writes are allowed to the FLTCTRL register until after the synchronizing is not busy).
        bitOffset: 1
        bitWidth: 1
  - name: INTENCLR
    description: INTERRUPT ENABLE CLR REGISTER
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: ISERREN
        description: ITCM Single Bit Error Detection Flag bit Disable
        bitOffset: 0
        bitWidth: 1
      - name: IDERREN
        description: ITCM Double Bit Error Detection Flag bit Disable
        bitOffset: 1
        bitWidth: 1
      - name: IECCECNTEN
        description: ITCM ECC Error Count Flag bit Disable
        bitOffset: 2
        bitWidth: 1
      - name: D0SERREN
        description: D0TCM Single Bit Error Detection Flag bit Disable
        bitOffset: 8
        bitWidth: 1
      - name: D0DERREN
        description: D0TCM Double Bit Error Detection Flag bit Disable
        bitOffset: 9
        bitWidth: 1
      - name: D0ECCECNTEN
        description: D0TCM ECC Error Count Flag bit Disable
        bitOffset: 10
        bitWidth: 1
      - name: D1SERREN
        description: D1TCM Single Bit Error Detection Flag bit Disable
        bitOffset: 16
        bitWidth: 1
      - name: D1DERREN
        description: D1TCM Double Bit Error Detection Flag bit Disable
        bitOffset: 17
        bitWidth: 1
      - name: D1ECCECNTEN
        description: D1TCM ECC Error Count Flag bit Disable
        bitOffset: 18
        bitWidth: 1
      - name: FLTCAPEN
        description: Fault Capture interrupt enable bit Disable
        bitOffset: 24
        bitWidth: 1
  - name: INTENSET
    description: INTERRUPT ENABLE SET REGISTER
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: ISERREN
        description: ITCM Single Bit Error Detection Flag bit Enable
        bitOffset: 0
        bitWidth: 1
      - name: IDERREN
        description: ITCM Double Bit Error Detection Flag bit Enable
        bitOffset: 1
        bitWidth: 1
      - name: IECCECNTEN
        description: ITCM ECC Error Count Flag bit Enable
        bitOffset: 2
        bitWidth: 1
      - name: D0SERREN
        description: D0TCM Single Bit Error Detection Flag bit Enable
        bitOffset: 8
        bitWidth: 1
      - name: D0DERREN
        description: D0TCM Double Bit Error Detection Flag bit Enable
        bitOffset: 9
        bitWidth: 1
      - name: D0ECCECNTEN
        description: D0TCM ECC Error Count Flag bit Enable
        bitOffset: 10
        bitWidth: 1
      - name: D1SERREN
        description: D1TCM Single Bit Error Detection Flag bit Enable
        bitOffset: 16
        bitWidth: 1
      - name: D1DERREN
        description: D1TCM Double Bit Error Detection Flag bit Enable
        bitOffset: 17
        bitWidth: 1
      - name: D1ECCECNTEN
        description: D1TCM ECC Error Count Flag bit Enable
        bitOffset: 18
        bitWidth: 1
      - name: FLTCAPEN
        description: Fault Capture interrupt enable bit Enable
        bitOffset: 24
        bitWidth: 1
  - name: INTFLAG
    description: INTERRUPT FLAG REGISTER
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: ISERR
        description: ITCM Single Bit Error Detection Flag
        bitOffset: 0
        bitWidth: 1
      - name: IDERR
        description: ITCM Double Bit Error Detection Flag
        bitOffset: 1
        bitWidth: 1
      - name: IECCECNT
        description: ITCM ECC Error Count Flag
        bitOffset: 2
        bitWidth: 1
      - name: D0SERR
        description: D0TCM Single Bit Error Detection Flag
        bitOffset: 8
        bitWidth: 1
      - name: D0DERR
        description: D0TCM Double Bit Error Detection Flag
        bitOffset: 9
        bitWidth: 1
      - name: D0ECCECNT
        description: D0TCM ECC Error Count Flag
        bitOffset: 10
        bitWidth: 1
      - name: D1SERR
        description: D1TCM Single Bit Error Detection Flag
        bitOffset: 16
        bitWidth: 1
      - name: D1DERR
        description: D1TCM Double Bit Error Detection Flag
        bitOffset: 17
        bitWidth: 1
      - name: D1ECCECNT
        description: D1TCM ECC Error Count Flag
        bitOffset: 18
        bitWidth: 1
      - name: FLTCAP
        description: Fault Capture interrupt
        bitOffset: 24
        bitWidth: 1
  - name: FLTCTRL
    description: FAULT INJECTION CONTROL REGISTER
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: FLTEN
        description: Fault Injection Enabled
        bitOffset: 1
        bitWidth: 1
      - name: FLTMD
        description: Fault Mode Control
        bitOffset: 12
        bitWidth: 2
  - name: IFLTPTR
    description: ITCM FAULT INJECTION POINTER REGISTER
    addressOffset: 28
    size: 32
    resetValue: 0
    fields:
      - name: FLT1PTR
        description: ECC Fault injection Bit position pointer (for single bit error).
        bitOffset: 0
        bitWidth: 7
      - name: FLT2PTR
        description: ECC Fault injection Bit position pointer (for double bit error).
        bitOffset: 16
        bitWidth: 7
  - name: IFLTADR
    description: ITCM FAULT INJECTION ADDRESS REGISTER
    addressOffset: 32
    size: 32
    resetValue: 0
    fields:
      - name: IFLTADR
        description: Instruction ITCM ECC Fault Injection, Address Match Com-pare bits.
        bitOffset: 0
        bitWidth: 17
  - name: IFLTCAP
    description: ITCM FAULT ERROR CAPTURE ADDRESS REGISTER
    addressOffset: 36
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: FLTADR
        description: Instruction TCM ECC Fault Address bits which caused the ECC Error.
        bitOffset: 0
        bitWidth: 17
      - name: ITCMMASTER
        description: Master ID of the requester of the current Error access.
        bitOffset: 28
        bitWidth: 4
  - name: IFLTPAR
    description: ITCM FAULT PARITY REGISTER
    addressOffset: 40
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECIN
        description: Single Error Parity Bits from ITCM
        bitOffset: 0
        bitWidth: 8
  - name: IFLTSYN
    description: ITCM FAULT ECC SYNDROME REGISTER
    addressOffset: 44
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECSYN
        description: Single Error Syndrome
        bitOffset: 0
        bitWidth: 8
      - name: ERR1
        description: Single Bit Error
        bitOffset: 14
        bitWidth: 1
      - name: ERR2
        description: Double bit Error
        bitOffset: 15
        bitWidth: 1
  - name: DFLTPTR
    description: DTCM FAULT INJECTION POINTER REGISTER
    addressOffset: 48
    size: 32
    resetValue: 0
    fields:
      - name: FLT1PTR
        description: ECC Fault injection Bit position pointer (for single bit error).
        bitOffset: 0
        bitWidth: 6
      - name: FLT2PTR
        description: ECC Fault injection Bit position pointer (for double bit error).
        bitOffset: 16
        bitWidth: 6
  - name: DFLTADR
    description: DTCM FAULT INJECTION ADDRESS REGISTER
    addressOffset: 52
    size: 32
    resetValue: 0
    fields:
      - name: FLTADR
        description: Data TCM ECC Fault Injection, Address Match Compare bits.
        bitOffset: 0
        bitWidth: 17
      - name: D1D0EN
        description: Fault Injection D1 or D0 Address Enable.
        bitOffset: 31
        bitWidth: 1
  - name: D0FLTCAP
    description: D0TCM FAULT ERROR CAPTURE ADDRESS REGISTER
    addressOffset: 56
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: FLTADR
        description: Data 0 TCM ECC Fault Address bits which caused the ECC Error.
        bitOffset: 0
        bitWidth: 17
      - name: TCMMASTER
        description: Master ID of the requester of the current Error access.
        bitOffset: 28
        bitWidth: 4
  - name: D0FLTPAR
    description: D0TCM FAULT PARITY REGISTER
    addressOffset: 60
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECIN
        description: Single Error Parity Bits from D0TCM
        bitOffset: 0
        bitWidth: 7
  - name: D0FLTSYN
    description: D0TCM FAULT ECC SYNDROME REGISTER
    addressOffset: 64
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECSYN
        description: Single Error Syndrome
        bitOffset: 0
        bitWidth: 7
      - name: ERR1
        description: Single Bit Error
        bitOffset: 14
        bitWidth: 1
      - name: ERR2
        description: Double bit Error
        bitOffset: 15
        bitWidth: 1
  - name: D1FLTCAP
    description: D1TCM FAULT ERROR CAPTURE ADDRESS REGISTER
    addressOffset: 68
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: FLTADR
        description: Data 1 TCM ECC Fault Address bits which caused the ECC Error.
        bitOffset: 0
        bitWidth: 17
      - name: D1TCMMASTER
        description: Master ID of the requester of the current Error access.
        bitOffset: 28
        bitWidth: 4
  - name: D1FLTPAR
    description: D1TCM FAULT PARITY REGISTER
    addressOffset: 72
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECIN
        description: Single Error Parity Bits from D1TCM
        bitOffset: 0
        bitWidth: 7
  - name: D1FLTSYN
    description: D1TCM FAULT ECC SYNDROME REGISTER
    addressOffset: 76
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SECSYN
        description: Single Error Syndrome
        bitOffset: 0
        bitWidth: 7
      - name: ERR1
        description: Single Bit Error
        bitOffset: 14
        bitWidth: 1
      - name: ERR2
        description: Double bit Error
        bitOffset: 15
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 80
    usage: registers
interrupts:
  - name: INT
    description: TCM RAM ECC Interrupt
