  # --- Per-peripheral bus-clock outputs (CLKMSK gates).
  # Naming convention follows the RM Peripheral-Clock-Default-State table on
  # DS60001749G p.308–309: CLK_<peripheral>_<bus> where <bus> ∈ {AHB, APB}.
  # For peripherals that listed both an AHB and an APB mask bit but the RM
  # didn't explicitly suffix them, the lower bit number is taken as AHB and
  # the next as APB (consistent with the explicitly-suffixed pairs in
  # CLKMSK2: SDHCx, EBI, MLB).  Single-bit peripherals are assumed APB
  # unless the RM names them otherwise.
  # CLKMSK0 → CPU domain, with five exceptions (PM/SUPC/RSTC/OSC32KCTRL/
  # RTC) which the RM lists as Backup domain on p.309.
  - { name: clk_dsu_ahb,        description: "CLKMSK0[0]  — DSU AHB clock" }
  - { name: clk_dsu_apb,        description: "CLKMSK0[1]  — DSU APB clock" }
  - { name: clk_fcw_ahb,        description: "CLKMSK0[2]  — Flash Controller-Write AHB clock" }
  - { name: clk_fcw_apb,        description: "CLKMSK0[3]  — Flash Controller-Write APB clock" }
  - { name: clk_fcr_ahb,        description: "CLKMSK0[4]  — Flash Controller-Read AHB clock" }
  - { name: clk_fcr_apb,        description: "CLKMSK0[5]  — Flash Controller-Read APB clock" }
  - { name: clk_pm_apb,         description: "CLKMSK0[6]  — Power Manager APB clock (Backup domain)" }
  - { name: clk_supc_apb,       description: "CLKMSK0[7]  — Supply Controller APB clock (Backup domain)" }
  - { name: clk_rstc_apb,       description: "CLKMSK0[8]  — Reset Controller APB clock (Backup domain)" }
  - { name: clk_oscctrl_apb,    description: "CLKMSK0[9]  — OSCCTRL APB clock" }
  - { name: clk_osc32kctrl_apb, description: "CLKMSK0[10] — OSC32KCTRL APB clock (Backup domain)" }
  # CLKMSK0 bits 11, 12 reserved (must be set to 1)
  - { name: clk_freqm_apb,      description: "CLKMSK0[13] — Frequency Meter APB clock" }
  - { name: clk_wdt_apb,        description: "CLKMSK0[14] — Watchdog Timer APB clock" }
  - { name: clk_rtc_apb,        description: "CLKMSK0[15] — RTC APB clock (Backup domain)" }
  - { name: clk_eic_apb,        description: "CLKMSK0[16] — External Interrupt Controller APB clock" }
  - { name: clk_pac_ahb,        description: "CLKMSK0[17] — Peripheral Access Controller AHB clock" }
  - { name: clk_pac_apb,        description: "CLKMSK0[18] — Peripheral Access Controller APB clock" }
  - { name: clk_drmtcm_apb,     description: "CLKMSK0[19] — DRMTCM (Tightly-Coupled Memory) APB clock" }
  - { name: clk_mcramc_apb,     description: "CLKMSK0[20] — MCRAMC APB clock" }
  - { name: clk_tram_apb,       description: "CLKMSK0[21] — TrustRAM APB clock" }
  - { name: clk_port_ahb,       description: "CLKMSK0[22] — PORT (GPIO) AHB clock" }
