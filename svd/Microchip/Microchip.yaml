        interrupts:
          GMAC: INT
          GMAC_Q1: Q1
          GMAC_Q2: Q2
          GMAC_Q3: Q3
          GMAC_Q4: Q4
          GMAC_Q5: Q5

      GPBR:
        uses: GPBR
        instances: [GPBR]

      HSMCI:
        uses: HSMCI
        instances: [HSMCI]
        interrupts:
          HSMCI: INT

      I2SC:
