  - name: REGMODE
    description: Match/capture registers mode register
    addressOffset: 76
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: REGMOD_L
        description: Each bit controls one pair of match/capture registers (register 0 = bit 0, register 1 = bit 1,..., register 15 = bit 15).  0 = registers operate as match registers. 1 = registers operate as capture registers.
        bitOffset: 0
        bitWidth: 16
      - name: REGMOD_H
        description: Each bit controls one pair of match/capture registers (register 0 = bit 16, register 1 = bit 17,..., register 15 = bit 31). 0 = registers operate as match registers. 1 = registers operate as capture registers.
        bitOffset: 16
