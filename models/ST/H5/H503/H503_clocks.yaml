      reg: CR
      field: HSIKERON

  - name: CSIKERON
    description: CSI kernel clock enable for Stop mode
    input: csi_ck
    output: csi_ker_ck
    control:
      reg: CR
      field: CSIKERON

  # --- PLL output enable gates ---
