name: DMA2D
description: Chrom-Art Accelerator controller
groupName: DMA2D
source: STM32H7S SVD v1.3
params:
  - name: gen
    type: int
    default: 0
    max: 3
    description: 'DMA2D generation: 0=basic, 1=+AI/RBS, 2=+LOM/wideMode/wideLO/SB/OCOLR variants, 3=+CSS'
registers:
  - name: CR
    displayName: CR
    description: Control register
    addressOffset: 0
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: START
        description: "Start\nThis bit can be used to launch the DMA2D according to parameters loaded in the various configuration registers. This bit is automatically reset by the following events:\nat the end of the transfer \nwhen the data transfer is aborted by the user by setting ABORT in this register\nwhen a data transfer error occurs\nwhen the data transfer has not started due to a configuration error, or another transfer operation already ongoing (automatic CLUT loading)"
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: SUSP
        description: "Suspend\nThis bit can be used to suspend the current transfer. This bit is set and reset by software. It is automatically reset by hardware when START = 0."
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Transfer not suspended
            value: 0
          - name: B_0x1
            description: Transfer suspended
            value: 1
      - name: ABORT
        description: "Abort\nThis bit can be used to abort the current transfer. This bit is set by software, and is automatically reset by hardware when START = 0."
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No transfer abort requested
            value: 0
          - name: B_0x1
            description: Transfer abort requested
            value: 1
      - name: LOM
        description: "Line offset mode\nThis bit configures how the line offset is expressed (pixels or bytes) for the foreground, background and output.\nThis bit is set and cleared by software. It can not be modified while a transfer is ongoing."
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Line offsets expressed in pixels
            value: 0
          - name: B_0x1
            description: Line offsets expressed in bytes
            value: 1
      - name: TEIE
        description: "Transfer error (TE) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: TE interrupt disabled
            value: 0
          - name: B_0x1
            description: TE interrupt enabled
            value: 1
      - name: TCIE
        description: "Transfer complete (TC) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 9
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: TC interrupt disabled
            value: 0
          - name: B_0x1
            description: TC interrupt enabled
            value: 1
      - name: TWIE
        description: "Transfer watermark (TW) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 10
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: TW interrupt disabled
            value: 0
          - name: B_0x1
            description: TW interrupt enabled
            value: 1
      - name: CAEIE
        description: "CLUT access error (CAE) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 11
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: CAE interrupt disabled
            value: 0
          - name: B_0x1
            description: CAE interrupt enabled
            value: 1
      - name: CTCIE
        description: "CLUT transfer complete (CTC) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 12
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: CTC interrupt disabled
            value: 0
          - name: B_0x1
            description: CTC interrupt enabled
            value: 1
      - name: CEIE
        description: "Configuration error (CE) interrupt enable\nThis bit is set and cleared by software."
        bitOffset: 13
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: CE interrupt disabled
            value: 0
          - name: B_0x1
            description: CE interrupt enabled
            value: 1
      - name: MODE
        description: "DMA2D mode\nThis bit is set and cleared by software. It cannot be modified while a transfer is ongoing.\nOthers: Reserved"
        bitOffset: 16
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Memory-to-memory (FG fetch only)
            value: 0
          - name: B_0x1
            description: Memory-to-memory with PFC (FG fetch only with FG PFC active)
            value: 1
          - name: B_0x2
            description: Memory-to-memory with blending (FG and BG fetch with PFC and blending)
            value: 2
          - name: B_0x3
            description: Register-to-memory (no FG nor BG, only output stage active)
            value: 3
          - name: B_0x4
            description: Memory-to-memory with blending and fixed color FG (BG fetch only with FG and BG PFC active)
            value: 4
          - name: B_0x5
            description: Memory-to-memory with blending and fixed color BG (FG fetch only with FG and BG PFC active)
            value: 5
  - name: ISR
    displayName: ISR
    description: Interrupt status register
    addressOffset: 4
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TEIF
        description: "Transfer error interrupt flag\nThis bit is set when an error occurs during a DMA transfer (data transfer or automatic CLUT loading)."
        bitOffset: 0
        bitWidth: 1
        access: read-only
      - name: TCIF
        description: "Transfer complete interrupt flag\nThis bit is set when a DMA2D transfer operation is complete (data transfer only)."
        bitOffset: 1
        bitWidth: 1
        access: read-only
      - name: TWIF
        description: "Transfer watermark interrupt flag\nThis bit is set when the last pixel of the watermarked line has been transferred."
        bitOffset: 2
        bitWidth: 1
        access: read-only
      - name: CAEIF
        description: "CLUT access error interrupt flag\nThis bit is set when the CPU accesses the CLUT while the CLUT is being automatically copied from a system memory to the internal DMA2D."
        bitOffset: 3
        bitWidth: 1
        access: read-only
      - name: CTCIF
        description: "CLUT transfer complete interrupt flag\nThis bit is set when the CLUT copy from a system memory area to the internal DMA2D memory is complete."
        bitOffset: 4
        bitWidth: 1
        access: read-only
      - name: CEIF
        description: "Configuration error interrupt flag\nThis bit is set when START is set in DMA2D_CR, DMA2DFGPFCCR or DMA2D_BGPFCCR, and a wrong configuration has been programmed."
        bitOffset: 5
        bitWidth: 1
        access: read-only
  - name: IFCR
    displayName: IFCR
    description: Interrupt flag clear register
    addressOffset: 8
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CTEIF
        description: "Clear transfer error interrupt flag\nProgramming this bit to 1 clears the TEIF flag in DMA2D_ISR."
        bitOffset: 0
        bitWidth: 1
        access: read-write
      - name: CTCIF
        description: "Clear transfer complete interrupt flag\nProgramming this bit to 1 clears the TCIF flag in DMA2D_ISR."
        bitOffset: 1
        bitWidth: 1
        access: read-write
      - name: CTWIF
        description: "Clear transfer watermark interrupt flag\nProgramming this bit to 1 clears the TWIF flag in DMA2D_ISR."
        bitOffset: 2
        bitWidth: 1
        access: read-write
      - name: CAECIF
        description: "Clear CLUT access error interrupt flag\nProgramming this bit to 1 clears the CAEIF flag in DMA2D_ISR."
        bitOffset: 3
        bitWidth: 1
        access: read-write
      - name: CCTCIF
        description: "Clear CLUT transfer complete interrupt flag\nProgramming this bit to 1 clears the CTCIF flag in DMA2D_ISR."
        bitOffset: 4
        bitWidth: 1
        access: read-write
      - name: CCEIF
        description: "Clear configuration error interrupt flag\nProgramming this bit to 1 clears the CEIF flag in DMA2D_ISR."
        bitOffset: 5
        bitWidth: 1
        access: read-write
  - name: FGMAR
    displayName: FGMAR
    description: Foreground memory address register
    addressOffset: 12
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MA
        description: "Memory address, address of the data used for the foreground image\nThe address alignment must match the image format selected: a 32-bit per pixel format must be 32-bit aligned, a 16-bit per pixel format must be 16-bit aligned, and a 4-bit per pixel format must be 8-bit aligned."
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: FGOR
    displayName: FGOR
    description: Foreground offset register
    addressOffset: 16
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LO
        description: "Line offset\nThis field gives the line offset used for the foreground image, expressed:\nin pixels when LOM = 0 in DMA2D_CR. Only LO[13:0] bits are considered, LO[15:14] bits are ignored.\nin bytes when LOM = 1\nThis value is used for the address generation. It is added at the end of each line to determine the starting address of the next line.\nIf the image format is 4-bit per pixel, the line offset must be even."
        bitOffset: 0
        bitWidth: 16
        access: read-write
  - name: BGMAR
    displayName: BGMAR
    description: Background memory address register
    addressOffset: 20
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MA
        description: "Memory address, address of the data used for the background image\nThe address alignment must match the image format selected: a 32-bit per pixel format must be 32-bit aligned, a 16-bit per pixel format must be 16-bit aligned and a 4-bit per pixel format must be 8-bit aligned."
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: BGOR
    displayName: BGOR
    description: Background offset register
    addressOffset: 24
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: LO
        description: "Line offset\nThis field gives the line offset used for the background image, expressed:\nin pixels when LOM = 0 in DMA2D_CR. Only LO[13:0] bits are considered, LO[15:14] bits are ignored.\nin bytes when LOM = 1\nThis value is used for the address generation. It is added at the end of each line to determine the starting address of the next line.\nIf the image format is 4-bit per pixel, the line offset must be even."
        bitOffset: 0
        bitWidth: 16
        access: read-write
  - name: FGPFCCR
    displayName: FGPFCCR
    description: Foreground PFC control register
    addressOffset: 28
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CM
        description: "Color mode\nThese bits defines the color format of the foreground image.\nOthers: Reserved"
        bitOffset: 0
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ARGB8888
            value: 0
          - name: B_0x1
            description: RGB888
            value: 1
          - name: B_0x2
            description: RGB565
            value: 2
          - name: B_0x3
            description: ARGB1555
            value: 3
          - name: B_0x4
            description: ARGB4444
            value: 4
          - name: B_0x5
            description: L8
            value: 5
          - name: B_0x6
            description: AL44
            value: 6
          - name: B_0x7
            description: AL88
            value: 7
          - name: B_0x8
            description: L4
            value: 8
          - name: B_0x9
            description: A8
            value: 9
          - name: B_0xA
            description: A4
            value: 10
          - name: B_0xB
            description: YCbCr
            value: 11
      - name: CCM
        description: "CLUT color mode\nThis bit defines the color format of the CLUT."
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ARGB8888
            value: 0
          - name: B_0x1
            description: RGB888
            value: 1
      - name: START
        description: "Start\nThis bit can be set to start the automatic loading of the CLUT. It is automatically reset:\nat the end of the transfer \nwhen the transfer is aborted by the user by setting ABORT in DMA2D_CR\nwhen a transfer error occurs\nwhen the transfer has not started due to a configuration error or another transfer operation already ongoing (data transfer or automatic background CLUT transfer)"
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: CS
        description: "CLUT size\nThese bits define the size of the CLUT used for the foreground image. \nThe number of CLUT entries is equal to CS[7:0] + 1."
        bitOffset: 8
        bitWidth: 8
        access: read-write
      - name: AM
        description: "Alpha mode\nThese bits select the alpha channel value to be used for the foreground image. \nOthers: Reserved"
        bitOffset: 16
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No modification of the foreground image alpha channel value
            value: 0
          - name: B_0x1
            description: 'Replace original foreground image alpha channel value by ALPHA[7: 0]'
            value: 1
          - name: B_0x2
            description: Replace original foreground image alpha channel value by ALPHA[7:0] multiplied with original alpha channel value
            value: 2
      - name: CSS
        description: "Chroma subsampling\nThese bits define the chroma subsampling mode for YCbCr color mode. \nOthers: Reserved"
        bitOffset: 18
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: 4:4:4 (no chroma subsampling)
            value: 0
          - name: B_0x1
            description: 4:2:2
            value: 1
          - name: B_0x2
            description: 4:2:0
            value: 2
      - name: AI
        description: "Alpha inverted\nThis bit inverts the alpha value."
        bitOffset: 20
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular alpha
            value: 0
          - name: B_0x1
            description: Inverted alpha
            value: 1
      - name: RBS
        description: "Red/Blue swap\nThis bit allows to swap Red and Blue to support BGR or ABGR color formats."
        bitOffset: 21
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular mode (RGB or ARGB)
            value: 0
          - name: B_0x1
            description: Swap mode (BGR or ABGR)
            value: 1
      - name: ALPHA
        description: "Alpha value\nThese bits define a fixed alpha channel value which can replace the original alpha value, or be multiplied by the original alpha value, according to the alpha mode selected through AM[1:0] in this register."
        bitOffset: 24
        bitWidth: 8
        access: read-write
  - name: FGCOLR
    displayName: FGCOLR
    description: Foreground color register
    addressOffset: 32
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BLUE
        description: "Blue value for the A4 or A8 mode of the foreground image\nUsed also for fixed color FG in memory-to-memory mode with blending and fixed color FG (BG fetch only with FG and BG PFC active)."
        bitOffset: 0
        bitWidth: 8
        access: read-write
      - name: GREEN
        description: "Green value for the A4 or A8 mode of the foreground image\nUsed also for fixed color FG in memory-to-memory mode with blending and fixed color FG (BG fetch only with FG and BG PFC active)."
        bitOffset: 8
        bitWidth: 8
        access: read-write
      - name: RED
        description: "Red value for the A4 or A8 mode of the foreground image\nUsed also for fixed color FG in memory-to-memory mode with blending and fixed color FG (BG fetch only with FG and BG PFC active)."
        bitOffset: 16
        bitWidth: 8
        access: read-write
  - name: BGPFCCR
    displayName: BGPFCCR
    description: Background PFC control register
    addressOffset: 36
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CM
        description: "Color mode\nThese bits define the color format of the foreground image. \nOthers: Reserved"
        bitOffset: 0
        bitWidth: 4
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ARGB8888
            value: 0
          - name: B_0x1
            description: RGB888
            value: 1
          - name: B_0x2
            description: RGB565
            value: 2
          - name: B_0x3
            description: ARGB1555
            value: 3
          - name: B_0x4
            description: ARGB4444
            value: 4
          - name: B_0x5
            description: L8
            value: 5
          - name: B_0x6
            description: AL44
            value: 6
          - name: B_0x7
            description: AL88
            value: 7
          - name: B_0x8
            description: L4
            value: 8
          - name: B_0x9
            description: A8
            value: 9
          - name: B_0xA
            description: A4
            value: 10
      - name: CCM
        description: "CLUT color mode\nThese bits define the color format of the CLUT."
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ARGB8888
            value: 0
          - name: B_0x1
            description: RGB888
            value: 1
      - name: START
        description: "Start\nThis bit is set to start the automatic loading of the CLUT. This bit is automatically reset:\nat the end of the transfer \nwhen the transfer is aborted by the user by setting ABORT bit in DMA2D_CR\nwhen a transfer error occurs\nwhen the transfer has not started due to a configuration error or another transfer operation already on going (data transfer or automatic background CLUT transfer)"
        bitOffset: 5
        bitWidth: 1
        access: read-write
      - name: CS
        description: "CLUT size\nThese bits define the size of the CLUT used for the BG. \nThe number of CLUT entries is equal to CS[7:0] + 1."
        bitOffset: 8
        bitWidth: 8
        access: read-write
      - name: AM
        description: "Alpha mode\nThese bits define which alpha channel value to be used for the background image. \nOthers: Reserved"
        bitOffset: 16
        bitWidth: 2
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: No modification of the foreground image alpha channel value
            value: 0
          - name: B_0x1
            description: 'Replace original background image alpha channel value by ALPHA[7: 0]'
            value: 1
          - name: B_0x2
            description: Replace original background image alpha channel value by ALPHA[7:0] multiplied with original alpha channel value
            value: 2
      - name: AI
        description: "Alpha Inverted\nThis bit inverts the alpha value."
        bitOffset: 20
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular alpha
            value: 0
          - name: B_0x1
            description: Inverted alpha
            value: 1
      - name: RBS
        description: "Red/Blue swap\nThis bit allows to swap Red and Blue to support BGR or ABGR color formats."
        bitOffset: 21
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular mode (RGB or ARGB)
            value: 0
          - name: B_0x1
            description: Swap mode (BGR or ABGR)
            value: 1
      - name: ALPHA
        description: "Alpha value\nThese bits define a fixed alpha channel value which can replace the original alpha value, or be multiplied with the original alpha value according to the alpha mode selected with AM[1:0]."
        bitOffset: 24
        bitWidth: 8
        access: read-write
  - name: BGCOLR
    displayName: BGCOLR
    description: Background color register
    addressOffset: 40
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BLUE
        description: "Blue value for the A4 or A8 mode of the background\nUsed also for fixed color BG in memory-to-memory mode with blending and fixed color BG (FG fetch only with FG and BG PFC active)."
        bitOffset: 0
        bitWidth: 8
        access: read-write
      - name: GREEN
        description: "Green value for the A4 or A8 mode of the background\nUsed also for fixed color BG in memory-to-memory mode with blending and fixed color BG (FG fetch only with FG and BG PFC active)."
        bitOffset: 8
        bitWidth: 8
        access: read-write
      - name: RED
        description: "Red value for the A4 or A8 mode of the background\nUsed also for fixed color BG in memory-to-memory mode with blending and fixed color BG (FG fetch only with FG and BG PFC active)."
        bitOffset: 16
        bitWidth: 8
        access: read-write
  - name: FGCMAR
    displayName: FGCMAR
    description: Foreground CLUT memory address register
    addressOffset: 44
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MA
        description: "Memory address\nAddress of the data used for the CLUT address dedicated to the foreground image. \nIf the foreground CLUT format is 32-bit, the address must be 32-bit aligned."
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: BGCMAR
    displayName: BGCMAR
    description: Background CLUT memory address register
    addressOffset: 48
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MA
        description: "Memory address\nAddress of the data used for the CLUT address dedicated to the background image. \nIf the background CLUT format is 32-bit, the address must be 32-bit aligned."
        bitOffset: 0
        bitWidth: 32
        access: read-write
  - name: OPFCCR
    displayName: OPFCCR
    description: Output PFC control register
    addressOffset: 52
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CM
        description: "Color mode\nThese bits define the color format of the output image. \nOthers: Reserved"
        bitOffset: 0
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: ARGB8888
            value: 0
          - name: B_0x1
            description: RGB888
            value: 1
          - name: B_0x2
            description: RGB565
            value: 2
          - name: B_0x3
            description: ARGB1555
            value: 3
          - name: B_0x4
            description: ARGB4444
            value: 4
      - name: SB
        description: "Swap bytes\nWhen this bit is set, the bytes in the output FIFO are swapped two by two. The number of pixels per line (PL) must be even, and the output memory address (OMAR) must be even."
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Bytes in regular order in the output FIFO
            value: 0
          - name: B_0x1
            description: Bytes swapped two by two in the output FIFO
            value: 1
      - name: AI
        description: "Alpha Inverted\nThis bit inverts the alpha value."
        bitOffset: 20
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular alpha
            value: 0
          - name: B_0x1
            description: Inverted alpha
            value: 1
      - name: RBS
        description: "Red/Blue swap\nThis bit allows to swap Red and Blue to support BGR or ABGR color formats."
        bitOffset: 21
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: B_0x0
            description: Regular mode (RGB or ARGB)
            value: 0
          - name: B_0x1
            description: Swap mode (BGR or ABGR)
            value: 1
  - name: OCOLR_ARGB8888
    displayName: OCOLR_ARGB8888
    description: Output color register
    addressOffset: 56
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BLUE
        description: Blue value of the output image in ARGB8888 or RGB888
        bitOffset: 0
        bitWidth: 8
        access: read-write
      - name: GREEN
        description: Green value of the output image in ARGB8888 or RGB888
        bitOffset: 8
        bitWidth: 8
        access: read-write
      - name: RED
        description: Red value of the output image in ARGB8888 or RGB888 mode
        bitOffset: 16
        bitWidth: 8
        access: read-write
      - name: ALPHA
        description: Alpha channel value of the output color in ARGB8888 mode (otherwise reserved)
        bitOffset: 24
        bitWidth: 8
        access: read-write
  - name: OCOLR_RGB565
    displayName: OCOLR_RGB565
    description: Output color register
    alternateRegister: OCOLR_ARGB8888
    addressOffset: 56
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BLUE
        description: Blue value of the output image in RGB565 mode
        bitOffset: 0
        bitWidth: 5
        access: read-write
      - name: GREEN
        description: Green value of the output image in RGB565 mode
        bitOffset: 5
        bitWidth: 6
        access: read-write
      - name: RED
        description: Red value of the output image in RGB565 mode
        bitOffset: 11
        bitWidth: 5
        access: read-write
  - name: OCOLR_ARGB1555
    displayName: OCOLR_ARGB1555
    description: Output color register
    alternateRegister: OCOLR_ARGB8888
    addressOffset: 56
    size: 32
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: BLUE
        description: Blue value of the output image in ARGB1555 mode
        bitOffset: 0
        bitWidth: 5
        access: read-write
      - name: GREEN
        description: Green value of the output image in ARGB1555 mode
        bitOffset: 5
        bitWidth: 5
        access: read-write
