name: HSMCI
version: 6449R
description: High Speed MultiMedia Card Interface
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: MCIEN
        description: Multi-Media Interface Enable
        bitOffset: 0
        bitWidth: 1
      - name: MCIDIS
        description: Multi-Media Interface Disable
        bitOffset: 1
        bitWidth: 1
      - name: PWSEN
        description: Power Save Mode Enable
        bitOffset: 2
        bitWidth: 1
      - name: PWSDIS
        description: Power Save Mode Disable
        bitOffset: 3
        bitWidth: 1
      - name: SWRST
        description: Software Reset
        bitOffset: 7
        bitWidth: 1
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: CLKDIV
        description: Clock Divider
        bitOffset: 0
        bitWidth: 8
      - name: PWSDIV
        description: Power Saving Divider
        bitOffset: 8
        bitWidth: 3
      - name: RDPROOF
        description: Read Proof Enable
        bitOffset: 11
        bitWidth: 1
      - name: WRPROOF
        description: Write Proof Enable
        bitOffset: 12
        bitWidth: 1
      - name: FBYTE
        description: Force Byte Transfer
        bitOffset: 13
        bitWidth: 1
      - name: PADV
        description: Padding Value
        bitOffset: 14
        bitWidth: 1
      - name: CLKODD
        description: Clock divider is odd
        bitOffset: 16
        bitWidth: 1
  - name: DTOR
    description: Data Timeout Register
    addressOffset: 8
    size: 32
    fields:
      - name: DTOCYC
        description: Data Timeout Cycle Number
        bitOffset: 0
        bitWidth: 4
      - name: DTOMUL
        description: Data Timeout Multiplier
        bitOffset: 4
        bitWidth: 3
        enumeratedValues:
          - name: _1
            description: DTOCYC
            value: 0
          - name: _16
            description: DTOCYC x 16
            value: 1
          - name: _128
            description: DTOCYC x 128
            value: 2
          - name: _256
            description: DTOCYC x 256
            value: 3
          - name: _1024
            description: DTOCYC x 1024
            value: 4
          - name: _4096
            description: DTOCYC x 4096
            value: 5
          - name: _65536
            description: DTOCYC x 65536
            value: 6
          - name: _1048576
            description: DTOCYC x 1048576
            value: 7
  - name: SDCR
    description: SD/SDIO Card Register
    addressOffset: 12
    size: 32
    fields:
      - name: SDCSEL
        description: SDCard/SDIO Slot
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: SLOTA
            description: Slot A is selected.
            value: 0
      - name: SDCBUS
        description: SDCard/SDIO Bus Width
        bitOffset: 6
        bitWidth: 2
        enumeratedValues:
          - name: _1
            description: 1 bit
            value: 0
          - name: _4
            description: 4 bits
            value: 2
          - name: _8
            description: 8 bits
            value: 3
  - name: ARGR
    description: Argument Register
    addressOffset: 16
    size: 32
    fields:
      - name: ARG
        description: Command Argument
        bitOffset: 0
        bitWidth: 32
  - name: CMDR
    description: Command Register
    addressOffset: 20
    size: 32
    access: write-only
    fields:
      - name: CMDNB
        description: Command Number
        bitOffset: 0
        bitWidth: 6
      - name: RSPTYP
        description: Response Type
        bitOffset: 6
        bitWidth: 2
        enumeratedValues:
          - name: NORESP
            description: No response
            value: 0
          - name: _48_BIT
            description: 48-bit response
            value: 1
          - name: _136_BIT
            description: 136-bit response
            value: 2
          - name: R1B
            description: R1b response type
            value: 3
      - name: SPCMD
        description: Special Command
        bitOffset: 8
        bitWidth: 3
        enumeratedValues:
          - name: STD
            description: Not a special CMD.
            value: 0
          - name: INIT
            description: 'Initialization CMD: 74 clock cycles for initialization sequence.'
            value: 1
          - name: SYNC
            description: 'Synchronized CMD: Wait for the end of the current data block transfer before sending the pending command.'
            value: 2
          - name: CE_ATA
            description: CE-ATA Completion Signal disable Command. The host cancels the ability for the device to return a command completion signal on the command line.
            value: 3
          - name: IT_CMD
            description: 'Interrupt command: Corresponds to the Interrupt Mode (CMD40).'
            value: 4
          - name: IT_RESP
            description: 'Interrupt response: Corresponds to the Interrupt Mode (CMD40).'
            value: 5
          - name: BOR
            description: Boot Operation Request. Start a boot operation mode, the host processor can read boot data from the MMC device directly.
            value: 6
          - name: EBO
            description: End Boot Operation. This command allows the host processor to terminate the boot operation mode.
            value: 7
      - name: OPDCMD
        description: Open Drain Command
        bitOffset: 11
        bitWidth: 1
        enumeratedValues:
          - name: PUSHPULL
            description: Push pull command.
            value: 0
          - name: OPENDRAIN
            description: Open drain command.
            value: 1
      - name: MAXLAT
        description: Max Latency for Command to Response
        bitOffset: 12
        bitWidth: 1
        enumeratedValues:
          - name: _5
            description: 5-cycle max latency.
            value: 0
          - name: _64
            description: 64-cycle max latency.
            value: 1
      - name: TRCMD
        description: Transfer Command
        bitOffset: 16
        bitWidth: 2
        enumeratedValues:
          - name: NO_DATA
            description: No data transfer
            value: 0
          - name: START_DATA
            description: Start data transfer
            value: 1
          - name: STOP_DATA
            description: Stop data transfer
            value: 2
      - name: TRDIR
        description: Transfer Direction
        bitOffset: 18
        bitWidth: 1
        enumeratedValues:
          - name: WRITE
            description: Write.
            value: 0
          - name: READ
            description: Read.
            value: 1
      - name: TRTYP
        description: Transfer Type
        bitOffset: 19
        bitWidth: 3
        enumeratedValues:
          - name: SINGLE
            description: MMC/SD Card Single Block
            value: 0
          - name: MULTIPLE
            description: MMC/SD Card Multiple Block
            value: 1
          - name: STREAM
            description: MMC Stream
            value: 2
          - name: BYTE
            description: SDIO Byte
            value: 4
          - name: BLOCK
            description: SDIO Block
            value: 5
      - name: IOSPCMD
        description: SDIO Special Command
        bitOffset: 24
        bitWidth: 2
        enumeratedValues:
          - name: STD
            description: Not an SDIO Special Command
            value: 0
          - name: SUSPEND
            description: SDIO Suspend Command
            value: 1
          - name: RESUME
            description: SDIO Resume Command
            value: 2
      - name: ATACS
        description: ATA with Command Completion Signal
        bitOffset: 26
        bitWidth: 1
        enumeratedValues:
          - name: NORMAL
            description: Normal operation mode.
            value: 0
          - name: COMPLETION
            description: This bit indicates that a completion signal is expected within a programmed amount of time (HSMCI_CSTOR).
            value: 1
      - name: BOOT_ACK
        description: Boot Operation Acknowledge
        bitOffset: 27
        bitWidth: 1
  - name: BLKR
    description: Block Register
    addressOffset: 24
    size: 32
    fields:
      - name: BCNT
        description: MMC/SDIO Block Count - SDIO Byte Count
        bitOffset: 0
        bitWidth: 16
      - name: BLKLEN
        description: Data Block Length
        bitOffset: 16
        bitWidth: 16
  - name: CSTOR
    description: Completion Signal Timeout Register
    addressOffset: 28
    size: 32
    fields:
      - name: CSTOCYC
        description: Completion Signal Timeout Cycle Number
        bitOffset: 0
        bitWidth: 4
      - name: CSTOMUL
        description: Completion Signal Timeout Multiplier
        bitOffset: 4
        bitWidth: 3
        enumeratedValues:
          - name: _1
            description: CSTOCYC x 1
            value: 0
          - name: _16
            description: CSTOCYC x 16
            value: 1
          - name: _128
            description: CSTOCYC x 128
            value: 2
          - name: _256
            description: CSTOCYC x 256
            value: 3
          - name: _1024
            description: CSTOCYC x 1024
            value: 4
          - name: _4096
            description: CSTOCYC x 4096
            value: 5
          - name: _65536
            description: CSTOCYC x 65536
            value: 6
          - name: _1048576
            description: CSTOCYC x 1048576
            value: 7
  - dim: 4
    dimIncrement: 4
    name: RSPR[%s]
    description: Response Register 0
    addressOffset: 32
    size: 32
    access: read-only
    fields:
      - name: RSP
        description: Response
        bitOffset: 0
        bitWidth: 32
  - name: RDR
    description: Receive Data Register
    addressOffset: 48
    size: 32
    access: read-only
    fields:
      - name: DATA
        description: Data to Read
        bitOffset: 0
        bitWidth: 32
  - name: TDR
    description: Transmit Data Register
    addressOffset: 52
    size: 32
    access: write-only
    fields:
      - name: DATA
        description: Data to Write
        bitOffset: 0
        bitWidth: 32
  - name: SR
    description: Status Register
    addressOffset: 64
    size: 32
    access: read-only
    fields:
      - name: CMDRDY
        description: Command Ready (cleared by writing in HSMCI_CMDR)
        bitOffset: 0
        bitWidth: 1
      - name: RXRDY
        description: Receiver Ready (cleared by reading HSMCI_RDR)
        bitOffset: 1
        bitWidth: 1
      - name: TXRDY
        description: Transmit Ready (cleared by writing in HSMCI_TDR)
        bitOffset: 2
        bitWidth: 1
      - name: BLKE
        description: Data Block Ended (cleared on read)
        bitOffset: 3
        bitWidth: 1
      - name: DTIP
        description: Data Transfer in Progress (cleared at the end of CRC16 calculation)
        bitOffset: 4
        bitWidth: 1
      - name: NOTBUSY
        description: HSMCI Not Busy
        bitOffset: 5
        bitWidth: 1
      - name: SDIOIRQA
        description: SDIO Interrupt for Slot A (cleared on read)
        bitOffset: 8
        bitWidth: 1
      - name: SDIOWAIT
        description: SDIO Read Wait Operation Status
        bitOffset: 12
        bitWidth: 1
      - name: CSRCV
        description: CE-ATA Completion Signal Received (cleared on read)
        bitOffset: 13
        bitWidth: 1
      - name: RINDE
        description: Response Index Error (cleared by writing in HSMCI_CMDR)
        bitOffset: 16
        bitWidth: 1
      - name: RDIRE
        description: Response Direction Error (cleared by writing in HSMCI_CMDR)
        bitOffset: 17
        bitWidth: 1
      - name: RCRCE
        description: Response CRC Error (cleared by writing in HSMCI_CMDR)
        bitOffset: 18
        bitWidth: 1
      - name: RENDE
        description: Response End Bit Error (cleared by writing in HSMCI_CMDR)
        bitOffset: 19
        bitWidth: 1
      - name: RTOE
        description: Response Time-out Error (cleared by writing in HSMCI_CMDR)
        bitOffset: 20
        bitWidth: 1
      - name: DCRCE
        description: Data CRC Error (cleared on read)
        bitOffset: 21
        bitWidth: 1
      - name: DTOE
        description: Data Time-out Error (cleared on read)
        bitOffset: 22
        bitWidth: 1
      - name: CSTOE
        description: Completion Signal Time-out Error (cleared on read)
        bitOffset: 23
        bitWidth: 1
      - name: BLKOVRE
        description: DMA Block Overrun Error (cleared on read)
        bitOffset: 24
        bitWidth: 1
      - name: FIFOEMPTY
        description: FIFO empty flag
        bitOffset: 26
        bitWidth: 1
      - name: XFRDONE
        description: Transfer Done flag
        bitOffset: 27
        bitWidth: 1
      - name: ACKRCV
        description: Boot Operation Acknowledge Received (cleared on read)
        bitOffset: 28
        bitWidth: 1
      - name: ACKRCVE
        description: Boot Operation Acknowledge Error (cleared on read)
        bitOffset: 29
        bitWidth: 1
      - name: OVRE
        description: Overrun (if FERRCTRL = 1, cleared by writing in HSMCI_CMDR or cleared on read if FERRCTRL = 0)
        bitOffset: 30
        bitWidth: 1
      - name: UNRE
        description: Underrun (if FERRCTRL = 1, cleared by writing in HSMCI_CMDR or cleared on read if FERRCTRL = 0)
        bitOffset: 31
        bitWidth: 1
  - name: IER
    description: Interrupt Enable Register
    addressOffset: 68
    size: 32
    access: write-only
    fields:
      - name: CMDRDY
        description: Command Ready Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: RXRDY
        description: Receiver Ready Interrupt Enable
        bitOffset: 1
        bitWidth: 1
      - name: TXRDY
        description: Transmit Ready Interrupt Enable
        bitOffset: 2
        bitWidth: 1
      - name: BLKE
        description: Data Block Ended Interrupt Enable
        bitOffset: 3
        bitWidth: 1
      - name: DTIP
        description: Data Transfer in Progress Interrupt Enable
        bitOffset: 4
        bitWidth: 1
      - name: NOTBUSY
        description: Data Not Busy Interrupt Enable
        bitOffset: 5
        bitWidth: 1
      - name: SDIOIRQA
        description: SDIO Interrupt for Slot A Interrupt Enable
        bitOffset: 8
        bitWidth: 1
      - name: SDIOWAIT
        description: SDIO Read Wait Operation Status Interrupt Enable
        bitOffset: 12
        bitWidth: 1
      - name: CSRCV
        description: Completion Signal Received Interrupt Enable
        bitOffset: 13
        bitWidth: 1
      - name: RINDE
        description: Response Index Error Interrupt Enable
        bitOffset: 16
        bitWidth: 1
      - name: RDIRE
        description: Response Direction Error Interrupt Enable
        bitOffset: 17
        bitWidth: 1
      - name: RCRCE
        description: Response CRC Error Interrupt Enable
        bitOffset: 18
        bitWidth: 1
      - name: RENDE
        description: Response End Bit Error Interrupt Enable
        bitOffset: 19
        bitWidth: 1
      - name: RTOE
        description: Response Time-out Error Interrupt Enable
        bitOffset: 20
        bitWidth: 1
      - name: DCRCE
        description: Data CRC Error Interrupt Enable
        bitOffset: 21
        bitWidth: 1
      - name: DTOE
        description: Data Time-out Error Interrupt Enable
        bitOffset: 22
        bitWidth: 1
      - name: CSTOE
        description: Completion Signal Timeout Error Interrupt Enable
        bitOffset: 23
        bitWidth: 1
      - name: BLKOVRE
        description: DMA Block Overrun Error Interrupt Enable
        bitOffset: 24
        bitWidth: 1
      - name: FIFOEMPTY
        description: FIFO empty Interrupt enable
        bitOffset: 26
        bitWidth: 1
      - name: XFRDONE
        description: Transfer Done Interrupt enable
        bitOffset: 27
        bitWidth: 1
      - name: ACKRCV
        description: Boot Acknowledge Interrupt Enable
        bitOffset: 28
        bitWidth: 1
      - name: ACKRCVE
        description: Boot Acknowledge Error Interrupt Enable
        bitOffset: 29
        bitWidth: 1
      - name: OVRE
        description: Overrun Interrupt Enable
        bitOffset: 30
        bitWidth: 1
      - name: UNRE
        description: Underrun Interrupt Enable
        bitOffset: 31
        bitWidth: 1
  - name: IDR
    description: Interrupt Disable Register
    addressOffset: 72
    size: 32
    access: write-only
    fields:
      - name: CMDRDY
        description: Command Ready Interrupt Disable
        bitOffset: 0
        bitWidth: 1
      - name: RXRDY
        description: Receiver Ready Interrupt Disable
        bitOffset: 1
        bitWidth: 1
      - name: TXRDY
        description: Transmit Ready Interrupt Disable
        bitOffset: 2
        bitWidth: 1
      - name: BLKE
        description: Data Block Ended Interrupt Disable
        bitOffset: 3
        bitWidth: 1
      - name: DTIP
        description: Data Transfer in Progress Interrupt Disable
        bitOffset: 4
        bitWidth: 1
      - name: NOTBUSY
        description: Data Not Busy Interrupt Disable
        bitOffset: 5
        bitWidth: 1
      - name: SDIOIRQA
        description: SDIO Interrupt for Slot A Interrupt Disable
        bitOffset: 8
        bitWidth: 1
      - name: SDIOWAIT
        description: SDIO Read Wait Operation Status Interrupt Disable
        bitOffset: 12
        bitWidth: 1
      - name: CSRCV
        description: Completion Signal received interrupt Disable
        bitOffset: 13
        bitWidth: 1
      - name: RINDE
        description: Response Index Error Interrupt Disable
        bitOffset: 16
        bitWidth: 1
      - name: RDIRE
        description: Response Direction Error Interrupt Disable
        bitOffset: 17
        bitWidth: 1
      - name: RCRCE
        description: Response CRC Error Interrupt Disable
        bitOffset: 18
        bitWidth: 1
      - name: RENDE
        description: Response End Bit Error Interrupt Disable
        bitOffset: 19
        bitWidth: 1
      - name: RTOE
        description: Response Time-out Error Interrupt Disable
        bitOffset: 20
        bitWidth: 1
      - name: DCRCE
        description: Data CRC Error Interrupt Disable
        bitOffset: 21
        bitWidth: 1
      - name: DTOE
        description: Data Time-out Error Interrupt Disable
