name: SBCon
description: ARM CMSDK SBCon I2C (bit-bang I2C interface)
source: IOTKit_CM33.svd; ARM CMSDK Technical Reference Manual
qemu: partial (arm-sbcon-i2c; bit-bang functional, no slave devices by default)
ipPedigree:
  designer: ARM
  ipName: SBCon I2C
registers:
  - name: CONTROL
    description: Control Register (read returns current SCL/SDA levels)
    addressOffset: 0
    size: 32
    access: read-only
    resetValue: 0x00000003
    fields:
      - name: SCL
        description: SCL line state
        bitOffset: 0
        bitWidth: 1
      - name: SDA
        description: SDA line state
        bitOffset: 1
        bitWidth: 1
  - name: CONTROLS
    description: Control Set Register (write 1 to drive line high)
    addressOffset: 0
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: SCL
        description: Write 1 to release SCL (pull high)
        bitOffset: 0
        bitWidth: 1
      - name: SDA
        description: Write 1 to release SDA (pull high)
        bitOffset: 1
        bitWidth: 1
  - name: CONTROLC
    description: Control Clear Register (write 1 to drive line low)
    addressOffset: 4
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: SCL
        description: Write 1 to drive SCL low
        bitOffset: 0
        bitWidth: 1
      - name: SDA
        description: Write 1 to drive SDA low
        bitOffset: 1
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 8
    usage: registers
