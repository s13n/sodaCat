name: QEI
description: Quadrature Encoder Interface (QEI)
groupName: QEI
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CON
    description: Control register
    addressOffset: 0
    access: write-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESP
        description: Reset position counter. When set = 1, resets the position counter to all zeros. Autoclears when the position counter is cleared.
        bitOffset: 0
        bitWidth: 1
      - name: RESPI
        description: Reset position counter on index. When set = 1, resets the position counter to all zeros when an index pulse occurs. Autoclears when the position counter is cleared.
        bitOffset: 1
        bitWidth: 1
      - name: RESV
        description: Reset velocity. When set = 1, resets the velocity counter to all zeros and reloads the velocity timer. Autoclears when the velocity counter is cleared.
        bitOffset: 2
        bitWidth: 1
      - name: RESI
        description: Reset index counter. When set = 1, resets the index counter to all zeros. Autoclears when the index counter is cleared.
        bitOffset: 3
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 4
        bitWidth: 28
  - name: STAT
    description: Encoder status register
    addressOffset: 4
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DIR
        description: Direction bit. In combination with DIRINV bit indicates forward or reverse direction. See Table 516.
        bitOffset: 0
        bitWidth: 1
      - name: RESERVED
        description: reserved
        bitOffset: 1
        bitWidth: 31
  - name: CONF
    description: Configuration register
    addressOffset: 8
    access: read-write
    resetValue: 983040
    resetMask: 4294967295
    fields:
      - name: DIRINV
        description: Direction invert. When = 1, complements the DIR bit.
        bitOffset: 0
        bitWidth: 1
      - name: SIGMODE
        description: Signal Mode. When = 0, PhA and PhB function as quadrature encoder inputs. When = 1, PhA functions as the direction signal and PhB functions as the clock signal.
        bitOffset: 1
        bitWidth: 1
      - name: CAPMODE
        description: Capture Mode. When = 0, only PhA edges are counted (2X). When = 1, BOTH PhA and PhB edges are counted (4X), increasing resolution but decreasing range.
        bitOffset: 2
        bitWidth: 1
      - name: INVINX
        description: Invert Index. When set, inverts the sense of the index input.
        bitOffset: 3
        bitWidth: 1
      - name: CRESPI
        description: Continuously reset position counter on index. When set = 1, resets the position counter to all zeros when an index pulse occurs at the next position increase (recalibration). Auto-clears when the position counter is cleared.
        bitOffset: 4
        bitWidth: 1
      - name: RESERVED
        description: Reserved
        bitOffset: 5
        bitWidth: 11
      - name: INXGATE
        description: 'Index gating configuration: when INXGATE(19)=1, pass the index when Pha=0 and Phb=0, else block. when INXGATE(18)=1, pass the index when Pha=0 and Phb=1, else block. when INXGATE(17)=1, pass the index when Pha=1 and Phb=1, else block. when INXGATE(16)=1, pass the index when Pha=1 and Phb=0, else block.'
        bitOffset: 16
        bitWidth: 4
      - name: RESERVED
        description: reserved
        bitOffset: 20
        bitWidth: 12
