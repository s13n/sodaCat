    size: 32
    access: read-write
    resetValue: 0
    resetMask: 0
    modifiedWriteValues: oneToClear
    fields:
      - name: CENRL
        description: Clear bits in IENR
        bitOffset: 0
        bitWidth: 8
        access: read-write
        modifiedWriteValues: oneToClear
        enumeratedValues:
          - name: CENRL_0
            description: No operation
            value: 0
          - name: CENRL_1
            description: Disable rising edge or level interrupt
            value: 1
  - name: IENF
    description: Pin Interrupt Active Level or Falling-Edge Interrupt Enable
    addressOffset: 16
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 255
    fields:
      - name: ENAF
        description: Enables Interrupt
        bitOffset: 0
        bitWidth: 8
        access: read-write
        enumeratedValues:
          - name: ENAF_0
            description: Disable (set active interrupt level LOW)
            value: 0
          - name: ENAF_1
            description: Enable (set active interrupt level HIGH)
            value: 1
  - name: SIENF
    description: Pin Interrupt Active Level or Falling-Edge Interrupt Set
    addressOffset: 20
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 0
    modifiedWriteValues: oneToSet
    fields:
      - name: SETENAF
        description: Write 1 to this address to clear to disable interrupts. Bit a sets bit n in IENF.
        bitOffset: 0
        bitWidth: 8
        access: write-only
        modifiedWriteValues: oneToSet
        enumeratedValues:
          - name: SETENAF_0
            description: Writes 0 to IENF.
            value: 0
          - name: SETENAF_1
            description: Select HIGH-active interrupt or enable falling-edge interrupt
            value: 1
  - name: CIENF
    description: Pin Interrupt Active Level or Falling-Edge Interrupt Clear
    addressOffset: 24
    size: 32
    access: write-only
    resetValue: 0
    resetMask: 0
    fields:
