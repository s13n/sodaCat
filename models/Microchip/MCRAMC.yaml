name: MCRAMC
version: 037273b0
description: Memory controller with RAM and ECC
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: CTRLA
    description: Control Enable A Register
    addressOffset: 0
    size: 32
    resetValue: 2
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: '0'
            description: No effect.
            value: 0
          - name: '1'
            description: Reset the MCRAMC. A software-triggered hardware reset of the MCRAMC user interface is performed.
            value: 1
      - name: ENABLE
        description: ECC Decoder Enable
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: '0'
            description: ECC decoding is disabled.
            value: 0
          - name: '1'
            description: ECC decoding is enabled.
            value: 1
  - name: SYNCBUSY
    description: Sync Busy Register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SWRST
        description: Software reset busy bit
        bitOffset: 0
        bitWidth: 1
      - name: FLTEN
        description: Fault Injection Enabled busy bit
        bitOffset: 1
        bitWidth: 1
      - name: ENABLE
        description: ECC Decoder Enable busy bit
        bitOffset: 2
        bitWidth: 1
  - name: INTENCLR
    description: Interrupt Enable Clear Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: SERREN
        description: Single Bit Error Interrupt Enable, Clear
        bitOffset: 0
        bitWidth: 1
      - name: DERREN
        description: Double Bit Error Interrupt Enable, Clear
        bitOffset: 1
        bitWidth: 1
  - name: INTENSET
    description: Interrupt Enable Set Register
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: SERREN
        description: Single Bit Error Interrupt Enable, Set
        bitOffset: 0
        bitWidth: 1
      - name: DERREN
        description: Double Bit Error Interrupt Enable, Set
        bitOffset: 1
        bitWidth: 1
  - name: INTSTA
    description: Interrupt Status Register
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: SERR
        description: Single Bit Error
        bitOffset: 0
        bitWidth: 1
      - name: DERR
        description: Double Bit Error
        bitOffset: 1
        bitWidth: 1
  - name: FLTCTRL
    description: Fault Injection Control Register
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: FLTEN
        description: Fault Injection Enabled
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: '0'
            description: Disables fault injection.
            value: 0
          - name: '1'
            description: Enables fault injection at FLTADR address offset as selected by FLTMD and FLTxPTR.
            value: 1
      - name: FLTMD
        description: Fault Injection Mode
        bitOffset: 12
        bitWidth: 2
  - name: FLTPTR
    description: Fault Injection Pointer Register
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: FLT1PTR
        description: Single Fault Injection Bit Pointer
        bitOffset: 0
        bitWidth: 8
      - name: FLT2PTR
        description: Double Fault Injection Bit Pointer
        bitOffset: 16
        bitWidth: 8
  - name: FLTADR
    description: Fault Injection Address Register
    addressOffset: 28
    size: 32
    resetValue: 0
    fields:
      - name: FLTADR
        description: Fault Address Offset
        bitOffset: 0
        bitWidth: 24
  - name: ERRCADR
    description: Error Capture Address Register
    addressOffset: 32
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: ERCADR
        description: ECC SECDED Error Capture Address
        bitOffset: 0
        bitWidth: 24
  - name: ERRCPAR
    description: Error Capture Parity Register
    addressOffset: 36
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: ERCPAR
        description: ECC SECDED Error Capture Parity
        bitOffset: 0
        bitWidth: 8
  - name: ERRCSYN
    description: Error Capture Syndrome Register
    addressOffset: 40
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: ERCSYN
        description: ECC SECDED Error Capture Syndrome
        bitOffset: 0
        bitWidth: 8
        enumeratedValues:
          - name: '0'
            description: Not a Single bit error.
            value: 0
          - name: '1'
            description: Single bit error.
            value: 1
      - name: ERR1
        description: ECC Single Bit Error
        bitOffset: 14
        bitWidth: 1
      - name: ERR2
        description: ECC Double Bit Error
        bitOffset: 15
        bitWidth: 1
        enumeratedValues:
          - name: '0'
            description: Not a Double bit error.
            value: 0
          - name: '1'
            description: Double bit error.
            value: 1
addressBlocks:
  - offset: 0
    size: 44
    usage: registers
interrupts:
  - name: INT
    description: Multi-Channel RAM Controller
