        bitOffset: 17
        bitWidth: 1
      - name: ARX_PE
        description: Asynchronous Rx Protocol Error Enable
        bitOffset: 18
        bitWidth: 1
      - name: ARX_BREAK
        description: Asynchronous Rx Break Enable
        bitOffset: 19
        bitWidth: 1
