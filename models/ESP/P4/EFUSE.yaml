        bitWidth: 7
        access: read-only
      - name: USB_DEVICE_EXCHG_PINS
        description: Enable usb device exchange pins of D+ and D-.
        bitOffset: 7
        bitWidth: 1
        access: read-only
      - name: USB_OTG11_EXCHG_PINS
        description: Enable usb otg11 exchange pins of D+ and D-.
        bitOffset: 8
        bitWidth: 1
        access: read-only
