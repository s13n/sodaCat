name: TIMER
description: Timer0/1/2/3
groupName: TIMER
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: IR
    description: Interrupt Register. The IR can be written to clear interrupts. The IR can be read to identify which of eight possible interrupt sources are pending.
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MR0INT
        description: Interrupt flag for match channel 0.
        bitOffset: 0
        bitWidth: 1
      - name: MR1INT
        description: Interrupt flag for match channel 1.
        bitOffset: 1
        bitWidth: 1
      - name: MR2INT
        description: Interrupt flag for match channel 2.
        bitOffset: 2
        bitWidth: 1
      - name: MR3INT
        description: Interrupt flag for match channel 3.
        bitOffset: 3
        bitWidth: 1
      - name: CR0INT
        description: Interrupt flag for capture channel 0 event.
        bitOffset: 4
        bitWidth: 1
      - name: CR1INT
        description: Interrupt flag for capture channel 1 event.
        bitOffset: 5
        bitWidth: 1
      - name: CR2INT
        description: Interrupt flag for capture channel 2 event.
        bitOffset: 6
        bitWidth: 1
      - name: CR3INT
        description: Interrupt flag for capture channel 3 event.
        bitOffset: 7
        bitWidth: 1
      - name: RESERVED
        description: Reserved.
        bitOffset: 8
        bitWidth: 24
  - name: TCR
    description: Timer Control Register. The TCR is used to control the Timer Counter functions. The Timer Counter can be disabled or reset through the TCR.
    addressOffset: 4
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CEN
        description: When one, the Timer Counter and Prescale Counter are enabled for counting. When zero, the counters are disabled.
        bitOffset: 0
        bitWidth: 1
      - name: CRST
        description: When one, the Timer Counter and the Prescale Counter are synchronously reset on the next positive edge of PCLK. The counters remain reset until TCR[1] is returned to zero.
        bitOffset: 1
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 2
        bitWidth: 30
  - name: TC
    description: Timer Counter. The 32 bit TC is incremented every PR+1 cycles of PCLK. The TC is controlled through the TCR.
    addressOffset: 8
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: TC
        description: Timer counter value.
        bitOffset: 0
        bitWidth: 32
  - name: PR
    description: Prescale Register. When the Prescale Counter (PC) is equal to this value, the next clock increments the TC and clears the PC.
    addressOffset: 12
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PM
        description: Prescale counter maximum value.
        bitOffset: 0
        bitWidth: 32
  - name: PC
    description: Prescale Counter. The 32 bit PC is a counter which is incremented to the value stored in PR. When the value in PR is reached, the TC is incremented and the PC is cleared. The PC is observable and controllable through the bus interface.
    addressOffset: 16
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: PC
        description: Prescale counter value.
        bitOffset: 0
        bitWidth: 32
  - name: MCR
    description: Match Control Register. The MCR is used to control if an interrupt is generated and if the TC is reset when a Match occurs.
    addressOffset: 20
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MR0I
        description: Interrupt on MR0
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Interrupt is disabled
            value: 0
          - name: ENABLED
            description: Enabled. Interrupt is generated when MR0 matches the value in the TC.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: MR0R
        description: Reset on MR0
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: RESET
            description: Reset. TC will be reset if MR0 matches it.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: MR0S
        description: Stop on MR0
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: MATCH
            description: Match. TC and PC will be stopped and TCR[0] will be set to 0 if MR0 matches the TC.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: MR1I
        description: Interrupt on MR1
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Interrupt is disabled.
            value: 0
          - name: MATCH
            description: Match. Interrupt is generated when MR1 matches the value in the TC.
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: MR1R
        description: Reset on MR1
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: RESET
            description: Reset. TC will be reset if MR1 matches it.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: MR1S
        description: Stop on MR1
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: STOP
            description: Stop. TC and PC will be stopped and TCR[0] will be set to 0 if MR1 matches the TC.
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: MR2I
        description: Interrupt on MR2
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Interrupt is disabled
            value: 0
          - name: MATCH
            description: Match. Interrupt is generated when MR2 matches the value in the TC.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: MR2R
        description: Reset on MR2
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: MATCH
            description: Match. TC will be reset if MR2 matches it.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: MR2S
        description: Stop on MR2.
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: STOP
            description: Stop. TC and PC will be stopped and TCR[0] will be set to 0 if MR2 matches the TC.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: MR3I
        description: Interrupt on MR3
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This interrupt is disabled.
            value: 0
          - name: INTERRUPT
            description: Interrupt. Interrupt is generated when MR3 matches the value in the TC.
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: MR3R
        description: Reset on MR3
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: MATCH
            description: Match. TC will be reset if MR3 matches it.
            value: 1
        bitOffset: 10
        bitWidth: 1
      - name: MR3S
        description: Stop on MR3
        enumeratedValues:
          - name: DISABLED
            description: Disabled. Feature disabled.
            value: 0
          - name: STOP
            description: Stop. TC and PC will be stopped and TCR[0] will be set to 0 if MR3 matches the TC.
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 20
  - dim: 4
    dimIncrement: 4
    name: MR[%s]
    description: Match Register 0. MR0 can be enabled through the MCR to reset the TC, stop both the TC and PC, and/or generate an interrupt every time MR0 matches the TC.
    addressOffset: 24
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: MATCH
        description: Timer counter match value.
        bitOffset: 0
        bitWidth: 32
  - name: CCR
    description: Capture Control Register. The CCR controls which edges of the capture inputs are used to load the Capture Registers and whether or not an interrupt is generated when a capture takes place.
    addressOffset: 40
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CAP0RE
        description: Capture on CAPn.0 rising edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOW_TO_HIGH
            description: Low to high. A sequence of 0 then 1 on CAPn.0 will cause CR0 to be loaded with the contents of TC.
            value: 1
        bitOffset: 0
        bitWidth: 1
      - name: CAP0FE
        description: Capture on CAPn.0 falling edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: HIGH_TO_LOW
            description: High to low. A sequence of 1 then 0 on CAPn.0 will cause CR0 to be loaded with the contents of TC.
            value: 1
        bitOffset: 1
        bitWidth: 1
      - name: CAP0I
        description: Interrupt on CAPn.0 event
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOAD
            description: Load. A CR0 load due to a CAPn.0 event will generate an interrupt.
            value: 1
        bitOffset: 2
        bitWidth: 1
      - name: CAP1RE
        description: Capture on CAPn.1 rising edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOW_TO_HIGH
            description: Low to high. A sequence of 0 then 1 on CAPn.1 will cause CR1 to be loaded with the contents of TC.
            value: 1
        bitOffset: 3
        bitWidth: 1
      - name: CAP1FE
        description: Capture on CAPn.1 falling edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: HIGH_TO_LOW
            description: High to low. A sequence of 1 then 0 on CAPn.1 will cause CR1 to be loaded with the contents of TC.
            value: 1
        bitOffset: 4
        bitWidth: 1
      - name: CAP1I
        description: Interrupt on CAPn.1 event
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOAD
            description: Load. A CR1 load due to a CAPn.1 event will generate an interrupt.
            value: 1
        bitOffset: 5
        bitWidth: 1
      - name: CAP2RE
        description: Capture on CAPn.2 rising edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOW_TO_HIGH
            description: Low to high. A sequence of 0 then 1 on CAPn.2 will cause CR2 to be loaded with the contents of TC.
            value: 1
        bitOffset: 6
        bitWidth: 1
      - name: CAP2FE
        description: 'Capture on CAPn.2 falling edge:'
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: HIGH_TO_LOW
            description: High to low. A sequence of 1 then 0 on CAPn.2 will cause CR2 to be loaded with the contents of TC.
            value: 1
        bitOffset: 7
        bitWidth: 1
      - name: CAP2I
        description: Interrupt on CAPn.2 event
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOAD
            description: Load. A CR2 load due to a CAPn.2 event will generate an interrupt.
            value: 1
        bitOffset: 8
        bitWidth: 1
      - name: CAP3RE
        description: Capture on CAPn.3 rising edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOW_TO_HIGH
            description: Low to high. A sequence of 0 then 1 on CAPn.3 will cause CR3 to be loaded with the contents of TC.
            value: 1
        bitOffset: 9
        bitWidth: 1
      - name: CAP3FE
        description: High to low. Capture on CAPn.3 falling edge
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: HIGH_TO_LOW
            description: A sequence of 1 then 0 on CAPn.3 will cause CR3 to be loaded with the contents of TC.
            value: 1
        bitOffset: 10
        bitWidth: 1
      - name: CAP3I
        description: 'Interrupt on CAPn.3 event:'
        enumeratedValues:
          - name: DISABLED
            description: Disabled. This feature is disabled.
            value: 0
          - name: LOAD
            description: Load. A CR3 load due to a CAPn.3 event will generate an interrupt.
            value: 1
        bitOffset: 11
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 20
  - dim: 4
    dimIncrement: 4
    name: CR[%s]
    description: Capture Register 0. CR0 is loaded with the value of TC when there is an event on the CAPn.0 input.
    addressOffset: 44
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CAP
        description: Timer counter capture value.
        bitOffset: 0
        bitWidth: 32
  - name: EMR
    description: External Match Register. The EMR controls the external match pins MATn.0-3 (MAT0.0-3 and MAT1.0-3 respectively).
    addressOffset: 60
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: EM0
        description: External Match 0. When a match occurs between the TC and MR0, this bit can either toggle, go low, go high, or do nothing, depending on bits 5:4 of this register. This bit can be driven onto a MATn.0 pin, in a positive-logic manner (0 = low, 1 = high).
        bitOffset: 0
        bitWidth: 1
      - name: EM1
        description: External Match 1. When a match occurs between the TC and MR1, this bit can either toggle, go low, go high, or do nothing, depending on bits 7:6 of this register. This bit can be driven onto a MATn.1 pin, in a positive-logic manner (0 = low, 1 = high).
        bitOffset: 1
        bitWidth: 1
      - name: EM2
        description: External Match 2. When a match occurs between the TC and MR2, this bit can either toggle, go low, go high, or do nothing, depending on bits 9:8 of this register. This bit can be driven onto a MATn.0 pin, in a positive-logic manner (0 = low, 1 = high).
        bitOffset: 2
        bitWidth: 1
      - name: EM3
        description: External Match 3. When a match occurs between the TC and MR3, this bit can either toggle, go low, go high, or do nothing, depending on bits 11:10 of this register. This bit can be driven onto a MATn.0 pin, in a positive-logic manner (0 = low, 1 = high).
        bitOffset: 3
        bitWidth: 1
      - name: EMC0
        description: External Match Control 0. Determines the functionality of External Match 0.
        enumeratedValues:
          - name: NOP
            description: Do Nothing.
            value: 0
          - name: CLEAR
            description: Clear. Clear the corresponding External Match bit/output to 0 (MATn.m pin is LOW if pinned out).
            value: 1
          - name: SET
            description: Set. Set the corresponding External Match bit/output to 1 (MATn.m pin is HIGH if pinned out).
            value: 2
          - name: TOGGLE
            description: Toggle. Toggle the corresponding External Match bit/output.
            value: 3
        bitOffset: 4
        bitWidth: 2
      - name: EMC1
        description: External Match Control 1. Determines the functionality of External Match 1.
        enumeratedValues:
          - name: NOP
            description: Do Nothing.
            value: 0
          - name: CLEAR
            description: Clear. Clear the corresponding External Match bit/output to 0 (MATn.m pin is LOW if pinned out).
            value: 1
          - name: SET
            description: Set. Set the corresponding External Match bit/output to 1 (MATn.m pin is HIGH if pinned out).
            value: 2
          - name: TOGGLE
            description: Toggle. Toggle the corresponding External Match bit/output.
            value: 3
        bitOffset: 6
        bitWidth: 2
      - name: EMC2
        description: External Match Control 2. Determines the functionality of External Match 2.
        enumeratedValues:
          - name: NOP
            description: Do Nothing.
            value: 0
          - name: CLEAR
            description: Clear. Clear the corresponding External Match bit/output to 0 (MATn.m pin is LOW if pinned out).
            value: 1
          - name: SET
            description: Set. Set the corresponding External Match bit/output to 1 (MATn.m pin is HIGH if pinned out).
            value: 2
          - name: TOGGLE
            description: Toggle. Toggle the corresponding External Match bit/output.
            value: 3
        bitOffset: 8
        bitWidth: 2
      - name: EMC3
        description: External Match Control 3. Determines the functionality of External Match 3.
        enumeratedValues:
          - name: NOP
            description: Do Nothing.
            value: 0
          - name: CLEAR
            description: Clear. Clear the corresponding External Match bit/output to 0 (MATn.m pin is LOW if pinned out).
            value: 1
          - name: SET
            description: Set. Set the corresponding External Match bit/output to 1 (MATn.m pin is HIGH if pinned out).
            value: 2
          - name: TOGGLE
            description: Toggle. Toggle the corresponding External Match bit/output.
            value: 3
        bitOffset: 10
        bitWidth: 2
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 12
        bitWidth: 20
  - name: CTCR
    description: Count Control Register. The CTCR selects between Timer and Counter mode, and in Counter mode selects the signal and edge(s) for counting.
    addressOffset: 112
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: CTMODE
        description: "Counter/Timer Mode This field selects which rising PCLK edges can increment Timer's Prescale Counter (PC), or clear PC and increment Timer Counter (TC). Timer Mode: the TC is incremented when the Prescale Counter matches the Prescale Register."
        enumeratedValues:
          - name: TIMER_MODE
            description: Timer Mode. Counts every rising PCLK edge
            value: 0
          - name: COUNTER_MODE_RISING
            description: Counter Mode rising edge. TC is incremented on rising edges on the CAP input selected by bits 3:2.
            value: 1
          - name: COUNTER_MODE_FALLING
            description: Counter Mode falling edge. TC is incremented on falling edges on the CAP input selected by bits 3:2.
            value: 2
          - name: COUNTER_MODE_EDGES
            description: Counter Mode edges. TC is incremented on both edges on the CAP input selected by bits 3:2.
            value: 3
        bitOffset: 0
        bitWidth: 2
      - name: CINSEL
        description: 'Count Input Select When bits 1:0 in this register are not 00, these bits select which CAP pin is sampled for clocking. Note: If Counter mode is selected for a particular CAPn input in the TnCTCR, the 3 bits for that input in the Capture Control Register (TnCCR) must be programmed as 000. However, capture and/or interrupt can be selected for the other 3 CAPn inputs in the same timer.'
        enumeratedValues:
          - name: CAP0
            description: CAP0. CAPn.0 for TIMERn
            value: 0
          - name: CAP1
            description: CAP1. CAPn.1 for TIMERn
            value: 1
          - name: CAP2
            description: CAP2. CAPn.2 for TIMERn
            value: 2
          - name: CAP3
            description: CAP3. CAPn.3 for TIMERn
            value: 3
        bitOffset: 2
        bitWidth: 2
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 4
        bitWidth: 28
addressBlocks:
  - offset: 0
    size: 768
    usage: registers
interrupts:
  - name: TIMER
