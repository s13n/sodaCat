        addressOffset: 0
        description: GPIO status
        resetValue: 0
        fields:
          - name: OUTFROMPERI
            description: output signal from selected peripheral, before register override is applied
            access: read-only
            bitOffset: 8
            bitWidth: 1
          - name: OUTTOPAD
            description: output signal to pad after register override is applied
            access: read-only
            bitOffset: 9
            bitWidth: 1
          - name: OEFROMPERI
            description: output enable from selected peripheral, before register override is applied
            access: read-only
            bitOffset: 12
            bitWidth: 1
          - name: OETOPAD
            description: output enable to pad after register override is applied
            access: read-only
            bitOffset: 13
            bitWidth: 1
          - name: INFROMPAD
            description: input signal from pad, before override is applied
            access: read-only
            bitOffset: 17
            bitWidth: 1
          - name: INTOPERI
            description: input signal to peripheral, after override is applied
            access: read-only
            bitOffset: 19
            bitWidth: 1
          - name: IRQFROMPAD
            description: interrupt from pad before override is applied
            access: read-only
            bitOffset: 24
            bitWidth: 1
          - name: IRQTOPROC
            description: interrupt to processors, after override is applied
            access: read-only
            bitOffset: 26
            bitWidth: 1
      - name: CTRL
        addressOffset: 4
        description: GPIO control including function select and overrides.
        resetValue: 31
        fields:
          - name: FUNCSEL
            description: "0-31 -> selects pin function according to the gpio table \n                            31 == NULL"
            access: read-write
            enumeratedValues:
              - name: jtag_tck
                value: 0
              - name: spi0_rx
                value: 1
              - name: uart0_tx
                value: 2
              - name: i2c0_sda
                value: 3
              - name: pwm_a_0
                value: 4
              - name: sio_0
                value: 5
              - name: pio0_0
                value: 6
              - name: pio1_0
                value: 7
              - name: usb_muxing_overcurr_detect
                value: 9
              - name: 'null'
                value: 31
            bitOffset: 0
            bitWidth: 5
          - name: OUTOVER
            access: read-write
            enumeratedValues:
              - name: NORMAL
                value: 0
                description: drive output from peripheral signal selected by funcsel
              - name: INVERT
                value: 1
                description: drive output from inverse of peripheral signal selected by funcsel
              - name: LOW
                value: 2
                description: drive output low
              - name: HIGH
                value: 3
                description: drive output high
            bitOffset: 8
            bitWidth: 2
          - name: OEOVER
            access: read-write
            enumeratedValues:
              - name: NORMAL
                value: 0
                description: drive output enable from peripheral signal selected by funcsel
              - name: INVERT
                value: 1
                description: drive output enable from inverse of peripheral signal selected by funcsel
              - name: DISABLE
                value: 2
                description: disable output
              - name: ENABLE
                value: 3
                description: enable output
            bitOffset: 12
            bitWidth: 2
          - name: INOVER
            access: read-write
            enumeratedValues:
              - name: NORMAL
                value: 0
                description: don't invert the peri input
              - name: INVERT
                value: 1
                description: invert the peri input
              - name: LOW
                value: 2
                description: drive peri input low
              - name: HIGH
                value: 3
                description: drive peri input high
            bitOffset: 16
            bitWidth: 2
          - name: IRQOVER
            access: read-write
            enumeratedValues:
              - name: NORMAL
                value: 0
                description: don't invert the interrupt
              - name: INVERT
                value: 1
                description: invert the interrupt
              - name: LOW
                value: 2
                description: drive interrupt low
              - name: HIGH
                value: 3
                description: drive interrupt high
            bitOffset: 28
            bitWidth: 2
