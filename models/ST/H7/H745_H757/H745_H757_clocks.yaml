generators:
  - name: HSI64
    description: 64 MHz high-speed internal RC oscillator
    output: hsi_osc
    control:
      reg: CR
      field: HSION
      values: [0, 64000000]

  - name: HSE
    description: High-speed external oscillator (4-48 MHz crystal or bypass)
    output: hse_ck
    control:
      state: freqHSE
      reg: CR
      field: HSEON

  - name: CSI
    description: 4 MHz low-power internal RC oscillator
    output: csi_ck
    control:
      reg: CR
      field: CSION
      values: [0, 4000000]

  - name: LSI
    description: 32 kHz low-speed internal RC oscillator
    output: lsi_ck
    control:
      reg: CSR
      field: LSION
      values: [0, 32000]

  - name: LSE
    description: 32.768 kHz low-speed external crystal oscillator
    output: lse_ck
    control:
      state: freqLSE
      reg: BDCR
      field: LSEON

  - name: HSI48
    description: 48 MHz internal RC oscillator (CRS trimmable)
    output: hsi48_ck
    control:
      reg: CR
      field: RC48ON
      values: [0, 48000000]

  - name: I2S_CKIN
    description: External I2S clock input pin
    output: I2S_CKIN

# ===========================================================================
# Muxes
# ===========================================================================
muxes:
  # --- PLL source ---
  - name: PLLSRC
    description: Common source for all three PLLs
    output: pll_src
    inputs:
      - hsi_ck
      - csi_ck
      - hse_ck
      - ''
    control:
      reg: PLLCKSELR
      field: PLLSRC

  # --- System clock ---
  - name: SW
    description: System clock switch
    output: sys_ck
    inputs:
      - hsi_ck
      - csi_ck
      - hse_ck
      - pll1_p_ck
      - 
      - 
      - 
      - 
    control:
      reg: CFGR
      field: SW

  # --- per_ck ---
  - name: CKPERSEL
    description: External peripheral clock source selection
    output: per_ck
    inputs:
      - hsi_ker_ck
      - csi_ker_ck
      - hse_ck
      - ''
    control:
      reg: D1CCIPR
      field: CKPERSEL

  # --- RTC source ---
  - name: RTCSEL
    description: RTC clock source selection
    output: rtc_pre
    inputs:
      - ''
      - lse_ck
      - lsi_ck
      - hse_rtc_ck
    control:
      reg: BDCR
      field: RTCSRC

  # --- MCO1 ---
  - name: MCO1SEL
    description: Microcontroller clock output 1 source
    output: mco1
    inputs:
      - hsi_ck
      - lse_ck
      - hse_ck
      - pll1_q_ck
      - hsi48_ck
      - 
      - 
      - 
    control:
      reg: CFGR
      field: MCO1SEL

  # --- MCO2 ---
  - name: MCO2SEL
    description: Microcontroller clock output 2 source
    output: mco2
    inputs:
      - sys_ck
      - pll2_p_ck
      - hse_ck
      - pll1_p_ck
      - csi_ck
      - lsi_ck
      - 
      - 
    control:
      reg: CFGR
      field: MCO2SEL

  # --- HRTIM clock source ---
  - name: HRTIMSEL
    description: HRTIM kernel clock source selection
    output: hrtim_ker_ck
    inputs:
      - rcc_timy_ker_ck
      - sys_d1cpre_ck
    control:
      reg: CFGR
      field: HRTIMSEL

  # --- D1 domain kernel clock muxes ---
  - name: SDMMCSEL
    description: SDMMC1/2 kernel clock source selection
    output: sdmmc_ker_ck
    inputs:
      - pll1_q_ck
      - pll2_r_ck
    control:
      reg: D1CCIPR
      field: SDMMCSEL

  - name: DSISEL
    description: DSI byte lane clock source selection
    output: dsi_ker_ck
    inputs:
      - dsi_phy_ck
      - pll2_q_ck
    control:
      reg: D1CCIPR
      field: DSISEL

  - name: QSPISEL
    description: QUADSPI kernel clock source selection
    output: quadspi_ker_ck
    inputs:
      - rcc_hclk
      - pll1_q_ck
      - pll2_r_ck
      - per_ck
    control:
      reg: D1CCIPR
      field: QSPISEL

  - name: FMCSEL
    description: FMC kernel clock source selection
    output: fmc_ker_ck
    inputs:
      - rcc_hclk
      - pll1_q_ck
      - pll2_r_ck
      - per_ck
    control:
      reg: D1CCIPR
      field: FMCSEL

  # --- D2 domain kernel clock muxes ---
  - name: FDCANSEL
    description: FDCAN kernel clock source selection
    output: fdcan_ker_ck
    inputs:
      - hse_ck
      - pll1_q_ck
      - pll2_q_ck
      - ''
    control:
      reg: D2CCIP1R
      field: FDCANSEL

  - name: SWPSEL
    description: SWPMI kernel clock source selection
    output: swpmi_ker_ck
    inputs:
      - rcc_pclk1
      - hsi_ker_ck
    control:
      reg: D2CCIP1R
      field: SWPSEL

  - name: DFSDM1SEL
    description: DFSDM1 processing clock source selection
    output: dfsdm1_ker_ck
    inputs:
      - rcc_pclk2
      - sys_ck
    control:
      reg: D2CCIP1R
      field: DFSDM1SEL

  - name: SPDIFSEL
    description: SPDIFRX kernel clock source selection
    output: spdif_ker_ck
    inputs:
      - pll1_q_ck
      - pll2_r_ck
      - pll3_r_ck
      - hsi_ker_ck
    control:
      reg: D2CCIP1R
      field: SPDIFSEL

  - name: SPI45SEL
    description: SPI4/5 kernel clock source selection
    output: spi45_ker_ck
    inputs:
      - rcc_pclk2
      - pll2_q_ck
      - pll3_q_ck
      - hsi_ker_ck
      - csi_ker_ck
      - hse_ck
      - 
      - 
    control:
      reg: D2CCIP1R
      field: SPI45SEL

  - name: SPI123SEL
    description: SPI/I2S 1,2,3 kernel clock source selection
    output: spi123_ker_ck
    inputs:
      - pll1_q_ck
      - pll2_p_ck
      - pll3_p_ck
      - I2S_CKIN
      - per_ck
      - 
      - 
      - 
    control:
      reg: D2CCIP1R
      field: SPI123SEL

  - name: SAI23SEL
    description: SAI2/3 kernel clock source selection
    output: sai23_ker_ck
    inputs:
      - pll1_q_ck
      - pll2_p_ck
      - pll3_p_ck
      - I2S_CKIN
      - per_ck
      - 
      - 
      - 
    control:
      reg: D2CCIP1R
      field: SAI23SEL

  - name: SAI1SEL
    description: SAI1 and DFSDM1 audio kernel clock source selection
    output: sai1_ker_ck
    inputs:
      - pll1_q_ck
      - pll2_p_ck
      - pll3_p_ck
      - I2S_CKIN
      - per_ck
      - 
      - 
      - 
    control:
      reg: D2CCIP1R
      field: SAI1SEL

  - name: USART16SEL
    description: USART1/6 kernel clock source selection
    output: usart16_ker_ck
    inputs:
      - rcc_pclk2
      - pll2_q_ck
      - pll3_q_ck
      - hsi_ker_ck
      - csi_ker_ck
      - lse_ck
      - 
      - 
    control:
      reg: D2CCIP2R
      field: USART16SEL

  - name: USART234578SEL
    description: USART2/3, UART4/5/7/8 kernel clock source selection
    output: usart234578_ker_ck
    inputs:
      - rcc_pclk1
      - pll2_q_ck
      - pll3_q_ck
      - hsi_ker_ck
      - csi_ker_ck
      - lse_ck
      - 
      - 
    control:
      reg: D2CCIP2R
      field: USART234578SEL

  - name: I2C123SEL
    description: I2C1/2/3 kernel clock source selection
    output: i2c123_ker_ck
    inputs:
      - rcc_pclk1
      - pll3_r_ck
      - hsi_ker_ck
      - csi_ker_ck
    control:
      reg: D2CCIP2R
      field: I2C123SEL

  - name: USBSEL
    description: USB1/2 OTG kernel clock source selection
    output: usb_ker_ck
    inputs:
      - ''
      - pll1_q_ck
      - pll3_q_ck
      - hsi48_ck
    control:
      reg: D2CCIP2R
      field: USBSEL

  - name: RNGSEL
    description: RNG kernel clock source selection
    output: rng_ker_ck
    inputs:
      - hsi48_ck
      - pll1_q_ck
      - lse_ck
      - lsi_ck
    control:
      reg: D2CCIP2R
      field: RNGSEL

  - name: CECSEL
    description: HDMI-CEC kernel clock source selection
    output: cec_ker_ck
    inputs:
      - lse_ck
      - lsi_ck
      - csi_ker_div122
      - ''
    control:
      reg: D2CCIP2R
      field: CECSEL

  - name: LPTIM1SEL
    description: LPTIM1 kernel clock source selection
    output: lptim1_ker_ck
    inputs:
      - rcc_pclk1
      - pll2_p_ck
      - pll3_r_ck
      - lse_ck
      - lsi_ck
      - per_ck
      - 
      - 
    control:
      reg: D2CCIP2R
      field: LPTIM1SEL

  # --- D3 domain kernel clock muxes ---
  - name: SPI6SEL
    description: SPI6 kernel clock source selection
    output: spi6_ker_ck
    inputs:
      - rcc_pclk4
      - pll2_q_ck
      - pll3_q_ck
      - hsi_ker_ck
      - csi_ker_ck
      - hse_ck
      - 
