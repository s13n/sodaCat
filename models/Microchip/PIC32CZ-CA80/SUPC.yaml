name: SUPC
version: 039261a0
description: Supply Controller
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: INTENCLR
    description: Interrupt Enable Clear
    addressOffset: 0
    size: 32
    resetValue: 0
    fields:
      - name: LVDET
        description: Low Voltage Detector Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: LVDRDY
        description: Low Voltage Detector Ready Interrupt Enable
        bitOffset: 1
        bitWidth: 1
      - name: BORVDDUSB
        description: BORVDDUSB Interrupt Enable
        bitOffset: 5
        bitWidth: 2
      - name: ADDVREGRDY0
        description: Additional Regulator ready 0 Interrupt Enable
        bitOffset: 8
        bitWidth: 1
      - name: ADDVREGRDY1
        description: Additional Regulator ready 1 Interrupt Enable
        bitOffset: 9
        bitWidth: 1
      - name: ADDVREGRDY2
        description: Additional Regulator ready 2 Interrupt Enable
        bitOffset: 10
        bitWidth: 1
  - name: INTENSET
    description: Interrupt Enable Set
    addressOffset: 4
    size: 32
    resetValue: 0
    fields:
      - name: LVDET
        description: Low Voltage Detector Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: LVDRDY
        description: Low Voltage Detector Ready Interrupt Enable
        bitOffset: 1
        bitWidth: 1
      - name: BORVDDUSB
        description: BORVDDUSB Interrupt Enable
        bitOffset: 5
        bitWidth: 2
      - name: ADDVREGRDY0
        description: Additional Regulator ready 0 Interrupt Enable
        bitOffset: 8
        bitWidth: 1
      - name: ADDVREGRDY1
        description: Additional Regulator ready 1 Interrupt Enable
        bitOffset: 9
        bitWidth: 1
      - name: ADDVREGRDY2
        description: Additional Regulator ready 2 Interrupt Enable
        bitOffset: 10
        bitWidth: 1
  - name: INTFLAG
    description: Interrupt Flag Status and Clear
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: LVDET
        description: Low Voltage Detector Interrupt. Set to one if VDDIO crosses the treshold voltage in the good direction according to LVD.DIR.
        bitOffset: 0
        bitWidth: 1
      - name: LVDRDY
        description: Low Voltage Detector Ready Interrupt. Set to one if LVD is ready to operate.
        bitOffset: 1
        bitWidth: 1
      - name: BORVDDUSB
        description: BORVDDUSB Interrupt. Set to one if VDDUSB issue is detected.
        bitOffset: 5
        bitWidth: 2
      - name: ADDVREGRDY0
        description: Additional Regulator ready 0 Interrupt. Set to one if additionnal regulator is ready meaning that output voltage is correct.
        bitOffset: 8
        bitWidth: 1
      - name: ADDVREGRDY1
        description: Additional Regulator ready 1 Interrupt. Set to one if additionnal regulator is ready meaning that output voltage is correct.
        bitOffset: 9
        bitWidth: 1
      - name: ADDVREGRDY2
        description: Additional Regulator ready 2 Interrupt. Set to one if additionnal regulator is ready meaning that output voltage is correct.
        bitOffset: 10
        bitWidth: 1
  - name: STATUS
    description: Flag status
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: LVDET
        description: Low Voltage Detector Status.
        bitOffset: 0
        bitWidth: 1
      - name: LVDRDY
        description: Low Voltage Detector Ready Status
        bitOffset: 1
        bitWidth: 1
      - name: BORVDDUSB
        description: BORVDDUSB Status. One if VDDUSB is OK. It corresponds to bor_vddusb_n_mv signal of SMOR.
        bitOffset: 5
        bitWidth: 2
      - name: ADDVREGRDY0
        description: Additional Regulator ready 0 Status. One if voltage is OK. It corresponds to vreg_ready_mv signal of additional regulator.
        bitOffset: 8
        bitWidth: 1
      - name: ADDVREGRDY1
        description: Additional Regulator ready 1 Status. One if voltage is OK. It corresponds to vreg_ready_mv signal of additional regulator.
        bitOffset: 9
        bitWidth: 1
      - name: ADDVREGRDY2
        description: Additional Regulator ready 2 Status. One if voltage is OK. It corresponds to vreg_ready_mv signal of additional regulator.
        bitOffset: 10
        bitWidth: 1
  - name: SYNCBUSY
    description: Synchronisation Busy
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: BOR
        description: BOR Synchronization Busy
        bitOffset: 0
        bitWidth: 1
  - name: BOR
    description: BOR Control
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: DCBORPSEL
        description: Duty Cycle BOR Prescaler Select
        bitOffset: 4
        bitWidth: 3
        enumeratedValues:
          - name: NODIV
            description: Not Divided
            value: 0
          - name: DIV2
            description: Divide clock by 2
            value: 1
          - name: DIV4
            description: Divide clock by 4
            value: 2
          - name: DIV8
            description: Divide clock by 8
            value: 3
          - name: DIV16
            description: Divide clock by 16
            value: 4
          - name: DIV32
            description: Divide clock by 32
            value: 5
          - name: DIV64
            description: Divide clock by 64
            value: 6
          - name: DIV128
            description: Divide clock by 128
            value: 7
      - name: BORFILT
        description: BOR filtering
        bitOffset: 8
        bitWidth: 2
        enumeratedValues:
          - name: NOFILT
            description: No digital filtering
            value: 0
          - name: FILT32US
            description: 32us filtering
            value: 1
          - name: FILT125US
            description: 125us filtering
            value: 2
          - name: FILT250US
            description: 250us filtering
            value: 3
  - name: LVD
    description: LVD Control
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Enable
        bitOffset: 1
        bitWidth: 1
      - name: DIR
        description: Direction
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: rising
            description: Rising detection
            value: 0
          - name: falling
            description: Falling detection
            value: 1
      - name: OEVEN
        description: Output Event Enable
        bitOffset: 3
        bitWidth: 1
      - name: RUNSTDBY
        description: Run during Standby
        bitOffset: 4
        bitWidth: 1
      - name: LEVEL
        description: Threshold Level. See 'pwr_smor_[nn]_v1 DOS' - level section to get details.
        bitOffset: 16
        bitWidth: 4
  - name: VREGCTRL
    description: VREG Control
    addressOffset: 28
    size: 32
    resetValue: 0
    fields:
      - name: VREGOUT
        description: VREG Output Control in RUN mode only. Enable by production fuse by CALSUPC.VREGOUTEN
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: 1p2v
            description: In Active mode, VDDCORE_RAM, VDDCORE_BU, VDDCORE_SW and optionnaly VDDCORE_PLL USB are set to 1.2v.
            value: 0
          - name: 1p0v
            description: In Active mode, VDDCORE_RAM, VDDCORE_BU, VDDCORE_SW and optionnaly VDDCORE_PLL USB are set to 1.0v.
            value: 1
          - name: 0p8v
            description: In Active mode, VDDCORE_RAM, VDDCORE_BU, VDDCORE_SW and optionnaly VDDCORE_PLL USB are set to 0.8v.
            value: 2
      - name: OFFSTDBY
        description: Off in Standby Control for VREGSW[N-1]. Useful for Riverside only.
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: 'OFF'
            description: In standby mode, VREGSW1,2,3 are OFF
            value: 0
          - name: 'ON'
            description: In standby mode, VREGSW1,2,3 are ON
            value: 1
      - name: SRAM_VLD
        description: SRAM Valid Status Bit
        bitOffset: 4
        bitWidth: 1
      - name: BKUP_VLD
        description: Backup Valid Status Bit
        bitOffset: 5
        bitWidth: 1
      - name: CPEN
        description: Charge Pump Enable and Auto-enable.
        bitOffset: 8
        bitWidth: 3
      - name: AVREGEN
        description: Additional Voltage Regulator Enable
        bitOffset: 16
        bitWidth: 3
      - name: AVREGSTDBY
        description: Additional Voltage Regulator Configuration
        bitOffset: 24
        bitWidth: 3
        enumeratedValues:
          - name: OFFINSTDBY
            description: Regulator is OFF while in sleep mode equal or deeper than standby mode. It is OFF in hibernate and backup mode as well.
            value: 0
          - name: ONINSTDBY
            description: Regulator is ON in Standby mode if AVREGEN bit is set. is OFF from Hibernate mode. It is OFF in backup mode as well.
            value: 1
  - name: VREFCTRL
    description: VREF Control
    addressOffset: 32
    size: 32
    resetValue: 3
    fields:
      - name: LPSTDBY
        description: Bandgap and Regulators Low Power Standby Enable
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: FullPower
            description: In standby mode, bandgap and enabled regulator(s) are set to nominal power mode.
            value: 0
          - name: LowPower
            description: In standby mode, bandgap and enabled regulator(s) are set to low power mode.
            value: 1
      - name: LPHIB
        description: Bandgap and Regulators Low Power Hibernate Enable
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: FullPower
            description: In hibernate mode, bandgap is set to nominal power mode. As a consequence, enabled regulator(s) are set to nominal power mode.
            value: 0
          - name: LowPower
            description: In hibernate mode, bandgap is set to low power mode. As a consequence, enabled regulator(s) are set to low power mode.
            value: 1
      - name: TSEN
        description: Temperature Sensor Output Enable
        bitOffset: 4
        bitWidth: 1
  - name: BKOUT
    description: Backup Output Control
    addressOffset: 40
    size: 32
    resetValue: 0
    fields:
      - name: EN0
        description: Enable Output
        bitOffset: 0
        bitWidth: 1
      - name: EN1
        description: Enable Output
        bitOffset: 2
        bitWidth: 1
      - name: CLR0
        description: Clear Output
        bitOffset: 8
        bitWidth: 1
      - name: CLR1
        description: Clear Output
        bitOffset: 10
        bitWidth: 1
      - name: SET0
        description: Set Output
        bitOffset: 16
        bitWidth: 1
      - name: SET1
        description: Set Output
        bitOffset: 18
        bitWidth: 1
      - name: TGLOM0
        description: Toggle Output Mode
        bitOffset: 24
        bitWidth: 2
        enumeratedValues:
          - name: DISABLE
            description: The output does not toggle.
            value: 0
          - name: RTCTGL
            description: The output toggles on RTC event.
            value: 1
          - name: BKUPTGL
            description: The output is set when the device enters backup mode or battery backup mode. The output should then be cleared by software.
            value: 2
      - name: TGLOM1
        description: Toggle Output Mode
        bitOffset: 26
        bitWidth: 2
        enumeratedValues:
          - name: DISABLE
            description: The output does not toggle.
            value: 0
          - name: RTCTGL
            description: The output toggles on RTC event.
            value: 1
          - name: BKUPTGL
            description: The output is set when the device enters backup mode or battery backup mode. The output should then be cleared by software.
            value: 2
  - name: BKIN
    description: Backup Input Control
    addressOffset: 44
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: BKIN
        description: Backup Input Value
        bitOffset: 0
        bitWidth: 2
addressBlocks:
  - offset: 0
    size: 48
    usage: registers
interrupts:
  - name: INT
    description: Supply Controller
