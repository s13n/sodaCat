name: CMSDK_Watchdog
description: ARM CMSDK APB Watchdog (SP805-compatible)
source: IOTKit_CM33.svd; ARM DDI0298 (SP805 TRM)
qemu: full (cmsdk-apb-watchdog)
ipPedigree:
  designer: ARM
  ipName: CMSDK APB Watchdog
  trm: DDI0298
interrupts:
  - name: RESET
  - name: INTR
registers:
  - name: LOAD
    description: Watchdog Load Register
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 0
    fields: []
  - name: VALUE
    description: Watchdog Value Register (current count)
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0xFFFFFFFF
    fields: []
  - name: CONTROL
    description: Watchdog Control Register
    addressOffset: 8
    size: 32
    access: read-write
    resetValue: 0
    fields:
      - name: INTEN
        description: Enable watchdog interrupt and counter
        bitOffset: 0
        bitWidth: 1
      - name: RESEN
        description: Enable watchdog reset output
        bitOffset: 1
        bitWidth: 1
  - name: INTCLR
    description: Watchdog Interrupt Clear Register
    addressOffset: 12
    size: 32
    access: write-only
    resetValue: 0
    fields:
      - name: INT
        description: Write any value to clear interrupt and restart counter
        bitOffset: 0
        bitWidth: 1
  - name: RIS
    description: Watchdog Raw Interrupt Status Register
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: RIS
        description: Raw interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: MIS
    description: Watchdog Masked Interrupt Status Register
    addressOffset: 20
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: MIS
        description: Masked interrupt status
        bitOffset: 0
        bitWidth: 1
  - name: LOCK
    description: Watchdog Lock Register (write 0x1ACCE551 to unlock, other values lock)
    addressOffset: 3072
    size: 32
    access: read-write
    resetValue: 0
    fields: []
addressBlocks:
  - offset: 0
    size: 3076
    usage: registers
