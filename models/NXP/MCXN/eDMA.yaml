name: eDMA
description: MP
groupName: DMA
headerStructName: DMA
source: MCXN947/MCXN947_cm33_core0.xml v1.0 (MCUX_2.16.100)
params:
  - name: channels
    type: int
    default: 16
    description: Number of DMA channels
registers:
  - name: MP_CSR
    description: Management Page Control
    addressOffset: 0
    size: 32
    access: read-write
    resetValue: 3211264
    resetMask: 4294967295
    fields:
      - name: EDBG
        description: Enable Debug
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLE
            description: Debug mode disabled
            value: 0
          - name: ENABLE
            description: Debug mode is enabled.
            value: 1
      - name: ERCA
        description: Enable Round Robin Channel Arbitration
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLE
            description: Round-robin channel arbitration disabled
            value: 0
          - name: ENABLE
            description: Round-robin channel arbitration enabled
            value: 1
      - name: HAE
        description: Halt After Error
        bitOffset: 4
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: NORMAL_OPERATION
            description: Normal operation
            value: 0
          - name: HALT
            description: Any error causes the HALT field to be set to 1
            value: 1
      - name: HALT
        description: Halt DMA Operations
        bitOffset: 5
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: NORMAL_OPERATION
            description: Normal operation
            value: 0
          - name: STALL
            description: Stall the start of any new channels
            value: 1
      - name: GCLC
        description: Global Channel Linking Control
        bitOffset: 6
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLE
            description: Channel linking disabled for all channels
            value: 0
          - name: AVAILABLE
            description: Channel linking available and controlled by each channel's link settings
            value: 1
      - name: GMRC
        description: Global Master ID Replication Control
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLE
            description: Master ID replication disabled for all channels
            value: 0
          - name: AVAILABLE
            description: Master ID replication available and controlled by each channel's CHn_SBR[EMI] setting
            value: 1
      - name: ECX
        description: Cancel Transfer With Error
        bitOffset: 8
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: NORMAL_OPERATION
            description: Normal operation
            value: 0
          - name: CANCEL
            description: Cancel the remaining data transfer
            value: 1
      - name: CX
        description: Cancel Transfer
        bitOffset: 9
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: NORMAL_OPERATION
            description: Normal operation
            value: 0
          - name: DATA_TRANSFER_CANCEL
            description: Cancel the remaining data transfer
            value: 1
      - name: ACTIVE_ID
        description: Active Channel ID
        bitOffset: 24
        bitWidth: 4
        access: read-only
      - name: ACTIVE
        description: DMA Active Status
        bitOffset: 31
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: IDLE
            description: eDMA is idle
            value: 0
          - name: EXECUTION
            description: eDMA is executing a channel
            value: 1
  - name: MP_ES
    description: Management Page Error Status
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DBE
        description: Destination Bus Error
        bitOffset: 0
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No destination bus error
            value: 0
          - name: BUS_ERROR
            description: Last recorded error was a bus error on a destination write
            value: 1
      - name: SBE
        description: Source Bus Error
        bitOffset: 1
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No source bus error
            value: 0
          - name: BUS_ERROR
            description: Last recorded error was a bus error on a source read
            value: 1
      - name: SGE
        description: Scatter/Gather Configuration Error
        bitOffset: 2
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No scatter/gather configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: Last recorded error was a configuration error detected in the TCDn_DLAST_SGA field
            value: 1
      - name: NCE
        description: NBYTES/CITER Configuration Error
        bitOffset: 3
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No NBYTES/CITER configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: The last recorded error was NBYTES equal to zero or a CITER not equal to BITER error
            value: 1
      - name: DOE
        description: Destination Offset Error
        bitOffset: 4
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No destination offset configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: Last recorded error was a configuration error detected in the TCDn_DOFF field
            value: 1
      - name: DAE
        description: Destination Address Error
        bitOffset: 5
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No destination address configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: Last recorded error was a configuration error detected in the TCDn_DADDR field
            value: 1
      - name: SOE
        description: Source Offset Error
        bitOffset: 6
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No source offset configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: Last recorded error was a configuration error detected in the TCDn_SOFF field
            value: 1
      - name: SAE
        description: Source Address Error
        bitOffset: 7
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_ERROR
            description: No source address configuration error
            value: 0
          - name: CONFIGURATION_ERROR
            description: Last recorded error was a configuration error detected in the TCDn_SADDR field
            value: 1
      - name: ECX
        description: Transfer Canceled
        bitOffset: 8
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_CANCELED_TRANSFERS
            description: No canceled transfers
            value: 0
          - name: CANCELED_TRANSFER
            description: Last recorded entry was a canceled transfer by the error cancel transfer input
            value: 1
      - name: ERRCHN
        description: Error Channel Number or Canceled Channel Number
        bitOffset: 24
        bitWidth: 4
        access: read-only
      - name: VLD
        description: Valid
        bitOffset: 31
        bitWidth: 1
        access: read-only
        enumeratedValues:
          - name: NO_FIELD_SET_ONE
            description: No CHn_ES[ERR] fields are set to 1
            value: 0
          - name: ATLEAST_ONE_FIELD
            description: At least one CHn_ES[ERR] field is set to 1, indicating a valid error exists that software has not cleared
            value: 1
  - name: MP_INT
    description: Management Page Interrupt Request Status
    addressOffset: 8
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: INT
        description: Interrupt Request Status
        bitOffset: 0
        bitWidth: 16
        access: read-only
  - name: MP_HRS
    description: Management Page Hardware Request Status
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: HRS
        description: Hardware Request Status
        bitOffset: 0
        bitWidth: 32
        access: read-only
  - dim: 16
    dimIncrement: 4
    name: CH_GRPRI[%s]
    description: Channel Arbitration Group
    addressOffset: 256
    size: 32
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: GRPRI
        description: Arbitration Group For Channel n
        bitOffset: 0
        bitWidth: 5
        access: read-write
addressBlocks:
  - offset: 0
    size: 320
    usage: registers
interrupts:
  - name: CH0
  - name: CH1
  - name: CH2
  - name: CH3
  - name: CH4
