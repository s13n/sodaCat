    fields:
      - name: RX_RESET
        description: Set this bit to reset receiver
        bitOffset: 0
        bitWidth: 1
        access: write-only
      - name: RX_FIFO_RESET
        description: Set this bit to reset Rx AFIFO
        bitOffset: 1
        bitWidth: 1
