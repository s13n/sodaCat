    description: Control Register
    addressOffset: 198
    size: 16
    access: read-write
    resetValue: 1024
    resetMask: 65535
    fields:
      - name: DBLEN
        description: Double Switching Enable
        bitOffset: 0
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: Double switching disabled.
            value: 0
          - name: ENABLED
            description: Double switching enabled.
            value: 1
      - name: DBLX
        description: PWM_X Double Switching Enable
        bitOffset: 1
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: PWM_X double pulse disabled.
            value: 0
          - name: ENABLED
            description: PWM_X double pulse enabled.
            value: 1
      - name: LDMOD
        description: Load Mode Select
        bitOffset: 2
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: NEXT_PWM_RELOAD
            description: Buffered registers of this submodule are loaded and take effect at the next PWM reload if MCTRL[LDOK] is set.
            value: 0
          - name: MTCTRL_LDOK_SET
            description: Buffered registers of this submodule are loaded and take effect immediately upon MCTRL[LDOK] being set. In this case, it is not necessary to set CTRL[FULL] or CTRL[HALF].
            value: 1
      - name: SPLIT
        description: Split the DBLPWM signal to PWM_A and PWM_B
        bitOffset: 3
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: DBLPWM is not split. PWM_A and PWM_B each have double pulses.
            value: 0
          - name: ENABLED
            description: DBLPWM is split to PWM_A and PWM_B.
            value: 1
      - name: PRSC
        description: Prescaler
        bitOffset: 4
        bitWidth: 3
        access: read-write
        enumeratedValues:
          - name: ONE
            description: Prescaler 1
            value: 0
          - name: TWO
            description: Prescaler 2
            value: 1
          - name: FOUR
            description: Prescaler 4
            value: 2
          - name: EIGHT
            description: Prescaler 8
            value: 3
          - name: SIXTEEN
            description: Prescaler 16
            value: 4
          - name: THIRTYTWO
            description: Prescaler 32
            value: 5
          - name: SIXTYFOUR
            description: Prescaler 64
            value: 6
          - name: HUNDREDTWENTYEIGHT
            description: Prescaler 128
            value: 7
      - name: COMPMODE
        description: Compare Mode
        bitOffset: 7
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: EQUAL_TO
            description: The VAL* registers and the PWM counter are compared using an "equal to" method. This means that PWM edges are only produced when the counter is equal to one of the VAL* register values. This implies that a PWM_A output that is high at the end of a period maintains this state until a match with VAL3 clears the output in the following period.
            value: 0
          - name: EQUAL_TO_OR_GREATER_THAN
            description: The VAL* registers and the PWM counter are compared using an "equal to or greater than" method. This means that PWM edges are produced when the counter is equal to or greater than one of the VAL* register values. This implies that a PWM_A output that is high at the end of a period could go low at the start of the next period if the starting counter value is greater than (but not necessarily equal to) the new VAL3 value.
            value: 1
      - name: DT
        description: Deadtime
        bitOffset: 8
        bitWidth: 2
        access: read-only
      - name: FULL
        description: Full Cycle Reload
        bitOffset: 10
        bitWidth: 1
        access: read-write
        enumeratedValues:
          - name: DISABLED
            description: Full-cycle reloads disabled.
