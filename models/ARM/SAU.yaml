name: SAU
description: Security Attribution Unit (ARMv8-M with TrustZone)
source: RP2350.svd (Cortex-M33); ARMv8-M Architecture Reference Manual
registers:
  - name: CTRL
    description: SAU Control Register
    addressOffset: 0
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Enable SAU
        bitOffset: 0
        bitWidth: 1
      - name: ALLNS
        description: "When SAU is disabled: 0=all Secure, 1=all Non-secure"
        bitOffset: 1
        bitWidth: 1
  - name: TYPE
    description: SAU Type Register
    addressOffset: 4
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SREGION
        description: Number of SAU regions implemented
        bitOffset: 0
        bitWidth: 8
  - name: RNR
    description: SAU Region Number Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        description: Selects the SAU region accessed by RBAR and RLAR
        bitOffset: 0
        bitWidth: 8
  - name: RBAR
    description: SAU Region Base Address Register
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: BADDR
        description: Region base address bits [31:5] (32-byte aligned)
        bitOffset: 5
        bitWidth: 27
  - name: RLAR
    description: SAU Region Limit Address Register
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Region enable
        bitOffset: 0
        bitWidth: 1
      - name: NSC
        description: "Non-secure callable: 0=region is Non-secure, 1=region is Non-secure Callable"
        bitOffset: 1
        bitWidth: 1
      - name: LADDR
        description: Region limit address bits [31:5] (region ends at LADDR|0x1F)
        bitOffset: 5
        bitWidth: 27
addressBlocks:
  - offset: 0
    size: 20
    usage: registers
