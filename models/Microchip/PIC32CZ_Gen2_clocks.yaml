# ===========================================================================
# Generators
# ===========================================================================
generators:
  - name: XOSC
    output: xosc
    description: "External multipurpose crystal oscillator (4..48 MHz crystal, or external clock when XTALEN=0).  CLK_FAIL detection switches to a safe fall-back clock derived from DFLL48M (configured via XOSCCTRLA.CFDPRESC)."
    control: { reg: XOSCCTRLA, field: ENABLE, instance: OSCCTRL }

  - name: DFLL48M
    output: dfll48m_clk
    description: "Digital Frequency-Locked Loop, factory-calibrated to 48 MHz (open loop).  In closed loop the output is GCLK_OSCCTRL_DFLL48 × DFLLMUL.MUL, regulated against the reference."
    control:
      instance: OSCCTRL
      reg: DFLLCTRLA
      field: ENABLE

  - name: XOSC32K
    output: xosc32k
    description: "32.768 kHz crystal oscillator.  Bypass mode (external clock on XIN32) is selected by setting XTALEN=0 with ENABLE=1."
    control: { reg: XOSC32K, field: ENABLE, instance: OSC32KCTRL }

  - name: OSCULP32K
    output: osculp32k
    description: "Internal Ultra-Low-Power 32 kHz RC oscillator.  Always running; no enable bit.  The only clock source available in Backup mode."

  - name: GCLKIN0
    output: gclkin0
    description: "External clock on GCLK_IO[0] pin.  Selected as a generator source via GENCTRL[n].SRC = GCLKIN."
    control: { state: stateGCLKIN0 }
  - name: GCLKIN1
    output: gclkin1
    control: { state: stateGCLKIN1 }
  - name: GCLKIN2
    output: gclkin2
    control: { state: stateGCLKIN2 }
  - name: GCLKIN3
    output: gclkin3
    control: { state: stateGCLKIN3 }
  - name: GCLKIN4
    output: gclkin4
    control: { state: stateGCLKIN4 }
  - name: GCLKIN5
    output: gclkin5
    control: { state: stateGCLKIN5 }
  - name: GCLKIN6
    output: gclkin6
    control: { state: stateGCLKIN6 }
  - name: GCLKIN7
    output: gclkin7
    control: { state: stateGCLKIN7 }


# ===========================================================================
# Muxes
# ===========================================================================
muxes:
  # PLL reference selectors.  PLLCTRL.REFSEL: 0 = GCLK_PLLn_REF, 1 = XOSC,
  # 2 = DFLL48M, 3..7 reserved.
  #
  # The GCLK_PLLn_REF input (REFSEL = 0) is intentionally omitted from the
  # graph: in hardware the PLLn reference can be sourced from any GCLK
  # generator, which itself can be sourced from PLLn's own outputs — a
  # configuration the silicon allows but software would not deliberately
  # select.  Modeling that edge introduces a feedback cycle the DAG
  # validator (correctly) rejects.  Software using GCLK as the PLL
  # reference must reason about the chain externally to this graph.
  - name: PLL0_REFSEL
    output: pll0_ref_pre
    inputs: [null, xosc, dfll48m_clk, null, null, null, null, null]
    control: { reg: PLL0CTRL, field: REFSEL, instance: OSCCTRL }
  - name: PLL1_REFSEL
    output: pll1_ref_pre
    inputs: [null, xosc, dfll48m_clk, null, null, null, null, null]
    control: { reg: PLL1CTRL, field: REFSEL, instance: OSCCTRL }

  # OSC32KCTRL RTC and HSM clock selectors.
  - name: RTC_SEL
    output: rtc_clk
    inputs: [osculp32k, osculp1k, xosc32k, xosc1k]
    control: { reg: CLKSELCTRL, field: RTCSEL, instance: OSC32KCTRL }
  - name: HSM_SEL
    output: hsm_clk
    inputs: [osculp32k, osculp1k, xosc32k, xosc1k]
    control: { reg: CLKSELCTRL, field: HSMSEL, instance: OSC32KCTRL }

  # GCLK generator source selectors (16 of them).  GENCTRL[i].SRC encoding
  # per RM: 0=XOSC, 1=GCLKIN[i], 2=GCLKGEN1, 3=OSCULP32K, 4=XOSC32K,
  # 5=DFLL, 6..9=PLL0_1..4, 10..13=PLL1_1..4, 14..15 reserved.
  # GCLKGEN1 is itself a generator output, so generator 1's SRC mux uses
  # the same encoding but value 2 (GCLKGEN1) is reserved/loopback.
  - name: GCLKGEN0_SRC
    output: gclkgen0_pre
    inputs: [xosc, gclkin0, gclkgen1, osculp32k, xosc32k, dfll48m_clk, pll0_out0, pll0_out1, pll0_out2, pll0_out3, pll1_out0, pll1_out1, pll1_out2, pll1_out3, null, null]
    control: { reg: 'GENCTRL[0]', field: SRC }
  - name: GCLKGEN1_SRC
    output: gclkgen1_pre
    inputs: [xosc, gclkin1, null, osculp32k, xosc32k, dfll48m_clk, pll0_out0, pll0_out1, pll0_out2, pll0_out3, pll1_out0, pll1_out1, pll1_out2, pll1_out3, null, null]
