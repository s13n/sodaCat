          - name: EVERY12PWM
            description: Every 12 PWM opportunities
            value: 11
          - name: EVERY13PWM
            description: Every 13 PWM opportunities
            value: 12
          - name: EVERY14PWM
            description: Every 14 PWM opportunities
            value: 13
          - name: EVERY15PWM
            description: Every 15 PWM opportunities
            value: 14
          - name: EVERY16PWM
            description: Every 16 PWM opportunities
            value: 15
