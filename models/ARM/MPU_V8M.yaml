name: MPU_V8M
description: Memory Protection Unit (ARMv8-M)
source: RP2350.svd (Cortex-M33); ARMv8-M Architecture Reference Manual
registers:
  - name: TYPE
    description: MPU Type Register
    addressOffset: 0
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SEPARATE
        description: "Always 0 (unified MPU)"
        bitOffset: 0
        bitWidth: 1
      - name: DREGION
        description: Number of supported regions
        bitOffset: 8
        bitWidth: 8
  - name: CTRL
    description: MPU Control Register
    addressOffset: 4
    size: 32
    resetValue: 0
    fields:
      - name: ENABLE
        description: Enables the MPU
        bitOffset: 0
        bitWidth: 1
      - name: HFNMIENA
        description: Enable MPU during HardFault, NMI, and FAULTMASK handlers
        bitOffset: 1
        bitWidth: 1
      - name: PRIVDEFENA
        description: Enable default memory map as background region for privileged access
        bitOffset: 2
        bitWidth: 1
  - name: RNR
    description: Region Number Register
    addressOffset: 8
    size: 32
    resetValue: 0
    fields:
      - name: REGION
        description: Selects the region referenced by RBAR and RLAR
        bitOffset: 0
        bitWidth: 8
  - name: RBAR
    description: Region Base Address Register
    addressOffset: 12
    size: 32
    resetValue: 0
    fields:
      - name: XN
        description: Execute-never (instruction fetch disable)
        bitOffset: 0
        bitWidth: 1
      - name: AP
        description: "Access permission: 0=priv RW, 1=any RW, 2=priv RO, 3=any RO"
        bitOffset: 1
        bitWidth: 2
      - name: SH
        description: "Shareability: 0=non-shareable, 1=reserved, 2=outer shareable, 3=inner shareable"
        bitOffset: 3
        bitWidth: 2
      - name: BASE
        description: Region base address bits [31:5] (32-byte aligned)
        bitOffset: 5
        bitWidth: 27
  - name: RLAR
    description: Region Limit Address Register
    addressOffset: 16
    size: 32
    resetValue: 0
    fields:
      - name: EN
        description: Region enable
        bitOffset: 0
        bitWidth: 1
      - name: ATTRINDX
        description: Index into MAIR0/MAIR1 for memory attributes (0-7)
        bitOffset: 1
        bitWidth: 3
      - name: LIMIT
        description: Region limit address bits [31:5] (region ends at LIMIT|0x1F)
        bitOffset: 5
        bitWidth: 27
  - name: RBAR_A1
    description: Region Base Address Register (alias 1, programs RNR+1)
    addressOffset: 20
    size: 32
    resetValue: 0
    fields:
      - name: XN
        bitOffset: 0
        bitWidth: 1
      - name: AP
        bitOffset: 1
        bitWidth: 2
      - name: SH
        bitOffset: 3
        bitWidth: 2
      - name: BASE
        bitOffset: 5
        bitWidth: 27
  - name: RLAR_A1
    description: Region Limit Address Register (alias 1)
    addressOffset: 24
    size: 32
    resetValue: 0
    fields:
      - name: EN
        bitOffset: 0
        bitWidth: 1
      - name: ATTRINDX
        bitOffset: 1
        bitWidth: 3
      - name: LIMIT
        bitOffset: 5
        bitWidth: 27
  - name: RBAR_A2
    description: Region Base Address Register (alias 2, programs RNR+2)
    addressOffset: 28
    size: 32
    resetValue: 0
    fields:
      - name: XN
        bitOffset: 0
        bitWidth: 1
      - name: AP
        bitOffset: 1
        bitWidth: 2
      - name: SH
        bitOffset: 3
        bitWidth: 2
      - name: BASE
        bitOffset: 5
        bitWidth: 27
  - name: RLAR_A2
    description: Region Limit Address Register (alias 2)
    addressOffset: 32
    size: 32
    resetValue: 0
    fields:
      - name: EN
        bitOffset: 0
        bitWidth: 1
      - name: ATTRINDX
        bitOffset: 1
        bitWidth: 3
      - name: LIMIT
        bitOffset: 5
        bitWidth: 27
  - name: RBAR_A3
    description: Region Base Address Register (alias 3, programs RNR+3)
    addressOffset: 36
    size: 32
    resetValue: 0
    fields:
      - name: XN
        bitOffset: 0
        bitWidth: 1
      - name: AP
        bitOffset: 1
        bitWidth: 2
      - name: SH
        bitOffset: 3
        bitWidth: 2
      - name: BASE
        bitOffset: 5
        bitWidth: 27
  - name: RLAR_A3
    description: Region Limit Address Register (alias 3)
    addressOffset: 40
    size: 32
    resetValue: 0
    fields:
      - name: EN
        bitOffset: 0
        bitWidth: 1
      - name: ATTRINDX
        bitOffset: 1
        bitWidth: 3
      - name: LIMIT
        bitOffset: 5
        bitWidth: 27
  - name: MAIR0
    description: Memory Attribute Indirection Register 0 (attributes 0-3)
    addressOffset: 48
    size: 32
    resetValue: 0
    fields:
      - name: ATTR0
        description: Memory attribute encoding for index 0
        bitOffset: 0
        bitWidth: 8
      - name: ATTR1
        description: Memory attribute encoding for index 1
        bitOffset: 8
        bitWidth: 8
      - name: ATTR2
        description: Memory attribute encoding for index 2
        bitOffset: 16
        bitWidth: 8
      - name: ATTR3
        description: Memory attribute encoding for index 3
        bitOffset: 24
        bitWidth: 8
  - name: MAIR1
    description: Memory Attribute Indirection Register 1 (attributes 4-7)
    addressOffset: 52
    size: 32
    resetValue: 0
    fields:
      - name: ATTR4
        description: Memory attribute encoding for index 4
        bitOffset: 0
        bitWidth: 8
      - name: ATTR5
        description: Memory attribute encoding for index 5
        bitOffset: 8
        bitWidth: 8
      - name: ATTR6
        description: Memory attribute encoding for index 6
        bitOffset: 16
        bitWidth: 8
      - name: ATTR7
        description: Memory attribute encoding for index 7
        bitOffset: 24
        bitWidth: 8
addressBlocks:
  - offset: 0
    size: 56
    usage: registers
