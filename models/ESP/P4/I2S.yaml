        bitOffset: 18
        bitWidth: 1
        access: read-write
      - name: RX_TDM_EN
        description: '1: Enable I2S TDM Rx mode . 0: Disable.'
        bitOffset: 19
        bitWidth: 1
        access: read-write
      - name: RX_PDM_EN
        description: '1: Enable I2S PDM Rx mode . 0: Disable.'
        bitOffset: 20
        bitWidth: 1
        access: read-write
      - name: RX_BCK_DIV_NUM
        description: Bit clock configuration bits in receiver mode.
        bitOffset: 21
        bitWidth: 6
        access: read-write
