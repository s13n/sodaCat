name: FREQM
version: 037073a0
description: Frequency meter
source: PIC32CZ8110CA80208 SVD Rev 0
registers:
  - name: CTRLA
    description: Control A Register
    addressOffset: 0
    size: 8
    resetValue: 128
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
      - name: ENABLE
        description: Enable
        bitOffset: 1
        bitWidth: 1
      - name: FREERUN
        description: Free Running Mode
        bitOffset: 2
        bitWidth: 1
      - name: RUNSTDBY
        description: Run In Standby
        bitOffset: 6
        bitWidth: 1
      - name: ONDEMAND
        description: On Demand Control
        bitOffset: 7
        bitWidth: 1
  - name: CTRLB
    description: Control B Register
    addressOffset: 1
    size: 8
    access: write-only
    resetValue: 0
    fields:
      - name: START
        description: Start Measurement
        bitOffset: 0
        bitWidth: 1
  - name: CFGA
    description: Config A Register
    addressOffset: 2
    size: 16
    resetValue: 0
    fields:
      - name: REFNUM
        description: Number of Reference Clock Cycles
        bitOffset: 0
        bitWidth: 8
      - name: MSRSEL
        description: Measurement Clock Selection
        bitOffset: 8
        bitWidth: 3
        enumeratedValues:
          - name: GCLK
            description: GCLK Input Clock
            value: 0
          - name: CPU
            description: CPU Input Clock
            value: 1
      - name: DIVREF
        description: Divide Reference Clock
        bitOffset: 15
        bitWidth: 1
        enumeratedValues:
          - name: DIV1
            description: The reference clock is divided by 1
            value: 0
          - name: DIV8
            description: The reference clock is divided by 8
            value: 1
  - name: CTRLC
    description: Control C Register
    addressOffset: 4
    size: 8
    resetValue: 0
    fields:
      - name: WINMODE
        description: Window Monitor Mode
        bitOffset: 0
        bitWidth: 3
        enumeratedValues:
          - name: DISABLE
            description: No window mode (default)
            value: 0
          - name: MODE1
            description: VALUE > WINLT
            value: 1
          - name: MODE2
            description: VALUE < WINUT
            value: 2
          - name: MODE3
            description: WINLT < VALUE < WINUT
            value: 3
          - name: MODE4
            description: '!(WINLT < VALUE < WINUT)'
            value: 4
  - name: EVCTRL
    description: Event Control Register
    addressOffset: 6
    size: 8
    resetValue: 0
    fields:
      - name: STARTEI
        description: Start Measurement Event Input Enable
        bitOffset: 0
        bitWidth: 1
      - name: STARTINV
        description: Start Measurement Event Invert Enable
        bitOffset: 1
        bitWidth: 1
      - name: DONEEO
        description: Measurement Done Event Out
        bitOffset: 4
        bitWidth: 1
      - name: WINMONEO
        description: Window Monitor Event Out
        bitOffset: 5
        bitWidth: 1
  - name: INTENCLR
    description: Interrupt Enable Clear Register
    addressOffset: 8
    size: 8
    resetValue: 0
    fields:
      - name: DONE
        description: Measurement Done Interrupt Disable
        bitOffset: 0
        bitWidth: 1
      - name: WINMON
        description: Window Monitor Interrupt Disable
        bitOffset: 1
        bitWidth: 1
  - name: INTENSET
    description: Interrupt Enable Set Register
    addressOffset: 9
    size: 8
    resetValue: 0
    fields:
      - name: DONE
        description: Measurement Done Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: WINMON
        description: Window Monitor Interrupt Enable
        bitOffset: 1
        bitWidth: 1
  - name: INTFLAG
    description: Interrupt Flag Register
    addressOffset: 10
    size: 8
    resetValue: 0
    fields:
      - name: DONE
        description: Measurement Done
        bitOffset: 0
        bitWidth: 1
      - name: WINMON
        description: Window Monitor
        bitOffset: 1
        bitWidth: 1
  - name: STATUS
    description: Status Register
    addressOffset: 11
    size: 8
    resetValue: 0
    fields:
      - name: BUSY
        description: FREQM Status
        bitOffset: 0
        bitWidth: 1
      - name: OVF
        description: Sticky Count Value Overflow
        bitOffset: 1
        bitWidth: 1
  - name: SYNCBUSY
    description: Synchronization Busy Register
    addressOffset: 12
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: SWRST
        description: Software Reset
        bitOffset: 0
        bitWidth: 1
      - name: ENABLE
        description: Enable
        bitOffset: 1
        bitWidth: 1
  - name: VALUE
    description: Count Value Register
    addressOffset: 16
    size: 32
    access: read-only
    resetValue: 0
    fields:
      - name: VALUE
        description: Measurement Value
        bitOffset: 0
        bitWidth: 24
  - name: WINLT
    description: Window Monitor Lower Threshold
    addressOffset: 32
    size: 32
    resetValue: 0
    fields:
      - name: WINLT
        description: Window Lower Threshold
        bitOffset: 0
        bitWidth: 24
  - name: WINUT
    description: Window Monitor Upper Threshold
    addressOffset: 36
    size: 32
    resetValue: 0
    fields:
      - name: WINUT
        description: Window Upper Threshold
        bitOffset: 0
        bitWidth: 24
addressBlocks:
  - offset: 0
    size: 40
    usage: registers
interrupts:
  - name: INT
    description: Frequency Meter
