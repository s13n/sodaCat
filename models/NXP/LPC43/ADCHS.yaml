      - name: THCMP_UCROSS2
        description: Input channel 2 result upward threshold crossing detected
        bitOffset: 13
        bitWidth: 1
      - name: OVERRUN_2
        description: A new conversion on channel m completed and has overwritten the previous contents of  register  LAST_SAMPLE [2]  before it has been read
        bitOffset: 14
