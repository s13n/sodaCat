  - name: SR
    description: Supply Controller Status Register
    addressOffset: 20
    size: 32
    access: read-only
    fields:
      - name: WKUPS
        description: WKUP Wake-up Status (cleared on read)
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No wake-up due to the assertion of the WKUP pins has occurred since the last read of SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one wake-up due to the assertion of the WKUP pins has occurred since the last read of SUPC_SR.
            value: 1
      - name: SMWS
        description: Supply Monitor Detection Wake-up Status (cleared on read)
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No wake-up due to a supply monitor detection has occurred since the last read of SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one wake-up due to a supply monitor detection has occurred since the last read of SUPC_SR.
            value: 1
      - name: BODRSTS
        description: Brownout Detector Reset Status (cleared on read)
        bitOffset: 3
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No core brownout rising edge event has been detected since the last read of the SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one brownout output rising edge event has been detected since the last read of the SUPC_SR.
            value: 1
      - name: SMRSTS
        description: Supply Monitor Reset Status (cleared on read)
        bitOffset: 4
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No supply monitor detection has generated a core reset since the last read of the SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one supply monitor detection has generated a core reset since the last read of the SUPC_SR.
            value: 1
      - name: SMS
        description: Supply Monitor Status (cleared on read)
        bitOffset: 5
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No supply monitor detection since the last read of SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one supply monitor detection since the last read of SUPC_SR.
            value: 1
      - name: SMOS
        description: Supply Monitor Output Status
        bitOffset: 6
        bitWidth: 1
        enumeratedValues:
          - name: HIGH
            description: The supply monitor detected VDDIO higher than its threshold at its last measurement.
            value: 0
          - name: LOW
            description: The supply monitor detected VDDIO lower than its threshold at its last measurement.
            value: 1
      - name: OSCSEL
        description: 32-kHz Oscillator Selection Status
        bitOffset: 7
        bitWidth: 1
        enumeratedValues:
          - name: RC
            description: The slow clock, SLCK, is generated by the embedded 32 kHz RC oscillator.
            value: 0
          - name: CRYST
            description: The slow clock, SLCK, is generated by the 32 kHz crystal oscillator.
            value: 1
      - name: LPDBCS0
        description: Low-power Debouncer Wake-up Status on WKUP0 (cleared on read)
        bitOffset: 13
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No wake-up due to the assertion of the WKUP0 pin has occurred since the last read of SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one wake-up due to the assertion of the WKUP0 pin has occurred since the last read of SUPC_SR.
            value: 1
      - name: LPDBCS1
        description: Low-power Debouncer Wake-up Status on WKUP1 (cleared on read)
        bitOffset: 14
        bitWidth: 1
        enumeratedValues:
          - name: 'NO'
            description: No wake-up due to the assertion of the WKUP1 pin has occurred since the last read of SUPC_SR.
            value: 0
          - name: PRESENT
            description: At least one wake-up due to the assertion of the WKUP1 pin has occurred since the last read of SUPC_SR.
            value: 1
      - name: WKUPIS0
        description: WKUPx Input Status (cleared on read)
        bitOffset: 16
        bitWidth: 1
        enumeratedValues:
          - name: DIS
            description: The corresponding wake-up input is disabled, or was inactive at the time the debouncer triggered a wake-up event.
            value: 0
          - name: EN
