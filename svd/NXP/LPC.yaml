# Consolidated configuration for NXP LPC model extraction.
# SVD files are fetched from https://github.com/nxp-mcuxpresso/mcux-soc-svd
# via CMake FetchContent. File layout: <chip>/<chip>.xml

svd:
  repo: https://github.com/nxp-mcuxpresso/mcux-soc-svd
  tag: MCUX_2.16.100

shared_blocks:
  WWDT:
    from: LPC865.WWDT
    params:
      - {name: has_debug_en, type: bool, default: false, description: Has DEBUG_EN field in MOD register}
    interrupts:
      WDT: INTR
      WDT_BOD: INTR
      WWDT: INTR
      WWDT0: INTR
      WWDT1: INTR
    transforms:
      - type: patchFields
        register: MOD
        fields:
          - name: WDTOF
            enumeratedValues:
              - {name: CLEAR, description: No watchdog event, value: 0}
              - {name: RESET, description: Watchdog event occurred, value: 1}
          - name: WDINT
            modifiedWriteValues: oneToClear
            enumeratedValues:
              - {name: NO_FLAG, description: No flag, value: 0}
              - {name: FLAG, description: Flag, value: 1}
          - name: LOCK
            enumeratedValues:
              - {name: NO_LOCK, description: No Lock, value: 0}
              - {name: LOCK, description: Lock, value: 1}
          - name: DEBUG_EN
            description: Debug Enable
            bitOffset: 6
            bitWidth: 1
            access: read-write
            enumeratedValues:
              - {name: DISABLE, description: Disabled, value: 0}
              - {name: ENABLE, description: Enabled, value: 1}

  GPIO:
    from: LPC54S018.GPIO
    params:
      - {name: ports, type: int, default: 2, max: 6, description: Number of GPIO ports}

  CTIMER:
    from: LPC54S018.CTIMER0
    interrupts:
      CTIMER0: CTIMER

  SCT:
    from: LPC54S018.SCT0
    params:
      - {name: match_channels, type: int, default: 16, max: 16, description: Number of match/capture channels}
      - {name: events, type: int, default: 16, max: 16, description: Number of events}
      - {name: outputs, type: int, default: 10, max: 16, description: Number of output channels}
      - {name: has_fractional_match, type: bool, default: false, description: Has DITHER and FRACMAT registers for fractional match}
    interrupts:
      SCT0: INTR
      SCT: INTR
    transforms:
      - type: patchRegisters
        registers:
          - name: DITHER
            description: Dither Condition
            addressOffset: 24
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: DITHER_L, description: Dither Low, bitOffset: 0, bitWidth: 16, access: read-write}
              - {name: DITHER_H, description: Dither High, bitOffset: 16, bitWidth: 16, access: read-write}
          - name: FRACMAT[%s]
            dim: 16
            dimIncrement: 4
            description: Fractional Match
            addressOffset: 320
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: FRACMAT_L, description: Fractional Match Low, bitOffset: 0, bitWidth: 4, access: read-write}
              - {name: FRACMAT_H, description: Fractional Match High, bitOffset: 16, bitWidth: 4, access: read-write}
          - name: FRACMATREL[%s]
            dim: 16
            dimIncrement: 4
            description: Fractional Match Reload
            addressOffset: 576
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: RELFRAC_L, description: Reload Fractional Match Low, bitOffset: 0, bitWidth: 4, access: read-write}
              - {name: RELFRAC_H, description: Reload Fractional Match High, bitOffset: 16, bitWidth: 4, access: read-write}
      - type: patchFields
        register: DMAREQ0
        fields:
          - {name: DRQ0, access: read-only}
      - type: patchFields
        register: DMAREQ1
        fields:
          - {name: DRQ1, access: read-only}
      - type: patchFields
        register: CONFIG
        fields:
          - name: NORELOAD_L
            enumeratedValues:
              - {name: RELOAD, description: Reloaded, value: 0}
              - {name: NO_RELOAD, description: Not reloaded, value: 1}
          - name: NORELOAD_H
            enumeratedValues:
              - {name: RELOAD_H, description: Reloaded, value: 0}
              - {name: NO_RELOAD_H, description: Not reloaded, value: 1}
          - name: AUTOLIMIT_L
            enumeratedValues:
              - {name: DISABLE, description: Disables, value: 0}
              - {name: ENABLE, description: Enables, value: 1}
          - name: AUTOLIMIT_H
            enumeratedValues:
              - {name: DISABLE, description: Disables, value: 0}
              - {name: ENABLE, description: Enables, value: 1}
      - type: patchFields
        register: CTRL
        fields:
          - name: DOWN_L
            enumeratedValues:
              - {name: UP, description: Up, value: 0}
              - {name: DOWN, description: Down, value: 1}
          - name: STOP_L
            enumeratedValues:
              - {name: DISABLE, description: Disabled, value: 0}
              - {name: ENABLE, description: Enabled, value: 1}
          - name: HALT_L
            enumeratedValues:
              - {name: DISABLE, description: Disabled, value: 0}
              - {name: ENABLE, description: Enabled, value: 1}
          - name: DOWN_H
            enumeratedValues:
              - {name: UP, description: Up, value: 0}
              - {name: DOWN, description: Down, value: 1}
          - name: STOP_H
            enumeratedValues:
              - {name: DISABLE, description: Disabled, value: 0}
              - {name: ENABLE, description: Enabled, value: 1}
          - name: HALT_H
            enumeratedValues:
              - {name: DISABLE, description: Disable, value: 0}
              - {name: ENABLE, description: Enable, value: 1}

  CRC:
    from: LPC865.CRC

  MRT:
    from: LPC865.MRT0
    params:
      - {name: timer_bits, type: int, default: 31, description: Timer counter width in bits}
      - {name: has_modcfg, type: bool, default: false, description: Has MODCFG register and INUSE flags}
    transforms:
      - type: patchRegisters
        registers:
          - name: MODCFG
            description: Module Configuration register. This register provides information about this particular MRT instance, and allows choosing an overall mode for the idle channel feature.
            addressOffset: 240
            size: 32
            access: read-write
            resetValue: 371
            resetMask: 2147484159
            fields:
              - name: NOC
                description: Identifies the number of channels in this MRT.
                bitOffset: 0
                bitWidth: 4
                access: read-only
              - name: NOB
                description: Identifies the number of timer bits in this MRT.
                bitOffset: 4
                bitWidth: 5
                access: read-only
              - name: MULTITASK
                description: Selects the operating mode for the INUSE flags and the IDLE_CH register.
                bitOffset: 31
                bitWidth: 1
                access: read-write
                enumeratedValues:
                  - {name: HARDWARE_STATUS_MODE, description: Hardware status mode. In this mode, the INUSE(n) flags for all channels are reset., value: 0}
                  - {name: MULTI_TASK_MODE, description: Multi-task mode., value: 1}
    interrupts:
      MRT0: MRT

  PINT:
    from: LPC865.PINT
    interrupts:
      PIN_INT0: INT0
      PIN_INT1: INT1
      PIN_INT2: INT2
      PIN_INT3: INT3
      PIN_INT4: INT4
      PIN_INT5: INT5
      PIN_INT6: INT6
      PIN_INT7: INT7
      PINT0: PINT

  UTICK:
    from: LPC54S018.UTICK0
    interrupts:
      UTICK0: INTR

  LCD:
    from: LPC4350.LCD
    params:
      - {name: num_palette, type: int, default: 256, description: Number of palette entries}
    interrupts:
      LCD: INTR

  PL08x:
    # ARM PrimeCell DMA Controller.  Two ARM-published variants share one
    # register layout: the full PL080 (DDI 0196) and the cut-down PL081
    # (DDI 0218).  Licensed IP used by NXP LPC17xx/LPC178x/LPC408x/LPC18xx/
    # LPC43xx/LPC24xx, ST SPEAr, ST-Ericsson Nomadik, Samsung S3C6410,
    # Faraday FTDMAC020, ARM RealView/Versatile reference platforms.  The
    # 32-bit-wide channel-mask register fields are synthesis headroom; no
    # known silicon uses more than 8 channels (PL080) or 2 (PL081).
    designer: ARM
    from: LPC4350.GPDMA
    description: ARM PrimeCell DMA Controller (PL080/PL081)
    params:
      - {name: pl081, type: int, default: 0, max: 1,
         description: "0 = PL080 (8 channels, 2 AHB masters); 1 = PL081 (2 channels only, single AHB master so CONFIG.M1 endianness bit, C[n].LLI.LM bit, and C[n].CONTROL.S/D master-select bits are reserved). Both variants share the same register layout."}
    transforms:
      - type: clusterArrays
        pattern: 'C%s(.+)'
        name: C
        description: DMA channel
  SPIFI:
    from: LPC54S018.SPIFI0
    # Memory-mapped flash windows.  Naming for the primary (code-capable)
    # window mirrors STM32 QUADSPI (`base`, `logsize`).  The optional
    # data-only secondary window is an LPC speciality: LPC43 exposes the
    # same flash twice — a code-capable window and a non-cacheable
    # data-only window.  Set `data_base = 0` to disable.
    params:
      - {name: base, type: int, default: 0, max: 255, description: 'Top 8 bits of memory-mapped base address (e.g. 0x14 = 0x14000000)'}
      - {name: logsize, type: int, default: 0, max: 31, description: 'Memory window size as log2 (26 = 64 MB)'}
      - {name: data_base, type: int, default: 0, max: 255, description: 'Top 8 bits of data-only memory-mapped base address (0 = no separate data window)'}
      - {name: data_logsize, type: int, default: 0, max: 31, description: 'Data-only window size as log2 (0 = none)'}
    interrupts:
      SPIFI: INTR
      SPIFI0: INTR

families:
  LPC8:
    subfamilies:
      LPC802:
        chips: [LPC802]
        ref_manual: {name: UM11045, rev: "1.5", date: 2021-03-22, url: "https://www.nxp.com/webapp/Download?colCode=UM11045"}
      LPC804:
        chips: [LPC804]
        ref_manual: {name: UM11065, rev: "1.4", date: 2021-03-18, url: "https://www.nxp.com/webapp/Download?colCode=UM11065"}
      LPC81x:
        chips: [LPC810, LPC811, LPC812]
        ref_manual: {name: UM10601, rev: "1.7", date: 2021-05-27, url: "https://www.nxp.com/webapp/Download?colCode=UM10601"}
      LPC82x:
        chips: [LPC822, LPC824]
        ref_manual: {name: UM10800, rev: "1.4", date: 2021-05-27, url: "https://www.nxp.com/webapp/Download?colCode=UM10800"}
      LPC83x:
        chips: [LPC832, LPC834]
        ref_manual: {name: UM11021, rev: "1.1", date: 2016-10-05, url: "https://www.nxp.com/webapp/Download?colCode=UM11021"}
      LPC84x:
        chips: [LPC844, LPC845]
        ref_manual: {name: UM11029, rev: "1.7", date: 2021-04-14, url: "https://www.nxp.com/webapp/Download?colCode=UM11029"}
      LPC86x:
        chips: [LPC864, LPC865]
        ref_manual: {name: UM11607, rev: "3.1", date: 2025-11-07, url: "https://www.nxp.com/webapp/Download?colCode=UM11607"}
    blocks:
      ACOMP:
        from: LPC865.ACOMP
        instances: [ACOMP]
        interrupts:
          CMP: COMPEDGE
          CMP_CAPT: COMPEDGE
          COMPEDGE: COMPEDGE
      ADC:
        from: LPC865.ADC0
        instances: [ADC, ADC0]
        interrupts:
          ADC0_SEQA: SEQA
          ADC0_SEQB: SEQB
          ADC0_THCMP: THCMP
          ADC0_OVR: OVR
          ADC_SEQA: SEQA
          ADC_SEQB: SEQB
          ADC_THCMP: THCMP
          ADC_OVR: OVR
      CAPT:
        from: LPC845.CAPT
        instances: [CAPT]
        interrupts:
          CMP_CAPT: CAPT
      CRC:
        uses: CRC
        instances: [CRC]
      CTIMER:
        uses: CTIMER
        instances: [CTIMER0]
        interrupts:
          CTIMER0: CTIMER
      DAC:
        from: LPC845.DAC0
        instances: [DAC0, DAC1]
        interrupts:
          DAC0: DAC
          PIN_INT5_DAC1: DAC
      SmartDMA:
        from: LPC865.DMA0
        instances: [DMA0]
        interrupts:
          DMA0: DMA
        params:
          - {name: max_channel, type: int, default: 15, max: 15, description: Index of last DMA channel}
      FLASH_CTRL:
        from: LPC865.FLASH_CTRL
        instances: [FLASH_CTRL]
        interrupts:
          FLASH: FLASH
      FTM:
        from: LPC865.FTM0
        instances: [FTM0, FTM1]
        interrupts:
          FTM0: FTM
        transforms:
          - {type: renameRegisters, pattern: "^CONTROLS\\[%s\\]$", replacement: "C[%s]"}
          - {type: renameRegisters, pattern: "^CSC$", replacement: SC}
          - {type: renameRegisters, pattern: "^CV$", replacement: V}
        params:
          - {name: max_channel, type: int, default: 5, max: 5, description: Index of last timer channel}
          - {name: qdec, type: bool, default: false, description: Quadrature decoder present}
          - {name: dither, type: bool, default: true, description: PWM dithering support}
          - {name: fault_inputs, type: int, default: 4, max: 4, description: Number of fault inputs}
          - {name: modulation, type: bool, default: false, description: Modulation support}
      GPIO:
        uses: GPIO
        instances: [GPIO]
      I2C:
        from: LPC865.I2C0
        instances: [I2C0, I2C1, I2C2, I2C3]
        interrupts:
          I2C0: I2C
        params:
          - {name: rx_req, type: int, description: DMA receive channel}
          - {name: tx_req, type: int, description: DMA transmit channel}
      I3C:
        from: LPC864.I3C0
        instances: [I3C0]
        interrupts:
          I3C0: I3C
        params:
          - {name: rx_req, type: int, description: DMA receive channel}
          - {name: tx_req, type: int, description: DMA transmit channel}
      INPUTMUX:
        from: LPC865.INPUTMUX
        instances: [INPUTMUX]
        variants:
          LPC82x:
            from: LPC824.INPUTMUX
          LPC83x:
            from: LPC832.INPUTMUX
          LPC84x:
            from: LPC845.INPUTMUX
      IOCON:
        from: LPC865.IOCON
        instances: [IOCON]
      MRT:
        uses: MRT
        instances: [MRT0]
        interrupts:
          MRT0: MRT
      PINT:
        uses: PINT
        instances: [PINT]
        interrupts:
          PIN_INT0: INT0
          PIN_INT1: INT1
          PIN_INT2: INT2
          PIN_INT3: INT3
          PIN_INT4: INT4
          PIN_INT5: INT5
          PIN_INT6: INT6
          PIN_INT7: INT7
          PIN_INT5_DAC1: INT5
          PIN_INT6_USART3: INT6
          PIN_INT7_USART4: INT7
      PLU:
        from: LPC804.PLU
        instances: [PLU]
      PMU:
        from: LPC865.PMU
        instances: [PMU]
      SCT:
        uses: SCT
        instances: [SCT0]
        interrupts:
          SCT0: INTR
      SPI:
        from: LPC865.SPI0
        instances: [SPI0, SPI1]
        interrupts:
          SPI0: SPI
        params:
          - {name: rx_req, type: int, description: DMA receive channel}
          - {name: tx_req, type: int, description: DMA transmit channel}
          - {name: ssel_num, type: int, default: 4, max: 4, description: Number of SSEL signals}
      SWM:
        from: LPC865.SWM0
        instances: [SWM0]
        variants:
          LPC802:
            from: LPC802.SWM0
          LPC804:
            from: LPC804.SWM0
          LPC81x:
            from: LPC812.SWM0
          LPC82x:
            from: LPC824.SWM0
          LPC83x:
            from: LPC832.SWM0
          LPC84x:
            from: LPC845.SWM0
      SYSCON:
        from: LPC864.SYSCON
        instances: [SYSCON]
        interrupts:
          BOD: BOD
        variants:
          LPC802:
            from: LPC802.SYSCON
          LPC804:
            from: LPC804.SYSCON
          LPC81x:
            from: LPC812.SYSCON
          LPC82x:
            from: LPC824.SYSCON
          LPC83x:
            from: LPC832.SYSCON
          LPC84x:
            from: LPC845.SYSCON
      USART:
        from: LPC865.USART0
        instances: [USART0, USART1, USART2, USART3, USART4]
        interrupts:
          USART0: USART
          PIN_INT6_USART3: USART
          PIN_INT7_USART4: USART
        params:
          - {name: rx_req, type: int, description: DMA receive channel}
          - {name: tx_req, type: int, description: DMA transmit channel}
      WKT:
        from: LPC865.WKT
        instances: [WKT]
        interrupts:
          WKT: WKT
      WWDT:
        uses: WWDT
        instances: [WWDT]
    chip_params:
      _all:
        _all:
          FTM1: {max_channel: 3, qdec: true, fault_inputs: 0}
          SCT0: {match_channels: 8, events: 8, outputs: 7}
          SPI1: {ssel_num: 2}
      LPC86x:
        LPC865:
          I2C0: {rx_req: 10, tx_req: 11}
          I3C0: {rx_req: 12, tx_req: 13}
          SPI0: {rx_req: 6, tx_req: 7}
          SPI1: {rx_req: 8, tx_req: 9}
          USART0: {rx_req: 0, tx_req: 1}
          USART1: {rx_req: 2, tx_req: 3}
          USART2: {rx_req: 4, tx_req: 5}
    chip_interrupts:
      LPC802:
        _all:
          ACOMP: {COMPEDGE: 11}
          MRT0: {MRT: 10}
          SYSCON: {BOD: 13}
          WWDT: {INTR: 12}
      LPC804:
        _all:
          ACOMP: {COMPEDGE: 11}
          MRT0: {MRT: 10}
          SYSCON: {BOD: 13}
      LPC81x:
        _all:
          ACOMP: {COMPEDGE: 11}
          FLASH_CTRL: {FLASH: 14}
          MRT0: {MRT: 10}
          SYSCON: {BOD: 13}
      LPC86x:
        _all:
          ACOMP: {COMPEDGE: 11}

  LPC54:
    subfamilies:
      LPC540xx:
        chips: [LPC54005, LPC54016, LPC54018, LPC54018M,
                LPC54S005, LPC54S016, LPC54S018, LPC54S018M]
        ref_manual: {name: UM11060, rev: "1.5", date: 2019-11-25, url: "https://www.nxp.com/webapp/Download?colCode=UM11060"}
      LPC5411x:
        chips: [LPC54113, LPC54114]
        ref_manual: {name: UM10914, rev: "2.0", date: 2018-05-09, url: "https://www.nxp.com/webapp/Download?colCode=UM10914"}
      LPC546xx:
        chips: [LPC54605, LPC54606, LPC54607, LPC54608,
                LPC54616, LPC54618, LPC54628]
        ref_manual: {name: UM10912, rev: "2.4", date: 2019-11-12, url: "https://www.nxp.com/webapp/Download?colCode=UM10912"}
    blocks:
      ADC:
        from: LPC54S018.ADC0
        instances: [ADC0]
        interrupts:
          ADC0_SEQA: SEQA
          ADC0_SEQB: SEQB
          ADC0_THCMP: THCMP
          ADC0_OVR: OVR
      AES:
        from: LPC54S018.AES0
        instances: [AES0]
      ASYNC_SYSCON:
        from: LPC54S018.ASYNC_SYSCON
        instances: [ASYNC_SYSCON]
      CAN:
        from: LPC54S018.CAN0
        instances: [CAN0, CAN1]
        interrupts:
          CAN0_IRQ0: IRQ0
          CAN0_IRQ1: IRQ1
      CRC:
        uses: CRC
        instances: [CRC_ENGINE]
      CTIMER:
        uses: CTIMER
        instances: [CTIMER0, CTIMER1, CTIMER2, CTIMER3, CTIMER4]
        interrupts:
          CTIMER0: CTIMER
      SmartDMA:
        from: LPC54S018.DMA0
        instances: [DMA0]
        interrupts:
          DMA0: DMA
        params:
          - {name: max_channel, type: int, default: 31, max: 31, description: Index of last DMA channel}
      DMIC:
        from: LPC54S018.DMIC0
        instances: [DMIC0]
        interrupts:
          DMIC0: DMIC
          HWVAD0: HWVAD
      EMC:
        from: LPC54S018.EMC
        instances: [EMC]
      ENET:
        from: LPC54S018.ENET
        instances: [ENET]
        interrupts:
          ETHERNET: INTR
          ETHERNET_MACLP: MACLP
          ETHERNET_PMT: PMT
      ETM:
        from: LPC54S018.ETM
        instances: [ETM]
      FLEXCOMM:
        from: LPC54S018.FLEXCOMM0
        instances: [FLEXCOMM0, FLEXCOMM1, FLEXCOMM2, FLEXCOMM3, FLEXCOMM4,
                    FLEXCOMM5, FLEXCOMM6, FLEXCOMM7, FLEXCOMM8, FLEXCOMM9,
                    FLEXCOMM10]
        interrupts:
          FLEXCOMM0: INTR
      GINT:
        from: LPC54S018.GINT0
        instances: [GINT0, GINT1]
        interrupts:
          GINT0: GINT
      GPIO:
        uses: GPIO
        instances: [GPIO]
      I2C:
        from: LPC54S018.I2C0
        instances: [I2C0, I2C1, I2C2, I2C3, I2C4, I2C5, I2C6, I2C7, I2C8, I2C9]
        interrupts:
          FLEXCOMM0: FLEXCOMM
          FLEXCOMM1: FLEXCOMM
          FLEXCOMM2: FLEXCOMM
          FLEXCOMM3: FLEXCOMM
          FLEXCOMM4: FLEXCOMM
          FLEXCOMM5: FLEXCOMM
          FLEXCOMM6: FLEXCOMM
          FLEXCOMM7: FLEXCOMM
          FLEXCOMM8: FLEXCOMM
          FLEXCOMM9: FLEXCOMM
        params:
          - {name: rx_req, type: int, description: DMA receive channel}
          - {name: tx_req, type: int, description: DMA transmit channel}
      I2S:
        from: LPC54S018.I2S0
        instances: [I2S0, I2S1]
        interrupts:
          FLEXCOMM0: FLEXCOMM
          FLEXCOMM1: FLEXCOMM
          FLEXCOMM2: FLEXCOMM
          FLEXCOMM3: FLEXCOMM
          FLEXCOMM4: FLEXCOMM
          FLEXCOMM5: FLEXCOMM
          FLEXCOMM6: FLEXCOMM
          FLEXCOMM7: FLEXCOMM
          FLEXCOMM8: FLEXCOMM
          FLEXCOMM9: FLEXCOMM
      INPUTMUX:
        from: LPC54S018.INPUTMUX
        instances: [INPUTMUX]
      IOCON:
        from: LPC54S018.IOCON
        instances: [IOCON]
      LCD:
        uses: LCD
        instances: [LCD]
        interrupts:
          LCD: INTR
      MRT:
        uses: MRT
        instances: [MRT0]
        interrupts:
          MRT0: MRT
      OTPC:
        from: LPC54S018.OTPC
        instances: [OTPC]
      PINT:
        uses: PINT
        instances: [PINT]
        interrupts:
          PIN_INT0: INT0
          PIN_INT1: INT1
          PIN_INT2: INT2
          PIN_INT3: INT3
          PIN_INT4: INT4
          PIN_INT5: INT5
          PIN_INT6: INT6
          PIN_INT7: INT7
      PUF:
        from: LPC54S018.PUF
        instances: [PUF]
        interrupts:
          PUF: INTR
      RIT:
        from: LPC54S018.RIT
        instances: [RIT]
        interrupts:
          RIT: INTR
      RTC:
        from: LPC54S018.RTC
        instances: [RTC]
        interrupts:
          RTC: INTR
      SCT:
        uses: SCT
        instances: [SCT0]
