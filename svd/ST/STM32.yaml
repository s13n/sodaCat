      GPDMA1_CHannel28: CH28
      GPDMA1_CHannel29: CH29
      GPDMA1_CHannel30: CH30
      GPDMA1_CHannel31: CH31
    description: General-purpose DMA controller
    transforms:
      - {type: createClusterArray, pattern: C(\d+)(.+), name: C, description: DMA channel, template: 12}
    params:
      - {name: max_channel, type: int, default: 15, max: 31, description: Highest DMA channel index (0-based)}
      - {name: enhanced_channels, type: int, default: 4, max: 32, description: Number of enhanced channels with 2D transfer support (last N channels)}
      - {name: has_trustzone, type: bool, default: true, description: TrustZone security support}
  MDIOS:
    # Management Data Input/Output Slave: F7, H7, H7RS, N6
    from: STM32H723.MDIOS
    interrupts:
      MDIOS_WKUP: WKUP
      MDIOS: INTR
  OTG:
    # USB OTG (Synopsys DWC2): F4, F7, H7, H7RS, L4, L4P, N6, U5
    from: STM32H7S.OTG_HS
    interrupts:
      OTG_FS: INTR
      OTG_HS: INTR
      OTG1: INTR
      OTG_FS_WKUP: WKUP
      OTG_HS_WKUP: WKUP
      OTG_HS_EP1_OUT: EP1_OUT
      OTG_HS_EP1_IN: EP1_IN
    description: USB on-the-go (Synopsys DWC2)
    params:
      - {name: max_in_endpoint, type: int, default: 8, max: 15, description: 'Highest device IN endpoint index (DIEPCTL registers, 0=EP0 only)'}
      - {name: max_out_endpoint, type: int, default: 8, max: 15, description: 'Highest device OUT endpoint index (DOEPCTL registers, 0=EP0 only)'}
      - {name: max_channel, type: int, default: 15, max: 15, description: Highest host channel index (HCCHAR registers)}
      - {name: max_tx_fifo, type: int, default: 7, max: 14, description: 'Highest dedicated TX FIFO index (DIEPTXF registers, 1-based)'}
      - {name: has_dma, type: bool, default: true, description: 'DMA support (HBSTLEN/DMAEN in GAHBCFG, DMA registers)'}
      - {name: has_lpm, type: bool, default: true, description: 'Link Power Management (GLPMCFG register, ERRATIM/DEVLNSTS)'}
      - {name: gccfg, type: int, default: 2, max: 2, description: 'GCCFG register variant: 0=vbus (F4-old/L4/L4P), 1=bcd (F4-BCD/F7/H7/U5), 2=cdp (H7RS/N6)'}
    transforms:
      # Patch base GCCFG: add N6-specific fields to make superset
      - type: patchFields
        register: GCCFG
        fields:
          - {name: VBUSVLD, description: VBUS valid indicator, bitOffset: 4, bitWidth: 1, access: read-only}
          - {name: BCDEN, description: Force Battery Charging mode, bitOffset: 26, bitWidth: 1}
          - {name: IDPULLUPDIS, description: Disable ID pin pull-up, bitOffset: 28, bitWidth: 1}
      # Clone GCCFG → GCCFG_BCD (BCD charger detection: F4-BCD, F7, H7, U5)
      - type: cloneRegister
        source: GCCFG
        name: GCCFG_BCD
        removeFields: [CHGDET, FSVPLUS, FSVMINUS, SESSVLD, VBUSVLD, HCDPEN, HCDPDETEN, HVDMSRCEN, DCDEN, PDEN, VBDEN, SDEN, VBVALOVAL, VBVALOVEN, FORCEHOSTPD, BCDEN, IDPULLUPDIS]
      - type: patchFields
        register: GCCFG_BCD
        fields:
          - {name: DCDET, description: Data contact detection, bitOffset: 0, bitWidth: 1, access: read-only}
          - {name: PDET, description: Primary detection, bitOffset: 1, bitWidth: 1, access: read-only}
          - {name: SDET, description: Secondary detection, bitOffset: 2, bitWidth: 1, access: read-only}
          - {name: PS2DET, description: PS2 port or proprietary charger, bitOffset: 3, bitWidth: 1, access: read-only}
          - {name: PWRDWN, description: Power down, bitOffset: 16, bitWidth: 1}
          - {name: BCDEN, description: Battery charging detector enable, bitOffset: 17, bitWidth: 1}
          - {name: DCDEN, description: Data contact detection enable, bitOffset: 18, bitWidth: 1}
          - {name: PDEN, description: Primary detection enable, bitOffset: 19, bitWidth: 1}
          - {name: SDEN, description: Secondary detection enable, bitOffset: 20, bitWidth: 1}
          - {name: VBDEN, description: VBUS detection enable, bitOffset: 21, bitWidth: 1}
      # Clone GCCFG → GCCFG_VBUS (old VBUS sensing: F4-old, L4, L4P)
      - type: cloneRegister
        source: GCCFG
        name: GCCFG_VBUS
        removeFields: [CHGDET, FSVPLUS, FSVMINUS, SESSVLD, VBUSVLD, HCDPEN, HCDPDETEN, HVDMSRCEN, DCDEN, PDEN, VBDEN, SDEN, VBVALOVAL, VBVALOVEN, FORCEHOSTPD, BCDEN, IDPULLUPDIS]
      - type: patchFields
        register: GCCFG_VBUS
        fields:
          - {name: PWRDWN, description: Power down, bitOffset: 16, bitWidth: 1}
          - {name: I2CPADEN, description: Enable I2C bus connection for USB OTG, bitOffset: 17, bitWidth: 1}
          - {name: VBUSASEN, description: Enable the VBUS sensing A device, bitOffset: 18, bitWidth: 1}
          - {name: VBUSBSEN, description: Enable the VBUS sensing B device, bitOffset: 19, bitWidth: 1}
          - {name: SOFOUTEN, description: SOF output enable, bitOffset: 20, bitWidth: 1}
          - {name: NOVBUSSENS, description: VBUS sensing disable, bitOffset: 21, bitWidth: 1}
      - {type: createClusterArray, pattern: HC(\D+)(\d+), name: HC, description: Host channel}
      - {type: renameRegisters, pattern: ^HPTXFSIZ$, replacement: DIEPTXF0}
      - {type: createArray, pattern: DIEPTXF(\d+), name: TXSAFD, description: Transmit FIFO start address and depth (index 0 is host periodic TX FIFO), template: 1}
      - {type: renameRegisters, pattern: ^DTXFSTS, replacement: DIEPTXFSTS}
      - {type: renameRegisters, pattern: DIEPCTL(\d+)_(\w+), replacement: DIEPCTL_\2\1}
      - {type: createClusterArray, pattern: DIEP(\D+)(\d+), name: DIEP, description: Device IN endpoint, template: 1}
      - {type: renameRegisters, pattern: DOEPCTL(\d+)_(\w+), replacement: DOEPCTL_\2\1}
      - {type: createClusterArray, pattern: DOEP(\D+)(\d+), name: DOEP, description: Device OUT endpoint, template: 1}
      - {type: patchAddressBlock, size: 3592}
  UCPD:
    # USB Type-C Power Delivery: G0, G4, H5, H7RS, L5, N6, U5
    # 18 registers: config (CFG1/CFG2/CFG3), control (CR), interrupts (IMR/SR/ICR),
    # TX (TX_ORDSET/TX_PAYSZ/TXDR), RX (RX_ORDSET/RX_PAYSZ/RXDR/RX_ORDEXT1/RX_ORDEXT2),
    # ID (IPVER/IPID/MID). G0 source is superset (DBATTEN in CR, all CFG3 trim fields, ID regs)
    from: STM32G070.UCPD1
    interrupts:
      UCPD1_UCPD2: INTR
      UCPD1: INTR
      UCPD: INTR
    description: USB Type-C Power Delivery controller
    transforms:
      - type: patchFields
        register: CFG2
        fields:
          - {name: RXAFILTEN, description: Rx analog filter enable, bitOffset: 8, bitWidth: 1, access: read-write}
  USB_DRD:
    # USB full-speed dual-role device (CHEPnR, PMA-based): C0, G0, H5, U0, U3
    from: STM32H503.USB
    interrupts:
      USB: INTR
      USB_FS: INTR
    description: USB full-speed dual-role device interface (PMA-based, CHEPnR)
    params:
      - {name: has_ddisc, type: bool, default: true, description: 'Device disconnection detection (DDISCM in CNTR, DDISC in ISTR)'}
      - {name: has_dcd, type: bool, default: true, description: Data contact detection (DCDEN/DCDET in BCDR)}
  USB_DEV:
    # USB full-speed device (EPnR, PMA-based): F3, G4, L0, L1, L5
    from: STM32L552.USB
    interrupts:
      USB_HP: HP
      USB_LP: LP
      USB_WAKEUP: WAKEUP
      USBWakeUP: WAKEUP
      USB_FS_WKUP: FS_WKUP
      USB: INTR
      USB_FS: INTR
    description: USB full-speed device interface (PMA-based, EPnR)
    params:
      - {name: has_lpm, type: bool, default: true, description: 'LPM support (L1RESUME/L1REQM in CNTR, L1REQ in ISTR)'}
      - {name: has_lpmcsr, type: bool, default: true, description: LPMCSR and BCDR registers present}
  CRC:
    # CRC calculation unit (modern IP with INIT/POL): all except F3, F4, L1
    from: STM32U375.CRC
    params:
      - {name: idr32, type: bool, default: true, description: IDR register is 32-bit (false = 8-bit)}
      - {name: has_rtype, type: bool, default: false, description: CR register includes RTYPE_IN and RTYPE_OUT reversal type fields}
  CRS:
    # Clock Recovery System: C0, G4, H5, H7, H7RS, L0, L4, L4P, L5, U0, U3, U5
    from: STM32U375.CRS
    interrupts:
      CRS: INTR
    params:
      - {name: trim_width, type: int, default: 6, description: TRIM field width in CR register (6 or 7 bits)}
  PSSI:
    # Parallel Synchronous Slave Interface: H5, H7, H7RS, N6, U5
    from: STM32H7S.PSSI
    interrupts:
      PSSI: INTR
    params:
      - {name: has_cksrc, type: bool, default: false, description: CKSRC field in CR for clock source selection}
  CEC:
    # Gen2 HDMI-CEC: F4, F7, G0, H7, H7RS (F3 Gen1 stays separate)
    from: STM32H723.CEC
    interrupts:
      CEC: INTR
      HDMI_CEC: INTR
  DCMI:
    # Digital Camera Interface: F4, F7, H5, H7, L4, L4P, N6, U5
    from: STM32H723.DCMI
    interrupts:
      DCMI: INTR
      DCMI_PSSI: INTR
    params:
      - {name: has_pixel_select, type: bool, default: true, description: BSM/OEBS/LSM/OELS fields in CR for byte/line selection}
  bxCAN:
    # Basic Extended CAN: F3, F4, F7, L4, L4P
    from: STM32F446.CAN1
    interrupts:
      CAN1_TX: TX
      CAN1_RX0: RX0
      CAN1_RX1: RX1
      CAN1_SCE: SCE
      USB_HP_CAN_TX: CAN_TX
      USB_LP_CAN_RX0: CAN_RX0
      CAN_RX1: RX1
      CAN_SCE: SCE
    params:
      - {name: filter_banks, type: int, default: 28, description: Number of CAN filter banks (14 or 28)}
      - {name: linked_to_slave, type: string, default: '', description: Instance name of slave CAN sharing this master filter banks}
      - {name: linked_to_master, type: string, default: '', description: Instance name of master CAN whose filter banks this slave uses}
    description: Controller area network (Bosch C_CAN)
  VREFBUF:
    # Voltage Reference Buffer: C0, G0, G4, H5, H7, H7RS, L4, L4P, L5, N6, U0, U3, U5
    from: STM32N645.VREFBUF
    params:
      - {name: vrs_wide, type: bool, default: true, description: 'VRS field layout: true = 3-bit at [6:4] (4 scales), false = 1-bit at [2] (2 scales)'}
    transforms:
      - {type: patchAddressBlock, size: 8}
      - {type: cloneRegister, source: CSR, name: CSR_V1, removeFields: [VRS]}
      - type: patchFields
        register: CSR_V1
        fields:
          - name: VRS
            description: Voltage reference scale
            bitOffset: 2
            bitWidth: 1
            access: read-write
            enumeratedValues:
              - {name: B_0x0, description: Voltage reference set to VREF_OUT1 (around 2.048 V)., value: 0}
              - {name: B_0x1, description: Voltage reference set to VREF_OUT2 (around 2.5 V)., value: 1}
  FDCAN:
    # Basic FDCAN (37-register Bosch M_CAN): C0, G0, G4, H5, H7RS, L5, U3, U5
    from: STM32H523.FDCAN
    interrupts: {FDCAN1_IT0: IT0, FDCAN1_IT1: IT1}
    transforms:
      - {type: patchAddressBlock, size: 1024}
    description: Controller area network with flexible data-rate (Bosch M_CAN)
  SDIO:
    # Legacy SD/SDIO/MMC (ARM PrimeCell PL18x): F4, F7, L1, L4
    from: STM32F401.SDIO
    interrupts:
      SDIO: INTR
    description: SD/SDIO/MMC host interface (ARM PrimeCell PL18x)
    params:
      - {name: has_ceata, type: bool, default: true, description: CE-ATA support fields in CMD/STA/ICR/MASK}
      - {name: has_stbiterr, type: bool, default: true, description: Start bit error detection in STA/ICR/MASK}
  SDMMC:
    # Modern SDMMC with IDMA: H5, H7, H7RS, L4P, L5, N6, U3, U5
    from: STM32H743.SDMMC1
    interrupts:
      SDMMC1: INTR
    description: SD/SDIO/MMC host interface (ARM PrimeCell PL18x)
    transforms:
      - type: patchFields
        register: IDMABSIZER
        fields:
          - {name: IDMABNDT, bitWidth: 12}
      - type: patchRegisters
        registers:
          - name: IDMALAR
            displayName: IDMALAR
            description: IDMA linked list address register
            addressOffset: 100
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: IDMALA, description: Word aligned linked list item address offset, bitOffset: 2, bitWidth: 14}
              - {name: ABR, description: Acknowledge linked list buffer ready, bitOffset: 29, bitWidth: 1}
              - {name: ULS, description: Update IDMABSIZE from next linked list, bitOffset: 30, bitWidth: 1}
              - {name: ULA, description: Update IDMALAR from linked list, bitOffset: 31, bitWidth: 1}
          - name: IDMABAR
            displayName: IDMABAR
            description: IDMA linked list memory base register
            addressOffset: 104
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: IDMABA, description: Word aligned linked list memory base address, bitOffset: 2, bitWidth: 30}
      - {type: patchAddressBlock, size: 1024}
    params:
      - {name: idma_list, type: bool, default: false, description: IDMA linked-list mode (vs double-buffer)}
      - {name: idma_buf_align64, type: bool, default: false, description: 'IDMA 64-byte buffer alignment (11-bit IDMABNDT at [16:6] vs 12-bit at [16:5])'}
      - {name: has_version_id, type: bool, default: false, description: VER and ID identification registers present}
  ETH:
    # Synopsys DWC Ethernet QoS (EQOS): H5, H7, H7RS, C5
    from: STM32H5E5.ETH
    interrupts:
      ETH: INTR
      ETH_WKUP: WKUP
    description: Ethernet MAC (Synopsys DWC EQOS)
    params:
      - {name: has_mdio_intr, type: bool, default: false, description: MDIO completion interrupt (MDIOIS/MDIOIE in MACISR/MACIER)}
    transforms:
      # Split MAC address fields into individual bytes and add MBC/SA to MACA0HR
      - type: patchFields
        register: MACA0LR
        fields:
          - {name: ADDRLO}
          - {name: ADDR0, description: MAC address byte 0, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR1, description: MAC address byte 1, bitOffset: 8, bitWidth: 8, access: read-write}
          - {name: ADDR2, description: MAC address byte 2, bitOffset: 16, bitWidth: 8, access: read-write}
          - {name: ADDR3, description: MAC address byte 3, bitOffset: 24, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA0HR
        fields:
          - {name: ADDRHI}
          - {name: ADDR4, description: MAC address byte 4, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR5, description: MAC address byte 5, bitOffset: 8, bitWidth: 8, access: read-write}
          - {name: MBC, description: Mask byte control, bitOffset: 24, bitWidth: 6, access: read-write}
          - {name: SA, description: Source address, bitOffset: 30, bitWidth: 1, access: read-write}
      - type: patchFields
        register: MACA1LR
        fields:
          - {name: ADDRLO}
          - {name: ADDR0, description: MAC address byte 0, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR1, description: MAC address byte 1, bitOffset: 8, bitWidth: 8, access: read-write}
          - {name: ADDR2, description: MAC address byte 2, bitOffset: 16, bitWidth: 8, access: read-write}
          - {name: ADDR3, description: MAC address byte 3, bitOffset: 24, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA1HR
        fields:
          - {name: ADDRHI}
          - {name: ADDR4, description: MAC address byte 4, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR5, description: MAC address byte 5, bitOffset: 8, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA2LR
        fields:
          - {name: ADDRLO}
          - {name: ADDR0, description: MAC address byte 0, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR1, description: MAC address byte 1, bitOffset: 8, bitWidth: 8, access: read-write}
          - {name: ADDR2, description: MAC address byte 2, bitOffset: 16, bitWidth: 8, access: read-write}
          - {name: ADDR3, description: MAC address byte 3, bitOffset: 24, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA2HR
        fields:
          - {name: ADDRHI}
          - {name: ADDR4, description: MAC address byte 4, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR5, description: MAC address byte 5, bitOffset: 8, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA3LR
        fields:
          - {name: ADDRLO}
          - {name: ADDR0, description: MAC address byte 0, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR1, description: MAC address byte 1, bitOffset: 8, bitWidth: 8, access: read-write}
          - {name: ADDR2, description: MAC address byte 2, bitOffset: 16, bitWidth: 8, access: read-write}
          - {name: ADDR3, description: MAC address byte 3, bitOffset: 24, bitWidth: 8, access: read-write}
      - type: patchFields
        register: MACA3HR
        fields:
          - {name: ADDRHI}
          - {name: ADDR4, description: MAC address byte 4, bitOffset: 0, bitWidth: 8, access: read-write}
          - {name: ADDR5, description: MAC address byte 5, bitOffset: 8, bitWidth: 8, access: read-write}
      # Collapse MACA0-3 into cluster array (template: MACA1 has MBC/SA superset)
      - {type: createClusterArray, pattern: MACA(\d+)(HR|LR), name: MACA, description: MAC address filter, template: 1}
  DFSDM:
    # Digital Filter for Sigma-Delta Modulators: F4, F7, H7, L4, L4P, L5
    # H7A3 is superset: 8 channels, 8 filters, CHyDLYR delay register
    from: STM32H7A3.DFSDM1
    params:
      - {name: channels, type: int, default: 8, max: 8, description: 'Number of serial channels (2, 4, or 8)'}
      - {name: filters, type: int, default: 4, max: 8, description: 'Number of digital filter units (1, 2, 4, or 8)'}
      - {name: has_dlyr, type: bool, default: true, description: CHyDLYR delay register present}
    transforms:
      - {type: renameRegisters, pattern: ^DFSDM\d+_, replacement: ''}
      - {type: createClusterArray, pattern: CH(\d+)(.+), name: CH, description: Serial channel}
      - {type: createClusterArray, pattern: FLT(\d+)(.+), name: FLT, description: Digital filter}
    interrupts:
      DFSDM1_FLT0: FLT0
      DFSDM1_FLT1: FLT1
      DFSDM1_FLT2: FLT2
      DFSDM1_FLT3: FLT3
      DFSDM1_FLT4: FLT4
      DFSDM1_FLT5: FLT5
      DFSDM1_FLT6: FLT6
      DFSDM1_FLT7: FLT7
  RTC_V1:
    # Old-IP RTC: ISR register, embedded BKPxR, TAFCR/TAMPCR
    # Gen 1 (L1, F4): CALIBR + TAFCR (TAMP1INSEL/TSINSEL/ALARMOUTTYPE)
    # Gen 2.5 (F7, L4, L4P, H7, L0): TAMPCR (per-tamper IE/NOERASE/MF) + OR
    # F3 excluded: unique PC13/14/15 GPIO bits in TAFCR
    from: STM32H723.RTC
    params:
      - {name: has_tampcr, type: bool, default: true, description: TAMPCR layout (false = legacy TAFCR)}
      - {name: has_calibr, type: bool, default: false, description: Legacy CALIBR register at offset 0x18}
      - {name: has_or, type: bool, default: true, description: OR output routing register present}
      - {name: or_f7, type: bool, default: false, description: F7-style OR layout (TSINSEL+ALARM_TYPE at different bits)}
      - {name: has_itsf, type: bool, default: false, description: Internal timestamp flag (ISR.ITSF) and enable (CR.ITSE)}
      - {name: backup_regs, type: int, default: 32, max: 32, description: 'Number of backup registers (5, 20, or 32)'}
      - {name: tampers, type: int, default: 3, max: 3, description: Tamper detection channels (2 or 3)}
    transforms:
      - type: cloneRegister
        source: TAMPCR
        name: TAFCR
        removeFields: [TAMP1IE, TAMP1NOERASE, TAMP1MF, TAMP2IE, TAMP2NOERASE, TAMP2MF, TAMP3IE, TAMP3NOERASE, TAMP3MF]
      - type: patchFields
        register: TAFCR
        fields:
          - name: TAMP1INSEL
            description: TAMPER1 mapping
            bitOffset: 16
            bitWidth: 1
          - name: TSINSEL
            description: TIMESTAMP mapping
            bitOffset: 17
            bitWidth: 1
          - name: ALARMOUTTYPE
            description: AFO_ALARM output type
            bitOffset: 18
            bitWidth: 1
      - type: cloneRegister
        source: OR
        name: OR_F7
        removeFields: [RTC_ALARM_TYPE, RTC_OUT_RMP]
      - type: patchFields
        register: OR_F7
        fields:
          - name: TSINSEL
            description: TIMESTAMP mapping
            bitOffset: 1
            bitWidth: 2
          - name: RTC_ALARM_TYPE
            description: RTC_ALARM on PC13 output type
            bitOffset: 3
            bitWidth: 1
      - type: patchRegisters
        registers:
          - name: CALIBR
            displayName: CALIBR
            description: Calibration register
            addressOffset: 24
            size: 32
            resetValue: 0
            resetMask: 4294967295
            fields:
              - name: DC
                description: Digital calibration
                bitOffset: 0
                bitWidth: 5
                access: read-write
              - name: DCS
                description: Digital calibration sign
                bitOffset: 7
                bitWidth: 1
                access: read-write
    interrupts:
      RTC_WKUP: WKUP
      RTC_ALARM: ALARM
      RTC_TAMP_STAMP_CSS_LSE: TAMP_STAMP_CSS_LSE
      RTC: INTR
      RTC_Alarm: ALARM
      EXTI22_RTC_WKUP: WKUP
      EXTI17_RTC_Alarm: ALARM
      RTC_TAMP_STAMP: TAMP_STAMP_CSS_LSE
  RTC_V2:
    # New-IP RTC: ICSR register, no embedded BKP, separate TAMP peripheral
    # Spans C0, G0, G4, H5, H7RS, L5, N6, U0, U3, U5
    # L5 uses SMCR (XXDPROT naming) instead of SECCFGR (XXSEC naming)
    from: STM32U375.RTC
    params:
      - {name: has_wutr, type: bool, default: true, description: 'Wakeup timer + Alarm B registers (WUTR, ALRMBR, ALRMBSSR)'}
      - {name: has_binary, type: bool, default: false, description: 'Binary mode: ALRABINR/ALRBBINR registers'}
      - {name: has_privcfgr, type: bool, default: false, description: Privilege configuration register (PRIVCFGR)}
      - {name: has_seccfgr, type: bool, default: false, description: Security configuration register (SECCFGR or SMCR)}
      - {name: smcr, type: bool, default: false, description: Use SMCR naming for security config (L5 variant)}
      - {name: has_smisr, type: bool, default: false, description: Secure masked interrupt status register}
      - {name: has_tamptscr, type: bool, default: false, description: TAMPTSCR + TSIDR tamper timestamp registers}
    transforms:
      - type: cloneRegister
        source: SECCFGR
        name: SMCR
        removeFields: [ALRASEC, ALRBSEC, WUTSEC, TSSEC, CALSEC, INITSEC, SEC]
      - type: patchFields
        register: SMCR
        fields:
          - name: ALRADPROT
            description: Alarm A and SSR underflow protection
            bitOffset: 0
            bitWidth: 1
          - name: ALRBDPROT
            description: Alarm B protection
            bitOffset: 1
            bitWidth: 1
          - name: WUTDPROT
            description: Wake-up timer protection
            bitOffset: 2
            bitWidth: 1
          - name: TSDPROT
            description: Timestamp protection
            bitOffset: 3
            bitWidth: 1
          - name: CALDPROT
            description: Calibration protection
            bitOffset: 13
            bitWidth: 1
          - name: INITDPROT
            description: Initialization protection
            bitOffset: 14
            bitWidth: 1
          - name: DECPROT
            description: Global RTC protection
            bitOffset: 15
            bitWidth: 1
    interrupts:
      RTC: INTR
      RTC_STAMP: INTR
      RTC_TAMP: INTR
      RTC_TAMP_CSS_LSE: TAMP_CSS_LSE
      RTC_WKUP: WKUP
      RTC_ALARM: ALARM
      RTC_S: S
  I3C:
    # Improved Inter-Integrated Circuit: C5, H5, N6, U3
    from: STM32U375.I3C1
    interrupts:
      I3C1_EV: EV
      I3C1_ER: ER
      I3C1_ERR: ERR
    description: Improved Inter-Integrated Circuit (I3C)
    transforms:
      # Fix mixed-case register names (U3 SVD bug)
      - {type: renameRegisters, pattern: ^MAxRLR$, replacement: MAXRLR}
      - {type: renameRegisters, pattern: ^MAxWLR$, replacement: MAXWLR}
      - {type: renameRegisters, pattern: ^GETMxDSR$, replacement: GETMXDSR}
      # Fix mixed-case field names (U3 SVD bug)
      - {type: renameFields, register: CFGR, pattern: ^ExITPTRN$, replacement: EXITPTRN}
      - {type: renameFields, register: CFGR, pattern: ^Rx, replacement: RX}
      - {type: renameFields, register: CFGR, pattern: ^Tx, replacement: TX}
      - {type: renameFields, register: SR, pattern: ^xDCNT$, replacement: XDCNT}
      - {type: renameFields, register: EVR, pattern: ^Rx, replacement: RX}
      - {type: renameFields, register: EVR, pattern: ^Tx, replacement: TX}
      - {type: renameFields, register: IER, pattern: ^Rx, replacement: RX}
      - {type: renameFields, register: IER, pattern: ^Tx, replacement: TX}
      - {type: renameFields, register: CEVR, pattern: ^CRx, replacement: CRX}
      - {type: renameFields, register: MISR, pattern: ^Rx, replacement: RX}
      - {type: renameFields, register: MISR, pattern: ^Tx, replacement: TX}
  DCACHE:
    # Data cache controller: H5, U5
    from: STM32H523.DCACHE
    interrupts:
      DCACHE: INTR
      DCACHE1: INTR
      DCACHE2: INTR
    description: Data cache controller (DCACHE)
  ICACHE:
    # Instruction cache: C5, H5, H7RS
    from: STM32H503.ICACHE
    interrupts:
      ICACHE: INTR
    description: Instruction cache controller (ICACHE)
  SAES:
    # Secure AES coprocessor: C5, H5, H7RS, N6, U3, U5
    from: STM32H533.SAES
    interrupts:
      SAES: INTR
    description: Secure AES coprocessor (SAES)
  LTDC:
    # LCD-TFT Display Controller: F4, F7, H7, H7RS, L4+, U5
    # 37 registers: timing (SSCR/BPCR/AWCR/TWCR), control (GCR/SRCR/BCCR),
    # interrupts (IER/ISR/ICR/LIPCR/CPSR/CDSR), 2 layers (L1/L2: CR/WHPCR/WVPCR/
    # CKCR/PFCR/CACR/DCCR/BFCR/CFBAR/CFBLR/CFBLNR/CLUTWR)
    # N6 has a fundamentally different extended LTDC (70 registers, YCbCr, gamma) — separate block
    from: STM32H7S.LTDC
    interrupts:
      LCD_TFT: INTR
      LCD_TFT_1: ER
      LCD_TFT_ER: ER
      LCD_TFT_ERR: ER
      LTDC: INTR
      LTDC_ER: ER
    description: LCD-TFT Display Controller (standard 2-layer)
  ADF:
    # Audio Digital Filter: H7RS, N6, U3, U5
    # 15 registers: global (GCR/CKGCR), serial interface (SITF0CR), bitstream mux
    # (BSMX0CR), digital filter (DFLT0CR/DFLT0CICR/DFLT0RSFR/DFLT0DR), delay
    # (DLY0CR), interrupts (DFLT0IER/DFLT0ISR), sound activity (SADCR/SADCFGR/
    # SADSDLVR/SADANLVR). U3 adds TRGISEL (trigger input selection).
    from: STM32H7S.ADF
    interrupts:
      ADF1_FLT0: INTR
      ADF1: INTR
    description: Audio Digital Filter
    transforms:
      - type: patchRegisters
        registers:
          - name: TRGISEL
            description: Trigger input selection register
            addressOffset: 32
            size: 32
            access: read-write
            resetValue: 0
            fields:
              - {name: TRGISEL, description: Input selection for adf_trgi, bitOffset: 0, bitWidth: 2, access: read-write}

  MDF:
    # Multi-function Digital Filter: N6, U5
    # 98 registers: global (GCR/CKGCR), 6 filter channels (SITFxCR/BSMXxCR/
    # DFLTxCR/DFLTxCICR/DFLTxRSFR/DFLTxINTR/OLDxCR/OLDxTHLR/OLDxTHHR/DLYxCR/
    # SCDxCR/DFLTxIER/DFLTxISR/OECxCR/SNPSxDR/DFLTxDR). N6 source has richer
    # descriptions/enums and correct MCICD field splitting (8+1 vs U5 single 9-bit).
    from: STM32N645.MDF1
    interrupts:
      MDF1_FLT0: FLT0
      MDF1_FLT1: FLT1
      MDF1_FLT2: FLT2
      MDF1_FLT3: FLT3
      MDF1_FLT4: FLT4
      MDF1_FLT5: FLT5
    description: Multi-function Digital Filter

  DSI:
    # MIPI DSI host controller (Synopsys DesignWare): F4, F7, L4+
    # 72 registers: version (VR), core config (CR/CCR/PCR/MCR), video mode
    # (VMCR/VPCR/VCCR/VNPCR/VH*/VV*), command mode (LCCR/CMCR), generic
    # (GHCR/GPDR/GPSR), timing (TCCR0-5), PHY (CLCR/CLTCR/DLTCR/PCTLR/
    # PCONFR/PUCR/PTTCR/PSR), interrupt (ISR0/1/IER0/1/FIR0/1), current
    # config (LCVCIDR/LCCCR/LPMCCR/VMCCR/VP*/VC*/VN*/VH*/VV*), wrapper
    # (WCFGR/WCR/WIER/WISR/WIFCR/WPCR1-5/WRPCR). U5 has newer revision
    # with different PLL/PHY fields — stays family-specific.
    from: STM32F767.DSI
    interrupts:
      DSIHOST: INTR
      DSIHSOT: INTR
    description: MIPI DSI host controller (Synopsys DesignWare)
    transforms:
      - type: renameFields
        register: WPCR3
        pattern: ^TCLKZEO$
        replacement: TCLKZERO

  TAMP:
    # Tamper detection: C5, G0, G4, H5, H7(A3), H7RS, L5, N6, U0, U3, U5
    # Core registers: CR1/CR2/FLTCR (tamper config), IER/SR/MISR/SCR (interrupt/
    # status), BKP0R-31R (backup). Extended: CR3 (internal tamper config),
    # ATCR1/ATSEEDR/ATOR/ATCR2 (active tamper), SECCFGR/PRIVCFGR (security/
    # privilege), SMISR (secure masked interrupt), COUNT1R (monotonic counter),
    # OR (option), RPCFGR (resource protection). Unions: CR2/CR2_NOER and
    # CR3/CR3_NOER (POM vs NOER tamper output control), SECCFGR/CFGR/SMCR
    # (TrustZone/non-TZ/L5 naming at 0x020), OR/OR_Remap/MONCFGR (option
    # register variants at 0x050), RPCFGR/ERCFGR (resource protection at 0x054).
    from: STM32N645.TAMP
    interrupts:
      TAMP: INTR
    description: Tamper detection
    params:
      - {name: pom, type: bool, default: false, description: 'CR2/CR3 tamper output control: false=NOER (no-erase), true=POM (potential output masking)'}
      - {name: sec, type: int, default: 0, description: 'Security config register at 0x020: 0=none, 1=SECCFGR (TrustZone), 2=CFGR (zone boundaries), 3=SMCR (L5 DPROT naming)'}
      - {name: or_reg, type: int, default: 0, description: 'Option register at 0x050: 0=none, 1=OR (VCOREMEN/BSEN), 2=OR_Remap (IN2/IN3_RMP), 3=MONCFGR (monitoring config)'}
      - {name: rpcfg, type: int, default: 0, description: 'Resource protection at 0x054: 0=none, 1=RPCFGR (multi-resource), 2=ERCFGR (single-resource)'}
    transforms:
      # --- Superset field additions (N6 has 7 ext tampers; add TAMP8/ITAMP12-15) ---
      - type: patchFields
        register: CR1
        fields:
          - {name: TAMP8E, bitOffset: 7, bitWidth: 1, access: read-write}
          - {name: ITAMP12E, bitOffset: 27, bitWidth: 1, access: read-write}
          - {name: ITAMP13E, bitOffset: 28, bitWidth: 1, access: read-write}
          - {name: ITAMP15E, bitOffset: 30, bitWidth: 1, access: read-write}
      - type: patchFields
        register: CR2
        fields:
          - {name: TAMP8POM, bitOffset: 7, bitWidth: 1, access: read-write}
          - {name: TAMP8TRG, bitOffset: 31, bitWidth: 1, access: read-write}
      - type: patchFields
        register: CR3
        fields:
          - {name: ITAMP12POM, bitOffset: 11, bitWidth: 1, access: read-write}
          - {name: ITAMP13POM, bitOffset: 12, bitWidth: 1, access: read-write}
      - type: patchFields
        register: ATCR1
        fields:
          - {name: TAMP8AM, bitOffset: 7, bitWidth: 1, access: read-write}
      - type: patchFields
        register: ATCR2
        fields:
          - {name: ATOSEL8, bitOffset: 29, bitWidth: 3, access: read-write}
      - type: patchFields
        register: IER
        fields:
          - {name: TAMP8IE, bitOffset: 7, bitWidth: 1, access: read-write}
          - {name: ITAMP12IE, bitOffset: 27, bitWidth: 1, access: read-write}
          - {name: ITAMP13IE, bitOffset: 28, bitWidth: 1, access: read-write}
          - {name: ITAMP15IE, bitOffset: 30, bitWidth: 1, access: read-write}
      - type: patchFields
        register: SR
        fields:
          - {name: TAMP8F, bitOffset: 7, bitWidth: 1, access: read-only}
          - {name: ITAMP12F, bitOffset: 27, bitWidth: 1, access: read-only}
          - {name: ITAMP13F, bitOffset: 28, bitWidth: 1, access: read-only}
          - {name: ITAMP15F, bitOffset: 30, bitWidth: 1, access: read-only}
      - type: patchFields
        register: MISR
        fields:
          - {name: TAMP8MF, bitOffset: 7, bitWidth: 1, access: read-only}
          - {name: ITAMP12MF, bitOffset: 27, bitWidth: 1, access: read-only}
          - {name: ITAMP13MF, bitOffset: 28, bitWidth: 1, access: read-only}
          - {name: ITAMP15MF, bitOffset: 30, bitWidth: 1, access: read-only}
      - type: patchFields
        register: SMISR
        fields:
          - {name: TAMP8MF, bitOffset: 7, bitWidth: 1, access: read-only}
          - {name: ITAMP12MF, bitOffset: 27, bitWidth: 1, access: read-only}
          - {name: ITAMP13MF, bitOffset: 28, bitWidth: 1, access: read-only}
      - type: patchFields
        register: SCR
        fields:
          - {name: CTAMP8F, bitOffset: 7, bitWidth: 1, access: write-only}
          - {name: CITAMP12F, bitOffset: 27, bitWidth: 1, access: write-only}
          - {name: CITAMP13F, bitOffset: 28, bitWidth: 1, access: write-only}
          - {name: CITAMP15F, bitOffset: 30, bitWidth: 1, access: write-only}
      - type: patchFields
        register: RPCFGR
        fields:
          - {name: RPCFG1, bitOffset: 1, bitWidth: 1, access: read-write}
          - {name: RPCFG2, bitOffset: 2, bitWidth: 1, access: read-write}
          - {name: RPCFG3, bitOffset: 3, bitWidth: 1, access: read-write}
          - {name: RPCFG4, bitOffset: 4, bitWidth: 1, access: read-write}
          - {name: RPCFG5, bitOffset: 5, bitWidth: 1, access: read-write}
          - {name: RPCFG31, bitOffset: 31, bitWidth: 1, access: read-write}
      # --- Union: CR2_NOER (NOER variant for H5/H7RS/L5/U5/H7A3/G0/G4) ---
      - type: cloneRegister
        source: CR2
        name: CR2_NOER
        removeFields: [TAMP1POM, TAMP2POM, TAMP3POM, TAMP4POM, TAMP5POM, TAMP6POM, TAMP7POM, TAMP8POM]
      - type: patchFields
        register: CR2_NOER
        fields:
          - {name: TAMP1NOER, bitOffset: 0, bitWidth: 1, access: read-write}
          - {name: TAMP2NOER, bitOffset: 1, bitWidth: 1, access: read-write}
          - {name: TAMP3NOER, bitOffset: 2, bitWidth: 1, access: read-write}
          - {name: TAMP4NOER, bitOffset: 3, bitWidth: 1, access: read-write}
          - {name: TAMP5NOER, bitOffset: 4, bitWidth: 1, access: read-write}
          - {name: TAMP6NOER, bitOffset: 5, bitWidth: 1, access: read-write}
          - {name: TAMP7NOER, bitOffset: 6, bitWidth: 1, access: read-write}
          - {name: TAMP8NOER, bitOffset: 7, bitWidth: 1, access: read-write}
      # --- Union: CR3_NOER (NOER variant for H5/H7RS/L5/U5) ---
      - type: cloneRegister
        source: CR3
        name: CR3_NOER
        removeFields: [ITAMP1POM, ITAMP2POM, ITAMP3POM, ITAMP4POM, ITAMP5POM, ITAMP6POM, ITAMP7POM, ITAMP8POM, ITAMP9POM, ITAMP11POM, ITAMP12POM, ITAMP13POM]
      - type: patchFields
        register: CR3_NOER
        fields:
          - {name: ITAMP1NOER, bitOffset: 0, bitWidth: 1, access: read-write}
          - {name: ITAMP2NOER, bitOffset: 1, bitWidth: 1, access: read-write}
          - {name: ITAMP3NOER, bitOffset: 2, bitWidth: 1, access: read-write}
          - {name: ITAMP4NOER, bitOffset: 3, bitWidth: 1, access: read-write}
          - {name: ITAMP5NOER, bitOffset: 4, bitWidth: 1, access: read-write}
          - {name: ITAMP6NOER, bitOffset: 5, bitWidth: 1, access: read-write}
          - {name: ITAMP7NOER, bitOffset: 6, bitWidth: 1, access: read-write}
          - {name: ITAMP8NOER, bitOffset: 7, bitWidth: 1, access: read-write}
          - {name: ITAMP9NOER, bitOffset: 8, bitWidth: 1, access: read-write}
          - {name: ITAMP11NOER, bitOffset: 10, bitWidth: 1, access: read-write}
          - {name: ITAMP12NOER, bitOffset: 11, bitWidth: 1, access: read-write}
          - {name: ITAMP13NOER, bitOffset: 12, bitWidth: 1, access: read-write}
          - {name: ITAMP15NOER, bitOffset: 14, bitWidth: 1, access: read-write}
      # --- Union: CFGR (non-TrustZone variant of SECCFGR for H5/H7RS/C5) ---
      - type: cloneRegister
        source: SECCFGR
        name: CFGR
        removeFields: [CNT1SEC, TAMPSEC]
        renameFields:
          - {pattern: ^BKPRWSEC$, replacement: BKPRW}
          - {pattern: ^BKPWSEC$, replacement: BKPW}
      # --- Union: SMCR (L5 variant of SECCFGR with DPROT naming) ---
      - type: cloneRegister
        source: SECCFGR
        name: SMCR
        removeFields: [CNT1SEC, BHKLOCK]
        renameFields:
          - {pattern: ^BKPRWSEC$, replacement: BKPRWDPROT}
          - {pattern: ^BKPWSEC$, replacement: BKPWDPROT}
          - {pattern: ^TAMPSEC$, replacement: TAMPDPROT}
      # --- Union: OR_Remap (C5 variant of OR with pin remapping) ---
      - type: cloneRegister
        source: OR
        name: OR_Remap
        removeFields: [VCOREMEN, BSEN]
      - type: patchFields
        register: OR_Remap
        fields:
          - {name: IN2_RMP, description: TAMP_IN2 pin select, bitOffset: 0, bitWidth: 1, access: read-write}
          - {name: IN3_RMP, description: TAMP_IN3 pin select, bitOffset: 2, bitWidth: 1, access: read-write}
      # --- Union: MONCFGR (L5/H7A3 monitoring config variant of OR at 0x050) ---
      - type: cloneRegister
        source: OR
        name: MONCFGR
        removeFields: [VCOREMEN, BSEN]
      - type: patchFields
        register: MONCFGR
        fields:
          - {name: OUT3_RMP, description: TAMP_OUT3 mapping, bitOffset: 0, bitWidth: 1, access: read-write}
          - {name: TMONEN, description: Tamper monitoring enable, bitOffset: 1, bitWidth: 1, access: read-write}
          - {name: VMONEN, description: Voltage monitoring enable, bitOffset: 2, bitWidth: 1, access: read-write}
          - {name: WUTMONEN, description: Wakeup timer monitoring enable, bitOffset: 3, bitWidth: 1, access: read-write}
      # --- Union: ERCFGR (H5/U5 variant of RPCFGR) ---
      - type: cloneRegister
        source: RPCFGR
        name: ERCFGR
        removeFields: [RPCFG0, RPCFG1, RPCFG2, RPCFG3, RPCFG4, RPCFG5, RPCFG31]
      - type: patchFields
        register: ERCFGR
        fields:
          - {name: ERCFG0, description: Configurable device secrets configuration, bitOffset: 0, bitWidth: 1, access: read-write}

