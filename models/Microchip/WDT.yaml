name: WDT
version: 6080N
description: Watchdog timer
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    access: write-only
    fields:
      - name: WDRSTT
        description: Watchdog Restart
        bitOffset: 0
        bitWidth: 1
      - name: KEY
        description: Password
        bitOffset: 24
        bitWidth: 8
        enumeratedValues:
          - name: PASSWD
            description: Writing any other value in this field aborts the write operation.
            value: 165
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: WDV
        description: Watchdog Counter Value
        bitOffset: 0
        bitWidth: 12
      - name: WDFIEN
        description: Watchdog Fault Interrupt Enable
        bitOffset: 12
        bitWidth: 1
      - name: WDRSTEN
        description: Watchdog Reset Enable
        bitOffset: 13
        bitWidth: 1
      - name: WDDIS
        description: Watchdog Disable
        bitOffset: 15
        bitWidth: 1
      - name: WDD
        description: Watchdog Delta Value
        bitOffset: 16
        bitWidth: 12
      - name: WDDBGHLT
        description: Watchdog Debug Halt
        bitOffset: 28
        bitWidth: 1
      - name: WDIDLEHLT
        description: Watchdog Idle Halt
        bitOffset: 29
        bitWidth: 1
  - name: SR
    description: Status Register
    addressOffset: 8
    size: 32
    access: read-only
    fields:
      - name: WDUNF
        description: Watchdog Underflow (cleared on read)
        bitOffset: 0
        bitWidth: 1
      - name: WDERR
        description: Watchdog Error (cleared on read)
        bitOffset: 1
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 12
    usage: registers
interrupts:
  - name: INT
    description: Watchdog Timer
