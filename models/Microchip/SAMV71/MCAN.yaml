name: MCAN
version: 11273N
description: Controller Area Network
groupName: MCAN
prependToName: MCAN_
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CREL
    description: Core Release Register
    addressOffset: 0
    size: 32
    access: read-only
    fields:
      - name: DAY
        description: Timestamp Day
        bitOffset: 0
        bitWidth: 8
      - name: MON
        description: Timestamp Month
        bitOffset: 8
        bitWidth: 8
      - name: YEAR
        description: Timestamp Year
        bitOffset: 16
        bitWidth: 4
      - name: SUBSTEP
        description: Sub-step of Core Release
        bitOffset: 20
        bitWidth: 4
      - name: STEP
        description: Step of Core Release
        bitOffset: 24
        bitWidth: 4
      - name: REL
        description: Core Release
        bitOffset: 28
        bitWidth: 4
  - name: ENDN
    description: Endian Register
    addressOffset: 4
    size: 32
    access: read-only
    fields:
      - name: ETV
        description: Endianness Test Value
        bitOffset: 0
        bitWidth: 32
  - name: CUST
    description: Customer Register
    addressOffset: 8
    size: 32
    fields:
      - name: CSV
        description: Customer-specific Value
        bitOffset: 0
        bitWidth: 32
  - name: DBTP
    description: Data Bit Timing and Prescaler Register
    addressOffset: 12
    size: 32
    fields:
      - name: DSJW
        description: Data (Re) Synchronization Jump Width
        bitOffset: 0
        bitWidth: 3
      - name: DTSEG2
        description: Data Time Segment After Sample Point
        bitOffset: 4
        bitWidth: 4
      - name: DTSEG1
        description: Data Time Segment Before Sample Point
        bitOffset: 8
        bitWidth: 5
      - name: DBRP
        description: Data Bit Rate Prescaler
        bitOffset: 16
        bitWidth: 5
      - name: TDC
        description: Transmitter Delay Compensation
        bitOffset: 23
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Transmitter Delay Compensation disabled.
            value: 0
          - name: ENABLED
            description: Transmitter Delay Compensation enabled.
            value: 1
  - name: TEST
    description: Test Register
    addressOffset: 16
    size: 32
    fields:
      - name: LBCK
        description: Loop Back Mode (read/write)
        bitOffset: 4
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Reset value. Loop Back mode is disabled.
            value: 0
          - name: ENABLED
            description: Loop Back mode is enabled (see Section 6.1.9).
            value: 1
      - name: TX
        description: Control of Transmit Pin (read/write)
        bitOffset: 5
        bitWidth: 2
        enumeratedValues:
          - name: RESET
            description: Reset value, CANTX controlled by the CAN Core, updated at the end of the CAN bit time.
            value: 0
          - name: SAMPLE_POINT_MONITORING
            description: Sample Point can be monitored at pin CANTX.
            value: 1
          - name: DOMINANT
            description: Dominant ('0') level at pin CANTX.
            value: 2
          - name: RECESSIVE
            description: Recessive ('1') at pin CANTX.
            value: 3
      - name: RX
        description: Receive Pin (read-only)
        bitOffset: 7
        bitWidth: 1
  - name: RWD
    description: RAM Watchdog Register
    addressOffset: 20
    size: 32
    fields:
      - name: WDC
        description: Watchdog Configuration (read/write)
        bitOffset: 0
        bitWidth: 8
      - name: WDV
        description: Watchdog Value (read-only)
        bitOffset: 8
        bitWidth: 8
  - name: CCCR
    description: CC Control Register
    addressOffset: 24
    size: 32
    fields:
      - name: INIT
        description: Initialization (read/write)
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Normal operation.
            value: 0
          - name: ENABLED
            description: Initialization is started.
            value: 1
      - name: CCE
        description: Configuration Change Enable (read/write, write protection)
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: PROTECTED
            description: The processor has no write access to the protected configuration registers.
            value: 0
          - name: CONFIGURABLE
            description: The processor has write access to the protected configuration registers (while MCAN_CCCR.INIT = '1').
            value: 1
      - name: ASM
        description: Restricted Operation Mode (read/write, write protection against '1')
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: NORMAL
            description: Normal CAN operation.
            value: 0
          - name: RESTRICTED
            description: Restricted Operation mode active.
            value: 1
      - name: CSA
        description: Clock Stop Acknowledge (read-only)
        bitOffset: 3
        bitWidth: 1
      - name: CSR
        description: Clock Stop Request (read/write)
        bitOffset: 4
        bitWidth: 1
        enumeratedValues:
          - name: NO_CLOCK_STOP
            description: No clock stop is requested.
            value: 0
          - name: CLOCK_STOP
            description: Clock stop requested. When clock stop is requested, first INIT and then CSA will be set after all pend-ing transfer requests have been completed and the CAN bus reached idle.
            value: 1
      - name: MON
        description: Bus Monitoring Mode (read/write, write protection against '1')
        bitOffset: 5
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Bus Monitoring mode is disabled.
            value: 0
          - name: ENABLED
            description: Bus Monitoring mode is enabled.
            value: 1
      - name: DAR
        description: Disable Automatic Retransmission (read/write, write protection)
        bitOffset: 6
        bitWidth: 1
        enumeratedValues:
          - name: AUTO_RETX
            description: Automatic retransmission of messages not transmitted successfully enabled.
            value: 0
          - name: NO_AUTO_RETX
            description: Automatic retransmission disabled.
            value: 1
      - name: TEST
        description: Test Mode Enable (read/write, write protection against '1')
        bitOffset: 7
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Normal operation, MCAN_TEST register holds reset values.
            value: 0
          - name: ENABLED
            description: Test mode, write access to MCAN_TEST register enabled.
            value: 1
      - name: FDOE
        description: CAN FD Operation Enable (read/write, write protection)
        bitOffset: 8
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: FD operation disabled.
            value: 0
          - name: ENABLED
            description: FD operation enabled.
            value: 1
      - name: BRSE
        description: Bit Rate Switching Enable (read/write, write protection)
        bitOffset: 9
        bitWidth: 1
        enumeratedValues:
          - name: DISABLED
            description: Bit rate switching for transmissions disabled.
            value: 0
          - name: ENABLED
            description: Bit rate switching for transmissions enabled.
            value: 1
      - name: PXHD
        description: Protocol Exception Event Handling (read/write, write protection)
        bitOffset: 12
        bitWidth: 1
      - name: EFBI
        description: Edge Filtering during Bus Integration (read/write, write protection)
        bitOffset: 13
        bitWidth: 1
      - name: TXP
        description: Transmit Pause (read/write, write protection)
        bitOffset: 14
        bitWidth: 1
      - name: NISO
        description: Non-ISO Operation
        bitOffset: 15
        bitWidth: 1
  - name: NBTP
    description: Nominal Bit Timing and Prescaler Register
    addressOffset: 28
    size: 32
    fields:
      - name: NTSEG2
        description: Nominal Time Segment After Sample Point
        bitOffset: 0
        bitWidth: 7
      - name: NTSEG1
        description: Nominal Time Segment Before Sample Point
        bitOffset: 8
        bitWidth: 8
      - name: NBRP
        description: Nominal Bit Rate Prescaler
        bitOffset: 16
        bitWidth: 9
      - name: NSJW
        description: Nominal (Re) Synchronization Jump Width
        bitOffset: 25
        bitWidth: 7
  - name: TSCC
    description: Timestamp Counter Configuration Register
    addressOffset: 32
    size: 32
    fields:
      - name: TSS
        description: Timestamp Select
        bitOffset: 0
        bitWidth: 2
        enumeratedValues:
          - name: ALWAYS_0
            description: Timestamp counter value always 0x0000
            value: 0
          - name: TCP_INC
            description: Timestamp counter value incremented according to TCP
            value: 1
          - name: EXT_TIMESTAMP
            description: External timestamp counter value used
            value: 2
      - name: TCP
        description: Timestamp Counter Prescaler
        bitOffset: 16
        bitWidth: 4
  - name: TSCV
    description: Timestamp Counter Value Register
    addressOffset: 36
    size: 32
    fields:
      - name: TSC
        description: Timestamp Counter (cleared on write)
        bitOffset: 0
        bitWidth: 16
  - name: TOCC
    description: Timeout Counter Configuration Register
    addressOffset: 40
    size: 32
    fields:
      - name: ETOC
        description: Enable Timeout Counter
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: NO_TIMEOUT
            description: Timeout Counter disabled.
            value: 0
          - name: TOS_CONTROLLED
            description: Timeout Counter enabled.
            value: 1
      - name: TOS
        description: Timeout Select
        bitOffset: 1
        bitWidth: 2
        enumeratedValues:
          - name: CONTINUOUS
            description: Continuous operation
            value: 0
          - name: TX_EV_TIMEOUT
            description: Timeout controlled by Tx Event FIFO
            value: 1
          - name: RX0_EV_TIMEOUT
            description: Timeout controlled by Receive FIFO 0
            value: 2
          - name: RX1_EV_TIMEOUT
            description: Timeout controlled by Receive FIFO 1
            value: 3
      - name: TOP
        description: Timeout Period
        bitOffset: 16
        bitWidth: 16
  - name: TOCV
    description: Timeout Counter Value Register
    addressOffset: 44
    size: 32
    fields:
      - name: TOC
        description: Timeout Counter (cleared on write)
        bitOffset: 0
        bitWidth: 16
  - name: ECR
    description: Error Counter Register
    addressOffset: 64
    size: 32
    access: read-only
    fields:
      - name: TEC
        description: Transmit Error Counter
        bitOffset: 0
        bitWidth: 8
      - name: REC
        description: Receive Error Counter
        bitOffset: 8
        bitWidth: 7
      - name: RP
        description: Receive Error Passive
        bitOffset: 15
        bitWidth: 1
      - name: CEL
        description: CAN Error Logging (cleared on read)
        bitOffset: 16
        bitWidth: 8
  - name: PSR
    description: Protocol Status Register
    addressOffset: 68
    size: 32
    access: read-only
    fields:
      - name: LEC
        description: Last Error Code (set to 111 on read)
        bitOffset: 0
        bitWidth: 3
        enumeratedValues:
          - name: NO_ERROR
            description: No error occurred since LEC has been reset by successful reception or transmission.
            value: 0
          - name: STUFF_ERROR
            description: More than 5 equal bits in a sequence have occurred in a part of a received message where this is not allowed.
            value: 1
          - name: FORM_ERROR
            description: A fixed format part of a received frame has the wrong format.
            value: 2
          - name: ACK_ERROR
            description: The message transmitted by the MCAN was not acknowledged by another node.
            value: 3
          - name: BIT1_ERROR
            description: During transmission of a message (with the exception of the arbitration field), the device tried to send a recessive level (bit of logical value '1'), but the monitored bus value was dominant.
            value: 4
          - name: BIT0_ERROR
            description: During transmission of a message (or acknowledge bit, or active error flag, or overload flag), the device tried to send a dominant level (data or identifier bit logical value '0'), but the monitored bus value was recessive. During Bus_Off recovery, this status is set each time a sequence of 11 recessive bits has been monitored. This enables the processor to monitor the proceeding of the Bus_Off recovery sequence (indicating the bus is not stuck at dominant or continuously disturbed).
            value: 5
          - name: CRC_ERROR
            description: The CRC check sum of a received message was incorrect. The CRC of an incoming message does not match the CRC calculated from the received data.
            value: 6
          - name: NO_CHANGE
            description: Any read access to the Protocol Status Register re-initializes the LEC to '7'. When the LEC shows value '7', no CAN bus event was detected since the last processor read access to the Protocol Status Register.
            value: 7
      - name: ACT
        description: Activity
        bitOffset: 3
        bitWidth: 2
        enumeratedValues:
          - name: SYNCHRONIZING
            description: Node is synchronizing on CAN communication
            value: 0
          - name: IDLE
            description: Node is neither receiver nor transmitter
            value: 1
          - name: RECEIVER
            description: Node is operating as receiver
            value: 2
          - name: TRANSMITTER
            description: Node is operating as transmitter
            value: 3
      - name: EP
        description: Error Passive
        bitOffset: 5
        bitWidth: 1
      - name: EW
        description: Warning Status
        bitOffset: 6
        bitWidth: 1
      - name: BO
        description: Bus_Off Status
        bitOffset: 7
        bitWidth: 1
      - name: DLEC
        description: Data Phase Last Error Code (set to 111 on read)
        bitOffset: 8
        bitWidth: 3
      - name: RESI
        description: ESI Flag of Last Received CAN FD Message (cleared on read)
        bitOffset: 11
        bitWidth: 1
      - name: RBRS
        description: BRS Flag of Last Received CAN FD Message (cleared on read)
        bitOffset: 12
        bitWidth: 1
      - name: RFDF
        description: Received a CAN FD Message (cleared on read)
        bitOffset: 13
        bitWidth: 1
      - name: PXE
        description: Protocol Exception Event (cleared on read)
        bitOffset: 14
        bitWidth: 1
      - name: TDCV
        description: Transmitter Delay Compensation Value
        bitOffset: 16
        bitWidth: 7
  - name: TDCR
    description: Transmit Delay Compensation Register
    addressOffset: 72
    size: 32
    fields:
      - name: TDCF
        description: Transmitter Delay Compensation Filter
        bitOffset: 0
        bitWidth: 7
      - name: TDCO
        description: Transmitter Delay Compensation Offset
        bitOffset: 8
        bitWidth: 7
  - name: IR
    description: Interrupt Register
    addressOffset: 80
    size: 32
    fields:
      - name: RF0N
        description: Receive FIFO 0 New Message
        bitOffset: 0
        bitWidth: 1
      - name: RF0W
        description: Receive FIFO 0 Watermark Reached
        bitOffset: 1
        bitWidth: 1
      - name: RF0F
        description: Receive FIFO 0 Full
        bitOffset: 2
        bitWidth: 1
      - name: RF0L
