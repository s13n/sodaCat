        bitOffset: 1
        bitWidth: 1
  - name: GFC
    description: Global Filter Configuration Register
    addressOffset: 128
    size: 32
    fields:
      - name: RRFE
        description: Reject Remote Frames Extended
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: FILTER
            description: Filter remote frames with 29-bit extended IDs.
            value: 0
          - name: REJECT
            description: Reject all remote frames with 29-bit extended IDs.
            value: 1
      - name: RRFS
        description: Reject Remote Frames Standard
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: FILTER
            description: Filter remote frames with 11-bit standard IDs.
            value: 0
          - name: REJECT
            description: Reject all remote frames with 11-bit standard IDs.
            value: 1
      - name: ANFE
        description: Accept Non-matching Frames Extended
        bitOffset: 2
        bitWidth: 2
        enumeratedValues:
          - name: RX_FIFO_0
            description: Accept in Rx FIFO 0
            value: 0
          - name: RX_FIFO_1
            description: Accept in Rx FIFO 1
            value: 1
      - name: ANFS
        description: Accept Non-matching Frames Standard
        bitOffset: 4
        bitWidth: 2
        enumeratedValues:
          - name: RX_FIFO_0
            description: Accept in Rx FIFO 0
            value: 0
          - name: RX_FIFO_1
            description: Accept in Rx FIFO 1
