            description: Read 0- No rising edge (since Reset or you wrote a 1 to this field last time), Write 0- No operation
            value: 0
          - name: RDET_1
            description: Read 1- Rising edge (since Reset or you wrote a 1 to this field last time), Write 1- Clear rising-edge detection for this pin
            value: 1
  - name: FALL
    description: Pin Interrupt Falling Edge
    addressOffset: 32
    size: 32
