        instances: [MDMA]
        interrupts:
          MDMA: INTR
        transforms:
          - {type: renameFields, register: C0ISR, pattern: 0$, replacement: ''}
          - {type: renameFields, register: C0IFCR, pattern: 0$, replacement: ''}
          - {type: createClusterArray, pattern: C(\d+)(\w+), name: C, description: MDMA channel}
      OCTOSPI:
        uses: XSPI
        instances: [OCTOSPI1, OCTOSPI2]
      OPAMP:
        uses: HSOPAMP
        instances: [OPAMP]
      OTFDEC:
        from: STM32H725.OTFDEC1
        instances: [OTFDEC1, OTFDEC2]
        interrupts:
          OTFDEC1: INTR
          OTFDEC2: INTR
      OTG_HS:
        uses: OTG
        instances: [OTG1_HS_GLOBAL, OTG2_HS_GLOBAL]
        interrupts:
          OTG_HS: INTR
          OTG_HS_WKUP: WKUP
          OTG_HS_EP1_IN: EP1_IN
          OTG_HS_EP1_OUT: EP1_OUT
      PSSI:
        uses: PSSI
        instances: [PSSI]
      PWR:
        from: STM32H723.PWR
        instances: [PWR]
        params:
          - {name: has_smps, type: bool, default: true, description: Has SMPS step-down converter (false for H742/H753 which use SCUEN instead of SDEN)}
        transforms:
      # H723/H745 SVDs: USB33DEN marked write-only, RM says read-write
          - type: patchFields
            register: CR3
            fields:
              - {name: USB33DEN, access: read-write}
      # H742/H753 has no SMPS — bit 2 is SCUEN (Supply Config Update Enable) not SDEN
          - type: cloneRegister
            source: CR3
            name: CR3_SCUEN
            renameFields:
              - {pattern: ^SDEN$, replacement: SCUEN}
        variants:
          H7A3_B:
            from: STM32H7A3.PWR
            transforms: []
      QUADSPI:
        uses: QUADSPI
        instances: [QUADSPI]
      RAMECC:
        from: STM32H743.RAMECC1
        instances: [RAMECC, RAMECC1, RAMECC2, RAMECC3]
        interrupts:
          ECC_DIAG_IT: INTR
        params:
          - {name: monitors, type: int, default: 5, max: 5, description: Number of ECC monitoring units in this RAMECC instance}
        transforms:
      # All H7 SVDs: M2FECR/M3FECR/M4FECR at wrong offsets (RM says regular 0x20 stride)
      # All H7 SVDs: scattered access bugs on FAR/FDRH/FECR (RM says all read-only)
          - type: patchRegisters
            registers:
              - {name: M1FECR, access: read-only}
              - {name: M2FDRH, access: read-only}
              - {name: M2FECR, addressOffset: 84, access: read-only}
              - {name: M3FECR, addressOffset: 116}
              - {name: M4FECR, addressOffset: 148, alternateRegister: null}
              - {name: M5FAR, access: read-only}
      RCC:
        instances: [RCC]
        interrupts:
          RCC: INTR
        variants:
          H73x:
            from: STM32H723.RCC
          H742_H753:
            from: STM32H743.RCC
          H745_H757:
            from: STM32H745_CM4.RCC
            transforms:
              - {type: patchFields, register: APB3ENR, fields: [{name: DSIEN, bitOffset: 4, bitWidth: 1, description: DSI peripheral clock enable}]}
              - {type: patchFields, register: C1_APB3ENR, fields: [{name: DSIEN, bitOffset: 4, bitWidth: 1, description: DSI peripheral clock enable}]}
              - {type: patchFields, register: APB3LPENR, fields: [{name: DSILPEN, bitOffset: 4, bitWidth: 1, description: DSI peripheral clock enable during CSleep mode}]}
              - {type: patchFields, register: C1_APB3LPENR, fields: [{name: DSILPEN, bitOffset: 4, bitWidth: 1, description: DSI peripheral clock enable during CSleep mode}]}
              - {type: patchFields, register: APB1LENR, fields: [{name: WWDG2EN, bitOffset: 11, bitWidth: 1, description: WWDG2 peripheral clock enable}]}
              - {type: patchFields, register: C1_APB1LENR, fields: [{name: WWDG2EN, bitOffset: 11, bitWidth: 1, description: WWDG2 peripheral clock enable}]}
              - {type: patchFields, register: APB1LLPENR, fields: [{name: WWDG2LPEN, bitOffset: 11, bitWidth: 1, description: WWDG2 peripheral clock enable during CSleep mode}]}
              - {type: patchFields, register: C1_APB1LLPENR, fields: [{name: WWDG2LPEN, bitOffset: 11, bitWidth: 1, description: WWDG2 peripheral clock enable during CSleep mode}]}
              - {type: renameRegisters, pattern: '^(RSR|(?:AHB[1-4]|APB[1-4][LH]?)(?:ENR|LPENR))$', replacement: C0_\1}
              - {type: patchRegisters, registers: [{name: C2_RSR, addressOffset: 400, size: 32, access: read-write, resetValue: 0}]}
              - {type: createClusterArray, pattern: C(\d+)_(.+), name: C, description: Per-CPU register bank}
          H7A3_B:
            from: STM32H7A3.RCC
      RNG:
        uses: RNG
        instances: [RNG]
        interrupts:
          HASH_RNG: INTR
      RTC:
        uses: RTC_V1
        instances: [RTC]
        interrupts:
          RTC_TAMP_STAMP_CSS_LSE: TAMP_STAMP_CSS_LSE
          RTC_WKUP: WKUP
          RTC_ALARM: ALARM
        variants:
          H7A3_B:
            from: STM32H7A3.RTC
      SAI:
        uses: SAI
        instances: [SAI1, SAI2, SAI3, SAI4]
