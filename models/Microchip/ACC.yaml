            description: Low-power option.
            value: 0
          - name: HISP
            description: High-speed option.
            value: 1
      - name: HYST
        description: Hysteresis Selection
        bitOffset: 1
        bitWidth: 2
  - name: WPMR
    description: Write Protection Mode Register
    addressOffset: 228
    size: 32
    fields:
