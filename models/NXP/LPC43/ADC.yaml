name: ADC
description: 10-bit Analog-to-Digital Converter (ADC)
groupName: ADC
source: LPC43xx_43Sxx.svd v10 (MCUX_2.16.100)
registers:
  - name: CR
    description: A/D Control Register. The AD0CR register must be written to select the operating mode before A/D conversion can occur.
    addressOffset: 0
    access: read-write
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: SEL
        description: Selects which of the ADC[7:0] pins are to be sampled and converted. Bit 0 selects Pin ADC0, bit 1 selects pin AD1,..., and bit 7 selects pin ADC7. In software-controlled mode, only one of these bits should be 1. In hardware scan mode, any value containing 1 to 8 ones. All zeroes is equivalent to 0x01.
        bitOffset: 0
        bitWidth: 8
      - name: CLKDIV
        description: The ADC clock is divided by the CLKDIV value plus one to produce the clock for the A/D converter, which should be less than or equal to 4.5 MHz. Typically, software should program the smallest value in this field that yields a clock of 4.5 MHz or slightly less, but in certain cases (such as a high-impedance analog source) a slower clock may be desirable.
        bitOffset: 8
        bitWidth: 8
      - name: BURST
        description: Burst mode
        enumeratedValues:
          - name: SOFTWARE
            description: Conversions are software controlled and require 11 clocks.
            value: 0
          - name: BURST
            description: 'The AD converter does repeated conversions at the rate selected by the CLKS field, scanning (if necessary) through the pins selected by 1s in the SEL field. The first conversion after the start corresponds to the least-significant 1 in the SEL field, then higher numbered 1 bits (pins) if applicable. Repeated conversions can be terminated by clearing this bit, but the conversion that is  in progress when this bit is cleared will be completed. Important: START bits must be 000 when BURST = 1 or conversions will not start.'
            value: 1
        bitOffset: 16
        bitWidth: 1
      - name: CLKS
        description: This field selects the number of clocks used for each conversion in Burst mode, and the number of bits of accuracy of the result in the LS bits of ADDR, between 11 clocks (10 bits) and 4 clocks (3 bits).
        enumeratedValues:
          - name: 11_CLOCKS_10_BITS
            description: 11 clocks / 10 bits
            value: 0
          - name: 10_CLOCKS_9_BITS
            description: 10 clocks / 9 bits
            value: 1
          - name: 9_CLOCKS_8_BITS
            description: 9 clocks / 8 bits
            value: 2
          - name: 8_CLOCKS_7_BITS
            description: 8 clocks / 7 bits
            value: 3
          - name: 7_CLOCKS_6_BITS
            description: 7 clocks / 6 bits
            value: 4
          - name: 6_CLOCKS_5_BITS
            description: 6 clocks / 5 bits
            value: 5
          - name: 5_CLOCKS_4_BITS
            description: 5 clocks / 4 bits
            value: 6
          - name: 4_CLOCKS_3_BITS
            description: 4 clocks / 3 bits
            value: 7
        bitOffset: 17
        bitWidth: 3
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 20
        bitWidth: 1
      - name: PDN
        description: Power mode
        enumeratedValues:
          - name: POWERDOWN
            description: The A/D converter is in Power-down mode.
            value: 0
          - name: RUNNING
            description: The A/D converter is operational.
            value: 1
        bitOffset: 21
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 22
        bitWidth: 2
      - name: START
        description: 'When the BURST bit is 0, these bits control whether and when an A/D conversion is started (also see Figure 56):'
        enumeratedValues:
          - name: NO_START
            description: No start (this value should be used when clearing PDN to 0).
            value: 0
          - name: START_CONVERSION_NOW
            description: Start conversion now.
            value: 1
          - name: CTOUT_15
            description: Start conversion when the edge selected by bit 27 occurs on CTOUT_15 (combined timer output 15).
            value: 2
          - name: CTOUT_8
            description: Start conversion when the edge selected by bit 27 occurs on CTOUT_8 (combined timer output 8).
            value: 3
          - name: ADCTRIG0
            description: Start conversion when the edge selected by bit 27 occurs on ADCTRIG0 input.
            value: 4
          - name: ADCTRIG1
            description: Start conversion when the edge selected by bit 27 occurs on ADCTRIG1 input.
            value: 5
          - name: MCOA2
            description: Start conversion when the edge selected by bit 27 occurs on Motocon PWM output MCOA2.
            value: 6
          - name: RESERVED_
            description: Reserved.
            value: 7
        bitOffset: 24
        bitWidth: 3
      - name: EDGE
        description: 'This bit is significant only when the START field contains 0x2 -0x6. In these cases:'
        enumeratedValues:
          - name: RISING
            description: Start conversion on a rising edge on the selected signal.
            value: 0
          - name: FALLING
            description: Start conversion on a falling edge on the selected signal.
            value: 1
        bitOffset: 27
        bitWidth: 1
      - name: RESERVED
        description: Reserved, user software should not write ones to reserved bits. The value read from a reserved bit is not defined.
        bitOffset: 28
        bitWidth: 4
  - name: GDR
    description: A/D Global Data Register. Contains the result of the most recent A/D conversion.
    addressOffset: 4
    access: read-only
    resetValue: 0
    resetMask: 0
    fields:
      - name: RESERVED
        description: Reserved. These bits always read as zeroes.
        bitOffset: 0
        bitWidth: 6
      - name: V_VREF
        description: When DONE is 1, this field contains a binary fraction representing the voltage on the ADCn pin selected by the SEL field, divided by the reference voltage on the VDDA pin. Zero in the field indicates that the voltage on the ADCn input pin was less than, equal to, or close to that on VSSA, while 0x3FF indicates that the voltage on ADCn input pin was close to, equal to, or greater than that on VDDA.
        bitOffset: 6
        bitWidth: 10
      - name: RESERVED
        description: Reserved. These bits always read as zeroes.
        bitOffset: 16
        bitWidth: 8
      - name: CHN
        description: These bits contain the channel from which the LS bits were converted.
        bitOffset: 24
        bitWidth: 3
      - name: RESERVED
        description: Reserved. These bits always read as zeroes.
        bitOffset: 27
        bitWidth: 3
      - name: OVERRUN
        description: This bit is 1 in burst mode if the results of one or more conversions was (were) lost and overwritten before the conversion that produced the result in the V_VREF bits.
        bitOffset: 30
        bitWidth: 1
      - name: DONE
        description: This bit is set to 1 when an analog-to-digital conversion completes. It is cleared when this register is read and when the AD0/1CR register is written. If the AD0/1CR is written while a conversion is still in progress, this bit is set and a new conversion is started.
        bitOffset: 31
        bitWidth: 1
  - name: INTEN
    description: A/D Interrupt Enable Register. This register contains enable bits that allow the DONE flag of each A/D channel to be included or excluded from contributing to the generation of an A/D interrupt.
    addressOffset: 12
    access: read-write
    resetValue: 256
    resetMask: 4294967295
    fields:
      - name: ADINTEN
        description: These bits allow control over which A/D channels generate interrupts for conversion completion. When bit 0 is one, completion of a conversion on A/D channel 0 will generate an interrupt, when bit 1 is one, completion of a conversion on A/D channel 1 will generate an interrupt, etc.
        bitOffset: 0
        bitWidth: 8
      - name: ADGINTEN
        description: When 1, enables the global DONE flag in ADDR to generate an interrupt. When 0, only the individual A/D channels enabled by ADINTEN 7:0 will generate interrupts.
        bitOffset: 8
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Always 0.
        bitOffset: 9
        bitWidth: 23
  - dim: 8
    dimIncrement: 4
    name: DR[%s]
    description: A/D Channel Data Register. This register contains the result of the most recent conversion completed on channel n.
    addressOffset: 16
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: RESERVED
        description: Reserved. Always 0.
        bitOffset: 0
        bitWidth: 6
      - name: V_VREF
        description: When DONE is 1, this field contains a binary fraction representing the voltage on the ADCn input pin selected in Table 727, divided by the voltage on the VDDA pin. Zero in the field indicates that the voltage on the ADCn input pin was less than, equal to, or close to that on VDDA, while 0x3FF indicates that the voltage on ADCn input pin was close to, equal to, or greater than that on VDDA.
        bitOffset: 6
        bitWidth: 10
      - name: RESERVED
        description: Reserved. Always 0.
        bitOffset: 16
        bitWidth: 14
      - name: OVERRUN
        description: This bit is 1 in burst mode if the results of one or more conversions was (were) lost and overwritten before the conversion that produced the result in the V_VREF bits in this register.This bit is cleared by reading this register.
        bitOffset: 30
        bitWidth: 1
      - name: DONE
        description: This bit is set to 1 when an A/D conversion completes. It is cleared when this register is read.
        bitOffset: 31
        bitWidth: 1
  - name: STAT
    description: A/D Status Register. This register contains DONE and OVERRUN flags for all of the A/D channels, as well as the A/D interrupt flag.
    addressOffset: 48
    access: read-only
    resetValue: 0
    resetMask: 4294967295
    fields:
      - name: DONE
        description: These bits mirror the DONE status flags that appear in the result register for each A/D channel.
        bitOffset: 0
        bitWidth: 8
      - name: OVERUN
        description: These bits mirror the OVERRRUN status flags that appear in the result register for each A/D channel. Reading ADSTAT allows checking the status of all A/D channels simultaneously.
        bitOffset: 8
        bitWidth: 8
      - name: ADINT
        description: This bit is the A/D interrupt flag. It is one when any of the individual A/D channel Done flags is asserted and enabled to contribute to the A/D interrupt via the ADINTEN register.
        bitOffset: 16
        bitWidth: 1
      - name: RESERVED
        description: Reserved. Always 0.
        bitOffset: 17
        bitWidth: 15
addressBlocks:
  - offset: 0
    size: 4095
    usage: registers
interrupts:
  - name: ADC
