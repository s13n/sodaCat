name: RTC
version: 6056ZB
description: Real-time clock
source: ATSAMV71Q21B SVD Rev 0
registers:
  - name: CR
    description: Control Register
    addressOffset: 0
    size: 32
    fields:
      - name: UPDTIM
        description: Update Request Time Register
        bitOffset: 0
        bitWidth: 1
      - name: UPDCAL
        description: Update Request Calendar Register
        bitOffset: 1
        bitWidth: 1
      - name: TIMEVSEL
        description: Time Event Selection
        bitOffset: 8
        bitWidth: 2
        enumeratedValues:
          - name: MINUTE
            description: Minute change
            value: 0
          - name: HOUR
            description: Hour change
            value: 1
          - name: MIDNIGHT
            description: Every day at midnight
            value: 2
          - name: NOON
            description: Every day at noon
            value: 3
      - name: CALEVSEL
        description: Calendar Event Selection
        bitOffset: 16
        bitWidth: 2
        enumeratedValues:
          - name: WEEK
            description: Week change (every Monday at time 00:00:00)
            value: 0
          - name: MONTH
            description: Month change (every 01 of each month at time 00:00:00)
            value: 1
          - name: YEAR
            description: Year change (every January 1 at time 00:00:00)
            value: 2
  - name: MR
    description: Mode Register
    addressOffset: 4
    size: 32
    fields:
      - name: HRMOD
        description: 12-/24-hour Mode
        bitOffset: 0
        bitWidth: 1
      - name: PERSIAN
        description: PERSIAN Calendar
        bitOffset: 1
        bitWidth: 1
      - name: NEGPPM
        description: NEGative PPM Correction
        bitOffset: 4
        bitWidth: 1
      - name: CORRECTION
        description: Slow Clock Correction
        bitOffset: 8
        bitWidth: 7
      - name: HIGHPPM
        description: HIGH PPM Correction
        bitOffset: 15
        bitWidth: 1
      - name: OUT0
        description: RTCOUT0 OutputSource Selection
        bitOffset: 16
        bitWidth: 3
        enumeratedValues:
          - name: NO_WAVE
            description: No waveform, stuck at '0'
            value: 0
          - name: FREQ1HZ
            description: 1 Hz square wave
            value: 1
          - name: FREQ32HZ
            description: 32 Hz square wave
            value: 2
          - name: FREQ64HZ
            description: 64 Hz square wave
            value: 3
          - name: FREQ512HZ
            description: 512 Hz square wave
            value: 4
          - name: ALARM_TOGGLE
            description: Output toggles when alarm flag rises
            value: 5
          - name: ALARM_FLAG
            description: Output is a copy of the alarm flag
            value: 6
          - name: PROG_PULSE
            description: Duty cycle programmable pulse
            value: 7
      - name: OUT1
        description: RTCOUT1 Output Source Selection
        bitOffset: 20
        bitWidth: 3
        enumeratedValues:
          - name: NO_WAVE
            description: No waveform, stuck at '0'
            value: 0
          - name: FREQ1HZ
            description: 1 Hz square wave
            value: 1
          - name: FREQ32HZ
            description: 32 Hz square wave
            value: 2
          - name: FREQ64HZ
            description: 64 Hz square wave
            value: 3
          - name: FREQ512HZ
            description: 512 Hz square wave
            value: 4
          - name: ALARM_TOGGLE
            description: Output toggles when alarm flag rises
            value: 5
          - name: ALARM_FLAG
            description: Output is a copy of the alarm flag
            value: 6
          - name: PROG_PULSE
            description: Duty cycle programmable pulse
            value: 7
      - name: THIGH
        description: High Duration of the Output Pulse
        bitOffset: 24
        bitWidth: 3
        enumeratedValues:
          - name: H_31MS
            description: 31.2 ms
            value: 0
          - name: H_16MS
            description: 15.6 ms
            value: 1
          - name: H_4MS
            description: 3.91 ms
            value: 2
          - name: H_976US
            description: 976 us
            value: 3
          - name: H_488US
            description: 488 us
            value: 4
          - name: H_122US
            description: 122 us
            value: 5
          - name: H_30US
            description: 30.5 us
            value: 6
          - name: H_15US
            description: 15.2 us
            value: 7
      - name: TPERIOD
        description: Period of the Output Pulse
        bitOffset: 28
        bitWidth: 2
        enumeratedValues:
          - name: P_1S
            description: 1 second
            value: 0
          - name: P_500MS
            description: 500 ms
            value: 1
          - name: P_250MS
            description: 250 ms
            value: 2
          - name: P_125MS
            description: 125 ms
            value: 3
  - name: TIMR
    description: Time Register
    addressOffset: 8
    size: 32
    fields:
      - name: SEC
        description: Current Second
        bitOffset: 0
        bitWidth: 7
      - name: MIN
        description: Current Minute
        bitOffset: 8
        bitWidth: 7
      - name: HOUR
        description: Current Hour
        bitOffset: 16
        bitWidth: 6
      - name: AMPM
        description: Ante Meridiem Post Meridiem Indicator
        bitOffset: 22
        bitWidth: 1
  - name: CALR
    description: Calendar Register
    addressOffset: 12
    size: 32
    fields:
      - name: CENT
        description: Current Century
        bitOffset: 0
        bitWidth: 7
      - name: YEAR
        description: Current Year
        bitOffset: 8
        bitWidth: 8
      - name: MONTH
        description: Current Month
        bitOffset: 16
        bitWidth: 5
      - name: DAY
        description: Current Day in Current Week
        bitOffset: 21
        bitWidth: 3
      - name: DATE
        description: Current Day in Current Month
        bitOffset: 24
        bitWidth: 6
  - name: TIMALR
    description: Time Alarm Register
    addressOffset: 16
    size: 32
    fields:
      - name: SEC
        description: Second Alarm
        bitOffset: 0
        bitWidth: 7
      - name: SECEN
        description: Second Alarm Enable
        bitOffset: 7
        bitWidth: 1
      - name: MIN
        description: Minute Alarm
        bitOffset: 8
        bitWidth: 7
      - name: MINEN
        description: Minute Alarm Enable
        bitOffset: 15
        bitWidth: 1
      - name: HOUR
        description: Hour Alarm
        bitOffset: 16
        bitWidth: 6
      - name: AMPM
        description: AM/PM Indicator
        bitOffset: 22
        bitWidth: 1
      - name: HOUREN
        description: Hour Alarm Enable
        bitOffset: 23
        bitWidth: 1
  - name: CALALR
    description: Calendar Alarm Register
    addressOffset: 20
    size: 32
    fields:
      - name: MONTH
        description: Month Alarm
        bitOffset: 16
        bitWidth: 5
      - name: MTHEN
        description: Month Alarm Enable
        bitOffset: 23
        bitWidth: 1
      - name: DATE
        description: Date Alarm
        bitOffset: 24
        bitWidth: 6
      - name: DATEEN
        description: Date Alarm Enable
        bitOffset: 31
        bitWidth: 1
  - name: SR
    description: Status Register
    addressOffset: 24
    size: 32
    access: read-only
    fields:
      - name: ACKUPD
        description: Acknowledge for Update
        bitOffset: 0
        bitWidth: 1
        enumeratedValues:
          - name: FREERUN
            description: Time and calendar registers cannot be updated.
            value: 0
          - name: UPDATE
            description: Time and calendar registers can be updated.
            value: 1
      - name: ALARM
        description: Alarm Flag
        bitOffset: 1
        bitWidth: 1
        enumeratedValues:
          - name: NO_ALARMEVENT
            description: No alarm matching condition occurred.
            value: 0
          - name: ALARMEVENT
            description: An alarm matching condition has occurred.
            value: 1
      - name: SEC
        description: Second Event
        bitOffset: 2
        bitWidth: 1
        enumeratedValues:
          - name: NO_SECEVENT
            description: No second event has occurred since the last clear.
            value: 0
          - name: SECEVENT
            description: At least one second event has occurred since the last clear.
            value: 1
      - name: TIMEV
        description: Time Event
        bitOffset: 3
        bitWidth: 1
        enumeratedValues:
          - name: NO_TIMEVENT
            description: No time event has occurred since the last clear.
            value: 0
          - name: TIMEVENT
            description: At least one time event has occurred since the last clear.
            value: 1
      - name: CALEV
        description: Calendar Event
        bitOffset: 4
        bitWidth: 1
        enumeratedValues:
          - name: NO_CALEVENT
            description: No calendar event has occurred since the last clear.
            value: 0
          - name: CALEVENT
            description: At least one calendar event has occurred since the last clear.
            value: 1
      - name: TDERR
        description: Time and/or Date Free Running Error
        bitOffset: 5
        bitWidth: 1
        enumeratedValues:
          - name: CORRECT
            description: The internal free running counters are carrying valid values since the last read of the Status Register (RTC_SR).
            value: 0
          - name: ERR_TIMEDATE
            description: The internal free running counters have been corrupted (invalid date or time, non-BCD values) since the last read and/or they are still invalid.
            value: 1
  - name: SCCR
    description: Status Clear Command Register
    addressOffset: 28
    size: 32
    access: write-only
    fields:
      - name: ACKCLR
        description: Acknowledge Clear
        bitOffset: 0
        bitWidth: 1
      - name: ALRCLR
        description: Alarm Clear
        bitOffset: 1
        bitWidth: 1
      - name: SECCLR
        description: Second Clear
        bitOffset: 2
        bitWidth: 1
      - name: TIMCLR
        description: Time Clear
        bitOffset: 3
        bitWidth: 1
      - name: CALCLR
        description: Calendar Clear
        bitOffset: 4
        bitWidth: 1
      - name: TDERRCLR
        description: Time and/or Date Free Running Error Clear
        bitOffset: 5
        bitWidth: 1
  - name: IER
    description: Interrupt Enable Register
    addressOffset: 32
    size: 32
    access: write-only
    fields:
      - name: ACKEN
        description: Acknowledge Update Interrupt Enable
        bitOffset: 0
        bitWidth: 1
      - name: ALREN
        description: Alarm Interrupt Enable
        bitOffset: 1
        bitWidth: 1
      - name: SECEN
        description: Second Event Interrupt Enable
        bitOffset: 2
        bitWidth: 1
      - name: TIMEN
        description: Time Event Interrupt Enable
        bitOffset: 3
        bitWidth: 1
      - name: CALEN
        description: Calendar Event Interrupt Enable
        bitOffset: 4
        bitWidth: 1
      - name: TDERREN
        description: Time and/or Date Error Interrupt Enable
        bitOffset: 5
        bitWidth: 1
  - name: IDR
    description: Interrupt Disable Register
    addressOffset: 36
    size: 32
    access: write-only
    fields:
      - name: ACKDIS
        description: Acknowledge Update Interrupt Disable
        bitOffset: 0
        bitWidth: 1
      - name: ALRDIS
        description: Alarm Interrupt Disable
        bitOffset: 1
        bitWidth: 1
      - name: SECDIS
        description: Second Event Interrupt Disable
        bitOffset: 2
        bitWidth: 1
      - name: TIMDIS
        description: Time Event Interrupt Disable
        bitOffset: 3
        bitWidth: 1
      - name: CALDIS
        description: Calendar Event Interrupt Disable
        bitOffset: 4
        bitWidth: 1
      - name: TDERRDIS
        description: Time and/or Date Error Interrupt Disable
        bitOffset: 5
        bitWidth: 1
  - name: IMR
    description: Interrupt Mask Register
    addressOffset: 40
    size: 32
    access: read-only
    fields:
      - name: ACK
        description: Acknowledge Update Interrupt Mask
        bitOffset: 0
        bitWidth: 1
      - name: ALR
        description: Alarm Interrupt Mask
        bitOffset: 1
        bitWidth: 1
      - name: SEC
        description: Second Event Interrupt Mask
        bitOffset: 2
        bitWidth: 1
      - name: TIM
        description: Time Event Interrupt Mask
        bitOffset: 3
        bitWidth: 1
      - name: CAL
        description: Calendar Event Interrupt Mask
        bitOffset: 4
        bitWidth: 1
      - name: TDERR
        description: Time and/or Date Error Mask
        bitOffset: 5
        bitWidth: 1
  - name: VER
    description: Valid Entry Register
    addressOffset: 44
    size: 32
    access: read-only
    fields:
      - name: NVTIM
        description: Non-valid Time
        bitOffset: 0
        bitWidth: 1
      - name: NVCAL
        description: Non-valid Calendar
        bitOffset: 1
        bitWidth: 1
      - name: NVTIMALR
        description: Non-valid Time Alarm
        bitOffset: 2
        bitWidth: 1
      - name: NVCALALR
        description: Non-valid Calendar Alarm
        bitOffset: 3
        bitWidth: 1
addressBlocks:
  - offset: 0
    size: 48
    usage: registers
interrupts:
  - name: INT
    description: Real Time Clock
